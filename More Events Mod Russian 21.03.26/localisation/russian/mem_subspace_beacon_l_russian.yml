l_russian:

 mem_subspace_beacon_category:0 "Загадочный маяк"
 mem_subspace_beacon_category_desc:0 "Кажется, на астероиде §Y[Root.GetName]§! находится нечто, похожее на маяк. Откуда-то из группы меньших астероидов, находящихся вокруг основного, со случайными интервалами исходит постоянно повторяющийся подпространственный сигнал."
 mem_subspace_beacon.1.name:0 "Миниатюрная чёрная дыра"
 mem_subspace_beacon.1.desc:0 "Необычные сигналы, исходящие от §Y[From.From.GetName]§!, были отслежены до удивительно малой чёрной дыры, не более нескольких километров в поперечнике. Мелкие астероиды, некоторые не крупнее фрукта, регулярно засасываются за горизонт событий. Это создаёт субпространственные возмущения, которые, согласно §Y[Root.leader.GetName]§!, происходят из-за размера чёрной дыры. Учитывая её необычное расположение, весьма вероятно, что аномалия была преднамеренно создана для какой-то неизвестной цели. Что бы это ни было, это стоит изучать дальше."
 mem_subspace_beacon.11.name:0 "Автоматическая передача"
 mem_subspace_beacon.11.desc:0 "Согласно отчёту §Y[Root.leader.GetName]§!, загадочный сигнал от §Y[From.From.GetName]§! исходит от небольшого объекта, встроенного в поверхность астероида. Объект инопланетного происхождения, и через нерегулярные интервалы транслирует субпространственный сигнал на несколько точек Лагранжа внутри системы.\n\nЭтот сигнал, когда декодирован, по-видимому, демонстрирует автоматически созданную голографическую программу для какой-то давно исчезнувшей инопланетной расы. Каждый эпизод длится от одного до трёх часов, и является самодостаточной историей, действие которой происходит в одну из многих временных эпох, через которые, по-видимому, прошли её создатели, самая продвинутая из которых лишь на несколько столетий опережает нашу собственную цивилизацию. Поскольку программы сильно различаются по тону, жанру, сеттингу и структуре сюжета, §Y[Root.leader.GetName]§! выдвинул теорию, что аномалия была построена для процедурной генерации таких программ. Дальнейшее изучение может дать ценное понимание как общества инопланетной расы, так и наших собственных представлений о том, что делает хорошую историю."
 mem_subspace_beacon.21.name:0 "Астероид-наноробот"
 mem_subspace_beacon.21.desc:0 "Похоже, что «астероид» §Y[From.From.GetName]§! на самом деле не астероид, а чрезвычайно сложная стая нанороботов.\n\nХотя мы и не знаем, кто её создал, нам удалось с легкостью определить цель её создания; отправляя подпространственный сигнал, стая обнаруживает эхо от различных объектов, находящихся в системе и записывает сведения о проходящих кораблях.\n\nИспользовали ли её для слежения или используют до сих пор, но для какой-то другой цели, мы не знаем, но вполне очевидно, что наноботы маскируются под астероид во избежание обнаружения. Все повреждения в результате столкновений с астероидом устраняются, после чего стая продолжает наблюдение за системой. Запуская в астероид §Y[From.GetName]§! ракеты и другие объекты, мы можем наблюдать за процессом починки «астероида», что даёт нам взглянуть на нанотехнологии, на порядок превышающие наши нынешние знания."
 mem_subspace_beacon.100.name:0 "Подпространственная аномалия"
 mem_subspace_beacon.100.desc:0 "Субпространственные сигналы, исходящие от §Y[From.From.GetName]§!, по-видимому, возникают из ниоткуда. Они спонтанно генерируются из точного центра астероида, и §Y[Root.leader.GetName]§! не смог найти ничего необычного в этом регионе.\n\nХотя это, безусловно, увлекательно, сигналы могут быть легко воспроизведены в лаборатории, и без видимого виновника кажется, что у астероида больше нет секретов, которые можно было бы открыть."
 mem_subspace_beacon.100.a:0 "Некоторые вещи просто вне нашего понимания"
 mem_subspace_beacon.150.name:0 "Заброшенные добывающие дроны"
 mem_subspace_beacon.150.desc:0 "Кажется, что подпространственные сигналы с §Y[From.From.GetName]§! исходили от какой-то автоматической добывающей станции глубоко под поверхностью астероида. Маяк оказался аварийным сигналом, запрашивающим помощи от одного из союзников станции.\n\nК сожалению, §Y[Root.Owner.GetName]§! к их союзникам не относится, а станция и добывающие дроны оснащены оружием для собственной защиты. Они уже открыли огонь по §Y[Root.GetName]§!."
