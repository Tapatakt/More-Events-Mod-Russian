l_russian:

 MEM_PLANET_EATER_CRACKER:0 "Пожиратель планет"
 MEM_PLANET_EATER_CRACKER_ACTION:0 "Поглотить планету"
 FLEETORDER_DESTROY_PLANET_WITH_MEM_PLANET_EATER_CRACKER:0 "Поглотить планету"
 NAME_MEM_planetophage:0 "Стальная Пасть MKI"
 mem_planetophage_ateplanet_counter:0 "Сделанных укусов"
 mem_planetophage_disabled_powergrid:0 "Отключённая энергосеть"
 mem_planetophage_debris:0 "Оболочка из обломков"
 MEM_PLANETOPHAGE_RESTORE:0 "Восстановление Стальной Пасти"
 MEM_PLANETOPHAGE_RESTORE_DESC: "Этот корабль размером с планету был построен, чтобы поглощать целые планеты и превращать их в сырьевые ресурсы для использования по усмотрению его создателей. По неизвестной причине, однако, он использовал ресурсы планет для вооружения себя. Мы должны быть в состоянии восстановить его в соответствии с его первоначальным назначением и использовать ресурсы для себя."
 mem_planetophage_ship_buff:0 "Бонусы"
 mem_planetophage_crust:0 "Сфера Стальной Пасти"
 mem_planetophage_crust_desc_short:0 "Скульптура Стальной Пасти, созданная довольно талантливым солдатом, который был частью победного сражения"
 mem_planetophage_crust_desc_details:0 "Создатель сказал, что битва пробудила вдохновение из глубин его души, и он хотел выразить это небольшим мемориалом. Сама скульптура, уместно, сделана из фрагментов оригинала."
 mem_planetophage_category:0 "Тёмная сторона луны"
 mem_planetophage_category_desc:0 "Система [solar_system.GetName] состоит из меньшего количества планетарных тел, чем предполагали наши ранние данные, и выглядит опустошённой без признаков активности. Луна [from.GetName], вращающаяся вокруг разрушенного экуменополиса, является единственным исключением. Слабый энергетический сигнал можно проследить до её подповерхности. Этот разрушенный мир покрыт \"оболочкой\" из обломков, которые, согласно анализу, происходят из нескольких разных планет. Хотя мы не нашли следов жизни — биологической или иной — дальнейшее расследование может выявить, как и почему эта планета покрыта этой экстравагантной надстройкой."
 mem_planetophage.1.name:0 "Промышленная машинерия"
 mem_planetophage.1.desc:0 "Под разрушенной корой [from.GetName] наши [Owner.GetScientistPlural] нашли провода, кабели и другую машинерию, очевидно принадлежащую к обширному промышленному комплексу, судя по доступной области. Некоторые секции, очевидно, были посвящены добыче сырья, в то время как другие были забиты до отказа серверами и высококлассной схемотехникой. Было отмечено, что ни одно из вышеупомянутого не было активно и не работало. Слабый энергетический сигнал всё ещё присутствует, но ещё глубже. Без специализированного оборудования и тяжёлой машинерии наши [Owner.GetScientistPlural] не смогут достичь его."
 mem_planetophage.1.a:0 "Отправить строительное судно."
 mem_planetophage.1.b:0 "Это не стоит того."
 MEM_PLANETOPHAGE_REACTIVATE:0 "Бурение глубже"
 MEM_PLANETOPHAGE_REACTIVATE_DESC: "Что-то под поверхностью этого мира испускает слабый энергетический сигнал. Достижение его может приблизить нас к пониманию тайн этого места."
 mem_planetophage.2.name:0 "Это не луна"
 mem_planetophage.2.desc:0 "После того как наши [Owner.GetScientistPlural] достигли источника энергетического сигнала, который привёл нас сюда, мы осознали истинную природу этого мира. Вопреки нашим первоначальным оценкам, это была не луна, используемая в промышленных целях. Более точно, даже неясно, является ли это вообще луной или было бы более точным говорить о гигантской космической станции, поскольку граница между машинерией и окружающей её породой не может быть чётко определена.\n\nЭнергетический сигнал был идентифицирован как контрольная точка энергетической сети комплекса. Предварительные наблюдения предполагают, что этот комплекс был преднамеренно отключён и не прекратил работу из-за полученных повреждений. Мы могли бы попытаться реактивировать ограниченную область, чтобы получить доступ к любой потенциально хранящейся информации в его хранилище данных."
 mem_planetophage.2.a:0 "Включить её."
 mem_planetophage.2.a.tt:0 "§RВы уверены?§!"
 mem_planetophage.2.b:0 "Оставить её в покое."
 mem_planetophage.5.name:0 "Это не космическая станция"
 mem_planetophage.5.desc:0 "Всего через несколько мгновений после реактивации энергоснабжения вся луна начала грохотать с нарастающей интенсивностью. Быстро стало ясно, что наше намерение активировать только ограниченную область потерпело неудачу. В огромной каскадной реакции секция за секцией реактивировалась. Когда наши учёные поняли, что происходит, было слишком поздно исправить их ошибки. Чтобы не стать жертвой обвалов из-за нестабильной внешней коры, они были вынуждены отступить.\n\nИз безопасности своего корабля они продолжали наблюдать, как весь мир оживает. Следующим потрясением было осознание, что эта гигантская машина не станция, а очевидно судно, поскольку оно уже начало покидать свою прежнюю орбиту. Подводя итог всей доступной информации, весьма вероятно, что эта машина ответственна за разрушение этой системы. И теперь она снова активна, благодаря нам..."
 mem_planetophage.110.name:0 "Переработчик планет"
 mem_planetophage.110.descbase:0 "Массивный объект вошёл в наше пространство. По мере его приближения несколько попыток установить коммуникации встретили тишину. Наши передовые наблюдатели описывают объект как блуждающую планету с способностью сознательно перемещаться. Он прибыл не из глубин космоса, а вошёл в нашу систему через точку разрыва гиперпространства. Сам объект больше напоминает космическую станцию или даже планету, чем космический корабль. Хотя именно это подразумевает его поведение. После короткой паузы, очевидно собирая данные о нашей системе, он взял курс на близлежащую планету. "
 mem_planetophage.110.desc.angry:0 "$mem_planetophage.110.descbase$Кажется, он не заинтересован в дипломатии и уже уничтожил суда, которые подошли слишком близко к нему."
 mem_planetophage.110.desc.neutral:0 "$mem_planetophage.110.descbase$Даже если он не кажется агрессивно преследующим любой флот, он всё равно будет защищаться от объектов, входящих в его близкую окрестность, как могут засвидетельствовать некоторые наши зонды."
 mem_planetophage.200.name:0 "Потерянный аппетит"
 mem_planetophage.200.desc:0 "Чем больше они есть, тем громче падают, и §YСтальная Пасть§! определённо была одной из самых больших. Ненасытная машина, кажется, потеряла свой аппетит к планетам, однако, после переживания насыщающего удара всем, что предложил наш флот. Мы не смогли полностью уничтожить этого монстра, но он, кажется, отключился сам, как бы признавая поражение.\n\nНекоторые наши инженеры предлагают перепрограммировать и зачислить его на нашу службу, в то время как другие призывают к более этичному подходу."
 mem_planetophage.200.a:0 "Отремонтировать и перепрограммировать!"
 mem_planetophage.200.b:0 "Планета есть планета..."
 mem_planetophage.200.b.tt:0 "§LОбломки становятся миром машин§!"
 mem_planetophage.200.c:0 "Переработать и изучить!"
 mem_planetophage.210.name:0 "Ненасытная машина"
 mem_planetophage.210.desc:0 "Наши техники и инженеры закончили свою работу и вернули §YСтальную Пасть§! в рабочее состояние. Они обнаружили следы вмешательства глубоко внутри основных систем машины. Они могут только строить предположения о том, почему кто-то пытался манипулировать принятием решений этого монстра, но это объясняет печальный конец его создателей. После того как наши техники восстановили его основную систему в то, что они предположили как её оригинальное состояние, они получили частичный контроль над Стальной Пастью. Небольшие улучшения логической очереди также были сделаны, которые больше не должны позволять ей нацеливаться на ценные планеты. Вместо этого это должно позволить нам превратить даже самый бесполезный камень планеты в огромное количество сырьевых материалов."
 mem_planetophage.210.a.tt:0 "§LСтальная Пасть становится нейтральной и больше не нацеливается на обитаемые миры§!"
