l_russian:

 mem_demon_ship_category:0 "Странные показания"
 mem_demon_ship_category_desc:0 "Первичное сканирование выдаёт необычные показания из верхних слоев атмосферы §Y[Root.GetName]§!. Команде учёных не терпится провести более точное повторное сканирование источника этих показаний."
 MEM_DEMON_SHIP_PROJECT:0 "Стабилизировать орбиту прототипа"
 MEM_DEMON_SHIP_PROJECT_DESC:0 "Наши учёные уверены, что состыковав исследовательский корабль с прототипом, им удастся исправить и стабилизировать его орбиту. Процесс включает в себя длительные расчёты и точное маневрирование. Они не нагружают вас деталями... но подчеркивают, что промежуток времени для проведения успешной операции ограничен."
 mem_demon_ship.103.desc:0 "Нашей команде учёных не удалось выяснить причину странных показаний. Мы никогда не узнаем было ли там что-нибудь, или же причиной стали неполадки сенсоров."
 mem_demon_ship.1.name:0 "Обнаружен потерянный корабль-прототип"
 mem_demon_ship.1.desc:0 "§Y[Root.leader.GetName]§! в восторге. После более тщательных сканов аномалия оказалась космическим кораблём. Интригующе, это один из наших. Наш экипаж опознаёт его как один из наших прототипов FTL-способных кораблей, считавшихся потерянными во время испытательного полёта несколько лет назад.\n\nЕго орбита нестабильна, и корабль медленно снижается в атмосферу. Кажется, он не повреждён, но показания энергии минимальны. Мы не получили ответа на наши приветствия.\n\nЧтобы иметь возможность дальше расследовать, что случилось с кораблём и его экипажем, его орбита должна быть сначала стабилизирована. [Root.leader.GetName] уже разработал план."
 mem_demon_ship.1.a:0 "Спасите часть нашей истории."
 mem_demon_ship.1.b:0 "Кого волнует какой-то старый корабль?"
 mem_demon_ship.2.name:0 "Орбита стабилизирована"
 mem_demon_ship.2.desc:0 "Оказалось немного сложнее, чем ожидал §Y[Root.leader.GetName]§!, но прототип теперь на стабильной орбите и готов к более тщательному осмотру. §Y[Root.GetName]§! начинает стыковку."
 mem_demon_ship.2.a:0 "Держите меня в курсе."
 mem_demon_ship.3.name:0 "Прототип потерян"
 mem_demon_ship.3.desc:0 "Нам не удалось стабилизировать орбиту корабля до того как он окончательно погрузился в атмосферу газового гиганта и был уничтожен."
 mem_demon_ship.4.name:0 "Срочное сообщение"
 mem_demon_ship.4.desc:0 "Срочное сообщение прибыло от учёного §Y[Root.leader.GetName]§!: Экипаж мёртв, их изуродованные трупы плавают по депрессуризованным секциям корабля. Так как в вакууме нет разложения, [root.leader.GetSheHe] может только гадать, как долго они мертвы.\n\nПока остаётся загадкой, почему нет атмосферы, так как корпус корабля кажется целым. Корабль, похоже, исчерпал энергию некоторое время назад. Потребуется время, прежде чем мы узнаем больше."
 mem_demon_ship.4.a:0 "Какой ужас"
 mem_demon_ship.5.name:0 "Мрачные открытия"
 mem_demon_ship.5.desc:0 "Все энергоячейки корабля были истощены и их пришлось заменить на запасные с §Y[Root.GetName]§! чтобы запустить хоть какие-то корабельные системы. Корабельный журнал отображает радостное поведение команды в предвкушении первого сверхсветового полёта, но вскоре после запуска сверхсветовых двигателей все записи обрываются. Трудно сказать сколько времени прошло до того как снова появились записи. Полёт завершился, и атмосфера на корабле полностью изменилась. Минуту назад улыбающиеся лица команды теперь искажены болью и отовсюду доносятся крики калечащих друг друга людей. Запись резко обрывается. Стоит ли нам продолжать расследование, или же лучше оставить мёртвых в покое?"
 mem_demon_ship.5.a:0 "Уничтожить корабль. Никто не должен знать, что мы нашли."
 mem_demon_ship.5.b:0 "Мы должны узнать причины трагедии."
 mem_demon_ship.6.name:0 "Прототип уничтожен"
 mem_demon_ship.6.desc:0 "§Y[Root.GetName]§! отстыковывается от прототипа и сталкивает его на прежнюю орбиту. Вскоре после этого, при вхождении в атмосферу, корабль поглощает пламя."
 mem_demon_ship.6.a:0 "Покойтесь с миром."
 mem_demon_ship.7.name:0 "Окончательный доклад"
 mem_demon_ship.7.desc:0 "Работая с сенсорными данными, записанными во время FTL-события, §Y[Root.leader.GetName]§! пришёл к выводу, что прототип и его экипаж покинули нашу плоскость существования и вошли в другое измерение, где наши естественные законы не применяются. Сильный психический стресс, должно быть, свёл экипаж с ума.\n\nВо время просмотра дополнительных данных чувство тёмного присутствия охватило научного сотрудника и [root.leader.GetHisHer] ассистентов. Они быстро извлекли ядро данных, чтобы забрать его с собой на §Y[Root.GetName]§!.\n\nСразу после возвращения на свой корабль наша научная команда зафиксировала всплеск энергии внутри FTL-ядра прототипа. Они инициировали процедуры экстренной расстыковки, которые едва успели завершить, прежде чем корабль исчез в пустоте. §Y[Root.leader.GetName]§! размышляет о возможности того, что сам корабль мог быть изменён странными пространственными энергиями.\n\nМожет быть, он жив? Мы можем никогда не узнать, но извлечённое ядро данных теперь может предоставить нам значительные данные о FTL-путешествиях."
 mem_demon_ship.7.a:0 "Наши знания умножаются!"
 mem_demon_ship.8.name:0 "Окончательный доклад"
 mem_demon_ship.8.desc:0 "Работая с сенсорными данными, записанными во время FTL-события, §Y[Root.leader.GetName]§! пришёл к выводу, что прототип и его экипаж покинули нашу плоскость существования и вошли в другое измерение, где наши естественные законы не применяются. Сильный психический стресс, должно быть, свёл экипаж с ума.\n\nВо время просмотра дополнительных данных [root.leader.GetSheHe] [root.leader.GetWasWere] прерван звуками экипажа, сражающегося и кричащего. Один из ассистентов учёного, по-видимому, сошёл с ума и пытался уничтожить §Y[Root.GetName]§!, бормоча бессвязно о том, как прототип требовал больше пассажиров, чтобы быть перемещёнными на 'Другую Сторону'. С большой удачей и ценой нескольких ранений, остальная часть команды смогла задержать его на борту научного корабля.\n\nПосле этого события [Root.leader.GetName] выбрал уничтожить прототип и всё, что он мог принести с собой с этой 'Другой Стороны', удалённо используя самоуничтожение корабля. Мы можем никогда не узнать, что именно случилось с кораблём и его экипажем, но наша научная команда жива, и коллега главного учёного на пути к выздоровлению."
 mem_demon_ship.8.a:0 "Трагедия предотвращена"
 mem_demon_ship.9.name:0 "Последняя передача"
 mem_demon_ship.9.desc:0 " Обрабатывая сенсорные показания, записанные во время сверхсветового полёта, команда учёных пришла к выводу, что прототип и его команда покинули это измерение и попали в другое, в котором не работали наши законы мироздания. Огромные психические нагрузки, должно быть, довели экипаж до сумасшествия. Поток исследовательских данных в конце сменяется видеозаписью. Главный учёный стоит перед камерой, держа в руках собственные глаза, и произносит тихим голосом: \"Теперь мы идём на Другую Сторону.\" Вопли исследовательской команды доносятся из корабля перед завершением передачи. Спасательные команды, отправленные на поиски научного корабля, ничего не нашли..."
 mem_demon_ship.9.a:0 "Ужасно"
 mem_demon_ship.9.a.tooltip:0 "Исследовательский корабль и команда потеряны"
