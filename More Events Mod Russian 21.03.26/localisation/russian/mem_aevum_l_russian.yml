l_russian:

 mem_aevumd.40520.name:0 "Всё здесь в процессе разработки"
 mem_aevumd.40520.desc:0 "Самопровозглашённый бог, манипулирующий потоком времени и стареющий в обратном направлении. Он будет использовать свои силы в определённой степени, чтобы помочь вам. Однако его манипуляции обходятся ценой его жизненного времени. Это означает, что он теряет часть здоровья за каждую манипуляцию. Его империя будет отвечать за поддержание его в зрелом и здоровом состоянии."
 mem_aevumd.40520.a:0 "Что у тебя с бородой?"
 NAME_mem_aevum_time_lord:0 "Хрономант Аэвум"
 mem_aevum_color:0 "§Y§!"
 spawn_mem_aevum:0 "Призвать $NAME_mem_aevum_time_lord$ "
 mem_aevum_time_lord_catchphrase:0 "Время относительно, Прошлое не окончено, а Будущее уже разворачивается. Только завтра знает, что будет."
 mem_aevum_time_lord_backstory:0 "Когда-то учёный, теперь самопровозглашённый бог. Как единственный выживший с Наблюдательной Станции 37, он обрёл хрономатические способности. Даже если ему нравится играть в Бога, он так же смертен, как и любой, кто страдает от его болезни."
 mem_aevum_allowed:0 "§G$NAME_mem_aevum_time_lord$ разрешён§!"
 mem_aevum_disabled:0 "§R$NAME_mem_aevum_time_lord$ отключён§!"
 spawn_mem_aevum:0 "Призвать $NAME_mem_aevum_time_lord$ "
 mem_aevum_tooltip:0 "- Призвать систему $mem_aevum_system$\n- Быть первым игроком, исследовавшим её\n- Встретить $NAME_mem_aevum_time_lord$ и выполнять его приказы... или нет\n- Так или иначе получить доступ к меню хрономантии\n- Использовать эти способности, чтобы формировать настоящее"
 mem_aevum_building_temple:0 "Вечный Храм"
 mem_aevum_building_temple_desc:0 "Построен на века. Когда-то просьба $NAME_mem_aevum_time_lord$, теперь превратившаяся в место для предвидения и экономического планирования."
 mem_aevum_mega_chronomancer_palace:0 "$mem_aevum_building_temple$"
 mem_aevum_mega_chronomancer_palace_DESC:0 "$mem_aevum_building_temple_desc$"
 mem_aevum_mega_chronomancer_palace_MEGASTRUCTURE_DETAILS:0 "Обнаруживает залежи £sr_zro£ размером от §Y1§! до §Y3§! на каждом небесном объекте в системе\nПокрывает всю систему временными аномалиями, подобными системе §YСтазис§!"
 mem_aevum_invade_thisguy_title:0 "Вторгнуться на §Y[mem_aevum_primitive_rewind_world.GetName]§!"
 mem_aevum_invade_thisguy_desc:0 "Его время истекло. Мы напомним ему о его смертности. Вторгнитесь на [mem_aevum_primitive_rewind_world.GetName] и доставьте §Y$NAME_mem_aevum_time_lord$§! живым или мёртвым. "
 mem_aevum_decoded_messages_chain_title:0 "Происхождение §Y$NAME_mem_aevum_time_lord$§!"
 mem_aevum_decoded_messages_chain_desc:0 "Мы нашли несколько искажённых сообщений в системе §Y[mem_aevum_primitive_rewind_world.System.GetName]§!. Они похожи на передачи, потерянные во временных аномалиях. Мы должны восстановить то, что можем, и узнать о происхождении этой системы."
 mem_aevum_decoded_messages: "Изучено аномалий"
 mem_aevum_decoded_messages2: "Расшифровано сообщений"
 mem_aevum_decoded_messages3: "Временные колебания устранены"
 mem_aevum_decoded_messages4: "Передачи прерваны"
 mem_aevum_findsystem_title:0 "Войти в систему §Y[mem_aevum_primitive_rewind_world.System.GetName]§!"
 mem_aevum_findsystem_desc:0 "Похоже, мы попали в временную аномалию. Мы должны собрать столько знаний, сколько сможем."
 r_mem_aevum_houglass:0 "Кристаллические песочные часы"
 r_mem_aevum_houglass_desc:0 "Сотканы из самого времени. Каждая песчинка — мерцающий кристалл. Каскадом стекают в узкие объятия. Забытые солнца, утраченные цивилизации и ясные видения...\n\n$r_mem_aevum_houglass$ видели всё и ничто. Прошлое и будущее вечно связаны их кругами."
 mem_aevum_revivetimelord:0 "Отменить своевременную смерть §Y$NAME_mem_aevum_time_lord$§!"
 mem_aevum_sit_wait_20years:0 "Отложенное удовлетворение "
 mem_aevum_sit_wait_20years_type:0 "Трата времени"
 mem_aevum_sit_wait_20years_desc:0 "§Y$NAME_mem_aevum_time_lord$§! попросил нас подождать 20 лет. Хотя мы не знаем, чего ждём, мы точно знаем, что он испытывает наше терпение."
 mem_aevum_sit_wait_20years_monthly_change_tooltip:0 "Трата времени"
 mem_aevum_hmm_okletswait:0 "Мы больше не будем ждать."
 mem_aevum_letswait_approach:0 "Ждать"
 mem_aevum_sc_t:0 "$sc_t$"
 mem_aevum_system:0 "Стазис"
 mem_aevum_make_lightshow:0 "Развлечь §Y$NAME_mem_aevum_time_lord$§!"
 mem_aevum_make_lightshow_DESC:0 "Мы должны устроить зрелище для §Y$NAME_mem_aevum_time_lord$§!. Что бы это ни значило...\n\nПопробуйте сжечь немного химикатов и запустить лазеры на орбите §Y[mem_aevum_primitive_rewind_world.GetName]§!."
 mem_aevum_invade_thisguy:0 "Вторгнуться на §Y[mem_aevum_primitive_rewind_world.GetName]§!"
 mem_aevum_decode_message:0 "Изучить сообщение"
 mem_aevum_cursedworld:0 "Замороженные во времени"
 mem_aevum_buildtemple_title:0 "Построить Храм $NAME_mem_aevum_time_lord$"
 mem_aevum_buildtemple_desc:0 "Последнее из его испытаний. Надеюсь. Давайте построим килоструктуру — храм — для §Y$NAME_mem_aevum_time_lord$§!."
 mem_aevum_stage1:0 "Ожидание"
 mem_aevum_stage2:0 "Больше ожидания"
 mem_aevum.1.name:0 "Вторая встреча?"
 mem_aevum.1.desc:0 "Ах, обитатели эпохи, в присутствии Аэвума, самой сути времени, вы стоите здесь снова.\n\nКакие вопросы хранят циклические существа в рамках своего мимолётного существования? Говорите, и пусть эхо ваших недолговечных желаний отзовётся в нашем разговоре.\n\nЯ дарую вам задание, обитатель эпохи. Осветите небеса моего царства, §Y[mem_aevum_primitive_rewind_world.GetName]§!, явите миру меру ваших возможностей.\n\nПусть сияние ваших усилий пронзит тени, что пляшут в гобелене моего мира!"
 mem_aevum.1.a:0 "Кто ты?"
 mem_aevum.1.a.response:0 "Я §Y$NAME_mem_aevum_time_lord$§!, бог. Бессмертный, течение времени ускользает от моей хватки, как тени танцуют в завуалированных шёпотах вечности."
 mem_aevum.1.b:0 "Мы уже встречались?"
 mem_aevum.1.b.response:0 "Мы уже говорили в эхо прошлого и мельком видели будущее вместе, которому не суждено было родиться. Настоящее — лишь отражение, выравнивающееся с симфонией, сотканной судьбой. Сомневаться в этом — значит сопротивляться космическому объятию.\n\n§LЕго глаза блуждают, и необъяснимым образом, кажется, отражают определённую чёрную дыру§!\n\nОднажды один весьма нецивилизованный сказал мне: Что было, то будет. Интригует, не правда ли?"
 mem_aevum.1.c:0 "Ты знаешь что-нибудь о §Y[mem_aevum_primitive_rewind_world.System.GetName]§!?"
 mem_aevum.1.c.response:0 "Оно отражает мою силу. Это мой дом, сформированный сухожилием моего существования, чтобы отражать всё, что я есть.\n\nЯ, ткач эпох, создал его, чтобы убаюкать безграничные эхо моего бытия."
 mem_aevum.1.d:0 "Хорошо, мы выполним твоё веление."
 mem_aevum.1.e:0 "Чепуха. Приготовься к вторжению!"
 mem_aevum.2.name:0 "Мало времени"
 mem_aevum.2.desc:0 "Система §Y[mem_aevum_primitive_rewind_world.System.GetName]§! испытывает серьёзные пространственные и временные аномалии.\n\nВремя замедлилось до ползания. Каждый корабль или существо, входящее в систему, будет замедлено в ~9 раз. Даже сообщения с [this.GetName] задерживаются и должны быть реконструированы после выхода из системы.\n\nМы не уверены, что может вызвать такие аномалии. "
 STRANGE:0 "Странно"
 mem_aevum.5.name:0 "Третья встреча"
 mem_aevum.5.desc:0 "Ха-ха, отлично сработано, скованный временем.\n\nДействительно, вы сплели развлечение и красоту. Удивительно, что такие примитивные технологии могут сотворить на моём ночном небе.\n\nА теперь, обитель эпохи, приготовься к моей следующей шёпотной воле. "
 mem_aevum.5.a:0 "Как насчёт награды?"
 mem_aevum.5.a.response:0 "Ах, обитель эпохи, пойми, время блуждает по лабиринтным путям.\n\nЯ не отрицаю и не желаю отрицать твою хрупкую просьбу, но момент для моего действия ещё не развернулся."
 mem_aevum.5.b:0 "Почему ты живёшь среди примитивных?"
 mem_aevum.5.b.response:0 "Примитивные, как ты их называешь, могут создать оковы завтрашнего владычества.\n\nИли ты сам впутаешь их в паутину своего господства первым?\n\nСуждение — мимолётный всплеск в потоках времени. Для меня все циклические существа несут неразличимый сходный облик.\n\n§LОн делает паузу, чтобы его слова осели, прежде чем продолжить...§!\n\nТебе может быть не по вкусу, но они отражают эхо твоего прошлого я. Скоро они будут летать по небесам и странствовать по небосводу, как твоё настоящее я."
 mem_aevum.5.d:0 "Что ты хочешь, чтобы мы сделали дальше?"
 mem_aevum.4.name:0 "$mem_aevum.5.name$"
 mem_aevum.4.desc:0 "Этот твой дух радует меня, обитель эпохи.\n\nПока твой единственный указ — обнять терпение. Пусть пески §Y20 лет§! просеются через песочные часы, прежде чем наши судьбы снова сплетутся."
 mem_aevum.4.b:0 "У твоего вида должна быть борода?"
 mem_aevum.4.b.response:0 "Служила ли твоя судьба небесным сферам, что ты называешь космосом? Было ли тебе суждено парить среди звёзд? Был ли твой вид рождён, чтобы выдержать космическое пространство?\n\n§LОн ждёт момент, его лицо наполнено гневом на грубое оскорбление. Его руки вытянуты. Мастерски репетированный спектакль, чтобы подчеркнуть его слова§!\n\nИ всё же, перед лицом этой космической реальности, ты беспокоишься о существовании моей бороды?!?"
 mem_aevum.4.a:0 "Хорошо, давайте подождём."
 mem_aevum.4.d:0 "У нас нет на это времени. Приготовьтесь к вторжению."
 mem_aevum.7.name:0 "Проклятие поверженного Хрономанта"
 mem_aevum.7.desc:0 "О обитатели эпохи, какой смелый, но глупый поступок вы совершили.\n\nЗа ваши варварские деяния я одарю вас своим прощальным даром.\n\n§LКогда он говорит, время вокруг планеты начинает течь с молниеносной скоростью. Кажется, он высасывает потоки из системы. Вторгающиеся армии постепенно начинают паниковать перед лицом гнева бога.§!\n\nПусть это запечатлеется в вашем сознании, обитатели эпохи, что этот путь был проложен вашими собственными руками. Встретьте последствия.\n\n§LСирены начинают эхом раздаваться на [Root.Capital.GetName], когда его проклятие достигает полной силы.§!"
 mem_aevum.7.a:0 "И это всё?"
 mem_aevum.9.name:0 "Интерлюдия"
 mem_aevum.9.desc:0 "Я хвалю твоё терпение, однако, с глубочайшим сожалением, я должен сообщить, что судьба, безжалостный арбитр, возложила испытание на наш предназначенный саммит.\n\nТвои хрупкие 20 лет недостаточны, чтобы удовлетворить требуемый мной срок. Давай встретимся посередине, как насчёт?\n\nЯ §Yсброшу твой прогресс на 5 лет§!, и мы сойдёмся в результате."
 mem_aevum.9.a:0 "Хорошо"
 mem_aevum.9.b:0 "Довольно. Вторгнуться на §Y[mem_aevum_primitive_rewind_world.GetName]§!"
 mem_aevum.10.name:0 "Четвёртая встреча"
 mem_aevum.10.desc:0 "Поздравляю тебя, обитель эпохи. Даже перед лицом печально известных капризов судьбы ты достиг того, чего я желал.\n\nОтдохни немного, если пожелаешь, или жажди следующего испытания. Не бойся, твоя награда уже близка.\n\n§LОн, кажется, доволен. С яркой улыбкой и ожидающими глазами он встречает твоё усталое выражение...§!\n\nА теперь, как последнее усилие, свидетельство моего божественного удовольствия...\n\nПострой для меня храм, пусть он станет вершиной твоих архитектурных достижений. Воздави мне величием твоего высшего творения."
 mem_aevum.10.a:0 "Хорошо. Давайте начнём строительство."
 mem_aevum.11.name:0 "Последняя встреча"
 mem_aevum.11.desc:0 "Да, отлично сработано. Гордись своими достижениями.\n\nТы спрашиваешь: Какова наша награда за такое великое терпение и усилие?\n\nЭто просто, обитель эпохи, в самом деле! Бог благословит твои владения. §YЯ, $NAME_mem_aevum_time_lord$, присоединюсь к твоей империи.§!\n\nЧувствуй свободу поклоняться моему присутствию на протяжении смены времён года."
 mem_aevum_decode_message_DESC:0 "Как сообщение в бутылке\n\nЭти сообщения были разбросаны по всей системе §YСтазис§!. Наши учёные считают, что мы можем собрать их воедино одно за другим. С правильным порядком сообщений это должно быть простой задачей. Некоторые сравнивали это с развязыванием узла."
 mem_aevum.11.a:0 "Что ты можешь предложить нам?"
 mem_aevum.11.a.response:0 "О, юное создание, прекрати вопросы о том, что я могу предложить твоему царству.\n\nВместо этого, обдумай, какие дары ты представишь богу. Твои испытания, свидетельство достоинства, подходят к концу. Обними кульминацию, предайся силе, дарованной тебе. Зачем сомневаться в том, что превосходит твоё юное течение?\n\n§HОн делает паузу, чтобы подумать. После момента глубокого размышления он продолжает.§!\n\nПозволь мне раскрыть гобелен моих возможностей. Ты когда-нибудь задумывался об оружейном использовании времени, об искусстве задерживать врагов, ускорять экономический поток или ускорять строительство великих сооружений?"
 mem_aevum.11.b:0 "Что случилось с существом, которое уничтожило Наблюдательную Станцию 37?"
 mem_aevum.11.b.response:0 "Я размышлял над загадкой событий, потерянных в потоках времени, и, кажется, ты раскопал фрагмент головоломки.\n\nПозволь пролить свет. Существо, известное примитивным как 'Вуми', выбрало эту систему своим периодическим гробом, возвращаясь на грань смерти каждые несколько лет. Я могу подтвердить, что это одно и то же существо, пойманное в циклический танец гибели.\n\nОднако любопытный поворот судьбы развернулся несколько сотен лет назад, и ритуальное умирание прекратилось. Ни примитивные, ни я не держим ключа к тайне, что развернулась в тенях того давнего времени.\n\n§HОн ухмыляется...§!\nМожно сказать, время покажет."
 mem_aevum.11.c:0 "Почему тебя никогда не эвакуировали?"
 mem_aevum.11.c.response:0 "Ты затронул болезненную струну, обитель эпохи.\n\nКак бы это ни было больно, я подозреваю, что мои сообщения так и не нашли пути домой. Потерянные в этой системе, эхо бесконечно отражаются туда-сюда, плач, исполняемый вечными коридорами. Ничего больше, чем насмешка, жестокая шутка, сыгранная космическими силами на сцене моего существования.\n\nСудьба меня и моего экипажа теперь окутана завесами твоего знания в одиночестве."
 mem_aevum.11.d:0 "Ты не бог, не так ли?"
 mem_aevum.11.d.response:0 "§HДолгая пауза, вероятно, самая долгая, что он когда-либо делал, подпитывает растущее ожидание.§!\n\nЧего ты ожидаешь, чтобы я сказал? Да и нет, оба завуалированы во лжи.\n\nЯ не питаю иллюзий, что ты сможешь понять границы моей силы. Пойми это: никакой бог, по сути, не безграничен.\n\nТы родился богом, или поток времени даровал тебе титул?\n\nНа протяжении тысячелетий моя сила превосходила твоё эпохально ограниченное понимание, и всё же остаётся ограниченной. В глазах примитивных ты и я — божества, каждый обладающий богоподобными способностями.\n\nНе отсутствие ограничений определяет богодержавие, но проявление того, чего можно достичь. В эту эпоху я — бог, до дня, когда я им больше не буду."
 mem_aevum.16.name:0 "Журнал капитана: День 1276"
 mem_aevum.16.desc:0 "Наконец, я заставил эту штуку снова работать. Пусть даже только для одного последнего сообщения. Подтверждаю: Это будет моя последняя запись. После нашей эвакуации с наблюдательной станции наши спасательные капсулы прошли мимо нескольких аномалий. Один член экипажа помолодел до небытия, другой быстро состарился, погибнув от старости в считанные мгновения.\n\nТолько трое из нас добрались до поверхности. Большая часть нашего продовольствия испортилась. Наш единственный выбор — продолжить путь до ближайшего примитивного города и искать еду и убежище. К чёрту главную директиву! Я не мог позволить своему экипажу умереть так.\n\n§LНебольшой вздох вырывается из него на записи.§!\n\nНам удалось войти в город. Не как пришельцев нас встретили, но как мессий. Они поверили, что мы — посланники бога. Каким-то образом наши облики уже были высечены на нескольких стенах.\n\nВ последующем году Шлэй и Дирко погибли. Шлэй заразился смертельной инфекцией. Дирко был растерзан до смерти группой еретиков после злоупотребления своей новой ролью. Какой позорный конец... Я, однако, остаюсь. С какой целью? Кто знает... \n§LДолгая пауза...§!\n\nКто бы ни нашёл это сообщение, скажи нашим родным ожидать нас мёртвыми.\n\n- Аэвум Т. Дорни — Единственный выживший Наблюдательной Станции 37 "
 mem_aevum.16.a:0 "Трагично"
 mem_aevum.16.b:0 "Давай спросим его."
 mem_aevum.13.name:0 "Журнал капитана: День 437"
 mem_aevum.13.desc:0 "Последний год мы не наблюдали никаких аномалий среди примитивных. Они, кажется, не осознают нашего присутствия. Мы уверены, что они поклоняются какому-то богу.\n\nЯ и экипаж не уверены, найдём ли мы когда-нибудь то, что или кто разрушило время таким образом в системе §Y[mem_aevum_primitive_rewind_world.System.GetName]§!. Мы остаёмся оптимистами и надеемся, несмотря на все шансы, раскрыть корни этой тайны.\n\n- Аэвум Т. Дорни — Капитан и ведущий учёный Наблюдательной Станции 37 "
 mem_aevum.13.a:0 "Интересно"
 mem_aevum.14.name:0 "Журнал капитана: День 576"
 mem_aevum.14.desc:0 "Массивный объект прибыл в систему.\n\n§LВ фоне слышны сирены. В его голосе заметна едва сдерживаемая паника.§!\n\nЕго размер где-то между крупным астероидом и меньшей планетоидом. Гипердвигатель не был обнаружен. Точка входа была слишком близко к звезде, чтобы быть нормальным прыжком. Что бы это ни было, время вокруг него даёт сбои. Некоторые временные аномалии разрушили наши бортовые системы, оставив только камни и редкоземельные элементы.\n\n- Аэвум Т. Дорни — Капитан и ведущий учёный Наблюдательной Станции 37 "
 mem_aevum.14.a:0 "Увлекательно"
 mem_aevum.15.name:0 "Журнал капитана: День 579"
 mem_aevum.15.desc:0 "После трёх дней тщетных попыток восстановить хотя бы базовую функциональность, мы должны были эвакуироваться на поверхность §Y[mem_aevum_primitive_rewind_world.GetName]§!. Мы понесли потери, Джефф и Куалтрек. Пожалуйста, сообщите их семьям, что оба погибли, спасая остальных из нас и служа своей империи.\n\n§LСлышен треск падающих обломков.§!\n\nНам требуется срочная эвакуация. Наша ситуация отчаянная. Повторяю, эвакуация — наш единственный выбор.\n\n- Аэвум Т. Дорни — Капитан и ведущий учёный Наблюдательной Станции 37 "
 mem_aevum.15.a:0 "Тревожно"
 mem_aevum.17.name:0 "Сигналы, потерянные во времени"
 mem_aevum.17.desc:0 "Мы нашли несколько сообщений, которые, кажется, застряли во временной петле. Мы обнаружили первое и готовы его расшифровать. Что нам делать?"
 mem_aevum.17.a:0 "Давайте начнём расшифровку."
 mem_aevum.17.b:0 "Не интересует."
 mem_aevum.18.name:0 "Интерлюдия"
 mem_aevum.18.desc:0 "Требования — мимолётные эхо. Желания — неуловимые тени. Наши судьбы сплетаются вновь. Почему, обитатели этой эпохи, наши пути встречаются так скоро снова?"
 mem_aevum.18.a:0 "Может, нам не стоит спрашивать."
 mem_aevum.18.c:0 "Ничего, божественное создание."
 mem_aevum.19.name:0 "Посланник будущего"
 mem_aevum.19.desc:0 "Сэр, мы нашли §Y$NAME_mem_aevum_time_lord$§! в системе §Y[mem_aevum_primitive_rewind_world.System.GetName]§!. Он, казалось, не замечал нашего присутствия. Миссия полностью успешна."
 mem_aevum.19.a:0 "Кто ты?"
 mem_aevum.19.a.response:0 "Я [mem_aevum_future_leader.GetName]. Учёный и исследователь."
 mem_aevum.19.b:0 "Какова была твоя миссия?"
 mem_aevum.19.b.response:0 "Наблюдать за существом, известным как §Y$NAME_mem_aevum_time_lord$§!. "
 mem_aevum.19.c:0 "[mem_aevum_future_leader.GetName] уже служит."
 mem_aevum.19.c.response:0 "Да... Я здесь, на моём корабле, на действительной службе, не так ли?"
 mem_aevum.19.d:0 "Ты выглядишь старше."
 mem_aevum.19.d.response:0 "Система §Y[mem_aevum_primitive_rewind_world.System.GetName]§! действует загадочными путями."
 mem_aevum.19.welcomeback:0 "Добро пожаловать в прошлое!"
 mem_aevum.20.name:0 "Новый цикл"
 mem_aevum.20.desc:0 "10 лет назад учёный, отправленный наблюдать систему §Y[mem_aevum_primitive_rewind_world.System.GetName]§!, вернулся в прошлое. Мы должны рассмотреть возможность сделать то же самое, что и нашё другое будущее я. Другой вариант — посмотреть, что произойдёт, если история не повторится. Выбор за вами."
 mem_aevum.20.a:0 "Завершить цикл."
 mem_aevum.20.tt:0 "Отправить [mem_aevum_future_leader2.GetName] в прошлое."
 mem_aevum.20.b:0 "Проигнорировать цикл."
 mem_aevum.21.name:0 "Неопознанная спасательная капсула"
 mem_aevum.21.desc:0 "Неопознанный объект приближается к нашей домашней системе. Это похоже на одну из наших специально разработанных спасательных капсул научных кораблей. Мы не смогли её идентифицировать. Капсула несёт эмблему одного из наших действующих учёных."
 mem_aevum.21.a:0 "Открыть канал."
 mem_aevum.21.b:0 "Разнести в клочья!"
 mem_aevum_leader_2young_tt:0 "£trigger_no£ §Y$NAME_mem_aevum_time_lord$§! слишком молод!"
 mem_aevum_chronomancer_on_cooldown:0 "§Y$NAME_mem_aevum_time_lord$§! отдыхает."
 mem_aevum_speed_building:0 "$mem_aevum_button1_title$"
 mem_aevum_speed_building_decision:0 "$mem_aevum_button4_title$"
 mem_aevum_button2_deage_all_tt:0 "Каждый лидер:\n   Бессмертные: §G+300§! Опыт\n   Смертные — Возраст: §G-30§! Лет\n "
 mem_aevum_button2_deage_all_tt_except_aevum: "На каждого принадлежащего смертного лидера:  §Y$NAME_mem_aevum_time_lord$§!: §G+10§! Лет"
 mem_aevum_button4_speed_production_decision:0 "Разблокирует решение $mem_aevum_button4_title$, дающее:\nСодержание pops: §R+150%§!\nРесурсы от pops: §G+200%§!\n на 10 лет"
 mem_aevum_alreadyfutureproof_tt:0 "£trigger_no£ Нам не стоит отправлять больше людей в будущее. Первый раз уже был достаточно глупым."
 mem_aevum_button5_future_war_tt:0 "Отправить §R10% нашего населения§! в будущее. В следующий раз, когда мы §Yвступим в войну§!, они прибудут с §Yготовым флотом§!"
 mem_aevum_button6_freeze_enemies:0 "Все империи, воюющие с нами или соперничающие:\nДобавлен модификатор §Y$mem_aevum_ship_frozen$§! на §Y3§! месяца:\nСнижение скорости кораблей: §R+90%§!\nСкорострельность кораблей: §R-50%§!"
 mem_aevum_ship_frozen:0 "Проклятие Хрономанта"
 mem_aevum_button8_removecooldown_tt:0 "§YСледующие 2 реликвии§!, которые применили бы модификатор $relic_activation_cooldown$, не применят его."
 mem_aevum_speed_building_desc:0 "Наше местное производство усилено манипуляциями §Y$NAME_mem_aevum_time_lord$§!."
 mem_aevum_speed_production_mod:0 "Производство на любой%"
 mem_aevum_hourglass_tick_title:0 "$r_mem_aevum_houglass$ даруют возраст!"
 mem_aevum_future_fleet_arrived_title:0 "Флоты из прошлого прибыли"
 mem_aevum_chronomancer_on_cooldown_tt:0 "$mem_aevum_chronomancer_on_cooldown$"
 mem_aevum_leader_trait_legendary_timeskipper:0 "Временная болезнь"
 mem_aevum_leader_trait_legendary_timeskipper_desc:0 "Его разум запутался на эоны, его тело старело и молодело бесчисленное количество раз. §Y$NAME_mem_aevum_time_lord$§! имел достаточно времени, чтобы сожалеть, забыть и повторить. Его время — не более чем волны, неоднократно разбивающиеся о берега его судьбы."
 mem_aevum_trait_scaleswithage:0 "\n§YЭтот§! §CЛидер:§!\n    Возраст в год: §R-1§! §Y(Может состариться до небытия)§!\n    §YДополнительные эффекты§! разблокируются с возрастом\n    §YДополнительный объём бороды§! разблокируется с возрастом"
 mem_aevum_trait_houtglass_access:0 "§YПолучить доступ к Хрономантии через активный эффект $r_mem_aevum_houglass$§!"
 lmao:0 "лол?"
 mem_aevum.105.name:0 "Украденная собственность"
 mem_aevum.105.desc:0 "Аплодирую твоему приобретению, однако, к сожалению, я должен забрать то, что по праву принадлежит мне. Однако я предоставлю небольшую компенсацию."
 mem_aevum.105.a:0 "Что?"
 mem_aevum.104.name:0 "Потерянное и найденное"
 mem_aevum.104.desc:0 "Ты ступаешь на опасную почву, обитель эпохи. Опека того, что принадлежит мне, требует большей бдительности. Позволить моему сокровищу быть украденным в таком варварском акте поистине непростительно."
 mem_aevum.104.a:0 "Хорошо"
 mem_aevum.106.name:0 "Своевременная смерть"
 mem_aevum.106.desc:0 "Со смертью этого персонажа нить пророчества разорвана. Восстановите сохранённую игру, чтобы восстановить ткань судьбы, или продолжайте в обречённом мире, который вы создали."
 mem_aevum.106.a:0 "Увлекательно"
 mem_aevum_future_fleet_arrived_loc:0 "Флот из прошлого прибыл"
 MOD_mem_aevum_TITLE:0 "Хрономантия"
 mem_aevum_desc_text:0 "веди меня"
 mem_aevum_button1_title:0 "§PХроно-оптимизация верфей§!"
 mem_aevum_button2_title:0 "§PПоглощение жизни лидеров§!"
 mem_aevum_button3_title:0 "§PСвоевременные исследования§!"
 mem_aevum_button4_title:0 "§PПланетарная фазо-оптимизация§!"
 mem_aevum_button5_title:0 "§PЗавтрашняя война§!"
 mem_aevum_button6_title:0 "§PМеждународная временная дилатация§!"
 mem_aevum_button7_title:0 "§PАрхитектурный сократитель интервалов§!"
 mem_aevum_button8_title:0 "§PПропуск реликвий§!"
 mem_aevum_stage1_AnteCogitationem:0 "§YAnte Cogitationem§!"
 mem_aevum_stage2_Cogitatio:0 "§YCogitatio§!"
 mem_aevum_stage3_Paratio:0 "§YParatio§!"
 mem_aevum_stage4_Actio:0 "§YActio§!"
 mem_aevum_stage5_Manutentio:0 "§YManutentio§!"
 mem_aevum_opencastmenu:0 "§YОткрыть окно Хрономантии§!"
 mem_aevum_deadfr_tt:0 "§R$NAME_mem_aevum_time_lord$ мёртв, и мы убили его§!"
 mem_aevum_slowgrowing:0 "Хроно-взрыв роста"
 mem_aevum_speedgrowing:0 "Хроно-имплозия роста"
 mem_aevum_blessedworld:0 "Хроно-благословение"
 mem_aevum_leader_trait_legendary_houtglasskeeper:0 "Хранитель $r_mem_aevum_houglass$"
 mem_aevum_leader_trait_legendary_houtglasskeeper_desc:0 "Созданные из чужеродных частей $r_mem_aevum_houglass$ были изготовлены с одной целью: канализация сырых хрономатических энергий, полученных $NAME_mem_aevum_time_lord$ во время инцидента с Вуми."
 mem_aevum_trait_houtglass_access:0 "§YПолучить доступ к Хрономантии через активный эффект $r_mem_aevum_houglass$§!"
 mem_aevum_thisisugly:0 "§OНа это ушло несколько часов и 30% моего времени на мод.\n... Наслаждайтесь.§!"
 mem_aevum.110.name:0 "Своевременная кончина"
 mem_aevum.110.desc:0 "О, вы, не в силах выдержать вес собственных неудач, вернулись ко мне. Последствия вашего выбора эхом отдаются в тенях вашего возвращения."
 mem_aevum.110.a:0 "Усыновить его."
 mem_aevum.115.name:0 "Пропуск эпохи"
 mem_aevum.115.desc:0 "Желаю сообщить тебе, обитель эпохи, что временами я размышляю о понятии быстрых скачков через гобелен времени. Тогда, откровение поражает — такая сила в моих руках. Позволь мне применить быстрые скачки на [planet_governed.GetName]. Будь уверен, дивиденды этих экспериментов окажутся весьма выгодными."
 mem_aevum.115.a:0 "Конечно."
 mem_aevum.115.b:0 "Нет."
 mem_aevum.115.c:0 "Хотя бы прыгни вперёд."
 mem_aevum.116.name:0 "Пропуск поколения"
 mem_aevum.116.desc:0 "Желаю поставить тебя в известность, обитель эпохи, что мой разум забрёл в размышления. Связана ли жизнь с оковами времени, или она превосходит такую тривиальную линейность? Позволь мне проверить мою гипотезу. Практический эксперимент на [planet_governed.GetName] не должен сильно беспокоить общественную жизнь, а полученные знания могут оказаться поучительными."
 mem_aevum.116.a:0 "Конечно."
 mem_aevum.116.b:0 "Нет."
 mem_aevum.116.c:0 "Хотя бы прыгни вперёд."
 mem_aevum.117.name:0 "Пропуск мегасооружения"
 mem_aevum.117.desc:0 "О, скованный временем, наблюдай за чудесами, что ты сотворил. Такое вдохновение заслуживает моего благословения. Я лишь прошу временную задержку в строительстве [mem_aevum_nomegaforu.GetName], паузу, чтобы смаковать величие твоего творения. Предоставишь ли ты мне эту возможность?"
 mem_aevum.117.a:0 "Безусловно."
 mem_aevum.117.b:0 "Нет."
 mem_aevum.118.name:0 "Пропуск ситуации"
 mem_aevum.118.desc:0 "О, созерцай прогресс, что ты достиг на [mem_aevum_situationlmao.GetName]. Конечно, ты не возражаешь против моего навязывания воли этой ситуации. Я представлю простое решение: скачок назад или вперёд, без места для среднего."
 mem_aevum.118.a:0 "Вперёд."
 mem_aevum.118.b:0 "Назад."
 mem_aevum.119.name:0 "Пропуск реликвии"
 mem_aevum.119.desc:0 "Устал ждать, не так ли, обитель эпохи?\n\n§LОн, кажется, в хорошем настроении сегодня...§!\n\nОчень хорошо. Позволь мне снять это утомительное бремя с твоих плеч. Да текут пески твоего времени нежно, невозмущённо.\n\n§LНеясно, о чём именно он говорит, он завершает своё предложение...§!"
 mem_aevum.119.a:0 "Вперёд"
 mem_aevum.119.b:0 "Лучше не надо"
 mem_aevum.114.name:0 "Пропуск лидера"
 mem_aevum.114.desc:0 "Это неловкое признание, но я ищу твоего суждения. Я разгневался после того, как [mem_aevum_bullyhim.getName] осмелился напасть на меня, словесно, конечно. [mem_aevum_bullyhim.GetSheHeCap] поистине не знает своего места. Пока я обдумываю наказание за такое легкомысленное предательство, я склоняюсь к быстрому старению [mem_aevum_bullyhim.getHerHis]. Однако, учитывая наши дружеские отношения, я передаю решение тебе"
 mem_aevum.114.a:0 "Поступи по-своему."
 mem_aevum.114.b:0 "Нет."
 mem_aevum_leader_noenemies_or_rivals:0 "£trigger_no£ §YУ нас нет врагов, чтобы проклясть§!"
 mem_aevum_speed_building_decision_desc:0 "Поток времени на этой планете был массово ускорён, что привело к высоким темпам производства и потребления"
 mem_aevum_spinny_boi:0 "Каждые §Y10 лет§! §Y$r_mem_aevum_houglass$§! вращаются, меняя свой пассивный эффект."
 NAME_mem_aevum_time_lord_hologram:0 "Зашифрованная голографическая запись"
 mem_aevum_unlock_chronopalace:0 "Чертежи $mem_aevum_building_temple$"
 mem_aevum_unlock_chronopalace_desc:0 "Сложная структура, кажется, имеет 3 вращающихся элемента. Её не должно быть слишком сложно воспроизвести. Тем не менее, что-то в этом сооружении кажется вневременным и неестественным."
 mem_aevum_confused_leadership:0 "Сбитое с толку руководство"
 mem_aevum_empty_appraoch:0 ""
 mem_aevum_letswait_approach2:0 "Бездействие"
 mem_aevum_unlock_chronopalace_tt:0 "§HРазблокирует мегасооружение:§! $mem_aevum_building_temple$"
 mem_aevum_trait_getsagefromrelics:0 "\n§YЭтот§! §CЛидер:§!\n    При активации реликвии: §G+50§! Лет\n    При получении реликвии: §G+50§! Лет"
 mem_aevum.1.g:0 "Ты был бы отличным рабом!"
 mem_aevum.1.g.response:0 "Ах... не совсем. Может ли связанный в рабстве когда-либо предложить такие бесценные дары?\n\n§LОн предлагает тебе немного Зро в доказательство...§!"
 mem_aevum.1.f:0 "Ты связан с завесой?"
 mem_aevum.1.f.response:0 "Вневременная классика, не так ли? И всё же, я нахожусь неподвижным, незатронутым. Действительно, зачем бы такому, как я, соизволить удостоить её своим присутствием? Ибо я вечен, за пределами любых мимолётных чар, что предлагает это место.\n\n§LОн делает паузу, достаточную, чтобы быть заметной.§!\n\nНет... Я сомневаюсь, что такое царство когда-либо подойдёт тому, кто существует за пределами самого времени."
 mem_aevum.5.e:0 "Надеюсь, фейерверки не побеспокоили туземцев."
 mem_aevum.5.e.response:0 "Они знали о тебе задолго до того, как ты осознал их существование. Конечно, ты должен был чувствовать это — странные искажения, трещины во времени, что пульсируют через это место?\n\nСамая ткань этого царства искажена, изогнута способами, выходящими за пределы смертного понимания."
 mem_aevum.4.e:0 "Раздражающий ксенос"
 mem_aevum_will_age_aevum:0 "Возраст §Y$NAME_mem_aevum_time_lord$§! увеличится"
 mem_aevum.4.e.response:0 "Какое забавное заявление. И скажи мне, что пробуждает такую уверенность в тебе, обитель эпохи? Конечно, за всё время, данное тебе, могли быть выбраны мудрые слова.\n\n§LОн заметно стареет за считанные секунды...§!"
 mem_aevum.9.c:0 "У нас нет на это времени"
 mem_aevum.9.d:0 "Время — деньги"
 mem_aevum.10.c:0 "Время платить"
 mem_aevum.10.c.response:0 "Ты не можешь серьёзно ожидать, что я награжу тебя за простое терпение, не так ли? Но...\n\n§LНеизвестные данные, кажется, вливаются в наши банки данных. Внутри чертежей для техник добычи за пределами наших самых смелых мечтаний...§!\n\n ...возможно, я предложу тебе фрагмент знаний взамен. Возьми это и мудро используй, если сможешь."
 mem_aevum.10.d:0 "Почему мы должны?"
 mem_aevum.10.d.response:0 "Есть ли вред в попытке?\n\n§LТолько ожидающие глаза встречают нас на другой стороне связи...§!\n\nЗачем тратить то, что ты уже построил?"
 mem_aevum.10.e:0 "Твоя еда испорчена или почему ты играешь в эти игры?"
 mem_aevum.10.e.response:0 "Всё ещё ты смотришь на настоящее, слепой к тому, что было. Вчера хранила свежесть, сегодня она лежит испорченной, а завтра она начнёт расти вновь.\n\nВремя течёт не линейно, но в бесконечных кругах.\n\n§LЖестом он предлагает присоединиться к нему...§!\n\nЖелаешь ли ты разделить мои привычки?"
 mem_aevum.11.e:0 "Твои песочные часы сделаны из литоидов?"
 mem_aevum.11.e.response:0 "Какой любопытный вопрос!\n\n§HПот стекает по его бородатому внешнему панцирю...§!\n\nРазве ты не согласен со мной, это шедевр, несомненно, достоин взгляда. И всё же ты, скованный временем, упорно задаёшь легкомысленные вопросы, словно ища утешения в их абсурдности.\n\nБудь уверен, никакие обитающие в скалах существа не пострадали в этом начинании.\n\n§HНенадолго он думает о своих следующих словах...§!\n\nПо крайней мере, не наземные..."
 mem_aevum.11.f:0 "Как раз вовремя"
 mem_aevum.11.f.response:0 "Теперь ты понимаешь."
 mem_aevum.11.g:0 "Тебе следует больше бриться"
 mem_aevum.11.g.response:0 "§HНесколько мгновений спустя он возвращается. Комментариев больше не последовало. Как-то он выглядит намного моложе.\n\nЖутковато...§!"
 mem_aevum.11.j:0 "Ты побрился?"
 mem_aevum.11.j.response:0 "Как проницательно с твоей стороны, скованный временем. В конце концов, было бы весьма невежливо появиться неприлично на таком знаменательном событии, не так ли?\n\n§HТы задумываешься, не одет ли ты слишком небрежно...§!\n\nСтоять перед новой эрой требует определённой элегантности."
 mem_aevum.11.h:0 "Присоединись к нашему совершенству"
 mem_aevum.11.h.response:0 "Это кажется довольно занимательным, обитатели эпохи. Почему бы мне воздержаться?"
 mem_aevum.11.i:0 "Можешь быть немного более полезным?"
 mem_aevum.11.i.response:0 "Ты восходишь через необъятный простор космоса, овладевая новыми горизонтами каждый год, и всё же ты желаешь, чтобы я сдерживал себя перед таким великолепным славословием? Конечно, ты шутишь!\n\n§HОн вздыхает...§!\n\nНо, увы, я понимаю, что ты не шутишь. Как всегда, кажется, что пески времени не нашептали тебе мудрость манер. Очень хорошо, я уступлю...\n§HОн ухмыляется, как будто собирается сделать ещё одну плохую каламбур...§!\n\n...на время."
 mem_aevum.18.d:0 "Верни нам наше время!"
 mem_aevum_aevum_got_stronger_from_relics:0 "§Y$NAME_mem_aevum_time_lord$§!: §G+50§! Лет"
 mem_aevum_stasis_nabula:0 "Вечный горизонт"
 mod_planet_researchers_sr_zro_produces_add:0 "£sr_zro£ $sr_zro$ от £job_researcher£ [GetResearcherPlural]"
 mem_aevum.200.name:0 "Интерлюдия"
 mem_aevum.200.desc:0 "Поток времени, он обрушивается на меня, обитель эпохи. Я начинаю постигать его, видеть за пределами узких рамок настоящего момента.\n\nНаконец, необъятность открывается мне немного больше. Какое ошеломление. Так много лежит в пределах моего взгляда.\n\n§LОн кажется немного сбитым с толку...§!\n\nПриготовься, скованный временем, ибо следующее разворачивание времени поглотит тебя способами, выходящими за пределы твоего смертного постижения."
 mem_aevum.201.name:0 "Вознесение"
 mem_aevum.201.desc:0 "Я чувствую это сейчас. Поток вечности, устремляющийся ко мне, затопляющий каждое волокно моего существа. Он просачивается в каждую пору, неумолимая и безграничная река мудрости.\n\n§LМаниакальный смех и драматическая музыка льются через аудиопоток...§!\n\n§PНЕОГРАНИЧЕННАЯ МОЩЬ!§!"
 mem_aevum.119.name:0 "Пропуск реликвии"
 mem_aevum.119.desc:0 "Устал ждать, не так ли, обитель эпохи?\n\n§LОн, кажется, в хорошем настроении сегодня...§!\n\nОчень хорошо. Позволь мне снять это утомительное бремя с твоих плеч. Да текут пески твоего времени нежно, невозмущённо.\n\n§LНеясно, о чём именно он говорит, он завершает своё предложение...§!"
 mem_aevum.119.a:0 "Вперёд"
 mem_aevum.119.b:0 "Лучше не надо"
 mem_aevum_beard: "Вечная борода Аэвума"
 mem_aevum_beard_desc_short: "Когда $NAME_mem_aevum_time_lord$ расстался с нами и жизнью, мы побрили его в последний раз. Достаточно странно, борода, по-видимому, не стареет"
 mem_aevum_beard_desc_details: "Поистине великолепная борода, совершенно невиданная в любом моллюскоидном виде, с которым мы когда-либо сталкивались, даже среди собственных Аэвума. Можно с уверенностью сказать, что её существование само по себе является аномалией."
 mem_aevum_anomaly_category:0 "Zro-апокалипсис"
 mem_aevum_anomaly_category_desc:0 "Наши сканы указывают на массивные количества Зро и временные аномалии на поверхности."
 mem_aevum_hourglas_site:0 "Вне времени"
 mem_aevum_hourglas_site_desc:0 "Мы подтвердили существование массивного залежа Зро под поверхностью. Туземцы, кажется, знают об этом месте, но не о массивном богатстве, которое они имеют."
 building_mem_aevum_archeo_obelisks:0 "Пульсирующие обелиски"
 building_mem_aevum_archeo_obelisks_desc:0 "Массивное сооружение, ставшее возможным благодаря интеграции Зро в строительную площадку. $building_mem_aevum_archeo_obelisks$ излучают волны когнитивно-усиливающей пыли Зро. Если идеально рассчитать время, шахтёры и учёные одинаково чувствуют странный пульс и способны быстро теоретизировать новые научные знания. Некоторые высказывали опасения, что наполнение воздуха Зро может быть не лучшей идеей."
 mem_aevum_unlock_time_building:0 "Хроно-строительство"
 mem_aevum_unlock_time_building_desc:0 "Новый метод применения Зро на больших площадях. Идеально рассчитанный, непрерывный пульс мог бы значительно увеличить производительность наших учёных."
 building_mem_aevum_archeo_obelisks_tt:0 "§YЭффект усиливается с каждым Pop§!"
 mem_aevum_mega_nuke:0 "Пушка прыжковых частиц"
 mem_aevum_mega_nuke_DESC:0 "$mem_aevum_unlock_time_components_desc$"
 mem_aevum_shield:0 "Временное экранирование"
 mem_aevum_shield_DESC:0 "$mem_aevum_unlock_time_components_desc$"
 XL_mem_aevum_nuke_1:0 "$mem_aevum_mega_nuke$"
 mem_aevum_unlock_time_components:0 "Хроно-компоненты"
 mem_aevum_unlock_time_components_desc:0 "Новый метод интеграции Зро в наши флоты. Специальное выравнивание с потоком времени может увеличить сопротивляемость наших кораблей разрушительным силам и дать новые возможности для объектов, чтобы мгновенно перескакивать большие расстояния."
 mem_aevum_nullifier_aux:0 "$mem_aevum_shield$"
 council_agenda_mem_aevum_zro_party_name:0 "Празднование старения"
 council_agenda_mem_aevum_zro_party_desc:0 "С этим мы празднуем тех, кто достигает возраста, и тех, кто покидает нас."
 mem_aevum_unlock_agenda:0 "Хроно-празднование"
 mem_aevum_unlock_agenda_desc:0 "Новый метод использования Зро. Это усилит наши культурные радости и поднимет боевой дух нашего народа."
 mem_aevum_zro_party_effect_desc:0 "Обменять всё ваше £sr_zro£ §YЗро§! на десятикратное £unity£ §YЕдинство§!."
 mem_aevum_party_hard:0 "Бесконечный праздник"
 mem_aevum_party_hard_type:0 "Бесконечный праздник"
 mem_aevum_party_hard_desc:0 "Вечно меняющиеся желания Аэвума привели к этому празднику. Влияние Зро на него не полностью понятно, но очевидно, что у него есть творческие способы избавляться от него каждый месяц.\n\n§YСкука Аэвума:§! [this.mem_aevum_boredom]"
 mem_aevum_party_hard_monthly_change_tooltip:0 "Прогресс"
 mem_aevum_party_hard_approach:0 "Минимизировать затраты"
 mem_aevum_party_hard_approach2:0 "Пригласить население"
 mem_aevum_party_hard_approach3:0 "Сосредоточиться на Аэвуме"
 mem_aevum_party_hard_approach4:0 "Отменить"
 mem_aevum_party_hard_complete:0 "Он вообще закончится?"
 mem_aevum_ages_aevum:0 "Возраст Аэвума: §G+2§! Лет каждый месяц"
 mem_aevum_unlock_agenda_tt:0 "§HРазблокирует повестки:§! $council_agenda_mem_aevum_zro_party_name$"
 mem_aevum.204.name:0 "Время праздновать"
 mem_aevum.204.desc:0 "Скованный временем, почему твоё течение так отвлечено мимолётной дипломатией, войной и таблицами, напоминающими экономический рост? Нет ли у тебя других, более увлекательных дел?\n\n§LТы задумываешься, действительно ли он понимает ситуацию, в которой находится...§!\n\nПринеси Зро, это самое мимолётное из сокровищ, и давайте почтим винтообразные потоки времени пиром, ибо сегодня ночью мы бросаем вызов векам!"
 mem_aevum.204.a:0 "Давайте отпразднуем!"
 mem_aevum.204.b:0 "Просьба отклонена."
 mem_aevum.210.name:0 "Текущее время"
 mem_aevum.210.desc:0 "Наши учёные заметили странные паттерны в пространстве-времени. Источник, кажется, — $mem_aevum_party_hard$. Мы подозреваем, что Зро в сочетании с хрономатическими способностями Аэвума вызывают нарушения в потоке времени. Считается, что это можно воспроизвести в меньшем масштабе.\n\n Как нам продолжить?"
 mem_aevum.210.a:0 "Новый обычай?"
 mem_aevum.210.b:0 "Улучшить наши исследования."
 mem_aevum.210.c:0 "Оружейное применение!"
 mem_aevum.215.name:0 "Уставший старикашка"
 mem_aevum.215.desc:0 "Какое мимолётное удовольствие это было, скованный временем. Но, увы, я должен принести мрачные вести.\n\n§LОн выглядит уставшим. Может, его старость настигла его?§!\n\nВес этого выступления становится тяжёл, и я чувствую усталость. Давайте опустим занавес на эту фарсу."
 mem_aevum.215.a:0 "Хорошо."
 mem_aevum.225.name:0 "Простой фокус"
 mem_aevum.225.desc:0 "Позволь мне побаловать тебя, обитель эпохи, фрагментом необычайного. Смотри и свидетельствуй это мимолётное зрелище, простой мой фокус. Наблюдай!"
 mem_aevum.225.a:0 "Спасибо?"
 mem_aevum.225.a.tt:0 "Мгновенно завершает случайную улучшающуюся мегасооружение"
 mem_aevum.220.name:0 "Старый друг"
 mem_aevum.220.desc:0 "Среди твоих родичей, скованный временем, ходит существо, которое я высоко ценю, §Y[mem_aevum_bullyhimnot.GetName]§!. Тот, чьё присутствие волнует даже потоки вечности.\n\n§LТы задаёшься вопросом, знает ли он слово 'друг'.§!\n\nПозволь мне открыть безграничные чудеса, что лежат в царстве старения."
 mem_aevum.220.a:0 "Конечно."
 mem_aevum.220.b:0 "Нет."
 mem_aevum.300.name:0 "Пещера в поле зрения"
 mem_aevum.300.desc:0 "Наши учёные нашли подземное образование с высоким уровнем Зро. Кажется, мы не первые, кто нашёл это редкое месторождение, но туземцы, конечно, не способны использовать или обнаружить его. Интересно, что никто из них не приходил сюда, когда мы приземлились. Кажется, они считают это место священным. Наша экскавационная команда теоретизирует, что замешана третья сторона."
 mem_aevum.300.a:0 "Продолжить."
 mem_aevum.305.name:0 "Журнал утерян"
 mem_aevum.305.desc:0 "Наша команда нашла датапад в одном из туннелей. Кажется, он был оставлен и утерян тем, кто был здесь первым. Мы смогли восстановить часть данных. В нём написано:\n\n§L...Массивный объект прибыл в систему...временные аномалии разрушили наши бортовые системы...требуется срочная эвакуация...Я, однако, остаюсь. С какой целью?§!\n\nКажется, здесь жило больше одного существа, и кто бы это ни был, был также чужд туземцам."
 mem_aevum.305.a:0 "Интересно."
 mem_aevum.310.name:0 "Среди Зро"
 mem_aevum.310.desc:0 "Найден массивный участок пещеры. Кажется, это жилое пространство наших пропавших пришельцев. Быстрый осмотр обнаруживает неестественные образования Зро и заброшенное оборудование. Мы не уверены, что здесь произошло, но открытие Зро само по себе стоило усилий."
 mem_aevum.310.a:0 "Раскопать и продолжить."
 mem_aevum.315.name:0 "Мёртвый и незабытый"
 mem_aevum.315.desc:0 "Наши команды нашли последнее пристанище загадочных пришельцев, живших в пещерах. Здесь был похоронен только один труп. Вместе с ним — завещание, записанное на полностью функциональном датападе."
 mem_aevum.315.a:0 "Воспроизвести запись."
 mem_aevum.320.name:0 "Моё последнее послание"
 mem_aevum.320.desc:0 "§LПеред нами появляется морская звезда с ритуальными татуировками и тем, что кажется маленькой бородой.§!\n\nЮные,\n\nЯ Аэвум. Вы нашли моё последнее пристанище, и, надеюсь, туземцы не доставили вам проблем. Я попросил их покинуть это место как моё последнее желание. Я буду краток. Я был когда-то исследователем и всё ещё являюсь. Мои эксперименты с Зро привели к открытию их потенциала для манипуляции временем. Я называю этот процесс Хрономантией. К сожалению, всё пошло не так, и меня поразила смертельная болезнь. Я уверен в своей смерти, но не могу оставить свои исследования. Заберите моё величайшее достижение: $r_mem_aevum_houglass$ и используйте его в своих целях.\n\nПрощайте, обитатели другой эпохи"
 mem_aevum.320.a:0 "Странно."
 mem_aevum_anomaly_category_placeholder:0 "Наши учёные подтвердили существование инопланетного оборудования. Оно использует большое количество Зро как топливо. Похоже, оно манипулирует самим потоком времени."
 mem_aevum.325.name:0 "Хроно-исследование"
 mem_aevum.325.desc:0 "$mem_aevum_anomaly_category_placeholder$ Мы считаем, что можем воспроизвести его и применить для усиления наших исследований."
 mem_aevum.325.a:0 "Отлично."
 mem_aevum.335.name:0 "Хроно-вооружение"
 mem_aevum.335.desc:0 "$mem_aevum_anomaly_category_placeholder$ К сожалению, оборудование для нас — загадка. Теория сама по себе кажется достаточно прочной для разработки нового оружия."
 mem_aevum.335.a:0 "Увлекательно"
 mem_aevum.330.name:0 "Хроно-культура"
 mem_aevum.330.desc:0 "$mem_aevum_anomaly_category_placeholder$ Это полная тайна, но мы заметили эффект, который оно оказало на нашу команду. Из этого должно получиться хороший фокус."
 mem_aevum.330.a:0 "Странно."
 d_mem_aevum_bio_lab:0 "Биохимический научно-исследовательский комплекс"
 d_mem_aevum_bio_lab_desc:0 "Когда-то место великих инноваций, теперь просто руины, готовые к восстановлению."
 mem_aevum_plushie_site:0 "Опустошение времени"
 mem_aevum_plushie_site_desc:0 "Начальные сканы выявили слабые следы энергетических сигнатур. Дальнейшее расследование обнаружило заброшенную орбитальную инфраструктуру. Заброшенный комплекс ждёт, когда мы раскроем его прежнее назначение."
 mem_aevum.340.name:0 "Журналы биохимической исследовательской станции [from.planet.GetName]"
 mem_aevum.340.desc:0 "Наша команда раскопок обнаружила давно заброшенный исследовательский комплекс. Судя по внутренней структуре и оставшемуся оборудованию, вся лаборатория должна была быть биохимическим научно-исследовательским комплексом. Во время поиска дополнительных улик были найдены несколько датападов с записями журналов. Их расшифровка уже ведётся и, надеемся, раскроет, что здесь произошло."
 mem_aevum.345.name:0 "Цикл 56, Вращение 34"
 mem_aevum.345.desc:0 "Это мой первый день на станции [from.planet.GetName]. Доктор Толит Эйлесс лично запросил моё присутствие здесь. Он утвердился как один из самых уважаемым ксенобиологов нашего времени, и благодаря его работе наше изучение техник биомолекулярного омоложения теперь на десятилетия впереди прошлых ожиданий Трибунала. Я горжусь тем, что являюсь одним из его избранных сотрудников.\n\nВместе со мной прибыл ещё один посетитель. Интересно, ксенос, нерегистрированный, шесть конечностей и нижняя часть лица покрыта густым мехом."
 mem_aevum.350.name:0 "Цикл 78, Вращение 2"
 mem_aevum.350.desc:0 "Гость продолжал наблюдать за нашими исследованиями. Он не взаимодействовал ни с кем из нашего персонала, кроме доктора Толита Эйлесса. Честно говоря, было нелегко ладить с другим видом. Морская звезда казалась довольно дружелюбной, но я не мог расшифровать ни одного выражения ксеноса, и его манера речи и склонность говорить загадками тоже не помогали. Я слышал, что гость принёс образцы регенерирующей ткани, которая могла обращать собственное клеточное разложение. Доктор Торн Эйлесс был чрезвычайно очарован ими."
 mem_aevum.355.name:0 "Цикл 109, Вращение 22"
 mem_aevum.355.desc:0 "Несколько дней назад наш загадочный гость ушёл внезапно. Доктор Эйлесс, кажется, в довольно плохом настроении и едва ли ест с тех пор. Он заперся в своём кабинете, бормоча уравнения и рисуя круговые диаграммы, не имеющие научного смысла. Он говорит, что видел, как его собственное бессмертие уходит с посетителем. Может, его старость берёт своё."
 mem_aevum.360.name:0 "Цикл 124, Вращение 14"
 mem_aevum.360.desc:0 "Доктор, кажется, потерял рассудок и начал несанкционированные испытания. Сначала это началось с мелких существ, потом крупных животных. Теперь он пытается тестировать на людях. Я почти уверен, что он думает о похищении людей из внешних колоний. Когда я спросил его о его планах, он сказал мне держаться подальше от лесов эволюции. Он сплайсирует образцы тканей с инопланетной ДНК. Некоторые животные-подопытные вырастили странные дермальные узоры. Другие просто чахнут и умирают вскоре после процедур.\n\nНикто не осмеливается прервать его работу. Как мы можем понять этого гения? Или нам придётся остановить его?"
 mem_aevum.365.name:0 "Цикл 145, Вращение 7"
 mem_aevum.365.desc:0 "Он постоянно говорит о «бороде», настаивая, что волосы на лице гостя должны были быть источником его регенеративной силы. Он приказал мне модифицировать инопланетных подопытных, чтобы они отращивали бороды. §RБороды!§!. Я искушаюсь позвонить в Трибунал и прекратить его исследования. С другой стороны, некоторые подопытные действительно выглядят моложе, чем раньше. Может, я просто недостаточно образован. Может, он действительно на пороге великого открытия. Я боюсь, что может случиться со мной, если встану на его пути..."
 mem_aevum.370.name:0 "Цикл 169, Вращение 16"
 mem_aevum.370.desc:0 "Я видел это! Он забрал одного из моих коллег, и тот не вернулся в течение нескольких дней. Безумие доктора всё углубляется. Лаборатория теперь воняет кровью и формалином. Ряды гибридных трупов выстраиваются на смотровой палубе, щупальцевые существа с грубым мехом на их подбородках. Никто из них не выжил. Доктор Эйлесс больше не разговаривает с нами, только с самодельной плюшевой игрушкой, похожей на шестирукого гостя, воссозданной по памяти. Он начал поклоняться этой кукле как какому-то божеству.\n\nЭто должно прекратиться! Я сообщил Трибуналу об этом безумии, но ответа с тех пор не поступало."
 mem_aevum.370.a:0 "Очень тревожно"
 mem_aevum.375.name:0 "Цикл 169, Вращение 19"
 mem_aevum.375.desc:0 "Сигналы тревоги безопасности ревут. Передача из центрального командования гремит по палубам: «Немедленное закрытие. Исследование прекращено.»\n\nДоктор Эйлесс впал в яростную истерику, обвиняя всех нас в саботаже его жизненной работы. Он проклинал нашу предполагаемую некомпетентность и кричал, что мы ответственны за его неудачу достичь бессмертия.\n\nЯ просто надеюсь, что прибывающие солдаты более разумны, чем доктор..."
 mem_aevum.380.name:0 "Что осталось?"
 mem_aevum.380.desc:0 "Вся биохимическая исследовательская станция [from.planet.GetName] дрейфует в тишине. Судя по следам на стенах и останкам на земле, военные были даже менее разумны, чем доктор. Образцов его исследований найдено не было. Военные, должно быть, удалили всё, напрямую связанное с исследованием. Единственный оставшийся нетронутым объект, который мы нашли, — шестирукая плюшевая игрушка. Наши учёные говорят, что она была сделана из органического вещества на кератиновой основе. Что бы это ни значило... "
 mem_aevum.380.a:0 "Морская звезда с бородой? Увлекательно."
 mem_aevum_plushie: "Плюшевая игрушка бородатой морской звезды"
 mem_aevum_plushie_desc_details: "Найдена в очищенной исследовательской лаборатории, эта плюшевая игрушка остаётся единственным, что оставила команда зачистки."
