l_russian:

 mem_colony_ship.2.name:0 "Предупреждение о сближении"
 mem_colony_ship.2.desc:0 "Системы раннего предупреждения обнаружили неопознанный объект, приближающийся к системе §Y[the_system.GetName]§! примерно с третью скорости света. \n\nСобранные данные остаются неубедительными, но учитывая скорость объекта, он, скорее всего, искусственного происхождения — межзвёздное судно примитивного дизайна.\n\nОн не ответил ни на одно из наших предупреждений или приветствий, поэтому его намерения неизвестны, но его текущий путь предполагает, что в настоящее время незанятая планета §Y[mem_colony_ship_the_planet.GetName]§! является его конечной целью. Ожидается, что он пролетит мимо всех наших структур и либо разобьётся, либо приземлится, либо выйдет на орбиту планеты."
 mem_colony_ship.2.a:0 "Мы подождем и узнаем, что он делает."
 mem_colony_ship.2.b:0 "Уничтожьте его. Мы не можем так рисковать."
 mem_colony_ship.2.eden:0 "Инициация подпрограммы засева."
 mem_colony_ship_size:0 ""
 mem_colony_ship_size_plural:0 ""
 mem_colony_ship.3.name:0 "Корабль-нарушитель уничтожено"
 mem_colony_ship.3.desc:0 "Мы успешно уничтожили неопознанное судно, которое вторглось в систему §Y[FromFrom.Solar_System.GetName]§!. \n\nПотенциальная угроза была нейтрализована, но какова было ее миссия и личность тех, кто на нем находились, останется загадкой навсегда."
 mem_colony_ship.3.a:0 "У нас не было выбора."
 mem_colony_ship.3.b:0 "Никто не может вторгнуться в наше пространство без последствий."
 mem_colony_ship.3.c:0 "Статус: Периметр в безопасности."
 mem_colony_ship.3.d:0 "Они получили то, что заслуживали."
 mem_colony_ship.6.name:0 "Неудачная высадка"
 mem_colony_ship.6.desc:0 "Неопознанный корабль, за которым мы следили, успешно достиг §Y[mem_colony_ship_the_planet.GetName]§!. \n\nОднако при попытке входа в атмосферу планеты системы корабля, по-видимому, отказали, заставив его plummet на поверхность, оставив после себя лишь тлеющий кратер."
 mem_colony_ship.6.a:0 "Это все?"
 mem_colony_ship.6.eden:0 "Отключение подпрограммы."
 d_mem_colony_ship_crater:0 "Ударный кратер"
 d_mem_colony_ship_crater_desc:0 "Единственное напоминание о довольно антиклиматическом конце для межзвездного путешествия одного отважного, но неудачливого корабля."
 mem_gov_colony_ship:0 "Временное колониальное правительство"
 mem_gov_colony_ship_desc:0 "Свободно систематизированный орган, специально созданный для управления колонистами нового мира."
 RT_MEM_COLONIAL_MARSHAL:0 "Колониальный маршал"
 RT_MEM_COLONIAL_MARSHAL_FEMALE:0 "Колониальный маршал"
 mem_colony_ship_civic_one:0 "Идеологический фракционизм"
 mem_colony_ship_civic_two:0 "Неорганизованность рубежа"
 mem_colony_ship_civic_one_desc:0 ""
 mem_colony_ship_civic_two_desc:0 ""
 mem_recently_colonized_age:0 "Новая колония"
 mem_recently_colonized_age_desc:0 "Неорганизованные колонисты, которые недавно покинули свой относительно примитивный корабль, пытаются адаптироваться к своей новой жизни в чужом мире. Со временем, они сумеют достигнуть постепенного роста и технологического процесса... или погибнут."
 mem_colony_ship.8.name:0 "Посадка"
 mem_colony_ship.8.desc:0 "Неопознанный аппарат, вторгшийся в наше пространство некоторое время назад, по-видимому, совершил успешную посадку на планету. \n\nОказалось, что он перевозил членов вида, которые называют себя [landed_country.GetSpeciesName], а также оборудование для создания примитивной колонии на этом мире, которую они решили назвать §Y[mem_colony_ship_the_planet.GetName]§!. \n\nОни, похоже, совсем не заметили нашего присутствия в системе, что предполагает, что их сенсоры либо получили значительные повреждения, либо никогда не были очень хорошими."
 mem_colony_ship.8.a:0 "Время уведомить их об их нарушениях."
 mem_colony_ship.8.b:0 "Не обращайте пока что на них внимания."
 mem_colony_ship.8.b.tooltip:0 "Мы не выйдем с ними на контакт сейчас, однако в будущем мы сможем взаимодействовать с ними так же, как и с любой другой примитивной цивилизацией."
 mem_colony_ship.8.c:0 "Это идеальное время для удара."
 mem_colony_ship.8.eden:0 "Засев успешен. Начать заботу."
 mem_colony_ship.10.name:0 "Открыть канал связи с [mem_colony_ship_the_planet.GetName]"
 mem_colony_ship.10.desc:0 "Благородные [root.GetSpeciesNamePlural], пожалуйста, простите нас за колонизацию вашей планеты. Мы не знали, что вы претендовали на эту систему, или даже что межзвёздные империи вообще возможны. Поймите, что это был наш единственный шанс на выживание: наш родной мир столкнулся с быстро надвигающейся гибелью, и §Y[mem_colony_ship_the_planet.GetName]§! была планетой, которую мы сочли наиболее вероятной способной поддерживать жизнь. Нам ясно, что достижения вашей цивилизации далеко превосходят то, что мы смогли достичь до сих пор. Пожалуйста, смилуйтесь над нами и даруйте нам второй шанс на выживание."
 mem_colony_ship.10.desc.machine:0 "§LОй, роботы! Космические роботы за нами. Ладно, сохраняйте спокойствие. Сейчас не время паниковать.§! \n\nСлушайте, эм... благородные [Root.GetSpeciesNamePlural]? Пожалуйста, простите нас за колонизацию вашей планеты. Мы не знали, что вы претендовали на эту систему, или даже что межзвёздные империи вообще возможны... не говоря уже о том, что роботизированные империи существуют. Поймите, что это был наш единственный шанс на выживание: наш родной мир столкнулся с быстро надвигающейся гибелью, и §Y[mem_colony_ship_the_planet.GetName]§! была планетой, которую мы сочли наиболее вероятной способной поддерживать жизнь. Нам ясно, что достижения вашей цивилизации далеко превосходят то, что мы смогли достичь до сих пор. Пожалуйста, если милосердие вообще является для вас понятием, проявите милосердие к нам и даруйте нам второй шанс на выживание."
 mem_colony_ship.10.a:0 "Вы станете частью нашей империи."
 mem_colony_ship.10.a.tooltip:0 "[mem_colony_ship_the_planet.GetName] будет аннексирована."
 mem_colony_ship.10.b:0 "Вы можете сохранить за собой это систему в качестве нашего протектората."
 mem_colony_ship.10.b.tooltip:0 "Система будет передана колонистам, которые станут нашим §Sпротекторатом§!."
 mem_colony_ship.10.c:0 "Вы можете сохранить за собой эту систему в качестве нашего данника."
 mem_colony_ship.10.c.tooltip:0 "Система будет передана колонистам, которые станут нашими §Sданниками§!."
 mem_colony_ship.10.d:0 "Бедные существа. Ваши проблемы теперь закончились."
 mem_colony_ship.10.d.tooltip:0 "Роботизированная единица-опекун будет отправлена на [mem_colony_ship_the_planet.GetName], чтобы позаботиться о бедных колонистах."
 mem_colony_ship.10.e:0 "Отключиться."
 mem_colony_ship.10.e.tooltip:0 "Никакие действия не будут предприняты, но в будущем мы сможем взаимодействовать с ними так же, как и с любой другой примитивной цивилизацией."
 mem_colony_ship.12.name:0 "Ситуация на [From.GetName] стабилизирована"
 mem_colony_ship.12.desc:0 "Ситуация на [From.GetName], новом доме колонистов [From.Owner.GetAdj], была непредсказуемой практически с того момента, как они высадились. Однако, несмотря на их примитивные технологии и слабых лидеров, [From.Owner.GetSpeciesNamePlural] далеко продвинулись за последние несколько лет. \n\nСитуация на планете стабилизировалась и была построена инфраструктура, позволяя жителям снова быть классифицированными как цивилизация ранней космической эры."
 mission_mem_colony_ship_technological_enlightenment:0 "$mission_technological_enlightenment_9$"
 mission_mem_colony_ship_technological_enlightenment_desc:0 "$mission_technological_enlightenment_9_desc$"
 MEM_COLONY_SHIP_NOT_NOW:0 "Примитивы сейчас в слишком большом беспорядке."
 building_mem_colony_ship_shelter:0 "Примитивное колониальное убежище"
 building_mem_colony_ship_shelter_desc:0 "Остатки корабля-колонии обеспечивают укрытие для своих бывших пассажиров, служа центральным пунктом для их запланированного расширения на поверхность планеты."
 building_mem_colony_ship_protocity:0 "Прото-город"
 building_mem_colony_ship_protocity_desc:0 "Первые здания, построенные на планете, созданы из местных материалов, чтобы служить ядром для первоначальной колонии. Это ещё не город, но, если повезет, он однажды станет самым большим среди многих."
 building_mem_colony_ship_farming_outpost:0 "Фермерские аванпосты"
 building_mem_colony_ship_farming_outpost_desc:0 "Обширная сеть фермерских аванпостов покрывает исследуемую землю, пытаясь выжать как можно больше пищи из чужеродной почвы."
 building_mem_colony_ship_industrial_outpost:0 "Индустриальные аванпосты"
 building_mem_colony_ship_industrial_outpost_desc:0 "Стратегически расположенные фабрики предоставляют инструменты, машины и другие вещи, необходимые колонистам для выживания и процветания в чужом мире."
 building_mem_colony_ship_power_outpost:0 "Энергетические аванпосты"
 building_mem_colony_ship_power_outpost_desc:0 "Сеть электростанций, использующих доступные природные ресурсы для производства электроэнергии для роста колонии."
 building_mem_colony_ship_mining_outpost:0 "Шахтёрские аванпосты"
 building_mem_colony_ship_mining_outpost_desc:0 "Сеть шахтерских городов и лагерей, размещенных вокруг неглубоких залежей, чтобы обеспечить колонию необходимыми минеральными ресурсами."
 job_mem_colony_ship_colonist:0 "$job_colonist$"
 job_mem_colony_ship_colonist_plural:0 "$job_colonist_plural$"
 job_mem_colony_ship_colonist_desc:0 "Трудно освоиться в новом мире. Еще труднее без поддержки межзвездной империи."
 mod_job_mem_colony_ship_colonist_add:0 "$job_mem_colony_ship_colonist$"
