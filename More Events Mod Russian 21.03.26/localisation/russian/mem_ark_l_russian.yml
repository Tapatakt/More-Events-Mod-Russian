l_russian:

 mem_ark_object:0 "Древняя Станция"
 mem_ark.2.name:0 "Космическая Странность"
 mem_ark.2.desc:0 "Помимо обитающей там примитивной цивилизации, кое-что ещё в §Y[mem_ark_the_planet.GetName]§! привлекло наше внимание. \n\nВокруг планеты вращается космическая станция, значительно более продвинутая, чем любые технологии местных жителей, но слишком примитивная, чтобы быть построенной инопланетным разумом."
 mem_ark.2.a:0 "Интересно."
 mem_ark.2.a.tooltip:0 "Постройте §SПост Наблюдения§! над планетой или покорите ее, чтобы узнать больше."
 mem_ark.4.name:0 "То, что не принадлежит"
 mem_ark.4.desc:0 "Мы наблюдали за §Y[mem_ark_the_planet.GetName]§! довольно долго и подтвердили, что у местных жителей нет средств для строительства или запуска космической станции. \n\nКто-то другой должен был построить её над их миром."
 mem_ark.4.a:0 "Нам нужно узнать больше."
 mem_ark.5.desc:0 "Наши поселенцы на §Y[mem_ark_the_planet.GetName]§! подтвердили наличие примитивной космической станции на орбите над [mem_ark_the_planet.GetPlanetMoon]. \n\nУ [mem_ark_grounders.GetNamePlural] не было средств для строительства такой конструкции, так что вопрос — кто же её построил?"
 MEM_ARK_PROJECT:0 "Исследование Станции"
 MEM_ARK_PROJECT_DESC:0 "Станция над §Y[mem_ark_the_planet.GetName]§! выглядит явно неуместно — те, кто мог бы её построить, явно недостаточно развиты."
 mem_ark.100.name:0 "Ковчег"
 mem_ark.100.desc:0 "Станция на орбите [mem_ark_the_planet.GetName] оказывается возрастом около 500 лет. \n\nИз того, что смогла собрать команда [Root.GetName], планета фактически пережила ядерную войну или подобную катастрофу примерно во время строительства станции. Вид, в настоящее время известный как [mem_ark_grounders.GetNamePlural], являются потомками выживших, претерпевших серьёзные мутации, в то время как последние из оригинального вида, называемые [mem_ark_sky_people.GetNamePlural], нашли убежище на орбите. \n\nПосадочные модули, заполненные криогенными капсулами и различным оборудованием, всё ещё прикреплены к станции, ожидая развёртывания. Похоже, технический персонал, который должен был запустить их, исчерпал запасы и погиб до того, как поверхность была признана пригодной для жизни. На данном этапе любая попытка вмешаться в работу станции, кроме как отправить модули вниз, разрушит её."
 mem_ark.100.a:0 "Запустить капсулы."
 mem_ark.100.a.tooltip:0 "£pop Поселения [mem_ark_sky_people.GetName] будут добавлены на планету."
 mem_ark.100.a.delayed:0 "Необходимо больше места на планете для запуска капсул."
 mem_ark.100.a.delayed.tooltip:0 "Планетарный указ будет добавлен к §Y[mem_ark_the_planet.GetName]§! для выпуска модулей, как только у вас будет свободное жильё для размещения нового £pop населения."
 mem_ark.100.b:0 "Лучше ничего не трогать."
 mem_ark.100.c:0 "Выключите все и изучите станцию."
 mem_ark.100.d:0 "Взорвите станцию, убив всех обитателей капсулы."
 mem_ark.102.name:0 "[mem_ark_the_planet.GetName]: Знание — сила"
 mem_ark.102.desc:0 "Похоже, после начального напряжения между [mem_ark_grounders.GetAdj] местными жителями и [mem_ark_sky_people.GetAdj] новоприбывшими на поверхности §Y[mem_ark_the_planet.GetName]§!, они наконец достигли прочного мира. \n\n[mem_ark_sky_people.GetNamePlural] поразили всех различными технологическими устройствами, произведя достаточное впечатление на [mem_ark_grounders.GetNamePlural] с научным складом ума, чтобы те попросили новоприбывших стать их новыми лидерами."
 mem_ark.102.a:0 "Мудрый выбор."
 mem_ark.102.b:0 "Относительно."
 mem_ark.103.name:0 "[mem_ark_the_planet.GetName]: Превосходство огневой мощи"
 mem_ark.103.desc:0 "После некоторого начального напряжения между [mem_ark_grounders.GetAdj] местными жителями и [mem_ark_sky_people.GetAdj] новоприбывшими на поверхности §Y[mem_ark_the_planet.GetName]§!, конфликт перерос в полномасштабную войну. \n\nОднако, как бы много [mem_ark_grounders.GetAdj] воинов ни штурмовали укреплённые позиции новоприбывших, они не были равны автоматическому огнестрельному оружию, которое [mem_ark_sky_people.GetNamePlural] привезли с собой. В конце концов, у местных жителей не было выбора, кроме как сдать всю власть захватчикам."
 mem_ark.103.a:0 "Хорошее шоу."
 mem_ark.103.b:0 "Однажды они могут стать угрозой..."
 mem_ark.103.c:0 "Действительно ли это было необходимо?"
 mem_ark.104.name:0 "[mem_ark_the_planet.GetName]: Мир и гармония"
 mem_ark.104.desc:0 "У [mem_ark_sky_people.GetNamePlural] не было особых проблем с интеграцией в [mem_ark_grounders.GetAdj] общество на поверхности §Y[mem_ark_the_planet.GetName]§!. \n\nБольшинство из них, кажется, очарованы простым и мирным образом жизни, который развили [mem_ark_grounders.GetNamePlural], и не хотят возвращаться к уровню технологий, который принёс гибель их цивилизации."
 mem_ark.104.a:0 "Хорошо для них."
 mem_ark.104.b:0 "Одной угрозой меньше."
 mem_ark.104.c:0 "Ну, это глупо."
 mem_ark.105.name:0 "[mem_ark_the_planet.GetName]: Боги с небес"
 mem_ark.105.desc:0 "Похоже, что [mem_ark_sky_people.GetNamePlural] очень повезло. В культуре [mem_ark_grounders.GetAdj] образы домутационных видов [mem_ark_sky_people.GetAdj] были представлены в качестве богов или как святые, населяющие потерянный рай. \n\nТеперь, когда [mem_ark_grounders.GetNamePlural] неожиданно столкнулись с такими существами лично, большинство присягнуло им на верность, называя их вернувшимися богами. Большинство [mem_ark_sky_people.GetNamePlural], похоже, вполне довольны таким развитием событий."
 mem_ark.105.a:0 "Что это за ересь!"
 mem_ark.105.b:0 "Придурки, все они."
 mem_ark.105.c:0 "Кто мы такие, чтобы судить?"
 mem_ark_just_landed:0 "Только что Приземлились"
 mem_ark_background_radiation:0 "Загрязненная"
 mem_ark_background_radiation_desc:0 "Уровень радиации на этой планете заметно повышен. Не настолько, чтобы сделать жизнь невозможной, но, тем не менее, это может сделать ее неприятной."
 mem_ark_station_in_orbit:0 "Станция на Орбите"
 mem_ark_station_in_orbit_desc:0 "На орбите этой планеты находится космическая станция, существование которой трудно объяснить."
 decision_mem_ark_release_pods:0 "Запуск Капсул"
 decision_mem_ark_release_pods_desc:0 "С орбитальной станции будут выпущены капсулы, чтобы заселить пустое место."
 mem_ark_need_tile:0 "Нужно больше жилья на планете."
 mem_ark_edict_tooltip:0 "£pop Поселения [mem_ark_sky_people.GetName]  будут добавлены на планету."
