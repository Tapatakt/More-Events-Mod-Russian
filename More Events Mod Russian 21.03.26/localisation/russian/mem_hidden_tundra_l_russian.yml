l_russian:

 mem_hidden_tundra_category:0 "Безжизненная, но интересная планета"
 mem_hidden_tundra_category_desc:0 "Главный учёный §Y[Root.leader.GetName]§! получил интересные показания с планеты §Y[From.GetName]§!. Более тщательное расследование кажется оправданным."
 mem_hidden_tundra.1.name:0 "Планета обитаема!"
 mem_hidden_tundra.1.desc:0 "Оказывается, §Y[From.GetName]§! не бесплоден, как показали наши первые сканы, но на самом деле мир-тундра. Он всё ещё выглядит довольно мрачным с его почти безликой поверхностью и почти отсутствием растительности.\n\nОднако мы всё ещё должны быть в состоянии колонизировать с помощью незначительных местных усилий по терраформированию."
 mem_hidden_tundra.2.name:0 "Безжизненная и неинтересная планета"
 mem_hidden_tundra.2.desc:0 "Вопреки первоначальным предположениям §Y[Root.leader.GetName]§!, §Y[From.GetName]§! — просто мёртвый, скучный камень в космосе. Мы должны сосредоточить наши исследовательские усилия в другом месте."
 mem_hidden_tundra.1.fascinating:0 "Удивительно"
 mem_hidden_tundra.1.xenophobe:0 "Живучие паразиты."
 mem_hidden_tundra.2.fascinating:0 "Удивительно"
