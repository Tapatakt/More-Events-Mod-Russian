l_russian:

 mem_crystal_pyramid_category:0 "Необычные Огни"
 mem_crystal_pyramid_category_desc:0 "По ночам, на [From.GetName], под прозрачной поверхностью, заметно огромное пятно света, диаметром в несколько километров. Что бы это ни было, оно, вероятно, способно обеспечивать себя энергией на более чем километровой глубине под толстым слоем льда."
 mem_crystal_pyramid.1.name:0 "Кристальная Пирамида"
 mem_crystal_pyramid.1.desc:0 "Команда [Root.leader.GetName] обнаружила огромную и совершенно гладкую пирамиду, испускающую ослепительный, меняющий цвет свет на [From.GetName]. Несмотря на обнаружение источника, команда не может определить, как пирамида там оказалась, как она создаёт свет и как долго она там находится. Они запрашивают финансирование для особого проекта, чтобы просверлить лёд и получить прямой доступ к пирамиде."
 MEM_CRYSTAL_PYRAMID_PROJECT:0 "Кристальная Пирамида"
 MEM_CRYSTAL_PYRAMID_PROJECT_DESC:0 "Научный персонал, изучающий пирамиду на [crystal_pyramid_planet.GetName] запрашивает дополнительную помощь для ускорения работы."
 mem_crystal_pyramid.2.name:0 "Внезапный Разряд"
 mem_crystal_pyramid.2.desc:0 "Словно отвечая на усилия [Root.leader.GetName], свет под ледяными щитами [From.GetName] внезапно вспыхнул ярче, чем когда-либо, прежде чем исчезнуть столь же резко. В льду, где находился источник света, была обнаружена массивная пирамидальная полость, что подразумевает, что всё, что когда-то было там, внезапно перестало существовать. Какова бы ни была причина его исчезновения, [Root.GetName] удалось собрать сокровищницу данных и энергии от кратковременного и внезапного разряда."
 mem_crystal_pyramid.2.a:0 "Ну, бывало и хуже."
 mem_crystal_pyramid.3.name:0 "Очень Странные Дела"
 mem_crystal_pyramid.3.desc:0 "После достижения пирамиды под поверхностью [crystal_pyramid_planet.GetName], [Root.leader.GetName] выпустил отчёт о природе устройства. Оно сделано из материала, непохожего на всё, что наша команда когда-либо видела, и оно сопротивляется всем попыткам даже слегка повредить его поверхность. Похоже, нет никакого порядка в волнах, испускаемых пирамидой, но их высокая энергия на различных длинах волн оказывается отличным источником данных для наших учёных. Хотя философские дебаты, созданные странным объектом, не имеют конца, реальная ценность, по-видимому, заключается в возможности изучать его дальше."
 mem_crystal_pyramid.3.a:0 "Некоторые вещи мы просто пока не в состоянии понять."
 mem_crystal_pyramid.4.name:0 "Кристальное Родство"
 mem_crystal_pyramid.4.desc:0 "В тот момент, когда горнодобывающая команда под руководством [Root.leader.GetName] достигла пирамиды, она засветилась ярким оттенком красного. Вопреки поспешным приказам [Root.leader.GetName], один из шахтёров коснулся пирамиды — в этот момент она внезапно исчезла. К их ужасу, группа кристаллических существ появилась на орбите планеты всего через несколько мгновений после того, как пирамида исчезла."
 mem_crystal_pyramid.4.a:0 "Это не к добру."
