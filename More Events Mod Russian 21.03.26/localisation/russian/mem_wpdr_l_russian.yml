 r_mem_wpdr_production_matrix:0 "Производственная Матрица ВТА"
 r_mem_wpdr_production_matrix_desc:0 "Спасённый с буровой установки ВТА Непоколебимая Доблесть, этот компонент отвечает за быстрое производство Мобильных Оружейных Платформ, использовавшихся §YУниверсальным Транспортным Альянсом§! до его преждевременной гибели."
 mem_wpdr_production_matrix_tooltip:0 "Мгновенно создает §S8§! Мобильные Платформы в столице со случайным вооружением (§Y$ENERGY_LANCE_1$§!, §Y$MASS_ACCELERATOR_1$§! или §Y$ARC_EMITTER_1$§!)."
 MEM_WPDR_BOARD_WRECK:0 "Подняться на борт «Неукротимой Доблести»"
 MEM_WPDR_BOARD_WRECK_DESC:0 "Большой корабль в §Y[capital_ship.Solar_System.GetName]§! был выведен из строя. \n\nМы можем послать команду на его борт, чтобы раскрыть его секреты."
 mem_wpdr.3.name:0 "Неукротимая Доблесть"
 mem_wpdr.3.desc:0 "Значительный урон, нанесённый нами §SНепоколебимой Доблести§! во время битвы в системе §Y[From.Solar_System.GetName]§!, оставил корабль обезвреженным.\n\nМы можем отправить §Yнаучное судно§! для абордажа корабля и попытаться узнать больше об его уникальной технологии, а также его истории."
 mem_wpdr.3.a:0 "Сделайте так."
 mem_wpdr.4.name:0 "Неукротимая Доблесть"
 mem_wpdr.4.desc:0 "§Y[Leader.GetName]§! сообщает об успешном абордаже и изучении интерьера §SНепоколебимой Доблести§! — массивного линкора, найденного в [capital_ship.Solar_System.GetName].\n\nСогласно её дата-ядру, корабль был построен и эксплуатировался §SУниверсальным Транспортным Альянсом§!, организацией, сформированной в результате некого галактического политического кризиса несколько тысяч лет назад. Многие державы, существовавшие в то время, рухнули, оставив торговые маршруты незащищёнными и уязвимыми для растущего пиратства, пока эта неправительственная организация не вмешалась. Альянс эксплуатировал ряд массивных линкоров, таких как Непоколебимая Доблесть, известных как §YБуровые установки мобильного развёртывания оружия§!, которые производили небольшие автоматизированные корабли, способные эффективно преследовать пиратские суда и вступать с ними в бой на дальних дистанциях.\n\nНекоторое время Альянс щедро финансировался правительственными и частными благотворителями и мог не только отбить пиратство, но и активно инвестировать в собственную инфраструктуру. Однако по мере того как пиратская угроза уменьшалась и власть Альянса росла, различные силы стали недовольны доминированием УТА и потребовали его роспуска.\n\nБольшинство его офицеров в конечном итоге перебежали в свои родные империи, а те, кто не перебежал, были уничтожены. Непоколебимая Доблесть была последней оставшейся установкой, защищавшей штаб-квартиру Альянса, но в конце концов была вынуждена отступить. Похоже, её враги решили не преследовать одинокий корабль, зная о его возможностях, и со временем экипаж постепенно покинул его, оставив в автоматизированном режиме обороны.\n\nТеперь корабль повреждён до такой степени, что не может быть отремонтирован. Однако мы смогли извлечь производственную матрицу, отвечавшую за создание новых платформ."
 mem_wpdr.4.a:0 "Отправьте его в наш родной мир."
 mem_wpdr.5.name:0 "Неукротимая Боевая Группа"
 mem_wpdr.5.desc:0 "Мы столкнулись с группой кораблей, расположенных в системе §Y[From.GetName]§!, возглавляемых огромным судном. Сканирование выявило обширные возможности корабля по строительству кораблей, размывающие границы между кораблём и звёздной базой.\n\nАвтоматические сигналы транспондера идентифицируют этот корабль как §SНепоколебимая Доблесть§!, который вместе со своими эскортами образует §SНепоколебимую батальную группу§!. Её намерения кажутся враждебными."
 mem_wpdr.5.a:0 "Эта штука огромна!"
 mem_wpdr_power:0 "Сила УРОП"
