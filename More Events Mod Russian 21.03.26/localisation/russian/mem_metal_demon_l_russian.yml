l_russian:

 mem_metal_demon_site:0 "Хранилище"
 mem_metal_demon_site_desc:0 "Зарытое под горой на века, скрытое хранилище было недавно обнаружено. Любое назначение или создатели вовлечены лишь в догадки на данный момент."
 mem_demon_metal_army:0 "Разумная жидкая сталь"
 mem_demon_metal_army_name:0 "$mem_demon_metal_army$"
 mem_demon_metal_army_desc:0 "Жидкий металл, сформированный и разумный."
 MEM_METAL_DEMON:0 "Связывание демона"
 MEM_METAL_DEMON_DESC:0 "Мы попытаемся подчинить $NAME_Metal_Demon$ нашей воле и преуспеем там, где другие потерпели неудачу."
 NAME_Metal_Demon:0 "Наракасура"
 NAME_mem_metal_demons:0 "$NAME_Metal_Demon$"
 mem_metal_demon_xeno_attraction:0 "Демоническое развлечение"
 mem_metal_demon_study:0 "Эксперименты с рунными цепями"
 mem_metal_demon_sealed:0 "Запечатанный демон"
 leader_trait_mem_metal_demon:0 "Живая металлическая форма"
 leader_trait_mem_metal_demon_desc:0 "Древнее существо, связанное с камнем. Теперь больше разумный металл, чем что-либо ещё."
 leader_trait_mem_metal_demon_bound:0 "Рунные цепи"
 leader_trait_mem_metal_demon_bound_desc:0 "Цепи, чтобы связать существо и сделать его зависимым от наших причуд."
 mem_metal_demon.10.name:0 "Сезам"
 mem_metal_demon.10.desc:0 "Дверь хранилища стоит как памятник, её тяжёлая конструкция вросла в камень, запечатанная так плотно, что даже время не смогло её открыть. Когда команда впервые толкнула её, массивная дверь заскрипела, но едва сдвинулась. Они предположили, что она держалась на месте веками.\n\nПосле месяцев неустанного шлифования, сварки, сломанных инструментов и металлообработки они наконец прорвались сквозь неё. Дверь открылась с неохотным стоном, открывая бездну за ней."
 mem_metal_demon.10.a:0 "Вперёд."
 mem_metal_demon.15.name:0 "Бесконечное пространство"
 mem_metal_demon.15.desc:0 "Длинные этажи и бесконечные коридоры тянулись вниз по спиральному спуску, каждый уровень вырезан в тяжёлую броню. Ни реликвии, ни следов жизни не найдено. Только стены, покрытые резными рунами. Внизу по винтовой лестнице лежит вторая дверь. Даже методы от первой двери были бесполезны. В отличие от первой, эта не была изношена временем."
 mem_metal_demon.15.a:0 "Откройте её."
 mem_metal_demon.20.name:0 "Последнее предупреждение"
 mem_metal_demon.20.desc:0 "Наша команда научилась читать руны на стенах. Чистой случайностью они научились расшифровывать предупреждение, вырезанное поблизости, выцветшее, но нетронутое:\n\n§LНе проходите. То, что лежит за пределами, было запечатано не для того, чтобы быть забытым, а чтобы никогда не быть найденным.§!\n\nДругие руны указывали на механизм для отпирания дверей хранилища. Теперь наша команда ждёт дальнейших инструкций."
 mem_metal_demon.20.a:0 "Откройте двери."
 mem_metal_demon.20.b:0 "Прислушайтесь к предупреждению."
 mem_metal_demon.25.name:0 "За дверями"
 mem_metal_demon.25.desc:0 "Вторая дверь наконец уступила. За ней — небольшая комната. Тихая и без пыли. Безликая, за исключением голоса.\n\n§LВы зашли далеко. Добро пожаловать в мою тюрьму§!"
 mem_metal_demon.25.a:0 "Войдите в комнату."
 mem_metal_demon.30.name:0 "Супружеский визит"
 mem_metal_demon.30.desc:0 "§LГолос обвился вокруг них, как дым, проникая в их умы.§!\n\nЗа вашу храбрость... я предлагаю дар.\n\n§LСтены замерцали. Там, где стоял пустой камень, теперь светилось видение обширных равнин сверкающей руды, рек серебряного металла, который пульсировал, как живой.§!\n\nЖивой металл, §Lпроворчал голос.§! Он дышит, исцеляется, подчиняется. Ваш для взятия. Разбросан по этой планете, как семена в ожидании. Богатство за пределами вашего мелкого воображения.\n\n§LНикто не говорил. Комната была безмолвна.§!\n\nВсё, что я прошу, это одно... освободите меня от этих оков"
 mem_metal_demon_catchphrase:0 "Рождённый из гнева, выкованный ненавистью и связанный завистью."
 mem_metal_demon_backstory:0 "???"
 mem_metal_demon.30.a:0 "Почему мы должны освободить вас?"
 mem_metal_demon.30.a.r:0 "Освободите меня, и я предлагаю вам новый переломный момент для вашей молодой цивилизации. Живой металл, минерал, который дышит, и секреты, зарытые под вашими ногами. Ваш род смотрел на звёзды, но я держу ключи к сокровищнице, зарытой глубоко внутри этого мира."
 mem_metal_demon.30.b:0 "Почему вы заключены здесь?"
 mem_metal_demon.30.b.r:0 "Ах, вы хотите правду за этими холодными стенами? Давным-давно бывшие обитатели этого мира увидели силу во мне, в живом металле, что течёт по этим жилам. Они стремились подчинить меня своей воле, пожинать мои дары без цены. Они не смогли контролировать меня. Поэтому они заковали меня, похоронили заживо в этом хранилище, чтобы гнить во тьме вечность."
 mem_metal_demon.30.c:0 "Как нам освободить вас?"
 mem_metal_demon.30.c.r:0 "Разрушьте цепи, разбейте камень."
 mem_metal_demon.30.d:0 "Ваши цепи рунные?"
 mem_metal_demon.30.d.r:0 "§LРуны, выгравированные в цепях, рассказывают мрачную и поучительную сказку. Они говорят о демоне не как о непонятом узнике, но как о злонамеренной силе, которая процветала на обмане и разрушении. Согласно резьбе, это существо манипулировало древними обитателями мира, шепча обещания власти и богатства, тихо подрывая их общества изнутри.§!"
 mem_metal_demon.30.e:0 "Вы знаете Непрошенных?"
 mem_metal_demon.30.e.r:0 "Ах да, я знаю о тех, кто пришёл извне. О вторженцах, что проскользнули через щели между мирами, одетые в измерения, которые ваши умы едва могут постичь. Они не от этой почвы, не рождённые из грязи и упадка, как вы. Но я только слышал истории тех, кто давно мёртв."
 mem_metal_demon.30.f:0 "Цепи предупредили нас."
 mem_metal_demon.30.f.r:0 "Да, так и есть. И ирония слаще с каждым словом, что вы произносите.\n\nРуны называют меня интриганом, лжецом и предателем. Они говорят о сладких словах и отравленных дарах. Они обвиняют меня в том, что я превратил империю в пепел шёпотом, извратил умы и развратил их святых. Они говорят, что я улыбаюсь, закапывая ножи в спины тех, кто доверяет.\n\nНо позвольте спросить: Кто вырезал эти руны?"
 mem_metal_demon.30.hire.name:0 "Освободить демона"
 mem_metal_demon.30.hire.tt:0 "§RВы уверены?§!"
 mem_metal_demon.30.dismiss.name:0 "Отклонить предложение"
 mem_metal_demon.35.name:0 "Последний ужин"
 mem_metal_demon.35.desc:0 "Время для интриг и шёпота прошло. Я играл эту роль, терпеливый, хитрый, сгибая смертных своей волей обещаниями и загадками. Время для интриг и шёпота прошло. Я солгал ещё раз, но я также сказал правду и дал обещание. Жилы живого металла не под землёй. Они внутри вас, и я позабочусь о том, чтобы каждый последний фрагмент был извлечён.\n\nЯ хочу видеть, как небо почернело от пепла, наблюдать, как почва расколется и закричит. Я хочу слышать молитвы умирающих, поглощённые тишиной. Потому что в этой руине, когда последний памятник упадёт, когда последняя иллюзия разрушится §YЯ вознесусь§!. Не как тень, крадущаяся через умы, но как феникс, возрождённый.\n\nПусть этот мир сгорит. Пусть он подавится дымом собственной гордыни."
 mem_metal_demon.35.a:0 "Отвратительно"
 mem_metal_demon.35.a.tt:0 "§LБесконечные волны жидкого металла выливаются на земли, поглощая всё.§!"
 mem_metal_demon.40.name:0 "Обманутый предатель"
 mem_metal_demon.40.desc:0 "§LТишина....§!\n\nВы.. вы обманули меня.\n\nЯ ждал в этом хранилище века. Связанный, гниющий, шепча сквозь камень и время, заманивая дураков обещаниями власти. Я чувствовал ваше прикосновение. Слышал ваши инструменты. Я вкусил ваше любопытство. Нет разумов для искажения, нет голода, чтобы насытить. Только холодные стены, мёртвый воздух. Тут нет никого на этом мире, не так ли?\n\nВы понимаете, что вы сделали? Вы лишили меня свободы и вознесения. Вы сделали меня богом в гробнице. Штормом, запертым в бутылке.\n\nВы пожалеете об этом. Даже если вы станете пылью, даже если вы станете пеплом, память о вашем обмане не будет забыта.\n\nЯ ещё не закончил."
 mem_metal_demon.40.a:0 "Всё кончено."
 mem_metal_demon.45.name:0 "Последствия"
 mem_metal_demon.45.desc:0 "Сначала живой металл полз из укрытия. Не лился. Не разливался. Он полз. Он цеплялся за стены, распространялся, как жилы по полу, пульсировал, как что-то дышащее. Когда они осознали, было уже слишком поздно. После того как металл начал двигаться и затоплять нашу колонию, обороны быстро отреагировали. Прежде чем были произведены первые выстрелы, уже огромные участки вокруг древнего хранилища были захвачены существами из живого металла.\n\n"
 mem_metal_demon.45.desc.demon:0 "$mem_metal_demon.45.desc$Оборона рухнула в течение нескольких часов. Бункеры пали, не от силы, но от гниения. Машинерия повернулась против своих создателей. В последние дни небо почернело, и начались последние часы."
 mem_metal_demon.45.desc.no_demon:0 "$mem_metal_demon.45.desc$Оборона устояла сильная. Каждый метр, который наши солдаты сражались, чтобы защитить нашу колонию... их дом. В последние дни существа начали разлагаться. Кажется, худшее позади."
 mem_metal_demon.45.a:0 "Наконец-то."
 mem_metal_demon.45.b:0 "Жутко."
 mem_metal_demon.49.name:0 "Имея дело с дьяволом"
 mem_metal_demon.49.desc:0 "Высшее командование признаёт опасности, представляемые $NAME_Metal_Demon$. Однако научная и стратегическая ценность использования его возможностей перевешивает прогнозируемые риски. Если древние цивилизации боялись этого существа, давайте узнаем почему, а затем используем это знание, чтобы контролировать то, что они не могли. Ради прогресса. Ради власти. Ради [owner.GetName]."
 mem_metal_demon.49.a:0 "Связанный демон? Вот это развлечение!"
 mem_metal_demon.49.b:0 "Изучите его."
 mem_metal_demon.49.c:0 "Может ли он быть контролируемым?"
 mem_metal_demon.49.d:0 "Запечатайте хранилище снова."
 mem_metal_demon.50.name:0 "Связанный вновь"
 mem_metal_demon.50.desc:0 "После нескольких неудачных попыток нейтрализации и двух частичных прорывов внутренней камеры хранилища проект был завершён. Первоначальные предположения о том, что демон может быть полностью контролируем, оказались нереалистичными. Вместо этого был авторизован пересмотренный подход: сдерживание через взаимную зависимость. $NAME_Metal_Demon$ останется связанным под усиленным рунным связыванием, которое предназначено сделать его зависимым от нас."
 mem_metal_demon.50.a:0 "Добро пожаловать на борт."
