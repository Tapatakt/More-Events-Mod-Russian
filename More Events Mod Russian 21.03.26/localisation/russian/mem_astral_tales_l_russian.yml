l_russian:

 mem_astral_tales.3.name:0 "Таинственный гость"
 mem_astral_tales.3.desc:0 "Войдя в свой кабинет, [ruler.GetRulerTitle] [ruler.GetName] сразу замечает, что что-то не так. Свет пугающе тусклый, гораздо тусклее, чем обычно. Из углов комнаты выползают тёмные тени, съедающие то немногое, что осталось видимым.\n\nНеожиданно из этих теней появляется фигура в капюшоне, как бы желая воплотить себя в жизнь. С её появлением возвращается и свет.\n\nНезваный гость безмолвно манит [ruler.GetRulerTitle] подойти ближе..."
 mem_astral_tales.3.a:0 "Подойти к фигуре"
 mem_astral_tales.3.b:0 "Вызвать охрану! Тревога, нарушитель!"
 mem_astral_tales.4.name:0 "Посланник"
 mem_astral_tales.4.desc:0 "§HФигура стоит в тишине...§!"
 mem_astral_tales.4.a:0 "Как ты сюда попал?"
 mem_astral_tales.4.a.response:0 "§HСловно отвечая на вопрос [ruler.GetRulerTitle], фигура ненадолго испускает слабую, но заметную ауру псионической энергии.§!"
 mem_astral_tales.4.b:0 "Кто ты?"
 mem_astral_tales.4.b.response:0 "§HВ сознании [ruler.GetRulerTitle] формируется образ, представляющий собой символ [mem_shroudwalker_country.GetName].§!"
 mem_astral_tales.4.c:0 "Почему ты здесь?"
 mem_astral_tales.4.c.response:0 "§HГость в капюшоне раскрывает небольшой металлический предмет, похожий на куб, и аккуратно кладёт его на пол.\n\nФигура медленно делает несколько шагов назад, снова скрываясь в тени, пока не исчезает совсем.§!"
 mem_astral_tales.4.d:0 "Что это?"
 mem_astral_tales.5.name:0 "Путешественник"
 mem_astral_tales.5.desc_02:0 "§HКуб начинает излучать мягкое свечение, вскоре из него проецируется голограмма Орила.§!\n\n Я приветствую тебя, [ruler.GetRulerTitle].\n\n Мне пришлось совершить длинное путешествие, чтобы наконец встретиться с тобой.\n\n§HГолограмма делает намёк на поклон в сторону [ruler.GetName]...§!"
 mem_astral_tales.5.desc_01:0 "§HКуб начинает излучать мягкое свечение, вскоре из него проецируется голограмма неизвестного инопланетянина.§!\n\n Я приветствую вас, [ruler.GetRulerTitle].\n\n Мне пришлось проделать длинное путешествие, чтобы наконец встретиться с вами.\n\n§Голограмма делает намёк на поклон в сторону [ruler.GetName]...§!"
 mem_astral_tales.5.a:0 "Чап'Лин? Это ты?"
 mem_astral_tales.5.b:0 "Кто или что ты?"
 mem_astral_tales.6.desc_01:0 "§HГолограмма слегка наклоняет голову.§!\n\nПолагаю, бинарное обозначение едва ли подойдёт в качестве имени для вашего вида. Эти Теневые ходоки стали называть меня 'Путешественником', с тех пор как моя сфера была выброшена из их Теневого туннеля, и теперь они считают меня каким-то божественным вестником.\n\n§HПутешественник едва заметно подмигивает.§!\n\nНо кто я такой, чтобы поправлять их? Простая голограмма, учёный, даже доктор. Но не теолог, нет. По правде говоря, их невежество оказалось весьма полезным для моих целей и позволило мне быть там, где я должен быть. Но не беспокойтесь, я здесь не для того, чтобы просить вас описать характер вашей медицинской чрезвычайной ситуации. Действительно, вы выглядите вполне здоровы... пока что. Кроме того, моя область знаний лежит совершенно в другом месте."
 mem_astral_tales.6.desc_02:0 "§HОрила слегка наклоняет голову.§!\n\nПрошу прощения. Это имя звучит знакомо, хотя оно не моё.\n\nМоё первоначальное обозначение будет мало полезно для вас. Эти Теневые ходоки стали называть меня 'Путешественником', с тех пор как моя сфера была выброшена из их Теневого туннеля, и теперь они считают меня каким-то божественным вестником.\n\n§HПутешественник едва заметно подмигивает.§!\n\nНо кто я такой, чтобы поправлять их? Простая голограмма, учёный, даже доктор. Но не теолог, нет. По правде говоря, их невежество оказалось весьма полезным для моих целей и позволило мне быть там, где я должен быть. Но не беспокойтесь, я здесь не для того, чтобы просить вас описать характер вашей медицинской чрезвычайной ситуации. Действительно, вы выглядите вполне здоровы... пока что. Кроме того, моя область знаний лежит совершенно в другом месте."
 mem_astral_tales.6.desc_03:0 "§HОсознав возможные последствия, он в приступе смущения качает головой.§!\n\nВовсе нет, я могу вас заверить. Просто когда ты вёл один и тот же разговор тысячу раз и уже знаешь все возможные исходы, ты попытаешься разнообразить его, импровизируя тут и там. Кажется, мои слова были выбраны неудачно. Примите мои извинения."
 mem_astral_tales.6.a:0 "И все же? Это угроза?"
 mem_astral_tales.6.b:0 "В чём же тогда заключается ваша компетенция?"
 mem_astral_tales.6.c:0 "Что вы имеете в виду, говоря «тысячу раз»?"
 mem_astral_tales.7.desc_01:0 "§НПосле жеста рукой вокруг Путешественника возникают многочисленные дисплеи. [ruler.GetName] можем ли обсудить кусочки исторических событий, войны между инопланетными цивилизациями, о которых вы никогда не слышали, планетарные катастрофы, бедствия в масштабах Галактики, смерть и гибель, сменяющиеся возрождением новых цивилизаций. Циклы созидания и разрушения...§!\n\nВидите ли, я представляю собой смесь того, что вы можете охарактеризовать историком, археологом и, наконец, физиком. Однако, я изучаю не прошлое, а настоящее, где бы я ни был, накапливаю знания, что является преимуществом неограниченной жизни.\n\nДалее в дело вступает мой опыт в области физики. Правильно ли я понимаю, что вы, по крайней мере, знакомы с теорией мультивселенной - параллельных реальностей, существующих рядом с нашей? В моём случае это не столько теория, сколько практический вопрос. Существуют и другие плоскости бытия, которые образуют всеохватывающую связь между этими различными реальностями. Из них с двумя, вы знакомы - Покров и астральный план - дом для некоторых неприятных энергетических сущностей, с которыми вы, вероятно, никогда не захотите повстречаться.\n\nЭтим вопросом я задался давно, ещё до того, как получил откровение от своих благодетелей. В каждой реальности существует по крайней мере одна цивилизация, которая является особенной, поскольку высшее существо сосредоточено только на ней.\n\nМоя миссия, данная моими благодетелями, состоит в том, чтобы найти такие цивилизации и связаться с ними, как произошло с вами."
 mem_astral_tales.7.desc_02:0 "§HПутешественник кивает...§!\n\nДействительно, но не только это. Они также влияют на вашу цивилизацию в различных аспектах. Например, вы когда-нибудь принимали решение, которое могло показаться неуместным или нелогичным в то время, но впоследствии привело к лучшему возможному исходу в этой ситуации? Конечно, да.\n\nЭто и есть степень их влияния. Они не связаны нашим восприятием времени и пространства, и некоторые из них даже обладают полным знанием прошлого, настоящего и будущего и используют его для достижения своих целей, к лучшему или к худшему."
 mem_astral_tales.7.desc_03:0 "Мои благодетели хотят передать через вас послание вашему высшему существу. Но знайте, что знание о содержании этого послания может навсегда изменить ваше восприятие реальности. Другие, до вас, ломались под тяжестью его последствий.\n\nВы должны сами решить, принимать это послание или нет."
 mem_astral_tales.7.a:0 "Высшие силы наблюдают за нами?"
 mem_astral_tales.7.b:0 "Тогда почему вы связались именно с нами?"
 mem_astral_tales.7.c:0 "Мы должны знать!"
 mem_astral_tales.7.d:0 "Некоторые вещи лучше оставить неизвестными."
 mem_astral_tales.8.desc_01:0 "§HКак было просьено, Путешественник начинает передавать сообщение, которое он должен был нести...§!\n\nЗдравствуйте, это Малтус из мода More Events Mod говорит.\n\nПрежде всего, позвольте извиниться за это вторжение, но не было другого способа действительно достучаться до вас вне Stellaris. Сообщения на странице в Steam или в других социальных сетях, вероятно, будут замечены лишь немногими. Вы можете быть уверены, однако, что это событие здесь останется единственным разом, когда я обращаюсь к вам напрямую через содержимое нашего мода.\n\nРабота над MEM началась вскоре после выхода Stellaris в 2016 году и была впервые выпущена в Steam в мае того же года, начиная с нескольких дополнительных аномалий и механически базовых событий. Из-за ухода VonMourn из проекта из-за проблем со временем я взял на себя публикацию в мастерской с 18 июля 2016 года — более семи лет назад — и вместе с оставшимися членами команды мы расширили и поддерживали его на протяжении многих обновлений, которые игра получила с тех пор.\n\nМы всегда хотели сделать наш контент максимально погружающим, но всегда имели одну большую проблему. Это художественные ресурсы — будь то 2D или 3D искусство. Никто из нас не является художником, и поиск кого-либо, готового присоединиться к нам, был в основном безуспешным начинанием на протяжении многих лет.\n\nТем не менее, есть один альтернативный путь, если мы хотим достичь целей, которые мы поставили перед собой. §YКомиссии.§! К счастью, мы вышли на контакт с очень талантливым художником, который делает именно это. С самых времён, когда у нас ещё была ссылка на пожертвования PayPal, мы получили около 20$, которые вместе с личными средствами Калигулы и моими пошли на создание портретов парагонов и видов, используемых в моде. Пример вы можете видеть выше этого текста, остальные показаны в разделе изображений нашей страницы мастерской в Steam. В общей сложности мы потратили на это несколько сотен долларов, и я ни о чём не жалею. Однако в какой-то момент нам придётся остановиться, так как наши средства, как и у любого, ограничены.\n\nТем не менее, есть ещё много вещей, которые мы бы хотели добавить в мод, и продолжить сотрудничество с художником. Для этого мы будем полагаться на вашу поддержку.\n\nЕсли вам понравился этот мод, бесчисленные часы работы, которые мы вложили в этот проект, были того стоили. Если вы можете себе это позволить и считаете этот проект достойным вашей поддержки, пожалуйста, посетите нашу страницу мода и сделайте пожертвование на дальнейшее его улучшение. Каждая монета имеет значение, и я благодарен каждому, кто решит нас поддержать.\n\nЯ также хочу воспользоваться моментом, чтобы выразить искреннюю благодарность всем, кто уже сделал это в прошлом. Вы, ребята, мои герои.\n\nСпасибо, что уделили время прочтению всего этого.\n\n§HВыполнив свою задачу Путешественник прощается и дематериализуется вместе со своим кубом...§!"
 mem_astral_tales.8.desc_02:0 "§HПутешественник принимает отказ [ruler.GetName] без намёка на разочарование.§!\n\nВ этом случае я желаю вам всего наилучшего и покидаю вас сейчас. Кстати, я оставил некоторые из своих данных на вашем устройстве хранения для использования по вашему усмотрению.\n\n§HНа мгновение Путешественник смотрит мимо [ruler.GetName] и говорит:§!\n\nЧто было, то будет. Мы встретимся снова в другое время и в другом месте.\n\n§HВскоре после этого он и его куб дематериализуются, и [ruler.GetRulerTitle] снова остаётся один в своём кабинете."
 mem_astral_tales.8.a:0 "Всё это - только игра!?"
 mem_astral_tales.8.b:0 "Прощай, Путешественник."
 mem_astral_tales_otherworldly_knowledge:0 "Потусторонние знания"
