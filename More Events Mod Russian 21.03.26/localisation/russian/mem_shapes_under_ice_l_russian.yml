l_russian:

 mem_shapes_under_ice_category:0 "Загадочные Формы"
 mem_shapes_under_ice_category_desc:0 "Даже с высокой орбиты, на поверхности §Y[Root.GetName]§! видны сотни тысяч странных тёмных пятен. Однако уже после нескольких дней наблюдений, команда корабля заметила постоянные перемены в их форме; одни из них исчезли, другие появились, а некоторые немного сменили положение."
 mem_shapes_under_ice.1.name:0 "Огромные моллюски"
 mem_shapes_under_ice.1.desc:0 "При более тщательном осмотре и запуске зондов под поверхность §Y[From.GetName]§!, §Y[Root.leader.GetName]§! определил, что вся планета покрыта океаном, который в свою очередь покрыт толстым слоем льда. Тем не менее, свет может проникать через огромное покрытие, поддерживая пышную экосистему водных существ. Наиболее примечательны, однако, виновники смещающихся пятен §Y[From.GetName]§!: гигантские наутилоиды, шириной в километры, которые занимают верхнюю ступень в экосистеме мира, без естественных хищников. Особый проект был выдан для более детального изучения этих существ."
 mem_shapes_under_ice.1.a:0 "Какие огромные!"
 MEM_SHAPES_UNDER_ICE_PROJECT:0 "Исследование Моллюсков"
 MEM_SHAPES_UNDER_ICE_PROJECT_DESC:0 "Исследовательская команда обнаружила кишащий жизнью океан подо льдами §Y[From.GetName]§!. Нашим учёным не терпится изучить вид гигантских моллюсков-наутилусов - вершину экосистемы планеты [From.GetPlanetMoon]."
 mem_shapes_under_ice.2.name:0 "Удивительные Моллюски"
 mem_shapes_under_ice.2.desc:0 "После длительного изучения и множества подлёдных экспедиций, команда §Y[Root.GetName]§! обнаружила несколько удивительных вещей о моллюсках. Во-первых, в их организме происходят биологические процессы, вырабатывающие невероятно прочный материал их раковин, который идеален для строительства. Однако, материал можно добыть только убив этих существ. И, что совсем не облегчает задачу, они также демонстрируют зачаточный уровень интеллекта, похожий на интеллект полу-разумных видов. Так же, когда они не держатся на плаву, они очень быстро погружаются на глубину, что делает сбор мёртвых особей невозможным, если только команда не находится рядом во время смерти. Мы будем вынуждены активно истреблять этих существ, если мы хотим получить их раковины."
 mem_shapes_under_ice.2.a:0 "Наши биологи буду рады возможности изучить этих существ."
 mem_shapes_under_ice.2.b:0 "Хоть это и ужасно, их смерть поможет нам."
 mem_shapes_under_ice.2.phile:0 "Давайте посмотрим, насколько они разумны. Попробуйте установить контакт."
 mem_shapes_under_ice.2.mat:0 "Если мы не сможем их собрать, мы можем изучать раковины живых существ."
 mem_shapes_under_ice.99.name:0 "Грязный объектив"
 mem_shapes_under_ice.99.desc:0 "Дальнейшее изучение §Y[From.From.GetName]§! указывает на то, что перемещающиеся темные пятна находятся вовсе не на планете, а всего лишь результат перепада давления, который исказил оптику в объективах §Y[Root.GetName]§!. Техники уже устранили проблему и больше ничего интересного на планете нет."
 mem_shapes_under_ice.99.a:0 "Досадно."
