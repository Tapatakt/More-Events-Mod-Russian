l_russian:

 mem_command_system_category:0 "Сейсмические показания"
 mem_command_system_category_desc:0 "Сейсмические показания сканирования этого мира обнаружили необычное движение глубоко под поверхностью. Хоть и не сравнимая по серьезности с землетрясением, постоянная и продолжительная активность заинтересовала наших ученых."
 mem_command_system.1.name:0 "Подземная Командная Система"
 mem_command_system.1.desc:0 "§Y[From.From.GetName]§! стал миром-могильником примерно 30 000 лет назад согласно радиационным сканам в атмосфере. Под руинами городов и крупных военных объектов одной из крупнейших наций мира наши учёные обнаружили массивные шахты лифтов, ведущие к подземной сети на несколько километров под поверхностью.\n\n§Y[This.leader.GetName]§! сообщает, что эта сеть туннелей и станций представляет собой некую массивную железную дорогу. Похоже, её создатели предназначили эту железную дорогу, которую они назвали 'Система Командования', для использования в качестве своего рода противорадиационного убежища. Постоянно двигаясь, Система Командования могла избежать атаки от проникающих в землю оружий или 'ПЗО'. Однако создатели железной дороги, по-видимому, серьёзно недооценили продолжительность ядерной зимы, а также то, как долго поверхность будет необитаемой из-за радиоактивных осадков. После среднего периода в восемьдесят лет каждый из поездов исчерпал запасы, а их экипажи погибли вскоре после этого.\n\nТеперь заброшенные поезда стучат под поверхностью §Y[From.From.GetName]§!, всё ещё функционируя несмотря на их невероятный возраст. Хотя технологии, вложенные в них, устарели по нашим стандартам, изучение методов, использованных для поддержания их работы десятки тысяч лет спустя, может предоставить нам массу ценной информации."
 mem_command_system.100.name:0 "Фантомные показания"
 mem_command_system.100.desc:0 "После долгих размышлений §Y[This.leader.GetName]§! и экипаж §Y[This.GetName]§! пришли к выводу, что сейсмические показания с §Y[From.From.GetName]§! вызваны не чем иным, как неисправным сейсмографом. С плюсовой стороны, это научило §Y[This.leader.GetName]§! быть более осторожным в будущем при исследовании аномалий; в следующий раз такой просчёт может привести к чьей-то гибели."
 mem_command_system.100.a:0 "На первый раз прощается..."
 d_mem_command_system:1 "Подземная система командная"
 d_mem_command_system_desc:1 "Огромная подземная железнодорожная сеть, предназначенная для размещения военного командования в случае ядерного катаклизма. Первоначальные обитатели давным-давно вымерли."
