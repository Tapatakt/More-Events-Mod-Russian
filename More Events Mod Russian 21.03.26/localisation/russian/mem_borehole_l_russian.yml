l_russian:

 mem_borehole_category:0 "Дыра в земле"
 mem_borehole_category_desc:0 "Сканирование поверхности выявило длинный вертикальный канал в планетарной коре. Точные, правильные углы и необычно гладкая поверхность могут указывать на его искусственное происхождение."
 mem_borehole.1.name:0 "Заброшенная глубокая шахта"
 mem_borehole.1.desc:0 "[Root.leader.GetName] сообщает, что установка представляет собой некую шахту, предназначенную для добычи минералов из глубинных слоёв коры планеты. Шахта в настоящее время деактивирована, и при минимальном ремонте может быть возвращена в строй."
 mem_borehole.1a:0 "Починить оборудование."
 mem_borehole.1b:0 "Разобрать оборудование, нужно узнать об этом побольше."
 mem_borehole.1c:0 "Забрать оборудование на утилизацию."
 mem_borehole.2.name:0 "Разведка редких минералов"
 mem_borehole.2.desc:0 "Выяснилось, что шахта была создана для выработки богатой залежи редкой руды. Однако, как только шахтёры достигли залежи, проект был свёрнут по неизвестным причинам."
 mem_borehole.2a:0 "Нужно изучить их наработки."
 mem_borehole.2b:0 "Похоже, они нашли гарантий."
 mem_borehole.3.name:0 "Ракетная шахта"
 mem_borehole.3.desc:0 "На дне шахты наша научная команда обнаружила огромную ракету, оснащённую самой крупной термоядерной боеголовкой из всех когда-либо зафиксированных. [Root.leader.GetName], однако, предполагает, что это на самом деле не оружие, а какой-то сувенирный проект, поскольку её масса, материальный состав и структура означают, что она не способна лететь, не говоря уже о достижении космической скорости, без разрушения. Однако некоторые инженерные решения всё же весьма интересны."
 mem_borehole.3a:0 "Нужно изучить ракету."
 mem_borehole.4.name:0 "Среда обитания"
 mem_borehole.4.desc:0 "Во время исследования было обнаружено, что стенки шахты состоят из тысяч малых самоподдерживающихся отсеков, оборудованных системой жизнеобеспечения. Большинство из них либо разграблены дочиста, либо никогда не были заселены, но в некоторых до сих пор разбросаны вещи, предположительно, оставленные обитателями в спешке. Необычный архитектурный дизайн отсеков может быть интересным для изучения."
 mem_borehole.4a:0 "Стоит заглянуть."
 mem_borehole.5.name:0 "Отстойник"
 mem_borehole.5.desc:0 "Начальное обследование показало, что ствол почти полностью заполнен высокоэнергетическим радиоактивным шламом. Вероятно, это была свалка промышленных отходов другой цивилизации. [Root.leader.GetName] отказывается продвигаться дальше, ссылаясь на отсутствие веры в способность нашей технологии защиты от опасных материалов спасти [Leader.GetHerHis] и [Leader.GetHerHis] команду от этого 'преступления против природы'."
 mem_borehole.5a:0 "Отвратительно. Но интересно."
 mem_borehole.6.name:0 "Гонка в глубины"
 mem_borehole.6.desc:0 "Научная команда обследовала скважину. Судя по текстуре стенок, она была вырезана мощной лазерной установкой и, по-видимому, достигла расплавленного ядра планеты, не наткнувшись ни на какие особенно полезные залежи. Неподалёку [Root.leader.GetName] обнаружил небольшой передатчик, который давно исчерпал энергию. Предварительный анализ его баз данных показывает, что он должен был транслировать сообщение по всей галактике, хвастаясь тем, что достиг расплавленного ядра планеты раньше конкурентов."
 mem_borehole.6a:0 "Что ж, мои поздравления."
 mem_borehole.7.name:0 "Ничего стоящего"
 mem_borehole.7.desc:0 "[Root.leader.GetName] сообщает, что хотя ствол определённо является искусственной скважиной, он был вычищен дочиста, без каких-либо полезных технологий или минеральных залежей для извлечения."
 mem_borehole.8.name:0 "Это ловушка!"
 mem_borehole.8.desc:0 "Во время исследования скважины на [From.GetName] §Y[Root.leader.GetName]§! по-видимому, активировал какую-то ловушку, вызвав обрушение всей структуры, что привело к гибели [Leader.GetHerHim] и большей части [Leader.GetHerHis] команды."
