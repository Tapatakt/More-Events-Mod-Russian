l_russian:

 mem_laser_rifle: "Выветренная лазерная винтовка"
 mem_laser_rifle_desc_short: "Эта древняя и, по-видимому, массово производимая винтовка включает несколько продвинутых технологий"
 mem_laser_rifle_desc_details: "Она была найдена на [From.From.GetName], безжизненной планетоиде, отмечая безымянную могилу инопланетного солдата среди бесчисленных других. Этот конкретный экземпляр — лучше всего сохранившийся образец своего рода и высоко ценимый объект исследования."
 mem_mecha: "Обломки меха"
 mem_mecha_desc_short: "Сломанные обломки двуногой боевой машины, найденные на [From.From.GetName]"
 mem_mecha_desc_details: "Эта машина символизирует мечты многих наших инженеров настоящего и прошлого. Несмотря на общее понимание всех недостатков, которые такой дизайн приносит с собой, жители его мира полностью отдавались этой концепции, как показывают его обширные поля боя, усыпанные этими машинами."
 mem_psionic_debris: "Псионические обломки"
 mem_psionic_debris_desc_short: "Кусок случайных обломков, найденных на [From.From.GetName]"
 mem_psionic_debris_desc_details: "Визуально ничем не примечательный для невооружённого глаза, этот кусок обломков — как и остальная поверхность планеты, с которой он взят — был псионически отпечатан умирающими мгновениями целой цивилизации. Непрерывное присутствие в непосредственной близости от этого объекта приводит к видениям этого события."
 mem_datacore: "Датакор временной капсулы"
 mem_datacore_desc_short: "Обширный архив, найденный внутри спутника на орбите [From.From.From.GetName]"
 mem_datacore_desc_details: "Предназначенный как гарантия сохранения их истории, культуры и всего остального, что делало их теми, кем они были, жители обречённого мира создали этот датакор среди ряда точных копий, чтобы те, кто придёт и найдёт их мир, знали, кем они были, и они не были забыты."
 mem_crystal_core: "Вазуранский датакор"
 mem_crystal_core_desc_short: "Устройство хранения данных, полученное во время штурма станции Звёздный Трон"
 mem_crystal_core_desc_details: "Хотя повреждённое во время битвы, это устройство всё ещё содержит огромную информацию о структурном дизайне вазуранских кораблей. Эти знания должны помочь нам в увеличении структурной целостности наших собственных судов."
 mem_crawler_statue: "Статуя ползуна"
 mem_crawler_statue_desc_short: "Вручена нам в качестве доказательства относительно предполагаемой 'демонической' природы нашего питомца-ползуна вместе с твёрдой просьбой никогда не возвращать её"
 mem_crawler_statue_desc_details: "Эта, по-видимому, древняя каменная статуя имеет замечательные сходства с нашим маленьким гостем. От её общей формы до количества придатков и структуры её жвал статуя является почти жутко точным изображением. На самом деле некоторые думали, что это настоящий экземпляр, перекрашенный и приклеенный к основанию, но сканирование подтвердило, что он сделан из цельного куска твёрдого камня. Какой бы так называемый культист ни создал её, он, должно быть, был мастером своего искусства. Тем не менее, вполне возможно, что другие цивилизации имели встречи с экземплярами вида ползунов в прошлом. Почему он был изображён в таком негативном свете, однако, остаётся предметом дискуссий, так как мы никогда не наблюдали никаких агрессивных тенденций от нашего на самом деле довольно кроткого гостя до сих пор."
 mem_lichen_sample: "Небесные аскомицеты"
 mem_lichen_sample_desc_short: "Ранее неизвестный и особый вид лишайника, найденный на [From.From.GetName]"
 mem_lichen_sample_desc_details: "Теперь обычно называемые 'космическими грибами', этот симбиотический комбинат гриба и цианобактерий — гипер-стойкая форма жизни даже по сравнению с его земными аналогами."
 mem_holo_projector: "Блок гологенератора"
 mem_holo_projector_desc_short: "Голографическая проекционная установка, найденная на орбите [From.From.GetName] среди многих других её вида"
 mem_holo_projector_desc_details: "Что примечательно в этой машине, так это не её технология сама по себе — мы могли бы добиться подобных эффектов с нашей собственной техникой. Однако тот факт, что эти проекторы, должно быть, функционировали непрерывно тысячи лет без сбоев, впечатляет."
 mem_military_reports: "Сводка обороны"
 mem_military_reports_desc_short: "Составленный отчёт и анализ битв, сражённых на [event_target:mem_plants_vs_zombies_planet.GetName]"
 mem_military_reports_desc_details: "Любопытно, что каждый отчёт, по-видимому, был написан одним и тем же растеноподобным индивидом, идентифицирующим себя как командир Листья Осени. Эти документы детализируют различные тактики для максимизации потерь противника и минимизации дружеских жертв при защите против подавляющих сил."
 mem_aevum_beard: "Вечная борода Аэвума"
 mem_aevum_beard_desc_short: "Когда $NAME_mem_aevum_time_lord$ расстался с нами и жизнью, мы побрили его в последний раз. Достаточно странно, борода, по-видимому, не стареет"
 mem_aevum_beard_desc_details: "Поистине великолепная борода, совершенно невиданная в любом моллюскоидном виде, с которым мы когда-либо сталкивались, даже среди собственных Аэвума. Можно с уверенностью сказать, что её существование само по себе является аномалией."
