l_russian:

 d_mem_abandoned_mecha:0 "Кладбище Роботов"
 d_mem_abandoned_mecha_desc:0 "Огромное количество обломков разрушенных боевых машин продолжает вдохновлять наших инженеров."
 mem_abandoned_mecha_category:0 "Необычные Структуры"
 mem_abandoned_mecha_category_desc:0 "На планете [From.GetName] ядерная зима, длящаяся, согласно радиометрическому анализу, уже около 800 лет. Она покрыта руинами некогда процветавшей здесь цивилизации. Однако многие из них, заметные даже с орбиты, не похожи на ранее найденные нами археологические памятники."
 mem_abandoned_mecha.10.name:0 "Заброшенные Мехи"
 mem_abandoned_mecha.10.desc:0 "Похоже, что цивилизации, ныне прекратившие существование на [From.GetName], находились в состоянии глобального конфликта задолго до изобретения ядерного оружия. Согласно данным учёного [Root.leader.GetName], ещё до того как ядерная технология могла быть теоретически разработана, цивилизации на [From.GetName] прилагали значительные усилия к созданию более крупных и смертоносных образцов обычного вооружения. В частности, они разработали бронированные двуногие, трёхногие и четвероногие машины, похожие на танки [root.owner.GetSpeciesNamePlural]. [Root.leader.GetName] окрестил это оружие «меха».\n\nМы расшифровали записи, указывающие, что после нескольких десятилетий ведения войны с помощью этих машин была открыта ядерная реакция. Баланс сил изменился, и атомное оружие было незамедлительно разработано. Так как у сторон не было времени накопить большие запасы (и тем самым сформировать концепцию взаимно гарантированного уничтожения), бомбы были сброшены сразу же, как только стали доступны, что заставило эти цивилизации на собственном опыте узнать о долгосрочных последствиях такого оружия.\n\nТеперь заброшенные меха покрывают поверхность. Хотя большая часть технологий, найденных в руинах, устарела с нашей точки зрения, меха предоставляют совершенно новый взгляд на механику. Поскольку так много из них можно найти наполовину построенными, полностью целыми и наполовину разрушенными, у нас есть множество возможностей для их исследования."
 mem_abandoned_mecha.20.name:0 "Необычные руины"
 mem_abandoned_mecha.20.desc:0 "Необычные руины на [From.From.GetName] оказались ни чем иным как... необычными руинами. Кажется, что их вымершие создатели обладали странным архитектурным стилем. К сожалению, здания слишком сильно испорчены временем для их изучения."
 mem_abandoned_mecha.20.a:0 "Ну что ж."
