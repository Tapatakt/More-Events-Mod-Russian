 mem_ceaseless_lost_probes_title:0 "Павшие разведчики"
 mem_ceaseless_lost_probes_desc:0 "Ни храбрые, ни трусливые, эти зонды были созданы с одной целью и только одной: составить карту неизвестного и уничтожить враждебные формы жизни — тем самым обеспечив безопасность Алкрийской Империи. На протяжении веков все, кроме одного, прекратили свои операции. Давайте вернём то, что от них осталось."
