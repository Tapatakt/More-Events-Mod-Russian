l_russian:

 origin_mem_ceaseless_gaze: "Непрекращающийся Взгляд"
 origin_mem_ceaseless_gaze_desc: "В далёком прошлом эта цивилизация смогла запустить множество разведывательных зондов, которые отслеживали развитие вселенной. Катастрофа уничтожила их старую цивилизацию и её космические возможности, и теперь они готовы снова выйти к звёздам."
 origin_tooltip_mem_ceaseless_gaze: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_pc_relic'] (Размер: £planetsize£ 43)$TABBED_NEW_LINE$- Дополнительные £blocker£ §YПрепятствия§!$NEW_LINE$- Родная система: Рядом ['concept_mem_ceaseless_mirror_system']$NEW_LINE$- Цепочка событий для извлечения §YЗондов типа 'Непрекращающийся Взгляд'§!$NEW_LINE$- Доступ к специальному типу субъекта ['concept_mem_ceaseless_outer_holds']"
 START_SCREEN_MEM_CEASELESS_GAZE: "Наши далёкие предки, хотя и более чем способные к космическим путешествиям, решили не покидать наш мир. Вместо этого они построили серию сложных зондов, способных обнаруживать и нейтрализовать инопланетные угрозы, и отправили их в неизвестность. Их первым великим открытием была завораживающая система, граничащая с нашей собственной, содержащая аномальную и нестабильную червоточину, соединяющую её с множеством систем.\n\nИспользуя эту червоточину, их зонды быстро распространились в дальние уголки нашей галактики. В своей вере, что надлежащее галактическое наблюдение сохранит их в безопасности, они стали самоуспокоенными, не подозревая о по-настоящему чуждых опасностях, скрывающихся там. Их конец, должно быть, пришёл быстро и неожиданно, так как нет документации о событиях, которые привели к катаклизму, разрушившему их цивилизацию. Была ли это внутренняя или внешняя угроза, остаётся для нас загадкой.\n\nВ течение столетий, которые потребовались нам для восстановления, зонды класса 'Непрекращающийся Взгляд' путешествовали далеко по галактике. Со временем, вероятно, большинство из них либо сломались, либо были уничтожены. Сегодня только один продолжает отправлять свои регулярные обновления местоположения. Не так давно он вернулся на [Capital_Scope.GetName], подавая отчёты, которые мы не смогли расшифровать, и запрашивая новые приказы от своих мёртвых создателей. Хотя мы много раз пытались разумно воздействовать на его ИИ, он не признал нас законными преемниками Алкрийской Империи, которая когда-то построила его.\n\nТеперь мы снова способны покинуть пределы нашего родного дома. Мы намерены не повторять тех же ошибок, что и старая Империя."
