 MEM_CEASELESS_PROBE_SIGNATURE_PROJECT_DESC:0 "Мы нашли след другого зонда. Мы должны взять его на ближайшее рассмотрение, чтобы идентифицировать его и вернуть всё, что принадлежит нам."
