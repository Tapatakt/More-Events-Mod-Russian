 pc_mem_ceaseless_star_desc:0 "Гигантская червоточина с аппетитом к свободному материалу и кораблям. Сильное гравитационное притяжение создаёт большое напряжение на корпусах кораблей."
 NAME_mem_mirror_hall_system:0 "Великая Пасть"
