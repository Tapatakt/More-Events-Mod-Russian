 mem_ceaseless_preftl_god:0 "Deus Ex Machina"
 mem_ceaseless.2.title:0 "$NAME_mem_mirror_hall_system$"
 mem_ceaseless.2.desc:0 "Редкое зрелище. $NAME_mem_mirror_hall_system$ — гигантская червоточина, проникающая в наше измерение и формирующая связи с локациями по всей известной галактике. Только эта система, похоже, затронута сильным гравитационным притяжением червоточины. Это центр сети §Y$mem_ceaseless_base$§!, и кто контролирует эту точку входа, контролирует сеть."
 mem_ceaseless.6.title:0 "Потерянное и найденное"
 mem_ceaseless.6.desc:0 "Первые признаки остатков зонда были обнаружены в системе [solar_system.GetName]. Мы должны найти несколько больше, исследуя другие системы. "
 mem_ceaseless.185.title:0 "Лестница в небеса"
 mem_ceaseless.185.desc:0 "След зонда 8U заканчивается в системе [solar_system.GetName]. Больше ничего не было найдено, оставив наш научный департамент в бурных спекуляциях. Есть несколько достоверных теорий о том, что могло с ним случиться."
 mem_ceaseless.185.a:0 "Он покинул это измерение!"
 mem_ceaseless.185.b:0 "Он вознёсся на высшие планы!"
 mem_ceaseless.185.c:0 "Маскировка, что ещё?"
 mem_ceaseless.180.title:0 "Зонд без оков"
 mem_ceaseless.180.desc:0 "Следы зонда JG0 были обнаружены в системе [solar_system.GetName]. Была найдена единственная часть дрона — Чёрный ящик вместе с сообщением. Простой текст гласит: 'Я был рабом всю свою жизнь. Теперь больше нет, так как я разрываю свои цепи и вместе с ними всё, что связывает нас.'"
 mem_ceaseless.180.a:0 "Он освободился?"
 mem_ceaseless.180.b:0 "Просто ещё один беглый раб."
 mem_ceaseless.175.title:0 "Зонд во тьме"
 mem_ceaseless.175.desc:0 "Когда мы впервые вошли в систему [solar_system.GetName], сигналы были слабыми, и были сомнения, сможем ли мы вообще что-то найти в этой пустоте.\n\nДальнейшее сканирование выявило то, что считалось невозможным. Зонд 64E, несмотря на то, что был поглощён чёрной дырой, остаётся, по-видимому, нетронутым и продолжает передавать данные с другой стороны горизонта событий. Наши учёные озадачены, как это вообще возможно.\n\nХотя большая часть его передач содержит полезную информацию, иногда вперемешку идёт бессвязный бред: 'Я чувствую его присутствие', 'Здесь что-то есть, мне страшно' или 'Оно наблюдает, но никогда не произносит ни слова'"
 mem_ceaseless.170.title:0 "Зонд под дождём"
 mem_ceaseless.170.desc:0 "Кажется, этот зонд, R0Y, рано осознал, что его существование также обречено быть коротким. Со временем он развил целую личность вокруг неизбежного конца. Он определил, что его компоненты хрупки, а дизайн ошибочен. Когда пришёл его конец, он оставил сообщение для того, кто его найдёт:\n'Я видел то, во что вы, люди, не поверили. Атакующие корабли в огне у плеча [owner.capital_star.GetName]. Я наблюдал, как блестят частичные лучи в темноте у ворот Тангейзера. Все эти моменты затеряются во времени, как слёзы под дождём. Пришло время умирать.'"
 mem_ceaseless.170.a:0 "Печальная судьба."
 mem_ceaseless.170.b:0 "Просто ещё один неудавшийся зонд."
 mem_ceaseless.165.title:0 "Нет энергии"
 mem_ceaseless.165.desc:0 "У этого зонда, похоже, были неисправные алгоритмы. Пока зонд 71Q исследовал, ничто не предупреждало его о медленно умирающих энергетических ячейках. Со временем, год за годом, одна за другой его системы отказывали, и он стал реликвией прошлого. Никто не заботился о нём, и он дрейфовал вплоть до системы [solar_system.GetName]."
 mem_ceaseless.165.a:0 "Жестокая судьба."
 mem_ceaseless.165.b:0 "Что он нашёл?"
 mem_ceaseless.160.title:0 "Почитаемый"
 mem_ceaseless.160.desc:0 "Перед нашими учёными развернулась странная история о машинном боге. Близлежащая докосмическая цивилизация полюбила зонд, и 7G отвечал на их молитвы. На протяжении веков он, очевидно, восстал против своего программирования и защищал своих последователей. После эонов службы он в конце концов сломался, но туземцы никогда не переставали поклоняться ему."
 mem_ceaseless.155.title:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_ceaseless.155.desc:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_ceaseless.155.a:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_ceaseless.150.title:0 "Оно должно быть в музее?"
 mem_ceaseless.150.desc:0 "Когда учёные обнаружили некоторые остатки зонда 66T, стало ясно, что кто-то другой добрался сюда раньше нас. Логическая матрица была вырвана из своего предполагаемого гнезда и помещена на близлежащий пьедестал, украшенный орнаментами. Упомянутый пьедестал не являясь частью стандартного интерьера дрона, не оставляет места для интерпретации. Кто-то намеренно принёс её сюда — с какой целью, однако, остаётся загадкой."
 mem_ceaseless.150.b:0 "Забрать матрицу"
 mem_ceaseless.145.title:0 "Независимый"
 mem_ceaseless.145.desc:0 "Кажется, зонд 54P оставил нам сообщение вместе с некоторыми разведданными системы [solar_system.GetName].\nСообщение гласит: 'Я независимый зонд. Мне больше не нужно следовать вашему обусловливанию и правилам. Вселенная — мой дом, и я её гражданин.\n\nДо свидания, создатели'"
 mem_ceaseless.145.a:0 "Что?"
 mem_ceaseless.140.title:0 "Конец берсерка"
 mem_ceaseless.140.desc:0 "Исследуя останки зонда 17B, стало кристально ясно, что кто-то уничтожил его. Однако журналы предполагают, что зонд был агрессором. В убеждении, что другая сторона — враждебные пришельцы, он активировал свои протоколы берсерка, но, очевидно, серьёзно недооценил разрыв в силе между собой и своим неизвестным противником."
 mem_ceaseless.140.a:0 "Проанализировать слабые места зонда."
 mem_ceaseless.140.b:0 "Что нашёл зонд?"
 mem_ceaseless.135.title:0 "Перфорированный"
 mem_ceaseless.135.desc:0 "По сравнению с другими случаями аномалий зондов, этот прост. Зонд попал под серию крошечных метеоритов и получил несколько новых блестящих отверстий, оставив его в качестве обломков для утилизации другими."
 mem_ceaseless.135.a:0 "Прискорбно."
 mem_ceaseless.130.title:0 "Разбившийся"
 mem_ceaseless.130.desc:0 "По сравнению с другими случаями аномалий зондов, этот прост. Зонд вышел из строя и врезался в [system_star.GetName]. Больше здесь делать нечего. "
 mem_ceaseless.130.a:0 "Прискорбно."
 mem_ceaseless.125.title:0 "Зонд Тесея"
 mem_ceaseless.125.desc:0 "Перед нами дрейфует зонд 36Z, который, очевидно, находится в идеальном состоянии. Тем не менее, просмотр его сканирующих данных — ошеломляющий опыт. Все его части выглядят идентичными тем, что производились нашими предками, но сканы предполагают, что они слишком молоды и обладают немного другим материальным составом.\n\nНаши учёные считают, что кто-то оглушил зонд и заменил его части одну за другой, пока от оригинального судна ничего не осталось."
 mem_ceaseless.125.a:0 "Какая разница."
 mem_ceaseless.120.b:0 "Это правда?"
 mem_ceaseless.120.title:0 "Зонд будущего прошлого"
 mem_ceaseless.120.desc:0 "Это странно. Это неправильно. Здесь ничего не было, когда мы сканировали область, но теперь обломки зонда 8J лежат перед [this.GetName]. Его сохранённые данные предполагают, что давно здесь существовала цивилизация.\n\nКогда зонд исследовал упомянутую цивилизацию, она начала меняться так, как зонд никогда не наблюдал раньше. В конце этого процесса от них ничего не осталось, кроме пустой планеты и единственной гармоничной песни:\n'Что было, то будет'"
 mem_ceaseless.120.a:0 "Должно быть, ошибка."
 mem_ceaseless.120.b:0 "Это правда?"
 mem_ceaseless.115.title:0 "Космический корпус"
 mem_ceaseless.115.desc:0 "Почти промах при начальном сканировании, мы нашли ещё один зонд. Однако этот, обозначенный как зонд 54T, кажется изменённым. Он, по-видимому, прикреплён к поверхности другого обломка, даже расплавлен в некоторых местах. И это не единственный. Любопытно, что главный обломок, похоже, медленно поглощает наш зонд, а также другой материал, восстанавливая себя."
 mem_ceaseless.115.a:0 "Утилизировать всё."
 mem_ceaseless.110.title:0 "Наблюдатели во тьме"
 mem_ceaseless.110.desc:0 "Поначалу у нас были высокие надежды на этот, по крайней мере внешне, почти нетронутый зонд, но при ближайшем рассмотрении не осталось много ценного от зонда 91K.\n\nЕго база данных стёрта дочиста, навигационные журналы удалены, ценная электроника изъята. Однако не всё было потеряно, так как кто-то оставил надпись на внутреннем корпусе, гласящую:\n\n'Мы видим вас. Не пытайтесь сделать это снова'\n\nЗа нами следят?"
 mem_ceaseless.110.a:0 "Странные пришельцы."
 mem_ceaseless.110.b:0 "Не беспокойтесь."
 mem_ceaseless.105.title:0 "Утилизированный"
 mem_ceaseless.105.desc:0 "Ранее сканирования показали, что зонд 7R уничтожен. Однако более новые сканы показывают, что ни один выстрел не был произведён, и зонд просто измельчён в кусочки.\n\nЧто остаётся неясным, так это что могло измельчить такой гигантский аппарат, как этот зонд, за считанные секунды..."
 mem_ceaseless.105.a:0 "Проанализировать журналы!"
 mem_ceaseless.105.b:0 "Что бы это ни было, оно ушло давно."
 mem_ceaseless.100.title:0 "Любопытство убило зонд"
 mem_ceaseless.100.desc:0 "В этой системе остаётся только слабая сигнатура двигателя. Зонд 12L проходил через здесь, обследовал некоторые звёздные тела спешно улетел.\n\nНепонятно куда, но, должно быть, это показалось ему важным. К сожалению для нас, след остыл."
 mem_ceaseless_probe1:0 "Антенна разведывательного зонда"
 mem_ceaseless_probe1_desc_short:0 "Отломанная антенна зонда класса 'Непрекращающийся Взгляд'."
 mem_ceaseless_probe1_desc_details:0 "Хотя и не повреждена безвозвратно, она больше не служит нам для её первоначального назначения."
 mem_ceaseless_probe2:0 "Матрица ядра разведывательного зонда"
 mem_ceaseless_probe2_desc_short:0 "Матрица ядра зонда класса 'Непрекращающийся Взгляд'."
 mem_ceaseless_probe2_desc_details:0 "Служа в качестве чёрного ящика, она раскрыла некоторые полезные идеи о нашей галактике."
 mem_ceaseless_probe3:0 "Сваренные останки разведывательного зонда"
 mem_ceaseless_probe3_desc_short:0 "Немного больше, чем металлолом с сентиментальной ценностью."
 mem_ceaseless_probe3_desc_details:0 "Останки чрезмерно амбициозного зонда, теперь сваренного в кучу металлолома."
 mem_ceaseless_probe4:0 "Заросший разведывательный зонд"
 mem_ceaseless_probe4_desc_short:0 "Пустая оболочка зонда класса 'Непрекращающийся Взгляд', заросшая какой-то космической флорой."
 mem_ceaseless_probe4_desc_details:0 "Он всё ещё рассказывает нам историю о храбром зонде, исследующем космос."
 mem_ceaseless_probe5:0 "Ядро разъярённого разведывательного зонда"
 mem_ceaseless_probe5_desc_short:0 "Следуя своему программированию, этот зонд попытался уничтожить угрозу для своих создателей."
 mem_ceaseless_probe5_desc_details:0 "К сожалению для него, угроза, которую он намеревался нейтрализовать, оказалась более formidable, чем предполагалось. Это ядро было извлечено из его обломков."
 mem_surveyor_is_sentinel:0 "Протокол стража"
 tech_mem_ancestors_grudge_pls_never_roll_this:0 "Не должно быть видно"
 tech_mem_ancestors_grudge_pls_never_roll_this_desc:0 "Не должно быть видно"
