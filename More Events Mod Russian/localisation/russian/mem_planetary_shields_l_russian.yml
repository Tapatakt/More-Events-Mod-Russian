l_russian:

 building_mem_planetary_shield_generator:0 "Генератор планетарного щита"
 building_mem_planetary_shield_generator_desc:0 "$tech_planetary_shield_generator_desc$"
 building_mem_planetary_shield_generator_heavy:0 "Генератор барьерного планетарного щита"
 building_mem_planetary_shield_generator_heavy_desc:0 "Это усовершенствованный генератор планетарного щита, полученный из наших исследований древних миров."
 building_mem_planetary_shield_generator_orila:0 "Генератор прекурсионного планетарного щита"
 building_mem_planetary_shield_generator_orila_desc:0 "Древний и высокотехнологичный планетарный щит с встроенным источником энергии. Его технологии опережают наши на тысячи лет...\n\nВозможно, мы не сможем воспроизвести эти технологии, но наши инженеры должны уметь их §Yдемонтировать§!, чтобы вновь, затем §Yсобрать§! на другой планете по нашему выбору."
 tech_mem_planetary_shield_generator_heavy:0 "Модернизированный барьерный щит"
 tech_mem_planetary_shield_generator_heavy_desc:0 "Основываясь на наших собственных исследованиях полевых разработок, а также на наших предыдущих исследованиях технологии защиты предтеч, группа наших ученых выдвинула перспективную концепцию дизайна для обновленной версии наших собственных генераторов планетарных щитов."
 tech_mem_planetary_shield_generator_orila:0 "Обслуживание щита предтеч"
 tech_mem_planetary_shield_generator_orila_desc:0 "Технология, лежащая в основе этого генератора щита, далеко за пределами наших возможностей для воссоздания. Тем не менее, с нашим элементарным пониманием его мы сможем разобрать и собрать его заново там, где сочтём нужным."
 mem_planetary_precursor_shield:0 "Деградированный планетарный щит предтеч"
 mem_planetary_precursor_shield_desc:0 "Этот мир защищён древним щитом предтеч. Мы обнаружили деградировавшую инфраструктуру генератора и могли бы попытаться полностью восстановить её здесь или переместить на другую из наших колоний."
 mem_planetary_precursor_shield_storms:0 "$mem_planetary_precursor_shield$"
 mem_planetary_precursor_shield_storms_desc:0 "$mem_planetary_precursor_shield_desc$"
 decision_mem_planetary_precursor_shield_restoration:0 "Восстановить генератор щита предтеч"
 decision_mem_planetary_precursor_shield_restoration_desc:0 "Мы восстановим деградировавшую инфраструктуру генератора и получим один строительный набор для повторной сборки там, где мы этого пожелаем."
 mem_planetary_shields.15.name:0 "Восстановление завершено"
 mem_planetary_shields.15.desc:0 "Работа над деградированным генератором щита предтеч на [root.GetName] завершена. Теперь мы сможем собрать его заново там, где пожелаем."
