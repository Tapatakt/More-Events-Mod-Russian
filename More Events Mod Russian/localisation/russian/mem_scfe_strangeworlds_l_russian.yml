l_russian:

 d_mem_woorskyr_hub: "Узел Вурскайра"
 d_mem_woorskyr_hub_desc: "Гигантское дерево, выше гор и больше городов, его корни связаны со всеми остальными деревьями на планете. Разгадать, как это получилось, — мечта любого ботаника."
 d_mem_beetle_swarm: "Жуки-зрокаты"
 d_mem_beetle_swarm_desc: "Колония энергичных, полуразумных кротких жуков. Легко дрессируются, чтобы использовать псионические способности для усиления сенсорных возможностей."
 d_mem_koeleothan: "Коэлеотаны"
 d_mem_koeleothan_desc: "Дикие косяки коэлеотанов, демонстрирующие слабую связь сознания между собой. При надлежащем обучении и дрессировке их потенциал может значительно возрасти."
 d_mem_quantumpearl: "Квантовые жемчужины"
 d_mem_quantumpearl_desc: "Красивые и крупные, эти жемчужины демонстрируют квантовую связь со всеми остальными жемчужинами."
 d_mem_xenograss: "Ксенотрава"
 d_mem_xenograss_desc: "Очень выносливая инопланетная трава, возможно, внегалактического происхождения; полезна благодаря своей, казалось бы, неразрушимости в самых враждебных условиях и быстрому росту."
 building_mem_woorskyr_biofuel_refinery: "Биотопливный завод Вурскайра"
 building_mem_woorskyr_biofuel_refinery_desc: "Дерево Вурскайр можно использовать как завод для превращения воды и биомассы в полезные минералы и природное топливо."
 building_mem_woorskyr_bioenergy_plant: "Биоэнергетическая установка Вурскайра"
 building_mem_woorskyr_bioenergy_plant_desc: "Дерево Вурскайр способно превращать воду и минералы в густое древесное вещество, которое легко преобразуется в энергию."
 building_mem_woorskyr_growth_monitoring_center: "Монитор роста Вурскайра"
 building_mem_woorskyr_growth_monitoring_center_desc: "Объект, отслеживающий здоровье и рост дерева, а также выявляющий любые угрозы обитателям и устраняющий их, прежде чем они станут опасными."
 building_mem_woorskyr_barkfarm: "Кора-ферма Вурскайра"
 building_mem_woorskyr_barkfarm_desc: "Акры фермерской жизни на упругой коре дерева Вурскайр."
 building_mem_woorskyr_ship_foundry: "Кораблестроительная верфь Вурскайра"
 building_mem_woorskyr_ship_foundry_desc: "Когда биоцемент соприкасается с древесиной Вурскайра, древесина впитывает биоцемент и затвердевает в прочный и пластичный сплав. Этот материал может усилить многие компоненты корпусов гражданских кораблей и станций, значительно сокращая время и стоимость строительства."
 building_mem_xenograss_processor: "Переработчик ксенотравы"
 building_mem_xenograss_processor_desc: "Ксенотрава выращивается, а затем перерабатывается в биоцемент — разновидность цемента, которую можно запрограммировать, а затем он растёт, как растение, через фотосинтез. Это полезно для дешёвого строительства на изолированных планетах, но необходимое время роста цемента замедляет процесс."
 building_mem_koeleothan_effect_platform: "Платформа эффекта коэлеотанов"
 building_mem_koeleothan_effect_platform_desc: "Плавучий исследовательский центр. Здесь наши ксенобиологи наблюдают за коэлеотанами и обучают их для социологических исследований. Коэлеотанов также разводят на пищу — поскольку они размножаются миллионами в день, перелов не будет проблемой."
 building_mem_consciousness_amplifier: "Усилитель единства сознания"
 building_mem_consciousness_amplifier_desc: "Возможность создания этого сооружения была обнаружена случайно: приглашённый для изучения квантовых жемчужин эксперт имел в багаже аквариум с коэлеотанами. Сознание коэлеотана поглощается, отражается и усиливается квантовыми жемчужинами, значительно увеличивая радиус и мощь их влияния. При правильной приманке и достаточном количестве квантовых жемчужин и коэлеотанов мы сможем воздействовать на поведение всей нашей империи из этого сооружения."
 building_mem_pearl_borehole_site: "Скважина жемчужин"
 building_mem_pearl_borehole_site_desc: "Глубокая скважина для приближения к месту происхождения квантовых жемчужин. Это требует невероятной инженерной экспертизы, поскольку мы достигаем невиданных ранее планетарных глубин. Ценой этого продвижения являются некоторые тектонические и атмосферные возмущения, снижающие обитаемость планеты.\n\n§RМожно построить только при залежи квантовых жемчужин.§!"
 building_mem_pearl_borehole_site_2: "Скважина жемчужин II"
 building_mem_pearl_borehole_site_2_desc: "Глубокая скважина для приближения к месту происхождения квантовых жемчужин. Это требует невероятной инженерной экспертизы, поскольку мы достигаем невиданных ранее планетарных глубин. Ценой этого продвижения являются некоторые тектонические и атмосферные возмущения, снижающие обитаемость планеты.\n\n§RМожно построить только при залежи квантовых жемчужин.§!"
 building_mem_pearl_borehole_site_3: "Скважина жемчужин III"
 building_mem_pearl_borehole_site_3_desc: "Глубокая скважина для приближения к месту происхождения квантовых жемчужин. Это требует невероятной инженерной экспертизы, поскольку мы достигаем невиданных ранее планетарных глубин. Ценой этого продвижения являются некоторые тектонические и атмосферные возмущения, снижающие обитаемость планеты.\n\n§RМожно построить только при залежи квантовых жемчужин.§!"
 building_mem_beetle_sensor: "Тренировка сенсорных жуков-зрокатов"
 building_mem_beetle_sensor_desc: "Центр мониторинга и обучения, знакомящий жуков-зрокатов с нашими сенсорными системами, предоставляя им соответствующие стимулы в виде угощений; так мы можем научить их вести себя определённым образом."
 building_mem_beetle_sensor_2: "Зрокатская обсерватория"
 building_mem_beetle_sensor_2_desc: "$building_mem_beetle_sensor_desc$"
 tech_mem_koeleothan_utilization: "Использование коэлеотанов"
 tech_mem_koeleothan_utilization_desc: "Исследование жизненного цикла и использования рыб коэлеотанов предложено несколькими ведущими ксенобиологами. Как только мы закрепимся на планете, где они есть, сможем начать исследовать моря."
 tech_mem_quantumpearls_exploitation: "Эксплуатация квантовых жемчужин"
 tech_mem_quantumpearls_exploitation_desc: "Квантовые жемчужины — уникальная геологическая аномалия, имеющая некую квантовую связь друг с другом. Мы можем научиться эксплуатировать их, но, возможно, никогда не узнаем всей правды о них, поскольку они расположены близко к ядру планеты, до которого нам предстоит добраться."
 tech_mem_xenograss_harvesting: "Сбор ксенотравы"
 tech_mem_xenograss_harvesting_desc: "Богатая минералами и выносливая ксенотрава, найденная пока лишь на одной планете, может обеспечить уникальные биологические строительные возможности."
 tech_mem_woorskyr_habitation: "Обитание на Вурскайре"
 tech_mem_woorskyr_habitation_desc: "Планирование пространства и использование уникального дерева Вурскайр. Наши научные сообщества имеют идеи по использованию для своих областей."
 tech_mem_beetle_exploitation: "Тренировка жуков-зрокатов"
 tech_mem_beetle_exploitation_desc: "После лабораторных исследований и полевых испытаний мы завершили планы по использованию жуков-зрокатов."
 mem_scfe_mem_woorskyr_world.1.name: "Возвышаясь над горами"
 mem_scfe_mem_woorskyr_world.1.desc: "Команда наших лучших ботаников, направленная на §Y[From.GetName]§!, открыла интригующие сведения о ныне названном дереве Вурскайр. Их первое открытие показывает, что это не единичное существо; скорее, все деревья на планете связаны обширной корневой сетью, и других крупных растений не наблюдается. Во-вторых, центральное дерево, самое большое, зафиксированное нашим обзором, настолько велико, что в его структуре могут поместиться целые города. Этот потенциал побудил наших ботаников предложить инновационную идею: превратить ствол и его прочную плотную структуру в центр обитания и исследований. Они отмечают, что дерево достаточно устойчиво, чтобы выдержать значительные модификации для этой цели. Кроме того, на коре дерева процветает множество мелких растений, живущих симбиотически, что открывает дополнительные возможности для изучения."
 mem_scfe_mem_woorskyr_world.1.a: "Это очень большое дерево."
 mem_scfe_mem_woorskyr_world.1.b: "Джекпот."
 mem_scfe_mem_woorskyr_tree_network: "Сеть Вурскайра"
 mem_scfe_mem_woorskyr_tree_network_desc: "Массивная древесная сеть, с главным узлом выше гор и больше городов, корни связаны со всеми деревьями, образуя единое растение, которое значительно усиливает способность фильтровать и очищать атмосферу, а также стабилизировать тектоническую нестабильность."
 mem_scfe_mem_koeleothan.1.name: "Движущиеся массы под волнами"
 mem_scfe_mem_koeleothan.1.desc: "Длительное наблюдение за §Y[From.GetName]§! привело к идентификации масс как рыб, проявляющих базовую форму коллективного сознания при объединении в косяк. Экспедиционная команда утверждает, что эти рыбы вряд ли разовьют интеллект сверх простых инстинктов, в основном из-за обильной популяции и относительно несложной океанской среды. Тем не менее, несмотря на то, что они всего лишь животные, их уникальные способности, как ожидается, будут весьма полезны в различных применениях при дальнейших исследованиях."
 mem_scfe_mem_koeleothan.1.a: "Вселенная бесконечно странна."
 mem_scfe_mem_xenograss.1.name: "Инопланетные поля"
 mem_scfe_mem_xenograss.1.desc: "Завершив обширное полевое исследование, команда обследования теперь уверена, что изученная трава инопланетна для §Y[From.GetName]§!. Её уникальность заключается в биологических свойствах, отличных от любой другой флоры, с которой мы сталкивались. Эти свойства потенциально полезны как для ботанических наук, так и для методов строительства. Ожидается, что дальнейшие исследования раскроют, как именно можно реализовать эти преимущества."
 mem_scfe_mem_xenograss.1.a: "Фиолетовая трава. Что дальше?"
 mem_scfe_quantumpearl.1.name: "Мир тысячи миров"
 mem_scfe_quantumpearl.1.desc: "При более детальном изучении тайна §Y[From.GetName]§! была разгадана — причиной является объект, похожий на камень, самоцвет или, точнее, жемчужину. Это открытие вызвало бурную дискуссию среди наших геологов и биологов о её истинной природе. Тем временем наши физики, заинтригованные её уникальными свойствами, назвали её §HКвантовая жемчужина§!. Удивительно, но эта жемчужина, по-видимому, квантово связана с каждой другой подобной жемчужиной. Когда наши сканы обнаружили одну, они одновременно обнаружили все, что объясняет всплеск множественных показаний. В исследовательском сообществе теперь ощутимое волнение желанием глубже изучить загадку этой Квантовой жемчужины и раскрыть её секреты."
 mem_scfe_quantumpearl.1.a: "Квантовая жемчужина? Это должно быть хорошо, верно?"
 mem_scfe_mem_beetleswarm.1.name: "Ждущий жук"
 mem_scfe_mem_beetleswarm.1.desc: "Завершив полевое исследование жуков, наши исследователи сделали увлекательное открытие: насекомое, ныне названное жуком-зрокатом, обладает псионическими способностями. Оно способно расширять своё сенсорное восприятие далеко за пределы физического мира. Более того, благодаря уникальному биологическому составу жук-зрокат может быть без проблем интегрирован в наши существующие сенсорные системы при соответствующей дрессировке."
 mem_scfe_mem_beetleswarm.1.a: "Пусть наблюдают, а мы учимся."
 mem_scfe_mem_beetleswarm.1.b: "Несомненно, дар божественный."
 mem_scfe_strange_events.1.name: "Катаклизмическая цепная реакция"
 mem_scfe_strange_events.1.desc: "Когда Колосс наводит своё оружие на планету, над экипажем сгущается напряжённое молчание. Планета, богатая квантовыми жемчужинами, начинает реагировать ещё до того, как оружие полностью зарядится. Жемчужины, чувствительные к огромной энергии, начинают резонировать, их свечение усиливается.\nКогда Колосс наконец высвобождает ярость, энергетический луч поражает планету, запуская цепную реакцию, не имеющую аналогов. Квантовые жемчужины экспоненциально усиливают мощь оружия, создавая ослепительный всплеск энергии. Происходит колоссальный взрыв, поглощающий и планету, и Колосса в сияющем аду.\nКогда свет меркнет, ничего не остаётся там, где некогда был уникальный мир и символ имперской мощи. Квантовые жемчужины в своём последнем акте уничтожили и планету, и Колосса, оставив после себя зловещую пустоту как напоминание о разрушительной силе жадности и агрессии."
 mem_scfe_strange_events.2.desc: "Команда на Колоссе отдаёт приказ активировать оружие с чувством торжественности. Оно начинает encapsulate планету, богатую квантовыми жемчужинами, в непроницаемый барьер, отсекая её от остальной галактики. Однако по мере формирования щита происходит неожиданная реакция.\nУникальная энергетическая подпись щита непредсказуемо взаимодействует с квантовыми жемчужинами, которые начинают резонировать с частотой щита. Этот резонанс нарастает неконтролируемо, создавая петлю обратной связи с нарастающей мощью.\nКогда щит замыкается вокруг планеты, энергия достигает критической точки. В катастрофический момент планета взрывается, усиленная квантовыми жемчужинами. Взрыв разрушает зарождающийся щит и поглощает Колосса в разрушительной волне энергии.\nПоследствия оставляют пустоту там, где некогда была планета неведомой ценности, теперь утраченная навсегда."
 mem_scfe_strange_events.10.name: "Падение величайшего дерева"
 mem_scfe_strange_events.10.desc: "Когда Колосс занимает позицию над планетой, экипаж молчит, осознавая надвигающуюся утрату. Цель — мир, не похожий ни на какой другой, дом дерева Вурскайр — гигантского организма, возвышающегося над горами и простирающегося шире городов. Его корни, сеть жизни, связывают каждое дерево на планете, символ единства и природного чуда.\nПланетарный дробитель активируется, его луч пронзает атмосферу. В мгновение ока великолепное дерево вместе с планетой, к которой оно прикреплено, поглощается ослепительным светом. Взрыв стремителен, стирая дерево и его мир из существования.\nУничтожение дерева Вурскайр, чуда галактики и свидетельства чудес жизни, посылает волны скорби сквозь звёзды. Его утрата — не просто конец одного организма, но угасание символа взаимосвязанности и нераскрытых тайн природного мира. В его отсутствие галактика теряет часть своего чуда и величия, пустоту, которую невозможно заполнить."
 mem_scfe_strange_events.11.desc: "Нейтронный Колосс готовится открыть огонь; его цель — не просто любой мир, а мир, укрывающий дерево Вурскайр, гигантский символ природной связи. Когда оружие разряжается, волна смертельных нейтронов окутывает планету, проникая в каждый слой её хрупкой экосистемы.\nПод прямым воздействием радиации дерево Вурскайр страдает невыносимо. Его массивная форма, некогда тянувшаяся к небесам, начинает увядать и разлагаться с тревожной скоростью. Нейтроны разрушают его клеточную структуру, обезжизнивая за считанные мгновения.\nНо разрушение не ограничивается деревом. Нейтронный обстрел, беспощадный и тщательный, опустошает всю экосистему, от которой зависело Вурскайр. Связанная сеть жизни, некогда яркая и процветающая, превращается в бесплодную пустошь. Хрупкое равновесие, поддерживавшее Вурскайр и бесчисленные другие виды, необратимо разрушено.\nГибель дерева Вурскайр и его мира — мрачное свидетельство разрушительной силы, применённой без учёта сложного гобелена жизни."
 mem_scfe_strange_events.12.desc: "Когда воды поднимаются под натиском Колосса, дерево Вурскайр, чудо галактики своим огромным размером и глубокой связью с жизненной сетью планеты, сталкивается с беспрецедентной угрозой. Наводнение погружает планету, переполняя её корни и утопая замысловатый лесной массив, который оно поддерживает.\nСтремительное и резкое изменение среды оказывается слишком суровым для дерева Вурскайр и его экосистемы. Дерево, не способное адаптироваться к новым водным условиям, погибает от наводнения. Когда-то величественный организм и связанный с ним лес исчезают под волнами, не оставив следа былой славы.\nЗатопление планеты, создавая среду обитания для водной жизни, обходится дорогой ценой. Утрата дерева Вурскайр и его уникальной экосистемы — трогательное напоминание о хрупком равновесии природы и последствиях резких экологических изменений, звучащее как предостережение по всем звёздам."
 mem_scfe_strange_events.13.name: "Отравлённые корни"
 mem_scfe_strange_events.13.desc: "Колосс, предвестник экологической гибели, нацеливается на планету дерева Вурскайр — колоссальной формы жизни, чьи корни связывают мировую флору в симбиотическом объятии. Оружие начинает испускать поток ядовитых веществ, предназначенных для разрушения и опустошения живых экосистем.\nКогда токсичная мгла окутывает планету, некогда пышный и процветающий мир претерпевает ужасающую трансформацию. Токсины проникают в почву, воздух и воду, делая среду враждебной для большинства форм жизни. Дерево Вурскайр, маяк природного единства и силы, не может противостоять ядовитому натиску.\nДерево, некогда возвышавшееся выше гор и шире городов, начинает увядать и разлагаться. Его некогда яркие листья становятся хрупкими и опадают, могучий ствол поддаётся гниению, а обширные корни, связанные со всей жизнью на планете, ссыхаются и умирают. Яд Токсификатора оказывается слишком силён, и дерево Вурскайр вместе с гармоничной экосистемой, которую оно поддерживало, погибает.\nПревращение планеты в ядовитую пустошь Токсификатором — мрачное напоминание о хрупком равновесии природы и катастрофических последствиях применения такой разрушительной силы. Гибель дерева Вурскайр, некогда символа взаимосвязанности жизни, теперь служит свидетельством разрушительного воздействия экологического вмешательства, оставляя мир, где могут выжить лишь самые стойкие и ядовитые формы жизни."
 mem_scfe_strange_events.20.name: "Гибель коэлеотанов"
 mem_scfe_strange_events.20.desc: "Когда планетарный дробитель Колосса заряжается, предчувствие грядущей гибели охватывает тех, кто знает о надвигающейся катастрофе. Океанический мир, дом рыб коэлеотанов, не подозревает о своей судьбе.\nКогда оружие разряжается, катаклизмическая сила раскалывает планету. В считанные мгновения океаны закипают, а безмятежная красота океанического мира превращается в адское пекло. Коэлеотаны, некогда чудо псионических явлений, уничтожены мгновенно."
 mem_scfe_strange_events.21.desc: "Экипаж на Колоссе наблюдает, как заряжается оружие нейтронного обстрела, его смертельный луч готов очистить жизнь на океаническом мире внизу.\nКогда луч окутывает планету, океан не даёт укрытия. Нейтроны проникают глубоко, достигая каждого уголка водных глубин. В считанные мгновения яркие псионические сигнатуры рыб коэлеотанов угасают в ничто, погашенные неумолимым натиском.\nВымирание безмолвно и всеохватывающе. Не остаётся и следа уникального присутствия коэлеотанов, их потенциал и тайны навсегда утрачены в холодных глубинах их некогда яркого мира. Этот акт разрушения посылает зловещее послание по всей галактике: даже самая скрытая и защищённая жизнь не вне досягаемости такой подавляющей силы."
 mem_scfe_strange_events.22.name: "Токсичные приливы"
 mem_scfe_strange_events.22.desc: "Некогда первозданные и яркие океаны планеты начинают меняться, отравленные непрекращающимся потоком токсинов. Чистые голубые воды превращаются в мутные, ядовитые лужи, враждебные хрупкому балансу жизни, который они некогда питали. Рыбы коэлеотаны, чувствительные к окружению и зависимые от чистоты своего водного царства, сталкиваются с беспрецедентным бедствием.\nПо мере проникновения токсинов в глубины псионические крики коэлеотанов эхом разносятся по водам — хор отчаяния и страдания. Один за другим они погибают в отравленных водах, их способность к псионической связи угасает в тишину. Океан, некогда колыбель псионических чудес, становится могилой для коэлеотанов.\nПревращение их мира в токсичную пустошь Колоссом — мрачное свидетельство разрушительной силы, применённой без предусмотрительности, оставляя некогда процветающую планету как предостерегающий символ утраты и опустошения."
 mem_scfe_strange_events.30.name: "Гибель жуков-зрокатов"
 mem_scfe_strange_events.30.desc: "Когда активируется планетарный дробитель, разрушительный луч нацеливается на планету, пронзая её атмосферу. Поверхность раскалывается, и в считанные мгновения мир разлетается на осколки. Взрыв абсолютен, не оставляя следа некогда процветающей планеты или её уникальных обитателей.\nЖуки-зрокаты с их экстраординарными сенсорными способностями и нераскрытым псионическим потенциалом погибают мгновенно. Их уникальное восприятие космоса и возможные прозрения в псионическую сферу исчезают вместе с ними. Галактика остаётся с зловещей пустотой, напоминанием о знаниях и чуде, которые погибли вместе с жуками-зрокатами."
 mem_scfe_strange_events.31.name: "Стойкость зрокатов"
 mem_scfe_strange_events.31.desc: "Когда Колосс готовится открыть огонь по планете, разворачивается неожиданное явление. Жуки-зрокаты, населяющие этот мир, наделённые полуразумом и псионическими способностями, как будто чувствуют надвигающийся разряд смертельной радиации.\nКогда нейтронные лучи заливают планету, жуки выходят из своих укрытий, поднимаясь на более высокие возвышенности. Удивительно, но вместо того чтобы погибнуть от летального воздействия радиации, они греются в ней, как в летнем солнце. Уникальная биология жуков, по-видимому, не только выдерживает нейтронный обстрел, но и черпает из него какое-то питание или удовольствие.\nКогда Колосс прекращает бомбардировку, жуки-зрокаты возвращаются к обычной деятельности, кажущиеся невредимыми и нетронутыми. Зрелище этих существ, процветающих после того, что должно было стать катаклизмом, озадачивает наблюдателей.\nЭтот неожиданный поворот подчёркивает загадочные и разнообразные адаптации жизни в галактике. Жуки-зрокаты со своей загадочной стойкостью к нейтронному обстрелу становятся объектом интриги и изучения, символизируя неумирающую силу жизни даже перед лицом, казалось бы, непреодолимых вызовов."
 mem_scfe_strange_events.32.desc: "Когда Колосс активируется, он обрушивает поток воды, поглощающий планету. Ландшафты оказываются затоплены, океаны расширяются, резко меняя окружающую среду. Жуки-зрокаты, приспособленные к наземной среде и зависимые от определённых экологических условий, сталкиваются с немедленной экзистенциальной угрозой.\nНесмотря на свои псионические способности, жуки плохо приспособлены для выживания в водном мире. По мере затопления их среды обитания их псионические сигналы ослабевают, сигнализируя о борьбе и неизбежной гибели. Жуки, некогда способные к экстраординарному сенсорному восприятию, оказываются переполнены неумолимым приливом, не в состоянии адаптироваться к стремительно меняющемуся миру."
 mem_scfe_strange_events.33.name: "Токсичный конец зрокатов"
 mem_scfe_strange_events.33.desc: "Когда токсины просачиваются в биосферу планеты, окружающая среда претерпевает резкую и смертельную трансформацию. Разнообразные среды обитания, некогда поддерживавшие богатую жизнь, включая жуков-зрокатов, становятся непригодными. Воздух становится едким, почва бесплодной, а источники воды — токсичной жижей.\nЖуки-зрокаты, несмотря на свою стойкость и уникальные способности, не находят убежища от распространяющегося яда. Их псионические сигналы, некогда яркое присутствие на планете, начинают тускнеть и в конечном итоге угасают. Жуки, не способные адаптироваться к стремительно ухудшающимся условиям, погибают, а их мир превращается в ядовитую пустошь."
 mem_scfe_strange_events.40.name: "Рассеивание ксенотравы"
 mem_scfe_strange_events.40.desc: "Колосс нацеливается на мир, уникальный наличием ксенотравы — стойкой фиолетовой травы, известной тем, что процветает в суровых условиях ударов астероидов. Когда оружие высвобождает свою разрушительную мощь, планета раскалывается, катаклизм, который кажется концом ксенотравы.\nОднако среди опустошения происходит замечательное явление. Осколки разрушенной планеты, унося с собой семена и пряди стойкой ксенотравы, разлетаются в глубины космоса. Эти остатки становятся небесными кочевниками, обречёнными дрейфовать по вселенной.\nПройдут миллионы лет, и в конечном итоге некоторые из этих осколков найдут новый дом, врезавшись в далёкие планеты. В этих новых инопланетных средах семена ксенотравы начнут прорастать. Преодолевая все трудности, фиолетовая трава вновь поднимется, окрашивая новые миры своим ярким оттенком."
 mem_scfe_strange_events.41.name: "Непреклонная ксенотрава"
 mem_scfe_strange_events.41.desc: "Цель Колосса — мир, покрытый ксенотравой, уникальной стойкой фиолетовой флорой, способной выживать в самых суровых условиях, даже в космосе веками.\nКогда нейтронные лучи заливают планету, экосистема претерпевает катастрофический сдвиг. Многие формы жизни погибают от радиации, их хрупкое равновесие разрушено безвозвратно. Однако среди этой волны разрушения ксенотрава остаётся удивительно нетронутой.\nИнтенсивный поток нейтронов, смертельный для большинства форм жизни, кажется несущественным для ксенотравы. Она стоит непоколебимо, её яркий фиолетовый оттенок не тускнеет. Эта флора, уже адаптированная к суровости космических лучей и пустоты космоса, переносит нейтронный обстрел как лёгкий бриз."
 mem_scfe_strange_events.41.a: "Они действительно стойкие."
 mem_scfe_strange_events.42.name: "Трансформация ксенотравы"
 mem_scfe_strange_events.42.desc: "Колосс нацеливается на планету, известную обширными полями ксенотравы, стойкой фиолетовой травы. Когда Колосс высвобождает свою силу, потоки воды обрушиваются вниз, стремительно превращая сушу в океаническое царство.\nСреди этого резкого экологического потрясения ксенотрава демонстрирует поразительную способность к адаптации. Погружённая под вновь образованные океаны, она претерпевает быструю биологическую трансформацию. Некогда травоподобная флора реорганизует свою структуру и состав, превращаясь в форму водорослей.\nЭтот новый водный вариант ксенотравы не только выживает в затоплении, но начинает процветать в подводной среде. Она распространяется по океанским днам, создавая обширные ярко-фиолетовые луга под волнами, и становится свидетельством выдающейся приспособляемости жизни."
 mem_scfe_strange_events.43.desc: "Колосс нацеливается на мир, покрытый ксенотравой, стойкой фиолетовой травой, способной процветать в экстремальных условиях. Когда он высвобождает свой токсичный груз, по планете начинает распространяться драматическая трансформация.\nОкружающая среда быстро ухудшается под воздействием ядовитых веществ, делая планету враждебной для большинства форм жизни. Однако среди этого экологического потрясения ксенотрава демонстрирует замечательную приспособляемость. Столкнувшись с токсичным натиском, она запускает быстрый процесс мутации.\nКсенотрава, теперь подвергнутая суровым ядовитым условиям, изменяет свою биологическую структуру, чтобы не только выжить в токсичности, но и использовать её. Трава трансформируется, приобретая новые характеристики, позволяющие ей поглощать и метаболизировать токсичные элементы, превращая некогда смертельную среду в источник питания.\nЭта экстраординарная адаптация ксенотравы превращает планету в уникальную экосистему, где мутировавшая трава процветает среди токсичности."
