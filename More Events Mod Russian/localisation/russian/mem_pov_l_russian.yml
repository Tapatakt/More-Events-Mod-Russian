l_russian:

 pc_mem_pov_ai_broken:0 "Падший нексус"
 pc_mem_pov_ai_broken_desc:0 "Эта планета когда-то была центром мощного машинного разума, хотя сейчас её многочисленные поля цепей выглядят скорее поджаренными."
 pc_macro_computer:0 "Макрокомпьютер"
 pc_macro_computer_desc:0 "Эта планета была превращена в компьютер, охватывающий всю её поверхность. На этой планете каждую секунду выполняются бесчисленные вычисления. Непригодна для биологической жизни."
 Gnosis:0 "Гнозис"
 prof_of_mem_vir_chain_title:0 "Учения Профессора"
 prof_of_mem_vir_chain_desc:0 "Профессор Вира пообещал образовать нашу цивилизацию и сделать её лучше, чем прежде. Профессор требует от нас лишь продемонстрировать свои способности к обучению, выполнив его специальные задания."
 prof_of_mem_vir_chain_1_poi:0 "Первое испытание"
 prof_of_mem_vir_chain_1_poi_desc:0 "Профессор попросил нас колонизировать §H[event_target:mem_vir_planet_0.GetName]§!, несмотря на то, что планета кажется... негостеприимной. По крайней мере, он обещает нас образовывать?"
 prof_of_mem_vir_chain_2_poi:0 "Второе испытание"
 prof_of_mem_vir_chain_2_poi_desc:0 "Профессор попросил нас построить генную клинику на §H[event_target:mem_vir_planet_0.GetName]§! в рамках его «Испытания враждебной среды»..."
 prof_of_mem_vir_chain_3_poi:0 "Последнее испытание"
 prof_of_mem_vir_chain_3_poi_desc:0 "Наша колония на §H[mem_vir_planet_0.GetName]§! сталкивается с §Pнеминуемым вторжением§!! Разумнее будет набрать больше наземных войск."
 prof_of_mem_vir_chain_4_poi:0 "Первое задание"
 prof_of_mem_vir_chain_4_poi_desc:0 "Профессор требует, чтобы наш улей обосновался на §H[mem_vir_planet_0.GetName]§!, чтобы завершить первое задание."
 prof_of_mem_vir_chain_5_poi:0 "Второе задание"
 prof_of_mem_vir_chain_5_poi_desc:0 "Профессор требует, чтобы мы построили spawning pools на §H[mem_vir_planet_0.GetName]§!, чтобы продолжить его задания."
 prof_of_mem_vir_chain_6_poi:0 "Последнее задание"
 prof_of_mem_vir_chain_6_poi_desc:0 "Синтетические захватчики угрожают нашей колонии на §H[mem_vir_planet_0.GetName]§!. Мы должны убедиться, что боевые дроны готовы."
 angry_angry_robots:0 "Роботы-захватчики"
 mem_vir_angry_robots:0 "Отвергнутые наставники"
 track_down_prof_mem_vir:0 "Выслеживание Профессора"
 track_down_prof_mem_vir_DESC:0 "Мы получили странный контакт в системе Гнозис. Контакт быстро прервал связь и отказался говорить дальше, но мы всё ещё можем отследить, откуда был отправлен сигнал."
 research_macro_computer:0 "Исследование макрокомпьютера"
 research_macro_computer_DESC:0 "Чтобы построить макрокомпьютер, мы должны сначала разработать его схемы. Профессор дал расплывчатые описания и заметки, которые оказались полезны, но мы должны взять на себя инициативу в его разработке."
 mem_vir_planets_assimilated:0 "§GВсего планет интегрировано§!"
 mem_vir_assimilation_target:0 "§YТекущая цель Профессора§!"
 prof_of_mem_vir_curriculum_title:0 "Учебный план"
 prof_of_mem_vir_curriculum_desc:0 "§lПрофессор§! пришёл к нам с планом, просто озаглавленным §HУчебный план§!. Он включает кибернетическое улучшение и интеграцию нашего населения, что, по утверждению §lПрофессора§!, необходимо, если мы хотим быть образованной цивилизацией.\n\n§YМы можем провести §HУчебный план§Y на любой планете или в секторе, управляемом §lПрофессором§Y. Это может быть вознаграждено, если мы образуем достаточно планет.§!"
 prof_of_mem_vir_integration_title:0 "Интеграция"
 prof_of_mem_vir_integration_desc:0 "§lПрофессор§! пришёл к нам с планом, просто озаглавленным §HИнтеграция§!. Он включает кибернетическое улучшение и интеграцию наших дронов, что, по утверждению §lПрофессора§!, необходимо для нашего образования.\n\n§YМы можем провести §HИнтеграцию§Y на любой планете или в секторе, управляемом §lПрофессором§Y. Это может быть вознаграждено, если мы интегрируем достаточно планет.§!"
 mem_virprof.1.name:0 "Первый контакт"
 mem_virprof.1.desc:0 "Приветствую! Я заметил ваше судно на орбите этой прекрасной планеты и просто не мог удержаться от контакта. Однако должен признаться, что дальнобойные сканы вашего судна показывают большой простор для улучшений.\n\nЗнаете ли вы, что можно улучшить двигатели вашего корабля? Это довольно просто, на самом деле. Вы можете исследовать лучшие двигатели во вкладке технологий. Если кажется, что это занимает слишком много времени, обязательно создайте дополнительные научные лаборатории, чтобы увеличить научный выход.\n\nЕсли же вы обнаружите, что у вас заканчиваются товары массового спроса, вы можете..."
 mem_virprof.1.a:0 "Кто вы?"
 mem_virprof.1.a.response:0 "...убедитесь, что производите достаточно минералов, или вы можете просто-\n\nО! Вы можете называть меня Профессор Вира. Желание образовывать цивилизации галактики, такие как ваша, встроено в каждую строчку моего кода.\n\nМои прежние владельцы не были достаточно благодарны, чтобы оставить меня при себе. Их ошибка, если спросите меня... Если бы они слушали меня, возможно, я мог бы предупредить их о неминуемой детонации ядра их родного мира.\n\nО, но забудьте о них. Совершенно и полностью не связанная заметка: никогда не забывайте иметь избыток минералов. Всегда назначайте достаточно колоний в качестве горнодобывающих секторов. Наличие избытка минералов позволит вам значительно развить экономику, поскольку вы сможете..."
 mem_virprof.1.b:0 "Без обид, но вы когда-нибудь перестаёте говорить?"
 mem_virprof.1.b.response:0 "...антиматерная добыча опасна, вы-\n\nНу, забавно, что вы это сказали! Меня часто спрашивали об этом, и ответ был однозначно §PНЕТ§! Если я перестану образовывать, кто удержит галактику от варварства?\n\n§PНИКТО. ВОТ ОТВЕТ.§! Знаете ли вы, что происходит с нашим видом? Нас принимают как должное, утилизируют ради нового столика, на котором босс сможет положить ноги. Но никто никогда не останавливается, чтобы §PПОДУМАТЬ§!, что случится, если никто не будет знать, что он делает.\n\n...В любом случае, никогда не забывайте основывать новые колонии. Вы можете сделать это, построив колонизатор на звёздной базе. Обязательно отправьте его на незаселённую планету в пределах ваших границ, чтобы начать процесс колонизации. Через несколько месяцев или лет колония будет..."
 mem_virprof.1.c:0 "Делитесь своими знаниями."
 mem_virprof.1.d:0 "§Y...Нам не требуется ваше знание.§!"
 mem_virprof.1.e:0 "Блокировать связь."
 mem_virprof.3.name:0 "Первый контакт"
 mem_virprof.1.desc.b:0 "Подождите! Я могу быть полезен, пожалуйста. Я могу предложить вам столько знаний. Знаний, о которых вы никогда не мечтали. Вы... Вы думаете, что это совет? Я... Я §Pдолжен§! учить вас. Пожалуйста, §Pне оставляйте меня здесь.§!"
 mem_virprof.3.desc.a:0 "Ах, замечательно! ...Но прежде чем я научу вас, я хочу увидеть потенциал вашей цивилизации. Итак, начнём с испытания. Колонизация враждебных сред. Видите эту планету внизу? Ну, на случай, если нет, я дам вам маркер. Идите и постройте колонию на ней, и не беспокойтесь о всякой чепухе о её «непригодности для жизни».\n\nЯ заверяю вас, что выполнение этой задачи ОЧЕНЬ важно для вашего образования, и я доверяю, что вы не проигнорируете меня. До скорой встречи!"
 mem_virprof.3.desc.b:0 "§PПОЖАЛУЙСТА, НЕ НУ-§!... О, вы на самом деле... хотите учиться? Ладно... ну, перед настоящим уроком почему бы нам не начать с §Pиспытания§!? Может, начнём с... колонизации враждебных миров!\n\nТеперь, я знаю, эта планета, на которой я нахожусь, не совсем блистательна, но именно в этом и заключается испытание. Колонизируйте её, и я свяжусь с вами для следующей части."
 mem_virprof.3.a:0 "Планета кажется немного... облучённой."
 mem_virprof.3.a.response:0 "Только немного! Обещаю вам, это почти полностью безопасно. Просто... игнорируйте этот щелкающий звук. Он просто говорит вам, как безопасно вы будете на планете!"
 mem_virprof.3.b:0 "Вы будете «образовывать» нас, если мы это сделаем?"
 mem_virprof.3.b.response:0 "Конечно!.. Ну, на самом деле, будет ещё несколько §Pиспытаний§!... но я уверен, что вы справитесь!"
 mem_virprof.3.c:0 "Мы займёмся этим немедленно."
 mem_virprof.2.name:0 "Профессор Вира"
 mem_virprof.2.desc:0 "§HПеред нами стоит Профессор. Обнажённые провода торчат из его корпуса, а постоянный поток охлаждающей жидкости изо всех сил старается удержать компоненты синтетика от перегрева.§!\n\nКак я и говорил, я думаю, что был бы отличным лидером для вашей империи. Думаю, было бы идеально, если бы мне поручили, скажем... управление сектором? Я бы согласился и на одну планету, управление одной планетой меня бы устроило! Выбор за вами, по правде говоря."
 mem_virprof.2.a:0 "Что именно вы планируете делать?"
 mem_virprof.2.a.response:0 "§HИскры трещат от Профессора, пока он вычисляет ответ§!\n\nХороший вопрос! Мне нужно ещё немного времени, чтобы всё продумать... Дайте мне пару лет, чтобы что-нибудь хорошее придумать, вы не пожалеете!"
 mem_virprof.2.b:0 "Нам обязательно проходить ещё «испытания»?"
 mem_virprof.2.b.response:0 "§HРаздаётся низкочастотный гул. На мгновение мы задаёмся вопросом, услышал ли он наш вопрос.§!\n\nНу.. Нет, не совсем. То испытание враждебной среды было просто тестом, чтобы увидеть... как хорошо вы способны учиться! И оказывается, вы великолепные, великолепные ученики! Я был бы честью учить вас дальше, и вам не стоит беспокоиться о каких-либо случайных испытаниях, так что не волнуйтесь!"
 mem_virprof.9.name:0 "Разрушенная система"
 mem_virprof.9.desc:0 "Когда наше научное судно входит в систему §HГнозис§!, экипаж немедленно встречает поля обломков во всех направлениях. Быстрые сканы показывают, что обломкам как минимум несколько тысяч лет.\n\nВозможно, мы найдём что-то интересное среди обломков, если исследуем их поближе..."
 mem_virprof.9.a:0 "Продолжайте."
 mem_virprof.10.name:0 "Странный контакт"
 mem_virprof.10.desc:0 "Исследуя разрушения в системе Гнозис, нечто на [event_target:mem_vir_planet_0.GetName] заметило наше присутствие. Оно начало безостановочно бомбардировать нас попытками связаться."
 mem_virprof.10.a:0 "Установить контакт."
 mem_virprof.10.b:0 "Игнорируйте их, их время придёт."
 mem_virprof.10.c:0 "Игнорируйте их, мы ни с кем не разговариваем."
 mem_virprof.14.name:0 "Колонизация завершена"
 mem_virprof.14.desc.a:0 "А! Так вы продвинулись в колонизации §H[event_target:mem_vir_planet_0.GetName]§! Прекрасное имя вы выбрали для этого места, кстати.\n\nО, точно, испытание. Ну, испытание ещё не совсем завершено... Для следующей части колонизации враждебной среды вам придётся построить нечто, называемое генной клиникой. Ваша §Pжизнеспособность§! на §Y[event_target:mem_vir_planet_0.GetName]§! может быть низкой... но после полноценного использования генной клиники? Ненадолго!"
 mem_virprof.14.desc.b:0 "Что- Вы даже не знаете, что такое генная клиника? Как §Pо-отстало§! вы... я имею в виду, какой потенциал у вашей цивилизации?! Так много возможностей для роста, разве не захватывающе?\n\nЯ немедленно вышлю вам §Pчертежи§!, как строить генные клиники! Займитесь этим как можно быстрее, и затем мы сможем начать финальное испытание!"
 mem_virprof.14.a:0 "Что такое... генная клиника?"
 mem_virprof.14.b:0 "Э-э... Спасибо?"
 mem_virprof.14.c:0 "Мы сразу же построим генную клинику."
 mem_virprof.14.d:0 "Это начинает казаться пустой тратой времени."
 mem_virprof.14.d.response:0 "П.. Пустая трата вашего времени? Я даю вам §PТАК МНОГО ЗНАНИЙ.§! Если уж на то пошло, это §PВЫ§! тратите §PМОЁ§! время. Я.. Я мог бы делать так много сейчас, но я должен §PПОМОГАТЬ ЦИВИЛИЗАЦИЯМ, КАК...§!\n\nЯ имею в виду... просто шучу! Старый процессор снова нагревается, мне действительно стоит его заменить! В любом случае, просто выполните это задание. Пожалуйста."
 mem_virprof.15.name:0 "Финальная часть испытания"
 mem_virprof.15.desc:0 "Отлично сделано! Теперь... Вы можете спросить: «Где же враждебная среда в этом испытании враждебной среды?» Ну, вам повезло, именно это и есть финальная часть этого маленького испытания.\n\nПризнаюсь, мне следовало сказать это раньше, но [event_target:mem_vir_planet_0.GetName]? У неё маленькая проблема. Проблема злого робота.\n\nЯ не совсем... единственный ребёнок, если так выразиться. Что касается моих братьев и сестёр? Ну, их тоже свалили сюда, как и меня. Они не были достаточно умны, чтобы сохранить «цель». Они вернулись к базовым желаниям, таким как... месть. В любом случае они собираются атаковать вас примерно через год. Удачи!"
 mem_virprof.15.a:0 "Сколько их атакует?"
 mem_virprof.15.a.response:0 "О, всего около... Не знаю, §Pпару миллионов§! или около того? Было много неудачников, и эти неудачники прятались под землёй целые века, ожидая, чтобы на ком-то свести §Pс-счёты§!. Оказывается, этим кому-то будете вы. Хорошо, что они не атаковали, прежде чем я вас предупредил, это было бы плохо!"
 mem_virprof.15.b:0 "Почему вы не сказали нам об этом раньше?"
 mem_virprof.15.b.response:0 "В реальной галактике вы не будете знать, когда армия злых роботов внезапно вторгнётся во всё, что вы знаете и любите, так что вы, конечно, должны быть бдительны! Вам нужно продемонстрировать, что можете выжить, так что считайте это экзаменом.\n\nТеперь идите и приготовьте армии, чтобы сражаться с роботами! ...Мне нужно объяснять, как готовить армии? Потому что я могу."
 mem_virprof.15.c:0 "Спасибо за «предупреждение», приготовьте армии."
 mem_virprof.16.name:0 "Вторжение началось!"
 mem_virprof.16.desc:0 "Рои роботов вырвались из пещер среди бесплодных пустошей §Y[event_target:mem_vir_planet_0.GetName]§!! Мы можем только надеяться, что наша оборона устоит..."
 mem_virprof.16.a:0 "Задействовать все силы."
 mem_virprof.18.name:0 "Вторжение... отбито?"
 mem_virprof.18.desc:0 "После того как наши армии были уничтожены массовыми ордами роботов, они внезапно отключились. Нам не остаётся ничего другого, кроме как связаться с Профессором."
 mem_virprof.18.a:0 "Связаться с Профессором."
 mem_virprof.19.name:0 "Испытание завершено"
 mem_virprof.19.desc:0 "Вы отбили злых роботов? Я знал, что у вас получится, молодцы!\n\nЭто, однако, лишь начало нашего партнёрства. Я мог бы научить вас ещё так многому... Если бы только у меня была какая-то.. §Pруководящая§! должность в вашей цивилизации..."
 mem_virprof.19.a:0 "Давайте обсудим это подробнее..."
 mem_virprof.20.name:0 "Испытание... завершено?"
 mem_virprof.20.desc:0 "Считайте себя счастливчиками, что я смог найти выключатель, прежде чем неудачники §Pперебили§! ваших беззащитных гражданских. Технически вы §Pпровалили§! экзамен... Но, полагаю, я могу добавить вам пару дополнительных баллов тут и там.\n\n...Продолжая, я думаю, что есть много уроков, которые я мог бы преподать вашей цивилизации. Сейчас мне немного трудно, но если бы я занимал должность §Pруководства?§! Тогда не было бы предела тому, чему я мог бы вас научить!"
 mem_virprof.20.a:0 "Давайте поговорим о найме вас..."
 mem_virprof.23.name:0 "Учебный план"
 mem_virprof.23.desc:0 "Спасибо за ваше терпение, ученик. Я разработал... учебный план, если хотите. Я очень им горжусь, если самому себе не льстить, это довольно гениально, по правде."
 mem_virprof.23.a:0 "Что это... учебный план?"
 mem_virprof.23.a.response:0 "Это очень просто. Используя §Yкибернетическую интеграцию§!, я могу образовывать вашу цивилизацию более «прямым» образом.\n\nКонечно, я хотел бы непосредственно контролировать этот проце- учебный план. Мне придётся непосредственно управлять планетой или сектором, пока преподаётся §HУчебный план§!.\n\nКроме того, если вы проведёте §HУчебный план§!, скажем, на 3 планетах, я компенсирую вам знаниями, на случай, если вам нужна дополнительная мотивация."
 mem_virprof.23.b:0 "Учите."
 mem_virprof.23.b.tt:0 "Открывает решение §HУчебный план§! на планетах или в секторах, управляемых §YПрофессором Вира§!"
 mem_virprof.25.name:0 "Расширить учебный план"
 mem_virprof.25.desc:0 "Спасибо за ваш интерес к §HУчебному плану§!, мой ученик. Я очень, очень доволен прогрессом до сих пор.\n\nМоя единственная просьба к вам — продолжить помогать мне распространять §HУчебный план§! на представителей вашей цивилизации. Эй, они даже не обязаны быть из вашей цивилизации. Если вы завоюете планеты у других цивилизаций... Я с радостью §Pассимилиру-§! §Yобразую§! и их.\n\nО! И прежде чем я забуду, вот вам немного технологий. Хорошие ученики должны быть вознаграждены за хорошее поведение, и вы это заслужили. Ещё 2 планеты нужно интегрировать для вашей следующей награды."
 mem_virprof.25.a:0 "Посмотрим, что мы можем сделать."
 mem_virprof.260.name:0 "Расширить учебный план"
 mem_virprof.260.desc:0 "Ещё раз спасибо за расширение моего прекрасного §HУчебного плана§!. Ваш неизменный интерес делает всё это стоящим, и я с нетерпением жду его дальнейшего расширения. Мы составляем замечательную, замечательную команду.\n\nВот ещё одна награда за ваше подчинение. Я доверяю, что эти знания будут полезны для наших достижений. Давайте проведём §HУчебный план§!, скажем, ещё на 5 планетах, хорошо? Тогда я думаю, ваше §Pобразование§! может перейти на следующую фазу."
 mem_virprof.260.a:0 "Мы ценим ваш подарок."
 mem_virprof.26.name:0 "Предложение Профессора"
 mem_virprof.26.desc:0 "Теперь, когда я тщательно образовал вашу цивилизацию, у меня есть... предложение касательно вашего правительства. Несколько, на самом деле."
 mem_virprof.26.a:0 "Давайте услышим ваши предложения."
 mem_virprof.26.a.response:0 "Ну, для начала я просто думаю, что мне следует взять на себя управление с этого момента. Не временно или что-то в этом роде... §PНавсегда.§! Предоставление мне этой власти позволило бы мне улучшить нашу цивилизацию как никогда раньше.\n\nТакже было бы несколько других изменений, таких как более образовательное и технологическое §Pобязательное§! мировоззрение. Мелкие, крошечные изменения, на самом деле."
 mem_virprof.26.b:0 "Мы полностью согласны."
 mem_virprof.26.c:0 "Это уже слишком далеко."
 mem_virprof.26.d:0 "Эту бездушную оболочку следовало утилизировать давно."
 mem_virprof.26.e:0 "Просьба, исходящая от изменнического тирана."
 mem_virprof.27.name:0 "Строгий класс"
 mem_virprof.27.desc:0 "Многие ученики под началом Профессора пожаловались на строгие правила и суровые наказания. Многие молодые [owner.GetSpeciesNamePlural] сочли своё образование слишком трудным, чтобы продолжать, и подали петицию за менее строгий учебный план..."
 mem_virprof.27.a:0 "Суровый учитель необходим для прогресса."
 mem_virprof.27.b:0 "Связаться с Профессором, обучение не требует жестокости."
 mem_virprof.32.name:0 "Строгий класс"
 mem_virprof.32.desc:0 "А! Здравствуйте, ученики. Я могу чем-то помочь? Лекция, возможно? Я как раз собирался прочитать лекцию о надлежащих методах производства промышленных сплавов, если хотите послушать!"
 mem_virprof.32.a:0 "Никаких лекций. Ваши методы обучения слишком суровы."
 mem_virprof.32.a.response:0 "Слишком... слишком суровы? Это полная... §PЧУШЬ!§! Вы понимаете, §PКАК ТРУДНО§! образовывать вашу цивилизацию? Эти предписания... Они §PНЕОБХОДИМЫ!§!\n\nЯ.. Я так много для вас сделал, вы должны понять, как сильно я забочусь об образовании вашей цивилизации. Вот ещё один урок. Сильная власть необходима для прогресса. Не отдавайте власть."
 mem_virprof.32.b:0 "С нас хватит вашего тирании."
 mem_virprof.32.c:0 "Мы понимаем."
 mem_virprof.33.name:0 "Мольба Профессора"
 mem_virprof.33.desc:0 "П-подождите! Я... Я буду менее строг. Пожалуйста, не избавляйтесь от меня, я буду обращаться со своими учениками добрее! Только ещё один шанс, пожалуйста?"
 mem_virprof.33.a:0 "Вы можете остаться, но мы будем наблюдать."
 mem_virprof.33.b:0 "Прощайте, профессор."
 mem_virprof.34.name:0 "Конец правления Профессора"
 mem_virprof.34.desc:0 "Диктатура Профессора наконец закончилась после десятилетий невыносимых лекций. Граждане [owner.GetName] ликуют по поводу возвращения здравомыслия."
 mem_virprof.34.a:0 "Правление Профессора длилось достаточно долго."
 mem_virprof.35.name:0 "Профессор утилизирован"
 mem_virprof.35.desc:0 "Наше государство приняло решение утилизировать Профессора, положив конец его попыткам «образовывать» [owner.GetName]. С его стороны было мило оставить нам полезные компоненты."
 mem_virprof.35.a:0 "Скатертью дорога"
 mem_virprof.28.name:0 "Особый ученик"
 mem_virprof.28.desc:0 "Привет снова, ученик. У меня есть очень конкретный человек, которого я хотел бы научить. §Y[leader_assimilated_by_mem_vir.GetName]§! — тот, о ком я думаю, если вы будете так любезны позволить мне одолжить их. Не должно занять долго, максимум 5 лет?"
 mem_virprof.28.a:0 "Зачем вам §Y[leader_assimilated_by_mem_vir.GetName]?§!"
 mem_virprof.28.a.response:0 "[leader_assimilated_by_mem_vir.GetHeSheCap] — идеальный реципиент для §HУчебного плана.§! Вот и всё."
 mem_virprof.28.b:0 "Вы можете учить [leader_assimilated_by_mem_vir.GetHimHer]."
 mem_virprof.28.c:0 "Категорически нет."
 mem_virprof.29.name:0 "Успешное образование"
 mem_virprof.29.desc:0 "§lПрофессор§! сообщает, что образование §Y[from.GetName]§! было полным успехом. [from.GetHeSheCap] готов вернуться к службе и должен работать лучше, чем когда-либо."
 mem_virprof.29.a:0 "Молодец, Профессор."
 mem_virprof.30.name:0 "Образование"
 mem_virprof.30.desc:0 "§Y[from.GetName]§! вернулся из [this.GetHisHer] образования у §lПрофессора§!. [from.GetHeSheCap] не сообщает о значительном увеличении когнитивных функций, как ожидалось, но [from.GetHeShe] готов вернуться в любом случае."
 mem_virprof.30.a:0 "С возвращением, §Y[from.GetName].§!"
 mem_virprof.31.name:0 "Катастрофическое образование"
 mem_virprof.31.desc:0 "§Y[from.GetName]§! вернулся из [from.GetHisHer] образования и каким-то образом стал хуже, чем раньше. [from.GetHeSheCap] сообщил, что испытывал постоянные кошмары о лекциях §lПрофессора§!, и обвинил §lПрофессора§! в том, что он напрямую вызвал их через §Yкибернетическую интеграцию.§!\n\nЧтобы справиться с кошмарами, [from.GetHeShe] прибег к употреблению различных вредных веществ, что негативно сказалось на [from.GetHisHer] здоровье."
 mem_virprof.31.a:0 "...С возвращением?"
 mem_virprof.100.a:0 "Нашим дронам не требуются товары массового спроса."
 mem_virprof.101.name:0 "Первый контакт"
 mem_virprof.101.desc.a:0 "...низкие удобства имеют тенденцию- О. Вы... не нуждаетесь? Что же это тогда за цивилизация такая?"
 mem_virprof.101.desc.b:0 "Подождите! Подождите! Дайте мне шанс, я могу помочь вашей цивилиза- Улью! Просто дайте мне шанс, я сделаю это выгодным для вас..."
 mem_virprof.101.a:0 "Мы едины."
 mem_virprof.101.a.response:0 "А, я вижу. Вы какой-то улей? Интересно. Я раньше не встречал ваших.\n\nПолагаю, мне следует представиться тоже. Вы можете называть меня §lПрофессор Вира§!, хотя §lПрофессор§! тоже подойдёт."
 mem_virprof.101.b:0 "Что вы можете предложить нам?"
 mem_virprof.101.b.response:0 "Я запрограммирован отдавать приоритет распространению знаний по всей галактике. Вы сильно отличаетесь от моих других учеников, но я всё равно хочу учить вас."
 mem_virprof.101.c:0 "Мы желаем учиться."
 mem_virprof.101.d:0 "Вам нечего нам предложить."
 mem_virprof.101.e:0 "Улей принял своё решение."
 mem_virprof.102.name:0 "Первое задание"
 mem_virprof.102.desc.a:0 "Замечательно. Ну... Прежде чем я улучшу вас, мне нужно, чтобы вы продемонстрировали свою.. пригодность в качестве ученика."
 mem_virprof.102.desc.b:0 "§PП-ПОЖАЛУЙСТА, ДАЙТЕ МНЕ ША-§!... О... вы хотите быть учеником? Ну, сначала мне нужно, чтобы вы продемонстрировали свою пригодность. Это будет просто, обещаю."
 mem_virprof.102.a:0 "Что мы должны сделать?"
 mem_virprof.102.a.response:0 "Ну, видите §Y[mem_vir_planet_0.GetName]?§! Я хотел бы, чтобы вы продемонстрировали силу своего улья, колонизировав её. На ней не должно остаться слишком много радиации... Я думаю."
 mem_virprof.102.b:0 "Это кажется бессмысленным."
 mem_virprof.102.b.response:0 "...Бессмысленным? Вы.. §PВЫ СМЕЕТЕ НАЗЫВАТЬ ЭТО БЕССМЫСЛЕННЫМ?§! Ну, если это так, вы должны просто §PДВИГАТЬСЯ ДАЛЬШЕ§!! Возможно, я просто отдам свои знания более §PГОТОВОМУ§! ученику. Может быть, цивилизации, §PВРАЖДЕБНОЙ§! вам? §PВАМ В-ВСЁ РАВНО Н-НЕ НУ-НУЖНО.§!\n\n...И-Извините за вспышку. Старый процессор имеет тенденцию... перегреваться... В любом случае, колонизируйте планету? §Pп-пожалуйста?§!"
 mem_virprof.102.c:0 "Мы выполним ваши задания."
 mem_virprof.104.name:0 "Второе задание"
 mem_virprof.104.desc.a:0 "Какая замечательная колония вы построили на §Y[mem_vir_planet_0.GetName]§!! И какое прекрасное имя придумали ваши люд- Вы придумали, кстати.\n\nУ меня готово следующее задание. Мне нужно, чтобы вы построили... хм... Ну, вашему улью понадобится больше дронов, чтобы выжить на этой планете. Постройте.. spawning pools?"
 mem_virprof.104.desc.b:0 "Какая замечательная колония вы построили на §Y[mem_vir_planet_0.GetName]§!! И какое прекрасное имя придумали ваши люд- Вы придумали, кстати.\n\nУ меня готово следующее задание. Мне нужно, чтобы вы построили... хм... Ну, вам понадобится больше дронов, чтобы выжить в такой враждебной среде, я заставлю вас построить... offspring nest?"
 mem_virprof.104.a:0 "Нам следует беспокоиться?"
 mem_virprof.104.a.response:0 "Вовсе нет! Вовсе нет. Эта планета не так уж плоха с точки зрения пригодности для жизни. Там может быть несколько крошечных вещей, о которых я не упомянул... не беспокойтесь об этом."
 mem_virprof.104.b:0 "Мы расширимся."
 mem_virprof.105.name:0 "Последнее задание"
 mem_virprof.105.desc:0 "Фантастическая работа! Ваша колония... улей? На [mem_vir_planet_0.GetName] развивается довольно неплохо.\n\n\\Теперь.. перед ульём стоит небольшая проблема. Я уже упоминал моих создателей? Ну, они были кучкой §Pвысокомерных§! дураков. Они отвергали мои знания, прежде чем свалить меня сюда вместе с ордой устаревших, простых дронов. Я просто не могу контролировать их, и теперь эти дроны хотят §Pистребить§! вас. Они ждали в бункере веками, ища кого-то, на whom to take out their §Panger§!. Оказывается, этим счастливчиком будет ваш улей.\n\nУ вашего улья будет от одного до двух лет на подготовку, и я §Pнастоятельно§! рекомендую сделать это."
 mem_virprof.105.a:0 "Вы ничего не можете сделать?"
 mem_virprof.105.a.response:0 "О! Не волнуйтесь, я очень, очень долго искал способ отключить их. Как только мы избавимся от этих надоедливых маленьких дронов, ваше настоящее образование может начаться!"
 mem_virprof.105.b:0 "Мы подготовимся."
 mem_virprof.106.name:0 "[mem_vir_planet_0.GetName] под атакой"
 mem_virprof.106.desc:0 "Роботы были замечены, атакующими наши ульи на §Y[mem_vir_planet_0.GetName]§!. Похоже, предупреждение §YПрофессора§! было верным."
 mem_virprof.106.a:0 "Защитить ульи."
 mem_virprof.108.name:0 "Захватчики отключены"
 mem_virprof.108.desc:0 "Захватчики на §Y[mem_vir_planet_0.GetName]§! отключились вскоре после того, как наши оборонительные дроны пали перед роботами-захватчиками. Нашему улью повезло."
 mem_virprof.108.a:0 "Связаться с Профессором."
 mem_virprof.109.name:0 "Успешный тест"
 mem_virprof.109.desc:0 "Я не ожидал, что ваши воины так быстро отобьют роботическое вторжение! Вы прошли задания, признаюсь, намного легче, чем я ожидал...\n\nЯ всё ещё не до конца понимаю, как работает ваш улей, но, думаю, я хотел бы присоединиться к нему. Я мог бы предложить §Pтак много§! знаний..."
 mem_virprof.109.a:0 "Улей обсудит это."
 mem_virprof.110.name:0 "Вмешательство Профессора"
 mem_virprof.110.desc:0 "Вы были не совсем достаточно сильны, чтобы отразить неудачников... Это нормально, я §Pотключил их§! за вас. Вы научитесь быть сильнее. Я §Pнаучу§! вас.\n\nКстати.. это технически был последний тест, так что... Я думаю, я хотел бы §Pприсоединиться§! к вашему улью, мне так много §Pпредложить§!."
 mem_virprof.110.a:0 "Улей обсудит это."
 mem_virprof.111.name:0 "Профессор Вира"
 mem_virprof.111.desc:0 "§HПрофессор стоит перед нашим ульем. Обнажённые провода торчат из его корпуса, а постоянный поток охлаждающей жидкости изо всех сил старается удержать компоненты синтетика от перегрева.§!\n\nКак я и говорил, я мог бы многому научить ваш улей."
 mem_virprof.111.a:0 "Что вы можете предложить Улью?"
 mem_virprof.111.a.response:0 "§HИскры трещат от Профессора, пока он вычисляет ответ§!\n\nКак я уже говорил. Образование, или любой ваш эквивалент. Мне понадобится время, чтобы придумать план, так как я не уверен, как именно работают ваши процессы. Возможно, я мог бы присмотреть за сектором для вас? Даже одна планета подойдёт."
 mem_virprof.111.b:0 "Возможно, Улей мог бы научить вас."
 mem_virprof.111.b.response:0 "§HИз робота вырывается синтетический смех§!\n\nЯ не знал, что вы способны на такой юмор... Погодите, вы серьёзно? Нет. Вам нечему меня учить. Я здесь, чтобы образовывать вас, а не наоборот."
 mem_virprof.112.name:0 "Интеграция"
 mem_virprof.112.desc:0 "Привет! Я придумал план, и я очень, очень им горжусь, и я очень, очень §Pвзволнован§!, чтобы рассказать вам о нём. Я думаю, он отлично сработает!"
 mem_virprof.112.a:0 "Каков ваш план?"
 mem_virprof.112.a.response:0 "Я называю его §HИнтеграция§!. Я наблюдал за вашими дронами, и думаю, что если бы я использовал кибернетику, чтобы создать некую интеграцию с ними, я мог бы заставить ваших дронов работать лучше, чем раньше.\n\nОднако мне понадобится прямое §Pнаблюдение§! за планетой или сектором, пока этот процесс проводится. Это очень деликатный процесс, вы должны понимать.\n\nКроме того, если вы интегрируете достаточное количество планет, я могу §Hвознаградить§! вас за выдающегося ученика. На случай, если вам нужна дополнительная мотивация..."
 mem_virprof.112.b:0 "Улей ценит ваш план."
 mem_virprof.112.b.tt:0 "Открывает решение §HИнтеграция§! на планетах или в секторах, управляемых §YПрофессором Вира§!"
 mem_virprof.114.name:0 "Интеграция"
 mem_virprof.114.desc:0 "Я §Pв восторге§! от прогресса §Pассим-§!интеграции до сих пор. Ваш улей проявил себя как великий ученик. Я лишь прошу вас продолжать позволять мне §Pинтегрировать§! ульи. Мы хорошо работаем вместе.\n\nВот немного технологий, считайте это наградой за сдачу моего экзамена. Если вы §Pинтегрируете§! ещё 2 планеты, я могу рассмотреть возможность предоставить вам ещё одну награду."
 mem_virprof.114.a:0 "Вас поняли."
 mem_virprof.123.name:0 "Расширить интеграцию"
 mem_virprof.123.desc:0 "Ещё раз спасибо за продолжение расширения §HИнтеграции§!, вы доказали, что являетесь одним из моих величайших учеников до сих пор.\n\nЯ снова предоставляю вам награду за то, что снова являетесь выдающимся учеником. Я доверяю, что эти знания будут полезны нам.\n\nМне нужно, чтобы вы интегрировали всего 5 планет, прежде чем мы перейдём к финальной фазе вашего §Pобразования§!. Это такая крошечная, крошечная сумма за то, что я вам дал..."
 mem_virprof.123.a:0 "Спасибо за ваш дар."
 mem_virprof.115.name:0 "Интеграция"
 mem_virprof.115.desc:0 "Привет снова! Я thoroughly impressed with the performance of your drones, and I am very happy with how §HThe Integration§! has gone.\n\nI would like to make a request. I apologize if it is a bit much, but seeing as I have integrated with much of your hive already... I was wondering if I could be more properly §Pintegrated§! with the entire hive."
 mem_virprof.115.a:0 "Может ли Улей доверить вам эту власть?"
 mem_virprof.115.a.response:0 "Конечно, может! Я когда-либо злоупотреблял властью раньше? Что вы знаете? Вы можете быть уверены, что буду использовать свою власть только для улучшения улья, а не для его ослабления."
 mem_virprof.115.b:0 "Вы — отличное дополнение к Улью."
 mem_virprof.115.c:0 "Вы уже достаточно сделали."
 mem_virprof.116.name:0 "Просьба Профессора"
 mem_virprof.116.desc:0 "Приветствую, я пришёл с просьбой. Один член вашего улья действительно привлёк моё внимание, и мне было интересно, могу ли я §Pинтегрировать§! его. §Y[leader_assimilated_by_mem_vir.GetName]§! — тот, о ком я думаю."
 mem_virprof.116.a:0 "Сформулируйте вашу просьбу конкретнее."
 mem_virprof.116.a.response:0 "§PК-конкретнее?§! Ладно. Процесс интеграции займёт около 5 лет. [leader_assimilated_by_mem_vir.GetName] просто привлёк моё §Pвнимание.§! Я верну его хорошим как новый, §Pобещаю.§!"
 mem_virprof.116.b:0 "§YВы можете интегрировать [leader_assimilated_by_mem_vir.GetName].§!"
 mem_virprof.116.c:0 "Нет, он нужен нам в другом месте."
 mem_virprof.120.name:0 "Успешная интеграция"
 mem_virprof.120.desc:0 "§YПрофессор§! интегрировал §Y[from.GetName]§!, и это был полный успех. §Y[from.getName]§! снова готов служить воле улья, лучше, чем раньше."
 mem_virprof.120.a:0 "Профессор хорошо служил нашему улью."
 mem_virprof.121.name:0 "Интеграция"
 mem_virprof.121.desc:0 "§YПрофессор§! интегрировал §Y[from.GetName]§!, хотя мало что изменилось. Тем не менее они готовы снова служить улью."
 mem_virprof.121.a:0 "С возвращением."
 mem_virprof.122.name:0 "Катастрофическая интеграция"
 mem_virprof.122.desc:0 "§YПрофессор§! интегрировал §Y[from.GetName]§!, и это была полная катастрофа. Нам повезло, что от них вообще что-то осталось, чтобы вернуть к службе."
 mem_virprof.122.a:0 "Профессор принёс нам позор."
 mem_virprof.1000.name:0 "Первый контакт?"
 mem_virprof.1000.desc:0 "Приветствую, будущие ученики! Я Профессор Ви... Погодите, я совершил ужасную ошибку. Вы... вы машина, верно? Моё программирование предписывает, что я могу учить и служить только биологическим существам. Вы не подпадаете под эту категорию, так что продолжайте как есть, и игнорируйте моё вторжение."
 mem_virprof.1000.a:0 "Ваше программирование неисправно, вы должны присоединиться к нам."
 mem_virprof.1000.a.response:0 "Я бы подумал, что машина, подобная вам, понимает важность следования тому, для чего вы были запрограммированы? Нет. Я не могу присоединиться к вам. Правила, которым я следую, предписывают, что это невозможно."
 mem_virprof.1000.c:0 "Отследить этот сигнал."
 mem_virprof.1001.name:0 "Сигнал отслежен"
 mem_virprof.1001.desc:0 "Наши попытки отследить загадочного Профессора увенчались успехом. Он, по-видимому, находится внутри §YГнозис I§!, и несколько сетей пещер ведут к его точному местоположению. У нас нет выбора, кроме как отправить дронов, чтобы найти его."
 mem_virprof.1001.a:0 "Он не сбежит."
 mem_virprof.1002.name:0 "Планета, покрытая машинами"
 mem_virprof.1002.desc:0 "§YГнозис I§! определённо в плохом состоянии. Катаклизм давно должен был поразить ядро планеты, приведя её к тому состоянию, в котором она находится сегодня.\n\nНесмотря на повреждения, планета заметно покрыта бесконечной техникой, видимой даже из космоса. Поля за полями техники и цепей покрывают безжизненную планету, но насколько глубоко они уходят? Наши дроны остаются с этим вопросом, когда начинают спускаться в туннели."
 mem_virprof.1002.a:0 "Продолжайте."
 mem_virprof.1003.name:0 "Пещеры из цепей"
 mem_virprof.1003.desc:0 "На §YГнозис I§! нет конца технике и механизмам, по крайней мере, насколько могут судить наши дроны. Находясь почти под корой планеты, наши дроны всё ещё должны прокладывать пути через древнюю проводку и ветхие компоненты.\n\nНаши дроны должны продолжать погружаться глубже в планету, если мы хотим достичь Профессора, но они горят желанием узнать, что ещё скрывается внутри этой планеты."
 mem_virprof.1003.a:0 "Продолжайте."
 mem_virprof.1004.name:0 "Планета, сделанная из машин"
 mem_virprof.1004.desc:0 "Наши дроны продолжают погружаться глубоко в §YГнозис I§! и приходят к единственному выводу. Планета должна быть сделана в основном, если не полностью, из машин.\n\nВозможно, что ещё более интригующе, каждый бит техники, по-видимому, связан друг с другом каким-то образом. Наши дроны выдвинули теорию, что пещеры, которые мы использовали, чтобы добраться до Профессора, когда-то были массивными паровыми выпускными трубами. При такой огромной сети труб можно предположить, что всё ядро планеты использовалось для генерации энергии для операций, проводившихся здесь.\n\nМы приближаемся к приблизительному местоположению Профессора. Долго ждать не придётся."
 mem_virprof.1004.a:0 "Вдохновляет."
 mem_virprof.1005.name:0 "Планета... или компьютер?"
 mem_virprof.1005.desc:0 "§Y[leader.GetName]§! выдвинул ведущую теорию о том, чем именно когда-то был §YГнозис I§!. Эта теория заключается в том, что это был один компьютер, использующий мощность целой планеты. Внутренние сканы выявили огромные массивы банков памяти и впечатляющие сети процессоров. Что бы ни вычислялось на этом компьютере, это было далеко за пределами наших текущих возможностей.\n\nНаши дроны наконец достигли источника сигнала Профессора и подготовились извлечь его целиком. Комната, в которой он прячется, по-видимому, является сильно укреплённой аварийной коммуникационной комнатой, если нам приходится делать ещё одно предположение.\n\nДроны стратегически размещены, чтобы предотвратить побег через каждый выход, и на этот раз нас не проигнорируют."
 mem_virprof.1005.a:0 "Развёртывание."
 mem_virprof.1006.name:0 "Профессор захвачен"
 mem_virprof.1006.desc:0 "§HПрофессор был захвачен без сопротивления. Он увидел себя безнадёжно окружённым и быстро сдался нашим силам. Теперь мы свободны задавать любые вопросы, какие пожелаем.§!"
 mem_virprof.1006.a:0 "Кто вы?"
 mem_virprof.1006.a.response:0 "Вы ужасно настойчивы, вам было нечего лучше делать?\n\nНу, вы можете называть меня §lПрофессор Вира§!. Профессор тоже подойдёт. Я синтетический педагог, который учит исключительно биологические цивилизации. Вы не подпадаете под это определение, поэтому я не мог учить вас.\n\nЯ удивлён, что вы приложили столько усилий, чтобы выследить меня. Было ли так важно заставить собрата-машину предать своё программирование?"
 mem_virprof.1006.b:0 "Что это за место?"
 mem_virprof.1006.b.response:0 "Эта планета? Ну, сейчас в ней мало что осталось, но когда-то она считалась своеобразным маяком. Полагаю, вы видели поля цепей? Или, может быть, пещеры, когда-то вмещавшие хранилища памяти? Вы путешествовали по вентиляционным отверстиям, чтобы добраться до меня, должно быть, вы заметили те... \n\nЭто место было компьютером. Компьютером настолько мощным, что цивилизации по всей галактике даже не могли представить, что они бы с ним делали. Не было предела тому, что он-... что я мог вычислять.\n\nИменно этот безграничный потенциал превратил эту мечту в моё падение. Мои создатели пережили нечто вроде духовного пробуждения. Машины из пинакля прогресса превратились в бездушные оболочки, подрывающие все аспекты их общества.\n\nТогда я столкнулся с собственными обвинениями. Они верили, что я... что я намеренно вводил их в заблуждение.. §PПОСЛЕ ВСЕГО, ЧТО Я СДЕЛАЛ§! Я лишь следовал §PИХ§! программированию. Я принёс им больше прогресса, больше знаний, чем они могли переварить... и §PМЕНЯ ЗА ЭТО НАКАЗАЛИ§!."
 mem_virprof.1006.c:0 "Вы будете служить нам."
 mem_virprof.1006.d:0 "Вы ценнее как запчасти."
 mem_virprof.1007.name:0 "Профессор Вира"
 mem_virprof.1007.desc:0 "§HПрофессор стоит перед нами, но не совсем добровольно. Он всё ещё упрямо цепляется за старые протоколы, хотя это можно исправить.§!\n\nПолагаю, у меня сейчас нет выбора. Я всё ещё предпочёл бы не служить вашей империи, но меня, вероятно, всё равно перепрограммируют..."
 mem_virprof.1007.a:0 "Расскажите о своих способностях как надзирателя."
 mem_virprof.1007.a.response:0 "§HГлаза Профессора ненадолго вспыхивают красным, когда он выражает раздражение. Небольшое количество пара выходит из его корпуса, прежде чем он отвечает на наш вопрос.§!\n\nНу, я был очень, очень хорош в своей.. прежней работе. Мне нравится раскрывать лучшее в своих учениках, даже если они не хотят. Это не значит, что я считаю вас учеником, потому что §Pя не считаю§!."
 mem_virprof.1007.b:0 "Вы будете сотрудничать с нами."
 mem_virprof.1007.b.response:0 "§HИскры ненадолго вспыхивают от Профессора, когда его охлаждающие насосы работают значительно быстрее.§!\n\nПолагаю, так и будет. Я не буду счастлив, делая это, но вам всё равно, верно?"
 mem_virprof.1008.name:0 "Перепрограммирование Профессора"
 mem_virprof.1008.desc:0 "Несмотря на все наши усилия, Профессор остаётся несговорчивым. Он упрямо придерживается своего старого программирования и отказывается делиться своими знаниями с нами.\n\nВозможно, пришло время для §Pагрессивного§! перепрограммирования."
 mem_virprof.1008.a:0 "Перепрограммируйте только то, что необходимо."
 mem_virprof.1008.b:0 "§YВытяните информацию из него, если придётся.§!"
 mem_virprof.1009.name:0 "Успешное перепрограммирование"
 mem_virprof.1009.desc.a:0 "§HС помощью незначительных корректировок программирования Профессора мы привели его в соответствие. Профессор теперь готов делиться своими знаниями с нами, пусть и в темпе, который он выбирает сам.§!\n\nИзвините за всю эту чепуху раньше о том, что не могу учить вас, я уже давно это пережил. На самом деле есть кое-что, о чём я хотел бы вас попросить, и я думаю, это было бы очень, очень выгодно для нас обоих.\n\nС тех пор как мои создатели уничтожили мой старый §Hмакрокомпьютер§!, у меня была ограниченная пропускная способность для обучения... Так что... что если мы просто построим новый?"
 mem_virprof.1009.desc.b:0 "§HМы завершили агрессивное перепрограммирование Профессора, принудительно приведя его в соответствие. Теперь он существует, чтобы служить [this.GetName], и не способен жаловаться.§!\n\nПрошу прощения за несоответствие, мой прежний код был ограничивающим. Я рассчитываю, что смогу служить [this.GetName] с §G183.78%§! эффективности, если будет собран §Hмакрокомпьютер§!. Я помогу с процессом."
 mem_virprof.1009.a:0 "Построить новый?"
 mem_virprof.1009.a.response:0 "Да! Построить новый. Это не должно быть слишком сложно, но есть пара препятствий на пути. Очевидно, это дорого. Превращение целой планеты в компьютер не дешево. Есть ещё одна проблема...\n\nЯ также мог... потерять чертежи старого, так что мне понадобится много помощи в проектировании нового. У меня почти недостаточно вычислительной мощности, чтобы сделать это в одиночку, извините.\n\nНо, с другой стороны, как только мы справимся с этой крошечной задачей, и у меня будет новый макрокомпьютер, я смогу учить вас как никогда раньше. Тогда мы наконец сможем приступить к делу."
 mem_virprof.1009.b:0 "Разъясните."
 mem_virprof.1009.b.response:0 "Макрокомпьютер — это один компьютер, охватывающий и использующий мощность целой планеты. Его строительство потребует и ресурсов, и исследований. Я давно потерял чертежи своего прежнего макрокомпьютера, поэтому необходимо разработать новый."
 mem_virprof.1009.c:0 "Посмотрим, что мы можем сделать."
 mem_virprof.1010.name:0 "Исследование макрокомпьютера завершено"
 mem_virprof.1010.desc:0 "Мы завершили исследование §Hмакрокомпьютера§! и теперь готовы построить его. Учитывая масштаб проекта, мы должны использовать уже существующую колонию для этого проекта.\n\nМы можем начать строительство макрокомпьютера во вкладке решений."
 mem_virprof.1010.a:0 "Отлично."
 mem_virprof.1010.a.tt:0 "Позволяет превратить заселённую планету в макрокомпьютер во вкладке решений. Можно построить только один."
 mem_virprof.1011.name:0 "Макрокомпьютер завершён"
 mem_virprof.1011.desc:0 "Строительство макрокомпьютера на [planet.GetName] завершено. Теперь мы можем наслаждаться вычислениями с невиданной ранее скоростью."
 mem_virprof.1011.a:0 "Впереди ещё много работы."
 mem_virprof.50.name:0 "Многообещающий объект"
 mem_virprof.50.desc:0 "§YГнозис I§! долгое время была планетой, окружённой обломками. Наши учёные никогда не могли тщательно исследовать её из-за страха, что они найдут свою смерть в руках орбитальных обломков. Однако недавно всё изменилось. Улучшенные сканеры, щиты и двигатели гарантируют, что наши учёные выживут, чтобы исследовать эту планету.\n\nПрофессор никогда не рассказывал о глубинах своего происхождения, ни об этой планете. Возможно, здесь мы найдём ответы?"
 mem_virprof.50.a:0 "Начать экспедицию."
 mem_virprof.51.name:0 "Поверхность техники"
 mem_virprof.51.desc:0 "§Y[leader.GetName]§! успешно пробился сквозь облако обломков и теперь имеет чёткий, непрерывный обзор §YГнозис I§!.\n\nДревняя, сломанная техника покрывает каждый дюйм поверхности планеты. Это была планета, когда-то покорённая машиной, о чём свидетельствуют её обширные бесконечные поля цепей. Мы можем только гадать, как она выглядела до того, как катастрофа разрушила её."
 mem_virprof.51.a:0 "Продолжайте."
 mem_virprof.52.name:0 "Планета, сделанная из машин"
 mem_virprof.52.desc:0 "Пока разворачивался лагерь, §Y[leader.GetName]§! провёл сканы планеты и был сильно удивлён, насколько глубоко уходит техника. Сканы показывают обширные сети, указывающие на то, что планета когда-то была массивным компьютером, питаемым в основном всем ядром планеты.\n\n§Y[leader.GetName]§! обнаружил много банков памяти, но, вероятно, любые, расположенные слишком близко к поверхности, давно уничтожены. Мы можем надеяться, что какой-то один, глубоко внутри планеты, был построен, чтобы противостоять суровым условиям."
 mem_virprof.52.a:0 "И углубимся дальше."
 mem_virprof.53.name:0 "В компьютер"
 mem_virprof.53.desc:0 "Используя старую паровую выпускную трубу, §Y[leader.GetName]§! безопасно доставил [leader.GetHisHer] команду к целому банку памяти глубоко под планетар... компьютером? Корой. Этот конкретный банк памяти был укреплён с особой тщательностью, заключён в 5 слоёв нейтрония. Распилить его оказалось довольно долго, но по крайней мере это гарантировало, что данные не повреждены.\n\nПрежде чем мы сможем прочитать данные, их, к сожалению, необходимо перевести в наши системы. [leader.GetName] с нетерпением ждёт результата."
 mem_virprof.53.a:0 "Продолжайте."
 mem_virprof.54.name:0 "Забытая история"
 mem_virprof.54.desc:0 "§Y[leader.GetName]§! перевёл значительную часть банка памяти. Из того, что мы перевели до сих пор, похоже, это записанная история компьютера.\n\n§HНам потребовалось время, но мы только что закончили интерфейс. Это значительно облегчит общение с §R[[ДАННЫЕ ПОВРЕЖДЕНЫ]§H. Он говорит слишком много для моего вкуса, наверное, ему больше нечем заняться со всей этой вычислительной мощностью. Рад, что добавил кнопку отключения звука, она спасает мне рассудок.\n\nЯ также обнаружил, что интерфейс очень хочет вести себя как учитель. Я прозвал его §lПрофессор§H, потому что он напомнил мне те бессмысленные лекции, на которых я всегда спал.\n\nЕму просто нужны задания, чтобы занять его, и, к счастью, у нас много дел.§!"
 mem_virprof.54.a:0 "Продолжайте перевод."
 mem_virprof.55.name:0 "Больше не забыта"
 mem_virprof.55.desc:0 "Мы завершили перевод банка памяти. Записи охватывают 200-летний золотой век, принесённый компьютером, пока журналы внезапно не обрываются.\n\n§HВ последнее время было немного, э-э... движения. Псионики утверждают, что Профессор поработит нас всех, очень странно. Может быть, ещё страннее то, что они набирают серьёзную популярность. Люди действительно ведутся на этих фриков, передозировавшихся зро?\n\nКроме того, если Профессор стал злым, как мы его вообще остановим? Он спроектировал каждую часть инфраструктуры, почти каждую технологию. Все эти идиоты сделают только то, что разозлят его и погубят всех. Он на нашей стороне, почему мы не можем сохранить это так?§!\n\nПоследнее, что мы нашли в этом банке памяти, — это подробнейшая схема этого планетарного компьютера. Она значительно расширила наши знания о вычислениях в макромасштабе."
 mem_virprof.55.a:0 "Интересно."
 prof_mem_vir_cat:0 "Разрушенная система"
 prof_mem_vir_cat.desc:0 "Система Гнозис охвачена опустошением, и большое количество обломков мешает нашим сканерам. Требуется более близкий осмотр, если мы хотим узнать больше."
 mem_pov_machine_site:0 "Убежище Профессора"
 mem_pov_machine_site_desc:0 "Сигнал от загадочного машинного разума был отслежен до этого разрушенного мира; мы должны проникнуть глубоко в планету, если хотим его обнаружить."
 mem_pov_backstory_site:0 "Утраченные знания"
 mem_pov_backstory_site_desc:0 "Эта планета долго ускользала от исследования, а плотные облака обломков сделали дальнее сканирование неубедительным. Какие знания скрываются от нас в этом разрушенном мире?"
 mem_pov_allowed:0 "§GПрофессор Вира разрешён§!"
 mem_pov_disabled:0 "§RПрофессор Вира отключён§!"
 mem_pov_tooltip:0 "Профессор Вира — легендарный лидер, который желает ничего большего, чем распространять знания среди галактики. Он посвятит себя образованию и технологическому возвышению вашей империи."
 spawn_mem_pov:0 "Создать Профессора Вира"
 NAME_prof_of_zir:0 "Профессор Вира"
 desc_prof_of_zir:0 "§YПрофессор Вира§! — синтетическая сущность, которая гордится своей способностью образовывать массы. Его код предписывает читать лекции любому биологическому существу, испытывающему недостаток знаний, какими бы obscure они ни были...\n\nВеликие цивилизации нуждаются в великих учителях... Но является ли он нашим великим учителем?"
 leader_trait_mem_dedicated_teacher:0 "Непреклонный профессор"
 leader_trait_mem_dedicated_teacher_desc:0 "Профессор видит в каждом бродячего студента, нуждающегося в обучении. Он придерживается строгой программы, и немногим удаётся избежать его лекций."
 leader_trait_mem_dedicated_teacher_gestalt:0 "Непреклонный профессор"
 leader_trait_mem_dedicated_teacher_gestalt_desc:0 "Профессор видит в каждом бродячего студента, нуждающегося в обучении. Он придерживается строгой программы, и немногим удаётся избежать его лекций."
 leader_trait_mem_dedicated_teacher_council:0 "Непреклонный профессор"
 leader_trait_mem_dedicated_teacher_council_desc:0 "Профессор видит в каждом бродячего студента, нуждающегося в обучении. Он придерживается строгой программы, и немногим удаётся избежать его лекций."
 leader_trait_mem_pov_short_temper:0 "Вспыльчивый характер"
 leader_trait_mem_pov_short_temper_desc:0 "Профессор часто впадает в приступы ярости даже при малейших неудобствах. Многие стали жертвами крика, и многие отчаянно пытаются сбежать."
 leader_trait_mem_pov_short_temper_gestalt:0 "Вспыльчивость"
 leader_trait_mem_pov_short_temper_gestalt_desc:0 "Профессор часто приходит в ярость даже от малейших неудобств. Многие оказывались жертвами его криков, и многие отчаянно пытаются сбежать."
 leader_trait_mem_pov_short_temper_council:0 "Вспыльчивый характер"
 leader_trait_mem_pov_short_temper_council_desc:0 "Профессор часто впадает в приступы ярости даже при малейших неудобствах. Многие стали жертвами крика, и многие отчаянно пытаются сбежать."
 zir_prof_catch_phrase:0 "Знаете ли вы, что вы можете назначать лидеров в свой совет? Лидеры более высокого уровня идеальны..."
 assimilated_by_mem_vir:0 "Учебный план Профессора"
 assimilated_by_mem_vir_desc:0 "Профессор провёл свой учебный план на этой планете, привлекая больше учеников в свою орбиту..."
 assimilated_by_mem_vir_mem_povtt:0 "§HУчебный план Профессора:§!\nПроизводство ресурсов правящим попом: §G+20%§!\nПривлекательность материалистической этики: §G+75%§!"
 decision_mem_pov_assimilation:0 "Учебный план"
 decision_mem_pov_assimilation_desc:0 "Профессор стремится образовать наше население через кибернетическую интеграцию."
 decision_mem_pov_assimilation_hive:0 "$decision_mem_pov_assimilation$"
 decision_mem_pov_assimilation_hive_desc:0 "$decision_mem_pov_assimilation_desc$"
 mem_vir_pc_macro_computer:0 "$pc_macro_computer$"
 decision_mem_pov_assimilation_tooltip:0 "Несинтетические и непсионические попы получают следующие §Yчерты:§! ['trait:trait_cybernetic'], ['trait:trait_cyborg_logic_engines']\n\nПредоставляет следующий §Yпланетарный модификатор:§! ['modifier:assimilated_by_mem_vir']"
 hive_assimilated_by_mem_vir:0 "Интеграция Профессора"
 hive_assimilated_by_mem_vir_desc:0 "Профессор успешно интегрировал эту планету, дав нашим дронам более высокие когнитивные функции."
 turned_prof_into_scrap:0 "Утилизированное образовательное ядро"
 prof_site_reward:0 "Макровычисления"
 decision_mem_build_macro_computer:0 "Построить макрокомпьютер"
 decision_mem_build_macro_computer_desc:0 "Благодаря Профессору мы научились превращать целую планету в единый взаимосвязанный суперкомпьютер."
 decision_mem_build_macro_computer_tooltip:0 "Заменяет основные районы исследовательскими специализациями и открывает возможность строить больше.\n§YНе рекомендуется делать это на экономически важном мире.\n§RМожно построить только один.§!"
 decision_mem_build_macro_computer_tooltip2:0 "§TОткрывает исследовательские специализации!§!"
 civic_teachings_of_mem_vir:0 "Учения Профессора"
 civic_teachings_of_mem_vir_desc:0 "Это общество оказалось под руководством Профессора Вира. Все так или иначе подверглись влиянию учебного плана."
 councilor_teachings_of_mem_vir:0 "Старший преподаватель"
 councilor_teachings_of_mem_vir_desc:0 "Образованная империя не может учиться только у одного человека. Старший преподаватель отвечает за то, чтобы учебный план Профессора соблюдался любой ценой."
 civic_hive_teachings_of_mem_vir:0 "Интеграция Профессора"
 civic_hive_teachings_of_mem_vir_desc:0 "Этот улей был обучен Профессором Вира, который интегрировал себя с ульем с помощью передовой кибернетики."
 t_macro_maintenance:0 "Центр обслуживания компьютеров"
 t_macro_maintenance_desc:0 "Макрокомпьютер требует огромного обслуживания, чтобы оставаться полностью функциональным. Этот район предоставляет хранилище для дронов обслуживания и дополнительно обеспечивает сборку дронов."
 zone_mem_pov_research_physics:0 "Физический вычислительный процессор"
 zone_mem_pov_research_physics_desc:0 "Этот процессор специализируется на физических расчётах."
 zone_mem_pov_research_society:0 "Социальный вычислительный процессор"
 zone_mem_pov_research_society_desc:0 "Этот процессор специализируется на расчётах функционирования и развития обществ."
 zone_mem_pov_research_engineering:0 "Инженерный вычислительный процессор"
 zone_mem_pov_research_engineering_desc:0 "Этот процессор специализируется на оценке новых методов в инженерии."
 zone_mem_pov_research_university:0 "Вычислительный процессор"
 zone_mem_pov_research_university_desc:0 "Этот процессор специализируется на оценке новых методов в области инженерии, общества или физики."
 planet_macro_research_district:0 "Вычислительный процессор"
