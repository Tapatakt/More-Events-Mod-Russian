l_russian:

 mem_nanobot_room_category:0 "Уникальная добывающая станция"
 mem_nanobot_room_category_desc:0 "Сканирование показало интересную находку на поверхности [Root.GetName]. Кажется, что это заброшенная добывающая станция, но сенсоры нашего научного корабля зафиксировали колеблющиеся энергетические сигналы, возникающие внутри станции. \n\nМожет показаться, что этот объект по-прежнему активен."
 mem_nanobot_room.1.name:0 "Добыча руды наноботами"
 mem_nanobot_room.1.desc:0 "Несмотря на трудности при посадке на поверхность, научная экспедиция под руководством [Root.leader.GetName] смогла безопасно войти на станцию. Следуя по датчикам своих скафандров, команда начала тяжёлый путь в глубины комплекса, к источнику нестабильных энергетических сигналов. То, что они обнаружили, было весьма необычным. \n\nНерегулярные энергетические сигналы производились роями наноботов, которые, несмотря на свой возраст и отсутствие обслуживания, кажется, не забыли своё назначение. Команда с изумлением наблюдала, как наноботы, не найдя лучших терминов, \"пожирали\" казалось бы бесполезные камни, \"переваривали\" содержимое, \"выделяли\" бесполезный материал в контейнер для отходов и \"отрыгивали\" ценные минералы в сборную ёмкость, которая, похоже, не очищалась довольно долгое время."
 mem_nanobot_room.1.a:0 "Их создатели не будут против, если мы возьмем их минералы."
 mem_nanobot_room.1.mat:0 "Отремонтировать наноботов."
 mem_nanobot_room.10.name:0 "Провал"
 mem_nanobot_room.10.desc:0 "Энергетические сигналы исчезли так же быстро, как и появились. После нескольких часов зондирования и исследований [Root.leader.GetName] прекратил [Leader.GetHisHer] поиски. Что бы ни вызвало энергетические сигналы, так и не будет найдено."
 mem_nanobot_room.10.a:0 "Пойдем отсюда."
 mem_nanobot_room.20.name:0 "Критический провал"
 mem_nanobot_room.20.desc:0 "Когда команда приземлилась на поверхность планеты, [Root.leader.GetName] случайно активировал старый протокол обороны. Земля затряслась, и к любопытству и ужасу команды энергетические сигналы начали перемещаться из глубин комплекса прямо к научной группе. Команда попыталась покинуть планету, но безуспешно. \n\nЭнергетические сигналы оказались ордой агрессивных наноботов, которые быстро поглотили [Root.leader.GetName], [Leader.GetHisHer] команду и даже целый научный корабль. Поглотив команду, наноботы устремились обратно в шахтёрский комплекс. Похоже, нам никогда не узнать, что изначально делали наноботы."
 mem_nanobot_room.20.a:0 "Проклятье."
