 decision_mem_scfe_planet_illusion_rune: "Терраформирование руны иллюзий"
 decision_mem_scfe_planet_illusion_rune_desc: "Добавляет две особенности планете."
 mem_scfe_decision_two_prospect_effects_short: "Добавляет две случайные §Yпланетарные особенности§! на планету."
 decision_mem_scfe_planet_haste_rune: "Ускорение руны поспешности"
 decision_mem_scfe_planet_haste_rune_desc: "Быстрые, как волки Айсврака."
 r_mem_scfe_damage_rune: "Могучая руна"
 r_mem_scfe_damage_rune_desc: "Могучая руна была создана Машинной империей по просьбе §HНиблакса§!. При первом испытании руна высвободила столько энергии, что уничтожила всю систему. Руна дарует великую силу тому, кто её удерживает."
 r_mem_scfe_haste_rune: "Руна спешки"
 r_mem_scfe_haste_rune_desc: "Руна спешки была создана духовной цивилизацией. Они поклонялись §HНиблаксу§!, как своему богу. Ниблакс воспользовался их верой и обманом заставил их создать руну спешки, погубив их в процессе."
 haste_rune_activated: "§HОткрывает решение:§! §G$decision_mem_scfe_planet_haste_rune$§!, даруя возможность ускорить время на одной планете, повышая §Yскорость строительства зданий и скорость устранения препятствий§!."
 r_mem_scfe_illusion_rune: "Руна иллюзий"
 r_mem_scfe_illusion_rune_desc: "Руна иллюзий была создана расой антропоидов, умевших маскироваться. В своей попытке использовать руну, чтобы скрыться от §HНиблакса§!, они исчезли. Руна иллюзий дарует её пользователю абсолютный контроль над самой реальностью, превращая антиматерию в материю."
 mem_scfe_illusion_rune_activated: "§HОткрывает решение:§! §G$decision_mem_scfe_planet_illusion_rune$§!, даруя возможность добавить две особенности планеты."
 r_mem_scfe_arcane_rune: "Тайная руна"
 r_mem_scfe_arcane_rune_desc: "Первая руна, также известная как Тайная руна, была создана Вортой, учёным-шакземом. Он высосал живую энергию из своего народа, чтобы собрать необходимую мощь для ковки руны."
 mem_scfe_arcane_rune_activated: "Создаёт §Yгубернатора§!, §Yучёного§!, §Yадмирала§! или §Yгенерала§! из душ собранных шакземов."
 r_mem_scfe_invisibility_rune: "Руна невидимости"
 r_mem_scfe_invisibility_rune_desc: "О руне невидимости известно немногое; она была создана для §HНиблакса§!, но утеряна из-за небрежности её создателей."
 r_mem_scfe_regeneration_rune: "Руна регенерации"
 r_mem_scfe_regeneration_rune_desc: "Руна регенерации была создана сущностью разума-улья, которая при первом использовании слилась в одно планетоподобное существо. Она обладает силой исцелять и восстанавливать повреждения чрезвычайно быстро."
 mem_scfe_planet_haste_rune_boost: "Ускорение руны спешки"
 mem_scfe_planet_haste_rune_boost_desc: "Эта планета в настоящее время ускоряется руной спешки."
 mem_scfe_planet_illusion_rune_boost: "Терраформирование руны иллюзий"
 mem_scfe_planet_illusion_rune_boost_desc: "Окружающая среда этой планеты была очищена §Yруной иллюзий§!"
 mem_scfe_invisibility_rune: "$r_mem_scfe_invisibility_rune$"
 mem_scfe_invisibility_rune_desc: "Наша империя скрыта силой руны невидимости, блокирующей вражеские датчики и дарующей нам превосходство в бою."
 mem_scfe_invisibility_rune_fc: "$r_mem_scfe_invisibility_rune$"
 mem_scfe_invisibility_rune_fc_desc: "$mem_scfe_invisibility_rune_desc$"
 mem_scfe_regeneration_rune: "$r_mem_scfe_regeneration_rune$"
 mem_scfe_regeneration_rune_desc: "Руна регенерации позволяет нашим кораблям восстанавливать броню и корпус."
 mem_scfe_power_rune_boost: "Мощь руны урона"
 mem_scfe_power_rune_boost_desc: "Руна урона позволяет нашим кораблям проводить разрушительные орбитальные бомбардировки."
 mem_scfe_arcane_rune.1.name: "Синтетическая сборка"
 mem_scfe_arcane_rune.1.desc: "Теперь мы можем создать искусственную форму жизни из душ шакземских предков в единое существо, чтобы помочь нам. Вопрос в том, какую цель должен служить этот §YТайный синтет§!?"
 mem_scfe_arcane_rune.1.a: "Создай нам чиновника"
 mem_scfe_arcane_rune.1.b: "Создай нам учёного"
 mem_scfe_arcane_rune.1.c: "Создай нам командира"
 mem_scfe_ghastly_eyrie_init.1.name: "Странное излучение"
 mem_scfe_ghastly_eyrie_init.1.desc: "Войдя в систему §HХироккин§!, наши научные суда зафиксировали странную радиационную сигнатуру с планеты §HМокксу§!."
 mem_scfe_ghastly_eyrie_init.1.a: "Отправьте команду для расследования."
 mem_scfe_ghastly_eyrie_site: "Раскопки Мокксу"
 mem_scfe_ghastly_eyrie_relic_world_site_desc: "Наши научные суда зафиксировали странную радиационную сигнатуру с §HМокксу§!."
 mem_scfe_ghastly_eyrie.1.name: "Долгое путешествие"
 mem_scfe_ghastly_eyrie.1.desc: "При сканировании поверхности планеты наша команда обнаружила разлагающийся город в его глубочайшей бездне. Исходящее от города излучение настолько интенсивно, что нарушает работу приборов нашего корабля, делая навигацию по ущелью невозможной. Наши археологи продолжат расследование пешком."
 mem_scfe_ghastly_eyrie.1.a: "Продолжайте."
 mem_scfe_ghastly_eyrie.2.name: "Шакземы"
 mem_scfe_ghastly_eyrie.2.desc: "У самого дна ущелья лежит город. Согласно находкам нашей команды, город когда-то парил над бездной, но по причинам, которые ещё предстоит выяснить, его парящие механизмы вышли из строя.\n\nПо мере приближения команды к руинам воздух наполняется слабыми звуками — голоса, детский смех и отдалённые стоны. Некоторые из экипажа верят, что город населён привидениями, и колеблются, двигаться ли дальше, но более скептичные и отважные продолжают путь. Именно тогда перед ними появляются существа, похожие на духов."
 mem_scfe_ghastly_eyrie.3.desc: "§BНе бойтесь, путешественники. Мы — шакземы, и мы пришли с миром.§!\n\nОдно из существ выступает вперёд как представитель, подтверждая их мирные намерения. Оно объясняет, что они — последние остатки давно погибшей цивилизации. Заинтригованные, наши археологи спрашивают, что стало с их народом, и шакземы начинают повествовать о сказе Ворты и Дники."
 mem_scfe_ghastly_eyrie.4.name: "Ссора влюблённых"
 mem_scfe_ghastly_eyrie.4.desc: "Согласно их сказу, Ворта был одним из величайших учёных, каких когда-либо знали шакземы — до того дня, когда их бог, Го'лдай, явился.\n\n§BДругие шакземы почитали это существо как божество, но Ворта и Дника видели правду... Это был вовсе не бог! Существо было просто космической сущностью, уникальной в галактике: Ниблакс!§!\n\nОни продолжили объяснять, что Ворта глубоко увяз в помощи Ниблаксу с его тайным проектом. Однако однажды Дника сделала ужасное открытие — Ворта и Ниблакс использовали граждан шакземов в качестве жертв для своих мерзких экспериментов. Так началась трагическая ссора влюблённых..."
 mem_scfe_ghastly_eyrie.4.a: "Трагично."
 mem_scfe_ghastly_eyrie.5.name: "Первая руна"
 mem_scfe_ghastly_eyrie.5.desc: "Ссора закончилась катастрофой, когда преступления Ворты стали достоянием общественности, развязав гражданскую войну. Его эксперименты были сосредоточены на создании того, что он называл §YРунами силы§! — мистических рун, выкованных путём высасывания жизненной энергии живых существ. С достаточным количеством рун Ворта верил, что сможет создать ещё одного Ниблакса. Хотя его намерения могли быть благородными, методы были не чем иным, как чудовищными.\n\nВ конце концов Ворта успешно создал первую руну, которую назвал §YТайной руной§!.\n\nНо как только руна была завершена, сам Ниблакс вступил в конфликт, опустошив город. Он разрушил всё, убив каждого оставшегося шакзема."
 mem_scfe_ghastly_eyrie.6.desc: "Что Ниблакс не осознавал, так это то, что одной руны было недостаточно для исполнения его желаний.\n\nВ ходе войны Днике удалось заполучить руну, но она была повреждена в битве при Экборе. Остатки шакземской цивилизации теперь хранят этот артефакт и, кажется, готовы предложить его нам — за определённую цену.\n\nПоскольку руна была повреждена, она больше не функционирует, что означает: бесчисленные жизни шакземов были принесены напрасно. Чтобы восстановить её силу, необходимо принести ещё одну жертву.\n\nТолько тогда шакземы передадут §YТайную руну§!."
 mem_scfe_ghastly_eyrie.6.a: "Такой сложный сценарий..."
 mem_scfe_ghastly_eyrie.11.name: "Жертва"
 mem_scfe_ghastly_eyrie.11.desc: "Шакземы ждут ответа. Кого мы принесём в жертву?"
 mem_scfe_ghastly_eyrie.11.a: "Было бы неправильно, если бы капитан не пожертвовал собой."
 mem_scfe_ghastly_eyrie.11.b: "§Y[Root.Leader.GetName]§! слишком важен, пожертвуйте кем-нибудь другим."
 mem_scfe_ghastly_eyrie.12.name: "Тайная руна"
 mem_scfe_ghastly_eyrie.12.desc: "Наш офицер был помещён в древнее устройство, где его жизненная сила была высосана для завершения ритуала. Как только жертва была принесена, машина разрушилась, и остатки шакземов исчезли, оставив руну позади.\n\nБыли ли шакземы настоящими духами или лишь продвинутыми голографическими проекциями, созданными устройством, остаётся неясным. В конце концов, однако — ценой жизни нашего офицера — мы получили §YТайную руну§!."
 mem_scfe_ghastly_eyrie.12.a: "Достойная жертва."
 mem_scfe_ghastly_eyrie.13.name: "Тайная руна"
 mem_scfe_ghastly_eyrie.13.desc: "Чтобы жертва увенчалась успехом, мы собрали группу девиантных дронов и выполнили свою часть сделки. Как только ритуал был завершён, машина разрушилась, и остатки шакземов исчезли, оставив руну позади.\n\nБыли ли шакземы настоящими духами или просто продвинутыми голографическими проекциями, созданными устройством, остаётся неопределённым. Но в конце концов §YТайная руна§! теперь в наших руках."
 mem_scfe_ghastly_eyrie.13.mach: "Ошибка: душа не найдена."
 mem_scfe_ghastly_eyrie.13.hive: "Всё для улья."
 mem_scfe_techis_init.1.name: "Разрушенная система"
 mem_scfe_techis_init.1.desc: "§Y[Root.GetName]§! сообщает, что система §HХнум§! была опустошена уже довольно давно. Причиной разрушения была не сама звезда, а массивный энергетический всплеск, возникший на одной из планет."
 mem_scfe_techis_init.1.a: "Выясните, что произошло!"
 mem_scfe_techis_site: "Раскопки Таркуна"
 mem_scfe_techis_relic_world_site_desc: "Дальнобойные сканы показывают, что система была уничтожена энергетическим всплеском, возникшим на планете Сплин."
 mem_scfe_techis.1.name: "Первоначальный отчёт"
 mem_scfe_techis.1.desc: "Наши первичные сканы подтвердились. Вся система была опустошена массивным энергетическим всплеском тысячелетия назад, уничтожившим каждую планету и обрушившим солнце в чёрную дыру. Хотя планеты были полностью уничтожены, осколки остались — некоторые из них всё ещё несут следы того, что кажется руинами древней цивилизации."
 mem_scfe_techis.1.a: "Проверьте их."
 mem_scfe_techis.2.name: "Машинные миры"
 mem_scfe_techis.2.desc: "Наши учёные исследовали руины с наиболее высокими остаточными энергетическими показаниями и обнаружили, что поверхность планеты когда-то была покрыта металлом и проводами, напоминая колоссальный суперкомпьютер. Эта планета имела возможность размещать и соединять центры обработки данных по всей своей поверхности. Примечательно, что некоторые узлы данных всё ещё работают, и мы можем подключить наши системы и взломать мейнфрейм планеты."
 mem_scfe_techis.2.a: "Начать подключение."
 mem_scfe_techis.3.name: "Умирающие архивы"
 mem_scfe_techis.3.desc: "Создание интерфейса с потоком данных планеты оказалось сложнее, чем ожидалось. Несмотря на трудности, наши хакеры получили доступ к данным, хранящимся в разрушенных архивных структурах.\n\n§B'Неопределённые избыточности, создание локальной резервной копии...\nЗагрузка nyblax.log...\nЖурнал: Обнаружено неопознанное существо.\nЖурнал: Присвоение кода бета-инопланетянин.\nЖурнал: Активация оборонительных протоколов.\nЖурнал: Бета-инопланетянин не враждебен.\nЖурнал: Начало социального взаимодействия...'§!\n\nСистема застряла в цикле, воспроизводя файл с меткой 'Nyblax.log'. Похоже, эта цивилизация столкнулась с инопланетным существом, с которым начала взаимодействовать."
 mem_scfe_techis.3.a: "Продолжайте читать!"
 mem_scfe_techis.4.name: "Ниблакс"
 mem_scfe_techis.4.desc: "Системные журналы были фрагментированы и трудны для интерпретации, что представляло вызов, на который наши хакеры не рассчитывали. Тем не менее их отчёт подтверждает прибытие существа, идентифицированного как Ниблакс.\n\nВ течение многих лет Ниблакс и машины вели торговлю. Существо делилось передовыми технологиями от других цивилизаций, с которыми сталкивалось, а в обмен машины работали над созданием нечто, что они называли Руна."
 mem_scfe_techis.5.desc: "Согласно их журналам, машины успешно создали руну, но, к сожалению, не зафиксировали детали того, как это было сделано.\n\nПеред тем как передать её Ниблаксу, они решили испытать руну. Наша команда пришла к выводу, что именно этот тест и вызвал катастрофический коллапс всей системы, поскольку их последняя запись в журнале гласит следующее:\n\n§BЖурнал: Руна — соединение с планетарной матрицей установлено.\nЖурнал: Инициация отладки руны.§!\n§RСистемный сбой\nСохранение nyblax.log\nСистемный сбой\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные\nПовреждённые данные§!"
 mem_scfe_techis.5.a: "Такая сила. Где сейчас руна?"
 mem_scfe_techis.6.name: "Могучая руна"
 mem_scfe_techis.6.desc: "Наша команда вернулась на §Y[Root.GetName]§!, чтобы найти руну среди обломков. Используя сканеры корабля, они определили источник сохраняющихся энергетических показаний. Установив курс, экипаж проложил путь через останки планеты и нашёл руну, дрейфующую в вакууме космоса."
 mem_scfe_techis.6.a: "С Могучей руной как мы можем быть побеждены?"
 mem_scfe_narrow_maze_init.1.name: "Замеченный сигнал"
 mem_scfe_narrow_maze_init.1.desc: "§Y[Root.GetName]§! столкнулся с причудливым зрелищем: облако пыли в форме дракона исходит от планеты §HНинсун§!. Дальнобойные сканы показывают, что планета усеяна заброшенными колониями, которые могут быть стоит исследовать."
 mem_scfe_narrow_maze_init.1.a: "Весьма интригующе."
 mem_scfe_narrow_maze_site: "Разрушенная планета"
 mem_scfe_narrow_maze_relic_world_site_desc: "Облако пыли в форме дракона исходит от одного из призрачных городов §HНинсун§!."
 mem_scfe_narrow_maze.1.name: "Лабиринт Нинсун"
 mem_scfe_narrow_maze.1.desc: "Продвигаясь по руинам в поисках источника облака, команда оказывается потерянной внутри города-лабиринта. Они сообщают о видении высоких статуй и молитвенных фресок, посвящённых существу по имени Ниблакс, все, казалось, указывали на место интереса."
 mem_scfe_narrow_maze.1.a: "Следуйте за подсказками!"
 mem_scfe_narrow_maze.2.name: "Церковь Кварри"
 mem_scfe_narrow_maze.2.desc: "Наши эксперты определили место, куда их направляли статуи и росписи, ведущее к источнику сигнала. В конце пути стоял храм. Его архитектура, по-видимому, датируется эпохой возрождения цивилизации. Гаргульи в форме Ниблакса украшали сооружение, и когда наши археологи вошли внутрь, их встретил тошнотворный запах и груды разлагающихся тел."
 mem_scfe_narrow_maze.2.a: "Что произошло?"
 mem_scfe_narrow_maze.3.name: "Книга мёртвых"
 mem_scfe_narrow_maze.3.desc: "В храме не было следов борьбы, болезни или сражения. Казалось, эти люди просто... умерли.\n\nОдин из наших учёных обнаружил на алтаре том. Он лежал открытым, и на одной из страниц содержался следующий отрывок:\n\n§B'И сделав это, ты призовёшь Ниблакса. Ибо его нужды выше наших, и наши души будут вечны.'§!"
 mem_scfe_narrow_maze.3.a: "Продолжайте читать."
 mem_scfe_narrow_maze.4.name: "Тёмный ритуал"
 mem_scfe_narrow_maze.4.desc: "Том, составлявший основу их веры, повествует о Ниблаксе и рунах. Согласно легенде, Ниблакс посетил систему Нинсун тысячи лет назад, предлагая цивилизации Кварри быстрый путь к вознесению.\n\nРитуал требовал массовой жертвы вокруг алтаря, обещая, что через этот акт народ Кварри вознесётся на высшую плоскость существования.\n\nКнига утверждает, что после завершения ритуала из бездушных тел будет создана руна, и Ниблакс вернётся, чтобы удостовериться, что их вознесение исполнилось."
 mem_scfe_narrow_maze.4.a: "Где руна?"
 mem_scfe_narrow_maze.5.name: "Руна спешки"
 mem_scfe_narrow_maze.5.desc: "Среди тел павших было обнаружено странное ожерелье, испускающее слабые энергетические импульсы.\n\nПохоже, ожерелье когда-то принадлежало верховному жрецу.\n\nРазобрав его, наша команда выяснила, что оно было создано Ниблаксом для накопления энергии от мёртвых с целью создания руны. После завершения руны ожерелье должно было подать сигнал Ниблаксу, чтобы он вернулся и забрал её.\n\nУдивительно, но руна всё ещё находилась внутри ожерелья!"
 mem_scfe_narrow_maze.5.a: "Похоже, мы добрались до неё первыми!"
 mem_scfe_quad_init.1.name: "Аритмичное сердцебиение"
 mem_scfe_quad_init.1.desc: "Войдя в систему §HКикимора§!, наши научные суда обнаружили мощный сигнал сердцебиения, исходящий от §HМ'Чолу§!. §Y[Root.Leader.GetName]§! горит желанием исследовать планету."
 mem_scfe_quad_init.1.a: "Продолжайте."
 mem_scfe_quad_site: "Раскопки М'Чолу"
 mem_scfe_quad_relic_world_site_desc: "Планета, по-видимому, обладает аритмичным сердцебиением."
 mem_scfe_quad.1.name: "Липкие земли"
 mem_scfe_quad.1.desc: "После приземления на поверхность планеты мы обнаружили, что весь ландшафт представляет собой живой организм. Трудно определить возраст органической ткани, но на основе радиоуглеродного датирования некоторых мёртвых образцов мы оцениваем её более чем в тысячу лет.\n\nАритмичное сердцебиение эхом разносится по планете, заставляя землю дрожать с каждым ударом. Источник сердцебиения, по-видимому, находится глубоко внутри горы рядом с древними руинами. Наша команда предлагает исследовать руины по пути к горе."
 mem_scfe_quad.1.a: "Вперёд."
 mem_scfe_quad.2.name: "Костяные здания"
 mem_scfe_quad.2.desc: "По мере приближения нашей команды к руинам они заметили, что сердцебиение планеты учащается, словно сама планета осознаёт их присутствие. Команда сообщила, что сооружения были сделаны из мышц, тканей и костей — изумительный пример органической архитектуры. Эти здания всё ещё были живы, дышали, хотя разумной жизни не осталось. Масштаб сооружений предполагает, что они когда-то вмещали тысячи, но никакой другой вид не был обнаружен.\nНаши археологи предполагают, что произошёл массовый исход к горе, откуда исходит сердцебиение. Команда продвинулась дальше.\n\nУ вершины они обнаружили туннель из плоти, ведущий глубоко в сердце горы."
 mem_scfe_quad.2.a: "Продолжайте движение."
 mem_scfe_quad.5.name: "М'Чолу"
 mem_scfe_quad.5.desc: "Щупальца начали обволакивать исследовательскую команду, когда к ней приблизилось гигантское безликое существо. Несмотря на пугающий вид, существо не проявляло враждебности. На самом деле оно начало общаться с нами.\n\n§HВы Ниблакс?§!"
 mem_scfe_quad.5.a: "Хм, нет."
 mem_scfe_quad.6.desc: "§BСущество кажется разочарованным, осознав, что ваша команда не то существо, которого оно ждало.§!\n\nДа, я разочарован...\nИ да, я связал свои мысли с вашими, создав мост между нашими разумами, чтобы мы могли общаться. Связь слабее с низшими или механическими видами, как вы, и тем не менее, вот мы здесь.\nКак это возможно? Ну... благодаря Ниблаксу. Мы когда-то были гордым и добрым коллективом, известным как Мортра, но теперь мы слились в единое, превосходное существо."
 mem_scfe_quad.6.a: "Что такое Ниблакс?"
 mem_scfe_quad.7.desc: "§BСущество кажется раздражённым и расстроенным вашими мыслями.§!\n\nНиблакс... Он прибыл на наш родной мир тысячи лет назад. Существо полагало, что мы похожи на него — уникальные, единственные в своём роде. И в каком-то смысле так оно и было... Он искал нашей дружбы и помощи.\nЧестен ли был Ниблакс, благонамерен, злонамерен или просто потерян в безнадёжном отчаянии, остаётся неясным.\nОн хотел, чтобы мы создали для него руну, и когда мы это сделали, он вернулся бы, чтобы забрать её.\nДа, конечно, мы создали руну! Как вы думаете, нам удалось слить весь наш коллектив в это единое сосуд?\nРуна? Она у меня где-то здесь. Я уже очень долго пытаюсь избавиться от неё, но преодолеть собственную гравитацию оказалось... довольно сложно."
 mem_scfe_quad.7.a: "Можем ли мы забрать её?"
 mem_scfe_quad.8.desc: "§BОдно из щупалец существа тянется к вашей команде, держа руну.§!\n\nПожалуйста, заберите её с собой... Как только руна покинет эту планету, я наконец смогу умереть.\n\n§BСущество замирает, глубокая меланхолия в его движениях.§!\n\nЯ разумен уже тысячелетия, ожидая, когда Ниблакс вернётся и заберет руну, но он так и не пришёл. Человек может жить только до тех пор, пока у него есть цель, а моя давно истекла. Сделаете ли вы это для меня?"
 mem_scfe_quad.8.dev: "Сегодня мы будем пировать."
 mem_scfe_quad.8.phil: "Жизнь — это выбор, мы поможем тебе."
 mem_scfe_quad.8.phob: "Помочь тебе покончить с ужасной жизнью? Дай нам руну!"
 mem_scfe_quad.8.spir: "Судьба привела нас сюда неслучайно, воля наших повелителей"
 mem_scfe_quad.8.mate: "Конечно. Жизнь переоценена"
 mem_scfe_quad.8.egal: "Справедливо, что ты сам решаешь, жить тебе или нет."
 mem_scfe_quad.8.auth: "Твоё желание бессмысленно, ты должен служить нам или умереть."
 mem_scfe_quad.8.mili: "Мы заберём руну и запустим тактические ядерные боеголовки на поверхность"
 mem_scfe_quad.8.paci: "Мы поможем тебе покончить с мучениями, да покоишься ты с миром."
 mem_scfe_quad.8.mach: "Положительно"
 mem_scfe_quad.8.hive: "Мы заберём руну, леди. Да встретимся снова."
 mem_scfe_quad.8.default: "Конечно."
 mem_scfe_quad.9.name: "Руна регенерации"
 mem_scfe_quad.9.desc: "Обеспечив §Yруну регенерации§! и начав подъём с поверхности планеты, многочисленные щупальца вырвались из туннеля горы, тянувшиеся к нашему кораблю.\nНаш капитан выполнил манёвры уклонения, успешно выведя нас на орбиту. Пока мы уклонялись от цепляющихся конечностей и достигли стратосферы, мы наблюдали, как щупальца обмякли, безжизненные."
 mem_scfe_quad.9.a: "Думаю, в конце концов никто не хочет умирать"
 mem_scfe_jex_init.1.name: "Тёмное солнце"
 mem_scfe_jex_init.1.desc: "В системе §HМиреска§!, по-видимому, есть планета, вращающаяся вокруг чёрной дыры. Хотя это необычно, ещё более примечательно наличие признаков цивилизации и флоры на планете. Без энергии звезды кажется маловероятным, что жизнь могла там процветать."
 mem_scfe_jex_init.1.a: "Давайте взглянем на неё"
 mem_scfe_jex_site: "Раскопки Джекса"
 mem_scfe_jex_relic_world_site_desc: "На поверхности §HДжекса§! есть признаки цивилизации, но без энергии звезды кажется маловероятным, что жизнь могла там процветать."
 mem_scfe_jex.1.name: "Обманчивые чувства"
 mem_scfe_jex.1.desc: "Приземлившись, наша команда встретила удивительно тёплую атмосферу. Воздух был густым от влажности, а весь ландшафт освещался странным светом, исходящим со стороны чёрной дыры. Местная флора цвела пышно, её цветы были яркими.\nОтсутствие солнца озадачило наших учёных. Не в силах объяснить аномалию, они направились к ближайшему городу в поисках ответов."
 mem_scfe_jex.1.a: "Просто идите!"
 mem_scfe_jex.2.name: "Маскированная лаборатория"
 mem_scfe_jex.2.desc: "К тому времени, как они прибыли, город исчез! На его месте стояла заброшенная лаборатория, полная исследовательских материалов.\nРасшифровав инопланетный язык, наша команда начала просеивать документы. Вскоре они определили, что лаборатория была основана антропоидным видом с естественными способностями к маскировке. Исследования были сосредоточены на создании устройства с использованием их собственной ДНК."
 mem_scfe_jex.2.a: "Продолжайте читать!."
 mem_scfe_jex.3.name: "Посетитель"
 mem_scfe_jex.3.desc: "Согласно исследовательским заметкам, антропоиды столкнулись с высшим существом, известным как Ниблакс. В записях описывается, как существо научило их использовать их природные способности для создания того, что они назвали §Yруной силы§!. Предположительно, они преуспели и готовились испытать её в месте, известном как Белая Башня.\nК сожалению, большая часть записей, описывающих процесс создания, слишком повреждена, чтобы их можно было использовать для воспроизведения. Наш лучший вариант — исследовать Белую Башню, надеясь найти больше подсказок о том, что с ними произошло, их солнцем и их цивилизацией."
 mem_scfe_jex.3.a: "Отправляйтесь на место!"
 mem_scfe_jex.4.name: "Белая Башня"
 mem_scfe_jex.4.desc: "Исследовав планету, мы обнаружили Белую Башню. Как и лаборатория, это место давно покинуто антропоидами.\nЦифровая консоль, управлявшая и регистрировавшая деятельность Белой Башни, всё ещё функционировала. Мы получили доступ к журналам и обнаружили, что руна сработала. Они назвали её §Yруной иллюзий§!, и согласно записям, она использовалась, чтобы скрыть солнце, превратив его в чёрную дыру.\nСила руны использовалась повсюду — в их лабораториях, городах и самой планете — скрывая, усиливая или даже создавая тот рай, который мы видим сейчас. Опасаясь возвращения Ниблакса и любых скрытых мотивов, они переместили руну в место, известное как Жёлтая Башня."
 mem_scfe_jex.4.a: "Просто заберите руну!"
 mem_scfe_jex.5.name: "Руна иллюзий"
 mem_scfe_jex.5.desc: "Жёлтая Башня была почти идентична Белой, с одним заметным отличием: §Hруна иллюзий§! просто лежала в главной входной системе.\nЗаинтригованные, наши археологи изучили журналы системы и обнаружили, что, когда их датчики зафиксировали приближение Ниблакса к планете, антропоиды использовали §Hруну иллюзий§! на всём своём населении.\nНаш единственный вывод: в попытке сделать себя невидимыми они буквально исчезли, поскольку дальнейших записей в журналах не найдено.\nКоманда вернулась с руной, неся с собой сказки о потерянном виде и самой красивой планете, которую они когда-либо видели."
 mem_scfe_jex.5.a: "Не смотрите в прошлое одарённой руны..."
 mem_scfe_riki_init.1.name: "Рассеянный свет"
 mem_scfe_riki_init.1.desc: "§Y[Root.GetName]§! обнаружил, что в определённой позиции и времени суток свет от звезды становится рассеянным. Эта аномалия осталась бы незамеченной, если бы мы не вошли в систему в нужный момент. Рассеяние света, по-видимому, вызвано неопознанным объектом на орбите планеты §HДеани§!."
 mem_scfe_riki_init.1.a: "Неужели это древняя цивилизация?"
 mem_scfe_riki_site: "Рассеянный свет"
 mem_scfe_riki_relic_world_site_desc: "Свет от звезды рассеивается неопознанным объектом на орбите планеты §HДеани§!."
 mem_scfe_riki.1.name: "Невидимая станция"
 mem_scfe_riki.1.desc: "Войдя на орбиту §HДеани§!, один из членов экипажа заметил облако космической пыли в форме станции. По мере приближения судна к аномалии стало ясно, что мы имеем дело с замаскированной орбитальной станцией."
 mem_scfe_riki.1.a: "Прорваться на станцию и выяснить её назначение."
 mem_scfe_riki.2.name: "Прорыв"
 mem_scfe_riki.2.desc: "После успешного прорыва в стыковочный отсек наша команда разведала станцию. Там никого не было.\nХотя станция казалась заброшенной, голоса раздавались возле общественного сектора. По мере приближения команды они обнаружили источник: проигрывающуюся зацикленную голограмму."
 mem_scfe_riki.2.a: "Что она говорила?"
 mem_scfe_riki.3.name: "Потерянные в космосе"
 mem_scfe_riki.3.desc: "Запись была длинной и на инопланетном языке, который нашим специалистам пришлось расшифровать и перевести. Согласно говорящему, весь экипаж покинул станцию в поисках Ниблакса, но забыл, что станция была замаскирована, и не смог найти обратную дорогу.\n\n§BПрошло §RСТАТИКА§! месяцев с тех пор, как мы покинули станцию Арканин. У нас закончилось топливо, и нам пришлось §RСТАТИКА§! на поверхности Деани. Без возможности вырваться из гравитации планеты кажется маловероятным, что мы §RДОЛГИЙ СТАТИК§!. Если вы видите это сообщение, пожалуйста, найдите нас — мы находимся в §RДОЛГИЙ СТАТИК§! долине разломов. Мы успешно создали §RДОЛГИЙ СТАТИК§!, что сделало станцию невидимой.§!"
 mem_scfe_riki.3.a: "Нам нужна эта технология!"
 mem_scfe_riki.4.name: "Рисунки Ниблакса"
 mem_scfe_riki.4.desc: "Поверхность Деани непригодна для жизни — неудивительно, что перспективы экипажа Арканин были столь мрачны. Наши сканеры не смогли обнаружить каких-либо сооружений или обломков, поэтому наши археологи провели поиск по сетке через каждую долину, которую смогли найти.\nК счастью, экспедиция увенчалась успехом: мы обнаружили пещеру, где экипаж провёл последние дни. Стены пещеры были украшены древними рисунками, повествующими историю Ниблакса.\n\nВ первой группе рисунков экипаж встречает существо впервые, получая дар. Наши лингвисты интерпретируют это как дар знания. История продолжается: экипаж использует этот дар на своей родной планете, невольно вызывая гибель большинства своего народа.\nПоследняя группа рисунков показывает экипаж, поднимающий светящуюся руну, как будто это какой-то приз или достижение. Когда произошла катастрофа, жизненная сила их народа кристаллизовалась в эту руну. Согласно рисункам, руна обладает силой делать объекты невидимыми."
 mem_scfe_riki.4.a: "Вероятно, самый тупой экипаж ever, а теперь, где руна?"
 mem_scfe_riki.5.name: "Руна невидимости"
 mem_scfe_riki.5.desc: "Задача оказалась сложнее, чем ожидалось. Мы ожидали, что руна будет рядом с трупами экипажа Арканин, но одного члена не хватало. Наши датчики в конечном итоге обнаружили его тело на берегу отравленного озера. К счастью для нас, руна всё ещё была при нём."
 mem_scfe_riki.5.a: "Могу ли я её увидеть?"
 mem_scfe_abandoned_invisible_observation_outpost: "Исследовательская станция Арканин"
 mem_scfe_riki_observation_tooltip: "Замаскированная орбитальная станция"
 mem_scfe_riki_observation_desc: "Замаскированная орбитальная станция"
 mem_scfe_rune_lost: "Потеря руны силы"
 mem_scfe_rune_lost_desc: "Наша неосторожность стоила нам одного из самых мощных оружий в галактике."
 mem_scfe_nyblax_country.11.name: "Потерянные реликвии"
 mem_scfe_nyblax_country.11.base: "Вслед за административными потрясениями, вызванными нашим вассалитетом, похоже, что наша"
 mem_scfe_nyblax_country.11.desc1: "$mem_scfe_nyblax_country.11.base$ §Yруна силы§! исчезла. Мы послали людей искать её повсюду, но большинство уже потеряло надежду найти её."
 mem_scfe_nyblax_country.11.desc2: "$mem_scfe_nyblax_country.11.base$ §Yруны силы§! исчезли. Мы послали людей искать их повсюду, но большинство уже потеряло надежду найти их."
 mem_scfe_nyblax_country.11.a: "Наиболее трагическая потеря"
 mem_scfe_nyblax_country.20.name: "Таинственный скряга"
 mem_scfe_nyblax_country.20.desc: "Сомнительная фигура приблизилась к нашим лидерам с захватывающими новостями: он владеет мощной реликвией, известной как §YМогучая руна§!, и готов обменять её на поставку редких специй."
 mem_scfe_nyblax_country.20.a: "Интересное развитие событий."
 mem_scfe_nyblax_country.21.name: "Одноглазый голем"
 mem_scfe_nyblax_country.21.desc: "Странный литоид приблизился к нам с предложением: если мы сможем вылечить его редкое состояние, он наградит нас мощной реликвией, известной как §Yруна спешки§!."
 mem_scfe_nyblax_country.21.a: "По рукам!"
 mem_scfe_nyblax_country.22.name: "Неожиданное сокровище"
 mem_scfe_nyblax_country.22.desc: "Повреждённый инопланетный грузовой корабль прибыл в пределах наших границ после аварийного прыжка, не подавая признаков жизни. При расследовании было обнаружено, что он содержит набор ценных артефактов, включая мощную реликвию, известную как §Yруна иллюзий§!."
 mem_scfe_nyblax_country.23.name: "Мстительные духи"
 mem_scfe_nyblax_country.23.desc1: "Прошлой ночью призракоподобные существа явились во сне §Y[Root.GetRulerTitle] [Root.GetRulerName]§!, предъявляя мощную реликвию, известную как §YТайная руна§!, при условии, что она будет использована против §HНиблакса§!. Пробудившись, §Y[Root.GetRulerName]§! обнаружил руну, всё ещё сжатую в их [GetSpeciesHandNamePlural]."
 mem_scfe_nyblax_country.23.desc2: "Мощное видение прервало процессы §Y[Root.GetRulerTitle] [Root.GetRulerName]§!, когда призракоподобные фигуры предъявили мощную реликвию, известную как §YТайная руна§!, с условием использовать её против §HНиблакса§!. Когда видение утихло, §Y[Root.GetRulerName]§! обнаружил руну надёжно у себя в [GetSpeciesHandNamePlural]."
 mem_scfe_nyblax_country.23.a: "Жутковато"
 mem_scfe_nyblax_country.24.name: "Трикстер"
 mem_scfe_nyblax_country.24.desc: "Сегодня был пойман вор после напряжённой погони, последовавшей за серией дерзких краж в последние месяцы. Его секрет был наконец раскрыт, когда мощная реликвия, известная как §Yруна невидимости§!, была обнаружена у него при себе. Тревожно, но вор полностью исчез в тот момент, когда реликвию изъяли у него."
 mem_scfe_nyblax_country.25.name: "Буйный рост"
 mem_scfe_nyblax_country.25.desc: "Один из наших грузовых кораблей был уничтожен изнутри внезапным буйным ростом собственного груза. Среди обломков мы обнаружили мощную реликвию, известную как §Yруна регенерации§!, которая заставила некоторые семена мгновенно прорасти в густой лес, разорвав корабль на части."
