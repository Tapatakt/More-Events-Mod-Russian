l_russian:

 mem_mysterious_pyramids_category:0 "Загадочные Пирамиды"
 mem_mysterious_pyramids_category_desc:0 "Изучение токсичного мира выявило более дюжины пирамидальных форм, расположенных на поверхности с геометрической точностью. Учитывая, что в этом мире не было обнаружено привычных нам разумных форм жизни, дальнейшее изучение должно быть полезно."
 mem_mysterious_pyramids.102.name:0 "Неудачное терраформирование"
 mem_mysterious_pyramids.102.desc:0 "Как было предположено, пирамидальные сооружения являются искусственными. Стены сделаны из местных цементированных заполнителей, и более глубокий анализ обнаружил распадающиеся радиоактивные элементы, соответствующие реакторам на делении. Несколько были замечены, выпуская крупные газовые столбы. Спектроскопический анализ указывает, что они состоят в основном из водяного пара и углекислого газа, а также весьма значительного количества метана.\n\nНаучный офицер [This.leader.GetName] считает, что пирамиды являются газовыми станциями, воздвигнутыми для терраформирования [From.GetPlanetMoon]. Водяной пар и углекислый газ оба способствуют жизни. По пути эти станции должны были подключиться к залежам метанового гидрата, также известного как горящий лёд. Этот выброс мог вызвать неконтролируемый парниковый эффект, который в настоящее время правит атмосферной химией этого мира. Кислотные ливни проносятся по поверхности, разъедая терраформеры. Это лишь вопрос времени, когда они сломаются, но ущерб уже нанесён. Анализ того, что произошло, поможет нам избежать этих ловушек в будущем."
 mem_mysterious_pyramids.102.a:0 "Поучительная история."
 mem_mysterious_pyramids.103.name:0 "Ксеноформеры"
 mem_mysterious_pyramids.103.desc:0 "Анализ пирамидных структур показал, что они действительно являются искусственными конструкциями. Тысячи шестиногих роботов снуют по поверхности [From.GetPlanetMoon], отвечая за инфраструктуру и установки для добычи ресурсов, обнаруженные на орбитальной фотографии. Сами пирамиды функционируют как атмосферные процессоры, но на первый взгляд не кажется, что они вообще влияют на смесь в атмосфере.\n\nПоразительное откровение пришло к научному офицеру [This.leader.GetName]. Возможно, эти конструкты работают по программе. Пирамиды могли быть построены для создания этой токсичной атмосферы, а затем для её поддержания, как они, по-видимому, делают сейчас. Научный офицер [This.leader.GetName] выдвигает теорию, что этот мир был посещён кораблём или зондом, запрограммированным на изменение этого мира на такой, который мог бы вместить расу, коренным образом отличающуюся от нас. Коррозионные бури, проносящиеся по экваториальному региону этого мира, могут быть для них не более чем лёгким бризом, а озёра аммиака могли быть там для поддержки их версии сельского хозяйства.\n\nПредставляется другая возможность: там могут быть другие зонды, посланные искать больше миров для 'ксеноморфирования' в токсичные пустоши."
 mem_mysterious_pyramids.103.a:0 "Разберите и изучите сооружения."
 mem_mysterious_pyramids.103.b:0 "Оставьте их; не наше это дело."
 mem_mysterious_pyramids.202.name:0 "Загадка"
 mem_mysterious_pyramids.202.desc:0 "Пирамиды оказались огромными каменными сооружениями, достаточно сложными, чтобы предположить искусственное происхождение. Удалённые раскопки не принесли никаких результатов. Они построены из обычного гранита, без каких-либо признаков внутренних механизмов сложнее обычного экскаватора. Может быть, это какие-то культурные памятники: надгробные камни или части астрономического календаря. Чем бы они ни были, для нас они бесполезны."
 mem_mysterious_pyramids.202.a:0 "Любопытно."
