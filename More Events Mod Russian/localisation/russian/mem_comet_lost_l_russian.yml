l_russian:

 mem_comet_lost.1.name:0 "Потеряна комета"
 mem_comet_lost.1.desc:0 "Комета, которой ранее требовались тысячи лет, чтобы совершить оборот вокруг системы[Capital_Scope.Solar_System.GetName] и которую не раз видели в небе над [Capital_Scope.GetName] в течение [root.GetSpeciesAdj] истории, закончила свой невероятно сложный путь и навсегда оставила границы системы. \n\nТеперь она за пределами действия наших сенсоров и, по прогнозам, не вернется в обозримое пространство на протяжении многих тысячелетий."
 mem_comet_lost.1.desc.alt:0 "Комета [the_guy.GetName] совершала обороты вокруг Системы[Capital_Scope.Solar_System.GetName] тысячелетиями и ее периодически видели в небе над [Capital_Scope.GetName] в течение [root.GetSpeciesAdj] истории. Как бы то ни было, наши астрономы сообщают нам, что она завершила свой невероятно сложный путь и покинула пределы системы навсегда. \n\nТеперь она за пределами действия наших сенсоров и, по прогнозам, не вернется в обозримое пространство на протяжении многих тысячелетий."
 mem_comet_lost.1.a:0 "Нам будет ее не хватать..."
 mem_comet_lost.1.b:0 "Возьму на заметку"
 mem_comet_lost.1.c:0 "Пусть теперь она приносит радость чужим мирам."
 mem_comet_lost.1.d:0 "Мы сопроводим ее в далекие миры!"
 mem_comet_lost.1.e:0 "Расчеты орбитальной механики остаются точными."
