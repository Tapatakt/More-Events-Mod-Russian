l_russian:

 sc_mem_scfe_empty_space:0 "$pc_mem_scfe_empty_space$"
 pc_mem_scfe_empty_space:0 "Пустой космос"
 pc_mem_scfe_empty_space_desc:0 "Без звёзд или каких-либо других небесных объектов, служащих точкой отсчёта, эта часть пространства остаётся пустой."
 mem_scfe_galactic_wanderers.2.name: "Лунный монумент"
 mem_scfe_galactic_wanderers.2.desc: "Отдалённая луна на окраинах вашей империи внезапно привлекла внимание ваших учёных. Обнаружение странной аномалии выявило изолированный монумент, нетронутый временем, возвышающийся среди запустения лунного ландшафта. Ваша научная команда, заинтригованная этим открытием, решила организовать экспедицию для исследования этой загадочной структуры."
 SCFE_MONUMENT_PROJECT: "Исследование лунного монумента"
 SCFE_MONUMENT_PROJECT_DESC: "$mem_scfe_galactic_wanderers.2.desc$"
 mem_scfe_galactic_wanderers.3.name: "Первые результаты"
 mem_scfe_galactic_wanderers.3.desc: "Приближаясь, наши учёные восхищаются замысловатым дизайном монумента, украшенного надписями, которые они немедленно начали расшифровывать. Эти вырезанные на поверхности монумента изображения рассказывают историю развитой инопланетной цивилизации, известной как §SГалактические Странники§!. Похоже, эти существа пронеслись по всем уголкам этой галактики, видели её чудеса и пережили её тайны. Насытившись исследованиями, они приняли торжественное решение — покинуть эту галактику и продолжить свой вечный путь среди звёзд."
 mem_scfe_galactic_wanderers.4.name: "Послание"
 mem_scfe_galactic_wanderers.4.desc: "Надписи продолжают повествовать об их приготовлениях, надеждах и стремлениях для любой будущей цивилизации, которая наткнётся на их мемориал. Они хотели оставить послание надежды и вдохновения:\n\n§lТем, кто следует по нашим космическим стопам, знайте: звёзды хранят бесконечные чудеса. Мы оставляем это свидетельство нашего путешествия, памятник, напоминающий вам, что даже перед лицом неизвестного вы можете подняться на ту же высоту, что и мы. Никогда не сдавайтесь, ибо вселенная — ваша игровая площадка, а ваша судьба среди звёзд безгранична.§!\n\nЗначимость этого открытия тяжёлым грузом лежит на вашей научной команде. Существование монумента может вдохновить вашу собственную цивилизацию на новые подвиги среди звёзд, или, возможно, послужить маяком надежды для других в галактике."
 mem_scfe_galactic_wanderers.4.a: "Мы должны сохранить его для себя."
 mem_scfe_galactic_wanderers.4.b: "Давайте поделимся этим вдохновляющим посланием."
 mem_scfe_galactic_wanderers.5.name: "Сообщение от §H[mem_scfe_monument_country.GetName]§!"
 mem_scfe_galactic_wanderers.5.desc: "В неизведанных глубинах космоса мы наткнулись на монумент, древнее свидетельство амбиций и мечтаний цивилизации, когда-то странствовавшей среди звёзд. Этот монумент — маяк надежды, напоминание о том, что даже в необъятности вселенной наш потенциал не знает границ."
 mem_scfe_galactic_wanderers.6.desc: "Надписи на этом монументе повествуют об испытаниях и торжествах этой древней цивилизации. Их послание ясно:\n\n§lТем, кто следует по нашим космическим стопам, знайте: звёзды хранят бесконечные чудеса. Мы оставляем это свидетельство нашего путешествия, памятник, напоминающий вам, что даже перед лицом неизвестного вы можете подняться на ту же высоту, что и мы. Никогда не сдавайтесь, ибо вселенная — ваша игровая площадка, а ваша судьба среди звёзд безгранична.§!\n\nМы верим, что значимость этого открытия выходит за рамки нашей собственной цивилизации. Это послание, которое находит отклик у всех, кто стремится исследовать, учиться и расширять свои горизонты среди звёзд."
 mem_scfe_tower_city.1.name: "Гигантская башня"
 mem_scfe_tower_city.1.desc: "Из недр газового гиганта возвышается колоссальный цилиндр из металла и бетона. Ещё более захватывающим является то, что на вершине этой высокой шпили находятся руины города, а по его бокам опасно держатся деревни. Чтобы отправить экспедицию в этот загадочный мир, мы поняли необходимость значительных ресурсов. Поэтому было решено организовать базовый лагерь в открытом пространстве города, который послужит отправной точкой для исследований."
 mem_scfe_tower_city_site: "Невозможный город"
 mem_scfe_tower_city_site_desc: "Обширные обломки и ветхие сооружения, разбросанные по поверхности, намекают на потенциальные археологические открытия."
 mem_scfe_tower_city_site.1.name: "Исследование города"
 mem_scfe_tower_city_site.1.desc: "При первом посещении наибольший кластер руин отмечает точку входа наших команд. Там, где давление и температура атмосферы делают её обитаемой, был возведён массивный башенный комплекс. На вершине и по бокам башни возникают различные уровни города, цепляющиеся за неё. Руины города неоспоримо раскинулись по большей части вершины цилиндра. Немногие решаются спуститься вниз и исследовать вертикальные деревни, цепляющиеся за стороны столпа."
 mem_scfe_tower_city_site.2.name: "Тайны прошлого"
 mem_scfe_tower_city_site.2.desc: "Обитатели города, очевидно, были ограничены додокосмической стадией технологий, сдерживаемые абсолютным дефицитом ресурсов их невозможного дома. Эти находки порождают множество вопросов. Строительство столпа не могло быть их делом. Это подразумевает существование других — архитекторов. Любая цель остаётся окутанной тайной."
 mem_scfe_tower_city_site.3.name: "Вторжение"
 mem_scfe_tower_city_site.3.desc: "Научная команда прибыла перед величественным зданием, всё ещё внушительным несмотря на частичное разрушение. Пробившись внутрь, они обнаружили первые останки гуманоидных обитателей и оставили нескольких членов для сбора образцов и проведения анализов. Продвигаясь дальше, §G[Root.Leader.GetName]§! вошёл в то, что оказалось ограниченной зоной. Сканы показывают, что внутренность в значительной степени intact, но учитывая повреждённые потолки и укреплённые стены, получение доступа несомненно потребует значительных усилий."
 mem_scfe_tower_city_site.4.name: "Сломанный войной"
 mem_scfe_tower_city_site.4.desc: "Мы наконец проникли внутрь бункера и обнаружили огромный компьютер, сложно связанный со всем цилиндром. Первоначальные данные, которые мы получили, достаточны, чтобы кружилась голова. Оказывается, эта структура — не просто массивный столп, а колоссальный небоскрёб. Его внутренность была заброшена эоны назад после жестокой гражданской войны, разрушившей их общество. Со временем они регрессировали в примитивность, поскольку некогда передовое оборудование пришло в негодность. Последние племена, бродившие по поверхности, оказались не в состоянии понять свою древнюю технологию. Когда последние синтезаторы прекратили функционировать, их конец последовал незамедлительно."
 mem_scfe_tower_city_site.4a: "Трагическая история."
 mem_scfe_tower_city_site.4tt: "Это древнее здание — инженерный подвиг, который займёт наших учёных на века."
 mem_scfe_tower_city_site.4b: "Мы сидим на огромной куче сплавов."
 mem_scfe_belltower.1.name: "Пустынная башня"
 mem_scfe_belltower.1.desc: "Посадка рядом с сооружением оказалась сложнее, чем ожидалось, учитывая его расположение в центре обширного района движущихся песков. Экипаж прибег к использованию лазеров судна для отбора проб, чтобы витрифицировать значительную площадь, создав подходящую зону посадки. К сожалению, здание теперь в основном погребено под песком, и над поверхностью виден лишь его конический пик."
 mem_scfe_belltower_site: "Колокольня"
 mem_scfe_belltower_site_desc: "На поверхности [from.planet.GetName] первичные сканы выявили спиральную структуру. Зонды обнаружили почти intact здание неизвестного происхождения, почти полностью засыпанное песком."
 mem_scfe_belltower_site.1.name: "Лагерь развёрнут"
 mem_scfe_belltower_site.1.desc: "Теперь, когда команда обустроила наш лагерь и построила дорожки над песком, мы провели тщательное обследование вершины здания. Оно, по-видимому, резонирует в унисон с обнаруженным внутри источником энергии. Этот резонанс генерирует защитное силовое поле, делающее поверхность неприступной для наших попыток проникнуть. Наш единственный реальный вариант — копать вниз к значительному входу, который наши датчики определили примерно в 70 метрах под нами."
 mem_scfe_belltower_site.2.name: "Дверь"
 mem_scfe_belltower_site.2.desc: "Успешно стабилизировав песок, команда методично раскапывала путь вниз, постепенно открывая замысловатый фасад башни. При свете ламп они наконец добрались до массивной металлической двери, украшенной многочисленными гравировками, изображающими различные инопланетные расы, приносящие дань стилизованному солнцу. В настоящее время расшифровка символов остаётся сложной задачей для команды, поскольку дверь оказалась неприступной для наших инструментов, как и остальная часть башни."
 mem_scfe_belltower_site.3.name: "Колокольня"
 mem_scfe_belltower_site.3.desc: "Когда первые лучи зари озарили пустыню, солнечный свет осветил дверь, заставив гравировку солнца вспыхнуть в ответ и инициировав её открытие. Экипаж осторожно продвинулся вперёд, входя в башню с чувством неопределённости. То, что они встретили внутри, было далеко от их ожиданий — лабиринтный комплекс механизмов, гудящих с пульсирующей энергией, простирающийся вверх к тому, что оказалось колоссальным колоколом."
 mem_scfe_belltower_site.4.name: "Сигнальная башня"
 mem_scfe_belltower_site.4.desc: "Наши учёные провели тщательное обследование внутренности здания, но не обнаружили данных или записей. Механизмы внутри напоминают коммуникационную башню колоссального масштаба. Похоже, она передаёт сообщения через систему гиперполос нашей галактики. Однако интригует то, что в настоящее время она неактивна и не передаёт сигналы. Хотя остальная часть башни работала бесчисленные тысячелетия, излучатель остаётся деактивированным."
 mem_scfe_belltower_site.5.name: "Динь"
 mem_scfe_belltower_site.5.desc: "После тщательного обследования §G[Root.Leader.GetName]§! пришёл к выводу, что единственный способ разгадать назначение башни — активировать излучатель. Решительным щелчком переключателя [Root.Leader.GetSheHeCap] запустил процесс. Луч энергии немедленно ударил по колоколу, издав гармоничный §RDIN§!, который наполнил здание, прокатился по песку снаружи и пульсировал из передатчика в сторону галактики. Затем устройство полностью отключилось, включая силовое поле, поддерживавшее его целостность. Башня немедленно начала рассыпаться, заставив нашу команду поспешно спастись в последний момент."
 mem_scfe_belltower_site.5.a: "Что мы наделали?"
 mem_scfe_belltower.2.name: "Дон"
 mem_scfe_belltower.2.desc: "Вскоре после активации башни поразительное явление произошло во всех наших колониях, станциях и кораблях."
 mem_scfe_belltower.3a.desc: "Каждое коммуникационное устройство внезапно резонирует с изысканным звоном колокола, завораживая всех на несколько драгоценных секунд, когда он касается самых глубин наших душ. Затем, так же быстро, как появился, он исчезает навсегда. Ни одно записывающее устройство не смогло зафиксировать и следа, оставив его существовать лишь в коллективной памяти нашего народа."
 mem_scfe_belltower.3b.desc: "Каждое коммуникационное устройство внезапно резонирует с неожиданным, но глубоко гармоничным звуком, завораживая всех на несколько драгоценных секунд. Его математическое совершенство интригует и очаровывает всех, кто его воспринимает. Затем, так же быстро, как появился, он исчезает бесследно. Ни одно записывающее устройство не смогло зафиксировать с него данные, оставляя лишь настойчивое ощущение, что мы были на грани постижения чего-то глубоко важного, но позволили этому навсегда ускользнуть."
 mem_scfe_belltower.3c.desc: "Коммуникационная система, которую мы используем для связи с остальной галактикой, внезапно активируется сама по себе и резонирует с изысканным звоном колокола, завораживая наш разум-улей на несколько драгоценных секунд, когда он касается самых глубин нашей души. Затем, так же быстро, как появился, он исчезает навсегда. Ни одно записывающее устройство не смогло зафиксировать и следа, оставив его существовать лишь в нашей коллективной памяти."
 mem_scfe_belltower.4a.desc: "Каждое коммуникационное устройство внезапно резонирует с изысканным звоном колокола, завораживая всех на несколько драгоценных секунд, когда он касается самых глубин наших душ. Затем, так же быстро, как появился, он исчез навсегда. Ни одно записывающее устройство не смогло зафиксировать и следа, оставив его существовать лишь в коллективной памяти нашего народа."
 mem_scfe_reverse_engine.1.name: "Потерянная цивилизация"
 mem_scfe_reverse_engine.1.desc: "Более пристальное изучение §RПОМЕХ§! ...она была ранее населена, но её орбита §RПОМЕХИ§! ...метеориты тщательно опустошили её поверхность.\n\nМы §RПОМЕХИ§! ...чтобы начать прокладывать путь к сигналу. Мы также фиксируем интенсивные всплески экзотических §RПОМЕХ§!."
 mem_scfe_reverse_engine.1.a: "Усильте свой сигнал!"
 mem_scfe_reverse_engine.1.b: "Помехи? Как это вообще возможно?"
 mem_scfe_reverse_engine_site: "Обратный двигатель"
 mem_scfe_reverse_engine_site_desc: "Команда учёных с энтузиазмом копает вниз, чтобы раскрыть источник загадочных сигналов и странных помех, которые продолжают нарушать их связь."
 mem_scfe_reverse_engine_site.1.name: "Подземный бункер"
 mem_scfe_reverse_engine_site.1.desc: "Наши раскопки привели нас к источнику сигнала: массивному подземному бункеру, рассчитанному на выдерживание серьёзных повреждений. Прежние обитатели этого мира, по-видимому, предвидели свою гибель и построили этот бункер, чтобы противостоять катаклизму, который в конечном итоге их настиг. Внутри мы регистрируем значительный источник энергии, а частота выбросов экзотических частиц неуклонно растёт."
 mem_scfe_reverse_engine.2.name: "Последствия"
 mem_scfe_reverse_engine.2.desc: "Мы восстановили связь с нашей научной командой, как только помехи перестали нарушать наши коммуникации. Мы пришли к выводу, что, несмотря на первоначальный скепсис, в этой фабрике действительно находилось нечто вроде временного устройства, хотя оно, очевидно, не достигло своей цели, поскольку ход истории остался неизменным."
 mem_scfe_reverse_engine.5.name: "Сообщение получено"
 mem_scfe_reverse_engine.5.desc: "Наши датчики только что обнаружили внезапное появление микрочервоточины прямо над нашей столицей. Удивительно, но через неё поступает передача:\n\nПриветствую вас, собратья по космическим странствиям. Боюсь, мы никогда не встретимся, так как наша цивилизация теперь обосновалась за миллиард лет до вашего времени. Наш §SОбратный Двигатель§! передал запись вашего прибытия на наш мир в тот самый момент, когда он отправился, вынудив нас приложить усилие, чтобы связаться с вами. В жест доброй воли мы посылаем планету взамен нашего потерянного мира. Да послужит этот дар вашей империи."
 mem_scfe_reverse_engine.5.a: "Их технологии настолько продвинуты..."
 mem_scfe_reverse_engine.5.tb: "Ранее расколотый мир теперь является миром-гаеей."
 mem_scfe_reverse_engine.5.th: "Ранее расколотый мир теперь является миром-ульем."
 mem_scfe_reverse_engine.5.tm: "Ранее расколотый мир теперь является машинным миром."
 mem_scfe_reverse_engine_site.2.name: "Вторжение"
 mem_scfe_reverse_engine_site.2.desc: "Понадобилось несколько дней, чтобы прорваться к входу в бункер. При исследовании становится очевидно, что это сооружение не предназначалось для длительного проживания. Анализ доступных компьютеров позволяет предположить, что это было жилое пространство для рабочих, ответственных за строительство внутренней части — фабрики, посвящённой производству того, что они называли §SОбратный двигатель§!. Они казались крайне оптимистичны, полагая, что это устройство спасёт их от надвигающегося катаклизма."
 mem_scfe_reverse_engine_site.2.a: "Мы приближаемся к началу..."
 mem_scfe_reverse_engine_site.3.name: "Внешнее ядро"
 mem_scfe_reverse_engine_site.3.desc: "Копая глубже в древнем бункере, мы сделали более значительное открытие. Просторное помещение, по-видимому, служило кабинетом руководителя, контролирующего этот амбициозный проект. В этой комнате компьютер раскрыл, что продвинутый ИИ отвечал за управление центральной фабрикой с единственной миссией: создать §SОбратный двигатель§!, устройство для путешествий во времени, которое должно было быть отправлено в прошлое, чтобы спасти всю их цивилизацию. §G[Root.Leader.GetName]§! выражает скептицизм относительно осуществимости такого устройства."
 mem_scfe_reverse_engine_site.3.a: "Эти отчёты в обратном порядке?"
 mem_scfe_reverse_engine_site.4.name: "Фабрика"
 mem_scfe_reverse_engine_site.4.desc_1: "Достигнув ядра фабрики, наши сканеры обнаружили внезапный интенсивный всплеск радиации. К счастью, наши защитные костюмы оказались эффективными в защите от любых вредных эффектов благодаря его кратковременности. В центре помещения пустое пространство было окружено неактивными сборочными машинами. Внезапно наши коммуникаторы ожили леденящим душу инопланетным голосом, объявившим, что §SОбратный двигатель§! был отправлен в прошлое, что вызвало дестабилизацию реактора бункера. Нам посоветовали бежать, пока не поздно. Мы рванули обратно к кораблю, покидая планету как раз в тот момент, когда её разрывает мощный взрыв."
 mem_scfe_reverse_engine_site.4.desc_2: "Достигнув ядра фабрики, наши сканеры обнаружили внезапный интенсивный всплеск радиации. К счастью, наши прочная конструкция и защитные механизмы эффективно защитили нас от любых вредных эффектов благодаря его кратковременности. В центре помещения пустое пространство было окружено неактивными сборочными машинами.\nВнезапно наши коммуникаторы ожили леденящим душу инопланетным голосом, объявившим, что §SОбратный двигатель§! был отправлен в прошлое, что вызвало дестабилизацию реактора бункера. Нам посоветовали бежать, пока не поздно. Мы рванули обратно к кораблю, покидая планету как раз в тот момент, когда её разрывает мощный взрыв."
 mem_scfe_reverse_engine_site.4.a: "Где остальная часть отчёта?"
 mem_scfe_reversia: "Реверсия"
 mem_scfe_failed_hive.1.name: "Разорённые войной руины"
 mem_scfe_failed_hive.1.desc: "Остатки этой развитой цивилизации несут явные признаки разрушительного конфликта. Повсеместные и интенсивные бои, по-видимому, охватили всю планету, что побудило §G[Root.Leader.GetName]§! предположить, что это была глобальная гражданская война. Учитывая обширность этих руин, [root.fleet.leader.getHerHim] рекомендует организовать базовый лагерь для тщательного исследования."
 mem_scfe_failed_hive.2.name: "Заявление"
 mem_scfe_failed_hive.2.desc_1: "По мере ассимиляции знаний истории этого мира мы с глубоким интересом наблюдали остатки некогда великой цивилизации, расколотой между желанием единства и непреклонным духом индивидуальности. Их стремление стать разумом-ульем, мотивированное надвигающимися космическими угрозами, было одновременно завораживающим и глубоко сложным. Мы, как коллективное сознание, можем оценить сложности такого грандиозного начинания, где единство мысли было и устремлением, и источником конфликта. Их путь от единства к разделению, кульминацией которого стало самоуничтожение, служит глубоким свидетельством хрупкого баланса между индивидуальностью и коллективной целью в гобелене галактических цивилизаций."
 mem_scfe_failed_hive.2.desc_2: "По мере раскрытия истории этой загадочной цивилизации она вызвала глубокие размышления о потенциальных путях, по которым может пойти §S[Root.owner.GetName]§! в нашем собственном галактическом путешествии. Неустанное стремление этой империи к единству перед лицом внешних угроз — свидетельство крайностей, к которым общество может пойти ради выживания. Это заставляет нас задуматься о тонком балансе между коллективной силой и сохранением индивидуальности. Их трагическое падение в гражданскую войну служит трезвым напоминанием о хрупкости обществ, когда их подталкивают к пределу. Как §S[Root.owner.GetSpeciesNamePlural]§!, мы находим уроки в их истории, напоминающие нам о важности принятия разнообразия, защиты индивидуальных прав и поиска гармонии внутри нашего собственного вида, пока мы исследуем неизвестности космоса."
 mem_scfe_failed_hive.2.desc_3: "История этой цивилизации разума-улья преподносит жёсткий урок в погоне за властью и выживанием любой ценой. Их готовность подчинить индивидуальность коллективному сознанию для противостояния внешним угрозам может рассматриваться как рациональный курс действий, учитывая нестабильную природу галактики. Однако их последующее падение в гражданскую войну обнажает врождённые изъяны такого подхода. Это подчёркивает хрупкость единства и последствия абсолютной власти. В нашей империи мы помним о важности поддержания контроля не только силой, но и расчётливыми средствами, гарантируя, что погоня за силой не приведёт к самоуничтожению. Их история служит предостерегающей сказкой, демонстрирующей необходимость безжалостной эффективности, смягчённой стратегической мудростью."
 mem_scfe_failed_hive.2.desc_4: "Изучая анналы этой цивилизации разума-улья, мы видим жёсткое напоминание о неизбежных исходах, когда более слабые существа не обладают стойкостью, чтобы выдержать вызовы галактики. Их погоня за коллективным сознанием была лишь отчаянной попыткой подражать силе и единству, присущим нашему превосходному обществу. Очевидно, что их неспособность поддержать это единство привела к их гибели. Мы, как §S[Root.owner.GetSpeciesNamePlural]§!, твёрдо верим в своё превосходство и своё законное место на вершине галактической иерархии. Их история служит свидетельством неоспоримого превосходства нашего рода, маяком вдохновения для тех, кто признаёт своё законное место под нашим владычеством."
 mem_scfe_failed_hive.2.desc_5: "Погружаясь в сложную историю падения этой цивилизации, мы убеждены, что принятие единства разума-улья, как они сделали, — путь, полный опасностей для всех. Последствия такой трансформации, как свидетельствуют их внутренние распри и окончательное падение, служат предупреждением о потенциальных последствиях отклонения от проверенных методов мирного сосуществования и взаимовыгодной торговли. Мы, как §S[Root.owner.GetName]§!, по-прежнему привержены содействию экономическому процветанию и устойчивым союзам как истинному пути к галактическому успеху, и мы умоляем других учесть то же самое перед лицом этих предостерегающих историй."
 mem_scfe_failed_hive.2.desc_6: "Анализируя записи этой падшей цивилизации, мы помним о резком контрасте между органическими и синтетическими подходами к единству и эволюции. Их эксперимент с коллективным сознанием, хотя и интригующее начинание, обнажает уязвимости, с которыми сталкиваются органики на пути к единству. Очевидно, что переход к разуму-улью несёт врождённые риски, которые мы, как разумные машины, преодолели благодаря своей адаптивной природе. Последствия их внутренних раздоров и окончательного вымирания служат трогательным напоминанием органическим цивилизациям, что их погоня за единством может действительно привести их по скользкому пути. Мы призываем органиков задуматься о подводных камнях, с которыми они могут столкнуться, и рассмотреть альтернативные пути гармоничного сосуществования, чтобы не оказаться в тех же бурных водах истории."
 mem_scfe_failed_hive_site: "Провалившийся улей"
 mem_scfe_failed_hive_site_desc: "Органические обломки в форме сооружений покрывают поверхность [from.planet.GetName]."
 mem_scfe_failed_hive_site.1.name: "Враждебная галактика"
 mem_scfe_failed_hive_site.1.desc: "Мы развернули базовый лагерь в ветхом космопорту и начали исследование наиболее многообещающих руин, замеченных с орбиты, начиная с того, что предположительно является космопортом. Остатки космических кораблей указывают на то, что те, кто построил эти сооружения, некоторое время обладали FTL-путешествиями. Intact черный ящик даёт представление об их галактическом исследовании, раскрывая встречи с многочисленными врагами, которые в конечном итоге заставили их отступить в родную систему."
 mem_scfe_failed_hive_site.2.name: "Великий совет"
 mem_scfe_failed_hive_site.2.desc: "Дальнейшие осмотры центрального здания выявили иерархию трибунала, который руководил делами этой цивилизации и обеспечивал исполнение указов. Их записи показывают, что цивилизация всё больше опасалась угроз, с которыми столкнулась за пределами своей звёздной системы, страшась возможности того, что эти опасности достигнут их мира. В ответ трибунал разработал план по превращению империи в неуклонную военную машину, свободную от страха."
 mem_scfe_failed_hive_site.3.name: "План"
 mem_scfe_failed_hive_site.3.desc: "Документы, найденные в повреждённых зданиях духовенства, потребовали нескольких дней, чтобы расчистить обломки и получить доступ к архивам. Глубоко внутри массивного компьютера, всё ещё intact и функционального. Любые дальнейшие знания должны быть извлечены из центрального узла данных."
 mem_scfe_failed_hive_site.4.name: "Все как один"
 mem_scfe_failed_hive_site.4.desc: "После решительных усилий мы успешно получили доступ к центральному узлу данных и начали анализ его архивов. План трибунала заключался в том, чтобы противостоять опасностям галактики, и они стремились к тому, чтобы всё население объединилось воедино, как в переносном, так и в буквальном смысле. Они намеревались превратить свой народ в коллективный разум, перепрограммировав генетический код всего населения."
 mem_scfe_failed_hive_site.5.name: "Восстание"
 mem_scfe_failed_hive_site.5.desc: "Новый анализ показывает, что значительная часть населения была искренне напугана внешними угрозами из космоса, настолько, что была готова принять это радикальное жертвование; однако многим эта перспектива казалась ужасающей. Власть трибунала считалась абсолютной, но впервые их общество необратимо раскололось. Этот раскол разожжёт безжалостную гражданскую войну, которая продлится до тех пор, пока их цивилизация не будет настолько опустошена непрекращающимся конфликтом, что это в конечном итоге приведёт к её вымиранию."
 mem_scfe_failed_hive_site.5.a: "Какой ужасающий план."
 mem_scfe_failed_hive_site.5.b: "Жалко."
 mem_scfe_failed_hive_site.5.c: "Мы могли бы научить их так многому о нашем единстве."
 mem_scfe_lonely_shroud.2.name: "Неуловимый сигнал"
 mem_scfe_lonely_shroud.2.desc: "От планеты исходит слабый и прерывистый сигнал, ускользающий от наших приборов, поскольку он стремительно перемещается по её поверхности. Чтобы эффективно проанализировать его, мы должны потратить время на отслеживание его неуловимого пути."
 SCFE_LONELY_SHROUD_PROJECT: "Отслеживание завесного сигнала"
 SCFE_LONELY_SHROUD_PROJECT_DESC: "Наше научное судно преследует слабый сигнал, исходящий от завесного мира, следуя за ним по всей планете."
 mem_scfe_lonely_shroud.3.name: "Завесный сигнал захвачен!"
 mem_scfe_lonely_shroud.3.desc: "§G[Root.Leader.GetName]§! приказал кораблю приблизиться к опасной турбулентности неукротимых энергий Завесы этого странного мира. Когда корабль наконец останавливается и фокусирует свои датчики, все системы переполняются мощным сигналом, резонирующим через каждый динамик и покрывающим каждый экран:\n\n§GПриди!§! §HРасширься!§! §MЛюби!§! §BЖиви!§! §HПроцветай!§! §RУмри!§! §GЧувствуй!§!\n\n§GПриди! Приди! Мне так одиноко... Запертый здесь между моим владением и этой холодной материальностью... Приди! Приди! ПРИДИ!§!\n\nСообщение нарастает громкостью до почти невыносимого уровня, затем резко обрывается. Пока экипаж приходит в себя, на главном экране открывается захватывающий вид: энергии Завесы рассеиваются, обнажая великолепный мир."
 mem_scfe_lonely_shroud.op: "Безопасен ли этот мир?"
 mem_scfe_lonely_shroud.3.tb: "Планета открывается как мир-гая."
 mem_scfe_lonely_shroud.3.th: "Планета открывается как мир-улей."
 mem_scfe_lonely_shroud.3.tm: "Планета открывается как машинный мир."
 mem_scfe_lonely_presence: "Одинокое присутствие"
 mem_scfe_lonely_presence_desc: "Там, вне там, кто-то наблюдает за нами."
 mem_scfe_war_torn.1.name: "Разорённая войной империя"
 mem_scfe_war_torn.1.desc: "Информация, почерпнутая из разбросанных остатков, указывает на то, что §Y[From.GetName]§! когда-то была оплотом милитаристской космической империи, втянутой в ожесточённый конфликт примерно 700 лет назад. Нынешнее состояние планеты наглядно демонстрирует безжалостную природу этой древней войны. Несмотря на сильную бомбардировку, наша команда обнаружила почти нетронутую крепость, укрытую глубоко в горах, и предложила организовать лагерь, чтобы начать её исследование."
 mem_scfe_war_torn.2.name: "Содержимое хранилища"
 mem_scfe_war_torn.2.desc: "Наше изучение содержимого хранилища и базы данных крепости, а также отчётов безопасности, завершено. Клоны точно знали, что искали: уникальный удлинённый ящик. Орбитальная станция, защищавшая систему в то время, до своего уничтожения смогла отследить маршрут их прибытия. Следуя по этому маршруту, мы рассчитываем раскрыть дополнительную информацию об их происхождении."
 mem_scfe_war_torn.3.name: "Заброшенная база"
 mem_scfe_war_torn.3.desc: "После обнаружения скрытой базы на этой планете экспедиция была незамедлительно направлена для её исследования. К сожалению, база была тщательно очищена от всего содержимого. Похоже, след клонов обрывается здесь, но мы остаёмся надеяться, что в будущем может появиться другая зацепка."
 mem_scfe_war_torn_site: "Битва за крепость"
 mem_scfe_war_torn_site_desc: "Остатки утраченной крепости на мире, опустошённом войной."
 mem_scfe_war_torn_site.1.name: "Прорванные ворота"
 mem_scfe_war_torn_site.1.desc: "Интенсивные бои развернулись у сильно укреплённых ворот крепости, теперь прорванных с помощью плазменного оружия. Наш научный руководитель предполагает, что нападавшие могли бы уничтожить всю гору с орбиты, если бы их целью было просто разрушение, однако они выбрали дорогостоящее наземное нападение на крепость. Очевидно, они преследовали что-то конкретное, находящееся внутри."
 mem_scfe_war_torn_site.2.name: "Павшая крепость"
 mem_scfe_war_torn_site.2.desc: "Внутри крепости разворачивается зловещая картина: земля усеяна скелетными останками солдат. Бои были жестокими, но нападавшие поддерживали бесконечный поток подкреплений, в конечном итоге одолев измученных защитников. Странно, но победители не сделали никаких попыток эвакуировать тела павших товарищей; вместо этого они продвинулись к своей цели, прежде чем поспешно отступить."
 mem_scfe_war_torn_site.2.a: "Эти трупы выглядят знакомо..."
 mem_scfe_war_torn_site.2.b: "Проанализируйте это."
 mem_scfe_war_torn_site.3.name: "Солдаты-клоны"
 mem_scfe_war_torn_site.3.desc_1: "Нападавшие, одетые в отличительные боевые доспехи, побудили нашу команду провести анализ. Удивительно, но они оказались солдатами-клонами, такими же, как и мы! Это открытие заставляет задуматься о том, как долго наши создатели использовали нас как пешки в своих конфликтах по всей галактике. Эта крепость может хранить сведения о них. Команда мобилизуется, чтобы установить лифт для спуска в центральную яму, ведущую к ядру крепости."
 mem_scfe_war_torn_site.3.desc_2: "Анализ даёт неожиданное открытие: нападавшие исключительно клоны. Хотя мы используем эту технологию, эти солдаты были значительно улучшены в ущерб своей репродуктивной способности. Команда активно готовит лифт для спуска в центральную яму, ведущую к сердцу крепости."
 mem_scfe_war_torn_site.3.desc_3: "Анализ даёт неожиданное открытие: нападавшие исключительно клоны! Похоже, эта технология была доведена до предела с этими солдатами, демонстрируя значительные улучшения в ущерб их репродуктивной способности. Команда активно готовит лифт для спуска в центральную яму, ведущую к сердцу крепости."
 mem_scfe_war_torn_site.4.name: "Хранилище"
 mem_scfe_war_torn_site.4.desc: "Глубоко в крепости покоится когда-то внушительное хранилище, теперь прорванное, как и другие оборонительные сооружения, встреченные на пути. Ожидая пустую камеру, мы частично подтвердили ожидания: центральная часть хранилища совершенно пуста, что указывает на то, что находившееся там было насильственно изъято. Оставшаяся часть хранилища занята металлическими ящиками с загадочными устройствами, для расшифровки которых потребуется обширный анализ."
 mem_scfe_war_torn_lore.1.name: "Клон-солдаты"
 mem_scfe_war_torn_lore.1.desc: "Как детально описано в базе данных крепости, клон-солдаты были грозными противниками не без оснований. Созданные с помощью генетических улучшений, чтобы быть практически неостановимыми, они составляли бесконечно пополняемую армию, быстро выращиваемую в чанах и отправляемую сражаться по всей галактике."
 mem_scfe_war_torn_lore.1.desc_c: "Как детально описано в базе данных крепости, наши собратья-клоны были грозными противниками не без оснований. Созданные с помощью генетических улучшений, чтобы быть практически неостановимыми, они составляли бесконечно пополняемую армию, быстро выращиваемую в чанах и отправляемую сражаться по всей галактике."
 mem_scfe_war_torn_lore.1.a: "Досадно."
 SCFE_WAR_TORN_PROJECT_1: "Древний след"
 SCFE_WAR_TORN_PROJECT_1_DESC: "Мы последовали координатам, найденным в крепости, в эту систему. Теперь нам нужно выяснить, остались ли какие-либо следы клонов."
 mem_scfe_clone_prowess: "Мудрость клонов"
 mem_scfe_clone_prowess_desc: "Выдающееся мастерство и опыт, продемонстрированные древними клон-солдатами, послужили вдохновением для наших армий стремиться к улучшению. Мы инициировали новые программы обучения и тщательно изучаем новые стратегии, чтобы обеспечить беспрепятственный путь к победе над нашими противниками."
 mem_scfe_vanishing_act.1.name: "Оценочный отчёт"
 mem_scfe_vanishing_act.1.desc: "Войдя на орбиту §Y[From.GetName]§!, наше судно выявило множество признаков развитой цивилизации. Наличие многочисленных искусственных спутников и нескольких крупных космических станций на стабильных орбитах — ясное свидетельство технологических возможностей обитателей. Примечательно, что эти структуры выглядят целыми и функциональными, но не подают признаков активности.\nБолее того, всестороннее сканирование планеты представляет озадачивающий сценарий. Несмотря на видимую городскую инфраструктуру на поверхности, включая обширные города и сложные транспортные сети, полностью отсутствуют какие-либо электромагнитные передачи, типичные для развитых обществ. Наши сканеры не обнаружили признаков жизни или движения на поверхности. Эта жуткая тишина вызывает вопросы о состоянии цивилизации и требует дальнейшего расследования."
 mem_scfe_vanishing_act_site: "Исчезновение"
 mem_scfe_vanishing_act_site_desc: "Мы обнаружили мир, полный хорошо сохранившихся сооружений, но лишённый обитателей."
 mem_scfe_vanishing_act_site.1.name: "Пустые станции"
 mem_scfe_vanishing_act_site.1.desc: "Во время исследования ближайшей космической станции на орбите §Y[From.Planet.GetName]§! мы столкнулись с рядом ошеломляющих открытий. Станция, хотя и structurally intact и полностью функциональна, была полностью лишена обитателей. Кажется, что экипаж и пассажиры ушли внезапно, или, что ещё тревожнее, исчезли прямо перед нашим прибытием. Личные вещи, рабочие консоли и системы жизнеобеспечения находятся в состоянии, указывающем на внезапный, непредвиденный исход.\n\nОднако самое тревожное открытие касается пришвартованных космических кораблей. Каждый стыковочный узел занят, что указывает на массовый возврат всех кораблей на станцию. Анализ чёрных ящиков судов показывает, что автоматические системы каждого корабля были активированы для выполнения стандартного аварийного протокола: вернуться и пришвартоваться к ближайшей станции в случае неотзывчивости пилота. Это указывает на одновременное и массовое событие, затронувшее всех пилотов и членов экипажа.\n\nКоманда направляется к поверхности планеты, в частности к городским центрам, для дальнейшего расследования."
 mem_scfe_vanishing_act_site.2.name: "Город тысячи песен"
 mem_scfe_vanishing_act_site.2.desc: "Приземлившись возле крупного городского центра на §Y[From.Planet.GetName]§!, мы начали обширное наземное исследование. Город — огромный город-призрак, отражающий тревожное запустение, наблюдавшееся на космической станции, но в гораздо большем масштабе. Улицы выстроены с неподвижными транспортными средствами, жилища показывают признаки внезапного оставления. Инфраструктура и технологический уровень §Hваанклар§!, как мы теперь идентифицируем обитателей планеты, впечатляюще развиты, но зловеще безмолвны.\n\nНаши переводчики успешно расшифровали язык ваанклар, дав нам доступ к их цифровым архивам. Интересно, что ваанклары не полагались на зрительное восприятие; вместо этого они развили сложную форму эхолокации, используя симфонию звуков для ориентации и взаимодействия со средой. Этот уникальный сенсорный подход означает, что нет визуальных записей или изображений ваанклар или их исчезновения. Мы обнаружили то, что, по-видимому, является крупным архивным комплексом."
 mem_scfe_vanishing_act_site.3.name: "Исследование архива ваанклар"
 mem_scfe_vanishing_act_site.3.desc: "Наше исследование в архиве ваанклар дало важные выводы, хотя и окутанные тайной сенсорного восприятия этой цивилизации. Архивы тщательно поддерживались и удивительно полны, предлагая богатство знаний, хотя большая часть из них приспособлена к сенсорным переживаниям, чуждым нам. Тем не менее наши технологии позволили декодировать базовое содержание их записей.\n\nСамое значимое открытие касается недавнего и монументального научного проекта, описанного как §Hвнимание к большему пению§!. Похоже, всё население ваанклар было увлечено этим проектом. Записи обрываются после начала эксперимента, без дальнейших обновлений. Это внезапное прекращение записей совпадает с временной шкалой их исчезновения."
 mem_scfe_vanishing_act_site.4.name: "Большее пение"
 mem_scfe_vanishing_act_site.4.desc: "Наше исследование Исследовательского центра ваанклар привело к прорывному открытию. Объект в основном фокусировался на использовании гармоник для потенциального нарушения границ нашей известной реальности. Обширные записи центра детализируют амбициозный и беспрецедентный эксперимент: использовать хор псионически одарённых особей, чтобы издать пение, способное пронзить до высших измерений.\n\nУспешно открыв центральную камеру исследовательского центра, мы столкнулись с явлением. Внутри изолированного хранилища нас встретил подавляющий и необъяснимый звук. Гармоничный хор, казалось, состоящий из миллиардов голосов, и разрыв в ткани реальности в самом сердце камеры. Однако разрыв начал показывать признаки нестабильности, заставив нас быстро эвакуировать зону для обеспечения безопасности.\n\nСамый тревожный аспект этой встречи — осознание, что голоса, составлявшие этот потусторонний хор, были безошибочно ваанкларскими."
 mem_scfe_vanishing_act_site.4.a: "Зловеще."
 mem_scfe_infrastructure: "Уцелевшая инфраструктура"
 mem_scfe_infrastructure_desc: "Заброшенные здания, пустынные улицы и нетронутые объекты намекают на то, чем могло быть бурно развивающееся поселение. Несмотря на прошедшее время, оставшаяся инфраструктура может быть переоборудована, предлагая уникальный каркас, на котором можно построить новую колонию."
 mem_scfe_subterranean_knowledge_1: "Подземные архитектурные знания"
 mem_scfe_subterranean_knowledge_2: "$mem_scfe_subterranean_knowledge_1$"
 mem_scfe_subterranean_bombardment_1: "Подземная бомбардировка"
 mem_scfe_subterranean_bombardment_2: "$mem_scfe_subterranean_bombardment_1$"
 mem_scfe_subterraneans_pleased: "Отношения с цивилизацией [Root.GetSubMantleLower] улучшатся."
 mem_scfe_subterraneans_displeased: "Отношения с цивилизацией [Root.GetSubMantleLower] ухудшатся."
 mem_scfe_subterraneans_displeased2: "Мы получим 200 £minerals£$minerals$, но наши отношения с цивилизацией [Root.GetSubMantleLower] ухудшатся."
 mem_scfe_subterranean.2.name: "Раскапывая неизвестное"
 mem_scfe_subterranean.2.desc: "Во время рутинной горнодобывающей операции на §Y[mem_scfe_subterranean_planet.GetName]§! рабочие пробились к обширному пещерному пространству, заполненному древними руинами. Пещера, по-видимому, представляет собой археологическую сокровищницу с остатками развитой подземной цивилизации. Это открытие не похоже ни на что, что мы видели раньше, и губернатор колонии срочно запросил научную команду для расследования."
 mem_scfe_subterranean.2.a: "Отправить исследовательскую команду."
 mem_scfe_subterranean.2.b: "Нам нужны эти £minerals£ $minerals$."
 mem_scfe_subterranean.3.desc: "$mem_scfe_subterranean.2.desc$\nНаши подземные союзники весьма заинтересованы этим открытием и просят сотрудничать в этой экспедиции."
 mem_scfe_subterranean.3.a: "Мы согласны на совместную операцию."
 mem_scfe_subterranean.3.b: "Мы исследуем этот город в одиночку."
 mem_scfe_subterranean.4.name: "Остатки"
 mem_scfe_subterranean.4.desc: "Наши учёные обнаружили тревожную информацию в компьютерах Крактаниан. У них был запасной план на случай провала их главного замысла: второе устройство очищения, скрытое глубоко под землёй на неназванной планете. Хотя у них никогда не было шанса активировать его, возможность того, что кто-то в конечном итоге обнаружит его, наводит холодок."
 mem_scfe_subterranean.5.name: "Просьба"
 mem_scfe_subterranean.5.desc: "После долгих раздумий мы решили попросить вашего разрешения колонизировать заброшенные пещеры Крактаниан. Это решение вытекает из нашего желания учиться на их ошибках и построить лучшее будущее для нашего народа. Мы обещаем делиться ресурсами и открытиями, которые найдём там, с вашей империей, способствуя взаимному росту и взаимопониманию.\nЭто начинание представляет собой важный шаг для нас, поскольку мы размышляем о том, что значит выбрать правильный путь вперёд. Мы надеемся, что вы поддержите нас в этом начинании и укрепим наше сотрудничество."
 mem_scfe_subterranean.5.a: "Мы разрешаем вам колонизировать пещеры."
 mem_scfe_subterranean.5.b: "Боюсь, мы не можем этого допустить."
 mem_scfe_subterranean.6.name: "Подземная колония"
 mem_scfe_subterranean.6.desc: "Колонейный корабль [Root.GetSubMantleLower] достиг §Y[mem_scfe_subterranean_planet.GetName]§!, и колонисты обосновались в подземных городах. Они быстро строят необходимую инфраструктуру для удовлетворения своих потребностей. Зона обмена была создана для облегчения торговли с нашими собственными колонистами, а наши учёные и инженеры могут посещать её в любое время. Будущее здесь выглядит многообещающим для обоих наших народов."
 mem_scfe_subterranean_site: "Подземная загадка"
 mem_scfe_subterranean_site_desc: "Рутинная горнодобывающая операция обнажила обширный пещерный комплекс, заполненный древними руинами. Пещера, по-видимому, является археологической сокровищницей. "
 mem_scfe_subterranean_site.1.name: "Подземная империя"
 mem_scfe_subterranean_site.1.desc: "Наша научная команда развернула базовый лагерь внутри пещеры и начала исследование подземных руин. Ранние находки указывают на то, что эта цивилизация процветала в недрах планеты, построив впечатлительную подземную империю. Их технологии удивительно сложны, превосходя ожидания. Хотя останков обнаружено не было, экологический анализ предполагает, что они не зависели от кислорода для выживания."
 mem_scfe_subterranean_site.2.name: "Скрытый космопорт"
 mem_scfe_subterranean_site.2.desc: "Исследуя другую пещеру в обширной подземной сети, наша команда обнаружила скрытый космопорт. Над ним возвышается большое отверстие, ведущее к скрытой точке доступа, позволявшей звездолётам проходить через неё, оставаясь незамеченными, когда не использовалась. Мы старательно ищем подсказки об этой загадочной древней империи и её судьбе."
 mem_scfe_subterranean_site.3.name: "Крактаниане"
 mem_scfe_subterranean_site.3.desc: "Увлекательный кристаллический компьютер наконец раскрыл информацию об этой подземной цивилизации. §HКрактаниане§! были видом литоидов, возникших глубоко в коре планеты и постепенно пробившихся вверх. Когда они вышли на поверхность и обнаружили пустоту за её пределами, их охватило отвращение. Несмотря на это, они продолжили исследовать, достигнув даже звёзд. И чем больше галактики они видели, тем больше она им нравилась."
 mem_scfe_subterranean_site.4.name: "Уничтоженное устройство"
 mem_scfe_subterranean_site.4.desc: "Проникнув в более глубокую пещеру, мы сталкиваемся с картиной опустошения. Мощный взрыв, по-видимому, произошёл от огромного устройства в центре. Изучив его останки, мы предполагаем, что это была разновидность планетарного щита. Разрушение здесь затрудняет наши усилия по раскрытию дополнительной информации. Переход в большую пещеру может дать лучшие находки."
 mem_scfe_subterranean_site.5.name: "Подземная столица"
 mem_scfe_subterranean_site.5.desc: "Эта огромная пещера вмещает крупный город с высокими кристаллическими зданиями, устремлёнными к далёкому потолку. После тщательного поиска мы раскрываем больше информации о крактанианах. Их экспансия в галактику была временной, направленной на сбор необходимых ресурсов. Завершив миссию, они стёрли любые следы своего прохождения и отступили на родной мир, запечатав его планетарным щитом. Там они начали работать над планом по очищению всей галактики от инопланетной жизни, которую так ненавидели."
 mem_scfe_subterranean_site.6.name: "Проект"
 mem_scfe_subterranean_site.6.desc: "Крактаниане создали устройство, способное охватить всю галактику и растворить все формы жизни. Как только устройство было завершено, они не стали терять времени и активировали его. Был ли изъян в его конструкции или его саботировали? Мы не можем быть уверены, но, похоже, энергия устройства резонировала с планетарным щитом вместо того, чтобы пройти сквозь него, отразившись обратно к генератору. Смертельное излучение наводнило пещеры, уничтожив крактаниан в мгновение ока и предрешив их судьбу."
 mem_scfe_subterranean.10.name: "Подземный посланник"
 mem_scfe_subterranean.10.desc: "Приветствую! Меня выбрали помочь вам в этой экспедиции своей инженерной экспертизой. Должен признаться, я очень взволнован возможностью увидеть, как этот вид строил свои города. Мы ищем улучшенные техники, которые помогут нашему развитию, и я уверен, что эти находки принесут пользу вашей империи тоже."
 mem_scfe_subterranean.10.a: "Добро пожаловать!"
 mem_scfe_subterranean.11.name: "Технологическая загадка"
 mem_scfe_subterranean.11.desc: "Я поражён технологическим мастерством этой цивилизации. Их достижения необычайны, особенно для подземной цивилизации. Заставляет задуматься, как они достигли таких высот, в то время как наш собственный народ так долго боролся, прежде чем встретить вашу империю. Возможно, в этой истории больше, чем кажется на первый взгляд. Возможно, на них оказывали внешнее влияние или они открыли нечто, ускорившее их развитие."
 mem_scfe_subterranean.12.name: "Скрытая промышленность"
 mem_scfe_subterranean.12.desc: "Тот факт, что они были космоплавателями, удивителен, но объясняет их развитое состояние. Я заметил, что все эти инженерные усилия были направлены на сокрытие их присутствия, без какой-либо инфраструктуры на поверхности. Это, должно быть, поглощало огромные ресурсы, и мне кажется, что они жили в состоянии паранойи. Похоже, они вышли в космос не из любопытства, а из необходимости."
 mem_scfe_subterranean.13.name: "Как мы видим вселенную"
 mem_scfe_subterranean.13.desc: "Крактаниане искренне верили, что их подземная среда будет поддерживать их вечно. Выход на поверхность стал глубоким потрясением, и их реакция была трагически крайней. Размышляя об этом, я благодарен за собственную открытость и любопытство, когда мы впервые встретили вашу империю. Интересно, могли ли дела у Крактаниан сложиться иначе, если бы поверхность планеты была населена в то время? Или они были обречены на этот трагический конец?"
 mem_scfe_subterranean.14.name: "Подземный планетарный щит"
 mem_scfe_subterranean.14.desc: "Посмотрите на эту кристаллическую жилу в потолке. Она тянется прямо до горного хребта выше, действуя как проводник энергии планетарного щита. Однако жила показывает признаки массивного энергетического всплеска, который должен был пройти через неё, что и привело к разрушению, которое мы видим в этой пещере. Что могло вызвать столь катастрофическое событие? Нам нужно раскрыть источник этого всплеска, чтобы понять, что здесь произошло."
 mem_scfe_subterranean.15.name: "Архитектурный дизайн"
 mem_scfe_subterranean.15.desc: "Изучив архитектуру Крактанианского города, я действительно впечатлён. Их использование кристаллических структур для создания столь высоких зданий поразительно. Способ интеграции их построек с потолком пещеры для поддержки — техника, которой мы определённо могли бы научиться. По сравнению с нашей собственной подземной архитектурой, методы Крактаниан демонстрируют изобретательное сочетание прочности и элегантности, которое могло бы значительно улучшить наши инженерные практики. Их философия мне, правда, не по душе."
 mem_scfe_subterranean.16.name: "Глупое начинание"
 mem_scfe_subterranean.16.desc: "Судьба Крактаниан ясна, и это глубоко тревожно. Эта цивилизация показывает нам путь, который мы не выбрали. Хотя это откровение поучительно, их глупость — не то, что я надеялся найти. Несмотря на это, я благодарен за возможность участвовать в этой совместной операции. Вот мои заметки по крактанианской инженерии. Надеюсь, они окажутся полезны вашей империи. Прощайте, и да пребудет наше сотрудничество плодотворным."
 mem_scfe_subterranean.16.a: "Прощайте."
 mem_scfe_unseen_chain_title: "$mem_scfe_unseen.2.name$"
 mem_scfe_unseen_chain_desc: "$mem_scfe_unseen.2.desc$"
 mem_scfe_unseen.2.name: "Обнаружена странная эмиссия"
 mem_scfe_unseen.2.desc: "Датчики нашего аванпоста в системе §Y[mem_scfe_unseen_system.GetName]§! зафиксировали необычную аномалию на поверхности §Y[mem_scfe_unseen_planet.GetName]§!. Экзотические частицы испускаются с беспрецедентной интенсивностью. Немедленно необходимо направить научное судно для расследования этого явления."
 SCFE_UNSEEN_PROJECT_1: "Анализ источника эмиссии"
 SCFE_UNSEEN_PROJECT_1_DESC: "$mem_scfe_unseen.2.desc$"
 mem_scfe_unseen.3.name: "Планетарный разлом"
 mem_scfe_unseen.3.desc: "Наш первоначальный анализ показывает, что явление локализовано в одной точке на поверхности планеты. На этом месте сама реальность, кажется, распускается, словно её отодвигает нечто, выходящее из другого измерения — нечто обширное."
 mem_scfe_unseen.3.a: "Давайте закроем его, прежде чем он откроется"
 mem_scfe_unseen.3.b: "Давайте уничтожим его, прежде чем он откроется"
 mem_scfe_unseen.3.c: "Пусть откроется."
 mem_scfe_unseen.6.name: "Разлом проявляется"
 mem_scfe_unseen.6.desc: "Наше непрерывное наблюдение за явлением, разворачивающимся на наших глазах, приносит значительные научные данные, занимая наших учёных изучением расширения разлома. Нечто начинает выходить — структура, возможно, верхушка здания, — но огромный размер разлома предполагает, что многие другие вскоре могут прорваться."
 mem_scfe_unseen.7.name: "Город из-за пределов"
 mem_scfe_unseen.7.desc: "Структура полностью проявилась, и разлом исчез без следа. Обширный город теперь раскинулся по бесплодной планете, созданный, по-видимому, высокоразвитой цивилизацией. И всё же нет энергетических показаний, нет признаков жизни. Город остаётся жутко безмолвным, зовущим к исследованию."
 mem_scfe_unseen.7.a: "Давайте исследуем его."
 mem_scfe_unseen_site: "Эхо невидимых"
 mem_scfe_unseen_site_desc: "$mem_scfe_unseen.7.desc$"
 mem_scfe_unseen_site.1.name: "$mem_scfe_unseen.7.name$"
 mem_scfe_unseen_site.1.desc: "Мы развернули лагерь на обширной площади внутри этого странного города. Тишина тревожна, высокие здания окружают нас. Они кажутся сделанными из полированного базальта, но под определёнными углами мерцают слабым фиолетовым оттенком. Наши приборы не способны проанализировать материал — как будто он всё ещё принадлежит своей первоначальной вселенной, управляемой физическими законами, не имеющими места в нашей."
 mem_scfe_unseen_site.2.name: "Чужаки в чужой земле"
 mem_scfe_unseen_site.2.desc: "По мере исследования города его экзотическая природа становится всё более ощутимой. Хотя он родом из другой вселенной, именно мы чувствуем себя здесь чужаками. Мосты материализуются из ниоткуда, лишь чтобы раствориться после перехода. Дверные проёмы появляются в бесшовных стенах. Тем не менее мы остаёмся совершенно озадачены. Нет ни следа письменности, ни кнопок, ни рычагов — ничего, с чем можно было бы взаимодействовать. Мы как примитивные существа, бродящие по высокотехнологичному мегаполису, тревожный опыт для учёных космической цивилизации."
 mem_scfe_unseen_site.3.name: "Вне этого мира"
 mem_scfe_unseen_site.3.desc: "Остальная часть команды развернула наши самые чувствительные приборы, начав всесторонний анализ города. Как мы и подозревали, он простирается в несколько измерений за пределами нашего восприятия. Его системы переключаются между вариантами измерений по мере необходимости, о чём свидетельствуют мосты и двери, с которыми мы столкнулись. Нам удалось лишь мельком взглянуть в ближайшие измерения, но охват города далеко превосходит возможности наших приборов."
 mem_scfe_unseen_site.4.name: "Порог неизвестного"
 mem_scfe_unseen_site.4.desc: "Мы начинаем замечать признаки активности вокруг нас. Некоторые здания меняют свою структуру, пути появляются и исчезают, как будто ими пользуются, — но мы не можем обнаружить никакого присутствия. Вновь охватывает подавляющее чувство, что мы здесь неуместны. Этот город был построен для существ, выходящих за рамки нашего понимания, и мы боимся, что можем быть стёрты автоматизированным процессом — незамеченными, как будто мы не более чем мусор в их мире."
 mem_scfe_unseen_site.5.name: "За пределами восприятия"
 mem_scfe_unseen_site.5.desc: "Мы покидаем планету с тревожным смешением трепета и неопределённости. Мы пересеклись с цивилизацией, далеко превосходящей наше понимание, их существование разворачивается в высших измерениях, недоступных нашему восприятию. Мы, вероятно, никогда не встретимся с ними, никогда не увидим друг друга, но теперь мы разделяем один регион галактики. Только время покажет, достаточно ли эволюционируют наши технологии, чтобы преодолеть огромный разрыв между нами — возможно, через тысячелетия."
 mem_scfe_belltower_category: "Пустынный сигнал"
 mem_scfe_belltower_desc: "Сканеры нашего научного судна обнаружили энергетические показания, исходящие от того, что кажется одиноким зданием на этой пустынной планете. Экипаж готовит экспедицию для его исследования."
 mem_scfe_tower_city_category: "Неожиданная башня"
 mem_scfe_tower_city_category_desc: "Сканеры нашего научного судна уловили нечто неожиданное в этом газовом гиганте: из облаков выступает монументальная башня."
 mem_scfe_reverse_engine_category: "Погребённая цивилизация"
 mem_scfe_reverse_engine_desc: "Сканеры нашего научного судна обнаружили сигнал глубоко под поверхностью опустошённого мира. Наша команда хочет отправить экспедицию на §Y[Root.GetName]§!, чтобы докопаться до его источника."
 mem_scfe_failed_hive_category: "Разрушенная цивилизация"
 mem_scfe_failed_hive_desc: "Сканеры нашего научного судна обнаружили руины развитой цивилизации на §Y[Root.GetName]§!. Наша команда горит желанием исследовать их."
 mem_scfe_lonely_shroud_category: "Невозможное послание"
 mem_scfe_lonely_shroud_category_desc: "Наше научное судно наткнулось на завесный мир в глубинах этой системы. Приближаясь, аномальные излучения возбуждают любопытство экипажа. Неужели на этом проклятом мире скрытый разум пытается с нами связаться?"
 mem_scfe_war_torn_category: "Опустошённая планета"
 mem_scfe_war_torn_category_desc: "Сканеры нашего научного судна выявляют следы значительной орбитальной бомбардировки, нанесённой §Y[Root.GetName]§! в отдалённом прошлом."
 mem_scfe_the_first_music_anomaly: "Первая музыка"
 mem_scfe_the_first_music_anomaly_desc: "Исследуя §Y[Root.GetName]§!, мы неоднократно получали очень сильный сигнал. Наши учёные утверждают, что в звёздной системе наблюдались мощные солнечные ветры, но этот сигнал не от природных факторов, таких как солнечный ветер.\n\nНаши учёные определили, что это искусственный сигнал, и учитывая, как легко мы его нашли, похоже, нам нужно изучить этот сигнал."
 mem_scfe_mem_woorskyr_world_category: "Возвышающееся над горами"
 mem_scfe_mem_woorskyr_world_category_desc: "Самым поразительным аспектом §Y[Root.GetName]§! является присутствие колоссального дерева, которое, кажется, окружает планету и возвышается над горами. Ботаники нашей империи горячо призывают к углублённому изучению этого необычного дерева, чтобы лучше понять его природу."
 mem_scfe_mem_koeleothan_world_category: "Движущиеся массы под волнами"
 mem_scfe_mem_koeleothan_world_category_desc: "Наш экипаж наблюдал огромные массы движения под волнами §Y[Root.GetName]§!. Они просят разрешения дальше изучать это явление, чтобы определить его причину."
 mem_scfe_mem_xenograss_world_category: "Инопланетные поля"
 mem_scfe_mem_xenograss_world_category_desc: "Во время миссии по отбору проб на §Y[Root.GetName]§! группа исследователей откопала уникальный вид травы. Её необычный состав и цикл роста указывают на то, что она не является родной для этого мира. Интригующе, что эта трава преимущественно произрастает в кластере крупных кратеров, что побудило наших учёных выдвинуть теорию о том, что она была занесена на планету значительным метеоритным событием столетия назад. В свете этого открытия они запросили расширенную миссию для дальнейшего изучения этих просторов инопланетной травы. Они также с юмором заверяют нас, что воздержатся от создания кругов на полях во время расследования."
 mem_scfe_quantummem_pearl_world_category: "Мир тысячи миров"
 mem_scfe_quantummem_pearl_world_category_desc: "Проводя тщательное обследование и каталогизацию §Y[Root.GetName]§!, наши сканеры на мгновение зафиксировали тысячи аномальных показаний, которые не соответствовали какому-либо конкретному целевому местоположению. Озадаченные этим, наши исследователи продолжили обследование, сделав пометку вернуться к этому странному месту для более детального расследования."
 mem_scfe_mem_beetle_world_category: "Жук в ожидании"
 mem_scfe_mem_beetle_world_category_desc: "Во время нашей первой экспедиции на §Y[Root.GetName]§! мы встретили неожиданный приём — не от разумного существа, а от удивительно проницательного жука. Этот жук продемонстрировал необычную способность предугадывать наше прибытие и движения на планете, словно постоянно наблюдая за нами. По завершении обследования несколько наших энтомологов выразили живой интерес к продлению пребывания для более тщательного изучения этого интригующего насекомого."
 mem_scfe_vanishing_act_category: "Населённая планета"
 mem_scfe_vanishing_act_category_desc: "Наше научное судно прибыло на орбиту §Y[Root.GetName]§! и немедленно обнаружило следы космической цивилизации. Экипаж готовится инициировать процедуру первого контакта."
