l_russian:

 mem_scfe_shard_ziaskehorn: "Осколок Зиаскехорна"
 mem_scfe_shard_ziaskehorn_desc_short: "Этот осколок, кристаллический фрагмент с выжженной поверхности планеты, опустошённой загадочными Огнями Зиаскехорна, излучает сильное и неослабевающее тепло"
 mem_scfe_shard_ziaskehorn_desc_details: "Обнаруженный среди тлеющих останков этой планеты кристалл с момента сбора не показывал признаков охлаждения."
 r_mem_scfe_ziaskehorn_fire: "Пламя Зиаскехорна"
 r_mem_scfe_ziaskehorn_fire_desc: "Отрывок, Пророчества Зии (Пехизидийская скрижаль истоков, 1-е издание, неопубликовано):\n\nПламя Зиаскехорна (Раздел 12)\nПодбрасывание дров в Пламя и позволение Огням Зиаскехорна гореть без контроля уничтожит всю жизнь на планете и погрузит её в тектонически нестабильную смерть, когда лава хлынет из океанов, а огонь будет лить с небес. Пламя, однако, может быть контролируемо и овладеваемо индивидуумом, если только этот индивидуум (ФРАГМЕНТ УНИЧТОЖЕН), даруя невообразимую силу. Однако впоследствии (ФРАГМЕНТ УНИЧТОЖЕН)."
 ziaskehorn_relic_active: "Пылающие Огни Зиаскехорна"
 ziaskehorn.01.name: "Воспламенение"
 ziaskehorn.01.desc: "Когда Пламя ухватилось за свежую дровя, оно быстро разгорелось в Огни Зиаскехорна. Почти сразу наши генералы почувствовали жар вновь обретённых огней, распространяющийся по их телам. В результате появились невероятно мощные армии, усиленные Огнями Зиаскехорна и способные использовать их силу в бою."
 ziaskehorn.02.name: "Не под контролем"
 ziaskehorn.02.desc: "Когда сила Пламени Зиаскехорна ослабла в наших армиях, оно ушло, забрав больше, чем даровало. Теперь в сердцах наших командиров бушует неугасимый огонь, их разум поглощён Огнями Зиаскехорна. Все понятия о сдержанности сожжены и развеяны ветром пылом некогда властной силы."
 ziaskehorn.02.tooltip: "Все наши командиры получают черты ['leader_trait:leader_trait_victory_or_death'] и ['leader_trait:leader_trait_reckless'] и теряют всякое сдержанство."
 mem_scfe_ziaskehorn_site: "Огни Зиаскехорна"
 mem_scfe_ziaskehorn_site_desc: "Поверхность §Y[From.Planet.GetName]§! кажется, когда-то была обитаема, но сегодня это не более чем негостеприимная вулканическая скала. Несколько спутников всё ещё вращаются вокруг планеты, но нет иных следов FTL-технологий. Предположительно досветовая цивилизация, некогда жившая на [From.Planet.GetName], исчезла. Всё, что осталось, — большие города, медленно расплавляющиеся."
 ziaskehorn.99.name: "Жизнь под лавой"
 ziaskehorn.99.desc: "Предварительные исследования §Y[FROMFROM.Planet.GetName]§! выявили значительные доказательства того, что планета когда-то была обитаема. Крупные городские центры разорваны и залиты потоками лавы, сильно повреждены и медленно расплавляются. Также найдены свидетельства атомного уровня технологий, указывающие на довольно развитую досветовую цивилизацию. Наше научное сообщество настоятельно призывает раскопать историю этого древнего вида, поскольку базовое поверхностное сканирование даёт мало информации."
 ziaskehorn.11.name: "Огненный конец"
 ziaskehorn.11.desc: "Предварительные исследования на §Y[From.Planet.GetName]§! показывают, что нынешнее вулканическое состояние планеты вызвано катаклизмом, произошедшим около 311 000 лет назад. Археологическая команда смогла расшифровать язык и средства связи, использовавшиеся обитателями.\n\nПоследние сообщения по всей планете вращаются вокруг одного слова: Зиаскехорн.\n\nПока неясно, почему произошло это событие. Ещё более интригует, что некоторые расшифрованные сообщения команды научного офицера §G[Root.Leader.GetName]§! упоминают Зиаскехорн до его наступления, что приводит к теории, что этот катаклизм мог назревать долгое время."
 ziaskehorn.11.a: "Посмотрите, что ещё можно найти."
 ziaskehorn.12.name: "Война не меняется"
 ziaskehorn.12.desc: "Копая глубже в выжженных останках §Y[From.Planet.GetName]§!, команда раскопок восстановила фрагменты недавней истории обитателей планеты, ныне известных как пхезидии. Большую часть ста лет четыре пхезидийские страны находились в состоянии всеобщей тотальной войны друг с другом.\n\nВ ответ на технологический прогресс одной из стран, Содружества Азтиэль, в Атомную эпоху их главный соперник, Нипа, искал нечто равной силы, чтобы сохранить шанс в многовековом конфликте. Очевидно, Нипа нашла своё новое оружие в древних пхезидийских религиозных текстах. Огни Зиаскехорна.\n\nНаучный офицер §G[Root.Leader.GetName]§! выдвигает теорию, что Нипа могла высвободить древнее оружие, скрытое в недрах §Y[From.Planet.GetName]§!."
 ziaskehorn.12.a: "Копайте дальше!"
 ziaskehorn.13.name: "Древние боги"
 ziaskehorn.13.desc: "Раскопав некоторые древние тексты, спрятанные в останках §Y[From.Planet.GetName]§! и описывающие Огни Зиаскехорна, мы нашли новую информацию обо всём происшедшем.\n\nОгни Зиаскехорна — это двухтысячелетнее пророчество о конце света, впервые появившееся в ранних пхезидийских писаниях и религии. Огни должны были вспыхнуть после того, как отдельный индивид получит Пламя Зиаскехорна (или уголёк, тогда велись споры) от древней пхезидийской богини огня, Зии. Очевидно, Зия дала бы пламя избранному в надежде положить конец великому конфликту, о котором ранние пхезидийские монахи не знали.\n\nСогласно пророчеству, этот индивид с самого рождения был обречён получить Пламя от Зии и выпустить Зиаскехорн."
 ziaskehorn.13.a: "Тревожно."
 ziaskehorn.14.name: "Пламя Зиаскехорна"
 ziaskehorn.14.desc: "Как и подозревал научный офицер §G[Root.Leader.GetName]§!, Нипа в надежде одержать победу в бесконечной битве против Содружества Азтиэль искала Огни Зиаскехорна и наткнулась на предсказанное событие, во время которого богиня Зия отдала Пламя Зиаскехорна, чтобы положить конец войне.\n\nНе в силах контролировать силу, высвобождённую при воспламенении Огней Зиаскехорна, Огни быстро поглотили всю планету, убив всех обитателей и превратив поверхность в полностью вулканическую. Пророчество сбылось. Зиаскехорн разверзся по всей планете.\n\nХотя многие вопросы остаются без ответа — например, возможна ли когда-либо жизнь на поверхности §Y[From.Planet.GetName]§!, или кем были предполагаемые боги (поскольку последние следы пхезидийского общества полностью отказались от религии в ходе непрекращающегося конфликта), — один вопрос получил ответ: сохранилось ли что-либо от Пламени Зиаскехорна.\n\nНаши [Root.Owner.GetArchaeologistPlural], работающие на раскопках у большого кратера на поверхности §Y[From.Planet.GetName]§!, сообщают, что им удалось обнаружить сверхъестественную сферу. Пламя Зиаскехорна."
 ziaskehorn.14.a: "Поразительно."
 ziaskehorn.21.name: "Проклятие Пламени Зиаскехорна"
 ziaskehorn.21.desc: "Во время раскопок руин на §Y[From.Planet.GetName]§! научный офицер §G[Root.Leader.GetName]§! почувствовал ледяное ощущение по всему телу. Хотя это странно на планете, раскалённой как солнце, [Root.Leader.GetHeShe] заверяет нас, что всё в порядке. Остальная команда, однако, не согласна. Наш научный офицер — лишь тень того великого лидера, которым был некогда, медленно угасая."
 ziaskehorn.22.name: "Вулканическое извержение"
 ziaskehorn.22.desc: "Многие [Root.Owner.GetArchaeologistPlural] погибли недавно, когда вулкан извергся рядом с местом раскопок на §Y[From.Planet.GetName]§!. §G[Root.Leader.GetName]§! выбрался невредимым, но работа на месте временно приостановлена, пока экспедиционные команды пытаются восстановить порядок и убрать оставшиеся обломки."
 ziaskehorn.23.name: "Горячее помещение"
 ziaskehorn.23.desc: "Наши [Root.Owner.GetArchaeologistPlural], работающие на §Y[From.Planet.GetName]§!, наткнулись на здание, где густой горячий туман затуманивает каждое помещение. Неясно, связано ли это с вулканической поверхностью планеты или прошлыми событиями. Тем не менее научный офицер §G[Root.Leader.GetName]§! заверяет нас, что это поможет команде раскрыть прошлые тайны §Y[From.Planet.GetName]§!."
 ziaskehorn.24.name: "Переплав магмы"
 ziaskehorn.24.desc: "Наша археологическая экспедиция на §Y[From.Planet.GetName]§! столкнулась со значительными трудностями при попытке прокопаться через часть городской зоны, захваченной пылающей поверхностью планеты. Научный офицер §Y[Root.Leader.GetName]§! докладывает, что им требуются ресурсы и оборудование, чтобы устранить сильный переплав подземной магмы и продолжить исследование, иначе работа на раскопках рискует временно остановиться."
 mem_scfe_embers_of_ziaskehorn: "Угли Зиаскехорна"
 mem_scfe_embers_of_ziaskehorn_desc: "Пламя Зиаскехорна покинуло нас, оставив наши армии истощёнными и обеспокоенными. Им потребуется время, чтобы восстановиться."
