 MEM_REBEL_YELL_XL_WEAPON: "Высокоэнергетический Ударник Экзотических Частиц"
 MEM_REBEL_YELL_M_WEAPON: "Ударник Экзотических Частиц"
 mem_rebel_yell.5.name:0 "Последний Оплот Сопротивления"
 mem_rebel_yell.5.desc:0 "На другой стороне червоточины мы обнаружили небольшой флот, размещенный на орбите одной из планет. Похоже, именно сюда отступило Сопротивление после поражения. \n\nНесмотря на преклонный возраст, корабли находятся в довольно хорошей форме и хорошо вооружены. Силовые сигнатуры все еще можно обнаружить внутри кораблей, мы должны приближаться с осторожностью."
 mem_rebel_yell.7.desc:0 "Стой! Кто вы? Почему вы стреляете по моему кораблю? Прекратьте огонь и представьтесь!"
 mem_rebel_yell.7.a:0 "Вы первыми открыли огонь по нам. Кто вы?"
 mem_rebel_yell.8.desc:0 "Хорошо, вы не похожи на... них. Так что это облегчение.\n\nЯ адмирал [princess.GetName], одиннадцатая принцесса Королевства [princess_species.GetName]. Мой отец когда-то возглавлял галактику в отчаянной борьбе против существ, которые называли себя Вазуранами. Мы потерпели неудачу. Наши флоты были уничтожены, и наши миры падали один за другим. \n\nВ конце концов мы были вынуждены отступить в эту скрытую систему. Мы надеялись, что больше выживших придёт и перегруппируется, но тщетно — никто не пришёл. Как только наши запасы начали заканчиваться, мы передали управление нашими кораблями автоматическому ИИ-опекуну и ушли в криогенный сон. Согласно журналу ИИ, криогенные капсулы в конечном итоге начали выходить из строя или их приходилось отключать для сохранения энергии и сохранения наиболее жизненно важного персонала. В конце концов остался только высший по званию выживший — я.\n\nВаша атака, похоже, вывела из строя нашу систему ИИ, вынудив моё экстренное пробуждение.\n\nСистемы корабля выходят из строя, и моё время истекает. Для меня нет места в этой галактике. Кем бы вы ни были, я готова принести присягу на верность и отдать вам свой корабль в обмен на спасение."
 mem_rebel_yell.8.a:0 "Мы принимаем ваше предложение."
 mem_rebel_yell.8.b:0 "Мы спасем вас, но корабль пойдет на сплавы."
 mem_rebel_yell.8.c:0 "Нам нужен ваш корабль. Но не вы."
 mem_rebel_yell.8.d:0 "Нам не нужны ни вы, ни ваш корабль."
 mem_rebel_yell.8.e:0 "Вазуран? Мы сами с ними сталкивались."
 mem_rebel_yell.8.e.response:0 "Мне очень больно осознавать, что эти монстры все еще терроризируют галактику, спустя столько лет после того, как мы пали перед ними. \n\nСтоило этого ожидать. Кажется, что ничто не может их остановить."
 mem_tezarii_leader_desc:0 "Родившись одиннадцатой принцессой с небольшим значением для линии престолонаследия королевства своего отца, она была отправлена на обучение и образование с раннего возраста, чтобы позже служить в королевском адмиралтействе. Там она отличилась как талантливый офицер и стала самым молодым адмиралом, командующим королевским флотом."
 mem_tezarii_leader_catch_phrase:0 "Живи во славу павших!"
 leader_trait_mem_rebel_yell_custodian:0 "Хранитель Сопротивления"
 leader_trait_mem_rebel_yell_custodian_desc:0 "Эта система ИИ была поставлена во главе \"спящего\" флота. Да здравствует Сопротивление!"
 leader_trait_mem_rebel_yell_custodian_recon:0 "Хранитель Разведки Сопротивления"
 leader_trait_mem_rebel_yell_custodian_recon_desc:0 "Эта система ИИ была поставлена во главе разведывательного флота на время отсутствия экипажа. Да здравствует Сопротивление!"
 leader_trait_mem_rebel_yell_princess:0 "Мятежная Принцесса"
 leader_trait_mem_rebel_yell_princess_desc:0 "Опытная принцесса-воин, которая когда-то возглавляла королевский флот против вазуранской угрозы."
 mem_rebel_yell.9.name:0 "Луч Надежды"
 mem_rebel_yell.9.desc:0 "[Root.GetName] подтверждает первоначальную теорию о том, что объект внутри ледяной глыбы [From.GetName] - это корабль. Предположительно, он приземлился на поверхность около двух тысяч лет назад и позже был покрыт ледяным наростом. Восстановить корабль будет непросто, но нет ничего, с чем бы не справились наши строительные корабли."
 mem_rebel_yell.9.a:0 "Займитесь этим."
 mem_rebel_yell.10.name:0 "Потерянный Рыцарь"
 mem_rebel_yell.10.desc:0 "[Root.GetName] сообщает, что усилия по восстановлению корабля с [From.GetName] увенчались успехом. Судя по бортовым журналам, это был перехватчик класса \"Серебряный рыцарь\", выполнявший патрульное задание, когда корабль был вынужден спрятаться на астероиде, чтобы уклониться от превосходящего противника. Пилот укрылся в стазис-камере и погиб, когда закончилось питание. \n\nНесмотря на длительное пребывание внутри ледяного астероида, корабль находится в удивительно хорошей форме и может быть введен в эксплуатацию. Он обладает некоторым вооружением весьма необычной конструкции."
 mem_rebel_yell.10.a:0 "Ввести корабль в эксплуатацию."
 mem_rebel_yell.10.a.tooltip:0 "Вы получите новый военный корабль."
 mem_rebel_yell.10.b:0 "Разберите корабль на детали."
 mem_rebel_yell.10.c:0 "Разберите корабль для изучения."
 MEM_REBEL_YELL_RECOVER_SHIP:0 "Восстановить Замороженный Корабль"
 MEM_REBEL_YELL_RECOVER_SHIP_DESC:0 "В толще льда [the_asteroid.GetName] мы обнаружили корабль. Мы можем вырезать его при помощи специализированного оборудования, которое есть у строительного корабля."
 mem_rebel_yell_knight_salvage_section_key: ""
 mem_rebel_yell.12.name: "Оповещение о Вторжении"
 mem_rebel_yell.12.desc: "Мы обнаружили враждебный флот в системе [signal_system.GetName]. Похоже, что он проник через червоточину с неизвестной целью."
 mem_rebel_yell.12.a: "Боевые станции!"
