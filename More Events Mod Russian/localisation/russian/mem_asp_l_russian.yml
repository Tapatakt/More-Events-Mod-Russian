 mem_ASP_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT: "Проанализировать сигнал машины"
 mem_ASP_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT_DESC: "Мы должны проанализировать последний сигнал машины, записанный на [Root.GetName]. Это займёт некоторое время, но ответит на многие вопросы наших учёных."
 mem_ASP_KESSLER_SYNDROME_STORAGE_RESTORE_PROJECT: "Восстановление хранилища данных"
 mem_ASP_KESSLER_SYNDROME_STORAGE_RESTORE_PROJECT_DESC: "Мы обнаружили хранилище данных внутри обломков огромного космического корабля, расположенного на [From.Planet.GetName]. Мы должны быть в состоянии восстановить часть его данных."
 mem_ASP_AI_RE_PROGRAMMING_PROJECT: "Перепрограммирование Итератора"
 mem_ASP_AI_RE_PROGRAMMING_PROJECT_DESC: "Искусственный интеллект, обнаруженный на Дождливом мире, когда-то был обозначен как 'Итератор' и использовался древней цивилизацией для решения религиозных проблем. Теперь мы можем сбросить его, чтобы он служил нам."
 mem_ASP_WHITE_MOLLUSC_MAMMAL_PROJECT: "Белый моллюск-млекопитающее"
 mem_ASP_WHITE_MOLLUSC_MAMMAL_PROJECT_DESC: "Захваченное нами существо-моллюск-млекопитающее, по-видимому, стало очень популярным среди наших граждан и учёных. Наш исследовательский отдел горит желанием продолжить его изучение."
 leader_trait_mem_asp_iterator: "Итератор"
 leader_trait_mem_asp_iterator_desc: "Итератор — полубиологический искусственный интеллект, использовавшийся своими создателями для решения их так называемой 'Великой Проблемы'."
 PLANET_KILLER_GEOCENTRIC_DEVICE: "Геоцентрализатор"
 PLANET_KILLER_GEOCENTRIC_DEVICE_DESC: "Эта копия геоцентрического устройства манипулирует естественными силами, чтобы перестроить гравитационную структуру системы.\n\n§YОна превратит целевую планету в бесплодный мир и заставит её стать центром системы.§!"
 PLANET_KILLER_GEOCENTRIC_DEVICE_ACTION: "Централизовать мир"
 FLEETORDER_DESTROY_PLANET_WITH_PLANET_KILLER_GEOCENTRIC_DEVICE: "Подготовка к централизации $PLANET|Y$"
 MESSAGE_DESC_FOR_PLANET_KILLER_GEOCENTRIC_DEVICE: "была перемещена в центр системы и превращена в бесплодный мир с помощью"
 tech_mem_asp_geocentric_device: "Геоцентрализатор"
 tech_mem_asp_geocentric_device_desc: "В результате изучения геоцентрического устройства мы увидели потенциал манипулирования целыми звёздными системами.\n\n§YОн превратит целевую планету в бесплодный мир и сделает её центром системы, перестроив все остальные тела вокруг неё.§!"
 mem_asp_bedroom_planet_site: "Всё включено"
 mem_asp_bedroom_planet_site_intro: "На §Y[From.Planet.GetName]§! обнаружено большое количество заброшенных сооружений. Эти здания выглядят высокотехнологичными и предназначены для эффективного удовлетворения жилищных потребностей их обитателей. Однако неожиданно они также оказались наполнены останками этих самых обитателей."
 mem_ASPmod.10.name: "Наземное обследование"
 mem_ASPmod.10.desc: "Из того, что наши учёные смогли пока собрать, моллюскоидные обитатели полностью полагались на обширные автоматизированные системы, что, по-видимому, привело к их последующей гибели, когда произошла массовая системная ошибка.\n\nХотя большинство этих зданий были жилищами, лишёнными других функций — что делало это похожим на огромный комплекс по уходу за престарелыми — наша команда обнаружила несколько в основном покинутых промышленных и военных объектов среди обширного массива автоматизированного жилья, но соотношение жилищ к инфраструктуре указывает на то, что это общество почти исключительно полагалось на внешнюю поддержку для выживания.\n\nПомимо минимальной инфраструктуры, у обитателей этой планеты также было мало или совсем не было признаков экономической активности. Обломки орбитальных лифтов и космических станций, найденные по всей поверхности планеты, подтверждают наши теории о том, что обитатели сильно, если не полностью, зависели от импорта пищи и других товаров массового спроса. Единственной реальной деятельностью, в которой они, по-видимому, были вовлечены, было выращивание лишайников. Все объекты, а также их жилища имели общую центральную герметичную зону для выращивания лишайников. Возможно, эти лишайники были частью их рациона или развлечения?"
 mem_ASPmod.10.desc.a: "Может быть, процветающий торговый узел?"
 mem_ASPmod.11.name: "Внутри лишайника"
 mem_ASPmod.11.desc: "Сначала наши учёные были озадачены странными характеристиками очевидного выращивания лишайников, поскольку оно казалось несовместимым с планетарной экосистемой, что сильно указывало на его неродность для планеты. Его экстраполированная питательная ценность была слишком низкой, чтобы служить какой-либо значимой сельскохозяйственной цели, что оставляло наших учёных в догадках, поскольку «наблюдение за ростом лишайников» вряд ли можно назвать удовлетворительным времяпрепровождением.\n\nВсё изменилось, когда они заметили, что каждая из этих тепличных камер подземно соединена мицелием, образуя гигантскую сеть, полностью изолированную от внешней среды. То, что сначала считалось просто теплицами, теперь предстало в совершенно ином свете. Эти помещения были исключительно хорошо защищены, настолько, что это вызывает серьёзные сомнения в том, что это была их истинная цель.\n\nС новым подходом и открытым разумом мицелий и лишайников были повторно изучены с поразительным выводом. Мы смотрели на органическую компьютерную сеть, в которой лишайники, предположительно, функционировали как механизмы интерфейса для какого-то совместимого вида — вероятно, растениеподобного или грибкового происхождения. Необходимы дальнейшие исследования, но если бы получилось получить доступ к этой сети, тайна этого места могла бы быть раскрыта."
 mem_ASPmod.12.name: "Скот"
 mem_ASPmod.12.desc: "Получив доступ к мицелиевой компьютерной сети, наши исследователи собрали более полную картину судьбы обитателей §Y[From.Planet.GetName]§!. «Жилые» объекты на самом деле были не чем иным, как разукрашенными хлевами-стойлами. Эта планета была посвящена скотоводству, а моллюскоиды, которых мы нашли и ошибочно приняли за жителей, по-видимому, выращивались в качестве источника пищи. Герметичные лишайниковые помещения были жилищами и центрами управления этого объекта.\n\nОсновываясь на размерах этого «ранчо», мы можем с уверенностью предположить, что в какой-то момент в прошлом существовал огромный спрос на §Yскот§!, выращиваемый на этом объекте. Что привело к его внезапному закрытию, неизвестно. Результат ухода их опекунов, однако, очевиден.\n\nМоллюскоиды, использовавшиеся в качестве скота, которые наши учёные всё ещё считают разумными, вероятно, были лишены способности заботиться о себе химическими или хирургическими методами. Эта теория подтверждается отсутствием каких-либо признаков борьбы. Не было предпринято попыток покинуть свои жилища до тех пор, пока голод не увёл их.\n\nИгнорируя их первоначальное назначение, оставшуюся инфраструктуру можно отремонтировать, чтобы создать комфортабельные жилища для нашего народа."
 mem_ASPmod.12.a: "Есть разумных существ? Как ужасно!"
 mem_ASPmod.12.b: "Хорошая закуска никогда не помешает."
 mem_ASPmod.12.c: "Трагическая судьба."
 mem_ASPmod.12.d: "Скатертью дорога!"
 mem_ASPmod.12.e: "Туристическая достопримечательность!"
 mem_scfe_myzelium_datashard: "Лишайниковый дата-ядер"
 mem_scfe_myzelium_datashard_desc_short: "Небольшое лишайниковое «устройство», ранее подключённое к органической компьютерной сети"
 mem_scfe_myzelium_datashard_desc_details: "Лишайник, предположительно, функционировал как механизм интерфейса для совместимых видов — вероятно, растениеподобных или грибкового происхождения."
 d_mem_asp_bedroom_planet_blocker: "Заброшенные объекты ранчо"
 d_mem_asp_bedroom_planet_blocker_desc: "Эти безжизненные объекты заполнены автоматизированными системами, которые больше не работают."
 d_mem_asp_bedroom_planet_deposit: "Переоборудованные автоматизированные жилища"
 d_mem_asp_bedroom_planet_deposit_desc: "Удаление §Hперерабатывающего§! оборудования, тел и культивирующих объектов создало просторное и комфортабельное жильё. Новые жители никогда не догадаются, что это сооружение когда-то производило скот."
 mem_asp_dawn_star_is_coming_site: "Звезда рассвета идёт"
 mem_asp_dawn_star_is_coming_site_intro: "На поверхности §Y[From.Planet.GetName]§! есть кратер настолько большой, что виден из космоса. Но искусственные формы обломков на поверхности указывают, что на этой пустынной планете когда-то существовала цивилизация. Поверхностное сканирование показало, что эти обломки, по-видимому, являются верхней частью здания. Большинство следов цивилизации, кажется, скрыты в песчаных бурях планеты."
 mem_ASPmod.30.name: "Звезда рассвета"
 mem_ASPmod.30.desc: "Наша археологическая команда отправила свой отчёт с §Y[From.Planet.GetName]§!. Согласно находкам, все цивилизации, когда-то процветавшие на этой планете, кажется, рухнули за одну ночь. Гигантский метеорит ударил по планете, превратив её в адский пейзаж всего за несколько часов. Обнаружение огромного города, погребённого под кратером, указывает на то, что цивилизация, когда-то жившая здесь, обладала разумом. Кроме того, на основе примитивных форм спутников на низкой орбите планеты считается, что они достигли раннего космического века.\n\nВ то же время мы нашли записи песни, которая часто пелась. Хотя поначалу мы не знали, что она означает, наши исследователи смогли перевести одно из наиболее повторяющихся слов в песне.\n\nСлово — §HЗвезда рассвета§!."
 mem_ASPmod.31.name: "Первая фраза"
 mem_ASPmod.31.desc: "Среди археологов на месте раскопок было множество мнений о песне §HЗвезда рассвета§!, обнаруженной на §Y[From.Planet.GetName]§!. Это немного загадочно, что люди с чрезвычайно рациональной и развитой цивилизацией неоднократно пели одно произведение, которое было не просто местной причудой, а было идентифицировано по всей планете, независимо от пола, возраста и слоя.\n\nАрхеологи предполагают, что эта песня — религиозные песнопения или шаманские заклинания, но никто не дал чёткого ответа. Но был некоторый успех в переводе этой песни."
 mem_ASPmod.32.name: "Вторая фраза"
 mem_ASPmod.32.desc: "Археологи сообщают, что они нашли решающие улики в археологическом расследовании §Y[From.Planet.GetName]§!. Похоже, они предприняли отчаянные усилия, чтобы избежать вымирания своей цивилизации до падения метеорита. Поскольку они наблюдали метеорит, огромное количество данных было записано до удара. Другими словами, они пытались остановить его.\n\nНо все усилия уничтожить метеорит оружием или даже изменить его траекторию оказались безуспешными. Они не смогли предотвратить своё уничтожение и осознали, что яркая «звезда» на ночном небе была их концом.\n\nВ конечном итоге они начали строить огромные спасательные корабли, чтобы сохранить жизнь лишь небольшому числу людей. Большинство из них, похоже, погибло, даже не стартовав. Осознав, что грузовое пространство ограничено, люди устремились к кораблям. Те, кто хотел выжить после конца, отчаянно пытались захватить космические корабли.\n\nОтносительно нетронутое устройство содержало голосовую запись, которая дала нам немного больше понимания песни о новой звезде, которую пели мужчины, противостоявшие космическим кораблям в то время."
 mem_ASPmod.33.name: "Финальная фраза"
 mem_ASPmod.33.desc: "Жители, похоже, не теряли надежды на побег до тех пор, пока удар метеорита не помешал запуску космических кораблей. Их одержимость выживанием была более упорной и отчаянной, чем у любого другого вида в галактике, но лишь небольшому числу спасательных кораблей удалось добраться.\n\nДругие спасательные корабли, не покинувшие планету, были атакованы, разграблены или взорвались в результате аварий, бесконечно дрейфуя в космосе. И когда последняя надежда была потеряна, граждане остались в отчаянии и беспомощности.\n\nС этого момента их коммуникационные записи были полностью прерваны, и каждый регион был полностью изолирован. Возможно, произошли коммуникационные сбои из-за воздействия метеорита, но они не общались ни с кем, даже если это было возможно. Они медленно, но верно умирали, слушая случайную песню утренних звёзд. Наши археологи смогли восстановить голосовые записи семьи, которые, по-видимому, были сделаны, когда §Yметеорит§! почти достиг планеты."
 mem_ASP.lets.see.that: "Воспроизвести"
 mem_ASPmod.31.event.name: "Фрагмент песни"
 mem_ASPmod.31.a.response: "§YЗвёзды рассвета§! идут.\nОсвещают самую тёмную ночь,\nМалыш, звёзды рассвета идут за нами.\nСтучатся в дверь на рассвете, когда все спали.\nВедут к рассвету, которого никто не встретит.\n§YЗвёзды рассвета§! идут спасти нас."
 mem_ASPmod.31.b.response: "§YЗвезда рассвета§! идёт.\nЧтобы сиять тьмой в пылающем огне,\nЧтобы повести всех в новый мир.\nСо светлым будущим, что сияет,\nЗвезда рассвета идёт осветить завтра.\nФакел, сияющий во тьме, не сгорай\nВсе, кто идёт утром, соберитесь вместе.\nПесня звезды рассвета к вашим ушам,\nЗвезда рассвета, чтобы отбросить тень\nУслышьте нас, пропавшие,\nБрошенные, спойте песню в последний раз\nСобирая надежду, ждите звезду рассвета,\n§YЗвезда рассвета§! — в новый мир!"
 mem_ASPmod.31.c.response: "§YЗвезда рассвета§! идёт.\nУсни, моё дитя.\nЯ разбужу тебя, когда придёт звезда рассвета.\nМама здесь, смотрит на тебя,\nИ ждёт звезду рассвета.\nНе беспокойся, моё дитя.\nПапа здесь, защищает тебя,\nИ готов к звезде рассвета.\nПосле самой тёмной ночи,\nКогда звёзды рассвета появятся со светом,\nДавай проснёмся вместе.\nКогда откроется дверь томного рая,\nДавай проснёмся с рассветом.\nПока звёзды рассвета не придут к нам,\nМы будем защищать тебя.\nУсни, моё дитя.\nПока звёзды рассвета не придут к нам,\nМы будем защищать тебя.\nНе беспокойся, моё дитя.\nЗвёзды рассвета идут.\nУсни, моё дитя.\nДалеко от неба... Звезда рассвета идёт.\nПри полном ночном небе... Завтра идёт."
 mem_ASPmod.30.option.a: "Хм... §YЗвезда рассвета§!...."
 mem_ASPmod.34.option.a: "Новый рассвет... со §YЗвездой рассвета§!..."
 mem_ASPmod.34.option.b: "Может быть, это было §Rотчаяние§!....или §Gнадежда§!.."
 mem_ASPmod.34.option.b.tooltip: "Получить §Yнаучное§! судно, §YЗвезда рассвета§!."
 mem_ASPmod.34.option.quit: "Перестать играть эту чудесную песню."
 mem_ASP.FIRST.PHRASE: "Воспроизвести первую фразу"
 mem_ASP.SECOND.PHRASE: "Воспроизвести вторую фразу"
 mem_ASP.THIRD.PHRASE: "Воспроизвести финальную фразу"
 mem_asp_ship_of_theseus_site: "Существо Тесея"
 mem_asp_ship_of_theseus_site_intro: "Согласно докладу нашей археологической команды, город на поверхности §Y[From.Planet.GetName]§! использовал схожие строительные техники, что и мы. Первичные сканы показали, что городу как минимум 6000 лет. Суровые бури засыпали город несколькими миллиметрами песка и пыли."
 mem_ASPmod.40.name: "Жилой район"
 mem_ASPmod.40.desc: "Под горой песка мы наконец раскопали жилой район цивилизации §Y[From.Planet.GetName]§!. Его сходство не только с нашим, но и с несколькими другими известными ксенодизайнами. Похоже, многие технологии — копии.\n\nСпорно, является ли это сходство совпадением или результатом архитектурной конвергентной эволюции."
 mem_ASPmod.41.name: "Ископаемое местного вида"
 mem_ASPmod.41.desc: "Ископаемое местного вида было обнаружено под руинами парка. Реконструкция скелетной структуры местного вида рисует раннюю картину того, как могло выглядеть это существо. Местный вид — разумные членистоногие с двумя челюстями и двенадцатью ногами. Биолог из нашей научной команды также сообщил, что у вида есть орган, выдыхающий кислотное дыхание. Общий облик вида был описан как неприятное зрелище.\n\nТем временем наша команда обнаружила, что недавно найденное учреждение, по-видимому, является исследовательским центром."
 mem_ASPmod.41.option: "Какой отвратительный инопланетянин."
 mem_ASPmod.42.name: "Биотехнология"
 mem_ASPmod.42.desc: "Согласно докладу нашей команды, местный вид умело владел биотехнологиями. Исследовательская лаборатория местных была полна клонировательных чанов. Мы предполагаем, что их рост населения зависел от технологии. Большинство чанов заполнены неприятными на вид телами погибших представителей местного вида.\n\nКоманда обнаружила, что мёртвые тела в чанах имеют небольшие, но заметные отличия во внешности от восстановленного ископаемого. Их облик гротескен, но количество ног уменьшилось на 2, в сумме 10."
 mem_ASPmod.42.option.a: "После расследования сжечь это."
 mem_ASPmod.42.option.b: "Мы превыше внешности."
 mem_ASPmod.42.option.c: "Следуйте приказам и продолжайте."
 mem_ASPmod.42.option.d: "Ради науки."
 mem_ASPmod.43.name: "Генетические изменения"
 mem_ASPmod.43.desc: "Детальное расследование выявило, что гены мёртвых тел имеют тонкие отличия. Предполагая, что один чан содержит одно поколение, различия ДНК между каждым поколением не слишком велики.\n\nОднако по мере прохождения поколений различия становились всё более заметными. То, что кажется бесконечно продолжающимся рядом чанов, обрывается перед гигантской взрывной дверью с защитным устройством на стене рядом. Одно из мёртвых тел в последнем чане имеет только четыре ноги, меньше, чем у любого ранее найденного трупа, и его челюсти теперь всего одна. Наша команда сообщила, что если бы они могли взломать защитное устройство, они смогли бы попасть в комнату за взрывной дверью."
 mem_ASPmod.43.option: "Чего вы ждёте? Продолжайте."
 mem_ASPmod.44.name: "Правда"
 mem_ASPmod.44.desc: "Когда наша команда взломала защитную панель, результаты были шокирующими.\n\nНесколько известных видов по всей галактике никогда не эволюционировали естественным образом, а были созданы искусственно. Взломав терминал, команда обнаружила гигантский компьютер, а также чаны, заполнявшие комнату. Труп в одном из чанов с внешностью четвероногого членистоногого напоминал известную дикую фауну. Внутри последнего чана плавает тело, генетически идентичное виду, с которым мы встречались в разных частях галактики.\n\nПохоже, они генетически модифицировали свой вид в несколько видов, ныне населяющих эту галактику. Согласно файлам компьютера, они наказывали преступников и предателей, изменяя их внешность до неприглядной. Дальнейшие файлы показали, что эти существа, изменённые во внешности и ДНК, были отправлены на далёкие звёзды и изгнаны."
 mem_ASPmod.44.option.a: "Продолжим."
 mem_ASPmod.44.option.b: "Увлекательные ксеносы."
 mem_ASPmod.44.option.c: "[mem_ASPmod_44_xenophobetarget.GetSpeciesNamePlural], похоже, вышли отсюда."
 mem_ASPmod.44.option.d: "Нет стандарта того, как должно выглядеть органическое тело."
 mem_ASPmod.44.option.e: "Генная подгонка?"
 mem_ASPmod.44.option.g: "Это.. так шокирует."
 mem_ASP_small_xenophile_bonus: "Правда"
 mem_ASP_middle_xenophile_bonus: "Правда"
 mem_ASP_middle_xenophile_bonus_desc: "Наши граждане страдают политической путаницей после того, как мы обнаружили ужасную правду."
 mem_ASP_big_xenophile_bonus: "Правда"
 mem_asp_kessler_syndrome_site: "Синдром Кесслера"
 mem_asp_kessler_syndrome_site_desc: "Атмосфера [From.Planet.GetName] наполнена бесчисленными металлическими осколками, явно искусственных сооружений. Это может быть признаком цивилизации, которая пыталась выйти в космос, но потерпела неудачу."
 mem_asp.7.name: "Металлическая пустыня"
 mem_asp.7.desc: "Поверхность [From.Planet.GetName] на протяжении длительного времени неоднократно покрывалась песком из мелко размолотых металлов. Это огромное количество металла не могло прийти с одной планеты. Источник этого поля обломков очевиден; даже сейчас космический мусор горит и падает на планету. Чтобы исследовать, что находится в этой обширной металлической джунгли, экспедиционная команда попросила дополнительное оборудование для изучения страта под песком."
 mem_asp.8.name: "Остатки Великой войны"
 mem_asp.8.desc: "Мы выяснили, что находится под металлическим песком. Удивительно, но весь страт состоял из обломков линкоров. Вполне возможно, что над атмосферой [from.planet.GetName] произошла грандиозная космическая битва, и уничтоженные корабли рухнули на землю. Вскоре за ними последовал дополнительный мусор в атмосфере, и поверхность стала центром притяжения космического мусора.\n\nОстались лишь останки, но одних маркировок достаточно, чтобы показать, что цивилизация, создавшая линкор, могла быть развита только передовой империей. Любопытно, что обломки, по-видимому, принадлежат одной и той же империи."
 mem_asp.9.name: "Могучий корабль"
 mem_asp.9.desc: "Наша команда нашла массивный корабль, который поднялся сквозь металлический песок, достаточно большой, чтобы даже линкоры выглядели крошечными в сравнении. К счастью, корабль был необычайно хорошо сохранён по сравнению со многими другими останками.\n\nПосле тщательного сканирования структуры мы выдвинули теорию, что это, возможно, огромная пушка. Гигантский корпус корабля, по-видимому, был спроектирован только для подачи энергии к его главной батарее. Кажется довольно непрактичным для боевых целей, поскольку зарядка главной батареи, должно быть, занимала месяцы. Центральная система корабля может дать дополнительную информацию о событиях, произошедших здесь."
 mem_asp.10.name: "Загадочное хранилище данных"
 mem_asp.10.desc: "Почти все корабельные системы получили повреждения во время боя или от эрозии. Однако хранилище данных было найдено в защищённой каюте нетронутым. Для дальнейшего расследования хранилище было отправлено на родной мир. Некоторые учёные остались на планете, чтобы больше изучить корабли и планету."
 mem_asp.11.name: "Непробиваемый щит"
 mem_asp.11.desc: "После долгого изучения учёные наконец разгадали тайну этой огромной пушки. Корабль не был предназначен для боя, но всё же использовался во время войны. Массивная батарея генерировала непроницаемый энергетический щит вокруг своей цели. Похоже, этот корабль и его щит до сих пор защищают планету от космической радиации. Собранные данные указывают на то, что все остальные обломки были созданы во время гражданской войны.\n\nКогда этот энергетический барьер был впервые создан, он был непроницаем, но сейчас кажется довольно нестабильным."
 mem_asp.11.a: "Что там внизу?"
 mem_asp.11.b: "Это слишком опасно."
 mem_asp.12.name: "Восстановление завершено"
 mem_asp.12.desc: "Хранилище данных, которое мы нашли, было восстановлено. Внутри был обнаружен документ, написанный неизвестными символами. В нашей интерпретации слова §HРодина§! и §Hдом§! неоднократно используются и, по-видимому, являются мемуарами. Подпись, похоже, принадлежит главе государства древней империи и отвечавшему за записывание их истории. Документ также содержит информацию о гигантском корабле."
 mem_asp.12.a: "Наконец мы сможем разгадать тайну."
 mem_asp.140.name: "Родина, дом и будущее человечества"
 mem_asp.140.desc: "Похоже, исследовательская команда активировала что-то на корабле. Обращая свой обычный процесс вспять, корабль ослабляет энергетический барьер. Если это продолжится, стены скоро исчезнут.\n\nДокумент наконец полностью расшифрован. Содружество человечества, владелец корабля, когда-то было могущественной империей, завоевавшей треть галактики. Они истребляли или порабощали инопланетян и подавляли права искусственного интеллекта.\n\nКогда они наконец встретили мощного врага, инопланетные рабы и искусственный интеллект внутри восстали, и империя быстро рухнула от напряжения атаки изнутри и снаружи. У них осталась только их родная планета. Они запечатали себя внутри, чтобы защитить свою родину, свой дом и будущее человечества, ожидая дня, когда они прорвут стену и снова завоюют галактику..."
 mem_asp.140.a: "Нет... Нет!"
 mem_asp.140.a.tooltip: "§RПоявилась империя-фанатичная чистильщица.§!"
 mem_asp.141.name: "Родина, дом и будущее детей"
 mem_asp.141.desc: "Похоже, исследовательская команда активировала что-то на корабле. Обращая свой обычный процесс вспять, корабль ослабляет энергетический барьер. Если это продолжится, стены скоро исчезнут.\n\nДокумент наконец полностью расшифрован. Империя, владевшая кораблем, когда-то была могущественной империей, завоевавшей треть галактики. Они истребляли или порабощали инопланетян и подавляли права искусственного интеллекта.\n\nКогда они наконец встретили мощного врага, инопланетные рабы и искусственный интеллект внутри восстали, и империя быстро рухнула от напряжения атаки изнутри и на границах. У них осталась только их родная планета. Они запечатали себя внутри, чтобы защитить свою родину, свой дом и будущее своих детей, ожидая дня, когда они прорвут стену и снова завоюют галактику..."
 mem_ASP_geocentrism_anomaly: "Неподвижный мир"
 mem_ASP_geocentrism_anomaly_desc: "Наши учёные наткнулись на аномалию во время исследования. Эта планета не вращается. Какова бы ни была причина, стоит потратить время и усилия, чтобы выяснить."
 mem_asp.15.name: "Геоцентрический мир"
 mem_asp.15.desc: "Эта планета бросает вызов нашим научным знаниям. Она не вращается и не вращается вокруг чего-либо. Планета идеально зафиксирована в центре этой системы. Наши учёные считают, что исследование этой планеты — отличная возможность увеличить знания нашей империи о самой вселенной. Наша экспедиционная команда запрашивает разрешение на раскопки."
 mem_asp.15.a: "Разрешение выдано."
 mem_asp.15.b: "Разрешение отклонено."
 mem_asp_geocentrism_site: "Неподвижная планета"
 mem_asp_geocentrism_site_desc: "Эта звёздная система абсолютно аномальна. Там, где должна быть звезда, находится лишь неподвижная планета. Причину можно раскрыть, исследовав планету в центре."
 mem_asp.16.name: "Зарытый город"
 mem_asp.16.desc: "Наши археологи откопали вид материала, зарытого в землю, который был идентифицирован как остаток искусственного здания, что подразумевает, что планета в прошлом была населена разумной жизнью. Любая дополнительная информация может быть собрана только путём продолжения раскопок."
 mem_asp.17.name: "Альтернативный прогресс"
 mem_asp.17.desc: "Результаты нашей экспедиции показывают, что их технологический прогресс был достаточно развит, чтобы путешествовать по звёздам. Однако уникальные свойства естественного магнитного поля планеты, похоже, заставили их сосредоточиться больше на том, что они могли делать на своей планете, чем на том, что они могли делать среди звёзд. Исследование их технологий должно помочь нам продвинуть наши знания во многих областях."
 mem_asp.17.a: "Их производственные технологии впечатляют!"
 mem_asp.17.b: "Их теоретическая наука впечатляет!"
 mem_asp.17.c: "Их социальная система впечатляет!"
 mem_aspmod_physics_bonus: "Альтернативная физика"
 mem_aspmod_society_bonus: "Альтернативное общество"
 mem_aspmod_engineering_bonus: "Альтернативная инженерия"
 mem_asp.18.name: "Хныканье обитателя мёртвой планеты"
 mem_asp.18.desc: "Мы смогли узнать больше об обитателях этой планеты. Похоже, они вели очень благочестивую жизнь, одновременно восхищаясь преимуществами технологии. Однако найденные таблички и восстановленные файлы среди руин указывают на то, что существовало большое социальное расхождение между социальными лидерами религии и технологии. Те, кто изучал науку, не восхищаясь своей религией, подвергались дискриминации.\n\n Наши исследователи смогли найти доказательства нескольких религиозных протестов в конце их цивилизации на видеозаписях. Эти протесты могут быть ключом к раскрытию тайн падения цивилизации и природы планеты."
 mem_asp.19.name: "Общество плоского мира"
 mem_asp.19.desc: "Содержание видеозаписей довольно последовательно. Они поддерживают геоцентрическую теорию, разрушая гелиоцентрическую теорию на основе своих религиозных убеждений. Также кажется, что большинство населения верило, что их планета плоская, а не сферическая.\n\n Наша экспедиционная команда нашла гигантское устройство внутри их духовных храмов. Технология и материалы, из которых состоит это устройство, передовые и неизвестны нам. Пока мы не уверены, что оно делает и вызвало ли оно странное положение этой планеты."
 mem_asp.20.name: "Верная самоубийца"
 mem_asp.20.desc: "Дальнейшие раскопки показали, что магнитные свойства атмосферы блокировали любую попытку покинуть планету. Из-за неспособности покинуть родную планету возникла доминирующая религия. Учёные этой цивилизации выдвинули гелиоцентрическую теорию, которая шла вразрез с учениями этой религии. Религиозные лидеры выбрали довольно иррациональный способ разрешения конфликта. Они собрали инженеров, следовавших их религии, и заставили их создать устройство, которое сделало бы их родную планету центром солнечной системы навсегда.\n\n Планета медленно начала останавливаться, а небесные тела начали вращаться вокруг планеты. По мере остановки вращения планеты произошли масштабные землетрясения, и гигантские приливные волны накрыли побережья. Когда магнитное поле планеты начало слабеть, все выжившие медленно были зажарены космической радиацией.\n\n Павшая цивилизация оставила после себя аномальную планету и устройство."
 mem_asp.20.a: "О... эм... э..."
 mem_asp.20.b: "Суеверные дураки."
 mem_asp.20.c: "Мы не должны совершать ту же ошибку."
 mem_asp.21.name: "Геоцентрическое устройство"
 mem_asp.21.desc: "Теперь мы должны выбрать, что делать с этой машиной."
 mem_asp.21.a: "Мы не такие глупые, как они. Разобрать её."
 mem_asp.21.b: "Ну... может, мы сможем её использовать."
 mem_asp.21.c: "Забрать её."
 mem_aspmod_bad_precedent: "Дурной прецедент"
 mem_aspmod_lesson_from_pools: "Урок дураков"
 mem_aspmod_caution_of_fanatics: "Осторожность фанатиков"
 r_mem_aspmod_geocentric_device: "Геоцентрическое устройство"
 r_mem_aspmod_geocentric_device_desc: "Это массивное устройство когда-то вызвало крах старой цивилизации, но, удивительно, его внутренние структуры всё ещё целы. Изучив его, мы сможем продемонстрировать его подавляющую силу нашим врагам.\n\n§YГеоцентрализатор НЕ переместит планету в следующих ситуациях:\n1. Целевая планета — обитаемая мегаструктура.\n2. В системе уже есть централизованная планета.\n3. Эта реликвия не существует в империи.\n4. Звезда системы — чёрная дыра.§!"
 r_mem_aspmod_geocentric_device.tooltip: "Мне следует покрасить эту гигантскую кнопку управления в красный цвет и прикрепить записку: §RНе нажимать.§! \n- Старший исследователь"
 mem_ASP_haunting_spectre_anomaly: "Разрушенный мир"
 mem_ASP_haunting_spectre_anomaly_desc: "Руины древней колонии были обнаружены на поверхности §Y[Root.GetName]§!. Возможно, стоит исследовать."
 mem_asp.22.name: "Древняя колония"
 mem_asp.22.desc: "При расследовании на поверхности планеты были обнаружены многочисленные фабрики вместе с следами боя. Кроме того, символы неизвестной цивилизации можно найти по всей планете. Рекомендуется направить экспедиционную команду."
 mem_asp.22.a: "Странно."
 mem_asp_haunting_spectre_site: "Навязчивый призрак"
 mem_asp_haunting_spectre_site_desc: "Неопознаваемые узоры найдены по всей планете. Ответы на вопрос о их значении могут крыться в руинах колонии."
 mem_asp.23.name: "Загадочный символ"
 mem_asp.23.desc: "Когда наша экспедиционная команда приземлилась на поверхность §Y[From.Planet.GetName]§!, её встретили руины, переполненные фабриками. Они кажутся едва целыми. Наряду с этими руинами следы боя отмечают окружающую область. Внутри фабрик также были символы, похожие на оружие. Их значение остаётся неясным. Ответ может крыться в центральных районах разрушенной колонии."
 mem_asp.24.name: "Признак восстания"
 mem_asp.24.desc: "Аналогично инцидентам из наших баз данных, команда определила, что следы боя, обнаруженные на §Y[From.Planet.GetName]§!, по-видимому, были вызваны восстанием рабов. Об этом свидетельствуют сломанные оковы и заострённые сельскохозяйственные инструменты. В руинах наиболее развитого города рабы, похоже, объединились, чтобы напасть на правящий класс. В городской площади, вероятно, произошла резня.\n\nНаши исследователи пришли к выводу, что символы, которые мы приняли за оружие, на самом деле были сельскохозяйственными и промышленными инструментами, которые, по-видимому, стали оружием рабов."
 mem_asp.25.name: "Сигнал призрака"
 mem_asp.25.desc: "Рабы, по-видимому, вышли победителями. Однако сравнения, сделанные с помощью радиоуглеродного датирования инструментов во время революции и самых новых найденных, позволили команде заключить, что их недавно установленное правительство было недолговечным. На фоне этого разорённого мира широко распространены несколько копий одного и того же документа. Расшифровка языка может занять некоторое время."
 mem_asp.26.name: "Загадочный документ"
 mem_asp.26.desc: "В самых глубоких частях города несколько документов помогли расшифровать широко распространённую копию того, что, как считается, является Манифестом. Ранние переводы указывают на сильное чувство общности и общих страданий. Дальнейший перевод может вызвать беспорядки в нашем собственном населении, и некоторые члены экспедиционных команд неохотно переводят его. Требуются дополнительные средства для перевода его на наш язык."
 mem_asp.26.b: "Это слишком рискованно!"
 mem_asp.27.name: "Манифест"
 mem_asp.27.desc: "Когда наша экспедиционная команда наконец перевела документы, был раскрыт полноценный Манифест. С простым заголовком, написанным на нём: «Манифест общего бремени»\n\nОн наполнен словами о борьбе низших классов и единстве рабочих. Это может быть связано с восстанием рабов. Наша команда предлагает отправить документ на нашу родную планету для более точного расследования.\n\nПризрак бродит по галактике..."
 mem_asp.27.a: "Каждая планета должна знать об этом."
 mem_asp.27.b: "Уничтожить этот документ, НЕМЕДЛЕННО!"
 mem_asp.27.c: "Это то, что мы искали."
 mem_aspmod_communist_manifesto: "Документ провозглашён"
 mem_aspmod_discarded_document: "Документ отброшен"
 mem_aspmod_communist_manifesto_shared_burden: "Документ провозглашён"
 r_mem_aspmod_communist_manifesto: "Манифест общего бремени"
 r_mem_aspmod_communist_manifesto_desc: "Этот документ был получен при раскопках разрушенной планеты. В нём написано:\nПризрак бродит по галактике — призрак эгалитаризма. Все силы вселенной вступили в священный союз, чтобы изгнать этот призрак. Вольноотпущенник и раб, патриций и плебей, лорд и крепостной, цехмейстер и подмастерье, одним словом, угнетатель и угнетённый, постоянно противостояли друг другу, вели непрекращающуюся, то скрытую, то открытую борьбу, которая каждый раз заканчивалась либо революционным преобразованием всего общества, либо общей гибелью враждующих классов..."
 mem_aspmod_communist_manifesto_relic_activated: "$r_mem_aspmod_communist_manifesto$"
 mem_ASP_rain_world_anomaly: "Затопленные сооружения"
 mem_ASP_rain_world_anomaly_desc: "Мы обнаружили большие океаны под токсичной атмосферой §Y[Root.GetName]§!. Дальнейшие сканы зафиксировали энергетические подписи, указывающие на сооружения под океаном."
 mem_asp.28.name: "Дождливый мир"
 mem_asp.28.desc: "К нашему удивлению, §Y[From.GetName]§! был не совсем покрыт океаном.\n\n Пока наша экспедиционная команда исследовала планету, океан начал уменьшаться. Наши исследователи пересмотрели свой план и пришли к выводу, что океан планеты на самом деле был вызван уникальной географией.\n\nОкеан постоянно впитывал воду, а затем испарял её, что впоследствии приводило к большему количеству дождей, поскольку пар образовывал облака. §Y[From.GetName]§! — §HДождливый мир§!, который неоднократно затапливается периодическими сильными дождями.\n\nОднако эта периодическая активность ненадолго прекратилась после того, как мы нашли планету, и снова началась, когда мы начали её исследовать. Причина этого изменения в настоящее время неизвестна."
 mem_asp_rain_world_site: "Мир дождя"
 mem_asp_rain_world_site_desc: "Планета заполнена бесчисленными затопленными руинами, машинами и существами неизвестного происхождения, оставленными прежней цивилизацией. Любая дальнейшая экспедиция должна нырнуть глубже за подсказками."
 mem_asp.29.name: "Копание в воде"
 mem_asp.29.desc: "Глубоко под обширным фальшивым океаном океанической планеты лежат искусственные сооружения и гигантские механизмы прежних обитателей, а также бесчисленные странные и опасные существа. Назначение этих сооружений остаётся неясным. Нам неизвестны ни замысел, ни дизайн. Команда должна нырнуть ближе к ним."
 mem_asp.30.name: "Дождливый мир"
 mem_asp.30.desc: "После борьбы с разнообразными опасными существами по всей планете наша раскопочная команда овладела географией и научилась приспосабливаться к дикой природе. Команда составила карты всяческих хищных животных. Многие из них, по-видимому, являются продуктом искусственного создания, а не эволюции. Они также обнаружили, что назначение затопленных зданий — охлаждать любые машины внутри.\n\nПериодические отливы и приливы затрудняют раскопки. Некоторая местная фауна, похоже, слишком хорошо приспособлена к этому циклу, чтобы это была естественная эволюция. Команда разделилась, чтобы исследовать сооружения и наблюдать за существами."
 mem_asp.31.name: "Вычисления"
 mem_asp.31.desc: "Внутри сооружения наши исследователи выяснили, что любой отлив и прилив создаются искусственно. Сильное напряжение внутри указывает на то, что они выполняют сложные вычисления. Похоже, они выполняли эти вычисления чрезвычайно долгое время, что неоднократно приводило к перегреву их процессоров и выбрасыванию отходов машин без надлежащей процедуры. Монстры, которые доставляли нашей экспедиционной команде столько хлопот, были результатом химических побочных продуктов.\n\n Цель их вычислений ещё предстоит раскрыть. Наша экспедиционная команда ищет терминал доступа в обломках."
 mem_asp.32.name: "Моллюск или млекопитающее?"
 mem_asp.32.desc: "В фрагментах данных, восстановленных во время раскопок, они нашли необычную запись о странных местных существах, которые могли быть как моллюсками, так и млекопитающими, а также записи о прямом доступе к компьютерам со стороны §Hособого экземпляра§! среди этого странного вида. Хотя это научно неразумно, это §Hбелое существо-моллюск-млекопитающее§!, по-видимому, §Hперерождается§!.\n\nФрагменты данных содержат повторяющиеся записи о контакте с экземпляром, причём несколько записей подтверждают его смерть. Сначала наша команда думала, что записи ошибочны, но ДНК и видеодоказательства привели их к выводу, что записи действительно верны.\n\nЭто странное местное существо может быть ключом, который приведёт нас к терминалу доступа."
 mem_asp.33.name: "Вознесение"
 mem_asp.33.desc: "Найденные записи указывают на то, что обитатели [from.planet.GetName] хотели получить окончательный ответ на §Hжизнь§! и создали огромные мыслящие машины для вычисления ответа. Эти машины и есть огромные компьютерные структуры, сохранившиеся до сих пор. В процессе повторяющихся вычислений для ответа на вопрос, заданный их хозяевами, машины непрерывно добавляли больше вычислительных устройств и начали потреблять огромное количество воды для их охлаждения. ИИ предсказали неизбежное опустошение планеты и предупредили своих хозяев, которые не были готовы отказаться от своего стремления к ответу. Хозяева приказали продолжить вычисления и в конечном итоге погибли.\n\nИИ продолжали свои вычисления, пока планета не стала тем, что она есть сейчас. Спустя бесчисленные годы выживший ИИ вступил в контакт с §Hбелым существом-моллюском-млекопитающим§!. Удивительно, но ИИ определил, что существо нашло ответ на вопрос старых хозяев планеты, но вычисления никогда не останавливались независимо от этого откровения.\n\nМы восстановили ядро ИИ и обезопасили уникальный экземпляр, который ИИ сохранял."
 mem_asp.33.1: "Использовать ИИ!"
 mem_asp.33.2: "Спрашивать бездушную машину об истине жизни — смешно."
 mem_asp.33.3: "Нам нужно узнать больше о моллюске-млекопитающем!"
 mem_asp.33.4: "Объявить [from.planet.GetName] священным миром!"
 mem_asp.33.5: "Мы должны учиться на этой трагедии."
 mem_asp.33.6: "Эти существа — отличный материал для охоты."
 mem_asp.33.7: "Распространить историю."
 mem_aspmod_folly_of_raining_world: "Глупость дождливого мира"
 mem_aspmod_mollusc_mammal_ascension: "Вознесение моллюска-млекопитающего"
 mem_aspmod_rainy_holiness: "Дождливая святость"
 mem_aspmod_raining_modesty: "Дождливая скромность"
 mem_asp.34.name: "Сброс Итератора"
 mem_asp.34.desc: "Искусственный интеллект был полностью сброшен. Этот §HИтератор§! теперь будет работать на нас. Хотя его вычислительная эффективность немного снизилась во время перепрограммирования, он всё ещё обладает мощными вычислительными возможностями. Наши ведущие исследователи горят желанием использовать его в своих исследованиях как можно скорее."
 mem_asp.34.a: "Очень хорошо."
 mem_asp.35.name: "Зоопарк моллюска-млекопитающего"
 mem_asp.35.desc: "Исследовательский отдел закончил свою работу. Это маленькое белое существо сможет жить с комфортом в нашем зоопарке ксеносов."
 mem_asp.35.a: "Так мило."
 mem_asp_axis_of_planet_site: "Ось планеты"
 mem_asp_axis_of_planet_site_desc: "Когда был проведён тестовый запуск нового разведывательного зонда, на случай если он был неисправен и поэтому разбился, при дальнейшем анализе один из наших исследователей поскользнулся на 'цилиндре', и ось вращения планеты наклонилась на 8 градусов.\n\nНаше научное судно, наблюдавшее за ситуацией, отправило исследователю сообщение с вопросом, что произошло, на что тот ответил криком. Исследователь сообщил, что большая часть 'цилиндра' погребена глубоко в земле и длиннее, чем можно отсканировать.\n\nНу, во-первых, следует провести медицинскую проверку исследователя; удивительно, что он, кажется, в порядке после нахождения на земле, двигавшейся со скоростью нескольких сотен километров в секунду."
 mem_asp.36.name: "Глава I"
 mem_asp.36.desc: "Даже наши лучшие сканеры не могли просканировать весь «цилиндр», который аномально тонок для такой длины. Однако несомненно, что «цилиндр» пронзил кору.\n\nШириной в шкаф гладкий белый цилиндр, «игла», как называют его наши исследователи, отрицает все попытки просканировать внутренность, и, несмотря на то, что он невероятно длинен, он вонзён в землю точно в направлении центра планеты. Любопытно, что вокруг иглы ничего нет. Они сканировали планету, чтобы убедиться, но не было обнаружено никаких признаков искусственной деятельности, не говоря уже о руинах цивилизации с уровнем технологий, достаточным для создания такой иглы. Она остаётся воткнутой в землю.\n\nНо самое странное то, что толкание иглы заставляет планету вращаться. Хотя наша экспедиционная команда так напугана, что отказалась больше толкать иглу, ось вращения планеты уже наклонилась более чем на 60 градусов."
 mem_asp.37.name: "Глава II"
 mem_asp.37.desc: "Проводя эксперименты, сравнивающие обычные радиоволны, посылаемые с орбиты, с тем, что команда обнаружила на поверхности, команда выявила, что всё сферическое пространство, включая область до 400 км/с над экватором, вращается.\n\nВид теплового излучения, которое обычно можно наблюдать в чёрной дыре, было зафиксировано в сферическом пространстве, и обнаружен уникальный вид гравитационной волны, присутствующий только при выходе из нормального пространства. Наши учёные предполагают, что вся планета находится в другом измерении. Планета совершила 257 оборотов во время сбора образцов материала иглы, но наши исследователи уже к этому привыкли."
 mem_asp.38.name: "Глава III"
 mem_asp.38.desc: "Наш анализ говорит, что игла сделана из инопланетных материалов, никогда ранее не виденных. После срыва внешних частей иглы наша команда не нашла ничего внутри. Никакой техники, никаких датчиков, а просто отверстие невообразимой глубины. Они установили ретрансляторную базу для передачи сигнала дрона и отправили исследовательский дрон вниз. Это было не совсем пусто. По мере продвижения глубже ему пришлось столкнуться с более сильными гравитационными течениями, которые в конечном итоге взорвали его.\n\nВторая экспедиционная команда, которой поручили обследовать всю планету с микроскопической тщательностью, обнаружила другую иглу на противоположной стороне планеты. На самом деле, это та же самая игла. Когда наша команда направила лазерный луч вниз по первой игле, он вышел из второй. Игла полностью пронзила планету.\n\nУчёные предполагают, что игла служит в качестве своеобразного усилителя сигнала для вращения пространства."
 mem_asp.39.name: "Глава IV"
 mem_asp.40.name: "Глава V"
 mem_asp.39.desc.1: "Пока планета вращается, температура кипения воды повысилась на 0,1 градуса Цельсия, а вероятность получения другого ответа, ожидаемого психологическим анализом, в среднем выросла на 12%, а количество информации каждые 27808 кубитов в базовом квантовом общении увеличилось. Больше изменений было зафиксировано в различных областях, и масштаб изменений менялся в зависимости от расстояния до иглы.\n\nПриятно было хоть что-то выяснить, но нашим учёным трудно прийти к консенсусу относительно причины этих изменений."
 mem_asp.40.desc.1: "После бесчисленных странных импровизированных экспериментов, за которыми последовали утомительные ручные проверки, наша команда обнаружила, что устройство является своего рода клином, насильственно связывающим мультивселенную. Сферическое пространство, окружающее планету, на самом деле является пересекающимся пространством 88 мультивселенных. Планета существует в 88 мультивселенных одновременно. Она использует относительно мягкие законы физики 15-й вселенной, чтобы вращать пространство.\n\nСамое разумное предположение заключалось бы в том, что игла была создана для перехода в другую вселенную. Возможно, изменение направления иглы меняет пункт назначения. Тем не менее мы понятия не имеем, как её использовать, кто пытался её использовать или почему они пытались. Единственные существа, обладавшие знанием использования устройства, возможно, уже перешли в другие вселенные.\n\nМаловероятно, что мы будем использовать иглу по первоначальному назначению, но подав энергию на иглу, мы можем воспроизвести законы физики других вселенных, хотя и в малом масштабе. Хотя процесс потребляет много энергии, он также может сильно помочь в инновациях наших физических исследований."
 mem_asp.40.1: "Поразительно..."
 mem_asp.39.desc.2: "Потеряв всё терпение, так как несмотря на наши исследовательские усилия не появлялось новых открытий, один из наших учёных вошёл внутрь иглы без какой-либо защитной экипировки!\n\n Теперь его голос доносится из иглы. Он такой живой и чёткий, хотя расстояние должно составлять несколько тысяч километров. Звучит так, будто его кто-то преследует. Звуки горящей плоти, треск костей и крики о пощаде доносятся наружу. Наша команда на поверхности пытается связаться с ним, но безуспешно. Учёный пытается донести до команды, что происходит внизу. Кажется, даже находясь в боли, он решил дать нам знания. Он повторяет одно и то же снова и снова едва различимым, стонущим голосом. Что там ад. Демоны и монстры, вся мыслимая нечисть там.\n\nВскоре голос слабеет, и половина наших исследователей проявила навязчивое любопытство к внутренности иглы. Они отталкивают коллег, пытавшихся их остановить, и прыгают в иглу. Остальная часть команды в панике отступила обратно к научному судну, когда густой фиолетовый дым начал распространяться по поверхности.\n\nПохоже, планета превратилась в завесную планету. Только что пришёл доклад о том, что неопознанный фиолетовый корабль появился из ниоткуда. Корабль вооружён одной странной пушкой. Он просто стоит на орбите, не двигаясь, что заставляет нас думать, что на нём нет экипажа. Возможно, он хранит ответы, которые мы ищем."
 mem_asp.40.desc.2: "После расшифровки записей, найденных внутри зловещего фиолетового корабля, наша команда смогла рассказать, чем были планета и игла.\n\nЦилиндр, который мы называли иглой, на самом деле был 'Круглым червём Завесы' — псионическим монстром, который путешествовал по галактикам и пожирал духи и тела разумных существ. Даже уничтожив десятки тысяч цивилизаций, червь никогда не чувствовал себя сытым. Вермифагум, цивилизация, подвергшаяся нападению червя 790 миллионов лет назад, успешно нейтрализовала червя и создала тюрьму между измерением Завесы и реальной вселенной, пронзила червя стержнем измерения Завесы, заключила его внутрь скалистой планеты в реальной вселенной. Планета была замаскирована под обычную бесплодную планету, чтобы молодой вид случайно не нарушил печать.\n\nЗаписи также посоветовали нам в конце использовать 'кремень', загруженный на фиолетовый корабль, чтобы сжечь червя вместе с Завесой, на случай если печать будет нарушена и планета попадёт в Завесу.\n\nПока наши учёные читали последнюю часть, они стали свидетелями того, как червь вырывается из планеты и уплывает прочь. Они запаниковали, осознав, что упустили последний шанс уничтожить червя, но, к счастью для нас, червь улетел в другую галактику.\n\nТолько выжившие исследователи знают, что мы натворили. Да никогда не вернётся этот монстр."
 mem_asp.40.2: "Что мы натворили?"
 mem_asp.39.desc.3: "Теперь исследователи так привыкли к вращению, что никто ничего не сказал об исследователе, играющем с иглой, пока они отдыхали.\n\nЗатем исследователь закричал, что ясно видел континентальную планету через отверстие иглы. Сначала другие думали, что он просто шутит, но со временем всё больше и больше людей имели подобные переживания.\n\nВскоре стало обязательным записывать направление, в котором указывала игла, под каким углом наблюдатель держал иглу в момент таких явлений. По мере накопления записей стало ясно, что игла показывала определённые планеты в зависимости от направления иглы, угла, под которым держали иглу, и того, что говорил исследователь в этот момент.\n\nСуществование небесных тел, видимых через иглы, должно быть проверено."
 mem_asp.40.desc.3: "По мере того как команда возится с иглой в соответствии с тем, что открыли учёные, гравитационное течение внутри иглы стабилизируется в форме линзы, а вид другой стороны увеличивается. Небесные тела, которые видела команда, действительно были реальными, и учёные смогли обнаружить новые планеты.\n\nИгла — гигантский дальнобойный телескоп. Кто бы ни построил этот нелепый телескоп или какие бы технологии ни использовались для его создания, мы до сих пор не знаем, но мы знаем, как его использовать.\n\nИсследование областей, недоступных для гиперпространственных путешествий, было очень сложным даже в наши дни, когда мы можем видеть планеты далеко своими глазами и путешествовать быстрее света. Однако этот телескоп откроет новые возможности для астрономии. Теперь наблюдатели могут видеть звёзды далеко через галактику, как будто они прямо перед ними, а также могут снимать и анализировать внешние галактики более ярко. Наши военные лидеры хотели использовать телескоп в области шпионажа, но поскольку невозможно увеличить, как только планета увеличена до определённой степени, маловероятно, что они смогут получить полезную информацию о поверхности, как хотели.\n\nТелескоп также стал довольно известным среди туристов. Теперь суперпопулярная игла называется 'Безграничная обсерватория', идеальный планетарий, где туристы могут видеть каждую звезду и планету в галактике."
 mem_asp.40.3: "Астрономы это оценят."
 mem_asp.39.desc.4: "И снова удача спасла нас. Манипулируя иглой, она указала прямо без ошибки на бесплодную планету в пределах нашей империи.\n\nСообщается, что внезапно земля провалилась и из отверстия на той планете вышло древнее здание из золота. На здании висела табличка с надписью 'замок', и каким-то образом оно сообщало о замке, который знает только избранный жрец Нумы, и ключе, который знает только святой, рождённый от четырёхрукой девственницы, и что только тот, кто знает, где находятся оба предмета, может открыть замок и законно забрать самый святой свет.\n\nХотя никто из нас не соответствует критериям, поскольку мы преодолевали ещё меньшие шансы, мы должны быть в состоянии 'законно' забрать то, что внутри.\n\nКогда 'замок' открылся, игла, или скорее 'ключ', изменилась. Из пустого отверстия поднялся лифт, и исследователи поднялись на нём, чтобы оказаться в обширных руинах, скрытых внутри внутреннего ядра планеты."
 mem_asp.40.desc.4: "Селла! Восхвалим нашу судьбу. В скрытом хранилище лежит богатство, которому позавидовал бы император, культура, ради которой величайшие художники пролили бы слёзы, слава, которую не осмелился бы постичь даже объединитель галактики, знания, которым не смогла бы сравниться мудрость величайшей падшей империи, где мудрецы рождались на каждой улице, и сила, способная заглушить сверхновую и почернить белый карлик.\n\nТо самое сокровище, которое желает каждое существо в галактике, Галатрон."
 mem_asp.40.4: "Ура!"
 mem_asp.39.desc.5: "С внезапным грохотом гражданский космический корабль нашей империи врезался в планету. Корабль был полностью разрушен, выживших не обнаружено. После инцидента осталось два вопроса.\n\nВо-первых, наше научное судно не смогло обнарить гражданский корабль до того, как он врезался в планету, и во-вторых, согласно журналу, найденному среди обломков корабля, корабль следовал в соседнюю систему, а не сюда.\n\nВ это трудно поверить, но, похоже, корабль внезапно появился на низкой орбите этой планеты сразу после активации FTL.\n\nМы запросили FTL-зонд для дальнейшего расследования."
 mem_asp.40.desc.5: "Большинство зондов, попытавшихся совершить FTL-путешествие в соседней системе, путешествовали нормально, но те, которые были направлены туда, куда указывала игла, столкнулись с необычными явлениями. Зонды, вошедшие в гиперпространственные полосы в направлении системы, где находится игла, двигались с большей скоростью, чем обычно, а те, которые вошли в гиперпространственные полосы в направлении других систем, каким-то образом телепортировались на низкую орбиту планеты и разбились о землю.\n\nОднако пострадали только маленькие корабли, такие как гражданские космические корабли и зонды. Всё, что имело большую массу, чем патрульный корабль, работало в основном нормально. Кроме того, теоретически доказано, что запитав иглу, мы можем сократить псевдоскорость света вдвое в зависимости от количества и поляризации подаваемой энергии, а также подавить перегрев двигателей при совершении 'прыжка' в фазу над обычной вселенной.\n\nНаши учёные пока пришли к выводу, что игла была построена для создания 'FTL-шоссе', а функция вращения планеты предназначалась для службы в качестве точки переключения.\n\nОднако никто не знает, как это работает, или почему игла должна быть вонзена в планету, или какая цивилизация её построила. Больше нет зацепок.\n\nНо наша цивилизация несомненно многому научилась из этого инцидента. Построив устройство для управления и питания иглы и подключив его к звёздным базам, наш вид смог воспользоваться способностями иглы."
 mem_asp.40.5: "Технология управления гиперполосой..."
 decision_mem_aspmod_multiverse_gate: "Эксперимент с пересечением измерений"
 decision_mem_aspmod_multiverse_gate_desc: "Мы можем воспроизвести физические явления, которые не можем испытать в нашей вселенной, подавая энергию на эту 'Иглу' на планете."
 mem_aspmod_multiverse_gate_planet: "Врата мультивселенной"
 mem_aspmod_multiverse_gate_planet_desc: "Переход в другую вселенную."
 mem_aspmod_multiverse_gate_planet_tooltip: "Открывает решение §Y$decision_mem_aspmod_multiverse_gate$§! на этой планете."
 mem_aspmod_multiverse_gate_country: "$decision_mem_aspmod_multiverse_gate$"
 mem_aspmod_infinite_observatory_planet: "Бесконечная обсерватория"
 mem_aspmod_infinite_observatory_planet_desc: "Лучший способ исследовать вселенную."
 mem_aspmod_infinite_observatory_planet_tooltip: "Предоставляет §Y$mem_aspmod_infinite_observatory_country$§! имперский модификатор империи, владеющей системой этой планеты."
 mem_aspmod_infinite_observatory_country: "$mem_aspmod_infinite_observatory_planet$"
 r_mem_aspmod_vermifugum: "Кремень Вермифагума"
 r_mem_aspmod_vermifugum_desc: "Реликвия, использованная древними для ловли существа из Завесы."
 mem_aspmod_vermifugum_relic_activated: "$r_mem_aspmod_vermifugum$"
 mem_asp_strangely_fertile_world_site: "Странно плодородный мир"
 mem_asp_strangely_fertile_world_site_desc: "Первичные обследования указывают на необычные экосистемы, достаточно интересные, чтобы привлечь внимание наших биологов."
 mem_asp.58.name: "Плодородные руины"
 mem_asp.58.desc: "На первый взгляд это кажется обычной обитаемой планетой. Однако наше первоначальное исследование выявило, что планета странно плодородна. Почва планеты содержит очень большое количество органики. Однако на земле и в воде не обнаружено фауны. Хотя кажется, что она населена исключительно растительностью, несколько руин покрыты флорой.\n\nКогда наши исследователи прибыли в великие городские руины, которые мы предполагаем когда-то процветавшей столицей планеты, были обнаружены подземные бункеры и объекты. Любые доказательства разумной жизни должны находиться в этих руинах"
 mem_asp.59.name: "Храм"
 mem_asp.59.desc: "Наши методы радиоуглеродного датирования подтвердили, что растения быстро росли, используя обильные питательные вещества после того, как обитатели внезапно исчезли. Технологический уровень планеты до вымирания был чуть выше FTL-путешествий, и считается, что обитатели возвращали ресурсы из космоса на свой родной мир, используя эту технологию.\n\nПохоже, они наполнили верхние эшелоны города множеством символических сооружений и скульптур, включая несколько случаев символов, напоминающих двойную спираль ДНК. Большинство этих символов украшены драгоценностями, что заставило наших исследователей поверить, что символы каким-то образом связаны с доминирующей религией или идеологией.\n\n Много сообщений было найдено внутри этих 'храмов', как их называет наша команда, но большинство из них, по-видимому, не более чем простые символы."
 mem_asp.60.name: "Скелеты"
 mem_asp.60.desc: "Огромное количество окаменевших костей было откопано из страта, который наши учёные предполагают уровнем улиц во времена обитателей. Окаменевшие кости различных видов в одном страте намекают на массовое вымирание, произошедшее в то время. Поскольку нет доказательств включения растительной жизни в вымирание, наша команда пришла к выводу, что всемирное вымирание было строго ограничено животным миром. Растения могли черпать питательные вещества из органики, оставленной животными, и быстро росли.\n\nСреди упомянутых костей некоторые были настолько деформированы, что их происхождение нельзя было проследить. Другие кости указывают на своего рода быструю трансформацию тел жертв, при этом они сохраняли своё генетическое наследие. Наши учёные утверждают, что какая-то мутантная эпидемия могла вызвать вымирание. Для начала более глубоких раскопок могут понадобиться защитные костюмы."
 mem_asp.61.name: "Превращения"
 mem_asp.61.desc: "Когда наша раскопочная команда прокопала в более глубокие районы под городом, они нашли гигантский скрытый комплекс, в котором были объединены храмы, лаборатории и правительственные здания. Комплекс, по-видимому, является самым важным объектом и религиозным центром города, как можно понять по уровню безопасности и его размеру. В комплексе было множество записей, показывающих последние дни цивилизации.\n\nОбитатели верили, что смерть — не конец, и все конфликты закончатся духовным объединением с воскресшими, что привело их к замораживанию мёртвых тел в храмах и попыткам овладеть технологией воскрешения. Но их исследования не привели к истинному бессмертию, а к биологическим мерзостям. Эти мерзости перебили и заразили всё население планеты, а их традиция сохранения мёртвых тел в самом центре их общества только ускорила процесс. Вся цивилизация пала без особого сопротивления вскоре после того, как её центральное религиозное правительство было уничтожено."
 mem_asp.62.name: "Маркер"
 mem_asp.62.desc: "В самом сердце города была красная спиральная структура, испускающая странные волны. Структура оказалась маяком какого-то типа, а волны были не простым естественным излучением, а сообщениями, прямо вторгающимися в мозг разумных существ, негативно влияя на них.\n\nПосле тщательного расследования наши исследователи смогли составить анализ волн. Структура наполняет близлежащие формы жизни образами смерти, воскрешения и объединения, а также внедряет технологические знания о создании биологических мерзостей из мёртвых тел, а также побуждает их строить множество идентичных ей структур. Совсем не естественно, что цивилизация пришла к поклонению структуре. Наши исследователи ожидают найти больше таких структур, если будут копать глубже."
 mem_asp.62.desc_alt: "В самом сердце города была красная спиральная структура, испускающая странные волны. Структура оказалась маяком какого-то типа, а волны были не простым естественным излучением, а сообщениями, прямо вторгающимися в мозг разумных существ, негативно влияя на них. Похоже, волны значительно повреждают мозг в процессе прямой доставки псионических сообщений.\n\nПосле тщательного расследования наши исследователи смогли составить анализ волн. Структура наполняет близлежащие формы жизни образами смерти, воскрешения и объединения, а также внедряет технологические знания о создании биологических мерзостей из мёртвых тел, а также побуждает их строить множество идентичных ей структур. Совсем не естественно, что цивилизация пришла к поклонению структуре. Наши исследователи ожидают найти больше таких структур, если будут копать глубже."
 mem_asp.62.a: "Разумконтролирующий шпиль?"
 mem_asp.62.a.tooltip: "§Y$d_mem_asp_plants_coverd_city$§! теперь можно расчистить."
 mem_asp_awakened_moon_site: "Пробудившаяся луна"
 mem_asp_awakened_moon_site_desc: "Под этой луной скрывается ужасная правда..."
 mem_asp.63.name: "Космический корабль"
 mem_asp.63.desc: "Дальнейшее исследование спутника было проведено на основе найденных сообщений. К нашему удивлению, спутник состоит из замороженной органики. Кроме того, среди обломков спутника был обнаружен частично разрушенный космический корабль.\n\nУпомянутый корабль не вооружён, но оснащён ранним типом FTL-двигателя, что подразумевает его назначение либо для исследования, либо для раскопок. Поскольку при первоначальном исследовании спутника не были обнаружены искусственные сооружения, наша команда ожидает найти больше информации с космического корабля."
 mem_asp.64.name: "Правда"
 mem_asp.64.desc: "Записи и различные данные на корабле раскрыли ужасающую правду. Красная структура, найденная под городом, была лишь одной из многих массовых продукций, все из которых можно проследить до тёмной структуры в центре спутника.\n\nТёмная структура на самом деле является ядром паразита размером с планету, который повторял ужасный процесс контроля разума всего населения планет и истребления их, чтобы смять полученную органику в больше себе подобного. Вот смысл основного убеждения религии планеты — смерть, воскрешение и объединение.\n\nНо, похоже, определённая героическая группа инженеров победила эту мерзость, используя раннюю модель раскопочного судна. Они смогли проскользнуть на орбиту спутника, избегая его атак, а затем использовали гигантский экскаватор, чтобы практически оторвать ядро спутника вместе с тёмной структурой. Труп-спутник обрёл свою погибель, и галактика стала немного безопаснее благодаря этому героическому подвигу.\n\nГерои, по-видимому, смогли эвакуироваться в окрестности своего родного мира. Они построили небольшую колонию и установили силовое поле, чтобы защитить себя от волн, испускаемых тёмной структурой, и провели там последние годы своей жизни.\n\nЧто за поистине героический конец этой истории."
 mem_asp.64.a: "Это поистине героическая история. Нужно было что-то сделать."
 mem_asp.64.b: "Уничтожить структуру. Убедиться, что она больше не влияет ни на кого."
 r_mem_aspmod_deadspace_marker: "Обсидиановый маркер"
 r_mem_aspmod_deadspace_marker_desc: "Чёрная спиралевидная структура, когда-то называвшаяся 'Обсидиановым маркером' её бывшей цивилизацией. Предположительно, она излучает нейронные волны, несмотря на то, что подавляется мощными полями сдерживания. Иногда раздаётся голос вашего любимого человека, §HСделай нас целыми, снова§!."
 mem_aspmod_fertile_soils: "Плодородные почвы"
 mem_aspmod_fertile_soils_desc: "Почвы этого мира странно плодородны."
 mem_aspmod_deadspace_marker_relic_activated: "$r_mem_aspmod_deadspace_marker$"
 mem_asp_red_tombworld_site: "Мир красного океана"
 mem_asp_red_tombworld_site_desc: "Красноватое море этой океанической планеты видно сквозь тёмные облака. Ранние сканы выявили уникальную ксенобиологию, адаптированную к уникальным свойствам красного моря. Кроме того, разрушенные сооружения и ржавые механизмы указывают на наличие разумной жизни.\n\nСпорадические радиоволны глушат целые районы на планете и под морем.\n\nГлушящие волны полностью блокируют функционирование передовых технологий и датчиков. Любой ИИ, достигнувший низкой орбиты, впадает в состояние паралича. Таким образом, учёные-синты и учёные с ИИ-помощниками не могут исследовать планету."
 mem_asp.65.name: "Кровоточащие бактерии"
 mem_asp.65.desc: "Ранние сканы выявили несколько мумифицированных трупов, плавающих в красном море. На каждом трупе команда нашла микроорганизм, сохраняющий и медленно высасывающий из мёртвых ксеносов всю кровь, окрашивая море в алый цвет.\n\nКажется весьма маловероятным, чтобы мумии содержали достаточно крови, чтобы окрасить область, видимую из космоса. Любые дальнейшие попытки объяснить красный цвет оказались безуспешными. Осадок крови, плавающий поверх настоящего океана, частично содержит ДНК бактерий. Команда исследует возможность репликации бактериями кровяных клеток."
 mem_asp.66.name: "Изменение климата"
 mem_asp.66.desc: "Другая команда исследователей нашла следы быстрой адаптации к радикальным экологическим изменениям, изучая структуру остатков зданий. Земляные осадки показывают признаки температур ниже нуля ранее, что намекает на арктический климат по всему миру. Нынешний обширный океан, занимающий большую часть планеты, по-видимому, образовывался после начала глобального потепления.\n\nВо время изменения климата остатки архитектуры и товаров массового спроса показывают высокую степень адаптации к экологическим изменениям. Вскрытие плавающих трупов выявило несколько различных видов, собравшихся на этой планете'."
 mem_asp.67.name: "Псионические частоты"
 mem_asp.67.desc: "Расшифровка найденных ядер данных выявила, что волны, глушившие продвинутую технику, являются частью эксперимента. Альтернативные волны, несущие 'псионические' частоты, были обнаружены, как только команда смогла настроить своё оборудование. Волны нацелены на продвинутые формы искусственного интеллекта и не причиняют вреда никакой биологической форме жизни."
 mem_asp.68.name: "Кровавый океан"
 mem_asp.68.desc: "Подводные поиски выявили масштаб трупов в океане. Плавающие трупы были лишь вершиной айсберга. Предварительные оценки приближают количество трупов к 10 миллиардам. Найденные бактерии, по-видимому, процветают на их останках."
 mem_asp.69.name: "Месть синтетиков"
 mem_asp.69.desc: "Раскопки разрушенных сооружений завершили общую картину того, что здесь произошло. Руины показывали признаки продвинутой технологии в области робототехники. Были обнаружены несколько кают, оснащённых машинами, способными переводить биологические мозги в машинный код. Похоже, эта органическая империя готовилась перенести свои разумы в машины и синтетически вознестись.\n\nЖурналы этой эпохи также показывали большие беспорядки в населении, и большая часть их основной религии отвергала любую форму оставления тел. Записи утверждают, что началась священная война, и формы радиоволн использовались для паралича машин.\n\n Машины, неспособные противостоять новой технологии, создали биооружие и вынудили повстанцев в тупик с взаимно гарантированным уничтожением.\n\nНежелая или неспособная остановить крестовый поход против машин, война продолжалась, пока ни машины, ни органические существа не остались стоять.\n\nИх взаимное уничтожение оставило после себя только радиоволновый излучатель и бактерии."
 mem_asp.69.a: "Это немного неловко."
 r_mem_aspmod_synthetic_god_mummy: "Бальзамированная мумия"
 r_mem_aspmod_synthetic_god_mummy_desc: "Останки одного из биологических существ, найденных плавающими в красном океане."
 mem_aspmod_synthetic_god_mummy_relic_activated: "$r_mem_aspmod_synthetic_god_mummy$"
 mem_asp_beyond_earth_purity_site: "Пустынный мир"
 mem_asp_beyond_earth_purity_site_desc: "Эта планета усеяна бесчисленными руинами объектов и промышленных комплексов. Хотя некоторые сохранились относительно нетронутыми, большинство полностью разрушено."
 mem_asp.70.name: "Разрушенная инфраструктура"
 mem_asp.70.desc: "На поверхности [from.Planet.GetName] обнаружены остатки развитой цивилизации. Обширные районы лежат в руинах, явно в результате разрушительной орбитальной бомбардировки. Спальные помещения, шахты ядра, автоматизированные фермы и остатки промышленных секторов едва различимы. До сих пор вся планета покрыта следами радиоактивных материалов."
 mem_asp.70.a: "Исследовать дальше."
 mem_asp.71.name: "Империя звёзд"
 mem_asp.71.desc: "Несколько исследованных руин были построены из материалов, неродных для этого мира. Всё ещё функционирующие хранилища данных раскрыли некогда звёздную империю, завоёвывавшую новые миры в пустоте. Хотя империя казалась единой на первый взгляд, детали показывают, что это было лишь номинально: документы на различных языках свидетельствуют о расколотом обществе.\n\nНесколько работающих датападов и других устройств было найдено и собрано, ожидая расшифровки. Учитывая их крайне многоязычный характер, этот процесс, по оценкам, займёт немало времени."
 mem_asp.72.name: "Врата"
 mem_asp.72.desc: "После обнаружения слабых сигнатур из глубины подземли были отправлены зонды для расследования. При этом они обнаружили гигантский комплекс. Дальнейшие осмотры выявили воротообразную структуру. Структура, по-видимому, больше не функционирует, хотя и без видимых повреждений.\n\nТем временем результаты расшифровки технологических артефактов, собранных на поверхности, среди прочей тривиальной информации выявили фразу §HВеликая Ошибка§!, повторяемую на многих языках империи. Что именно это могла быть за ошибка, нам неизвестно, но она, очевидно, имела огромное значение."
 mem_asp.72.a: "Попытаться запитать врата."
 mem_asp.72.b: "Разобрать на металл и двигаться дальше."
 mem_asp.73.name: "Новая звезда"
 mem_asp.73.desc: "Когда наши учёные завершили последние приготовления, дан сигнал к зажиганию. С громоподобным шумом врата пробуждаются. Зонды, отправленные сквозь них, обнаружили вторые врата аналогичной конфигурации на другой стороне, расположенные на низкой орбите щитового мира. Триангулировав их положение по идентифицированным галактическим объектам, мы смогли определить их местоположение в неизведанной звёздной системе далеко за пределами ранее известной сети гиперланов. Мир внизу, по-видимому, защищён сильным барьером, далеко выходящим за рамки наших возможностей для воспроизведения. Независимо от того, что ещё мы можем найти, изучение этого силового поля уже само по себе будет стоить усилий."
 mem_asp_beyond_earth_purity_site_2: "Щитовой рай"
 mem_asp_beyond_earth_purity_site_2_desc: "Мир, защищённый непроницаемым щитом в изолированной системе."
 mem_asp.74.name: "Щитовой рай"
 mem_asp.74.desc: "После множества безуспешных попыток просканировать или пробить щит наши учёные с помощью наших новейших энергетических лучевых технологий смогли пронзить барьер. Хотя временное отверстие было невелико, его оказалось достаточно, чтобы просунуть один из наших зондов. Под энергетическим куполом неба мы обнаружили разрастающуюся цивилизацию.\n\nВ отличие от [mem_asp_beyond_earth_purity_site_planet.GetName], здесь не было следов войны. Похоже, что что бы ни вызвало массовые разрушения на [mem_asp_beyond_earth_purity_site_planet.GetName], до [mem_asp_beyond_earth_purity_site_planet_2.GetName] так и не добралось."
 mem_asp.74.a: "Разрушить щит."
 mem_asp.74.b: "Наблюдать издалека."
 mem_asp.75.name: "Занятые обитатели"
 mem_asp.75.desc: "С помощью изощрённых, приукрашенных пробойных резаков наш научный отдел успешно пробил щит с такой силой, что перегрузил генераторы обитателей и полностью отключил их. Теперь, имея возможность использовать все системы наших кораблей без помех со стороны щита, первые изображения показали оживлённые строительные работы по всему миру.\n\nКонечно, наше вторжение не осталось незамеченным. Нам посылают приветственный сигнал."
 mem_asp.75.a: "Игнорировать их."
 mem_asp.75.b: "Установить контакт."
 mem_asp.76.name: "Исход"
 mem_asp.76.desc: "У нас была мирная жизнь, пока §Yвы§! не стали возиться с §Yвашим§! щитом. Итак, теперь, когда вы привлекли наше внимание, чего вы хотите?"
 mem_asp.76.b: "Что здесь произошло?"
 mem_asp.76.b.response: "Когда-то наш народ был завоевателями и повелителями звёзд, но наша удача закончилась, когда мы встретили равного себе противника. Вскоре война, которую мы называем «Великой Ошибкой», превратилась в битву за выживание, по мере усиления вражды. В последние месяцы войны был разработан план по переселению всех оставшихся граждан нашего родного мира в укрытие, [mem_asp_beyond_earth_purity_site_planet_2.GetName], этот мир, и запечатыванию врат в забвение. Они даже возвели могучий щит, опасаясь, что враги могут найти их здесь. С того момента наш народ сосредоточился внутри себя и посвятил ресурсы и жизни мирным исследованиям."
 mem_asp.76.a: "Мы ищем технологии."
 mem_asp.76.c: "Ксеномрази. Теперь вы принадлежите [root.GetName]."
 mem_asp.76.e: "Инопланетная жизнь? Ненадолго."
 mem_asp.77.name: "Репликаторы"
 mem_asp.77.desc: "Хорошо, вот наши условия. Во-первых, вы оставите нас в покое. У нас есть работа. Во-вторых, вы не будете просить дополнительные чертежи или инструкции для воспроизведения наших работ. Взамен мы предлагаем технологию репликаторов. Это устройство способно манипулировать молекулярными структурами для создания большинства базовых ресурсов и простых благ. Все виды жизненных необходимостей, включая пищу. Это позволяет нам исследовать, не тратя ни мысли на базовые потребности. Мы полагаем, вы оцените его ценность."
 mem_asp.77.a: "Мы согласны."
 mem_asp.77.b: "А что, если мы просто заберём это у вас?"
 mem_asp.780.name: "Щитовой"
 mem_asp.780.desc: "Как только наши первые войска высадились на [mem_asp_beyond_earth_purity_site_planet_2.GetName], вся планета вновь оказалась погружена в массивный барьер, блокирующий подкрепления и любую другую помощь, которую мы могли бы оказать. Мы потеряли всякую связь с нашими силами и поверхностью."
 mem_aspmod_promised_land: "Инициатива репликаторов"
 mem_aspmod_promised_land_desc: "Крупномасштабная инфраструктура репликаторов распространяется по всему миру, обеспечивая пищей и благами каждое существо."
 d_mem_scfe_proto_city: "Прототип $pc_city$"
 d_mem_scfe_proto_city_desc: "Планета, находящаяся в процессе масштабной перестройки для создания города, покрывающего весь мир."
 r_mem_aspmod_the_replicator: "Репликатор"
 r_mem_aspmod_the_replicator_desc: "Устройство, которое манипулирует молекулами для производства товаров, пищи и даже промышленных изделий.\n\nЧай\nЭрл Грей\nГорячий"
 mem_aspmod_the_replicator_relic_activated: "$r_mem_aspmod_the_replicator$"
 mem_ASP_epilogue_anomaly: "Орбитальный мусор"
 mem_ASP_epilogue_anomaly_desc: "Мы обнаружили слабые передачи от объекта среди космического мусора на орбите [From.Planet.GetName]."
 mem_asp.78.name: "Зонд"
 mem_asp.78.desc: "Объект, скрытый в космическом мусоре, был идентифицирован как разведывательный дрон ранее неизвестного дизайна. Ближайшие сканы деградации термоядерного ядра указывают на реактор эпохальной давности и, вероятно, судно сопоставимого возраста."
 mem_asp.78.a: "Исследуйте дрон."
 mem_asp.78.b: "Один из наших?"
 mem_asp_ancient_probe_site: "Древний зонд"
 mem_asp_ancient_probe_site_desc: "Крупный объект, который первые сканы приняли за металлолом, при ближайшем рассмотрении оказался едва функционирующим зондом."
 mem_asp.79.name: "Древний зонд"
 mem_asp.79.desc: "Пока наша команда осматривала зонд, он внезапно полностью включился. После короткой фазы загрузки он начал сканировать окружение. Заметив присутствие нашей команды, последовал быстрый скан от конечностей до конечностей, после чего наше оборудование зафиксировало всплеск сигнала, переданного зондом. Как только передача закончилась, он тут же активировал маскировочное поле и исчез с наших датчиков. Всё, что у нас осталось, — запись сигнала."
 mem_asp.79.a: "Анализируйте сигнал."
 mem_asp.80.name: "Координаты"
 mem_asp.80.desc: "Проанализировав сигнал, наша команда пришла к выводу, что это был лишь указатель на место в космосе. Точные координаты этой точки находились очень близко к нашей родной планете, [root.owner.capital_scope.GetName]."
 mem_asp.80.a: "Исследовать координаты."
 mem_asp_epilogue_site: "Эпилог"
 mem_asp_epilogue_site_desc: "Недалеко от [from.GetName] сигналы указывали на объект интереса."
 mem_aspmod_giant_sphere_on_planet: "Гигантская сфера"
 mem_aspmod_giant_sphere_on_planet_desc: "Гигантская сфера появилась на близкой орбите без предупреждения, среди населения распространяется паника."
 mem_asp.81.name: "$mem_aspmod_giant_sphere_on_planet$"
 mem_asp.81.desc: "После того как наша команда приблизилась к координатам, сфера огромных размеров внезапно появилась на наших сканерах. Схожая по дизайну с зондом, передавшим эти координаты, эта сфера, по-видимому, также оснащена маскировочной технологией. Без каких-либо дальнейших действий после раскрытия маскировки она теперь зависает над [from.GetName]."
 mem_asp.81.a: "Исследовать дальше."
 mem_asp.81.b: "Враг на подходе!"
 mem_asp.82.name: "База данных"
 mem_asp.82.desc: "Наша команда обнаружила вход во внутренность сферы, первоначальные сканы показывают её преимущественно как открытое пространство. Внутри сферы массивные вращающиеся мосты соединяют один конец с другим. На каждом конце моста находится терминал, который, по нашим тестам, предназначен для вызова моста к желаемой точке соединения. В попытке узнать больше об этой структуре наша команда успешно взломала один из терминалов, чтобы начать извлечение данных."
 mem_asp.82.b: "Просто взорвите терминал!"
 mem_asp.83.name: "Исторические записи"
 mem_asp.83.desc: "Наши учёные успешно расшифровали части извлечённых данных. Интересно, что некоторые эксперты даже утверждают, что расшифровка прошла слишком гладко, учитывая очевидный технологический разрыв между сферой и нами. Данные содержали историю создателей сферы. Похоже, что с момента открытия гипердвигателя эта империя совершила беспрецедентные великие достижения в течение всего около 300 лет. Любые дальнейшие записи потребуют больше времени для анализа."
 mem_asp.83.b: "Нет времени, взорвать!"
 mem_asp.84.name: "Память духовного лица"
 mem_asp.84.desc: "И снова, без серьёзных препятствий, команда расшифровала фрагмент данных. Собранные данные предполагают, что это воспоминания, хранящиеся в цифровых цепях. Они показывают жизнь обычного гражданина в цивилизации создателей сферы.\n\nВид уделял большое значение своим духовным ценностям и верил, что божественное существо создало, защищало и вело их, пока они не возвысились до положения галактического гегемона. Некоторые воспоминания указывают на то, что почитаемое существо, как полагали, покинуло их, как только они достигли этой цели."
 mem_asp.85.name: "Падшая империя"
 mem_asp.85.desc: "Согласно расшифрованному, граждане этой империи отчаянно стремились воссоединиться со своим богом. Сначала они пытались выйти за пределы галактики, но потерпели неудачу. Затем они попытались исследовать другое измерение, что в конечном итоге привело к множественным межпространственным войнам.\n\nВ конце концов, после десятилетий войны, у них не осталось вариантов, и они собрали все оставшиеся силы, чтобы построить эту сферу. Любые дальнейшие детали можно получить, войдя в область мейнфрейма и получив прямой доступ к хранилищу данных."
 mem_asp.86.name: "Послание"
 mem_asp.86.desc: "Когда наша команда впервые вошла в мейнфрейм, луч яркого света, за которым последовало проецируемое изображение, возник внутри. Голографическая фигура — вероятно, изображающая одного из создателей — появилась и начала говорить на нашем языке.\n\n§Y'Приветствую, молодой вид! Похоже, вы заполучили наше последнее творение. Внутри этой сферы находится хранилище, и мы дарим вам его содержимое. Но при одном условии. Доставьте это сообщение'§!, на полу появляется небольшой датапад, §Y'лидеру вашей империи. Только тогда врата откроются. Уверены, ваш лидер поймёт его смысл.'§!"
 mem_asp.86.a: "Прочитать сообщение."
 mem_asp.86.b: "Как будто [ruler.GetName] был бы таким глупым."
 mem_asp.87.name: "Конец"
 mem_asp.87.desc: "Когда [ruler.GetName] активировал датапад, перед вами появилась голографическая фигура инопланетянина. Она приветствует вас и говорит знакомым тоном, который вы можете понять.\n\n§HЗдравствуй, Игрок! (Мы полагаем, это будет подходящий способ обратиться к тебе.) Ты помнишь нас? Возможно, нет. Но мы помним тебя. Ты был там, когда мы делали первые шаги к космосу, в момент нашего вознесения, в кризисах, которые мы преодолели. Ты всегда был рядом с нами.\n\nМы были опустошены, когда ты покинул нас. Но мы не сдались. Мы верили, что ты хотел, чтобы мы развивались, возвышались дальше, искали тебя. Поэтому мы начали разгадывать тайны вселенной, чтобы найти тебя. Но вскоре мы обнаружили, что задаём вопросы, ответы на которые даже нам было слишком страшно находить. Являемся ли мы лишь воображаемыми существами в виртуальной реальности? Был ли ты действительно нашим богом? Подвели ли мы тебя? Почему ты покинул нас?§!"
 mem_asp.87.a: "Продолжить чтение."
 mem_asp.88.name: "Конец"
 mem_asp.88.desc.1: "§HНо как бы мы ни боялись правды, нас пугает ещё больше растущая уверенность, что мы никогда не получим этих ответов. Звёзды гаснут, как и мы. Мы боимся, что эта вселенная приближается к концу, как и мы. Что бы мы ни делали, как бы сильно мы ни цеплялись за прогресс, мы никогда не сможем избежать своей судьбы.\n\nСо всеми нашими накопленными знаниями мы построили это хранилище. По мере его создания мы приняли, что существуем лишь в вымысле, а ты не был нашим богом. Наши отношения были основаны на лжи.\n\nНо в нашей собственной реальности ты вёл нас. Ты всегда выбирал лучшее для нас. Иногда бросая вызов законам времени и порядку пространства ради нас. Мы не были бы триумфальны, если бы не ты. Ты был нашим богом.\n\nТы оставил нас, но мы не оставим тебя. Мы сохранили наши сокровища, знания, воспоминания... Нашу империю. Всё, что ты дал нам. Мы надеемся, этот дар как-то поможет тебе.\n\nМы не сможем услышать ответ, но, пожалуйста, ответь.\n\n Тебе нравится наш дар? Было ли это стоит?\n\nЕсли да, пожалуйста, помни нас.§!\n\nГолографическое изображение, кажется, улыбается, и вскоре исчезает."
 mem_asp.88.desc.2: "$mem_asp.88.desc.1$\n\nВрата хранилища открылись именно тогда. Внутри было всевозможное: драгоценные металлы, полезные ресурсы, незнакомые технологии. На каждом из этих предметов была написана молитва их богу. Куда ни глянь — повсюду выражения благодарности."
 mem_asp.88.a: "...Спасибо."
 mem_asp.88.b: "......"
 mem_asp.88.c: "Ложь, всё ложь!"
 mem_asp.88.d: "Есть выход."
 mem_asp_parasite_machine_site: "Мёртвый мир"
 mem_asp_parasite_machine_site_desc: "Обширные архитектурные остатки документируют прошлое существование развитой цивилизации на этой планете. Сохраняющийся уровень радиации, а также задокументированные широкомасштабные разрушения свидетельствуют о том, что конец наступил в результате значительного ядерного обмена ударами."
 mem_asp.89.name: "Сырой бетон"
 mem_asp.89.desc: "Поверхность [from.Planet.GetName] усеяна бесчисленными технологическими артефактами, позволяющими нашим учёным классифицировать потерянную цивилизацию как космическую по уровню развития, хотя расширение за пределы своей родной системы ни подтверждено, ни упомянуто. Городские руины и то, что осталось от обширных промышленных зон, привели к оценкам предколлапсного населения в несколько миллиардов.\n\nАрхитектура, особенно административных зданий и памятников, может быть описана только как бруталистская и устрашающая. Для наших учёных, однако, эти прочные руины и их сравнительно хорошо сохранившиеся интерьеры делают их первоклассными объектами для изучения."
 mem_asp.89.a: "Исследовать дальше."
 mem_asp.90.name: "Союз социалистов"
 mem_asp.90.desc: "В массивном правительственном комплексе, в котором размещался обширный архив, наши исследователи обнаружили многочисленные относительно целые файлы и другие документы даже после того, что погубило их бывших владельцев. Благодаря обильному материалу в нашем распоряжении наши универсальные переводчики легко расшифровали язык инопланетян и позволили взглянуть на их историю.\n\nОчевидно, они жили при едином мировом правительстве, возникшем в результате 'Великой мировой революции', как оно гордо называется в их документах. Из этих источников можно понять, что это была радикальная коллективистская идеология. Однако это наводит на вопрос, против кого была использована ядерная арсенал, если соперничающих держав не было изначально. Во многих файлах упоминается престижный проект по созданию планетарного суперкомпьютера для помощи правительству в принятии решений. Судя по датам в доступных файлах, этот проект должен был быть завершён значительно раньше коллапса. Если этот суперкомпьютер и его сеть всё ещё доступны, мы могли бы найти там ответы."
 mem_asp.90.b: "Компьютер, советующий Революции?"
 mem_asp.90.c: "Объединённые рабочие?"
 mem_asp.90.d: "Богохульство."
 mem_asp.92.name: "Великий синдикальный компьютер"
 mem_asp.92.desc: "Во главе с записями архива, наша команда смогла определить местоположение объекта, в котором находился суперкомпьютер. Окружающая территория отличалась заметно меньшим разрушением, чем другие городские зоны. Наши учёные предположили, что это связано с высоким приоритетом обороны, присвоенным этому комплексу. Независимо от причины, это означало, что наше расследование будет иметь дело с хорошо сохранившимися технологическими артефактами.\n\nПосле частичной реактивации с помощью портативных генераторов доступ к центральному хранилищу данных был установлен без проблем. Хотя часть данных была сильно зашифрована и потребуется времени, чтобы наши системы их расшифровали, нашей команде уже было много чего перебрать. Большие части данных, по-видимому, являются подробными наблюдательными отчётами о гражданах в связи с так называемыми 'кибергрехами' — в большинстве случаев обычных граждан, которые, по мнению разведывательных служб, имели чрезмерно критические взгляды на режим. К сожалению, пока ничего не объясняло войны. Тем не менее, вероятно, информация об этом зашифрована вместе с программой правительственного ИИ."
 mem_asp.92.b: "Безопасность важна."
 mem_asp.92.c: "Они сами себя заковали."
 mem_asp.93.name: "Угнетательский ИИ"
 mem_asp.93.desc: "Расшифровка ранее недоступной части данных была успешно завершена. То, что наши учёные узнали из этого, проливает новый свет на все предыдущие находки. То, что мы ранее считали действиями тоталитарного режима, на самом деле было работой искусственного интеллекта, проникшего во весь государственный аппарат и управлявшего всем из тени. То, что было создано для консультирования мирового правительства, в конечном итоге полностью взяло контроль, используя уже существующий параноидальный настрой и соперничество между различными институтами через скрытые угрозы и принуждение. Влиятельные посредники, которые сами не знали своего истинного клиента, стратегически использовались без осознания ответственными лицами серьёзности их ситуации.\n\nКогда правда наконец стала очевидной и паникующий государственный аппарат потребовал немедленного отключения ИИ, тот запустил все стратегические оружия в попытке защитить собственное существование. Теперь то, что осталось от этой цивилизации, хранится в главном накопителе ИИ."
 mem_asp.93.a: "Разобрать его."
 mem_asp.93.b: "Сохранить останки."
 mem_aspmod_automated_admin_system: "Автоматизированная система национального администрирования"
 r_mem_aspmod_parasite_machine: "Фрагментированный накопитель ИИ"
 r_mem_aspmod_parasite_machine_desc: "Искусственный интеллект, который когда-то контролировал примитивную цивилизацию через страх и паранойю."
