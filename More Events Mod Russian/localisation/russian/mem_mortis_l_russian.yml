 mem_mortis_roar_title:0 "Рёв Змия-Мира"
 mem_mortis_roar_desc:0 "Могучий змеиный рёв ошеломил наши экипажи и повредил корабли."
 mem_mortis_behemoth:0 "Усиления змия"
 mem_mortis_behemoth_roar:0 "Рёв змия"
