 leader_trait_mem_mortis_arrfish_desc:0 ""
 r_mem_mortis_undead_scale:0 "Мешочек с грибковыми спорами"
 r_mem_mortis_undead_scale_desc:0 "Этот редкий образец был собран с заражённого дракона. Содержащиеся в нём споры обладают высокой адаптивностью и способны заражать даже почти умерших существ."
 r_mem_mortis_undead_scale_effect:0 "Создаёт §Y10§! £pop£ §Hнеживых попов§! за каждые §Y100§! $farmer_type_plural_with_icon$ на каждой планете £planetsize£"
 mem_mortis_serpents_fang: "Клык Змия-Мира"
 mem_mortis_serpents_fang_desc_short:0 "Гигантский клык из останков Ёрмунганда, простирающегося на всю звёздную систему"
 mem_mortis_serpents_fang_desc_details: "Так называемый Змий-Мир веками охранял $mem_mortis_archive_0$. Теперь он лишь превращён в охотничий трофей."
 mem_mortis_archive_0:0 "Галактическая база данных"
 mem_mortis_archive_0_MEGASTRUCTURE_DETAILS:0 "$mem_mortis_archive_0_DESC$"
 mem_mortis_archive_0_DESC:0 "База данных хранит почти идеальную копию галактической истории — от таких мелочей, как общеупотребительные фразы, до документации о возвышении и падении империй."
 mem_mortis_archive_1:0 "$mem_mortis_archive_0$"
 mem_mortis_archive_1_DESC:0 "$mem_mortis_archive_0_DESC$"
 mem_mortis_archive_2:0 "$mem_mortis_archive_0$"
 mem_mortis_archive_2_DESC:0 "$mem_mortis_archive_0_DESC$"
 mem_mortis.101.name:0 "Признаки жизни"
 mem_mortis.101.desc:0 "$mem_mortis_fc_1$"
 mem_mortis.102.name:0 "Грибок среди нас"
 mem_mortis.102.desc:0 "$mem_mortis_fc_2$"
 mem_mortis.102.a:0 "Поистине завораживает."
 mem_mortis.120.name:0 "Симбионты Завесы"
 mem_mortis.120.desc:0 "Датчики, наблюдающие за $mem_Fungal_Chorus$, зафиксировали изменения в его поведении. Эти крошечные существа каким-то образом пронзают реальность, адаптировавшись к суровым условиям Завесы; их коллектив слился с странным покровителем из-за пределов. Похоже, существо Завесы заключило с ними нечто большее, чем простой договор. Несмотря на все невероятности, результатом стала симбиоз с Завесой."
 mem_mortis.601.title:0 "Дракон побеждает пирата"
 mem_mortis.601.desc:0 "После гибели неживого дракона двигатели ближайшего корабля начинают набирать мощность. Через мгновение он выходит на связь с нашим местным флотом."
 mem_mortis.601.a:0 "Кто вы?"
 mem_mortis.601.a.response:0 "Отчаянный искатель приключений, чумной пёс-солдат и самое настоящее проклятье для всех безмозглых космических тварей, что осмеливаются подойти слишком близко!"
 mem_mortis.601.b.response:0 "Борода? Ага, почему бы и нет! Ещё глупых вопросов?"
 mem_mortis.601.c:0 "Что вы планируете делать теперь?"
 mem_mortis.601.c.response:0 "Арр, неужели вам срочно нужны яростные наёмники? Жестокие буканьеры, чтобы помочь и плавать под вашим флагом, а?"
 mem_mortis.601.d:0 "Умереть"
 mem_mortis.610.name:0 "Бешеный пёс"
 mem_mortis.610.desc:0 "Клянусь звёздами, мы нашли её, парни! Самую чудовищную левиафану, таящуюся в бездонной пучине великой чёрной пустоты! Существо кошмаров, больше любого титана! Готовьтесь к бою! Мы порубим это космическое чудовище на корм рыбам! К оружию, псы!"
 mem_mortis.614.name:0 "Конец галактики"
 mem_mortis.614.desc:0 "[root.GetName] прибыла к краю галактики, где находится система [from.GetName]. Внутри неё змееподобная левиафана огромных размеров окружает умирающую чёрную дыру системы."
 mem_mortis.614.a:0 "Встретить чудовище!"
 mem_mortis_foundation:0 "Первый Фундамент"
 mem_mortis_foundation_desc:0 "Небольшой аванпост учёных, одержимых историей."
 mem_mortis_shroomed_planet:0 "Заражение некро-грибком"
 mem_mortis_shroomed_planet_desc:0 "Эта планета была захвачена агрессивным грибковым заражением. Её следует считать враждебной средой."
 mem_mortis_pirate_insight:0 "Проницательность разбойника"
 mem_mortis_pirate_insight_desc:0 "Подробная информация о маршрутах грабежа"
 mem_mortis_psi_power_modifier:0 "Уровень грибизации"
 mem_mortis_psi_power_modifier_unique:0 "Вознесённые грибы"
 mem_mortis_shroomed_planet_remains:0 "Усмирённый некро-грибок"
 NO_COMMUNICATIONS_MEM_MORTIS_SPORE:0 "Биологическое облако пыли"
 ftl_components_bio:0 "Био-ускорители"
 sensor_components_bio:0 "Био-датчики"
 bombardment_mem_mortis_fungi_bombardment:0 "Распространение некро-грибка"
 bombardment_mem_mortis_fungi_bombardment_desc:0 "Высокозаразная грибковая инфекция превращает живую материю в безмозглые плотские оболочки."
 NAME_mem_mortis_arrfish:0 "Адмирал Йаррфиш"
 mem_mortis_arrfish_catchphrase:0 "Дружба дороже энергокредитов... или так говорят"
 mem_mortis_arrfish_backstory:0 "$NAME_mem_mortis_arrfish$ когда-то командовал флотом небольшой примитивной империи. Пока его не было на родной планете, $mem_Fungal_Chorus$ заразил его вид, почти истребив его. С несколькими уцелевшими кораблями он и его родичи бежали в глубокий космос, став последним пережитком своего вида. До сих пор он полон решимости отомстить, но чаще его отвлекают мелкие грабежи..."
 building_mem_mortis_bio:0 "Багровая ива"
 building_mem_mortis_bio_desc:0 "Уникально странный росток флоры, поддерживаемый только местными багровыми океанами. Этот вид адаптировался на протяжении веков и процветает за счёт питательных веществ, существующих лишь на поверхности этой планеты."
 d_mem_mortis_bio:0 "Кровавый океан"
 d_mem_mortis_bio_desc:0 "Багровое море, наполненное ядовитыми выделениями. Только местная флора смогла адаптироваться и превращать токсины в питательные вещества."
 building_mem_mortis_synth:0 "Мерцающий катализатор"
 building_mem_mortis_synth_desc:0 "Склад и фильтрационная установка для использования уникальных свойств местного $d_mem_mortis_cyber$. В отличие от традиционной переработки, мерцание трансмутирует всё, с чем соприкасается."
 d_mem_mortis_synth:0 "Мерцающие озёра"
 d_mem_mortis_synth_desc:0 "Мерцание — блестящая перламутровая мыльная вода. Оно способно трансмутировать любой элемент. Похоже, мерцание подавляет любую известную нам форму жизни, оставляя озёра, которые оно образует, полностью стерильными и непригодными для гидрокультуры."
 building_mem_mortis_psionic:0 "Рафинадный завод тумана"
 building_mem_mortis_psionic_desc:0 "Обогатительные сооружения, использующие местный туман для усиления псионических способностей. Хотя возможные применения завораживают, сверхъестенным силам нельзя недооценивать."
 d_mem_mortis_psionic:0 "Туман иллюзий"
 d_mem_mortis_psionic_desc:0 "По всей планете лежит густой фиолетовый туман. Любой, кто бродит по поверхности, видит сладкие иллюзии идеальной жизни, каждой мечты и конца всех желаний и потребностей."
 building_mem_mortis_cyber:0 "Формовщик луж"
 building_mem_mortis_cyber_desc:0 "Промышленное оборудование, формующее местные жидкости в полезные киберимпланты. Рабочие иногда описывают тревожный опыт, когда их лица копируются изделиями."
 d_mem_mortis_cyber:0 "Меняющие форму лужи"
 d_mem_mortis_cyber_desc:0 "Лужи, наполненные меняющей форму металлической жидкостью. Вещество постоянно меняется, образуя фигуры так же быстро, как они исчезают. Машины, подходящие слишком близко, могут обнаружить, что они идеально скопированы."
 d_mem_mortis_cyber_tt:0 "Unlocks ['building:building_mem_mortis_cyber']"
 d_mem_mortis_synth_tt:0 "Unlocks ['building:building_mem_mortis_synth']"
