 mem_mortis_spores_section:0 "Коллектив"
 mem_mortis_spores_cap:0 ""
 MEM_MORTIS_SPORE:0 "Мицелиевые колонии"
 MEM_MORTIS_SPORE_desc:0 "Эти крошечные \"существа\" в космосе образуют связную структуру. Они предпочитают атаковать космическую фауну и заражать её спорами для размножения."
 MEM_MORTIS_SPORE_KAMIKAZE_TT:0 "Порождает 1 §Y$MEM_MORTIS_SPORE$§! за каждую использованную единицу военно-морской мощности, если запас корпуса ниже 5%"
 mem_mortis_spore:0 "Мицелиевые колонии"
 mem_mortis_spore_desc:0 "Эти крошечные \"существа\" в космосе образуют связную структуру. Они предпочитают атаковать космическую фауну и заражать её спорами для размножения."
 NO_COMMUNICATIONS_MEM_MORTIS:0 "Микроскопические пришельцы"
 mem_mortis_fc_1:0 "Наши датчики зафиксировали слабые импульсы в приборах — ритмичные, но нерегулярные, словно сигналы, которые никогда не повторяются точно. Эти крошечные частицы кажутся активными, и никто не уверен, намеренно это или нет."
 mem_mortis_fc_2:0 "Наши специалисты поняли, что наблюдаемые сигналы — фитогормоны, а частицы представляют собой своего рода мицелий. Огромные грибковые сети дрейфуют по космосу скоплениями, так называемые §Y$mem_mortis_spores_plural$§!, путешествующие вместе и обменивающиеся химическими и электромагнитными шёпотами сквозь пустоту. Являются ли эти сигналы попытками коммуникации или лишь побочным продуктом их коллективного существования — остаётся неизвестным.\n\n$mem_mortis_spore_desc$"
 NAME_mem_mortis_spores_undead:0 "Неживые $mem_mortis_spores$"
