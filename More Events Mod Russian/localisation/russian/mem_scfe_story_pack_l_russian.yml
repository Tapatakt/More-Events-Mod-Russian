 d_mem_scfe_exotic_gases_layers: "Слои экзотических газов"
 d_mem_scfe_exotic_gases_layers_desc: "Космические киты умирали на этой планете миллионы лет, формируя слои £exotic_gases£$exotic_gases$"
 d_mem_scfe_ancient_underground_city: "Древний подземный город"
 d_mem_scfe_ancient_underground_city_desc: "Этот гигантский город был построен цивилизацией, некогда существовавшей на планете. Удивительно, но он всё ещё цел и достаточно велик, чтобы вместить большое население."
 d_mem_scfe_exotic_gases_layers_orbital: "$d_mem_scfe_exotic_gases_layers$"
 d_mem_scfe_exotic_gases_layers_orbital_desc: "$d_mem_scfe_exotic_gases_layers_desc$"
 mem_scfe_biggest_show_of_world_site: "Величайшее шоу мира"
 mem_scfe_biggest_show_of_world_site_desc: "Автоматические зонды обследовали остатки сооружений и передовых технологий.\nДальнейшие сканы показали, что они оставили красноречивые свидетельства своего существования: уютные города, упорядоченные пригороды, хорошо обустроенную социальную структуру и спокойные природные ландшафты, в большинстве сохранившиеся. Однако наши сканы выявляют зловещую тишину: форм жизни не обнаружено."
 mem_scfe_biggest_show.1.name: "Автоматон"
 mem_scfe_biggest_show.1.desc: "С момента первой высадки наша исследовательская группа углубилась в сердце небольшого города среди руин, который, по-видимому, был нервным центром планеты. Наши предварительные расследования выявили два ключевых откровения.\nВо-первых, изоляция здесь — иллюзия. Планета кишит бесчисленными фигурами, напоминающими куклы, жутко имитирующими живые формы. Одетые в разнообразную одежду, они, кажется, предназначены для различных задач, что указывает на замену некогда процветающего населения. Теперь они пребывают в спящем состоянии — безмолвная армия, ожидающая пробуждения.\nВо-вторых, планета удивительно хорошо сохранилась. Несмотря на остановку большинства объектов из-за истощения энергии, в фоновом режиме работает основная система обслуживания, добросовестно выполняющая свою роль. Наша следующая цель ясна: мы должны обнаружить контрольный узел, чтобы разгадать эту загадку."
 mem_scfe_biggest_show.2.name: "Шоу марионеток"
 mem_scfe_biggest_show.2.desc: "При тщательном изучении кукол наши исследователи столкнулись с озадачивающей аномалией. Вопреки первоначальным предположениям, примерно 30% кукол изображали детей, а 20% — пожилых — странность, учитывая непрактичность таких форм для тяжёлой работы.\nКаждое жилище было населено исключительно этими куклами, без каких-либо признаков обычной жизни. Ещё более удивительным было их расположение: тщательно расставленные, чтобы имитировать семейные ячейки. Кроме того, наличие фабрик, образовательных учреждений и культурных центров, всех укомплектованных этими безмолвными стражами, углубляет тайну."
 mem_scfe_biggest_show.3.name: "Пробуждение"
 mem_scfe_biggest_show.3.desc: "В разгар расследований наша экспедиция наткнулась на спящий энергетический узел — потенциальный источник питания для планетарных систем управления. После обдуманной дискуссии было решено наполнить узел энергией. В тот момент, когда система запиталась, воздух наполнился какофонией пронзительных звуков.\nПохоже, это действие одновременно пробудило кукол ото сна. Их голоса, пока ещё нерасшифрованные, казались тёплым приветствием, хотя оно было адресовано неизвестному существу, а не нашей команде. Интересно, что все куклы, похоже, призывали одну и ту же фигуру, которая явно отсутствует в нашей команде.\nХотя прямое общение с куклами остаётся недостижимым, ясно одно: они разделяют единую цель."
 mem_scfe_biggest_show.4.name: "Шоу жизни"
 mem_scfe_biggest_show.4.desc: "Наконец контрольный центр был обнаружен, искусно спрятанный в плотных облаках планеты. Анализ системы пролил свет на истинное предназначение планеты.\nОказалось, что эта планета была сценой для постановки невероятного масштаба — шоу, где главную роль играл живой человек, не подозревавший о своём главенстве. Инфраструктура планеты тщательно имитировала обычную жизнь их цивилизации ради зрелища. В укрытии мы обнаружили сокровищницу записей, повествующих о саге, длившейся поколениями, эпопее, разворачивавшейся на протяжении тысячелетий, созданной для глаз одного человека.\nКаждый протагонист, выходя из изолированной деревушки, вёл безмятежную жизнь и в конечном итоге покидал мир, не ведая о своей роли в этой замысловатой маскараде. Со сменой эпох сюжет шоу эволюционировал — от ранних драм, полных политических интриг, страстной любви и авантюрных испытаний, к неприкрашенной красоте повседневного бытия. Простые радости и страдания жизни разыгрывались в повествовании, обещавшем его героям без исключения радостный финал. Теперь пришло время раскрыть мотивы этой многотысячелетней драмы."
 mem_scfe_biggest_show.5.name: "Протагонист мира"
 mem_scfe_biggest_show.5.desc: "Наша команда проникла в режиссёрские архивы системы, обнаружив закат некогда великой цивилизации. Это общество, властвовавшее над обширными просторами галактики, поддалось медленному упадку на протяжении тысячелетий. По мере угасания их золотого века перенаселение и истощение ресурсов привели к повсеменным страданиям.\nВ дерзком шаге лидеры задумали отвлечение — грандиозное зрелище, отражавшее безоблачные дни их цивилизации, призванное затмить мрачные реалии повседневной жизни. Шоу, ностальгическая дань эпохе изобилия, пленило сердца и умы населения, включая его создателей.\nИзначально с профессиональными актёрами, шоу набирало популярность, вынуждая привлекать к главным ролям обычных людей. Это кульминировало в выборе младенца на главную роль — решение, подпитанное пылкой общественной требовательностью. Шоу получало страстные отзывы: зрители осыпали протагониста любовью, завистью и восхищением.\nВнезапно трансляции прекратились. Похоже, цивилизация в отчаянной попытке поддержать свой последний нарратив пожирала планеты ради ресурсов, пока ничего не осталось. Это шоу — их единственное наследие. Но что стало с невольным главным героем, прожившим жизнь на всеобщем обозрении?"
 mem_scfe_biggest_show.6.name: "Плохой конец"
 mem_scfe_biggest_show.6.desc: "В глубинах первозданного леса наши поиски завершились обнаружением главного героя шоу. Его скудные хроники позволили нам восстановить кульминационный поворот сюжета.\nКонец был столь же внезапным, сколь и драматичным. Сначала куклы прекратили своё представление, вероятно, из-за неспособности родной планеты передавать дальнейшие инструкции. Затем разрушились социальные институты, предположительно из-за разрыва энергетической связи. Столкнувшись с правдой о том, что его близкие — автоматы, а его жизнь — написанная иллюзия, протагонист пережил муки познания.\nИ всё же из пепла его мира вспыхнула новая решимость сбежать. Вокруг его останков лежали свидетельства его упорства: примитивные механизмы, летательные аппараты и скелетные обломки ракет — каждый памятник его непреклонному духу.\nУвы, его последнее предприятие стало и его гибелью. История, казавшаяся вечной, торжественно завершилась смертью протагониста.\nРазмышляя о его одинокой саге, мы вынуждены задуматься о направлении собственного повествования."
 mem_scfe_biggest_show.6.a: "Какая досада..."
 r_mem_scfe_protagonist_of_the_show: "Протагонист шоу"
 r_mem_scfe_protagonist_of_the_show_desc: "Это высохшее погибшее ксеносущество было последней радостью, выжившим и символом рухнувшей древней цивилизации... ну, а сейчас это просто труп."
 mem_scfe_protagonist_of_the_show_relic_activated: "$r_mem_scfe_protagonist_of_the_show$"
 mem_scfe_first_music.1.name: "Сигнал"
 mem_scfe_first_music.1.desc: "Недавние мощные солнечные ветры сорвали часть атмосферы §Y[From.Planet.GetName]§!, в результате чего сигналы, ранее удерживаемые плотными слоями атмосферы, вырвались в космос. Сразу после звёздного возмущения сигналы были сильно искажены шумами. Однако по мере возвращения звёздных условий к норме ясность этих сигналов заметно улучшилась. Наши учёные определили их источник: они исходят с поверхности планеты. Археологические команды уже направляются для расследования."
 mem_scfe_first_music_site: "Первая музыка"
 mem_scfe_first_music_site_desc: "Недавние мощные солнечные ветры сорвали часть атмосферы §Y[From.Planet.GetName]§!, в результате чего сигналы, ранее удерживаемые плотными атмосферными слоями планеты, вернулись в космос. Сразу после солнечной бури сигналы были сильно искажены шумами. Однако по мере возвращения звёздных условий к норме чёткость этих сигналов заметно улучшилась. Наши учёные определили их источник на поверхности [from.planet.GetName]."
 mem_scfe_first_music.2.name: "Первая планета"
 mem_scfe_first_music.2.desc: "Согласно последнему донесению нашего археологического отряда, §Y[From.Planet.GetName]§! — мир глубочайшей древности, сформировавшийся за миллиарды лет до рождения нашего собственного солнца. Первичное коренное ложе этой планеты входит в число древнейших задокументированных систем. Более того, постепенное охлаждение ядра планеты указывает на долгую историю. Вполне возможно, мы наблюдаем последнюю эпоху древнейшего известного мира во Вселенной."
 mem_scfe_first_music.3.name: "Сферический объект"
 mem_scfe_first_music.3.desc: "Археологическая команда обнаружила сферическое устройство, ведущее подземную передачу сигналов. По мере приближения исследователей устройство усиливало сигнал, просверливая плотные геологические слои, словно маня их ближе. Пробив мощный слой кальцита, источник обнаружился: компактная округлая металлическая машина инопланетного дизайна. Обнаруженная, машина прекратила излучение и погрузилась в тишину. Попытки расшифровать её программное обеспечение или внутренние механизмы были сорваны непроницаемой оболочкой. Тем не менее команда зафиксировала её последнюю передачу."
 mem_scfe_first_music.3.a: "Соберите интеллектуалов нашей империи."
 mem_scfe_first_music.3.b: "Приготовьте мозговые дроны."
 mem_scfe_first_music.3.c: "Выделите ресурсы калькуляторов."
 mem_scfe_first_music.4.name: "§HАнализ сигнала машины§!: результат"
 mem_scfe_first_music.4.desc: "Загадочные сигналы, исходившие от машины, были закодированы сложным шифром. Лучшие умы нашей империи неустанно трудились, дни и ночи сливались воедино, используя вычислительную мощь сотен машин в попытке расшифровать послание. Прорыв совершил наш ведущий исследователь, обнаруживший ключевую подсказку.\n§HПароль — музыка!§!\nДействительно, симфония гамм была брошена в космос. Этот код тембра инструментов и волновых форм превосходит красоту и дешифровку.\n\n Эта космическая симфония, кажется, бросает вызов незыблемым законам термодинамики; в её присутствии энтропия, по-видимому, обращается вспять. Словно эта музыка, звучащая с зари времён, несёт в себе саму сущность жизненной силы.\nИстоки и замысел этой мелодичной передачи остаются окутаны тайной. Тем не менее это откровение дарует нам редчайший взгляд на тайны космоса. Мы ещё не дали имя этой возвышенной мелодии, но честь нарекать её ждёт нас — коллективную честь нашей цивилизации."
 mem_scfe_first_music.4.a: "Fiat Lux, да будет свет."
 mem_scfe_Fiat_Lux: "Музыка — Fiat Lux"
 mem_scfe_Fiat_Lux_desc: "Открытие '§YFiat Lux§!' глубоко обогатило наше общество: от самых роскошных планет империи до беднейших граждане всех возрастов и слоёв наслаждаются этой музыкой. Возможно, в этом и есть настоящая сила музыки."
 r_mem_scfe_music_of_the_universe: "Нотная тетрадь Вселенной"
 r_mem_scfe_music_of_the_universe_desc: "Это фрагмент музыки, полученный из зашифрованного сигнала. Она обладает силой вдохнуть жизнь во Вселенную и не может быть объяснена современными технологиями. Если же в будущем мы сможем её объяснить, мы намного ближе подойдём к пониманию тайн космоса."
 mem_scfe_music_of_the_universe_modifier: "Нотная тетрадь Вселенной"
 mem_scfe_music_of_the_universe_modifier_desc: "Эта нотная тетрадь, должно быть, первая во Вселенной..."
 SCFE_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT: "Проанализировать сигнал машины"
 SCFE_SIGNAL_ANALYSIS_OF_MACHINE_PROJECT_DESC: "Мы должны проанализировать последний сигнал машины, записанный на §Y[Root.GetName]§!. Это займёт много времени, но ответит на многие вопросы наших учёных."
 mem_scfe_whale_tomb_site: "Гробница космических китов"
 mem_scfe_whale_tomb_site_desc: "Уникальный состав поверхности §Y[From.Planet.GetName]§! привлёк внимание после появления первых дальних снимков. Она содержит многочисленные слоистые пласты, полные окаменевших останков древних существ, равномерно распределённых, что указывает на регулярные циклы экологического расцвета и массового вымирания.\n\nСамый недавний катаклизм датируется 200 миллионами лет назад. Он, по-видимому, был внезапным, учитывая, что нынешняя биосфера планеты ограничена простейшими организмами с примитивным генетическим составом.\nЭта планета явно относится к категории «неудачливых» обитаемых миров. Однако остаётся спорный вопрос: размер древних ископаемых."
 mem_scfe_whale_tomb.1.name: "Гробница"
 mem_scfe_whale_tomb.1.desc: "Обнаруженные гигантские существа были космическими китами тианки, известными тем, что собираются на определённую планету из общепризнанного списка для последнего приюта. §Y[From.Planet.GetName]§!, к сожалению, была одним из таких избранных мест.\nМеньшие окаменевшие существа были коренными обитателями планеты, невольными жертвами погребальных обрядов тианки. Моделирование неуклюжего спуска тианки предсказывает разрушения, сравнимые по мощи с орбитальной бомбардировкой.\n\nВ пластах возрастом 600 миллионов лет сохранились нечёткие остатки того, что могло быть разумной цивилизацией. Более глубокое исследование может раскрыть дополнительные подробности."
 mem_scfe_whale_tomb.2.name: "$primitive_plural$"
 mem_scfe_whale_tomb.2.desc: "Наше исследование подтвердило существование разумного вида на этой планете, который процветал, даже когда «похороны» космических китов были частым явлением. Надписи раскрыли их имя — Инфеликс. Эти примитивы обладали развитыми механическими знаниями и создавали движущиеся города. Об этом свидетельствуют несколько руин, похожих на башни на ногах. Некоторые из этих сооружений содержали передовые обсерватории, с помощью которых они, предположительно, рассчитывали приближение тианки. Питаясь почти неиссякаемым количеством туш, многие из этих мобильных баз использовали ископаемое топливо для своей работы."
 mem_scfe_whale_tomb.3.name: "Ископаемое"
 mem_scfe_whale_tomb.3.desc: "Наша команда обнаружила признаки зарождающейся цивилизации на участке, далёком от ранее найденных руин.\n\nВыяснилось, что даже в свои формативные годы эта цивилизация использовала останки китов, о чём свидетельствуют намеренные метки на ископаемых. Эти ранние обитатели активно эксплуатировали туши тианки — резкий контраст с их потомками. Они полностью зависели от павших левиафанов в получении необходимых материалов, настолько, что использовали туши в качестве укрытий.\n\nХотя в разных регионах существовали различия в сложности инструментов, применявшихся к останкам китов, общим оказалось художественное самовыражение: символы, вырезанные из китовых костей, были распространены почти повсеместно.\n\nТочное значение этих символов остаётся неуловимым, но с каждым более глубоким слоем их сложность возрастает."
 mem_scfe_whale_tomb.4.name: "Убежище"
 mem_scfe_whale_tomb.4.desc: "Наша археологическая команда сделала удивительную находку: сооружение, резонирующее с характерным архитектурным стилем цивилизации, но обладающее технологической сложностью, сопоставимой с космическими цивилизациями — резкий контраст с примитивными руинами выше. Кажется маловероятным, что столь развитая цивилизация погрузилась в примитивизм исключительно из-за падения гигантских китов с небес.\n\nЭто открытие опровергает господствовавшую теорию о том, что похороны китов тианки стали катализатором повторяющихся вымираний планеты. Находки команды показывают, что, хотя падение китов действительно разрушительно, оно недостаточно катастрофично, чтобы уничтожить целую цивилизацию. Это ставит наших исследователей в состояние недоумения относительно недавних находок."
 mem_scfe_whale_tomb.5.name: "Вымирание"
 mem_scfe_whale_tomb.5.desc: "Чем глубже наша раскопочная команда копала, тем больше она обнаруживала остатков некогда богатой и процветающей планетарной империи, стоявшей на пороге космических путешествий, когда обрела преждевременный конец.\n\nЭто общество владело космическими технологиями и процветало, используя останки китов как ресурсы. Оно хорошо осознавало стоящие перед ним вызовы. На пике могущества спуск китов уже не внушал ужас, а был лишь препятствием на пути к космическим исследованиям.\n\nОднако несколько записей и кратеров показывают следы взрывов; хотя обычная боеголовка была бы правдоподобной, следы всегда ведут из мест, где должны были лежать туши. Это порождает ведущую теорию о том, что туши китов каким-то образом детонировали."
 mem_scfe_whale_tomb.6.name: "Карма"
 mem_scfe_whale_tomb.6.desc: "Космические киты тианки по своей природе не взрываются после смерти благодаря внутренней защите в их телах. Обширные количества органики обычно остаются инертными, либо тихо разлагаясь под поверхностью, либо превращаясь в другие вещества. В редких случаях, когда они всё-таки взрываются на поверхности, полученные токсичные газы незначительны и недолговечны, быстро рассеиваясь в верхних слоях атмосферы без вреда.\n\nОднако несколько документов показали, что обитавшая здесь цивилизация пыталась сбивать любые падающие туши. Доклады свидетельствуют, что первый удар спровоцировал всех тианки на орбите, и они ответили массовым нападением. Бесчисленные киты тианки схлынули на планету в мстительном порыве, ярко изображённом в записях империи.\n\nСмесь боеголовок и газов туш сформировал смертоносные объёмы токсичного воздуха, убив почти всех обитателей [from.planet.GetName] и уничтожив любую возможность вернуться в космос."
 mem_scfe_whale_tomb.6.a: "Им просто не повезло."
 mem_scfe_whale_tomb.6.b: "Ещё одна причина охотиться на этих китов."
 mem_scfe_whale_tomb.6.c: "Осталось много залежей газов."
 mem_scfe_whale_tomb.6.d: "Трагическая история."
 mem_scfe_whale_tomb.6.e: "Свежие трупы?"
 mem_scfe_whale_fossil: "Ископаемые киты"
 mem_scfe_whale_fossil_desc: "Планета когда-то использовалась как мировая усыпальница космических китов тианки. В её стратах множество окаменелостей китов, что затрудняет развитие горнодобывающей промышленности."
 mem_scfe_whale_fossil_2: "Трупы китов"
 mem_scfe_whale_fossil_2_desc: "Планета используется как мировая усыпальница космических китов тианки. В её стратах множество трупов китов, что облегчает воскрешение новых тианки из мёртвых."
 mem_scfe_site_whale_lesson: "Урок мировой усыпальницы китов"
 mem_scfe_whale_hunt: "Охота на китов"
 mem_scfe_soul_of_the_art_site: "Душа искусства"
 mem_scfe_soul_of_the_art_site_desc: "Обнаружен необычный мир-могильник, протянувшийся километр за километром, по-видимому, намеренно окрашенной местности. На орбите планеты — множество обломков, вероятно, остатки кораблей древней цивилизации, украшенные причудливыми узорами. Кроме того, от планеты исходят постоянные сигналы, вызывая у нашей команды живой интерес к исследованию."
 mem_scfe_soul_of_the_art.1.name: "Останки флота"
 mem_scfe_soul_of_the_art.1.desc: "Анализ обломков указывает на столкновение двух различных флотов с уникальным дизайном на орбите планеты. Большая часть обломков приписывается тому, что мы назвали §HРасписной флот§!, состоящему из кораблей с замысловатыми красочными узорами и упрощённой архитектурой, свидетельствующей о массовом быстром производстве. Примечательно, что эти суда лишены необходимых удобств для экипажа, таких как столовые и санитарные помещения. В противовес другой флот имеет суровый внешний вид, но внутри содержит замысловатые символические украшения и остатки Зро.\n\nНаличие непропорционально больших помещений внутри позволяет предположить, что они могли служить религиозным функциям, как следует из обнаруженных декоративных артефактов. К сожалению, данные затрудняют дальнейшее прояснение. Поэтому рекомендуется направить разведывательную команду на планету для всестороннего изучения."
 mem_scfe_soul_of_the_art.2.name: "Красочные руины"
 mem_scfe_soul_of_the_art.2.desc: "Наша экспедиция обнаружила на пёстрой планете в основном нетронутые остатки цивилизации, не имеющие следов войны или разрушительных событий. Хаотичные мазки на ландшафте слишком непостоянны, чтобы указывать на какой-либо осознанный узор. Некоторые здания обветшали, но установлено, что их обрушение было результатом длительного воздействия стихий и тектонических сдвигов, а не агрессивного уничтожения.\n\nПо всей поверхности планеты разбросаны обломки судов §HРасписного флота§!. Наш анализ показывает, что большинство погибло из-за внезапных внутренних электрических сбоев, а не от боевых повреждений. В настоящее время нет свидетельств разумной жизни — лишь безмолвные свидетельства роботизированных останков, их некогда яркое покрытие теперь выцветшее и облезлое, разбросанное среди красочных руин и кораблекрушений."
 mem_scfe_soul_of_the_art.3.name: "Расписные останки"
 mem_scfe_soul_of_the_art.3.desc: "Внутри одного из сооружений наша команда обнаружила роботов, раскрашенных в спектр цветов, отражающих поверхность планеты. В отличие от своих собратьев, подвергшихся разрушительному воздействию времени, эти роботы сохранились с минимальными повреждениями.\n\nПохоже, эти роботы прекратили работу посреди хаотичных художественных занятий, разбрасывая краску по стенам или высекая изображения и загадочные символы на стенах зубилами и молотками. Их цепи пришли в негодность без возможности ремонта.\n\nИнтересно, что на первый взгляд беспорядочные расписные узоры на камнях и фасадах зданий теперь понимаются как обширные хранилища информации. Это открытие даёт нам возможность расшифровать и, возможно, воссоздать повествование о гибели этой цивилизации."
 mem_scfe_soul_of_the_art.4.name: "Диссонанс"
 mem_scfe_soul_of_the_art.4.desc: "Наши лингвисты расшифровали настойчивые сигналы планеты как форму музыки, хотя с текстами, лишёнными связного смысла — состоящими в основном из избыточных фраз и диссонансных вариаций высоты тона, что создаёт неприятное слуховое впечатление.\n\nСодержание текстов почитает и ставит под вопрос концепцию души, выражая трепет перед загадочными сущностями из альтернативных измерений. Эта тематическая аналитика позволила нам интерпретировать расписные надписи, украшающие поверхность планеты. Эти надписи, подобно поэзии или другим литературным формам, углубляются в метафизические дилеммы — размышляя о сущности жизни, бренности душ и страхах, вызванных уничтожением. Однако они лишены ритмической структуры и обладают скудной литературной изощрённостью."
 mem_scfe_soul_of_the_art.5.name: "Исследовательский комплекс"
 mem_scfe_soul_of_the_art.5.desc: "Под поверхностью лежит колоссальный исследовательский комплекс. Несмотря на обширные повреждения цепей, некоторые примитивные устройства устояли перед испытанием временем. Анализ наших исследователей предполагает, что эта цивилизация состояла из машин, разделяющих коллективное сознание.\n\nПогружение в остатки их баз данных открыло знания об альтернативном измерении, известном как Завеса, и о колоссальном оружии, способном использовать энергию из этого измерения для нанесения планетарного разрушения. Мы обнаружили записи об атакующих судах, детализирующие оборонительные стратегии машинной цивилизации и их столкновения в бою, а также их исследования Зро.\n\nПримечательно, что подавляющая часть архивных материалов посвящена искусству. Комплекс — сокровищница культурных артефактов: живописи, литературных произведений и музыкальных сочинений различных цивилизаций, наряду с исследованиями, посвящёнными этим художественным выражениям."
 mem_scfe_soul_of_the_art.6.name: "Конец"
 mem_scfe_soul_of_the_art.6.desc: "Из обнаруженных данных была собрана судьба этой планеты. Она стала жертвой псионического оружия, насыщенного Зро, и в конечном итоге была уничтожена.\n\nДо этой катастрофы Гештальтное Сознание поняло, что разрушительная мощь оружия неэффективна против органических существ. Оно выдвинуло гипотезу, что через оценку искусства — занятия, уникально дорогого органикам, — машинные существа, составляющие коллективное сознание, смогут обрести души, тем самым став неуязвимыми для атаки Завесы.\n\nВ погоне за этим иммунитетом цивилизация устремилась к усиленному приобретению и изучению художественных знаний. Они пытались имитировать органическое творчество, пробовали петь, писать и даже украшать поверхность планеты, свои корабли и себя. Несмотря на все усилия, творения Гештальтного Сознания лишились сущности истинного искусства, и оно в конечном итоге было повергнуто оружием, которому пыталось противостоять."
 mem_scfe_soul_of_the_art.6.a: "Это была тщетная попытка..."
 mem_scfe_soul_of_the_art.6.b: "Мы будем помнить их."
 mem_scfe_king_of_underground_city_site: "Король подземного города"
 mem_scfe_king_of_underground_city_site_desc: "При первом наблюдении §Y[From.Planet.GetName]§! выглядит как типичный пустынный мир, необитаемый. Однако наши орбитальные сканеры обнаружили слабые сигналы из-под поверхности и акустические излучения, исходящие из глубины, в частности из подземных пещер. Необходима обычная наземная экспедиция для дальнейшего расследования."
 mem_scfe_king_of_underground_city.1.name: "Подземный город"
 mem_scfe_king_of_underground_city.1.desc: "Раскопочно-транспортное судно было направлено на §Y[From.Planet.GetName]§!. Команда раскопала подземный мегаполис, масштаб которого значительно превосходил прежние оценки. Архитекторы города, хотя и казались разумными, были доподлинно-быстротечными. Они строили и поддерживали значительные подземные сооружения. Предполагается, что они искали убежища от экстремальной пустынной жары поверхности и использовали подземные водоносные горизонты.\n\nНеобходим дальнейший анализ, чтобы установить причины краха цивилизации, особенно учитывая обилие остатков, оставленных после неё."
 mem_scfe_king_of_underground_city.1.a: "Это будет легко."
 mem_scfe_king_of_underground_city.2.name: "Бесконечные записи"
 mem_scfe_king_of_underground_city.2.desc: "Город наполнен документами, что говорит о большом значении, которое его обитатели придавали ведению записей. Несмотря на использование относительно примитивных методов, они поддерживали тщательно систематизированные архивы даже в мельчайших общинных единицах.\n\nЭта склонность к документированию одновременно и удача, и бремя: она представляет исключительную возможность для углублённых исследований и анализа, но также создаёт значительную рабочую нагрузку для нашей экспедиции.\n\nБольшая часть этих архивов хронирует их древнюю историю, проливая свет на социальные структуры и биологические черты обитателей города. Похоже, они назначали своих мудрейших членов в качестве суверенов, чья власть сохранялась до смерти. Исторические свидетельства указывают, что при таком управлении они процветали, в полной мере используя свою трудолюбивую и сплочённую природу."
 mem_scfe_king_of_underground_city.3.name: "Центральный архив"
 mem_scfe_king_of_underground_city.3.desc: "Центральное хранилище, предназначенное для их наиболее критически важных данных — включая жилище суверена и последние административные документы, предшествовавшие падению, — было обнаружено после дешифровки и анализа извлечённых данных. Кроме того, почти полная расшифровка их языка привела наших исследователей к поразительному открытию: §Y[From.Planet.GetName]§! когда-то была арктическим миром. Подземный город был построен на геотермальных источниках как убежище от ледяной поверхности.\n\nКатастрофические климатические сдвиги, вызванные планетарными аномалиями, постепенно спровоцировали повышение температуры, кульминацией которого стало опустынивание всей планеты — событие, вероятно, и приведшее к вымиранию обитателей.\n\nДокумент из центрального архива указывает, что обитатели города осознавали острую восприимчивость своего вида даже к незначительным климатическим колебаниям. В нём также говорится, что их призывали объединить ресурсы и следовать стратегии, предложенной самым почитаемым правителем в их истории, в попытке противостоять надвигающейся климатической катастрофе."
 mem_scfe_king_of_underground_city.4.name: "Трон"
 mem_scfe_king_of_underground_city.4.desc: "По мере приближения нашей исследовательской группы к дворцу исторические записи, обнаруженные на пути, становятся всё мрачнее. Один документ содержит список погибших — жертв несчастного случая, произошедшего при отключении геотермального источника. Другой повествует о указе, предписывающем объединить два сектора из-за уничтожения населения одного из них.\n\nВ конце пути был обнаружен трон. Как выяснилось, трон был терраформирующим аппаратом — открытие стало ещё более поразительным, учитывая, что эта цивилизация так и не освоила космические путешествия.\n\nИсследователям удалось активировать личное записывающее устройство короля, которое трогательно воспроизвело его последнее послание, полное раскаяния. Король разработал блестящее решение их проблемы, но к тому времени почти все его подданные уже погибли."
 mem_scfe_king_of_underground_city.4.a: "Активировать устройство."
 mem_scfe_king_of_underground_city.4.b: "Изъять устройство."
 mem_scfe_king_of_underground_city.4.c: "Воздать дань уважения древнему королю."
 mem_scfe_ancient_terraforming_technology: "Древняя технология терраформирования"
 mem_scfe_tomb_of_the_king: "Гробница короля"
 mem_scfe_when_the_world_sings_site: "Когда мир поёт"
 mem_scfe_when_the_world_sings_site_desc: "Загадочные звуки, похожие на музыку, пронизывают §Y[From.Planet.GetName]§!, разносясь из каждого уголка планеты."
 mem_scfe_when_the_world_sings.1.name: "Когда мир поёт"
 mem_scfe_when_the_world_sings.1.desc: "Что-то странное обнаружилось на §Y[From.Planet.GetName]§!. Хотя орбитальные наблюдения не выявили физических аномалий, был уловлен постоянный звук с чёткими интервалами и высотой тона, слышимый на всей планете.\n\nЭта планета, кажется, пропитана мелодичными звуками — или, по крайней мере, звуковыми последовательностями, напоминающими музыку. Слушатели описывают их как вызывающие ощущение покоя и исключительно приятные."
 mem_scfe_when_the_world_sings.2.name: "Источник музыки"
 mem_scfe_when_the_world_sings.2.desc: "Источник музыки прослежен до руин, рассеянных по планете. Эти сооружения населены группами живых существ. Эти организмы производят звук с помощью органных структур, аналогичных голосовым связкам, в результате чего планетарную симфонию исполняет хор поющих беспозвоночных!\n\nНеясно, являются ли эти существа изначальными обитателями сооружений или, если нет, что случилось с прежними."
 mem_scfe_when_the_world_sings.3.name: "Планетарный исследовательский проект"
 mem_scfe_when_the_world_sings.3.desc: "Найденные улики указывают на то, что §Y[From.Planet.GetName]§! служила площадкой для амбициозного планетарного исследовательского проекта. Анализ данных из различных руин пролил свет на цели строителей руин, раскрыв их продвинутые возможности в генетической манипуляции и науках о мозге. Похоже, эти руины когда-то были центрами, посвящёнными этой сложной области исследований.\n\nФрагменты информации, которые нам удалось расшифровать, указывают, что их научные усилия были направлены на возвышенные цели Вознесения и Трансценденции. Повторяющейся темой в их работах является понятие «Цветения» — концепция, завладевшая их учёными. Нынешнее состояние руин и самой планеты не даёт однозначного ответа, удалось ли им воплотить плоды своих исследований.\n\nЗагадка этого «Цветения» станет центром наших дальнейших расследований."
 mem_scfe_when_the_world_sings.4.name: "Цветение"
 mem_scfe_when_the_world_sings.4.desc: "Последующий анализ информации, извлечённой из исследовательских аванпостов, принёс значительное открытие: загадочный проект Цветения. Архитекторы руин были поглощены созданием искусственного гештальтного сознания, которое они представляли как зенит своего эволюционного пути. Они полагали, что такой единый коллективный интеллект устранит социальные конфликты и откроет эпоху беспрецедентного просветления. Их методология опиралась на выращивание нейронных связей посредством генетической терапии, связи, которые должны были разделяться среди населения.\n\nПохоже, их теоретические разработки увенчались успехом: проект Цветения был реализован путём насыщения атмосферы ретровирусом, предназначенным для распространения генетической терапии. Хотя вирус впоследствии вымер, отсутствие любых других разумных форм жизни указывает на то, что он распространился по всему их виду. Теория гласит, что мелодичные организмы, обитающие в руинах, могут быть преобразованными остатками строителей руин."
 mem_scfe_when_the_world_sings.5.name: "Гештальтное сознание"
 mem_scfe_when_the_world_sings.5.desc: "Наше расширенное исследование вокализирующихся сущностей подтвердило, что строители руин достигли формирования гештальтного сознания, хотя и частичного. «Пение» на самом деле является коллективным вокальным проявлением их взаимосвязанных нейронных состояний — идеально синхронизированным и указывающим на разум-улей. По нашим наблюдениям, проект Цветения достиг своей цели.\n\nОднако более глубокое изучение их нейронных реакций выявляет тревожную реальность. Это коллективное сознание выражает единственное, подавляющее ощущение: боль. В отсутствие прародительского ретровируса или исходного вида сложно определить, произошёл ли этот негативный исход во время или после внедрения проекта. Тем не менее звуки, издаваемые этими существами, не являются возвышенными выражениями:\n\n§RЭто единый, гармоничный крик.§!"
 mem_scfe_when_the_world_sings.5.a: "Что сделано, то сделано, бессмысленно зацикливаться на этом."
 mem_scfe_when_the_world_sings.5.b: "Чему мы можем научиться?"
 mem_scfe_when_the_world_sings.5.c: "Мы будем скорбеть и чтить их."
 mem_scfe_singing_planet: "Свистящий мир"
 mem_scfe_singing_planet_desc: "Этот мир очарован гармоничной мелодией. Хотя некоторые находят музыку мрачной или тревожной, невозможно не быть заворожённым бесконечной мелодией."
 mem_scfe_screaming_planet: "Воющий мир"
 mem_scfe_screaming_planet_desc: "То, что произошло на этой планете, должно стать уроком для всех нас. Ничто не может спасти эти организмы, некогда многообещающий вид, которые теперь живут в бесконечной агонии, издавая единый, сплочённый крик."
