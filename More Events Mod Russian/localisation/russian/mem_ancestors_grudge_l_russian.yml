 mem_ancestors_grudge_zrawn_catchphrase:0 "Я сделаю всё необходимое для достижения своей цели, и не позволю ничему и никому встать у меня на пути."
 mem_ancestors_grudge_zrawn_backstory:0 "Инопланетный офицер с ярко-синей кожей, красными глазами и угловатым лицом, гранд-адмирал Зроун известен как блестящий и безжалостный стратег. Он считает, что для достижения победы в войне нужно знать своего врага. Поэтому Зроун посвящает себя пониманию философии, искусства и культуры своих противников."
