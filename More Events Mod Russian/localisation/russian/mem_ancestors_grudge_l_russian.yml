 mem_ancestors_grudge_dranir_warprock_desc_details: "Эти камни использовались для питания различных военных машин и позволяют крысолюдам быстро перемещать силы."
 tech_mem_ancestors_grudge_dranir_spacelife:0 "Планетарный Гало"
 tech_mem_ancestors_grudge_dranir_spacelife_desc:0 "Массивные сооружения на близкой орбите к планете, поддерживающие местную инфраструктуру и логистику."
 mem_ancestors_grudge_dranir.2.name:0 "Наследие $mem_ancestors_grudge_dranir$"
 mem_ancestors_grudge_dranir.2.desc:0 "С древних времён наши легенды рассказывают историю о $mem_ancestors_grudge_dranir$, величайшем Рунном Кузнеце, когда-либо жившем. Даже звёзды на небе носят это имя в его честь.\n\nОдна из них — Зал $mem_ancestors_grudge_dranir$. Хотя она не самая яркая звезда на небе и не является частью важного созвездия, это место легенд, считающееся его последним пристанищем и достойной целью исследования для восстановления нашей империи."
 mem_ancestors_grudge_dranir.2.a:0 "Мы должны туда поехать!"
 mem_ancestors_grudge_dranir.2.a.tt:0 "Скорость восстановления: §R-35%§!"
 mem_ancestors_grudge_dranir.2.b:0 "Нет крепости величе [capital_scope.GetName]."
 mem_ancestors_grudge_dranir.2.b.tt:0 "Скорость восстановления: §G+25%§!"
 mem_ancestors_grudge_dranir_hall.1.name:0 "Посетить Зал $mem_ancestors_grudge_dranir$"
 mem_ancestors_grudge_dranir_hall.1.desc:0 "Посетить легендарную звезду §YЗал $mem_ancestors_grudge_dranir$§!."
 mem_ancestors_grudge_dranir.3.name:0 "Зал $mem_ancestors_grudge_dranir$"
 mem_ancestors_grudge_dranir.3.desc:0 "Когда наши первые сканеры дальнего действия указали на обитаемые миры, наши исследователи не ожидали того, что они нашли. По достижении системы наши исследователи обнаружили массивную структуру на орбите одинокой планеты. Её поверхность покрыта обломками разрушенной мегаструктуры. Мы должны исследовать её как можно скорее."
 mem_ancestors_grudge_dranir_hall.2.name:0 "Обследовать Покой $mem_ancestors_grudge_dranir$"
 mem_ancestors_grudge_dranir_hall.2.desc:0 "Что это за место?"
 mem_ancestors_grudge_dranir.4.name:0 "Прошлое [Root.GetName]"
 mem_ancestors_grudge_dranir.4.desc:0 "Сильно поврежденное гигантское кольцо вращается вокруг планеты, покрытой густыми облаками пыли и токсичных газов. Высокие показатели радиации сообщаются нашими зондами.\n\nКажется, что в древние времена местное население жило глубоко под землёй. По той или иной причине они больше не живут здесь, и Кольцо пришло в упадок."
 mem_ancestors_grudge_dranir.4.a:0 "Нам нужно узнать больше."
 mem_ancestors_grudge_dranir.4.b:0 "Бывшая крепость? Вернём её!"
 mem_ancestors_grudge_dranir.40.name:0 "Раскопанные проходы"
 mem_ancestors_grudge_dranir.40.desc:0 "Последняя зона раскопок хранила необычайную тайну. Наша команда нашла гигантские ворота в подземную сеть. В тот момент, когда мы открыли ворота, миллионы крыс размером с блоргов выскочили из них. Наша экспедиция была перебита на месте. Они выливаются в растущих количествах и готовятся к полномасштабному наступлению на нашу колонию."
 mem_ancestors_grudge_dranir.40.a:0 "Оборонительные позиции!"
 mem_ancestors_grudge_dranir.45.name:0 "13-я Подземная Империя"
 mem_ancestors_grudge_dranir.45.desc:0 "Привет-привет в гнездо-дом, [owner_main_species.GetThingThing]. Мы Под-Империя, да-да, коготь-скрытые и грызёт-ожидание под миром. Вы треск-сломали нашу клетку, освободили-освободили наш мех и клык… хорошо-хорошо служение.\n\nНо теперь-теперь ваша цель израсходована-ушла, бесполезный [owner_main_species.GetThingThing]. [MemAncestorsGrudgeEatScrap]"
 mem_ancestors_grudge_eat_eat:0 "Мы едим-едим вас. Мы пир-пир на плоти и костях, да-да."
 mem_ancestors_grudge_scrap_scrap:0 "Мы разбираем-разбираем вас. Мы чиним-чиним блестящие детали, да-да."
 mem_ancestors_grudge_dranir.45.a:0 "Мы пришли с миром."
 mem_ancestors_grudge_dranir.45.a.response:0 "Нет мира для чужеродных-штуковин. Только пища-плоть. Мы едим-пируем."
 mem_ancestors_grudge_dranir.45.b:0 "Что это за зелёное свечение?"
 mem_ancestors_grudge_dranir.45.b.response:0 "Самое драгоценное-драгоценное из всех вещей, да-да, называемое Варполит. Его зелёный пульс-бит нашего общества-жизни. Его применения безграничны, бесчисленны. Как сердце-ядро вечного огня оно горит-горит. Даже крошечная щепка-осколок всё ещё даёт-хранит силу вечно-вечно, питая наши двигатели, позволяя многим-многим устройствам бегать и шарить-ходить самим."
 mem_ancestors_grudge_dranir.45.c:0 "Что случилось с теми, кто жил здесь?"
 mem_ancestors_grudge_dranir.45.c.response:0 "Съедены-сожраны мы были, да-да."
 mem_ancestors_grudge_dranir.45.e:0 "Ксеномразь."
 mem_ancestors_grudge_dranir.45.f:0 "Активировать протоколы уничтожения."
 mem_ancestors_grudge_dranir.45.g:0 "Пища."
 mem_ancestors_grudge_dranir.55.name:0 "Взрыв варполита"
 mem_ancestors_grudge_dranir.55.desc:0 "Одно из устройств крысолюдов взорвалось в их собственных рядах. Солдаты сообщали о массивном зелёном взрыве, за которым последовало бегство тысяч рабов-крысолюдов с поля боя. Это точно отбросит их назад."
 mem_ancestors_grudge_dranir.55.a:0 "Это нормально?"
 mem_ancestors_grudge_dranir.60.name:0 "Волна рабов-крысолюдов"
 mem_ancestors_grudge_dranir.60.desc:0 "Целые секции местной обороны сообщают о массовых армиях, полностью состоящих из рабов-крысолюдов. Эти силы используются исключительно для траты наших боеприпасов и отбрасывания нас назад. Ранние столкновения сообщают о потерях противника в миллионах."
 mem_ancestors_grudge_dranir.60.a:0 "Мерзкие паразиты."
 mem_ancestors_grudge_dranir.65.name:0 "Вредители — Уничтожены"
 mem_ancestors_grudge_dranir.65.desc:0 "Наземные силы по всей планете сообщают, что кажущийся бесконечным поток крысолюдов наконец прекратился. Некоторые генералы уже объявили конец Потока Мерзости, но невозможно быть абсолютно уверенным в этом. Либо они сдались и спрятались глубже под землёй, либо мы действительно преуспели в устранении этой угрозы. Только время покажет."
 mem_ancestors_grudge_dranir.66.name:0 "Вредители — Космические"
 mem_ancestors_grudge_dranir.66.desc:0 "В ходе этой кампании крысолюды захватили несколько космических кораблей и теперь фактически заявляют о своём владении планетой и её системой. Поскольку все линии снабжения перерезаны кораблями крысолюдов, наши местные силы больше не могли удерживать свои позиции. Мы должны быть готовы вступить с ними в бой в космосе."
 mem_ancestors_grudge_dranir.66.a:0 "Они теперь летают?"
 Verminflood:0 "Галактический Поток Мерзости"
 mem_ancestors_grudge_dranir.70.name:0 "$tech_mem_ancestors_grudge_dranir_spacelife$ Восстановлен"
 mem_ancestors_grudge_dranir.70.desc:0 "С помощью собранного оборудования крысолюдов мы смогли восстановить $tech_mem_ancestors_grudge_dranir_spacelife$. Он снова вращается вокруг планеты и поддерживает местную торговлю."
 mem_ancestors_grudge_dranir.70.tt:0 "Отремонтировано: §G$tech_mem_ancestors_grudge_dranir_spacelife$§!"
