 mem_ancestors_grudge_hammer:0 "Молот Дранира"
 mem_ancestors_grudge_hammer_desc_short:0 "Молот с двигателем, работающий с точностью, говорят, он убил дюжину вазуранских воинов."
 mem_ancestors_grudge_hammer_desc_details:0 "Передаётся от каждого мастера его преемнику, чтобы продолжить песнь наковальни."
 mem_ancestors_grudge_grudgebook:0 "Величайшая из обид"
 mem_ancestors_grudge_grudgebook_desc_short:0 "Длинный детальный список обид и ужасных деяний, которые вазуране причинили нам."
 mem_ancestors_grudge_grudgebook_desc_details:0 "С окончанием ужасной вазуранской угрозы эта обида может считаться 'оплаченной'."
 d_mem_ancestors_grudge_boulder:0 "Статуя неизвестного воина"
 d_mem_ancestors_grudge_boulder_desc:0 "Мемориал павшим воинам древности. Никто не осмеливается прикоснуться к нему."
 d_mem_ancestors_grudge_boulder_park:0 "Мемориал неизвестного воина"
 d_mem_ancestors_grudge_boulder_park_desc:0 "То, что было одиноким памятником в прошлом, теперь расширено пристроенным музеем и идиллическим парком, окружающим его. Посетители со всех концов собираются здесь, чтобы отдать дань уважения павшим воинам древности."
 d_mem_ancestors_grudge_boulder_hive:0 "Гигантская груда металлолома"
 d_mem_ancestors_grudge_boulder_hive_desc:0 "Огромные балки металла, скрученные и разорванные в гигантский беспорядок."
 d_mem_ancestors_grudge_boulder_park_hive:0 "Великий клад"
 d_mem_ancestors_grudge_boulder_park_hive_desc:0 "Разнообразная коллекция из лучших артефактов и реликвий, выставленных для нашего удовольствия."
 d_mem_ancestors_grudge_city_ruins:0 "£blocker£ Разрушенные города"
 d_mem_ancestors_grudge_city_ruins_desc:0 "Руины и всё, что осталось от непрерывных бомбардировок."
 d_mem_ancestors_grudge_bomb_crater:0 "£blocker£ Бомбовый кратер"
 d_mem_ancestors_grudge_bomb_crater_desc:0 "Раны самого мира и напоминание о прошлом."
 d_mem_ancestors_grudge_ruined_district:0 "£blocker£ Разрушенный район"
 d_mem_ancestors_grudge_ruined_district_desc:0 "Целые участки жилых, промышленных и коммерческих районов, превращённые в руины."
 d_mem_ancestors_grudge_ruined_stasis:0 "Замороженные предки"
 d_mem_ancestors_grudge_ruined_stasis_desc:0 "Многие тысячи наших сородичей, хранящиеся в приостановленной анимации внутри гигантского гражданского оборонительного убежища, обнаруженного под руинами этого разрушенного мира."
 d_mem_ancestors_grudge_ruined_stasis_robots:0 "Захороненные единицы"
 d_mem_ancestors_grudge_ruined_stasis_robots_desc:0 "Многие тысячи на тот момент свежепроизведённых единиц нашего дизайна, хранящихся в уцелевшей секции древнего производственного завода. Эти единицы никогда не были активированы до падения и ещё не получили импринт личностных директив."
 d_mem_ancestors_grudge_feral_drones:0 "Дикие дроны"
 d_mem_ancestors_grudge_feral_drones_desc:0 "Жилище тысяч диких дронов под руинами предшественников. Они не являются частью нашего улья, но могут быть приведены в строй."
 policy_mem_ancestors_grudge_is_hoarder_policy:0 "Накопительство"
 policy_mem_ancestors_grudge_is_hoarder_policy_desc:0 "Коллекционирование древних артефактов — это искусство, и каждое искусство имеет свои формы."
 mem_ancestors_grudge_is_hoarder_policy_unity_name:0 "£unity£ $unity$"
