 leader_trait_legendary_mem_ancestors_grudge_relicowner:0 "Хранитель реликвий [MemGetRarity]"
 leader_trait_legendary_mem_ancestors_grudge_relicowner_desc:0 "Этому лидеру был дарован рунный артефакт. Одна из величайших честей, которую может получить кто-либо на нашей службе."
 leader_trait_legendary_mem_ancestors_grudge_relicowner_tt:0 "§LЭтот лидер унаследует ещё более сильные модификаторы данной реликвии.\n\nКаждый лидер может обладать только одной Рунной реликвией!§!"
