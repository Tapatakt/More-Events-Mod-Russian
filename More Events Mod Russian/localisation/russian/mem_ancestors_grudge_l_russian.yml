 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_one_desc:0 "Влево или вправо, руна знает только вверх."
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_two:0 "Руна Проницательности"
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_two_desc:0 "Сквозь туман лжи руна видит."
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_three:0 "Руна Полёта"
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_three_desc:0 "В небе руна сияет."
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_four:0 "Руна Мощи"
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_four_desc:0 "В космосе руна поражает."
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_scaling:0 "§LМожно улучшить с помощью ['concept_mem_ancestors_grudge_rune_relics']§!\n\n§LДополнительная производительность: [this.mem_ancestors_grudge_activated_rune_ruler_strength]§!"
 leader_trait_legendary_mem_ancestors_grudge_regular_machine_nexus_one:0 "Руна Обряда"
 leader_trait_legendary_mem_ancestors_grudge_regular_machine_nexus_one_desc:0 "Среди чужой истории эта руна обитает."
 leader_trait_legendary_mem_ancestors_grudge_regular_machine_nexus_two:0 "Руна Аппетита"
 leader_trait_legendary_mem_ancestors_grudge_regular_machine_nexus_two_desc:0 "Собирательство странностей — бремя этой руны."
 leader_trait_legendary_mem_ancestors_grudge_regular_machine_nexus_three:0 "Руна Зрения"
 leader_trait_legendary_mem_ancestors_grudge_regular_machine_nexus_three_desc:0 "Глубоко в руинах эта руна светится."
 leader_trait_legendary_mem_ancestors_grudge_machine_nexus_scaling_not:0 "§RНельзя§!§L улучшить с помощью ['concept_mem_ancestors_grudge_rune_relics']§!"
 leader_trait_mem_ancestors_grudge_thrawn:0 "Великий архитектор"
 leader_trait_mem_ancestors_grudge_thrawn_desc:0 "Гениальный разрушитель, навязывающий полное подчинение своим подчинённым."
 leader_trait_mem_ancestors_grudge_thrawn_tt:0 "$TABBED_NEW_LINE$Увеличивается §YРеликвиями§! и §YОбразцами§!"
 building_mem_ancestors_grudge_ruins:0 "Руины"
 building_mem_ancestors_grudge_ruins_desc:0 "Когда-то великие здания, теперь лишь обломки, которые нам предстоит расчистить."
 building_mem_ancestors_grudge_ruins_effect:0 "\n§LУлучшите, чтобы убрать!§!\n"
 mem_ancestors_grudge_boosts_repairs_effect:0 "§LУдаление добавляет прогресса к нашим усилиям по восстановлению!§!\n"
 building_mem_ancestors_grudge_ruins_1:0 "Очищенные руины"
 building_mem_ancestors_grudge_ruins_1_desc:0 "Камень за камнем этот мир будет перестроен."
 building_mem_ancestors_grudge_forge_0:0 "Разрушенная Реликвийная Кузня"
 building_mem_ancestors_grudge_forge_0_desc:0 "Остатки когда-то великой Реликвийной Кузни."
 building_mem_ancestors_grudge_forge_1:0 "Залатанная Реликвийная Кузня"
 building_mem_ancestors_grudge_forge_1_desc:0 "Едва функционирующая кузня. Достаточно для того, чтобы некоторые из нас работали там."
 building_mem_ancestors_grudge_forge_1_tt:0 "£trigger_no£ Нам нужен дополнительный прогресс в $situation_mem_ancestors_grudge_forge_repairs_type$"
 building_mem_ancestors_grudge_forge_2:0 "Восстановленная Реликвийная Кузня"
 building_mem_ancestors_grudge_forge_2_desc:0 "Кузня была восстановлена, но всё ещё не работает на 100% мощности."
 building_mem_ancestors_grudge_forge_3:0 "Улучшенная Реликвийная Кузня"
 building_mem_ancestors_grudge_forge_3_desc:0 "Наш непрерывный прогресс в восстановлении планеты к её былому величию привёл к новым высотам."
 building_mem_ancestors_grudge_forge_4:0 "Великая Реликвийная Кузня"
 building_mem_ancestors_grudge_forge_4_desc:0 "Мы полностью восстановили этот мир и вместе с ним Реликвийную Кузню."
 building_mem_ancestors_grudge_forge_effect_designation:0 "§YРеликвийная Кузня§! будет переключать рабочие места с потребительских товаров (или единства) на производство сплавов в зависимости от назначения и добавлять дополнительные рабочие места за £district£ район\n\n"
 building_mem_ancestors_grudge_forge_effect_zones:0 "Открывает ['concept_mem_ancestors_zones']\n"
 building_mem_ancestors_grudge_forge_terraform_tt:0 "Превращает планету в §YЭкуменополис§!\n"
 building_mem_ancestors_grudge_forge_empireeffect_tt:0 "§LПредоставляет эффекты на уровне империи, основанные на ['concept_mem_ancestors_grudge_artifact_intensity'] и ['concept_mem_ancestors_grudge_rune_intensity']§!"
 building_mem_ancestors_grudge_robot_factory:0 "Древний големный комплекс"
 building_mem_ancestors_grudge_robot_factory_desc:0 "Прикладная големантия помогает нам строить новое поколение роботов."
 building_mem_ancestors_grudge_robot_factory_tt:0 "Эффективность этого сборочного цеха снижается по мере роста населения."
 building_mem_ancestors_grudge_hoarder_depot:0 "Хранилище Блеска"
 building_mem_ancestors_grudge_hoarder_depot_desc:0 "Гигантское хранилище. Некоторые даже сказали бы, что величайшее хранилище, когда-либо построенное. Его истинное назначение — хранить все драгоценные реликвии, собранные его владельцем."
 building_mem_ancestors_grudge_hoarder_depot_effect_desc:0 "Модификатор основан на политике §Y$policy_mem_ancestors_grudge_is_hoarder_policy$§!\n\nУвеличивается §YРеликвиями§! и §YОбразцами§!"
 building_mem_ancestors_grudge_living_metal_factory:0 "Очистительный завод живых сплавов"
 building_mem_ancestors_grudge_living_metal_factory_desc:0 "Продвинутый комплекс для дальнейшего улучшения искусства рунной ковки. Покрывая обычные материалы $sr_living_metal$, мы можем усилить наше существующее производство и закалить металлы."
 building_mem_ancestors_grudge_living_metal_factory_tt:0 "§G+1%§! $BONUS_WORKFORCE_FOR$ §Y$job_mem_ancestors_grudge_runesmith_plural$§! $mem_ancestors_grudge_pop_group_unit$ §Y$job_mem_ancestors_grudge_runesmith_plural$§!"
 r_mem_ancestors_grudge_pauldron:0 "Рунные наплечники"
 r_mem_ancestors_grudge_pauldron_desc:0 "Шедевр, созданный нашими кузнецами. Всё мастерство высочайшего качества."
 r_mem_ancestors_grudge_ring:0 "Рунное кольцо"
 r_mem_ancestors_grudge_ring_desc:0 "Шедевр, созданный нашими кузнецами. Всё мастерство высочайшего качества."
 r_mem_ancestors_grudge_sword:0 "Рунный меч"
 r_mem_ancestors_grudge_sword_desc:0 "Шедевр, созданный нашими кузнецами. Всё мастерство высочайшего качества."
 r_mem_ancestors_grudge_anvil:0 "Древняя рунная наковальня"
 r_mem_ancestors_grudge_anvil_desc:0 "Рунная наковальня, окружённая легендами и созданная из редкого материала, извлечённого из упавшего вазуранского корабля древним мастером-кузнецом артефактов, возможно, даже самим Драниром. Веками считалось, что она потеряна навсегда, её судьба была запечатана с падением старого мира. Но, как оказалось, мудрость и предусмотрительность предков была непревзойдена. Они сохранили наковальню, защищая её от разрушения до самого конца."
 r_mem_ancestors_grudge_anvil_effect_tt:0 "Увеличивается с каждой использованной ['concept_mem_ancestors_grudge_rune_relics']. В настоящее время:\n"
 r_mem_ancestors_grudge_anvil_effect_tt_active:0 "§RМастер-кузнец артефактов поклялся никогда больше не поднимать молот на свою наковальню!§!"
 r_mem_ancestors_grudge_modern_art:0 "Рунический куб"
 r_mem_ancestors_grudge_modern_art_desc:0 "Это интересное произведение искусства было создано единственным кузнецом артефактов. Покрытое руническими надписями, но лишённое какого-либо практического применения, это довольно странный артефакт..."
 r_mem_ancestors_grudge_cube_effect_tt_passive:0 "Качество: §dУникальное§!\nЧистота: §lОсобая§!"
 r_mem_ancestors_grudge_cube_effect_tt_active:0 "Преобразовать все ваши £minor_artifacts£ §Y$minor_artifacts$§! в £unity£ §Y$unity$§!"
