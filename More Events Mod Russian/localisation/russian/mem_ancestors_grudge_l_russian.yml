 mem_ancestors_grudge_anvil_site:0 "Сопротивление"
 mem_ancestors_grudge_anvil_site_desc:0 "Один из многих бункеров, построенных в спешке в преддверии надвигающейся осады в последние дни войны. Это один из крупнейших, что мы нашли до сих пор. Вокруг входа есть признаки интенсивных боёв."
 mem_ancestors_grudge.300.name:0 "Смерть и разрушение"
 mem_ancestors_grudge.300.desc:0 "Наша команда раскопок отправилась вперёд, ожидая обнаружить запечатанное хранилище с воротами, плотно закрытыми и защитными рунами, всё ещё светящимися на баррикадах.\n\nВместо этого они нашли ворота, расколотые и разрушенные. Коридоры за ними были устланы трупами, многие из которых принадлежали воинам нашего рода, но также их врагам. Вдвое превышающие наш рост, их полупрозрачные экзоскелеты вызывают чувство отвращения и ненависти в наших людях, и нет сомнений, что мы взглянули на наших заклятых врагов.\n\nТем не менее, мы должны двигаться вперёд. Ответы ждут впереди, и мы не должны поворачивать назад. Давайте действовать с осторожностью."
 mem_ancestors_grudge.300.a:0 "Продолжить."
 mem_ancestors_grudge.305.desc:0 "Коридоры тянутся бесконечно перед нами. Каждый раз, когда наши команды поворачивают за угол, перед ними оказывается ещё один коридор, идентичный предыдущему. Воздух густ от тревоги, и тишина нарушается только хрустом ботинок по древним костям.\n\nСкелеты усеивают путь. Бесчисленные мёртвые, чьи истории остались невысказанными, и хотя мы находим то, что кажется старыми припасами и паек, кажется мало что-то ценное. Ни камер, ни признаков жизни, только этот лабиринт смерти и разложения.\n\nТем не менее, команда остаётся мотивированной маршировать дальше. Какие бы секреты ни скрывали эти бесконечные залы, они будут раскрыты. Надеемся, что они не присоединятся к мёртвым, прежде чем найдут правду..."
 mem_ancestors_grudge.305.a:0 "Тревожно."
 mem_ancestors_grudge.310.desc:0 "После того, что казалось годами блуждания по этим осквернённым, бесконечным коридорам, команда наконец достигла великого зала в сердце комплекса. Зал лежал в полном разрушении, его когда-то могучая каменная кладка разбита, его величие низвергнуто жестокой битвой, которая там произошла. Истина о том, что случилось, теперь была ясна. Это хранилище было взломано заклятыми врагами наших предков, вазуранами, трижды проклятыми. Очевидно, они попытались вторгнуться, но наши предки сражались до последнего, заставив их отступить и вместо этого прибегнуть к разрушительной орбитальной бомбардировке.\n\nВ центре зала покоится один скелет нашего рода. Вокруг него лежат останки дюжины вазуран, их панцири треснуты, а головы разбиты силой неуклонной ярости. Этот одинокий воин, должно быть, сражался до последнего вздоха, его молот забрал много жизней, прежде чем он пал.\n\nДаже когда вся надежда была потеряна, он сражался, непокорный до самого конца. Пусть его подвиги не будут забыты, ибо он заслужил место в песнях нашего рода."
 mem_ancestors_grudge.310.desc_robots:0 "После того, что казалось годами блуждания по этим осквернённым, бесконечным коридорам, команда наконец достигла великого зала в сердце комплекса. Зал лежал в полном разрушении, его когда-то могучая каменная кладка разбита, его величие низвергнуто жестокой битвой, которая там произошла. Истина о том, что случилось, теперь была ясна. Это хранилище было взломано заклятыми врагами наших создателей, вазуранами, трижды проклятыми. Очевидно, они попытались вторгнуться, но наш род сражался до последнего, заставив их отступить и вместо этого прибегнуть к разрушительной орбитальной бомбардировке.\n\nВ центре зала покоится один скелет наших создателей. Вокруг него лежат останки дюжины вазуран, их панцири треснуты, а головы разбиты силой неуклонной ярости. Этот одинокий воин, должно быть, сражался до последнего вздоха, его молот забрал много жизней, прежде чем он пал.\n\nДаже когда вся надежда была потеряна, он сражался, непокорный до самого конца. Пусть его подвиги не будут забыты, ибо он заслужил место в песнях нашего рода."
 mem_ancestors_grudge.310.a:0 "Замечательно."
 mem_ancestors_grudge.315.desc:0 "Одинокий воин, который совершил свой последний подвиг в великом зале, был последним Мастером-кузнецом артефактов, учеником самого Дранира, легендарного кузнеца артефактов, известного только из древних текстов. В зале стоит его знаменитая рунная наковальня. Его молот лежит рядом с ним, инструмент его ремесла, превратившийся в оружие насилия в защиту своего рода. По древней традиции такой акт означал, что кузнец поклялся больше никогда не ковать.\n\nХотя его имя может быть потеряно во времени, его деяния никогда не будут забыты. В смерти он остался верен своей клятве, сразив дюжину вазуран, прежде чем его собственная жизнь угасла. Мы исполним его последний обряд, как подобает герою. Мастер-кузнец артефактов будет похоронен, его клятва унесена в вечность. Его молот будет передан его преемнику, когда достойный кузнец возвысится. Наковальня останется здесь как безмолвное напоминание о прошлом."
 mem_ancestors_grudge.315.a:0 "Так и сделать."
 mem_ancestors_grudge_anvil_site_hive:0 "Последний маяк"
 mem_ancestors_grudge_anvil_site_hive_desc:0 "Последний сигнал привёл нас к огромному бункерному комплексу. Похоже, маяк проник глубоко в структуру, так как мы чувствуем его присутствие далеко внизу."
 mem_ancestors_grudge.320.name:0 "Сломанные ворота"
 mem_ancestors_grudge.320.desc:0 "Наши раскопочные дроны сумели расчистить ранее захороненный вход в бункерный комплекс. Очевидно, ворота были взломаны и оставлены треснутыми и разрушенными. Коридоры за ними были устланы древними останками, многие из них предшественники, строители этого места. Другие были экзоскелетами, оснащёнными технологией, связывающей их с маяками. В дополнение к ним мы также нашли многочисленные останки дронов нашего вида, одетых в доспехи схожего производства. Мы находили других раньше, даже живых особей, обитающих в руинах как дикие, но никогда не делали связи. Если наши выводы верны, мы были не более чем дикими зверями, используемыми как инструменты завоевания. Учитывая, как маяки притягивают нас, они могли быть просто средствами направления нас на цели.\n\nТем не менее мы движемся дальше. Если мы должны были туда пойти, там что-то ценное можно ожидать."
 mem_ancestors_grudge.320.a:0 "Продолжить."
 mem_ancestors_grudge.325.name:0 "Налево и направо"
 mem_ancestors_grudge.325.desc:0 "Коридоры тянутся бесконечно перед нами. Каждый раз, когда наши дроны поворачивают за угол, перед ними оказывается ещё один коридор, идентичный предыдущему. Воздух густ от тревоги, и тишина нарушается только хрустом древних костей и обломков под ними.\n\nСкелеты усеивают путь. Бесчисленные мёртвые, чьи истории остались невысказанными, и хотя мы находим то, что кажется старыми припасами и паек, кажется мало что-то ценное. Ни камер, ни признаков жизни, только этот лабиринт смерти и разложения.\n\nТем не менее, наши дроны маршируют дальше, следуя зову маяка. Какие бы секреты ни скрывали эти бесконечные залы, они будут раскрыты. И вместе с ними оставленное сокровище..."
 mem_ancestors_grudge.325.a:0 "Это должно быть где-то..."
 mem_ancestors_grudge.330.name:0 "В конце туннеля"
 mem_ancestors_grudge.330.desc:0 "После того, что казалось годами блуждания по этим осквернённым, бесконечным коридорам, наши дроны наконец достигли великого зала в сердце комплекса. Зал лежал в полном разрушении, его когда-то могучая каменная кладка разбита, его величие низвергнуто жестокой битвой, которая там произошла. Бесчисленные из нашего вида и многие из их хозяев лежали убитыми там, где они когда-то пали, окружая труп одного предшественника, который всё ещё держит свой могучий молот в руке, позади него — потрёпанная и сломанная наковальня, наполовину сросшаяся с маяком, который врезался в неё. Судя по всем отсутствующим необходимостям, это место не было кузницей. Так почему оно было здесь?"
 mem_ancestors_grudge.330.a:0 "Там должно быть что-то!"
 mem_ancestors_grudge.335.name:0 "Рунический куб"
 mem_ancestors_grudge.335.desc:0 "Деактивация маяка наконец позволила нам сосредоточить усилия на том, что было действительно важно: Забытые сокровища в темноте!\n\nНедалеко за сломанной наковальней наши дроны нашли тайник с писаниями предшественников, в основном религиозные тексты. Некоторые из них, однако, были гораздо более практичны. Написанные мастером-кузнецом предшественников, они подробно описывали процессы ковки. Секреты, которые раньше были скрыты от наших кузнечных дронов, теперь лежали открытыми перед нами. Но это были только меньшие находки. Среди многих других артефактов меньшей важности одна реликвия выделялась и немедленно привлекла внимание наших дронов.\n\nМаленький замысловато детализированный куб, разделённый на несколько сегментов, которые можно было вращать по разным осям. С момента его находки наш разум был полностью сосредоточен на нём..."
 mem_ancestors_grudge.335.a:0 "Блестящее!"
 mem_ancestors_grudge.5.name:0 "Среди руин"
 mem_ancestors_grudge.5.desc:0 "Наши разведчики приносят вести из экспедиции к нашей потерянной крепости. Их отряд отправился вперёд, чтобы составить карту руин, окружающих наше место посадки, и определить задачу, которая лежит перед нами. Место для нашей планетарной посадки было выбрано не случайно, и поэтому они быстро обнаружили нашу главную цель — венец наших предков: Реликвийную Кузню. Наполовину в руинах и засыпанная обломками, но несмотря ни на что она всё ещё стоит. Доказательство мастерства, проявленного при её строительстве.\n\nВпереди много работы, если мы когда-нибудь хотим вернуть этот мир к его прежней славе."
 mem_ancestors_grudge.5.desc_robots:0 "Наши разведчики приносят вести из экспедиции к нашей потерянной крепости. Их отряд отправился вперёд, чтобы составить карту руин, окружающих наше место посадки, и определить задачу, которая лежит перед нами. Место для нашей планетарной посадки было выбрано не случайно, и поэтому они быстро обнаружили нашу главную цель — венец наших создателей: Реликвийную Кузню. Наполовину в руинах и засыпанная обломками, но несмотря ни на что она всё ещё стоит. Доказательство мастерства, проявленного при её строительстве.\n\nВпереди много работы, если мы когда-нибудь хотим вернуть этот мир к его прежней славе."
 mem_ancestors_grudge.5.desc_hive:0 "Наши дроны-зондировщики сообщают об успешной посадке на [mem_ancestors_grudge_planet.GetName]. Они уже начали исследовать окружающие руины, чтобы определить наши следующие шаги. Место для нашей планетарной посадки было выбрано не случайно, поскольку мы направляемся к самому сильному источнику зова. Это не то, что мы ранее предполагали — один сигнал, который привёл нас сюда. Вместо этого мы теперь можем различить множество сигналов различной силы, распределённых по поверхности этого мира.\n\nЭто место, похоже, когда-то было обширной промышленной зоной, и зов тянет нас к её сердцу..."
 mem_ancestors_grudge.5.a:0 "Хорошие новости."
 mem_ancestors_grudge.10.name:0 "Едва функционирует"
 mem_ancestors_grudge.10.desc:0 "Колонны [mem_ancestors_grudge_planet.GetName] всё ещё стоят, хотя и потрёпанные и почерневшие от огня. Их руны выцвели, но их каркас держится крепко — свидетельство мастерства наших предков.\n\nПроблеск надежды распространяется по нашим рядам, поскольку сама Реликвийная Кузня выглядит структурно целой. Хотя и засыпанная обломками, она слабо гудит, словно ожидая [Root.owner_main_species.GetAdj] рук, чтобы разбудить её ото сна. Если её можно вновь зажечь, она может послужить очагом для восстановления крепости."
 mem_ancestors_grudge.10.desc_robots:0 "Колонны [mem_ancestors_grudge_planet.GetName] всё ещё стоят, хотя и потрёпанные и почерневшие от огня. Их руны выцвели, но их каркас держится крепко — свидетельство мастерства наших создателей.\n\nПроблеск надежды распространяется по нашим рядам, поскольку сама Реликвийная Кузня выглядит структурно целой. Хотя и засыпанная обломками, она слабо гудит, словно ожидая [Root.owner_main_species.GetAdj] рук, чтобы разбудить её ото сна. Если её можно вновь зажечь, она может послужить очагом для восстановления крепости."
 mem_ancestors_grudge.10.desc_hive:0 "Во время нашего поиска источника зова мы нашли самое чудесное место, полное драгоценных артефактов, и если наше понимание его верно, это место создания. Мысль о том, сколько этих блестящих кусочков может быть нашим, если бы только мы привели его в рабочее состояние, почти заставила нас забыть о причине нашего визита.\n\nНо вот оно было — механическое устройство, явно не сделанное строителями этого места. Оно было прочно вставлено в механизм, как будто вогнано туда с огромной силой. Весьма вероятно, оно пробило внешнюю оболочку этого комплекса, прежде чем быть остановленным там, где мы его нашли. Основываясь на его эффектах, его можно описать только как маяк, вмешивающийся в психическую связь нашего разума-улья. Знание того, что это такое, мало помогает устранить его эффект на нас, поэтому мы отключили его навсегда. Почему оно было здесь, остаётся загадкой.\n\nМы пришли сюда ради зова, но найденная машинерия может стать нашей истинной наградой."
 mem_ancestors_grudge.10.a:0 "Починить её, немедленно!"
 mem_ancestors_grudge_unlocks_forge_upgrade_tt:0 "§LОткрывает следующее улучшение§! ['concept_mem_ancestors_grudge_runeforge']."
 mem_ancestors_grudge.15.name:0 "Крепости предков"
 mem_ancestors_grudge.15.desc:0 "Во время наших работ по расчистке наши рабочие нашли довольно глубокое укрепление. Похоже, это один из нескольких бункеров, построенных в спешке в преддверии осады мира в последние дни войны. Этот, в частности, кажется центральным сооружением своего комплекса и также самым большим, что мы нашли до сих пор.\n\nВедутся приготовления к исследованию его внутренностей.\n\nТем временем наши учёные продвигаются в обратной разработке Реликвийной Кузни, изучая её конструкцию. Насколько они могут судить, это не случайность, что она располагалась здесь, на [mem_ancestors_grudge_planet.GetName], а не на нашем родном мире. Многие из её процессов требуют слабой гравитации этого мира и просто не работали бы на [Root.Owner.GetHomeWorldName]. С этим новым пониманием мы теперь должны быть в состоянии дальше восстановить её."
 mem_ancestors_grudge.16.name:0 "Последний маяк"
 mem_ancestors_grudge.16.desc:0 "Во время наших работ по расчистке мы уже нашли и деактивировали многочисленные маяки, уменьшая нагрузку, которую они оказывали на наш разум. Последний из них теперь достигнут. Похоже, он проник глубоко в огромный бункерный комплекс.\n\nВедутся приготовления к исследованию его внутренностей.\n\nТем временем наши мозговые дроны продвигаются в обратной разработке Реликвийной Кузни, изучая её конструкцию. Насколько они могут судить, это не случайность, что она располагалась здесь, на [mem_ancestors_grudge_planet.GetName]. Многие из её процессов требуют слабой гравитации этого мира и просто не работали бы на [Root.Owner.GetHomeWorldName]. С этим новым пониманием мы теперь должны быть в состоянии дальше восстановить её."
 mem_ancestors_grudge.20.name:0 "Прорыв"
 mem_ancestors_grudge.20.desc:0 "Работа идёт полным ходом, с крепкими сердцами рабочих, стремящихся расчистить обломки и грязь веков.\n\nЧто более важно, наши умные умы, изучающие кузню, достигли великих открытий! С тем, что они раскопали, мы теперь готовы вернуть кузню к полной, ревущей жизни, как это было во дни наших предков."
 mem_ancestors_grudge.20.desc_hive:0 "Работа продолжается, с рабочими дронами, охотно расчищающими обломки и разрушения прошлого.\n\nЧто более важно, наши мозговые дроны, изучающие кузню, достигли великих открытий! С тем, что они нашли, мы теперь готовы вернуть кузню к полной производительности. Мы не можем дождаться сокровищ, которые она создаст."
 mem_ancestors_grudge.25.name:0 "Сияющая ярко"
 mem_ancestors_grudge.25.desc:0 "Наши остроумные мастера-кузнецы достигли откровения! После многих усилий, изучая руны и механизмы Реликвийной Кузни, они обнаружили искру, необходимую для вдохновения жизни обратно в её великое сердце.\n\nЭта искра, говорят они, является самим ключом к пробуждению её огней и возвращению ревущей былой славы, как она некогда пылала в золотые дни наших предков. Скоро звук молотов и гул расплавленного металла снова будут эхом разноситься по всему миру!"
 mem_ancestors_grudge.25.desc_robots:0 "Наши остроумные мастера-кузнецы достигли откровения! После многих усилий, изучая руны и механизмы Реликвийной Кузни, они обнаружили искру, необходимую для вдохновения жизни обратно в её великое сердце.\n\nЭта искра, говорят они, является самим ключом к пробуждению её огней и возвращению ревущей былой славы, как она некогда пылала в золотые дни наших создателей. Скоро звук молотов и гул расплавленного металла снова будут эхом разноситься по всему миру!"
 mem_ancestors_grudge.25.desc_hive:0 "Наши мозговые дроны достигли откровения! Изучая древние пути предшественников, они поняли, что руны и механизмы — это только часть того, что оживляет Реликвийную Кузню. Что ещё нужно, так это древнее искусство ковки реликвий, которым предшественники когда-то пользовались для создания лучших сокровищ. Где они праздновали процесс, мы дорожим его результатами. Два пути, одно назначение. Наши кузнечные дроны будут неустанно трудиться, чтобы соответствовать их величию и дать нам то, к чему мы стремимся."
 mem_ancestors_grudge.25.a:0 "Наконец-то!"
 mem_ancestors_grudge.26.name:0 "Мир возрождён"
 mem_ancestors_grudge.26.desc:0 "После лет пота, тяжёлого труда и испытания силы наших сердец многими вызовами работа завершена! Крепость [target.GetName], некогда потерянная в руинах и пепле, теперь стоит гордо и целая снова.\n\n[target.GetName] возрождена, её залы теперью золотятся от песен былин, перепетых вновь. Звук жизни и молотов слышен снова, её кузни пылают, а её крепости — оплот, который бросит вызов самому времени. Сердце [target.GetName] бьётся вновь!"
 mem_ancestors_grudge.26.desc_hive:0 "После многих циклов неустанной работы этот мир наконец был восстановлен. Целый мир, посвящённый удовлетворению нашего стремления. Весь улей дрожал единым порывом, когда древняя машинерия заработала, предвкушая сокровища, которые будут созданы. Как только двигатели запустились, тревоги привлекли наше внимание к гигантскому сигналу на наших сенсорах, приближающемуся к [target.GetName].\n\nМы получаем передачу."
 mem_ancestors_grudge.26.a:0 "Славно!"
 mem_ancestors_grudge.26.b:0 "Славная эволюция!"
 mem_ancestors_grudge.26.b.tt:0 "§LПреобразит нас.§!"
 mem_ancestors_grudge.26.c:0 "Моя прелесть!"
 mem_ancestors_grudge.27.name:0 "Из теней"
 mem_ancestors_grudge.27.desc:0 "§LМоё имя... Рейгаль. У вас есть... вещи... которые мне нужны. Я предлагаю... сотрудничество... за десятину. Помогите мне... восстановить популяцию.\n\nКаков ваш ответ: жизнь или смерть?§!"
 mem_ancestors_grudge.27.a:0 "Давайте жить вместе."
 mem_ancestors_grudge_dragon_roost:0 "Драконье логово"
 mem_ancestors_grudge_dragon_roost_desc:0 "Дракон выбрал этот мир как место для отдыха. Естественно, это препятствует любой деятельности в непосредственной близости, и отклонения держатся в узде, чтобы дракон не проголодался."
 mem_ancestors_grudge.27.b:0 "Смерть, но твоя!"
 mem_ancestors_grudge.27.b.tt:0 "§YДракон будет зол§!"
 mem_ancestors_grudge.28.name:0 "Дра-кончился"
 mem_ancestors_grudge.28.desc:0 "Как пали могущие. В конце концов это был просто ещё один создание, которое нужно было убить."
 mem_ancestors_grudge.29.name:0 "Драконья лихорадка"
 mem_ancestors_grudge.29.desc:0 "Встреча с драконом-стяжателем вдохновила наших мозговых дронов. Полученные знания и данные могут быть применены для наших собственных драконьих инкубаторов. К счастью, дракон в нашей системе предоставил нам достаточно образцов ткани, чтобы начать теоретизировать."
 mem_ancestors_grudge.29.a:0 "Попробовать!"
 mem_ancestors_grudge.41.name:0 "Необычные находки"
 mem_ancestors_grudge.41.desc:0 "Среди руин [target.GetName] мы обнаружили три уникальные реликвии: наплечники, кольцо и меч.\n\nВсе они находятся в довольно плохом состоянии. Наши кузнечные дроны предлагают разобрать два из них, чтобы использовать их материал для спасения третьего. Однако они не уверены, какой из них принесёт нам наибольшую пользу."
 mem_ancestors_grudge.41.a:0 "Спасти наплечники!"
 mem_ancestors_grudge.41.official:0 "§LФокус на чиновниках и экономике§!"
 mem_ancestors_grudge.41.b:0 "Спасти кольцо!"
 mem_ancestors_grudge.41.scientist:0 "§LФокус на учёных и науке§!"
 mem_ancestors_grudge.41.c:0 "Спасти меч!"
 mem_ancestors_grudge.41.commander:0 "§LФокус на командирах и войне§!"
 mem_ancestors_grudge.35.name:0 "Новая земля, прежнее небо"
 mem_ancestors_grudge.35.desc:0 "Когда кузня была наконец восстановлена, могучая искра пронзила само сердце мира. Древние механизмы, долгое время безмолвные и забытые, вздрогнули, пробуждённые ритмом наших молотов и жаром нашего ремесла.\n\nГора запела, камень загудел, и когда кузня заревела, весь мир словно вдохнул вновь. Нашими руками мир был возрождён, его дремлющая душа вновь зажжена в огнях новой славы, которая грядёт!"
 mem_ancestors_grudge.35.a:0 "Мы богаты!"
 mem_ancestors_grudge.35.a.tt.remove_city_districts_from_queue_wtf_pdx:0 "§RУдалите все запланированные городские районы! Это сломает вашу кузню!§!"
 mem_ancestors_grudge.40.name:0 "Старые привычки"
 mem_ancestors_grudge.40.desc:0 "После полного восстановления Реликвийной Кузни мы поняли её истинное предназначение. Эта могучая кузня — не просто место для создания безделушек или мелких артефактов.\n\nЭто священный двигатель создания, позволяющий нашим кузнецам артефактов и рунным артефакторам выковывать реликвии качества, невиданного ранее! Эти реликвии — не просто инструменты или оружие, но сокровища.\n\nИстинно, Реликвийная Кузня — дар самих предков, и её возрождение знаменует рассвет новой эры для нашего рода."
 mem_ancestors_grudge.40.desc_robots:0 "После полного восстановления Реликвийной Кузни мы поняли её истинное предназначение. Эта могучая кузня — не просто место для создания безделушек или мелких артефактов.\n\nЭто священный двигатель создания, позволяющий нашим кузнецам артефактов и рунным артефакторам выковывать реликвии качества, невиданного ранее! Эти реликвии — не просто инструменты или оружие, но сокровища.\n\nИстинно, Реликвийная Кузня — дар самих создателей, и её возрождение знаменует рассвет новой эры для нашего рода."
 mem_ancestors_grudge.40.a:0 "Начать ковку!"
 mem_ancestors_grudge.50.name:0 "Руны и дюрасталь"
 mem_ancestors_grudge.50.desc:0 "Из легенд и мифов — ремесло кузнеца. Реликвия была выкована. Истинный шедевр нашего ремесла, и поистине одно из наших лучших творений на сегодня. Давайте теперь сокровищем то, что сотворили наши руки, ибо такое произведение — не просто инструмент, но свидетельство мастерства, силы и духа наших предков. Пусть оно служит символом того, чего мы можем достичь, когда руны, дюрасталь и решимость соединяются!\n\nКачество: [owner.MemAncestorsGrudgeQualityFinal] Чистота: [owner.MemAncestorsGrudgePurityFinal]"
 mem_ancestors_grudge.50.desc_robots:0 "Из легенд и мифов — ремесло кузнеца. Реликвия была выкована. Истинный шедевр нашего ремесла, и поистине одно из наших лучших творений на сегодня. Давайте теперь сокровищем то, что сотворили наши руки, ибо такое произведение — не просто инструмент, но свидетельство мастерства, силы и духа наших создателей. Пусть оно служит символом того, чего мы можем достичь, когда руны, дюрасталь и решимость соединяются!\n\nКачество: [owner.MemAncestorsGrudgeQualityFinal] Чистота: [owner.MemAncestorsGrudgePurityFinal]"
 mem_ancestors_grudge.50.a:0 "Руны и дюрасталь!"
 mem_ancestors_grudge.50.a.tt:0 "§LНе забудьте активировать её. У вас может быть только одна одновременно.§!"
 mem_ancestors_grudge.50.b:0 "Не беспокойте меня снова."
 mem_ancestors_grudge.50.b.tt:0 "§LДальнейшие завершения будут уведомлениями вместо событий§!"
 mem_ancestors_grudge.52.name:0 "Новое понимание"
 mem_ancestors_grudge.52.desc:0 "Наш непрерывный прогресс в восстановлении Реликвийной Кузни привёл к увеличению понимания нашего собственного дизайна."
 mem_ancestors_grudge.52.a:0 "Количество"
 mem_ancestors_grudge.52.b:0 "Качество"
 mem_ancestors_grudge.45.name:0 "Реликвия ушла"
 mem_ancestors_grudge.45.desc:0 "Один из наших величайших лидеров будет удостоен плодов нашего последнего творения. Награда, достойная песен и легенд, выкованная в сердце самой Реликвийной Кузни.\n\nИ всё же, как это бывает, только один может нести эту честь, только один может получить это могучее вознаграждение. Пусть выбор будет сделан мудро, ибо тот, кто несёт такую реликвию, будет нести нашу гордость и честь перед лицом всех наших предков."
 mem_ancestors_grudge.45.desc_robots:0 "Один из наших величайших лидеров будет удостоен плодов нашего последнего творения. Награда, достойная песен и легенд, выкованная в сердце самой Реликвийной Кузни.\n\nИ всё же, как это бывает, только один может нести эту честь, только один может получить это могучее вознаграждение. Пусть выбор будет сделан мудро, ибо тот, кто несёт такую реликвию, будет нести нашу гордость и честь перед лицом всех наших создателей."
 mem_ancestors_grudge.45.desc_machines:0 "Пришло время решить, как будет использована реликвия. Будем ли мы изучать её сложности, чтобы углубить наше понимание ремесла, с помощью которого наши создатели также произвели нас, или будем использовать её для более приземлённых забот?"
 mem_ancestors_grudge.45.a:0 "$mem_ancestors_grudge_quality_2$: Почтить [leader_1.GetName]"
 mem_ancestors_grudge.45.b:0 "$mem_ancestors_grudge_quality_2$: Почтить [leader_2.GetName]"
 mem_ancestors_grudge.45.c:0 "$mem_ancestors_grudge_quality_2$: Почтить [leader_3.GetName]"
 mem_ancestors_grudge.45.a.2:0 "$mem_ancestors_grudge_quality_2$: Улучшить [ruler.GetName]"
 mem_ancestors_grudge.45.a.2.tt:0 "§LВычисление...\nУлучшение: [root.mem_ancestors_grudge_activated_rune_ruler_strength]%§!\n"
 mem_ancestors_grudge.45.e:0 "$mem_ancestors_grudge_quality_4$: Изучить её"
 mem_ancestors_grudge.45.ee:0 "$mem_ancestors_grudge_quality_4$: Собрать"
 mem_ancestors_grudge.45.ee.tt_create_leader:0 "§LСоздать лидера 3-го уровня с чертой $leader_trait_legendary_mem_ancestors_grudge_relicowner$§!"
 mem_ancestors_grudge.45.e.2:0 "$mem_ancestors_grudge_quality_3$: Поковыряться"
 mem_ancestors_grudge.45.e.3:0 "$mem_ancestors_grudge_quality_5$: Показать превосходство"
 mem_ancestors_grudge.45.e.4:0 "$mem_ancestors_grudge_quality_6$: Подстегнуть экономику"
 mem_ancestors_grudge.45.g:0 "$mem_ancestors_grudge_quality_7$: Вознестись"
 mem_ancestors_grudge.45.h:0 "$mem_ancestors_grudge_quality_7$: Исследовать неизвестное"
 mem_ancestors_grudge.45.exceptional_ring:0 "§LИ ещё 4!§!"
 mem_ancestors_grudge.45.exceptional_ring_hive:0 "Получить 5 §Yвариантов исследований§! с 30% прогресса"
 mem_ancestors_grudge.45.i:0 "$mem_ancestors_grudge_quality_7$: Время для реванша"
 mem_ancestors_grudge.45.exceptional_sword:0 "Завершить §Rлюбое§! перемирие, которое у нас сейчас есть."
 mem_ancestors_grudge.45.exceptional_pauldron:0 "Каждая колония ниже §Yуровня вознесения§! 5: §G+1§!"
 mem_ancestors_grudge_golden_age:0 "Процветающая экономика"
 mem_ancestors_grudge.45.d:0 "$mem_ancestors_grudge_quality_1$: Переработать и попробовать снова!"
 mem_ancestors_grudge.205.name:0 "Новая обида"
 mem_ancestors_grudge.205.desc:0 "Сегодня новый враг осмелился бросить нам вызов. Они появились у наших ворот, сбивая наши защиты и имели наглость предъявить права на то, что принадлежит нам по праву. Их дерзость не останется без ответа. Они разожгли новую обиду. Ту, которую мы доведём до конца. И полностью уладим!"
 mem_ancestors_grudge.205.a:0 "Они обидели нас!"
 mem_ancestors_grudge.205.b:0 "Внесём в записи."
 mem_ancestors_grudge.215.name:0 "Обида улажена"
 mem_ancestors_grudge.215.desc:0 "Мы можем снова отдохнуть. Бремя мести, которое мы несли, снято, ибо сегодня наш враг потерял контроль над тем, что принадлежит нам по праву.\n\nНаконец мы можем сложить груз мести."
 mem_ancestors_grudge.215.a:0 "Превосходно."
 mem_ancestors_grudge.220.name:0 "Потерянное дело"
 mem_ancestors_grudge.220.desc:0 "Наш дом потерян."
 mem_ancestors_grudge.220.a:0 "Никакой пощады!"
 mem_ancestors_grudge.55.name:0 "Они живы, всё ещё"
 mem_ancestors_grudge.55.desc:0 "После всех этих столетий они всё ещё живы. Время не смягчило их пути, и они не отклонились от пути, который когда-то принёс нам погибель. Они смотрят на нас и даже не узнают своих бывших жертв, как будто долг крови между нами был забыт.\n\nНо мы помним, и со временем они тоже вспомнят. Наша месть придёт, и обиды прошлого будут выплачены кровью."
 mem_ancestors_grudge.55.a:0 "Время для мести!"
 mem_ancestors_grudge.75.name:0 "Обида улажена"
 mem_ancestors_grudge.75.desc:0 "Наши предки теперь могут покоиться. Бремя мести, которое мы несли поколениями, снято, ибо сегодня наши заклятые враги испустили последний вздох. Их тень больше не затемняет наш путь, и долг крови выплачен полностью.\n\nНаконец мы можем сложить груз прошлого и повернуть свой взгляд к будущему. Раны старых времён могут теперь зажить, и мы, как народ, можем наконец двигаться дальше."
 mem_ancestors_grudge.75.desc_robots:0 "Наши создатели теперь могут покоиться. Бремя мести, которое мы несли столетиями, снято, ибо сегодня наши заклятые враги испустили последний вздох. Их тень больше не затемняет наш путь, и долг крови выплачен полностью.\n\nНаконец мы можем сложить груз прошлого и повернуть свой взгляд к будущему. Раны старых времён могут теперь зажить, и мы, как народ, можем наконец двигаться дальше."
 mem_ancestors_grudge.75.a:0 "Старые привычки умирают с трудом"
 mem_ancestors_grudge.75.b:0 "Новая эра"
 mem_ancestors_grudge_revenge_arc_title:0 "Обида не забыта"
 mem_ancestors_grudge_revenge_arc_desc:0 "Мы не забыли, что произошло в далёком прошлом. Раны того времени всё ещё горят в наших сердцах, и деяния наших заклятых врагов остаются высечены в камне наших домов. Они сеяли разрушение, но именно мы принесём их окончательный расчёт.\n\nТолько когда их империи не станет, мы обретём покой."
 mem_ancestors_grudge_revenge_arc_counter:0 "Обиды улажены"
 mem_ancestors_grudge.70.name:0 "Обида улажена"
 mem_ancestors_grudge.70.desc:0 "Наши предки теперь могут покоиться с миром. Бремя мести, которое мы несли поколениями, снято, ибо сегодня наши заклятые враги испустили последний вздох. Их тень больше не затемняет наш путь. К сожалению, мы не добрались до них первыми."
 mem_ancestors_grudge.70.desc_robots:0 "Наши создатели теперь могут покоиться с миром. Бремя мести, которое мы несли столетиями, снято, ибо сегодня наши заклятые враги испустили последний вздох. Их тень больше не затемняет наш путь. К сожалению, мы не добрались до них первыми."
 mem_ancestors_grudge.70.a:0 "Прискорбно"
 mem_ancestors_grudge.80.name:0 "Позолоченная революция"
 mem_ancestors_grudge.80.desc:0 "Один из наших ветеранов-рунных кузнецов считает, что внедрение живого металла в рунические артефакты может стать поворотным моментом в будущем рунного ремесла. Живой металл как алхимический сплав, способный перекраивать себя и откликаться на намерения кузнецов. Он может предложить возможности, далеко превосходящие то, что могут достичь статичные материалы."
 mem_ancestors_grudge.100.title:0 "Скрытые звери"
 mem_ancestors_grudge.100.desc:0 "Кажется, что во время наших работ по восстановлению мы встревожили колонию диких боевых зверей, когда-то использовавшихся вазуранами и оставленных после их неудачного вторжения. Эти чудовища теперь бесчинствуют среди наших сородичей. Мы должны действовать быстро и уничтожить их. Это наш мир, и этим монстрам здесь не место!"
 mem_ancestors_grudge.100.a:0 "К оружию!"
 mem_ancestors_grudge.105.title:0 "Древнее знание"
 mem_ancestors_grudge.105.desc:0 "Во время наших работ по восстановлению мы обнаружили технологию, считавшуюся утраченной веками. Это свидетельство изобретательности наших предков, что их мастерство могло выдержать столетия ржавчины и разложения. Даже сейчас, когда мы собираем её по кусочкам, она раскрывает свои секреты, всё ещё функциональная, всё ещё мощная.\n\nКак нам поступить?"
 mem_ancestors_grudge.105.desc_robots:0 "Во время наших работ по восстановлению мы обнаружили технологию, считавшуюся утраченной веками. Это свидетельство изобретательности наших создателей, что их мастерство могло выдержать столетия ржавчины и разложения. Даже сейчас, когда мы собираем её по кусочкам, она раскрывает свои секреты, всё ещё функциональная, всё ещё мощная.\n\nКак нам поступить?"
 mem_ancestors_grudge.105.desc_hive:0 "Во время наших работ по восстановлению мы обнаружили технологию предшественников. Это свидетельство их изобретательности, что их мастерство могло выдержать столетия ржавчины и разложения. Даже сейчас, когда мы собираем её по кусочкам, она раскрывает свои секреты, всё ещё функциональная, всё ещё мощная.\n\nКак нам поступить?"
 mem_ancestors_grudge.105.a:0 "Повторно использовать!"
 mem_ancestors_grudge.105.b:0 "Восстановить!"
 mem_ancestors_grudge.105.c:0 "Изучить!"
 mem_ancestors_grudge.110.title:0 "Целые защиты"
 mem_ancestors_grudge.110.desc:0 "Во время наших работ по восстановлению мы обнаружили древние защиты, потрёпанные и изношенные, но не совсем безжизненные. Эти руины всё ещё хранят достаточно своей первоначальной силы, чтобы быть отремонтированными и восстановленными к их былой мощи. В качестве альтернативы мы можем аккуратно разобрать их и изучить их внутреннее устройство."
 mem_ancestors_grudge.110.a:0 "Починить!"
 mem_ancestors_grudge.110.b:0 "Изучить!"
 mem_ancestors_grudge.115.title:0 "Живой надгробный камень"
 mem_ancestors_grudge.115.desc:0 "Во время наших работ по восстановлению мы сделали открытие: предки из древних времён до падения, сохранённые в приостановленной анимации. Механизмы вокруг них изношены и выходят из строя, но они всё ещё цепляются за жизнь. Мы должны действовать быстро, чтобы стабилизировать системы и обеспечить их выживание."
 mem_ancestors_grudge.115.desc_robots:0 "Во время наших работ по восстановлению мы сделали открытие: единицы из древних времён до падения, произведённые и сохранённые для дальнейшей обработки. Механизмы вокруг них изношены и выходят из строя, но их энергетические ячейки остаются нетронутыми. Мы должны действовать быстро, чтобы стабилизировать системы и ввести их в строй."
 mem_ancestors_grudge.115.a:0 "Спасти их!"
 mem_ancestors_grudge.115.b:0 "Их честь давно ушла."
 mem_ancestors_grudge.120.title:0 "Неразорвавшиеся боеприпасы"
 mem_ancestors_grudge.120.desc:0 "Во время наших работ по восстановлению мы наткнулись на древние боеприпасы, захоронённые обломками. Эти бомбы всё ещё боевые и представляют опасность для наших сородичей."
 mem_ancestors_grudge.120.a:0 "Убрать их."
 mem_ancestors_grudge.125.title:0 "Наблюдатели во тьме"
 mem_ancestors_grudge.125.desc:0 "Во время исследования обширных руин на [target.GetName] мы наткнулись на большое жилище диких дронов, не являющихся частью нашего разума-улья. У нас нет воспоминаний о каких-либо пропавших дронах в прошлом, поэтому их присутствие является для нас чем-то вроде загадки. Их происхождение в сторону, работы всегда много, а дроны в дефиците. Что с ними делать?"
 mem_ancestors_grudge.125.a:0 "Привести их в строй."
 mem_ancestors_grudge.125.b:0 "У нас есть более важные дела."
 mem_ancestors_grudge.400.desc:0 "Наши кузнецы артефактов превзошли самих себя, произведя примерно на 3.81% больше сплавов, чем обычно. По традиции, весь излишек должен быть посвящён Испытанию. И всё же, в эти времена, когда сила наших флотов определяет выживание наших сородичей, возможно, часть этого излишка можно было бы отправить для укрепления наших арсеналов."
 mem_ancestors_grudge.400.a:0 "Сплавы!"
 mem_ancestors_grudge.400.b:0 "Традиция."
 mem_ancestors_grudge.405.desc:0 "Наши рунные кузнецы, выведенные за их обычные пределы, дали небольшой излишек. Традиция предписывает, что весь такой излишек должен быть посвящён Испытанию. Однако это изобилие представляет нам возможность."
 mem_ancestors_grudge.405.a:0 "Ресурсы!"
 mem_ancestors_grudge.405.b:0 "Традиция."
 mem_ancestors_grudge.410.desc:0 "Несколько попыток провалилось, и наши сородичи не оправдали возложенных на них ожиданий. Работа испытала их мастерство и решимость, но всё же они не смогли выполнить.\n\nЧто касается ведущего кузнеца, его ответ был: §LЭти УДАЛЕНО даже не могут УДАЛЕНО как следует.§!"
 mem_ancestors_grudge.410.a:0 "Тревожно."
 mem_ancestors_grudge.415.desc:0 "Сегодня один из наших артефакторов подошёл к нам с самой любопытной загадкой. В своих усилиях создать релевантные артефакты для Испытания они неожиданно произвели рунический куб.\n\nНа первый взгляд это кажется странностью. И всё же руны на его поверхности слабо пульсируют. Хотя его назначение неясно, он вполне может квалифицироваться как артефакт сам по себе."
 mem_ancestors_grudge.415.a:0 "Забрать!"
 mem_ancestors_grudge.415.b:0 "Начать сначала!"
 mem_ancestors_grudge.415.c:0 "Забавно."
 mem_ancestors_grudge.420.desc:0 "Несколько наших сородичей, из-за невежества и пренебрежения установленными процедурами безопасности, вызвали смерть одного из нас. Справедливость уже свершилась, но, возможно, мы могли бы сделать больше?"
 mem_ancestors_grudge.420.a:0 "Трагично."
 mem_ancestors_grudge.420.b:0 "Компенсировать семье!"
 mem_ancestors_grudge.425.desc:0 "Произошёл странный инцидент. Один из наших артефакторов, в непреднамеренном повороте эксперимента, создал вещество чрезвычайной летучести. Взрывоопасное по своей природе."
 mem_ancestors_grudge.425.a:0 "Пыль!"
 mem_ancestors_grudge.425.b:0 "Дополнение к Испытанию."
 mem_ancestors_grudge.430.desc:0 "Наши кузнецы, вечно стремящиеся к совершенству, достигли улучшения в своих техниках. То, что начиналось как незначительное усовершенствование, вызвало волну восхищения среди наших учёных, которые видят в этой инновации потенциал вывести наши собственные исследования на новые высоты."
 mem_ancestors_grudge.430.a:0 "Исследовать!"
 mem_ancestors_grudge.430.b:0 "Продвинуть Испытание!"
 mem_ancestors_grudge.435.desc:0 "Произошёл странный инцидент. Один из наших артефакторов, в непреднамеренном повороте эксперимента, создал разумный металл. Нашим сородичам потребовалось некоторое время, чтобы взять его под контроль."
 mem_ancestors_grudge.435.a:0 "Наниты!"
 mem_ancestors_grudge.435.b:0 "В кузню!"
 mem_ancestors_grudge.440.desc:0 "Наш соперник [mem_ancestors_grudge_rival.GetName] снова проявил свою предательство. Их вмешательство привело к неудаче в нашем прогрессе. Этот преднамеренный акт саботажа нельзя игнорировать. Пока наш гнев горит ярко, ситуация требует взвешенного ответа.\n\nМы составим резко сформулированное письмо!"
 mem_ancestors_grudge.440.a:0 "Сделать! Сделать немедленно!"
 mem_ancestors_grudge_diggy_hole:0 "Копай, копай яму!"
 mem_ancestors_grudge.445.title:0 "Братья шахты, радуйтесь!"
 mem_ancestors_grudge.445.desc:0 "«...Махай! Махай! Махай со мной!» эхом разносится по многим рабочим местам. «Копай, копай яму» пользуется популярностью как никогда, в плотной компании с «Когда падает молот» и «Молотглубь» — всё это песни былин, перепетые вновь. В результате боевой дух резко возрос, а производство минералов далеко превысило квоты.\n\nМы могли бы позволить этой ситуации идти своим чередом и извлечь выгоду из этой повышенной производительности как есть, или мы могли бы инвестировать, чтобы потенциально пожинать гораздо большие прибыли."
 mem_ancestors_grudge.445.a:0 "Я [owner.GetSpeciesName], и я... Как оно там?"
 mem_ancestors_grudge.445.b:0 "Мы никогда не можем копать слишком глубоко!"
 mem_ancestors_grudge.445.b.tooltip:0 "Мы попытаемся извлечь выгоду из этого развития, инвестируя в дальнейшие разведочные горные работы."
 mem_ancestors_grudge.446.title:0 "Скрыто в горном хранилище"
 mem_ancestors_grudge.446.desc:0 "Во время наших дополнительно финансируемых раскопок шахтёры на [root.GetName] наткнулись на удивительно богатую жилу редких минералов. Дальнейшие разведочные бурения в окрестностях очерчивают неожиданно большое месторождение. В ответ на это минеральная классификация [root.GetName] была обновлена до ультра-богатой.\n\nМестные рабочие празднуют перспективу ещё многих лет добычи впереди."
 mem_ancestors_grudge.447.title:0 "Скрыто в горном хранилище"
 mem_ancestors_grudge.447.desc:0 "Во время наших дополнительно финансируемых раскопок шахтёры на [root.GetName] наткнулись на ранее неизвестную пещерную систему. Внутри они нашли богатое месторождение редких ресурсов.\n\nМестные рабочие празднуют открытие."
 mem_ancestors_grudge.448.title:0 "Технологическое сокровище"
 mem_ancestors_grudge.448.desc:0 "Во время наших дополнительно финансируемых раскопок археологи на [root.GetName] обнаружили древний обломок звездолёта, похороненный под десятками метров обломков. Этот корабль был явно построен нашими предками и обладает множеством утраченных технологий.\n\nИзучение его конструкции должно предоставить нам полезные идеи для содействия нашим исследовательским усилиям."
 mem_ancestors_grudge.449.title:0 "Сердитые шахтёры"
 mem_ancestors_grudge.449.desc:0 "Похоже, наши шахтёры негативно отреагировали на наше вмешательство в их дела. Общий энтузиазм, на котором мы пытались нажиться, потерян, и новые отчёты показывают, что производительность вернулась к норме."
 mem_ancestors_grudge.449.a:0 "Их трудно угодить."
 mem_ancestors_grudge.46.tooltip:0 "§YПовысить качество навсегда§!"
 mem_ancestors_grudge.455.title:0 "Требовательные кузнецы"
 mem_ancestors_grudge.455.desc:0 "Несколько наших кузнецов артефактов имеют высокие ожидания относительно своих новейших творений. Им пришло в голову, что проблема не в их мастерстве, а в недофинансированном рабочем месте. Они заверили нас, что большее финансирование приведёт к лучшим результатам."
 mem_ancestors_grudge.455.a:0 "Дать им то, что они хотят."
 mem_ancestors_grudge.455.a_tt:0 "Предсказанный результат будет повышен на один уровень качества."
 mem_ancestors_grudge.455.b:0 "Оттачивайте мастерство, а не речь!"
 mem_ancestors_grudge.460.title:0 "Плохие породы"
 mem_ancestors_grudge.460.desc:0 "Несколько наших перерабатывающих заводов получили минералы очень низкой чистоты. Даже обычные металлурги в настоящее время спорят, могут ли они их вообще использовать."
 mem_ancestors_grudge.460.a:0 "Смириться с низким качеством."
 mem_ancestors_grudge.460.a_tt:0 "Предсказанный результат будет понижен на один уровень качества."
 mem_ancestors_grudge.460.b:0 "Не жалеть ни одного камня."
 mem_ancestors_grudge.460.c:0 "Утилизировать всё."
 mem_ancestors_grudge.465.title:0 "Воодушевлённый народ"
 mem_ancestors_grudge.465.desc:0 "Наши рунные артефакторы почувствовали великое потрясение и внезапно настроились на эксперименты."
 mem_ancestors_grudge.465.a:0 "Дайте им!"
 mem_ancestors_grudge.465.a_tt:0 "Результат этого — настоящая азартная игра. Рунные артефакторы могут значительно улучшить свою работу или сделать наоборот."
 mem_ancestors_grudge.465.b:0 "Никакого шанса!"
 mem_ancestors_grudge.465.b_tt:0 "Предсказанный максимальный результат будет понижен на один уровень чистоты."
 mem_ancestors_grudge.465.c:0 "Финансировать другие хобби!"
 mem_ancestors_grudge.470.title:0 "Взаимная дружелюбность"
 mem_ancestors_grudge.470.desc:0 "Сегодня произошло нечто поистине редкое: все рабочие в комплексе 6A пришли на смену, радуясь тому, что они здесь. Повышенный боевой дух оказал довольно интересный эффект на производительность.\n\nУправляющие комплекса 6A предложили предпочесть боевой дух производительности. Они предлагают навсегда сократить рабочие дни с 7 дней в неделю до 6."
 mem_ancestors_grudge.470.a:0 "Вернуться к работе!"
 mem_ancestors_grudge.470.a_tt:0 "Предсказанный результат будет повышен на один уровень качества."
 mem_ancestors_grudge.470.b:0 "Шесть дней так и есть."
 mem_ancestors_grudge.475.title:0 "Растущий спрос"
 mem_ancestors_grudge.475.desc:0 "Наша работа на [target.GetName] не осталась незамеченной. Несколько частных покупателей теперь регулярно заказывают новые артефакты. Но это также приводит к большему спросу, который в настоящее время невозможно удовлетворить."
 mem_ancestors_grudge.475.a:0 "Работайте усерднее, а не умнее!"
 mem_ancestors_grudge.475.b:0 "Нанять новых кузнецов!"
 mem_ancestors_grudge.475.c:0 "Мы справимся с этим."
 mem_ancestors_grudge.480.title:0 "Разрушающиеся генераторы"
 mem_ancestors_grudge.480.desc:0 "Наши сотрудники по обслуживанию на [target.GetName] заметили странное поведение древних силовых генераторов. Может показаться странным, что наши предки не строили с учётом тысячелетий и войны, но текущая ситуация кажется довольно безнадёжной. Персонал отметил, что без надлежащего восстановления система может взорваться у нас в лицах."
 mem_ancestors_grudge.480.a:0 "Наблюдать за взрывом."
 mem_ancestors_grudge.480.b:0 "Остановите это! Сейчас же!"
 mem_ancestors_grudge.480.c:0 "Не стоит беспокоиться."
 mem_ancestors_grudge.485.title:0 "Неудача в Кузнице"
 mem_ancestors_grudge.485.desc:0 "Во время текущего кузнечного ритуала наш назначенный кузнец совершил выдающийся промах. Вся проделанная работа была отменена, и процесс должен начаться заново. Честь кузнеца, однако, требует, чтобы начатый проект был завершён.\n\nКак мы отреагируем на эту ошибку?"
 mem_ancestors_grudge.485.a:0 "Пусть он разбирается, но напомните ему о сроке."
 mem_ancestors_grudge.485.a_tt:0 "Предсказанный результат будет понижен на один уровень качества."
 mem_ancestors_grudge.485.b:0 "Пусть старшие кузнецы поделятся своим пониманием недостатков его проекта."
 mem_ancestors_grudge.485.b_tt:0 "Предсказанный минимальный результат будет повышен на один уровень качества."
 mem_ancestors_grudge.485.c:0 "Пусть старшие кузнецы предложат улучшения его проекта."
 mem_ancestors_grudge.485.c_tt:0 "Предсказанный максимальный результат будет повышен на один уровень качества."
 mem_ancestors_grudge.490.title:0 "Странное настроение"
 mem_ancestors_grudge.490.desc:0 "Один из наших кузнецов артефактов отошёл от общества и забаррикадировался внутри Реликвийной Кузни. Единственное, что у нас осталось, — это загадочное послание, которое можно описать только как странную тарабарщину."
 mem_ancestors_grudge.490.a:0 "Пусть куёт!"
 mem_ancestors_grudge.490.a_tt:0 "Результат этого странного настроения — настоящая азартная игра. Кузнец может значительно улучшить свою работу или сделать наоборот."
 mem_ancestors_grudge.490.b:0 "Кто-нибудь, поставьте его под наблюдение!"
 mem_ancestors_grudge.490.b_tt:0 "Предсказанный максимальный результат будет понижен на один уровень качества."
 mem_ancestors_grudge.490.c:0 "Попробуйте отвлечь его внимание!"
 mem_ancestors_grudge.515.title:0 "Это не астероид"
 mem_ancestors_grudge.515.desc:0 "Массивная чёрная дыра в системе [solar_system.GetName] не имела большой ценности. Единственный умеренно интересный факт — это гигантский неповреждённый астероид.\n\nНаши учёные ожидали, что гигантский астероид [from.GetName] будет немного более интересным камнем, но он оказался массивным Кракеном."
 mem_ancestors_grudge.515.a:0 "Отступить!"
 mem_ancestors_grudge.520.name:0 "Адмирал Ничего"
 mem_ancestors_grudge.520.desc:0 "§HПока наши солдаты праздновали заслуженную победу, массивный труп Кракена разлетелся на кусочки размером с гуманоида. Снизу появилось судно, открыв каналы связи:§!\n\nАх, как освежает цивилизованное лицо. Вежливость даже в военное время — редкое качество.\n\nЯ вижу ваши силы, их сильные и слабые стороны. Более того, неисправленные изъяны станут вашей погибелью. Позвольте мне отшлифовать их, возвысить за пределы текущего состояния. Сделав это, вы поможете и мне тоже. Взаимовыгодное соглашение, не так ли?"
 mem_ancestors_grudge.520.a:0 "Как это поможет вам?"
 mem_ancestors_grudge.520.a.r:0 "Ах, ум, размышляющий за пределами непосредственного поля боя. Восхитительно.\n\nПозвольте мне объяснить мою позицию. Мой род воспринял угрозу. Ту, что таится за пределами известной сферы, за пределами хрупкого порядка, к которому эта галактика цепляется. А я всего лишь авангард, первый прибывший.\n\nПредвестник, возможно? Или просто разведчик, гарантирующий, что когда придёт буря, она не застанет ваш народ врасплох."
 mem_ancestors_grudge.520.b:0 "Вы испортили наш труп!"
 mem_ancestors_grudge.520.b.r:0 "Гниющий труп — всего лишь остаток неудачи, слабости. Дюрасталь и лазеры, однако, — инструменты моего замысла, контроля, неизбежного триумфа."
 mem_ancestors_grudge.520.c:0 "Быть съеденным было частью вашего плана?"
 mem_ancestors_grudge.520.c.r:0 "Просто осложнение, не более. Мгновенная задержка, скоро будет исправлена."
 mem_ancestors_grudge.520.d:0 "Вы кажетесь знакомым."
 mem_ancestors_grudge.520.d.r:0 "Я ни первый из своего рода, ни последний. Я продолжаю наследие, замысел, заданный в движение задолго до этого момента. Вопрос, следовательно, не просто в вашем присутствии, но в вашей цели."
 mem_ancestors_grudge.520.hire:0 "§Y$NAME_Grand_Admiral_Zrawn$§! и его флагман $NAME_mem_ancestors_grudge_chimera$ присоединятся к вашим рядам."
