 situation_mem_ancestors_grudge_dranir_ratmen_invasion_desc:0 "Массовые волны крысолюдов наводняют колонию. Каждый уголок может стать новой точкой проникновения для этих скитальцев, и их число кажется бесконечным. Их технология, похоже, питается от зелёных светящихся кристаллов, которые вводят их в ярость на поле боя."
