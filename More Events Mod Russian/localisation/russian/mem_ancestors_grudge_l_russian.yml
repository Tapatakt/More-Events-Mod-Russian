 situation_mem_ancestors_grudge_forge_repairs_desc_normal:0 "Наша бывшая промышленная столица лежит в руинах. Тень былого величия. Нам, детям рун и дюрастали, теперь объединившимся, выпадает починить сломанное и восстановить этот мир к его прежней славе."
