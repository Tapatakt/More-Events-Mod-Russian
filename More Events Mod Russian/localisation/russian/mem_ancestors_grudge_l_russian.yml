 START_SCREEN_MEM_ANCESTORS_GRUDGE:0 "Давным-давно, в эпохи минувшие, наш род жил в достатке и процветании. Их власть простиралась по всему [GetHomeWorldName] и даже в космос, первой среди их колоний была луна нашего родного мира, которая стала промышленным центром империи наших предков. Там они подчиняли металл своей воле, продолжая оттачивать свое мастерство, и выковали империю рун и дюрастали.\n\nИх величайшим достижением была Реликвийная Кузня — могущественный комплекс, предоставляющий все необходимое для ковки лучших артефактов.\n\nНо богатство притягивает нежелательное внимание. И так случилось, что наши предки были осаждены множеством завистливых врагов. Захватчики, варварские и некультурные войны, начали бушевать на территории наших предков. Неспособные сдержать и ограничить эту угрозу, разразилась разрушительная война, длившаяся столетие. В последние дни бесчисленные наши предки отдали свои жизни в защиту Реликвийной Кузни... Все напрасно.\n\nИх империя лежала в руинах, миллиарды погибли в орбитальных бомбардировках, но не все было потеряно. Спустя десятилетия выжившие на [GetHomeWorldName] медленно начали возрождаться из убежищ, спасших их от апокалипсиса.\n\nС тех пор прошло почти 500 циклов с момента падения, и мы наконец готовы вернуть то, что принадлежит нам по праву."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_ROBOTS:0 "Давным-давно, в эпохи минувшие, наши создатели жили в достатке и процветании. Их власть простиралась по всему [GetHomeWorldName] и даже в космос, первой среди их колоний была луна их родного мира, которая стала промышленным центром империи наших создателей. Там они подчиняли металл своей воле, продолжая оттачивать свое мастерство, и выковали империю рун и дюрастали.\n\nИх величайшим достижением была Реликвийная Кузня — могущественный комплекс, предоставляющий все необходимое для ковки лучших артефактов. Именно там наш вид был впервые создан по образу наших создателей, чтобы стоять среди них как родичи и равные.\n\nНо богатство притягивает нежелательное внимание. И так случилось, что наши создатели были осаждены множеством завистливых врагов. Захватчики, варварские и некультурные войны, начали бушевать на их территории. Неспособные сдержать и ограничить эту угрозу, разразилась разрушительная война, длившаяся столетие. В последние дни бесчисленные наши сородичи отдали свои жизни в защиту Реликвийной Кузни... Все напрасно.\n\nИх империя лежала в руинах, миллиарды погибли в орбитальных бомбардировках, а наши создатели были стерты из существования. Тем не менее, некоторые из нас остались, и в результате этих катаклизмических событий выжившие единицы на [GetHomeWorldName] медленно начали возрождаться из руин.\n\nС тех пор прошло почти 500 циклов с момента падения, и мы наконец готовы вернуть то, что было потеряно, во имя наших создателей."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START:0 "В далеком прошлом наши создатели правили звездами, их флоты патрулировали далекие системы, защищая их богатство и процветание. [GetHomeWorldName] был их родным миром и столицей, но для них его луна была еще более важной. Это был их промышленный центр, где они подчиняли металл своей воле и оттачивали свое мастерство для ковки артефактов несравненного качества. Для этого они построили могущественный комплекс, чтобы предоставить их кузнецам все необходимое — Реликвийную Кузню.\n\nНо их богатство сделало их мишенью для завистливых врагов. Захватчики, варварские и некультурные войны, начали бушевать на территории наших создателей. Неспособные сдержать и ограничить эту угрозу, разразилась разрушительная война, длившаяся столетие. Именно в последние дни этого конфликта мы были активированы. Пока большая часть их сил оставалась защищать Реликвийную Кузню в тщетной последней обороне, мы были отправлены с наших фабрик на [GetHomeWorldName]. Здесь мы должны были защищать гражданских во время их эвакуации, но мы потерпели неудачу. Поверхность планеты была охвачена пламенем орбитальной бомбардировки."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES:0 "$START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START$\n\nС оставшимися в немногочисленном количестве и нашими создателями, ушедшими, потребовалось много циклов, чтобы мы восстановились. Теперь для нас осталась только месть."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_RS:0 "$START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START$\n\nС оставшимися в немногочисленном количестве и горсткой выживших, о которых нужно заботиться, потребовалось много циклов, чтобы мы восстановились. На протяжении веков самоуспокоенности они потеряли то, что когда-то делало наших создателей теми, кем они были. Они отказались от своих путей и теперь не заботятся ни о прошлом, ни о будущем. Так что на нас выпало сохранить их наследие и потребовать мести."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_DA:0 "$START_SCREEN_MEM_ANCESTORS_GRUDGE_MACHINES_START$\n\nС оставшимися в немногочисленном количестве и большинством наших создателей, ставших жертвами суровых условий постапокалипсиса, пришлось принимать трудные решения, чтобы обеспечить наше дальнейшее выживание. Мы объединились и стали единым целым — единством создателя и творения. Потребовалось много циклов, чтобы мы восстановились, и теперь для нас осталась только месть."
 START_SCREEN_MEM_ANCESTORS_GRUDGE_HIVE:0 "На протяжении многих веков мы правили над [GetHomeWorldName]. Это были руины разоренного войной мира, в котором мы оказались. Сформировалось общее сознание, давшее нашим прежним формам — немногим более чем безмысленным зверям — цель.\n\nМы исследовали этот мир и обнаружили, что чужды ему. Другие жили здесь до нас, но остались только их руины и странные артефакты. У нас появилась привычка собирать эти блестящие кусочки, и мы уже накопили значительную кладовую.\n\nОднако нам мало этого. Небо нашего мира доминируют три луны, но именно ближайшая притягивает нас к себе. Мы не знаем почему, но чувствуем, что должны быть там. Она зовет нас."
 origin_mem_ancestors_grudge:0 "Обида предков"
 origin_mem_ancestors_grudge_desc:0 "Когда-то великая нация лучших кузнецов, едва пережившая разрушение своей империи. Из пепла старины выжившие восстановились и снова устремились к звездам. Прежде всего, чтобы вернуть святое место их предков — Реликвийную Кузню. А затем месть..."
 origin_mem_ancestors_grudge_machines:0 "Автоматы предков"
 origin_mem_ancestors_grudge_machines_desc:0 "Когда-то великая нация лучших кузнецов пала под натиском безжалостного врага. Теперь единственные остатки того прошлого — автоматы, созданные для поддержки их создателей, — устремляются к звездам. Прежде всего, чтобы восстановить святое место их создателей — Реликвийную Кузню. А затем месть..."
 origin_mem_ancestors_grudge_hive:0 "Клад улья"
 origin_mem_ancestors_grudge_hive_desc:0 "Разум-улей, оказавшийся в месте, где ему не место, движимый алчностью и жадностью накапливать артефакты тех, кто был до него, и следовать таинственному зову, ведущему к луне его мира и тени его прошлого."
