l_russian:

 mem_dwarf_fortress_category:0 "Внутри Огня"
 mem_dwarf_fortress_category_desc:0 "Глубокое сканирование указывает на необычную форму поверхности. Это может означать наличие искусственной структуры."
 mem_dwarf_fortress.1.name:0 "Просто Горячий Воздух"
 mem_dwarf_fortress.1.desc:0 "Оказалось, что странная форма была просто плато, где тепло и неравномерная плотность магмы исказили результаты сканирования. На этом месте не было обнаружено ничего искусственного."
 mem_dwarf_fortress.1.a:0 "Мы должны двигаться дальше."
 mem_dwarf_fortress.2.name:0 "Открытие Внутри Огня"
 mem_dwarf_fortress.2.desc:0 "Наши шахтеры обнаружили вход в систему пещер явно искусственного происхождения под палящей поверхностью [mem_dwarf_fortress_planet.GetName].\n\nНачало раскопок означает полное прекращение любых горных работ, но кто знает, какие секреты могут таить в себе эти глубины?"
 mem_dwarf_fortress.2.a:0 "Начните раскопки."
 mem_dwarf_fortress.2.b:0 "Мы не можем прекратить добычу полезных ископаемых из-за этого."
 mem_dwarf_fortress.3.name:0 "Удар по Земле"
 mem_dwarf_fortress.3.desc:0 "После различных разведочных буровых работ наша научная группа обнаружила множество подземных ходов, принадлежащих одной сложной системе пещер, очевидно, искусственного происхождения.\n\nНевозможно оценить, насколько глубоко они простираются."
 mem_dwarf_fortress.3.a:0 "Проведите дальнейшее расследование."
 mem_dwarf_fortress_site:0 "В Глубины"
 mem_dwarf_fortress_site_desc:0 "Под палящей поверхностью [mem_dwarf_fortress_planet.GetName] обнаружена искусственная система пещер. Хотя температура опасно высока, достаточное термостойкое оборудование позволит продолжить исследование."
 mem_dwarf_fortress.4.name:0 "Горячие Ноги"
 mem_dwarf_fortress.4.desc:0 "Пройдя по самому большому из извилистых туннелей довольно долго, экспедиция наконец нашла окончательное доказательство того, что это место было построено, а не является случайным природным явлением.\n\nПеред учеными туннель резко углубляется в яму, похожую на карьер. Каменная плита с неизвестной надписью на ней отмечает начало грубо обтесанной каменной лестницы. Эти ступени ведут вниз с одной стороны и вверх с другой, оставляя между ними пустой пол длиной в десятки метров."
 mem_dwarf_fortress.4.desc_01:0 "$mem_dwarf_fortress.4.desc$ \n\nПересекая яму, научный сотрудник [Root.leader.GetName] наступил на скрытую плиту давления, невольно активировав механизм ловушки. Лава быстро затопила яму, остановившись вскоре перед тем, как достичь вершины лестницы. К сожалению, никто из команды не успел выбраться вовремя.\n\nЛава уже начала остывать, и ожидается, что её можно будет безопасно пересечь через несколько дней."
 mem_dwarf_fortress.4.desc_02:0 "$mem_dwarf_fortress.4.desc$  \n\nПересекая яму, один из ассистентов научного сотрудника [Root.leader.GetName] наступил на скрытую плиту давления, невольно активировав механизм ловушки. Лава быстро затопила яму, остановившись вскоре перед тем, как достичь вершины лестницы. К сожалению, исследовательская команда не выбралась из ямы невредимой. Научный сотрудник [Root.leader.GetName] никогда не будет прежним."
 mem_dwarf_fortress.4.desc_03:0 "$mem_dwarf_fortress.4.desc$  \n\nПересекая яму, научный сотрудник [Root.leader.GetName] заметил скрытую плиту давления. После быстрого расследования выяснилось, что она является частью сложного механизма ловушки, который бы — если бы был активирован — затопил всю яму лавой. Команда бдительно следит за подобными ловушками глубже внутри."
 mem_dwarf_fortress.4.a:0 "Ужасный исход, но мы должны двигаться дальше."
 mem_dwarf_fortress.4.b:0 "Это прискорбно, но мы должны продолжать двигаться вперед."
 mem_dwarf_fortress.4.c:0 "Хорошая работа. Продолжайте."
 mem_dwarf_fortress.5.name:0 "Еще Больше Ловушек"
 mem_dwarf_fortress.5.desc:0 "Начиная с этой ямы качество туннеля неуклонно улучшалось, поскольку гладкие каменные поверхности сменялись естественными зубчатыми скальными стенами. В конце концов наша экспедиционная группа наткнулась на большую пещеру, в которой, по всей видимости, находился вход в какое-то сооружение, похожее на бункер. В центре пещеры одна большая колонна держит вес всего потолка. На ней находится еще одна каменная плита с неразборчивой надписью, которая, по мнению экспедиционной группы, является каким-то... рычагом?"
 mem_dwarf_fortress.5.desc_01:0 "$mem_dwarf_fortress.5.desc$ \n\nНаучный сотрудник [Root.leader.GetName] и [Root.Leader.GetHerHis] коллеги были вынуждены своим любопытством раскрыть тайну того, для чего был создан этот механизм. Оставив все предосторожности позади, [Root.Leader.GetSheHe] передвинул рычаг.\n\nЩелчок, за которым последовал громкий грохот, наполнил зал. Почти мгновенно колонна и потолок выше рухнули на землю, прежде чем медленно подняться обратно в своё прежнее положение, обнажив тех, кто был достаточно неудачлив, чтобы попасть под их вес."
 mem_dwarf_fortress.5.desc_02:0 "$mem_dwarf_fortress.5.desc$ \n\nНаучный сотрудник [Root.leader.GetName] и [Root.Leader.GetHerHis] коллеги были вынуждены своим любопытством раскрыть тайну того, для чего был создан этот механизм. Оставив все предосторожности позади, [Root.Leader.GetSheHe] передвинул рычаг.\n\nЩелчок, за которым последовал громкий грохот, наполнил зал. Почти мгновенно колонна и потолок выше рухнули на землю, прежде чем медленно подняться обратно в своё прежнее положение, обнажив тех, кто был достаточно неудачлив, чтобы попасть под их вес. Хотя [Root.Leader.GetSheHe] избежал смерти в последний момент, это оставило неизгладимое впечатление на научного сотрудника [Root.leader.GetName]."
 mem_dwarf_fortress.5.desc_03:0 "$mem_dwarf_fortress.5.desc$ \n\nХотя [Root.Leader.GetSheHe] и был вынужден собственным любопытством, а также [Root.Leader.GetHerHis] коллегами, научный сотрудник [Root.leader.GetName] решил сопротивляться [Root.Leader.GetHerHis] детскому побуждению дёрнуть рычаг, вместо этого решив изучить механизм, используя [Root.Leader.GetHerHis] сканер на безопасном расстоянии.\n\nРезультаты подтвердили [Root.Leader.GetHerHis] подозрения: рычаг соединён со сложным механизмом, удерживающим колонну и большие части потолка на месте. Похоже, что активация рычага привела бы к падению большей части потолка на землю. После этого механизм поднял бы упавшие куски обратно в их начальное положение, сбрасывая механизм. Кто бы создавал такую ловушку?"
 mem_dwarf_fortress.5.a:0 "Пришлите другую команду. Мы не сдадимся!"
 mem_dwarf_fortress.5.b:0 "Сделайте замечание выжившим. Они должны быть более осторожными."
 mem_dwarf_fortress.5.c:0 "Это было близко. Следите за дальнейшими ловушками."
 mem_dwarf_fortress.6.name:0 "Опасная Комната"
 mem_dwarf_fortress.6.desc:0 "Проникновение в бункер было неожиданно лёгким, так как главные ворота были лишь частично закрыты. Экспедиция была встречена мрачной сценой, однако. Окоченевшие трупы коротких, но крепких гуманоидных пришельцев усыпали землю. Неясно, что именно произошло здесь, но все они, похоже, встретили насильственный конец.\n\nПервый доступный комплекс у входа в бункер, по-видимому, служил казармой и оружейной для охранного персонала. У этих пришельцев, похоже, была технология, сравнимая с нашей собственной, использующая силовые доспехи и энергетическое вооружение. Любопытно, однако, что большие части складской зоны были заняты рядом устаревшего холодного оружия, такого как молоты и топоры.\n\nПо мере продвижения расследования дальше внутрь комплекса научный сотрудник [Root.leader.GetName] забрел в то, что [Root.Leader.GetSheHe] считал каким-то тренировочным залом. Когда член команды беззаботно дёрнул непомеченный рычаг, несколько шипов быстро выдвинулись из пола, а затем втянулись обратно с той же скоростью, с какой появились. Появившаяся иконография, когда рычаг был дёрнут, предполагает, что эти шипы предназначались для тренировки пользователей в техниках уклонения."
 mem_dwarf_fortress.6.desc_01:0 "$mem_dwarf_fortress.6.desc$ \n\nСудя по всему, научный сотрудник [Root.leader.GetName] и большая часть [Root.Leader.GetHerHis] команды были в лучшем случае посредственными уклонистами..."
 mem_dwarf_fortress.6.desc_02:0 "$mem_dwarf_fortress.6.desc$ \n\nИзящно уклоняясь от любой надвигающейся опасности, научный сотрудник [Root.leader.GetName] смог деактивировать 'тренировочный' механизм, прежде чем кто-либо серьёзно пострадал. Обманщик, дёрнувший рычаг, был снят со своей должности в результате этого инцидента."
 mem_dwarf_fortress.6.a:0 "Это ужасно!"
 mem_dwarf_fortress.6.b:0 "Могло быть и хуже..."
 mem_dwarf_fortress.6.c:0 "Где мы находим этих идиотов?"
 mem_dwarf_fortress.7.name:0 "Чёрный Юмор"
 mem_dwarf_fortress.7.desc:0 "Оставив входную секцию позади, научный сотрудник [Root.leader.GetName] и [Root.Leader.GetHerHis] команда вошли в то, что они считают коммерческим районом. По барельефам на стенах, полах и бытовых предметах существенная часть истории бывших обитателей была реконструирована экспедиционной командой. Этот объект был основан в этих суровых условиях в вере, что глубоко под объектом существуют жилы редкой — и для них невероятно ценной — минеральной руды. Закачивая магму на поверхность, они смогли получить доступ к практически неисчерпаемому источнику энергии, построить систему обороны, полагающуюся на множество лавовых ловушек, и обнаружили способ избавления от своих 'нежелательных' — как обширно и многократно показано на барельефах.\n\nОднако находкой особой ценности была библиотека, которая предоставила нашим лингвистам достаточно образцов для перевода языка пришельцев. Это не только упростит взаимодействие с их технологией, но также дало нам представление об их юморе. Архивированные изображения каменных плит, найденных на различных местах ловушек, гласят следующее: 'Смотри под ноги...' и 'Не трогай это!' для лавовой и рычажной ловушек соответственно. Другим примером был надгробный камень на одном из их кладбищ, показывающий воина, пронзённого несколькими шипами одновременно, на его барельефе, с подписью 'Почему ты не увернулся?!' Неудивительно, что это вернуло некоторые не столь отдалённые воспоминания...\n\nНаучный сотрудник [Root.leader.GetName] ожидает найти больше информации о том, что здесь произошло, исследуя центральную секцию, которая в настоящее время заперта за массивными воротами, которые экспедиционная команда ещё должна открыть."
 mem_dwarf_fortress.7.a:0 "Откройте их."
 mem_dwarf_fortress.8.name:0 "Из Огня и Крови"
 mem_dwarf_fortress.8.desc:0 "Открыть ворота оказалось довольно сложной задачей. Когда команда раскопщиков наконец пробилась через них, стало ясно, что это не случайность. Кто-то приложил немало усилий, чтобы запечатать их изнутри, вплоть до того, что их невозможно было открыть. Да никто и не пытался. Оказалось, что обитателей больше волновало убийство друг друга, хотя причина этого стала ясна только после того, как один из ученых наткнулся на хронику в хранилище данных бункера.\n\nСначала аванпост постоянно рос, и его процветание привлекало множество новых жителей. Многие жители не только работали в шахтах, но и занимались изобразительным искусством, создавая предметы, искусно украшенные фрактальными изображениями себя и другими красивыми, но странными творениями. Когда добыча полезных ископаемых принесла первые успехи, колония пережила экономический бум.\n\nНесмотря на то, что ее постоянно осаждали неизвестные соперники, она просуществовала несколько поколений. Однако, когда раскопки планетарного ядра приблизились к завершению, записи в хронике уже давно стали озлобленными, они сообщали о растущей жадности и широко распространенной паранойе среди населения.\n\nС иррациональным поведением и вспышками насилия, все вылилось в катастрофическую цепь событий, когда \"Лорд Стражи\" вызвал смотрителя бункера на дуэль за обладание очень ценным артефактом, упоминаемым только по названию - §Y'Кубортоб Унил Омот'§! Поединок быстро превратился в борьбу не на жизнь а на смерть, закончившись лишь победой претендента. Последующие записи сообщают о последовательных дуэлях, подобных первой, происходящих ежедневно. Заканчивается хроника одной строкой, повторяющейся снова и снова - «Он будет моим!»\n\nПохоже, что с этого момента ситуация быстро обострилась, что заставило команду раскопок задаться вопросом, что за предмет мог привести к краху целого общества. К сожалению, никакой дополнительной информации об артефакте найдено не было.\n\nВ попытке узнать больше о ценном материале, добытом в этой колонии, ученые направились к секции бурения ядра, но столкнулись с еще одним забаррикадированным дверным проемом..."
 mem_dwarf_fortress.8.a:0 "Вы знаете, как это делается."
 mem_dwarf_fortress.9.name:0 "Массовый Психоз"
 mem_dwarf_fortress.9.desc:0 "Как только проход был расчищен, команда раскопок не была удивлена обнаружить больше трупов, лежащих в этой секции. Однако один из них выделялся.\n\nСпрятавшись в самом уединённом углу, был найден одинокий труп, прислонённый к стене, в его смертельной хватке странно выглядящий, гигантский металлический ботинок. Рядом с трупом был датапад, его содержимое проливает свет на природу странного предмета. Хотя единственное, что было написано в последней записи журнала, было 'Наконец-то оно моё!!!', научный сотрудник [Root.leader.GetName] быстро заключил, что металлический сабатон должен быть §Y'Кубортоб Унил Омот'§!, причиной разрушения этой колонии.\n\nПри более тщательном осмотре выяснилось, что части артефакта были сделаны из ультра-редкого материала, ради которого изначально был основан аванпост. В хрониках объекта он был назван 'живой металл' за его способность 'помнить' свою оригинальную форму, если повреждён или подвергнут манипуляциям — по сути, самовосстанавливающийся материал. Как только подземные жилы были вскрыты и живой металл был введён в популяцию, он быстро нашёл широкое применение среди остальной части колонии. Что бывшие обитатели, очевидно, не осознали, так это неблагоприятные долгосрочные эффекты на их психическое здоровье, вызванные длительным контактом с материалом. Научный сотрудник [Root.leader.GetName] мудро посоветовал всем избегать прямого физического контакта с веществом и использовать защитную одежду при взаимодействии с ним.\n\nМесторождение этого редкого металла, похоже, далеко не полностью разработано, и если будут приняты достаточные меры безопасности, мы сможем возобновить здесь горнодобывающие операции."
 mem_dwarf_fortress.9.a:0 "Выдающиеся работы."
 mem_dwarf_fortress_boot:0 "Вдохновляющее Мастерство"
 r_mem_dwarf_fortress_boot:0 "Кубортоб Унил Омот"
 r_mem_dwarf_fortress_boot_desc:0 "'Рабочий Разбитый Молотом Лени'\n\nЭто сабатон из дюрастали. Работа выполнена с высочайшим качеством. Он обильно украшен гравировкой, изображающей правителя, бьющего и пинающего своих работников. Его украшают свисающие кольца из нейтрония и угрожающие шипы из живого металла."
 leader_trait_mem_traumatized:0 "$leader_trait_traumatized$"
 leader_trait_mem_traumatized_desc:0 "$leader_trait_traumatized_desc$"
