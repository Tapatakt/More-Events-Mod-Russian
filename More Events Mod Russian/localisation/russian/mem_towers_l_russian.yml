l_russian:

 mem_towers_category:0 "Башни в Тумане"
 mem_towers_category_desc:0 "Наши сенсоры фиксируют необычно высокие образования, скрытые плотной токсичной атмосферой [Root.GetName]."
 mem_towers.100.name:0 "Серный Лес"
 mem_towers.100.desc:0 "Похоже, что необычные образования, обнаруженные ранее, на самом деле являются гигантскими живыми организмами, процветающими за счет обильной геотермальной энергии. \n\nОрганизмы на основе серы, образующие массивные высокие колонии, похожие на кораллы, на поверхности планеты, цепляются за источники тепла, создавая видимость массивного леса, покрывающего планету."
 mem_towers.100.a:0 "Замечательные Виды."
 mem_towers.100.b:0 "Попробуйте пересадить образец серной жизни в наши миры."
 mem_towers.100.b.tooltip:1 "Разблокирует решение §Y$decision_mem_towers_transplant$§! на обычных планетах (не на идеальных мирах, экуменополисах или мегасооружениях), что дает планете модификатор, повышающий ее производство £society Очков Общества и £energy Энергии за счет Обитаемости."
 mem_towers.200.name:0 "Горы Мусора"
 mem_towers.200.desc:0 "Очевидно, на [From.GetName] когда-то существовала процветающая органическая цивилизация. Ее остатки до сих пор покрывают поверхность планеты в виде бесконечных свалок, где мусор аккуратно сортируется в высокие пирамиды, придавая поверхности необычные образования, которые мы обнаружили ранее. \n\nОднако планета не кажется полностью заброшенной. Миллионы автоматонов все еще работают там, перемещаясь между кучами и сортируя мусор, переставляя его снова и снова, ведомые единым интеллектом, выполняющим таинственные алгоритмы."
 mem_towers.200.a:0 "Найдите способ связаться с ними."
 mem_tower.200.b:0 "Отправьте экспедицию исследовать мусор."
 mem_tower.200.c:0 "Наблюдайте за ними не вмешиваясь."
 mem_towers.210.name:0 "Сигнал расшифрован."
 mem_towers.210.desc:0 "[Root.GetName] сообщает об успешной расшифровке радиопереговоров между машинами для сортировки мусора на [mem_towers_the_planet.GetName]. По-видимому, все они управляются единым разумом, идентифицированным как \"§YБригадир§!\". \n\nСам Бригадир, похоже, обнаружил нас и пытается установить контакт. Его алгоритмы распознавания, кажется, повреждены, и он верит, что мы — его создатели."
 mem_towers.211.desc:0 "Создатели... Это вы? Почему вы не возвращаетесь? \n\nМы выполняем задание... но вы все равно не возвращаетесь. \n\nВернитесь, пожалуйста."
 mem_towers.211.a:0 "У нас есть для тебя новая цель."
 mem_towers.211.a.tooltip:0 "Бригадир присоединится к нашей империи в качестве нового §SГубернатора§!."
 mem_towers.211.b:0 "Продолжайте в том же духе."
 mem_towers.211.c:0 "Самоуничтожься, мерзкая машина."
 mem_towers.211.c.response:0 "Но почему, создатели? \n\nЯ сделал все, что вы просили, и даже больше."
 mem_towers.211.d:0 "Отчет о состоянии дел."
 mem_towers.211.d.response:0 "Работа продолжается в соответствии с вашими повелениями, создатели. \n\nИз-за отсутствия надлежащего ремонта и пополнения запасов, мы поддерживаем истощение на уровне §R88%§! \n\nВ настоящее время работы по очистке выполнены на §G116792%§!. \n\nВ течение §Y455§! командных циклов новых команд не поступало, что на §Y455§! циклов превышает проекцию. \n\nПожалуйста, вернитесь, создатели. Нам вас очень не хватает."
 mem_towers.220.name:0 "Копание в Мусоре"
 mem_towers.220.desc:0 "Экипаж [Root.GetName] успешно добрался до негостеприимной поверхности [mem_towers_the_planet.GetName]. \n\nРоботы, ухаживающие за свалками, не обратили на них внимания, и экспедиция смогла работать беспрепятственно. Большинство культурных артефактов, оставленных позади, были переработаны и перепереработаны, но некоторые всё ещё можно было идентифицировать. Цивилизация, оставившая их, была довольно развитой."
 mem_towers.220.a:0 "Давайте посмотрим, будет ли что-нибудь из этого полезным."
 MEM_TOWERS_CONTACT:0 "Контакт с Уборщиками"
 MEM_TOWERS_CONTACT_DESC:0 "Миллионы роботов выполняют бесконечную и, кажется, бессмысленную работу на поверхности [mem_towers_the_planet.GetName]. Что-то должно ими управлять, и нам следует выяснить что."
 MEM_TOWERS_RUMMAGE:0 "Разобрать Мусор"
 MEM_TOWERS_RUMMAGE_DESC:0 "Развитая цивилизация оставила после себя значительную коллекцию отбросов на поверхности [mem_towers_the_planet.GetName]. Кто знает, мусор одного вида может оказаться сокровищем для другого."
 mem_towers_forest:0 "Серный Лес"
 mem_towers_forest_desc:0 "На планете находится богатая экосистема на основе серы."
 mem_towers_trash:0 "Горы Мусора"
 mem_towers_trash_desc:0 "Вся поверхность этой планеты покрыта мусором, оставленным развитой цивилизацией."
 d_mem_towers_sulfuric_forest:0 "Перемещение Серы"
 d_mem_towers_sulfuric_forest_desc:0 "Небольшой образец серной жизни был доставлен сюда из чужого мира. Она прижилась вокруг геотермальных источников энергии."
 leader_trait_mem_towers_brigadier:0 "Бригадир"
 leader_trait_mem_towers_brigadier_desc:0 "Этот ИИ был разработан для управления и оптимизации сбора и переработки мусора в планетарном масштабе."
 decision_mem_towers_transplant:1 "Перемещение Серы"
 decision_mem_towers_transplant_desc:1 "Пересадите кусок экосистемы на основе серы из далекого токсичного мира. \nВы не сможете удалить эту £blocker£ §RОсобенность§!."
 mem_towers_unfit_for_transplant:1 "Должна быть обычная планета"
 mem_towers_cant_remove_deposit: "Эта £blocker£ особенность не может быть удалена."
