l_russian:

 SCFE_ROOTS_PROJECT_1: "Инициатива орбитального господства"
 SCFE_ROOTS_PROJECT_1_DESC: "Поскольку ситуация на §Y[mem_scfe_roots_planet.GetName]§! становится всё более враждебной, санкционировано решительное военное вмешательство. Мы направим тяжеловооружённое военное судно для установления орбитального контроля над колонией. С этой стратегической позиции корабль будет координировать серию агрессивных мер, призванных вернуть планету из-под влияния надвигающихся экологических угроз. Экипаж готов применить тактику от орбитальных бомбардировок до распределения мощных химических агентов, гарантируя уничтожение чужеродных зарослей прежде, чем они смогут представить дальнейшую угрозу нашим имперским амбициям."
 SCFE_ROOTS_PROJECT_2: "Анализ экосистемы"
 SCFE_ROOTS_PROJECT_2_DESC: "В ответ на нарастающие экологические нарушения на §Y[mem_scfe_roots_planet.GetName]§! мы отправляем специализированное научное судно для всестороннего изучения радикально изменившейся экосистемы планеты. Оснащённое новейшими экологическими и биологическими исследовательскими технологиями, оно попытается разгадать тайны стремительных преобразований планеты и изучить возможные способы стабилизации и восстановления среды."
 SCFE_ROOTS_PROJECT_3: "Непоколебимое присутствие"
 SCFE_ROOTS_PROJECT_3_DESC: "Среди сложных экологических и магнитных возмущений на §Y[mem_scfe_roots_planet.GetName]§! мы ощущаем постоянное, загадочное присутствие, пронизывающее планету. Чтобы раскрыть природу этого присутствия, нам нужно сосредоточить на нём наши мысли, стремясь понять и, возможно, установить контакт с этой неуловимой сущностью."
 SCFE_ROOTS_PROJECT_4: "Инициатива экологического восстановления"
 SCFE_ROOTS_PROJECT_4_DESC: "После силового военного вмешательства, значительно нарушившего экосистему §Y[mem_scfe_roots_planet.GetName]§!, мы инициировали комплексный реабилитационный проект. Эта инициатива направлена на устранение ущерба, причинённого нашими прежними агрессивными действиями, и восстановление жизненной силы среды планеты. Используя передовые технологии экологического восстановления и команду преданных своего дела экологов, проект стремится восстановить естественный баланс и способствовать восстановлению флоры и фауны планеты."
 SCFE_ROOTS_PROJECT_5: "Восстановление магнитного поля"
 SCFE_ROOTS_PROJECT_5_DESC: "Понимая, что дестабилизация магнитного поля планеты сыграла ключевую роль в пробуждении и боли гештальтного сознания, наши учёные предлагают амбициозный проект по восстановлению магнитного поля в исходное состояние, надеясь стабилизировать экосистему и успокоить планетарное сознание."
 SCFE_ROOTS_PROJECT_6: "Целевое уничтожение"
 SCFE_ROOTS_PROJECT_6_DESC: "Используя данные, собранные в ходе обширного анализа, наши учёные разработали план проведения целевых химических диффузий против ключевых узлов гештальтного сознания. Этот агрессивный подход направлен на подрыв способности гештальта причинять вред, обеспечивая безопасность и сохранение колонии."
 SCFE_ROOTS_PROJECT_7: "Псионическая атака"
 SCFE_ROOTS_PROJECT_7_DESC: "Мы используем наши псионические способности для запуска ментальной атаки, стремясь уничтожить гештальт, чтобы он не мог представлять угрозу нашей колонии."
 SCFE_ROOTS_PROJECT_8: "Подчинение гештальта"
 SCFE_ROOTS_PROJECT_8_DESC: "Мы попытаемся подчинить гештальт, склонив его волю на службу империи и интегрировав его возможности для повышения производительности и обороноспособности колонии."
 SCFE_ROOTS_PROJECT_9: "Ассимиляция планетарного гештальта"
 SCFE_ROOTS_PROJECT_9_DESC: "Мы попытаемся мирно ассимилировать гештальт в наше коллективное сознание, слив его сознание с нашим."
 decision_mem_scfe_restore_magnetic_field: "$SCFE_ROOTS_PROJECT_5$"
 decision_mem_scfe_restore_magnetic_field_desc: "Мы можем восстановить магнитное поле этой планеты, сделав её более пригодной для жизни."
 decision_mem_scfe_connect_with_nature: "Слияние с природой"
 decision_mem_scfe_connect_with_nature_desc: "Мы расширим наше сознание и соединимся со всей экосистемой, чтобы убедить флору расти за пределы своих возможностей."
 decision_mem_scfe_draw_from_nature: "Черпание из природы"
 decision_mem_scfe_draw_from_nature_desc: "Мы расширим наше сознание и соединимся со всей экосистемой, чтобы заставить её добывать минералы из недр."
 mem_scfe_rooted_magnetic_field: "$weak_magnetic_field$"
 mem_scfe_rooted_magnetic_field_desc: "Магнитное поле этого места недавно ослабло, снизив защиту от радиации."
 mem_scfe_rooted_nature: "$mem_scfe_roots.2.name$"
 mem_scfe_rooted_nature_desc: "Посевы пышно растут с беспрецедентной скоростью, обеспечивая рекордные урожаи, но местная флора теперь вторгается в обрабатываемые земли, переплетаясь с посевами и усложняя сбор урожая."
 mem_scfe_rooted_nature_maintenance: "$mem_scfe_roots.2.name$"
 mem_scfe_rooted_nature_maintenance_desc: "Местная флора пышно растёт с беспрецедентной скоростью и иногда пробивается внутрь наших инфраструктур, требуя дополнительных затрат на обслуживание."
 mem_scfe_rooted_doom: "Обречённый мир"
 mem_scfe_rooted_doom_desc: "Природа восстала против нас, отбрасывая нас обратно в космос."
 mem_scfe_rooted_crime: "Агитация"
 mem_scfe_rooted_crime_desc: "Окружающая среда этой планеты вызвала нарастающую волну агитации и беспорядков среди населения."
 mem_scfe_rooted_bleak: "$bleak_planet$"
 mem_scfe_rooted_bleak_desc: "$bleak_planet_desc$"
 mem_scfe_rooted_craters: "Богатые кратеры"
 mem_scfe_rooted_craters_desc: "Поверхность усеяна крупными кратерами, обнажающими богатые минеральные жилы."
 mem_scfe_rooted_death: "Смертоносная экосистема"
 mem_scfe_rooted_death_desc: "Экосистема этой планеты эволюционировала так, чтобы уничтожать любое разумное существо, осмелившееся приземлиться на ней."
 mem_scfe_roots_chain_title: "Пробуждающаяся природа"
 mem_scfe_roots_chain_desc: "Природа пробуждается на [mem_scfe_roots_planet.GetName]. Нам нужно понять её или встретить лицом к лицу."
 mem_scfe_roots.2.name: "Аномалии флоры"
 mem_scfe_roots.2.desc: "По мере развития нашей колонии на §Y[mem_scfe_roots_planet.GetName]§! наши учёные сообщили о необычном явлении. Недавнее ослабление магнитного поля планеты, по-видимому, неожиданно повлияло на местную растительность."
 mem_scfe_roots.2.desc1: "$mem_scfe_roots.2.desc$ Посевы пышно растут с беспрецедентной скоростью, обеспечивая рекордные урожаи. Однако этот стремительный рост не обходится без осложнений. Местная флора теперь вторгается в обрабатываемые земли, переплетаясь с посевами и усложняя сбор урожая."
 mem_scfe_roots.2.desc2: "$mem_scfe_roots.2.desc$ Местная флора пышно растёт с беспрецедентной скоростью и иногда пробивается внутрь наших инфраструктур, требуя дополнительных затрат на обслуживание."
 CONCERNING: "Тревожно."
 mem_scfe_roots.4.name: "Инцидент внезапного буйного роста"
 mem_scfe_roots.4.desc: "Тревожное сообщение только что поступило в наше управление от §Y[mem_scfe_roots_planet.GetName]§! За одну ночь массивное дерево местного вида прорвало конструкцию одного из наших ключевых объектов, выведя его из строя и причинив значительный ущерб. Этот случай беспрецедентен и говорит о том, что прежние флуктуации магнитного поля планеты могут влиять не только на скорость роста местной флоры. Необходимы немедленные действия, чтобы понять и, возможно, сдержать это агрессивное ботаническое поведение."
 mem_scfe_roots.4.a: "Немедленно пришлите помощь."
 mem_scfe_roots.5.name: "Агитация"
 mem_scfe_roots.5.desc: "На §Y[mem_scfe_roots_planet.GetName]§! произошли интригующие события среди нашего населения. По мере того как местная флора претерпевает драматические изменения из-за смещения магнитного поля планеты, наша колония столкнулась с резким ростом населения, о чём свидетельствует беспрецедентный прирост рождаемости. Однако это явление сопровождается нарастающей волной агитации и беспорядков среди населения. Первоначальная оценка указывает на психобиологическую реакцию на изменение окружающей среды, влияющую на настроение и поведение. Ситуация ухудшается: по мере нарастания напряжённости растёт преступность. Мы рекомендуем немедленно распределить лёгкие седативные препараты, чтобы стабилизировать ситуацию, пока не будет найдено более постоянное решение."
 mem_scfe_roots.8.name: "Драматические преобразования"
 mem_scfe_roots.8.desc: "Трансформация экосистемы §Y[mem_scfe_roots_planet.GetName]§! достигла тревожных новых крайностей. По всем континентам из почвы вырвались колоссальные грибковые башни, доминируя над ландшафтом своим внушительным присутствием. В океанах вращаются обширные водовороты гигантских водорослей, зловеще изменяя морские экосистемы. На фоне этих тревожных изменений участились тревожные сообщения о исчезновениях: граждане исчезают всё большими числами. Стремительная эволюция флоры и фауны планеты, похоже, выходит из-под контроля."
 mem_scfe_roots.8.a: "С меня хватит. Эвакуируйте колонию."
 mem_scfe_roots.8.b: "Сожжём всё это, какой бы ценой ни было."
 mem_scfe_roots.8.c: "Пусть наши учёные решат проблему."
 mem_scfe_roots.8.d: "Погодите... есть нечто."
 mem_scfe_roots.9.name: "Война против природы"
 mem_scfe_roots.9.desc: "Наши агрессивные тактики нарушили экосистему планеты, спровоцировав яростную ответную реакцию. Однако этот ответ обнажил ранее скрытые подземные узлы, идентифицированные как центральные для экологического потрясения. Используя наше передовое вооружение, мы нанесли удары по этим узлам и уничтожили их, эффективно нейтрализовав немедленную угрозу. С уничтожением каждого узла мы наблюдали значительное снижение активности враждебной флоры, кульминацией чего стало прекращение экологического возмущения. Хотя экосистема планеты сильно повреждена и нуждается в обширных восстановительных работах, потрясение открыло новую возможность: кратеры, оставленные нашими ударами, богаты ценными минералами, что представляет новый ресурсный потенциал."
 mem_scfe_roots.9.a: "Восстановить экосистему."
 mem_scfe_roots.9.b: "Эксплуатировать эти минералы."
 mem_scfe_roots.10.name: "Исход"
 mem_scfe_roots.10.desc: "Поскольку ситуация на §Y[mem_scfe_roots_planet.GetName]§! стремительно ухудшается, принято решение об эвакуации колонии. Непредсказуемые и опасные заросли представляют слишком большой риск, чтобы оправдывать дальнейшее проживание. Первые челнокы готовы транспортировать наших граждан в безопасное место, пока мы неохотно оставляем попытки приручить этот некогда многообещающий мир."
 mem_scfe_roots.10.t: "Переместите колонистов на другие миры до конца!"
 mem_scfe_roots.11.name: "Мир возрождённый"
 mem_scfe_roots.11.desc: "Наши целенаправленные усилия по восстановлению опустошённой экосистемы §Y[mem_scfe_roots_planet.GetName]§! принесли плоды. Планета, некогда изуродованная нашими агрессивными вмешательствами, теперь снова кишит жизнью. Обширные реабилитационные проекты — от лесовосстановления до реинтродукции местной фауны — успешно оживили природный порядок планеты. Реки текут чистыми и прозрачными, леса расширяются за горизонтами, а воздух наполнен звуками процветающей дикой природы. Это замечательное восстановление не только стабилизировало экологические сети, но и превратило этот мир в маяк устойчивости и гармонии."
 mem_scfe_roots.12.name: "Сверкающие минералы"
 mem_scfe_roots.12.desc: "Поскольку экосистема §Y[mem_scfe_roots_planet.GetName]§! значительно изменилась из-за наших прежних вмешательств, стратегически принято решение сместить фокус на эксплуатацию вновь обнажившихся минеральных жил планеты. Этот выбор открывает существенные экономические возможности. Обширные сверкающие кратеры, оставленные нашими бомбардировками, теперь рассматриваются не как шрамы, а как ценные активы. Горнодобывающие операции расширяются, чтобы использовать эти богатые минеральные ресурсы, что обещает значительную выгоду нашей империи и обеспечит критически важный запас материалов для нашего дальнейшего расширения и технологического прогресса."
 mem_scfe_roots.13.name: "Планетарное пробуждение"
 mem_scfe_roots.13.desc: "Всесторонний анализ, проведённый нашей научной командой, раскрыл поразительную истину об экосистеме §Y[mem_scfe_roots_planet.GetName]§!. Каждый элемент флоры планеты является частью обширной взаимосвязанной сети — планетарного гештальтного сознания, которое доселе пребывало в спячке. Наши колонизационные усилия в сочетании с дестабилизирующим воздействием меняющегося магнитного поля планеты непреднамеренно нанесли глубокие раны этой разумной сущности. Гештальт теперь пробуждается и страдает, провоцируя недавние разрушительные события."
 mem_scfe_roots.13.a: "Мы вторглись в его мир. Мы должны уйти."
 mem_scfe_roots.13.b: "Восстановить магнитное поле."
 mem_scfe_roots.13.c: "Враг замечен. Сжечь его."
 mem_scfe_roots.14.name: "Химическое подавление"
 mem_scfe_roots.14.desc: "В ходе взвешенной и решительной кампании наша империя успешно нейтрализовала гештальтное сознание на §Y[mem_scfe_roots_planet.GetName]§! с помощью стратегического применения целевых химических диффузий. Эта радикальная мера эффективно подавила некогда живую и взаимосвязанную экосистему, сделав планету усмирённой, но экологически ослабленной. Хотя немедленная угроза, исходившая от гештальта, устранена, окружающая среда несёт шрамы наших вмешательств. Тем не менее планета остаётся под нашим контролем, а её оставшиеся ресурсы теперь более доступны для эксплуатации без осложнений, связанных с разумной экосистемой."
 mem_scfe_roots.15.name: "Восстановление магнитного поля"
 mem_scfe_roots.15.desc: "Благодаря неустанным усилиям наших учёных и инженеров мы успешно восстановили магнитное поле §Y[mem_scfe_roots_planet.GetName]§! в исходное состояние. Это монументальное достижение знаменует поворотный момент в нашем управлении планетой. Стабилизация магнитного поля не только успокоила экологические беспорядки, но и оживила природные циклы и процессы планеты. Первые сообщения указывают на значительное снижение эпизодической активности флоры и фауны, а экосистема начинает проявлять признаки восстановления и баланса."
 mem_scfe_roots.16.name: "Через пятый глаз"
 mem_scfe_roots.16.desc: "Наше ментальное исследование принесло глубокие прозрения о взаимосвязанной природе жизни на §Y[mem_scfe_roots_planet.GetName]§!. Мы обнаружили, что все биологические сущности здесь связаны с обширным, спящим гештальтным сознанием, которое сейчас пробуждается. Стремительные экологические изменения, вызванные нашей колонией, непреднамеренно причинили ему великую боль. Обладая этими знаниями, мы должны решить, как действовать дальше."
 mem_scfe_roots.16.a: "Начать ментальную атаку."
 mem_scfe_roots.16.b: "Попытаться контролировать этот гештальт."
 mem_scfe_roots.16.c: "Попытаться ассимилировать эту сущность."
 mem_scfe_roots.17.name: "Уничтожение гештальта"
 mem_scfe_roots.17.desc: "Наша решительная ментальная атака против гештальтного сознания на §Y[mem_scfe_roots_planet.GetName]§! оказалась успешной. Некогда разумная и взаимосвязанная экосистема, реагировавшая на наше присутствие и изменения окружающей среды страданием, была эффективно нейтрализована. Без влияния гештальта, некогда объединявшего и защищавшего её, флора планеты возвращается к нормальному состоянию, стабилизируясь по всему ландшафту."
 mem_scfe_roots.18.name: "Подчинение гештальта"
 mem_scfe_roots.18.desc: "Используя мощные свойства пыли Зро для усиления наших способностей, мы совершили грандиозный подвиг. Мы успешно подчинили гештальтное сознание §Y[mem_scfe_roots_planet.GetName]§!, склонив его волю к нашей. Эта некогда независимая экосистема со своей сложной сетью жизни теперь служит продолжением контроля нашей империи. Используя всеобъемлющее влияние гештальта на флору и фауну планеты, мы теперь можем превратить этот мир в устроенный рай, идеально подходящий для наших нужд и амбиций. Экосистема, полностью под нашим командованием, обещает нам настоящий рай."
 mem_scfe_roots.19.name: ""
 mem_scfe_roots.19.desc: "Наш разум полностью ассимилировал гештальт §Y[mem_scfe_roots_planet.GetName]§!. Эта интеграция не просто расширила наш когнитивный охват — она фундаментально преобразила нас. Мы возрождены, новое коллективное сознание, простирающееся через каждую травинку на этой планете и устремляющееся сквозь звёзды к каждому дрону под нашим командованием. С этим глубоким единением наше восприятие углубилось, даруя беспрецедентное понимание жизни и бытия. Наша связь теперь выходит за пределы этого мира, ощущая и влияя на флору отдалённых планет, открывая огромные новые возможности."
 mem_scfe_roots.20.name: "Последствия"
 mem_scfe_roots.20.desc: "Хотя экосистема §Y[mem_scfe_roots_planet.GetName]§! серьёзно повреждена, она не безнадёжна, если мы решим приложить достаточно усилий."
 mem_scfe_roots.23.name: "Возмездие природы"
 mem_scfe_roots.23.desc: "Экосистема §Y[mem_scfe_roots_planet.GetName]§! обрушила на нашу колонию всю свою ярость. Гигантские корни разорвали землю, пронзая наши города неудержимой силой. Глубокие трещины раскрылись, поглощая здания и инфраструктуру целиком. Ландшафт теперь представляет собой картину опустошения. Когда пыль оседает, зловещие усики ползут по раздробленной местности, выискивая признаки дальнейших возмущений. Эта планета, ныне живущая крепость, стала негостеприимной и смертоносной для всей чужеродной жизни."
