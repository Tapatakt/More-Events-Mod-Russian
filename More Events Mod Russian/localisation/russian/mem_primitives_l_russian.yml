l_russian:

 mem_primitives.101.name:0 "[mem_primitives_the_planet.GetName]: Один маленький шаг"
 mem_primitives.101.desc:0 "Сегодня наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! стал свидетелем важной вехи в развитии местной примитивной цивилизации: пилотируемый аппарат, запущенный с поверхности планеты, достиг естественного спутника планеты — §Y[mem_primitives_the_moon.GetName]§! Экипаж покинул аппарат на продолжительное время и прошёлся по её поверхности, а [pre_ftl_country.GetSpeciesNamePlural] внизу смотрели с восторгом, когда видео события транслировалось по всему [mem_primitives_the_planet.GetPlanetMoon].\n\nХотя на этой стадии их развития мы не можем ожидать, что такие предприятия смогут установить постоянные посты, тем не менее это значительное достижение для [pre_ftl_country.GetSpeciesNamePlural]."
 mem_primitives.101.sister.desc:0 "Сегодня наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! стал свидетелем важной вехи в развитии местной примитивной цивилизации: пилотируемый аппарат, запущенный с поверхности планеты, достиг другого естественного спутника — §Y[mem_primitives_the_moon.GetName]§! Экипаж покинул аппарат на продолжительное время и прошёлся по поверхности луны. [pre_ftl_country.GetSpeciesNamePlural] смотрели с восторгом, когда видео события транслировалось по всему [mem_primitives_the_planet.GetPlanetMoon].\n\nХотя на этой стадии их развития мы не можем ожидать, что такие предприятия смогут установить постоянные посты, тем не менее это значительное достижение для [pre_ftl_country.GetSpeciesNamePlural]."
 mem_primitives.101.hab.desc:0 "Сегодня наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! стал свидетелем важной вехи в развитии местной примитивной цивилизации: пилотируемый аппарат, запущенный с поверхности планеты, достиг её естественного спутника — §Y[mem_primitives_the_moon.GetName]§! Экипаж покинул аппарат на продолжительное время и прошёлся по поверхности луны — в первый раз [pre_ftl_country.GetSpeciesNamePlural] когда-либо дышали воздухом другого обитаемого мира. [pre_ftl_country.GetSpeciesNamePlural] смотрели с восторгом, когда видео события транслировалось по всему [mem_primitives_the_planet.GetPlanetMoon].\n\nХотя на этой стадии их развития мы не можем ожидать, что такие предприятия смогут установить постоянные посты, тем не менее это значительное достижение для [pre_ftl_country.GetSpeciesNamePlural]."
 mem_primitives.101.hab.sister.desc:0 "Сегодня наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! стал свидетелем важной вехи в развитии местной примитивной цивилизации: пилотируемый аппарат, запущенный с поверхности планеты, достиг другого естественного спутника — §Y[mem_primitives_the_moon.GetName]§! Экипаж покинул аппарат на продолжительное время и прошёлся по её поверхности — в первый раз [pre_ftl_country.GetSpeciesNamePlural] когда-либо дышали воздухом другого обитаемого мира. [pre_ftl_country.GetSpeciesNamePlural] смотрели с восторгом, когда видео события транслировалось по всему [mem_primitives_the_planet.GetPlanetMoon].\n\nХотя на этой стадии их развития мы не можем ожидать, что такие предприятия смогут установить постоянные посты, тем не менее это значительное достижение для [pre_ftl_country.GetSpeciesNamePlural]."
 mem_primitives.101:0 "Поздравляем."
 mem_primitives.101.phobe:0 "Почему они не могут держать свою грязь при себе?"
 mem_primitives.101.mat:0 "Они на верном пути."
 mem_primitives.101.matphile:0 "Они так быстро растут!"
 mem_primitives.301.name:0 "[mem_primitives_the_planet.GetName]: Глобальный конфликт"
 mem_primitives.301.desc:0 "Сегодня знаменуется новая эра §Y[pre_ftl_country.GetName]§! После длительного периода напряжённости довольно незначительный дипломатический инцидент спровоцировал массивный конфликт между несколькими международными блоками. Почти весь [mem_primitives_the_planet.GetPlanetMoon] теперь вовлечён в конфликт, число жертв, по прогнозам, превысит любой другой инцидент, который они могли бы устроить сами себе. \n\nПредстоит увидеть, кто выйдет из этого конфликта победителем, но несомненно, эти тяжёлые испытания окажут глубокое влияние на историю [mem_primitives_the_planet.GetPlanetMoon]."
 mem_primitives.303.name:0 "[mem_primitives_the_planet.GetName]: Война окончена"
 mem_primitives.303.desc:0 "Кровавый конфликт, бушевавший некоторое время на §Y[mem_primitives_the_planet.GetName]§!, наконец подошёл к концу. Мирный договор, подписанный сегодня, вызвал масштабные изменения в политическом ландшафте, несколько наций поднялись к величию или упали в ничтожество за одну ночь. \n\nНо это ли конец? Измученные масштабными репарационными выплатами, унижением и территориальными потерями, побеждённые несомненно будут планировать месть, как только смогут набраться сил."
 mem_primitives.303a:0 "Перемирие на 20 лет."
 mem_primitives.305.name:0 "[mem_primitives_the_planet.GetName]: Чтобы покончить со всеми войнами"
 mem_primitives.305.desc:0 "Конфликт, бушевавший среди §Y[From.GetSpeciesNamePlural]§!, некоторое время был в тупике, все стороны понесли катастрофические потери как в личном составе, так и в экономике. \n\nСегодня, кажется, он наконец подошёл к концу с подписанием белого мира между воюющими сторонами. С травматическими воспоминаниями о войне, свежими в умах населения, люди [mem_primitives_the_planet.GetPlanetMoon] отвернулись от военной агрессии и увидели взаимопонимание как путь вперёд, надеясь никогда больше не испытывать ужасы войны."
 mem_primitives.305a.milphobe:0 "Позорное представление."
 mem_primitives.305a.pacphile:0 "В конце концов, они увидели свет."
 mem_primitives.307.name:0 "[mem_primitives_the_planet.GetName]: Новый глобальный конфликт"
 mem_primitives.307.desc:0 "Сегодня хрупкий мир на §Y[mem_primitives_the_planet.GetName]§! вновь нарушен. Нация, понёсшая наиболее унизительное поражение в предыдущем конфликте и столкнувшаяся с основной тяжестью трудностей, которые он принёс, недавно попала под контроль ультранационалистического правительства во главе с харизматичным лидером. Она демонстрировала агрессию уже некоторое время, но на этот раз другие крупные нации наконец решили, что умиротворение должно прекратиться. \n\nВооружённые яростным фанатизмом своего народа и продвинутыми военными доктринами, эти реваншисты стали формидабельной силой, поддерживаемой блоком столь же обиженных наций, но только время покажет, хватит ли им сил вести войну практически со всем миром и перевернуть свою историю."
 mem_primitives.307a:0 "Мы знали, что это когда-то случится."
 mem_primitives.309.name:0 "[mem_primitives_the_planet.GetName]: Второй мир"
 mem_primitives.309.desc:0 "Война, бушевавшая на §Y[mem_primitives_the_planet.GetName]§!, подошла к концу. Похоже, история §Y[pre_ftl_country.GetName]§! склонна к повторениям, тот же блок, который выиграл первую глобальную войну, выиграл и вторую. \n\nС агрессорами стёртыми в пыль и их идеологиями тщательно дискредитированными, мы можем ожидать, что это станет одним из главных поворотных пунктов их цивилизации."
 mem_primitives.311.name:0 "[mem_primitives_the_planet.GetName]: Новый мировой порядок"
 mem_primitives.311.desc:0 "Несмотря на все шансы против них, агрессивный блок, начавший глобальный конфликт на §Y[mem_primitives_the_planet.GetName]§!, вышел победителем. \n\nОни могут не контролировать весь [mem_primitives_the_planet.GetPlanetMoon], но они восстановили свой статус и вышли доминирующей силой. С их националистической риторикой подтверждённой и их военными преступлениями замятыми под ковёр, мы можем ожидать глубокого изменения курса §Y[from.GetSpeciesNamePlural]§!."
 mem_primitives.401.name:0 "[mem_primitives_the_planet.GetName]: Религиозное развитие"
 mem_primitives.401.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! заметил серьёзный сдвиг в развитии §Y[pre_ftl_country.GetName]§!. \n\nКульт, ранее бывший меньшинством и основанный мистиком, казнённым за своё мятежное поведение, расцвет в крупную религию и распространился далеко и широко. Популярный среди бедных и обездоленных, он учит прощению и терпимости как основным ценностям и обещает небесные награды в загробной жизни тем, кто ведёт добродетельную жизнь. \n\nТеперь, когда он достиг значимости и стал мощной общественной силой, мы можем ожидать, что его ценности сместятся к более гегемонистским взглядам."
 mem_primitives.401a.mat:0 "Неужели мы были такими же глупыми?"
 mem_primitives.401a.sp:0 "Посмотрим, на правильном ли они пути."
 mem_primitives.401a.sphile:0 "Они приходят к истине по-своему."
 mem_primitives.401a.sphobe:0 "В конце концов, мы разберёмся с этой ересью."
 mem_primitives.403.name:0 "[mem_primitives_the_planet.GetName]: Религиозное развитие"
 mem_primitives.403.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! заметил серьёзный сдвиг в развитии §Y[pre_ftl_country.GetName]§!. \n\nРелигия, основанная племенным военным вождём-мистиком, распространилась по большим регионам через завоевание и обращение. Воинствующая вера, она тесно переплетена с государственным управлением и возносит дисциплину и готовность приносить жертвы для обеспечения её распространения по всему миру, обещая рай тем, кто падает, сражаясь во имя её."
 mem_primitives.405.name:0 "[mem_primitives_the_planet.GetName]: Религиозное развитие"
 mem_primitives.405.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! заметил серьёзный сдвиг в развитии §Y[pre_ftl_country.GetName]§!. \n\nНовая религия набирает значимость по всему [mem_primitives_the_planet.GetPlanetMoon], сосредоточиваясь на поиске внутреннего мира через самоанализ и аскетизм. Веря, что все души обречены бесконечно перерождаться снова и снова, она обещает своим последователям шанс вырваться из бесконечного цикла реинкарнации и достичь вечного блаженства в небытии."
 mem_primitives.407.name:0 "[mem_primitives_the_planet.GetName]: Религиозное развитие"
 mem_primitives.407.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! заметил серьёзный сдвиг в развитии §Y[pre_ftl_country.GetName]§!. \n\nКвазирелигиозное учение, сочетающее религиозную оболочку с псевдонаучной подачей, набирает популярность среди элит. Оно учит, что большинство проблем, изводящих общество, происходят от инопланетной деятельности в прошлом [mem_primitives_the_planet.GetPlanetMoon], более конкретно — от инопланетного правителя, который совершил массовое убийство своих подданных на поверхности [mem_primitives_the_planet.GetPlanetMoon]. \n\nПредположительно, призраки мёртвых инопланетян теперь преследуют [mem_primitives_the_planet.GetName], вызывая душевные страдания среди населения."
 mem_primitives.407a:0 "Нелепость. Мы этого не делали."
 mem_primitives.501.name:0 "[mem_primitives_the_planet.GetName]: Чума"
 mem_primitives.501.desc:0 "Мы обнаруживаем новый штамм высоковирулентных бактерий на §Y[mem_primitives_the_planet.GetName]§!. Высокозаразная болезнь распространяется по [mem_primitives_the_planet.GetPlanetMoon] как лесной пожар, и с медицинской наукой столь примитивной, как у [pre_ftl_country.GetName], она потенциально может уничтожить всё население. \n\nКонечно, с нашими продвинутыми медицинскими знаниями нам было бы легко остановить её распространение, если бы мы были так склонны."
 mem_primitives.501a:0 "Начать разработку лекарства."
 mem_primitives.501b:0 "Нам не стоит вмешиваться."
 mem_primitives.501b.phobe:0 "Вещи ломаются, пришельцы умирают."
 mem_primitives.503.name:0 "[from.GetSpeciesNamePlural] вымерли"
 mem_primitives.503.desc:0 "Пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! сообщает, что последние разумные существа на [mem_primitives_the_planet.GetPlanetMoon] были уничтожены чумой, опустошавшей её население. §Y[from.GetSpeciesNamePlural]§! теперь официально считаются вымершими, и пост наблюдения был демонтирован, так как больше нечего наблюдать. \n\nЧума не опасна для наших собственных граждан, так что мы свободны колонизировать [mem_primitives_the_planet.GetPlanetMoon], если мы так склонны."
 mem_primitives.503a.phobe:0 "Вещи ломаются, пришельцы умирают."
 mem_primitives.503a.matphobe:0 "Они проиграли в игре под названием - эволюция."
 mem_primitives.505.name:0 "[mem_primitives_the_planet.GetName]: Чума окончена"
 mem_primitives.505.desc:0 "Мы больше не видим новых случаев чумы, которая опустошала поверхность §Y[mem_primitives_the_planet.GetName]§!. Вероятно, она закончилась из-за отсутствия жизнеспособных носителей, оставив позади тех, кто обладает естественным иммунитетом."
 mem_primitives.506.name:0 "[mem_primitives_the_planet.GetName]: Лекарство доставлено"
 mem_primitives.506.desc:0 "[Root.GetName] успешно распылил синтетическую вакцину в атмосферу [mem_primitives_the_planet.GetPlanetMoon], разработанную специально для борьбы с чумой, опустошавшей §Y[mem_primitives_the_planet.GetName]§!. \n\nМы ожидаем, что уровень заражения упадёт до нуля в течение месяца. Чума фактически окончена."
 MEM_PRIMITIVES_BD_CURE_PROJECT:0 "Вакцинация"
 MEM_PRIMITIVES_BD_CURE_PROJECT_DESC:0 "Синтетическая вакцина, разработанная в наших лабораториях, может быть тайно распылена в атмосферу [mem_primitives_the_planet.GetPlanetMoon], предотвращая потенциальное уничтожение её примитивного населения."
 mem_primitives.601.name:0 "[mem_primitives_the_planet.GetName]: Разрушительная террористическая атака"
 mem_primitives.601.desc:0 "§Y[pre_ftl_country.GetName]§! сегодня пережила значительное событие с массовыми жертвами. Несколько радикализированных граждан атаковали крупный культурный и экономический центр на §Y[mem_primitives_the_planet.GetName]§!, вызвав, возможно, самое разрушительное террористическое происшествие в истории [mem_primitives_the_planet.GetPlanetMoon]. \n\nС числом жертв в тысячи и образами горящих зданий, свежими в умах населения, это событие, вероятно, станет поворотным пунктом в истории этой цивилизации."
 mem_primitives.601a.mil:0 "Похоже на то, что кто-то устал от дипломатии..."
 mem_primitives.601a.pacphobe:0 "По крайней мере, мы переросли такую дикость. Правильно?"
 mem_primitives.603.name:0 "[mem_primitives_the_planet.GetName]: Атомный террор!"
 mem_primitives.603.desc:0 "Экипаж поста наблюдения над §Y[mem_primitives_the_planet.GetName]§! сообщил, что сегодня стал свидетелем массивного взрыва. Они беспокоились, что туземцы собираются уничтожить себя ядерным оружием, но стало ясно, что это изолированный инцидент. По-видимому, несколько радикалов украли мощное ядерное устройство у военных и использовали его для уничтожения одного из населённых пунктов на поверхности [mem_primitives_the_planet.GetPlanetMoon].\n\nСобытие таких масштабов определённо изменит историю [pre_ftl_country.GetName]."
 mem_primitives.701.name:0 "[mem_primitives_the_planet.GetName]: Цифровая катастрофа"
 mem_primitives.701.desc:0 "Пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! сообщает о каскаде сбоев в инфраструктуре [mem_primitives_the_planet.GetPlanetMoon]. \n\n§Y[pre_ftl_country.GetName]§!, который относительно недавно принял широкое использование электронных компьютеров, но был явно плохо подготовлен к надлежащей обработке изменения даты — поскольку наступило новое тысячелетие, номер года переполнил их переменные, сбросив дату на ноль. \n\nНаши исследователи сообщают о закрытии большинства коммуникационной инфраструктуры и нарушении транспорта и коммунальных услуг, а также о выходе из строя нескольких атомных электростанций. С экстренными патчами, поставляемыми, это событие вряд ли уничтожит цивилизацию, но оно определённо повлияет на их восприятие технологий."
 mem_primitives.701a:0 "Очень жаль."
 mem_primitives.701a.sp:0 "Они вкладывают слишком много веры в машины."
 mem_primitives.701a.sphobe:0 "Они заплатили цену за то, что положились на бездушные машины."
 mem_primitives.701a.mat:0 "Поразительная некомпетентность..."
 mem_primitives.701a.matphile:0 "Они пройдут через это и научатся."
 mem_primitives.701.a.tooltip:0 "[pre_ftl_country.GetSpeciesNamePlural] теряют часть прогресса на пути к следующей эпохе."
 mem_primitives.801.name:0 "[mem_primitives_the_planet.GetName]: Падение империи"
 mem_primitives.801.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! сообщает, что [pre_ftl_country.GetSpeciesAdj] цивилизация доминировалась единой крупной империей почти тысячелетие. С территорией, охватывающей более пятой части обитаемой поверхности мира и содержащей почти треть всех [pre_ftl_country.GetSpeciesNamePlural] на пике своего расцвета, она была центром обучения и культуры. Города были построены, технологии открыты и достигнуты новые уровни процветания.\n\nОднако за последние пятьдесят лет, кажется, империя ослабла. Сочетание внутренних раздоров и недавно возвысившихся внешних врагов, стремящихся заполучить часть их богатств, положило империю низ. Недавно большая сила того, что [pre_ftl_country.GetSpeciesAdj] интеллигенция считает \"варварами\", проникла в сердце империи и разграбила столицу, прежде чем громить имперские сердцевины, грабя без оглядки.\n\nХотя \"варвары\" позже отступили, мы не верим, что империя просуществует долго. Это могло бы значительно отбросить [pre_ftl_country.GetSpeciesNamePlural] назад."
 mem_primitives.801a:0 "Очень жаль."
 mem_primitives.801a.materialist:0 "Прогресс - тернистый путь."
 mem_primitives.801a.sphobe:0 "Кого это волнует?"
 mem_primitives.801.tooltip:0 "[from.GetSpeciesNamePlural] вернулись к бронзовому веку."
 mem_primitives.801.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! сообщает, что [pre_ftl_country.GetSpeciesAdj] цивилизация доминировалась единой крупной империей почти тысячелетие. С территорией, охватывающей более пятой части обитаемой поверхности мира и содержащей почти треть всех [pre_ftl_country.GetSpeciesNamePlural] на пике своего расцвета, она была центром обучения и культуры. Города были построены, технологии открыты и достигнуты новые уровни процветания.\n\nОднако за последние пятьдесят лет, кажется, империя ослабла. Сочетание внутренних раздоров и недавно возвысившихся внешних врагов, стремящихся заполучить часть их богатств, положило империю низ. Недавно большая сила того, что [pre_ftl_country.GetSpeciesAdj] интеллигенция считает \"варварами\", проникла в сердце империи и разграбила столицу, прежде чем громить имперские сердцевины, грабя без оглядки.\n\nХотя \"варвары\" позже отступили, мы не верим, что империя просуществует долго. Это могло бы значительно отбросить [pre_ftl_country.GetSpeciesNamePlural] назад."
 mem_primitives.801.hive.desc:0 "Наш пост наблюдения над §Y[mem_primitives_the_planet.GetName]§! сообщает, что [pre_ftl_country.GetSpeciesAdj] разум-улей доминировался единым крупным сознанием почти тысячелетие. С территорией, охватывающей более пятой части обитаемой поверхности мира и содержащей почти треть всех [pre_ftl_country.GetSpeciesAdj] дронов на пике своего расцвета, оно было центром обучения и культуры. Возвышенные гнёзда были построены, технологии открыты и достигнуты новые уровни процветания.\n\nОднако за последние пятьдесят лет, кажется, сознание ослабло. Сочетание внутреннего отклонения и недавно возвысившихся внешних ульёв, стремящихся заполучить часть территории и дронов доминирующего улья, положило сознание низ. Недавно большая сила особенно жестоких дронов, которых [pre_ftl_country.GetSpeciesAdj] обозначили как \"варваров\", проникла глубоко на территорию сознания и разграбила центральный нексус, прежде чем громить сердцевины улья, убивая безжалостно.\n\nХотя \"варвары\" позже отступили, они нанесли смертельный удар, оставив сознание на смертном одре. Это могло бы значительно отбросить [pre_ftl_country.GetSpeciesNamePlural] назад."
 mem_primitives.801a.materialist:0 "Прогресс - тернистый путь."
