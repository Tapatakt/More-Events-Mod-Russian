l_russian:

 mem_ancient_factory_category:0 "Необычное строение"
 mem_ancient_factory_category_desc:0 "Недалеко от экватора [From.GetName] обнаружено нечто, похожее на большой комплекс каменных сооружений."
 mem_ancient_factory.10.name:0 "Заброшенная фабрика"
 mem_ancient_factory.10.desc:0 "Согласно обследованию научного сотрудника [Root.leader.GetName], странные скальные образования на [From.GetName] вовсе не скальные образования. На самом деле это какой-то автоматизированный мега-завод, построенный неизвестными создателями и, судя по его запущенному состоянию, заброшенный давным-давно. Несмотря на то, что он слишком повреждён, чтобы быть переоборудованным для наших нужд, дальнейшее изучение комплекса может быть полезным для наших собственных фабрик и систем автоматизации."
 mem_ancient_factory.20.name:0 "Необычное строение"
 mem_ancient_factory.20.desc:0 "Необычные каменные строения на [From.From.GetName] оказались всего лишь каменными образованиями. Они похожи на, своего рода, обособленную пустошь, слишком маленькую, для того чтобы сканеры выделили её как самостоятельный регион."
 mem_ancient_factory.20.a:0 "Хорошо."
