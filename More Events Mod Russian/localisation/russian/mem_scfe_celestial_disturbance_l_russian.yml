l_russian:

 mem_scfe_celestial_disturbance_chain_title:0 "Небесное возмущение"
 mem_scfe_celestial_disturbance_chain_desc:0 "Аномальные характеристики этой системы требуют дальнейшего расследования."
 sc_mem_scfe_binary_1: "$sc_binary_1$"
 mem_scfe_celestial_disturbance_clues: "Найдены улики"
 mem_scfe_celestial_disturbance_system_name: "Вех'йщи"
 mem_scfe_celestial_disturbance_home_name: "Ва'дьялна"
 mem_scfe_celestial_disturbance_home_moon_name: "Тел'каларин"
 mem_scfe_celestial_disturbance.2.name: "Возмущённая система"
 mem_scfe_celestial_disturbance.2.desc: "Войдя в систему, сканеры нашего корабля обнаруживают необычную небесную конфигурацию. В её центре находится поразительная двойная система, состоящая из нейтронной звезды и звезды класса M. Орбиты планет в системе кажутся крайне неправильными, что указывает на то, что нейтронная звезда появилась недавно, вызвав значительные гравитационные возмущения. Экипаж горит желанием начать тщательное исследование, чтобы изучить последствия этих изменений и раскрыть любые тайны, которые может хранить система."
 mem_scfe_celestial_disturbance.3.name: "Замёрзший мир"
 mem_scfe_celestial_disturbance.3.desc: "Наша команда считает, что эта планета изначально не была так далека от своего солнца, и сканы подтверждают это. Планета §Y[From.GetName]§! теперь — замёрзшая пустошь, её поверхность покрыта километровым слоем льда. Сканы показывают, что когда-то она была обитаемой, вращаясь ближе к своему солнцу, прежде чем гравитационные потрясения, вызванные появлением нейтронной звезды, выбросили её на текущую далёкую орбиту. Глубоко под льдом сканеры обнаруживают остатки древних сооружений, указывающие на то, что здесь когда-то процветала развитая цивилизация. Однако раскопки этих руин потребуют значительных ресурсов и усилий. Но это ещё не всё..."
 mem_scfe_celestial_disturbance.4.name: "Любопытный эксперимент"
 mem_scfe_celestial_disturbance.4.desc: "На этой луне мы обнаружили научный комплекс, представляющий большой интерес. Главная лаборатория лунной базы содержит впечатляющее и загадочное устройство. После тщательного расследования §G[Root.Leader.GetName]§! определяет, что это устройство было частью амбициозного эксперимента по созданию гиперполосы. Утраченная цивилизация пыталась создать собственные пути к звёздам, но в конечном итоге потерпела неудачу, оставив исследования, так как появление нейтронной звезды заставило их пересмотреть приоритеты."
 mem_scfe_celestial_disturbance.5.name: "Возмущённый гигант"
 mem_scfe_celestial_disturbance.5.desc: "Этот газовый гигант всё ещё показывает следы прохождения нейтронной звезды в этой системе. Сканирование §Y[From.GetName]§! выявляет, что газовый гигант претерпел значительные изменения из-за разрушительного влияния нейтронной звезды. Гравитационное потрясение заставило планету потерять большинство своих лун. Некоторые были выброшены из звёздной системы, а другие сблизились слишком сильно с гигантом и были разорваны, образовав вокруг него впечатляющую кольцевую систему. Среди обломков мы нашли редкие минералы и собрали их."
 mem_scfe_celestial_disturbance.6.name: "Одинокая луна"
 mem_scfe_celestial_disturbance.6.desc: "Среди останков некогда многочисленных лун газового гиганта на орбите выжила лишь одна. Сканы луны выявляют следы древней горнодобывающей операции, сильно повреждённой метеоритным бомбардированием. Объект в значительной степени разрушен, и зацепок осталось мало."
 mem_scfe_celestial_disturbance.7.name: "Расплавленный мир"
 mem_scfe_celestial_disturbance.7.desc: "§Y[From.GetName]§!, ныне ближайшая планета к двойному солнцу, когда-то находилась дальше. Появление нейтронной звезды резко изменило её орбиту, приблизив к смертельному жару и излучению звёзд. Поверхность планеты расплавилась, превратившись в адский пейзаж. Любые следы прежних сооружений или жизни уничтожены, оставив бесплодную расплавленную пустошь."
 mem_scfe_celestial_disturbance.8.name: "Первоначальная звезда"
 mem_scfe_celestial_disturbance.8.desc: "§Y[From.GetName]§!, первоначальная звезда этой системы, теперь разделяет свой путь по галактике с блуждающей нейтронной звездой. Со временем огромное гравитационное притяжение мёртвой звезды откачало часть вещества этой звезды, изменив её состав и поведение."
 mem_scfe_celestial_disturbance.9.name: "Блуждающая звезда"
 mem_scfe_celestial_disturbance.9.desc: "Эта нейтронная звезда является главной причиной драматических возмущений в этой системе. Её интенсивное гравитационное поле периодически притягивает вещество от спутника, что приводит к взрывным реакциям при накоплении достаточного количества материи. К счастью, текущие сканы указывают, что такое событие не неизбежно."
 mem_scfe_celestial_disturbance.11.name: "Разрыв реальности"
 mem_scfe_celestial_disturbance.11.desc_1: "Когда наша команда завершает сканирование планеты, они обнаруживают тонкую брешь в самой ткани реальности, парящую на некотором расстоянии над планетой. Эта аномалия не похожа ни на что, с чем они сталкивались раньше. Наш научный руководитель озадачен этим странным явлением. Она выглядит как тонкая, колеблющаяся брешь в ткани пространства-времени, излучающая слабые пульсирующие энергетические показания. Истинная природа и происхождение этой аномалии остаются загадкой, поскольку наши датчики не могут её понять."
 mem_scfe_celestial_disturbance.11.desc_2: "Когда наша команда завершает сканирование планеты, они обнаруживают тонкую брешь в самой ткани реальности, парящую на некотором расстоянии над планетой. Наш научный руководитель распознаёт явление как разновидность астрального шрама, похожего на встречавшиеся ранее. Однако этот отличается необычно малым масштабом и положением глубоко внутри гравитационного колодца звёздной системы. Несмотря на знакомство с такими разломами, сканеры не могут разобраться в этом, и пока невозможно взаимодействовать с ним или изучать его дальше."
 mem_scfe_celestial_disturbance.12.name: "Тайны подо льдом"
 mem_scfe_celestial_disturbance.12.desc: "Поскольку вся звёздная система теперь полностью исследована, наше внимание переключается на замёрзший мир §Y[mem_scfe_celestial_disturbance_homeworld.GetName]§! и руины, зарытые подо льдом. Эти руины могут хранить ключевые ответы на тайны, окружающие эту систему, и утраченную цивилизацию, некогда процветавшую здесь. Для раскрытия скрытых секретов необходимо более глубокое исследование."
 mem_scfe_celestial_disturbance_site: "$mem_scfe_celestial_disturbance.12.name$"
 mem_scfe_celestial_disturbance_site_desc: "$mem_scfe_celestial_disturbance.12.desc$"
 mem_scfe_celestial_disturbance_site.1.name: "Лагерь развёрнут"
 mem_scfe_celestial_disturbance_site.1.desc: "Базовый лагерь развёрнут на поверхности §Y[From.planet.GetName]§!, прямо над крупнейшими видимыми руинами на северном полюсе. Сканеры указывают на карман горячего воздуха подо льдом, что говорит о том, что город внизу не был раздавлен весом льда. С необходимым оборудованием на месте команда готова начать бурение, чтобы раскрыть тайны, скрытые в древних руинах."
 mem_scfe_celestial_disturbance_site.1.a: "Начать раскопки."
 mem_scfe_celestial_disturbance_site.2.name: "Горячий воздух"
 mem_scfe_celestial_disturbance_site.2.desc: "Научная команда усердно раскапывает обширный город, погребённый подо льдом. Приближаясь к цели, они сталкиваются с необычными условиями. Ранее обнаруженный карман воздуха вокруг города чрезвычайно горяч, заставляя лёд таять. Этот карман на самом деле заполнен горячим паром, поэтому перед проникновением в него необходимы дополнительные меры предосторожности. Руины инопланетного города теперь лежат открытыми, непрерывно заливаемые тёплым дождём и окутанные горячим паром. Надев защитное снаряжение, команда готова исследовать город и разгадать его тайны."
 mem_scfe_celestial_disturbance_site.3.name: "Расплавленная скважина"
 mem_scfe_celestial_disturbance_site.3.desc: "Вскоре был обнаружен источник тепла: большая раскалённая скважина, уходящая глубоко в недра. На её дне сканеры зафиксировали значительное количество расплавленного металла — остатки древнего реактора, который, по-видимому, вышел из строя. Эта скважина расположена прямо под центром межпространственного разлома, вращающегося над планетой, — связь, которую нельзя списать на совпадение. Объяснение этого явления должно находиться где-то среди остатков города."
 mem_scfe_celestial_disturbance_site.4.name: "Музей"
 mem_scfe_celestial_disturbance_site.4.desc: "Суровые условия осложняют исследование, поэтому команда разделяется, чтобы охватить больше территории. Одна группа входит в большое здание, которое оказывается музеем. Хотя древняя история этой цивилизации во многом стёрта временем и водой, им удаётся получить доступ к герметичному помещению, воссоздающему космические исследования этого общества. Наконец наши устройства перевода получают материал, с которым можно работать."
 mem_scfe_celestial_disturbance_site.5.name: "Изоляция"
 mem_scfe_celestial_disturbance_site.5.desc: "История §HЗе'тан§! — это история глубокой трагедии. Они достигли грани галактических исследований, но были остановлены отсутствием гиперланов в своей звёздной системе, оставившим их в изоляции. Несмотря на все усилия, включая попытки создать искусственный гиперлан, каждое начинание терпело неудачу. Будучи глубоко сплочённым народом, они не могли отправить медленные колонизационные корабли с криогенно замороженными людьми: мысль о навсегда потерянной связи с ними была невыносима."
 mem_scfe_celestial_disturbance_site.6.name: "Последняя надежда"
 mem_scfe_celestial_disturbance_site.6.desc: "Другая группа докладывает из практически разрушенного научного комплекса. Они собрали последнюю главу истории Зе'тан. Обнаружив приближающуюся к их звёздной системе блуждающую нейтронную звезду, они поняли, что их гибель неизбежна. Отчаяние подпитало их исследования, приведя к прорыву: созданию разлома в альтернативную вселенную. Как только проход и пункт назначения были признаны безопасными, всё их население было эвакуировано через разлом в эту новую вселенную."
 mem_scfe_celestial_disturbance.13.name: "Заключение"
 mem_scfe_celestial_disturbance.13.desc.a: "Теперь мы ясно понимаем события, произошедшие в этой звёздной системе. По иронии судьбы, нейтронная звезда, предрешившая судьбу зе'таниан, также принесла с собой гиперполосу, вновь соединив эту систему с остальной галактикой."
 mem_scfe_celestial_disturbance.13.desc1: "$mem_scfe_celestial_disturbance.13.desc.a$ Вопрос о разломе остаётся загадкой. Все их исследования уничтожены, и он далеко выходит за рамки нашего нынешнего понимания. Возможно, будущее раскроет ответы, которые открыли зе'таниане."
 mem_scfe_celestial_disturbance.13.a: "Возможно, так оно и есть."
