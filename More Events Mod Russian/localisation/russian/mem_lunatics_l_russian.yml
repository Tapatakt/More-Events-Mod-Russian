l_russian:

 mem_lunatics_category:0 "Приливы безумия"
 mem_lunatics_category_desc:0 "Орбитальные сканы §Y[From.GetName]§! обнаружили древнюю, но нетронутую структуру, которая регулярно подвергается воздействию экстремальных местных приливов. Дальнейшее расследование может раскрыть её назначение."
 tech_mem_lunatics_tidals:0 "Приливное использование"
 tech_mem_lunatics_tidals_desc:0 "Перестройка наших генераторов энергии для активного использования энергии на основе фаз луны может улучшить их выход."
 mem_lunatics.1.name:0 "Акт безумия"
 mem_lunatics.1.desc:0 "Древняя структура регулярно подвергается воздействию экстремальных местных приливов и питается гигантскими приливными генераторами. Внутри наши учёные нашли несколько камер, очевидно предназначенных для ритуальных целей, как предполагается по картинам местной луны и тому, что считается символизирующим людей в различных актах поклонения, покрывающим стены. Большинство этих камер были запечатаны, когда мы прибыли. Внутри наша команда нашла трупы, лежащие на земле. Многие из них, казалось, убили, изувечили или изуродовали себя. Некоторые расшифрованные записи называют это 'Приливным Конкордом' и говорят о ритуальных актах, чтобы угодить их лунной богине. Достаточно странно, что дальнейшие исследования выявили связи между фазами луны и генерацией приливной энергии, выходящие за рамки того, что предсказывали наши первоначальные расчёты."
 mem_lunatics.1.a:0 "Это имеет потенциал."
 mem_lunatics.1.b:0 "Жутко."
 mem_lunatics.1.c:0 "Заберите что можете."
 mem_lunatics.2.name:0 "Безумцы"
 mem_lunatics.2.desc:0 "Следуя откровениям истории Приливного Конкорда, наши учёные анализировали эффекты лун на наши колонии и осознали, что может быть способ помочь нашим колониям заметно увеличить их генерацию энергии. Модификация наших генераторов энергии для активного использования энергии на основе фаз луны должна улучшить их выход. Когда эффекты приливных сил на их пике, и мы оснащаем эти приливные генераторы специально изготовленными турбинами, они могут использовать энергию с улучшенной скоростью. Однако некоторые инженеры, работающие над прототипом, сообщили о странном поведении коллег. Очевидно, есть силы в работе, которые обычная наука, возможно, не в состоянии измерить..."
 zone_mem_lunatics_energy:0 "Приливные фермы"
 zone_mem_lunatics_energy_desc:0 "Когда эффекты приливных сил на их пике, и мы оснащаем приливные генераторы специально изготовленными турбинами, они будут использовать энергию с улучшенной скоростью."
 zone_mem_lunatics_energy_spiritualist:0 "Приливные анклавы"
 zone_mem_lunatics_energy_spiritualist_desc:0 "Когда эффекты приливных сил на их пике, мы ближе всего к нашим почитаемым богам."
