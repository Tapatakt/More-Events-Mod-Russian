l_russian:

 mem_placeholder:0 "ЗАГЛУШКА"
 mem_czar_alexei_catchphrase:0 "Пусть наша империя будет сияющим маяком, ибо галактика тёмна и полна ужасов."
 mem_czar_alexei_backstory:0 "Однажды правитель своего народа, преданный и изгнанный своими честолюбивыми и неблагодарными подданными, у него всё ещё есть видение, которое нужно воплотить, и он пойдёт до конца вселенной, если понадобится."
 r_mem_czar_alexei_sword:0 "Меч Суверена"
 r_mem_czar_alexei_sword_desc:0 "Хотя история этого артефакта остаётся окутанной тайной, вполне очевидно, что он древний, но ни запятнан использованием, ни временем. Истинный шедевр."
 mem_czar_alexei_sword_effect:0 "Завершает все перемирия с другими империями"
 mem_czar_alexei_sword:0 "Агрессивная дипломатия"
 leader_trait_legendary_mem_manifest_destiny:0 "Явочная судьба"
 leader_trait_legendary_mem_manifest_destiny_desc:0 "Амбиция, внедрённая в саму ткань самоидентификации этого человека. Воля сгибать судьбу и достигать его видения будущего, которое галактика ещё не видела."
 astral_rift_mem_czar_alexei:0 "Нексус разрыва"
 mem_czar_alexei.1.name:0 "Нексус разрыва"
 mem_czar_alexei.1.desc:0 "Мы прибыли на орбиту обитаемого мира. Нет явных признаков цивилизации, но поверхность кишит жизнью.\nПомимо разрыва, через который мы сюда прибыли, здесь многочисленные другие в разных фазах активности. Некоторые из них открыты, позволяя объектам проходить через них, в то время как другие, по-видимому, инертны.\nНаши сенсоры улавливают сигнал — возможно, от маяка бедствия — многократно транслирующий своё местоположение на поверхности северного полушария планеты.\n\nКак нам действовать?"
 mem_czar_alexei.1.a:0 "Просканировать и каталогизировать другие разрывы для дальнейшего расследования."
 mem_czar_alexei.1.b:0 "Немедленно направиться к транслируемому местоположению."
 mem_czar_alexei.2.name:0 "Таинственные враги"
 mem_czar_alexei.2.desc:0 "Предварительные результаты наших сканов указывают, что эти разрывы соединяют это место с различными параллельными реальностями, каждая отдельно от другой. Это наблюдение вызвало оживлённую дискуссию среди нашего экипажа, так как никакое подобное место никогда не было обнаружено в нашей галактике. Однако дебаты по этой теме были прерваны, когда другой объект — очевидно, проникающее через разрыв судно, не похожее на наше — вышло из разрыва и немедленно открыло по нам огонь. В отличие от нашего собственного — эта сфера-разрыв, по-видимому, сильно вооружена. Выпущенные выстрелы критически повредили наш субсветовой двигатель и перерезали наш трос.\n\nНаш пилот, выполняя управляемую посадку, изо всех сил старается приблизить нас как можно ближе к маяку. Мы надеемся, что ранее обнаруженный сигнал может привести нас к какой-то помощи."
 mem_czar_alexei.2.a:0 "Приготовиться к удару!"
 mem_czar_alexei.3.name:0 "Аварийная посадка"
 mem_czar_alexei.3.desc.a:0 "После жёсткой посадки наш экипаж напряжённо ожидает решающего удара, но пока ничего не произошло. Согласно нашим сенсорам, нападавшие просто пролетели над местом нашей аварии и покинули непосредственную зону.\nПоверхностная оценка полученных повреждений не оставляет сомнений, что необходимый ремонт будет обширным, если вообще возможным. С нашим тросом, идущим назад, всё становится вопросом безнадёжности.\n\nМы достаточно близко к сигнальному маяку, чтобы добираться пешком в надежде найти там помощь или пригодные материалы. В качестве альтернативы мы могли бы сделать отступление к близлежащему месту крушения, которое наши сканеры обнаружили ранее. И наконец, мы могли бы сосредоточить усилия на ремонте нашей сферы с тем, что у нас есть под рукой."
 mem_czar_alexei.3.desc.b:0 "Наш спуск в атмосферу был внезапно прерван огнём, повредившим наши субсветовые двигатели и перерезавшим наш трос. Нападавший — очевидно, сфера-разрыв, похожая на нашу собственную, но несомненно более сильно вооружённая — должен был преследовать нас на протяжении нашего пребывания, ожидая момента для удара.\n\n$mem_czar_alexei.3.desc.a$"
 mem_czar_alexei.3.a:0 "Направиться к сигналу."
 mem_czar_alexei.3.b:0 "Направиться к месту крушения."
 mem_czar_alexei.3.c:0 "Остаться и делать ремонт."
 mem_czar_alexei.4.name:0 "Ремонт бесполезен"
 mem_czar_alexei.4.desc_1:0 "Более тщательный осмотр полученных повреждений нашей сферы-разрыва делает ясным, что мало надежды на восстановление её до лётного состояния. Особенно ограниченные ресурсы в нашем распоряжении усугубляют наше тяжёлое положение.\n\n"
 mem_czar_alexei.4.desc:0 "$mem_czar_alexei.4.desc_1$Поскольку бесполезность наших ремонтных усилий стала очевидной, у нас всё ещё есть два других, более многообещающих варианта для преследования.\n\nМы достаточно близко, чтобы добираться до сигнального маяка в надежде найти помощь или пригодные материалы. В качестве альтернативы мы можем сделать отступление к другому месту крушения, которое наши сканеры обнаружили во время нашей управляемой посадки примерно на полпути в направлении сигнала."
 mem_czar_alexei.5.name:0 "Неожиданная встреча"
 mem_czar_alexei.5.desc.a:0 "$mem_czar_alexei.6.desc_1$Пока наша команда всё ещё оценивала оставшиеся в рабочем состоянии системы, к ним подошёл гуманоидный пришелец, очевидно, владелец этого корабля, запрашивая аудиенцию.\n\n$mem_czar_alexei.5.desc$"
 mem_czar_alexei.5.desc.b:0 "$mem_czar_alexei.7.desc_1$Пока несколько наших учёных получили доступ к его ядру данных из любопытства и чтобы извлечь схемы сферы для дальнейшего изучения, остальных внезапно приветствовал гуманоидный пришелец, запрашивая аудиенцию.\n\n$mem_czar_alexei.5.desc$"
 mem_czar_alexei.5.desc.c:0 "$mem_czar_alexei.4.desc_1$С реальностью нашей ситуации, медленно оседающей, и нашей командой, обсуждающей варианты, стало большим сюрпризом, когда гуманоидный пришелец дал о себе знать и запросил аудиенцию.\n\n$mem_czar_alexei.5.desc$"
 mem_czar_alexei.5.desc:0 "Согласно его словам, он происходит из другой реальности, попав сюда через один из разрывов, как и мы. Конкретные обстоятельства его присутствия здесь намеренно оставлены двусмысленными, однако.\n\nВ ходе предыдущих исследований его сверстники, якобы, уже вступали в контакт с нашими нападавшими. Он описывает их как племенное общество охотников, которые объявляют это место своей личной охотничьей территорией. Очевидно, они здесь не для охоты на диких животных. Вместо этого их избранные цели — исследователи разрывов со всего мультивселенной.\n\nНаш новый знакомый предлагает работать вместе, чтобы завладеть сферой-разрывом наших врагов и покинуть это место целыми."
 mem_czar_alexei.5.a:0 "Сотрудничать с ним."
 mem_czar_alexei.5.b:0 "Воспользоваться им и, возможно, предать позже."
 mem_czar_alexei.6.name:0 "У сигнала"
 mem_czar_alexei.6.desc_1:0 "Наша команда прибыла к источнику транслируемого сигнала. Перед ними лежат обломки разбившейся сферы-разрыва. Судя по довольно недавним повреждениям окружающей растительности, она находится здесь не очень долго. Несмотря на явные признаки недавнего обитания, наши учёные не обнаружили никого поблизости.\n\nИсследование её интерьера дало мало подсказок относительно местонахождения её экипажа. Сам корабль не подлежит ремонту, как и наш собственный. К удивлению нашего учёного, полученные повреждения были очень похожи на наши собственные.\n\n"
 mem_czar_alexei.6.desc:0 "$mem_czar_alexei.6.desc_1$Единственные всё ещё функционирующие системы — её коммуникационная решётка и сканеры. Последние предупредили нас о группе признаков жизни, окружающих и окружающих нашу позицию как раз вовремя, чтобы подготовиться к действию.\n\nДолжны ли мы остаться и сражаться, забаррикадироваться и ждать, пока они ворвутся, или попытаться прорваться и бежать?"
 mem_czar_alexei.6.a:0 "Попытаться прорваться и бежать."
 mem_czar_alexei.6.b:0 "Встать и сражаться."
 mem_czar_alexei.6.c:0 "Забаррикадироваться и заманить их внутрь."
 mem_czar_alexei.7.name:0 "У места крушения"
 mem_czar_alexei.7.desc_1:0 "Наша команда прибыла на место крушения, которое, должно быть, произошло десятилетия назад. Растительность покрывала половину обломков этой сферы-разрыва. Не было найдено никаких признаков её прежних владельцев. Быстрый осмотр выявил, очевидно, безвозвратные повреждения судна, которые, вероятно, привели к его оставлению. Его технология, однако, оказалась значительно более продвинутой, чем наша собственная.\n\n"
 mem_czar_alexei.7.desc:0 "$mem_czar_alexei.7.desc_1$Пока несколько наших учёных получили доступ к её ядру данных, чтобы извлечь схемы сферы для дальнейшего изучения, несколько других попытались активировать сканеры сферы. Их попытка была успешной и предоставила нам ещё один возможный путь вперёд. Помимо места сигнала, о котором мы уже знаем, он обнаружил другую сферу-разрыв — вероятно, ту, которая атаковала нас раньше — приземлившуюся относительно близко поблизости.\n\nГруппа признаков жизни продвигается от места посадки в направлении местоположения маяка сигнала, где был обнаружен ещё один признак жизни, отличный от остальных. Вероятно, что этот индивид был сбит ими, как и мы.\n\nМы могли бы попытаться добраться до них вовремя до прибытия нападавших. В качестве альтернативы мы могли бы использовать эту ситуацию в своих интересах, попытаться угнать приземлившееся судно и выбраться отсюда."
 mem_czar_alexei.7.a:0 "Пойти к сигналу и ожидать боя."
 mem_czar_alexei.7.b:0 "Попытаться украсть корабль нападавших."
 mem_czar_alexei.8.name:0 "Охотник, ставший добычей"
 mem_czar_alexei.8.desc_1:0 "Как было запланировано с незнакомцем, была устроена засада, чтобы застать врасплох охотничью партию. Вскоре после начала боя стало ясно, что они осведомлены о наших планах. Заметив угрозу того, что нас обойдут с фланга, наш союзник вернулся к наступлению, charging straight at the closest hunter while shrugging off several hits with his shield. Несколько точных ударов его мечом, который мы ранее приняли за чисто церемониальный предмет, сразили двух нападавших, угрожавших нашему флангу.\n\nПока остальные из них ошеломлённо сосредоточили на нём свой огонь, наша команда смогла нейтрализовать их одного за другим.\n\n"
 mem_czar_alexei.8.desc:0 "$mem_czar_alexei.8.desc_1$С разобранными с охотниками, их корабль был захвачен, и наша экспедиционная команда и их новообретённый союзник, который решил сопроводить их обратно в нашу вселенную, вернулись через разрыв."
 mem_czar_alexei.8.a:0 "Давайте поприветствуем победителей!"
 mem_czar_alexei.9.name:0 "Связь потеряна"
 mem_czar_alexei.9.desc:0 "Как было запланировано с незнакомцем, была устроена засада, чтобы застать врасплох охотничью партию. Вскоре после начала боя стало ясно, что они осведомлены о наших планах. Наша огневая позиция была быстро обойдена с фланга, и битва превратилась в одностороннюю резню.\n\nТе, кто не погиб во время боя, вероятно, были взяты в плен и считаются пропавшими без вести. Это знаменует конец этой злополучной авантюры."
 mem_czar_alexei.9.a:0 "Злополучной, действительно."
 mem_czar_alexei.10.name:0 "Удар в спину"
 mem_czar_alexei.10.desc:0 "$mem_czar_alexei.8.desc_1$С последним из охотников, разобранным, они нацелились на к тому времени измождённого незнакомца, overwhelming his shield with a salvo and tied up that loose end as well. Наш экспедиционный лидер взял его меч, чтобы принести его обратно как трофей.\n\nПосле этого единственное, что оставалось сделать, — это захватить теперь безхозную сферу, на которой прибыли охотники, и вернуться обратно через разрыв."
 mem_czar_alexei.10.a:0 "Давайте поприветствуем победителей!"
 mem_czar_alexei.11.name:0 "Связь потеряна"
 mem_czar_alexei.11.desc.a:0 "Наша команда попыталась прорваться через окружение и добраться до безопасности, но встретила ожесточённое сопротивление. Огонь оружия с нескольких направлений безжалостно сражал их одного за другим. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc.b:0 "Наша команда попыталась вступить в бой с врагом на открытом месте, но не была match для их превосходящей огневой мощи. Огонь оружия с нескольких направлений безжалостно сражал их одного за другим. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc.c:0 "Наша команда попыталась забаррикадироваться внутри обломков и заставить врага войти в их угол обстрела, чтобы получить преимущество. Предав их ожидания, взрыв позади них внезапно создал новый вход, и немедленно после этого несколько враждебных сил ворвались через их позиции. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc.d:0 "Наша команда прибыла слишком поздно, чтобы вмешаться в бой. Они нашли только несколько трупов на земле. Один из них принадлежит гуманоидному пришельцу, а остальные — его нападавшим. Когда они попытались осмотреть свои находки более внимательно, внезапно стало ясно, что они попали в ловушку. Огонь оружия с нескольких направлений безжалостно сражал их одного за другим. $mem_czar_alexei.11.desc_2$"
 mem_czar_alexei.11.desc_2:0 "Мы потеряли связь с нашей экспедицией вскоре после начала перестрелки.\n\nТе, кто не погиб во время боя, вероятно, были взяты в плен и считаются пропавшими без вести. Это знаменует конец этой злополучной авантюры."
 mem_czar_alexei.12.name:0 "Новый друг"
 mem_czar_alexei.12.desc.a:0 "Наша команда вступила в бой с врагом на открытом месте, но быстро обнаружила себя подавленной огнём с нескольких направлений и была вынуждена укрыться. Согнувшись за обломками, что они могли сделать, так это отсрочить неизбежное и сопротивляться до последнего.\n\nВнезапный взрыв вывел из строя двух из нападавших, после чего завязалась ближняя битва с очевидной третьей стороной. С всё большим числом нападавших, сосредотачивающих своё внимание на другой силе, наша команда проявила инициативу. Вместе с новым прибытием, который, как оказалось, был всего лишь одним гуманоидом, битва была выиграна.\n\n$mem_czar_alexei.12.desc_2$"
 mem_czar_alexei.12.desc.b:0 "Наша команда прибыла вовремя, чтобы стать свидетелями продолжающейся битвы между нападавшими и одиноким гуманоидом. Получая множество попаданий, которые, казалось, поглощались личным щитом, незнакомец противостоял своим врагам в ближнем бою, в основном сражаясь мечом, изредкая стреляя в более отдалённых нападавших с лазера на запястье, чтобы держать их на расстоянии. Несмотря на эту доблестную демонстрацию, противоборствующая сила всё ещё имела превосходство.\n\nИспользуя элемент неожиданности, наша команда смогла сразить некоторых из нападавших в своём первом ударе, что явно tipped the scales в нашу пользу. Вместе с незнакомцем им удалось победить оставшиеся силы, и битва была выиграна.\n\n$mem_czar_alexei.12.desc_2$"
 mem_czar_alexei.12.desc_2:0 "Согласно его словам, он происходит из другой реальности, попав сюда через один из разрывов, как и мы. Конкретные обстоятельства его присутствия здесь намеренно оставлены двусмысленными, однако.\n\nВ ходе предыдущих исследований его сверстники, якобы, уже вступали в контакт с нашими нападавшими. Он описывает их как племенное общество охотников, которые объявляют это место своей личной охотничьей территорией. Очевидно, они были здесь не для охоты на диких животных. Вместо этого их избранные цели — исследователи разрывов со всего мультивселенной.\n\nС разобранными с охотниками, их корабль был захвачен, и наша экспедиция и их новообретённый союзник, который решил сопроводить их обратно в нашу вселенную и вернуться через разрыв."
 mem_czar_alexei.12.a:0 "Давайте поприветствуем победителей!"
 mem_czar_alexei.13.name:0 "Сувенир"
 mem_czar_alexei.13.desc.a:0 "Наша команда забаррикадировалась внутри обломков, чтобы заставить врага войти в их угол обстрела и получить преимущество. Когда они были готовы войти в обломки, снаружи внезапно завязалась драка. Когда наша команда продвинулась к выходу, они стали свидетелями продолжающейся битвы между нападавшими и одиноким гуманоидом. $mem_czar_alexei.13.desc_2$"
 mem_czar_alexei.13.desc.b:0 "Наша команда прибыла вовремя, чтобы стать свидетелями продолжающейся битвы между нападавшими и одиноким гуманоидом. $mem_czar_alexei.13.desc_2$"
 mem_czar_alexei.13.desc_2:0 "Получая множество попаданий, которые, казалось, поглощались личным щитом, незнакомец противостоял своим врагам в ближнем бою, в основном сражаясь мечом, изредкая стреляя в более отдалённых нападавших с лазера на запястье, чтобы держать их на расстоянии. Несмотря на эту доблестную демонстрацию, противоборствующая сила всё ещё имела превосходство.\n\nИспользуя элемент неожиданности, наша команда смогла сразить некоторых из нападавших в своём первом ударе, что явно tipped the scales в нашу пользу. Хотя им не удалось спасти незнакомца, наша команда смогла победить оставшиеся силы, и битва была выиграна. Наш экспедиционный лидер взял мёртвого незнакомца меч как memento, чтобы принести его обратно с собой.\n\nПосле этого единственное, что оставалось сделать, — это захватить теперь безхозную сферу, на которой прибыли охотники, и вернуться обратно через разрыв."
 mem_czar_alexei.14.name:0 "Успешное отступление"
 mem_czar_alexei.14.desc:0 "Наша экспедиция решила не вступать в бой, который не был их, и направилась к незащищённому кораблю нападавших. Проникновение внутрь и доступ к его системам было довольно сложной задачей, но наша команда смогла успешно справиться с попытками как раз вовремя, чтобы увидеть своих теперь застрявших на суше врагов frantically scrambling and failing to stop them from taking off."
 mem_czar_alexei.14.a:0 "Давайте поприветствуем их возвращение."
 mem_czar_alexei.15.desc_01:0 "У меня есть благодарность за вашу помощь ранее, но я полагаю, что в первую очередь нуждаюсь в представлении.\n\nЯ — царь Алексей Королёв, бывший правитель Объединённой Терранской Федерации, но злосчастные обстоятельства привели к моему изгнанию на мир, где мы встретились. Как бы то ни было, ни мой прежний титул, ни империя не имеют для вас никакого значения, учитывая, что это совершенно другая параллельная реальность, насколько я могу судить."
 mem_czar_alexei.15.desc_02:0 "С удовольствием. Что бы вы ещё хотели знать?"
 mem_czar_alexei.15.a:0 "Что вы можете рассказать нам об этих нападавших?"
 mem_czar_alexei.15.a.response:0 "Мы вступили в контакт с ними во время предыдущего исследования разрыва. Излишне говорить, что не было никакого дипломатического обмена. Их общество, по-видимому, доминирует архаичная военная философия, и акт охоты и победы над сильными противниками, кажется, пользуется высоким уважением в нём. Они относятся к другим видам как к низшим.\n\nНеудивительно, что они сделали этот нексус разрывов своей охотничьей территорией. С таким количеством параллельных реальностей, связанных друг с другом, он обязан привлекать разнообразие интересной 'добычи'."
 mem_czar_alexei.15.b:0 "Как вы оказались на этой планете?"
 mem_czar_alexei.15.b.response:0 "Короче говоря, переворот.\n\nНекоторые из моих ближайших подчинных сговорились против меня. Доверие и дружба ослепили меня, не позволяя увидеть их жадность и жажду власти, медленно разъедающие их, пока не стало слишком поздно. Когда их истинные цветы были раскрыты, пришлось сделать выбор: остаться и сражаться или пойти в изгнание.\n\nЯ выбрал последнее, так как не создавал империю, чтобы видеть, как она поглощается пламенем гражданской войны и страданий, которые последовали бы.\n\nМоим намерением было достичь одной из других галактик, связанных с нексусом разрывов. Охотники, однако, возразили против этого и 'пригласили' меня на более длительное пребывание. С тех пор у меня была серия стычек с их охотничьими партиями."
 mem_czar_alexei.15.c:0 "Как вам удалось выжить там в одиночку?"
 mem_czar_alexei.15.c.response:0 "Археотехнологии. Я всегда был очарован теми цивилизациями, что были до нас, и финансировал различные археологические раскопки внутри терранского пространства. Некоторые из находок теперь интегрированы в мою броню. Миниатюрная лазерная пушка в моём наруче, генератор личного щита и не говоря уже об этом мече, который является чем-то большим, чем просто кусок металла, как вы, возможно, заметили.\n\nЭти вещи были весьма полезны, но самое важное улучшение, которое я смог достичь от своих археологических проектов, были наниты из уединённого звёздного кластера, расположенного у нашего галактического края. Иммунитет к яду, повышенный фактор заживления и противовозрастные свойства — эти маленькие машины необычайно полезны.\n\nХотя охотничьи партии, приходившие за мной, становились всё больше. Я не уверен, как долго мои аксессуары могли бы tip the scales в мою пользу."
 mem_czar_alexei.15.d:0 "Что вы собираетесь делать теперь?"
 mem_czar_alexei.15.e:0 "Вернуться к вашему предложению присоединиться к нам."
 mem_czar_alexei.16.desc_01:0 "В этом я ещё не уверен.\n\nЯ мог бы присоединиться к вам и поделиться своей экспертизой в различных областях, если вы готовы предложить мне место. В конце концов, я вам обязан. Иначе есть целая новая галактика для меня, чтобы исследовать."
 mem_czar_alexei.16.desc_02:0 "Вы рассмотрели моё предложение?"
 mem_czar_alexei.16.a:0 "Есть ещё вопросы, которые мы хотели бы сначала задать."
 mem_czar_alexei.16.hire.tooltip:0 "§GУровень навыка 5§! легендарный командир присоединяется к вашему пулу лидеров."
