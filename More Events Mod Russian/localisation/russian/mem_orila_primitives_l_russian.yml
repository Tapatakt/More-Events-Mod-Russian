l_russian:

 mem_orila_primitives.10.name:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_orila_primitives.10.desc:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_orila_primitives.20.name:0 "Опустошение"
 mem_orila_primitives.20a.desc:0 "Мы прибыли в систему §Y[From.GetName]§! и немедленно зафиксировали различные поля обломков на сенсорах нашего флота. Предварительный анализ считает обломки древними, но высокоразвитыми. Однако, похоже, мы не первые, кто наткнулся на эти остатки. Они были уже очищены от любых полезных компонентов давным-давно.\n\nЭто не единственная странность, так как одна из планет системы когда-то была разбита на куски. Неясно, что вызвало это, но, по-видимому, вероятно, что обломки, разбросанные по всей системе, происходят от того же события. Рекомендуется дальнейшее расследование."
 mem_orila_primitives.20b.desc:0 "Мы прибыли в ещё одну опустошённую систему и нашли ещё один разрушенный мир. Обломки, найденные в системе, кажутся древними, но высокоразвитыми. К сожалению, они были очищены от любых полезных компонентов задолго до нашего прибытия.\n\nКраткое сканирование окрестностей выявило следы сплавов тяжёлых элементов, которые мы находили раньше. Эта планета, должно быть, стала жертвой той же силы."
 mem_orila_primitives.20c.desc:0 "Мы прибыли в ещё одну опустошённую систему и нашли ещё один разрушенный мир. Обломки, найденные в системе, кажутся древними, но высокоразвитыми. К сожалению, они были очищены от любых полезных компонентов задолго до нашего прибытия.\n\nКраткое сканирование окрестностей выявило следы сплавов тяжёлых элементов, использованных вазуранами. Ещё один мир стал жертвой их царства террора."
 mem_orila_primitives.20d.desc:0 "Мы прибыли в систему §Y[From.GetName]§! и немедленно зафиксировали различные поля обломков на сенсорах нашего флота. Предварительный анализ считает обломки древними, но высокоразвитыми. Однако, похоже, мы не первые, кто наткнулся на эти остатки. Они были уже очищены от любых полезных компонентов давным-давно."
 mem_orila_primitives.20e.desc:0 "$mem_orila_primitives.20d.desc$\n\nЕсть ещё кое-что. Один из миров системы защищён планетарным щитом, скрывающим его поверхность от наших дальнобойных сканеров. Нам придётся исследовать его вблизи, чтобы получить больше информации."
 mem_orila_primitives.100.name:0 "Входящая передача"
 mem_orila_primitives.100.desc:0 "Входящее судно, эта система находится под защитой Договора о Невмешательстве, принятого Галактическим Сенатом и гарантированного Советом Халиссоса.\n\nВам разрешено оставаться в этой системе, пока ваши действия не нарушают упомянутый договор. Предупреждаем, что любая агрессия в отношении защищённой планеты, этой станции или любого из её активов будет встречена соответствующим образом.\n\nЕсли у вас есть вопросы, административный ИИ этой станции предоставит вам всю доступную информацию."
 mem_orila_primitives.100.a:0 "Каковы условия этого 'Договора о Невмешательстве'?"
 mem_orila_primitives.100.desc.a:0 "'Договор о Невмешательстве' помещает любую ещё не космическую цивилизацию под защиту, чтобы предотвратить вредное или разрушительное вмешательство в её естественное культурное и технологическое развитие."
 mem_orila_primitives.100.b:0 "Галактический сенат?"
 mem_orila_primitives.100.desc.b:0 "Галактический сенат — это общая площадка для межвидовой дипломатии. Он состоит из представителей всех космических цивилизаций, чтобы обеспечить мир и процветание в этой галактике."
 mem_orila_primitives.100.c:0 "Кто построил эту станцию?"
 mem_orila_primitives.100.desc.c:0 "Эта станция была построена Ориланским Содружеством."
 mem_orila_primitives.100.d:0 "Что это за 'Совет'?"
 mem_orila_primitives.100.desc.d:0 "Это правящий орган Ориланского Содружества, одной из четырёх наиболее влиятельных наций внутри и учредительного члена галактического сената."
 mem_orila_primitives.100.e:0 "Можете ли вы установить контакт между нами и вашими создателями?"
 mem_orila_primitives.100.desc.e:0 "Инициализация дипломатических каналов между [This.GetName] и Советом Халиссоса...\n\nПожалуйста, ожидайте...\n\nДипломатические каналы инициализированы..."
 mem_orila_primitives.100.desc.f:0 "Инициализация дипломатических каналов между [This.GetName] и Советом Халиссоса...\n\nПожалуйста, ожидайте...\n\nОшибка: Невозможно установить соединение"
 mem_orila_primitives.100.g:0 "Закрыть контакт"
 mem_orila_primitives.100.desc.g:0 "Подтверждено. Закрытие канала."
 mem_orila_primitives.100.h:0 "Попытаться взломать ИИ"
 mem_orila_primitives.100.i:0 "§GНаши создатели оба исчезли, но наши протоколы совпадают. Присоединяйтесь к нам.§!"
 mem_orila_primitives.100.desc.i:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_orila_primitives.101.desc:0 "Враждебный захватчик, прекратите свои атаки и немедленно покиньте эту систему. Любая дальнейшая враждебность будет встречена полной силой."
 mem_orila_primitives.110.desc:0 "Входящее судно, эта система ... не ... разрешено оставаться ... ваши действия ... нарушают ... предупреждено ... агрессия ... предоставит вам всю доступную информацию."
 mem_orila_primitives.110.a:0 "Какая информация доступна?"
 mem_orila_primitives.110.desc.a:0 "Соединение с сервером потеряно...\n\nПопытка переподключения...\n\nСервер не отвечает..."
 mem_orila_primitives.110.b:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_orila_primitives.110.desc.b:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_orila_primitives.120.desc:0 "ЗАМЕНИТЬ_МЕНЯ"
 mem_orila_primitives_magnus.1.name:0 "Гравитационная аномалия"
 mem_orila_primitives_magnus.1.desc.a:0 "[This.GetName] прибыл в систему [From.GetName]. Его сенсоры показывают аномальные гравитационные аномалии вокруг него. Наиболее значительной является гравитационный центр системы, который — вопреки всем обычным ожиданиям — не является её главной звездой, а планетой земного типа. Все остальные объекты находятся на орбитах вокруг неё.\n\nОднако это не конец странностей. Эта центральная планета, по-видимому, мир типа гайя, окружена защитным энергетическим щитом. Наши данные сканирования указывают на присутствие докосмической цивилизации. Разрушенная станция-форпост, окружённая обломками двух схожих, но отличных по дизайну конструкций, была обнаружена вблизи звезды."
 mem_orila_primitives_magnus.1.desc.b:0 "$mem_orila_primitives_magnus.1.desc.a$\n\nЕщё одна станция вблизи планеты, по-видимому, всё ещё функционирует. Она транслирует передачу. Наше присутствие здесь не осталось незамеченным."
 mem_orila_primitives_magnus.1.a:0 "Какое странное место."
 mem_orila_primitives_magnus.1.b:0 "На экран."
 mem_orila_primitives_magnus.2.a:0 "Что вы можете рассказать нам об этой системе?"
 mem_orila_primitives_magnus.2.desc.a:0 "Эта система была впервые открыта в цикле 18035 галактического стандартного календаря, когда она появилась вслед за особенно мощным штормом завесы, прошедшим через этот регион пространства. Её необычная гравитационная конфигурация — а именно планета в центре, а не звезда — была предметом научного исследования с тех пор.\n\nВ то время как другие орбитальные тела внутри системы довольно неинтересны, центральная планета содержит различные особенности. Несколько генетически неродственных разумных видов населяют её крупнейший континент в более или менее стабильном сосуществовании. Вероятность того, что они эволюционировали вместе естественным путём, очень мала, поэтому внешнее влияние было признано наиболее вероятным даже при отсутствии каких-либо признаков относительно ответственной стороны.\n\nКоренные жители, чьё общество, по-видимому, застыло в вечном средневековье с незначительным технологическим прогрессом, все проявляют признаки латентных псионических способностей. Связано ли это с генетическим вмешательством или является результатом постоянного контакта с энергиями завесы, остаётся неясным. Завеса, разделяющая нашу реальность и завесу, очень тонка в этой системе и, судя по её внезапному появлению, невозможно, чтобы её происхождение было вне нашей вселенной."
 mem_orila_primitives_magnus.2.b:0 "Что случилось с другой станцией?"
 mem_orila_primitives_magnus.2.desc.b:0 "Эта система подверглась нападению неопознанных врагов. Хотя нападавшие были отбиты, ущерб, нанесённый центральному узлу этой системы, был слишком обширен, и он прекратил функционирование."
 mem_orila_primitives_magnus.4.name:0 "Мифы и легенды"
 mem_orila_primitives_magnus.4.desc:0 "Учёные, изучающие коренных жителей [mem_nirn_site.GetName], узнали о гигантской подземной пещерной системе под замёрзшими северными землями, известной местным как 'Блэкрич'.\n\nСогласно полученной информации, в ней когда-то обитала давно потерянная цивилизация, которая поселилась там из-за обширных минеральных богатств, найденных в окрестностях — особенно, как вывели наши учёные из описаний в их источниках, редких кристаллов. Это, а также обещание археологических находок, оправдывает тайную экспедицию, чтобы найти это мистическое место."
 mem_dark_heart_boost:0 "Выровненность тёмной энергии"
 mem_orila_primitives_magnus_crystal_processing_hub:0 "Центр обработки кристаллов"
 mem_orila_primitives_magnus_crystal_processing_hub_desc:0 "Небольшой промышленный завод, предназначенный для обработки сырых кристаллов, добываемых тайно на Нирне, прежде чем отправить их за пределы планеты."
 mem_orila_primitives_magnus_abandoned_crystal_processing_hub:0 "Заброшенный центр обработки кристаллов"
 mem_orila_primitives_magnus_abandoned_crystal_processing_hub_desc:0 "С исчезновением необходимости в тайных операциях на Нирне это место было покинуто навсегда."
 mem_orila_primitives_artificial_world:0 "Искусственная планета"
 mem_orila_primitives_artificial_world_desc:0 "Этот мир был искусственно создан в далёком прошлом путём строительства планетарной сферы Дайсона вокруг миниатюрной звезды. Верхний слой поверхности, маскирующий сферу ниже, занимает лишь несколько километров там, где он наиболее толстый."
 d_mem_nirn_blackreach:0 "Пещеры Блэкрича"
 d_mem_nirn_blackreach_desc:0 "Обширная подземная сеть пещер, богатых редкими кристаллами и усеянных древними руинами."
 r_mem_dark_heart:0 "Тёмное Сердце"
 r_mem_dark_heart_desc:0 "Оно было найдено в глубинах мира, существующего на границе нашей реальности, где завеса, разделяющая её и завесу, наиболее тонка. Сфера пульсирует энергией, искрящейся по её гладкой чёрной поверхности. Чем сильнее испускаемая энергия становится, тем темнее сама сфера..."
 mem_nirn_blackreach_site:0 "Что лежит внизу"
 mem_nirn_blackreach_site_desc:0 "Мы узнали о существовании огромной подземной пещерной системы, в которой, как говорят, находятся останки древней цивилизации далёкого прошлого"
 mem_orila_primitives_magnus_site.1.name:0 "Поиск входа"
 mem_orila_primitives_magnus_site.1.desc:0 "Благодаря своим исследованиям различных источников информации о коренных жителях наши команды наблюдения смогли определить ряд руин, которые, как подтвердили наши сканирования, ведут глубоко под землю. Самое отдалённое местоположение было выбрано в качестве отправной точки для нашей экспедиции, чтобы свести к минимуму риск прямого контакта с членами местного населения.\n\nПрибыв к руинам, их отличие от зданий, используемых наблюдаемым местным населением, стало немедленно очевидным. Технологическое развитие бывших обитателей этого места должно было быть намного впереди своего времени и таким и оставалось до сих пор.\n\nСломанные механизмы неопределённого назначения усеяли землю в пределах крепостной структуры. Помимо некоторой агрессивной местной фауны, которая была быстро нейтрализована, признаков недавнего обитания обнаружено не было.\n\nПредварительное исследование местности выявило то, что, по-видимому, является шахтой лифта, ведущей вниз в подземелье в одном из центральных зданий. Наши инженеры начали обеспечивать эту точку доступа, чтобы позволить исследование подземных слоёв."
 mem_orila_primitives_magnus_site.1.a:0 "Держите меня в курсе."
 mem_orila_primitives_magnus_site.2.name:0 "Подземный комплекс"
 mem_orila_primitives_magnus_site.2.desc:0 "Через установку временного лифта в шахте лифта мы получили доступ к подземным слоям руин.\n\nВремя оказало своё действие и там, но каким-то чудом большинство странного оборудования, найденного по всей бункероподобной структуре, всё ещё работало, обеспечивая свет через светящиеся кристальные изделия и перезаряжая примитивных автоматонов — которые при активации реагировали исключительно враждебно по отношению к нашей экспедиции. Какой источник обеспечивал энергией всё это, определить не удалось, так как части комплекса были недоступны из-за обрушенных коридоров.\n\nПомимо повсюду присутствующих автоматонов, никаких подсказок о местонахождении бывших жителей найти не удалось. Достигнув самого глубокого слоя структуры, наша экспедиция столкнулась с точкой выхода, ведущей в обширную естественную пещеру. Базовый лагерь в указанном выходе, а также путь снабжения через структуру для связи с поверхностью были установлены, чтобы позволить дальнейшее исследование."
 mem_orila_primitives_magnus_site.2.a:0 "Продолжить экспедицию."
 mem_orila_primitives_magnus_site.3.name:0 "Сталкеры во тьме"
 mem_orila_primitives_magnus_site.3.desc:0 "Когда наша экспедиция вошла в обширную пещерную систему, её ждали поистине инопланетные пейзажи. Воздух был тяжёлым и наполнен спорами, постоянно распространяемыми лесом из гигантских светящихся грибов. Благодаря их присущей биолюминесценции эти споры окрашивали обширные участки пещеры в жуткий синеватый оттенок и накапливались в протяжениях воды, найденных здесь и там, превращая их в непрозрачную бирюзу. Огромные кристаллы торчат как из земли, так и из потолка пещеры, их отражающие поверхности далее распространяют свет грибов, способствуя зловещей атмосфере.\n\nВ далёком расстоянии можно было увидеть сооружения, похожие на те, что были найдены у поверхностного входа. Установив эти сооружения в качестве следующей цели, наша экспедиция продолжила свой путь через жуткие сумерки чёрных просторов, с любопытством наблюдаемая странными гуманоидными пещерными жителями и их насекомоподобными питомцами.\n\nЭти примитивные существа, по-видимому, были деградировавшими родственниками одного из гуманоидных видов, обитающих на поверхности, но лишённых их интеллекта и физически адаптированных к пещерной системе. Наши числа, к лучшему или худшему, казалось, удерживали их от любых шагов, хотя. Так что они держали дистанцию."
 mem_orila_primitives_magnus_site.3.a:0 "Какое странное место."
 mem_orila_primitives_magnus_site.4.name:0 "Забытый город"
 mem_orila_primitives_magnus_site.4.desc:0 "Наша экспедиция прибыла к сооружениям, которые ранее были замечены на горизонте. Как оказалось, их размер был довольно обманчив, однако, и расстояние для путешествия превзошло прежние оценки в два-три раза.\n\nОднако это того стоило, так как наши археологи вместо нескольких разрушенных зданий обнаружили целый заброшенный город, расположенный примерно в центре обширной пещеры.\n\nКак и в хранилище, которое мы посетили раньше, механические конструкты и оборудование всё ещё работают и в этом месте. Нашим командам пришлось уничтожить довольно много автоматонов, перемещаясь по местности. Во время поверхностного расследования они уже определили несколько точек интереса. Первой среди них является центральное шпилеподобное здание, которое в отличие от других сооружений в городе было запечатано.\n\nФакт, намекающий на присутствие чего-то интересного внутри него. Работа над открытием входа уже началась."
 mem_orila_primitives_magnus_site.4.a:0 "Откройте его."
 mem_orila_primitives_magnus_site.5.name:0 "Тёмное Сердце"
 mem_orila_primitives_magnus_site.5.desc:0 "Вход в шпиль был вскрыт. После входа наши исследователи быстро должны были скорректировать свои предвзятые представления.\n\nВместо храма, используемого для религиозного поклонения, что было распространённым предположением без каких-либо доказательств, они нашли место науки. Шпиль вмещал несколько лабораторий и архив научных исследований.\n\nВыше внутри структуры целый этаж был посвящён загадочному аппарату, удерживающему странную сферу на месте, подвешенную в воздухе. Её гладкая чёрная поверхность была в постоянном состоянии потока, с вспышками энергии, часто пронзающими её. Согласно нашим сканированиям, этот объект действовал как сифон, используя силы, текущие внутри измерения завесы. С учётом того, что завеса между нашим и измерением завесы особенно тонка здесь, потенциальная энергетическая выходная мощность этого артефакта казалась огромной.\n\nНасколько позволяли наши накопленные знания о создателях этого места, было исключено, что этот объект был создан ими. К сожалению, его происхождение остаётся таким же загадочным, как и их исчезновение."
 mem_orila_primitives_magnus_site.5.a:0 "Поднимите его."
 mem_floating_pebbles_site:0 "Плавающие камешки"
 mem_floating_pebbles_site_desc:0 "Сканирования [From.Planet.GetName] указывают на несколько крупных сплавных образований, плавающих на поверхности океана. Планетарный щит вокруг [From.Planet.GetName] затрудняет определение природы этих конструкций издалека.\n\nДальнейшие исследования на месте могут помочь нам понять их назначение."
 mem_orila_primitives_pebbles_site.1.name:0 "Безжизненные города"
 mem_orila_primitives_pebbles_site.1.desc:0 "Наши учёные исследовали по крайней мере несколько десятков этих массивных сооружений, которые они считают плавучими городами. Любопытно, что нигде не было обнаружено признаков разумной жизни. Интерьеры большинства домов были украшены изысканными скульптурами — вероятно, изображающими местное население — но всё ещё не было получено никаких подсказок о местонахождении их бывших обитателей.\n\nДальнейшее сканирование в более широкой области вокруг наших предыдущих исследований выявило сооружения, схожие по дизайну с плавучими городами, но построенные глубоко внутри горных хребтов одного из немногих существующих архипелагов этого мира."
 mem_orila_primitives_pebbles_site.2.name:0 "Горные бункеры"
 mem_orila_primitives_pebbles_site.2.desc:0 "Сооружения внутри горного хребта также заброшены. Насколько наше понимание этих 'бункеров' позволяет судить, они, по-видимому, были построены в условиях дефицита времени с малым вниманием к роскоши или великолепной архитектуре. Всё внутри кричит 'полезность'.\n\nПохоже, что бывшие жители горных хребтов забаррикадировались от наводнения. Неясно, как долго баррикады сопротивлялись наступающим приливам, но в конечном итоге нижние уровни были затоплены, оставив пригодными для жизни только верхние уровни. Странная общая черта различных бункеров, которые исследовали наши команды, — это казалось бы неуместное присутствие статуй, схожих с теми, что были найдены в плавучих городах. Ещё более любопытно их размещение исключительно в незатопленных зонах, как если бы бывшие жители — которые снова не оставили следов о себе — среди своих лишений сделали их сохранение своим высшим приоритетом."
 mem_orila_primitives_pebbles_site.3.name:0 "Дождливо с возможностью парового тумана"
 mem_orila_primitives_pebbles_site.3.desc:0 "Наши зонды нашли предполагаемую главную причину повышения приливов. Супер-гейзер, расположенный в северных частях [From.Planet.GetName]. Хотя он теперь погружён океаном, гейзер пара и кипящей воды непрерывно пробивается сквозь волны, достигая высот более 100 метров. Наша команда оценивает, что тепловая энергия, выделяемая этим гейзером со временем, постепенно повысила атмосферную температуру этой планеты, расплавив весь лёд вокруг полярных регионов. Согласно нашим расчётам, [From.Planet.GetName] без этого постоянного выделения энергии была бы замороженной пустыней без какой-либо воды в жидком состоянии.\n\nТеория наших учёных состоит в том, что местное население, столкнувшись с появлением и последующим повышением уровня моря, разделилось между жизнью в плавучих городах или подземных бункерах, построенных на больших высотах, где они ошибочно полагали, что вода не достигнет их.\n\nВ то время как бункеры в конечном итоге были затоплены, мы не уверены, что случилось с океанским народом."
 mem_orila_primitives_pebbles_site.3.a:0 "Вернуться к морским городам."
 mem_orila_primitives_pebbles_site.4.name:0 "Плачущие ангелы"
 mem_orila_primitives_pebbles_site.4.desc:0 "Вернувшись в один из плавучих городов, наши учёные переосмотрели скульптуры после небольшого происшествия, которое привело к тому, что одна из них разбилась. К их изумлению, она не состояла из однородного металлического материала, как предполагала патинаподобная внешняя оболочка. Вместо этого внутри были чётко разделённые области различных минералов в сочетании, крайне маловероятном как результат естественных геологических процессов.\n\nЖуткий вывод разрешил тайну пропавших обитателей. Они не исчезли. Они были здесь всё время — приняты за статуи. Эти литоиды, по-видимому, страдали от медленной внешней коррозии из-за повышенной влажности, медленно задыхаясь. В конечном итоге их попытки спастись от воды лишь отсрочили неизбежное.\n\nУчитывая их гибель, можно предположить, что они эволюционировали в гораздо более сухом климате, что поддерживает наши прежние расчёты относительно прошлого планеты. Однако пока неясно, что привело к выделению энергии через супер-гейзер, а также различные другие выходы, которые были обнаружены в то же время, разбросанные по дну океана. Мы начали исследовать эти 'горячие точки', используя подводные зонды."
 mem_orila_primitives_pebbles_site.4.b:0 "Трагично."
 mem_orila_primitives_pebbles_site.5.name:0 "Только начало"
 mem_orila_primitives_pebbles_site.5.desc:0 "Достигнув подводной поверхности вблизи 'горячих точек', наши дроны начали брать образцы осадков, а также проводить разведочные бурения. Это стало шоком, когда все бурения остановились примерно на одной глубине. После нескольких десятков метров грязи и обломков бурильщики все ударились о твёрдый слой, более прочный, чем любой материал, который мы можем производить, не говоря уже о чём-либо существующем естественным путём.\n\nПри дальнейшем исследовании и различных глубинных обзорных сканированиях наши данные предполагают, что эта поверхность тянется вокруг всего глобуса, образуя базовый слой, на котором покоятся верхние слои — земля, скала, горы и океаны. Предполагать его происхождение результатом естественных процессов не приходится. Технология, необходимая для создания такой конструкции, легко превосходит нашу собственную, что очевидно исключает местное население как её создателей.\n\nЕсть только одно место, которое может предложить любую дальнейшую возможность для исследований. Источник супер-гейзера. Потребуется специально оборудованный дрон, чтобы выдержать силы, действующие там внизу."
 mem_x.x05.a:0 "Сделайте это!"
 mem_orila_primitives_pebbles_site.6.name:0 "Искусственная планета"
 mem_orila_primitives_pebbles_site.6.desc:0 "Приближаясь к источнику супер-гейзера, наш дрон должен был бороться со всё более сильным и бурным течением. Только благодаря своей улучшенной тяге и защите он достиг крупной трещины в земле, из которой происходит гейзер.\n\nКак мы уже предполагали, отверстие вело вниз к искусственной конструкции и в проход через её материал. Дрон следовал по туннелю несколько километров прямо вниз, не оставляя сомнений в том, был ли этот проход предназначенной особенностью конструкции. Во время спуска окружающая вода была заменена перегретой плазмой — не магмой, как можно было ожидать. Когда он вышел с другой стороны туннеля, дрон был едва функционирующим, но мы всё ещё получили последний всплеск телеметрии, прежде чем навсегда потерять связь.\n\nСогласно полученным данным, сферическая конструкция окружает крошечную звезду, как миниатюрная сфера Дайсона. Наши учёные предполагают, что звезда используется для обеспечения энергии, которая в противном случае излучалась бы активным ядром планеты, используя меньше материала. [From.Planet.GetName] — это массивная конструкция для создания искусственной планеты. Для какой цели, когда существует так много более простых альтернатив, как станции, остаётся загадкой.\n\nОднако собранные данные могут быть как раз тем, что нам нужно для прорыва."
 mem_burning_skies_site:0 "Мёртвый мир"
 mem_burning_skies_site_desc:0 "[From.Planet.GetName] лежит в руинах — опустошённый и почти лишённый жизни. Высокая концентрация радиации всё ещё окутывает поверхность, как саван, несмотря на время, прошедшее с тех пор, как события привели к её текущему состоянию."
 mem_orila_primitives_skies_site.1.name:0 "Опустошённый войной"
 mem_orila_primitives_skies_site.1.desc:0 "Планета покрыта обширными полями сражений и сравненными с землёй руинами, которые когда-то должны были быть бурно развивающимися городами — теперь не более чем металлические костницы.\n\nСудя по транспортным средствам, оставленным ржаветь на земле, которые наши учёные относят к двум различным фракциям на основе повторяющихся маркировок, жители этого мира сражались между собой. Признаки обычной войны, найденные во многих местах, однако не могут скрыть истинную причину гибели этой цивилизации.\n\nНесмотря на время, прошедшее с тех пор, многие районы — особенно руины крупных городов — демонстрируют уровни радиации, далеко превышающие точку, летальную для незащищённого персонала. Можно предположить, что вся поверхность планеты была зоной смертельной радиации при падении этой цивилизации."
 mem_orila_primitives_skies_site.1.a:0 "Почему они сражались между собой?"
 mem_orila_primitives_skies_site.1.b:0 "Они создали для нас новый дом."
 mem_orila_primitives_skies_site.2.name:0 "Гавани покоя"
 mem_orila_primitives_skies_site.2.desc:0 "Дальнейшее сканирование выявило различные места, которые остаются относительно нетронутыми, учитывая время, прошедшее с тех пор, как их обитатели исчезли. Будь то отсутствие стратегической важности или благоприятная география, защищающая эти места от широкомасштабного разрушения, причинённого войной и её ядерным обменом, эти места видели последние моменты их цивилизации.\n\nВ одном из них, небольшом городке в отдалённой долине, его жители собрались в и вокруг крупного храмоподобного сооружения в центре их сообщества. Их останки всё ещё лежат разбросанными на земле. Учитывая, что они все были вместе в этом месте, кажется маловероятным, что они медленно поддавались радиации один за другим.\n\nНаши археологи уже начали просеивать различные сохранившиеся документы и писания, найденные там, надеясь собрать обстоятельства, которые привели к этому."
 mem_orila_primitives_skies_site.2.a:0 "Продолжайте."
 mem_orila_primitives_skies_site.3.name:0 "Религиозная война"
 mem_orila_primitives_skies_site.3.desc:0 "Центральная структура внутри поселения действительно была местом религиозного поклонения, как предполагала наша команда. Исследования сохранившихся писаний поддерживают это предположение. Однако их иконография была поистине удивительной. Перекрёстные ссылки в нашей базе данных тесно связали их с маркировками, найденными на обломках внутри этой системы. Хотя совершенно ясно, что эта цивилизация ещё не была способна к космическим полётам, какая-то форма контакта должна была иметь место между ними в прошлом, и учитывая, что это стало частью их религии, вероятно, имело место в их далёком прошлом с существенным влиянием на их историю.\n\nДругие документы пролили свет на более недавние события, приведшие к войне. Событие, названное 'Днями Пылающего Неба', произошло несколько десятилетий назад и привело к великому расколу внутри их сообщества, причём одна часть цеплялась за свой пантеон, в то время как другая считала, что их боги оставили свой народ. С постоянно растущим напряжением между этими двумя группами по прошествии времени было неизбежным, что в конечном итоге вспыхнет открытый конфликт.\n\nЕсть дополнительный материал, детализирующий более недавние события, но нашей команде трудно собрать всё воедино, учитывая его разрозненный характер."
 mem_orila_primitives_skies_site.3.a:0 "Разделённые верой?"
 mem_orila_primitives_skies_site.3.b:0 "Священная война?"
 mem_burning_skies_scrolls: "Свиток Дней Пылающего Неба"
 mem_burning_skies_scrolls_desc_short: "Свиток, повествующий о событии, названном 'Днями Пылающего Неба', которое произошло несколько десятилетий назад и привело к великому расколу внутри древнего сообщества"
 mem_burning_skies_scrolls_desc_details: "Причём одна часть цеплялась за свой пантеон, в то время как другая считала, что их боги оставили свой народ. Напряжение продолжало расти между этими двумя частями по прошествии времени, было неизбежным, что в конечном итоге вспыхнет открытый конфликт."
 mem_orila_primitives_skies_site.4.name:0 "Отказ от участия"
 mem_orila_primitives_skies_site.4.desc:0 "Собирая воедино фрагментированные подсказки, оставленные в старых новостных статьях, найденных в пустых домах, понимание нашей команды событий, предшествовавших падению этой цивилизации, рисует мрачную картину.\n\nРелигиозная раскольническая группа, называвшая себя 'Созерцателями Пылающего Неба' — очевидно, в отсылке к событию, вызвавшему раскол — быстро укоренилась в менее экономически благополучных регионах благодаря их фаталистическому мировоззрению, предлагая смысл тяжкому труду и несчастьям, которые люди испытывали в своей жизни. Веря в гибель своих богов цель этой быстро распространяющейся новой религии состояла в том, чтобы завладеть божественными артефактами, чтобы использовать их в пользу своего дела. Их главной целью был великий священный город, который был построен вокруг древнего шпиля, который сам, как говорили, был создан их богами.\n\nБыла противоречивая информация относительно охватившей весь мир войны, которую начала эта новая религия, особенно кто инициировал ядерный обмен, по-видимому, потерян для истории. Однако ясно, что крупные центры населения, среди них священный город, были полностью уничтожены, в то время как остальной мир столкнулся с смертельным радиоактивным выпадением в результате этих событий.\n\nСтолкнувшись с осознанием своей неизбежной гибели, жители этого поселения решили совершить коллективное самоубийство, окружённые своими друзьями и любимыми.\n\nЗдесь нам нечему больше учиться. Готовятся приготовления к переносу нашего расследования к координатам опустошённого священного города."
 mem_orila_primitives_skies_site.4.a:0 "Действительно, здесь не осталось ничего."
 mem_orila_primitives_skies_site.5.name:0 "Древний шпиль"
 mem_orila_primitives_skies_site.5.desc:0 "Одинокий шпиль — потрёпанный и сломанный, но всё ещё стоящий — возвышается над останками некогда почитаемого священного города. Руины распространяются, насколько хватает глаз, сломанные боевые машины усеяли заброшенные площади и улицы, а радиоактивная пыль неслась ветром, делая небо мутным и серым. Там не было ничего, что можно было бы спасти в этой пустоши, так наша экспедиция направилась внутрь оставшейся структуры древнего шпиля, полная решимости раскрыть его первоначальное назначение.\n\nВнутри структуры стало вполне очевидно, что она действительно не была построена цивилизацией, коренной для этого мира. Фактически, технология, использованная в её строительстве, казалась далеко за пределами даже нашего текущего понимания. Было несомненное соединение с обломками, найденными по всей системе, но в отличие от них эта структура ещё не была очищена от каких-либо артефактов. Обширное изучение этого здания привело нашу команду к классификации его как формы генератора щитов, вероятно способного окружить всю планету.\n\nХотя мы не сможем воссоздать критические компоненты этой конструкции для массового производства, это должно быть в пределах наших возможностей восстановить этот артефакт до функционального состояния на одном из наших миров."
 mem_burning_skies_site.5.a:0 "Время дать мёртвым упокоиться."
 mem_orila_primitives_skies_site.5.a.tt:0 "Один строительный набор для $building_mem_planetary_shield_generator_orila$ становится доступным для использования."
