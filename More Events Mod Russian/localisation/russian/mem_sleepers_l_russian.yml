l_russian:

 mem_sleepers_energy_cost:0 "Возврат займа"
 mem_sleepers_research_boost:0 "Опыт Озари"
 leader_trait_mem_last_ozari:0 "Последний Озари"
 leader_trait_mem_last_ozari_desc:0 "Озари были мастерами в области биотехнологий."
 MEM_SLEEPERS_SCAN:0 "Тревожные энергетические показания"
 MEM_SLEEPERS_SCAN_DESC:0 "Наблюдательная станция над §Y[From.GetName]§! докладывает о необычных и тревожных показаниях, полученных с планеты. Предварительный анализ свидетельствует о приближающейся катастрофе, но для полного анализа необходимо привлечь экспертов."
 mem_sleepers.2.name:0 "Внизу"
 mem_sleepers.2.desc:0 "Наш пост наблюдения на §Y[mem_sleepers_planet.GetName]§! сообщает о необычных и тревожных сигналах, идущих с планеты. Они обнаруживают энергетическую подпись, исходящую из-под поверхности планеты в изолированном регионе. Сила сигнала превосходит всё, что может произвести местная технология, и заметно похожа на наши собственные электростанции. Ещё более тревожно то, что подпись явно указывает на растущую нестабильность источника питания. Это, вероятно, закончится катастрофой, если мы не будем действовать быстро."
 mem_sleepers.2.a:0 "Отправьте специалистов для расследования."
 mem_sleepers.3.name:0 "Эпицентр"
 mem_sleepers.3.desc:0 "Мощный подземный взрыв прорвал кору §Y[mem_sleepers_planet.GetName]§!, послав пепел и камни в атмосферу с мощью, соперничающей с извержением супервулкана. Что бы там ни было в эпицентре, теперь наверняка испарено.\n\nНаш пост наблюдения сообщает, что коренные жители, ставшие свидетелями инцидента, изумлены катастрофой, и местные культуры испытывают всплеск духовности, рождённый из страха гнева богов."
 mem_sleepers.3.a:0 "Кажется, всё не так плохо, как могло бы быть."
 mem_sleepers.4.name:0 "Эпицентр"
 mem_sleepers.4.desc:0 "Мощный подземный взрыв прорвал кору §Y[mem_sleepers_planet.GetName]§!, послав пепел и камни в атмосферу с мощью, превосходящей извержение супервулкана. Это вызвало сверхзвуковые ударные волны по всей атмосфере планеты, каскадные серии мощных землетрясений и задыхающие клубы пыли и золы, достаточные, чтобы погрузить всю планету в вечные сумерки. Эта катастрофа разрушила биосферу и погасила местную цивилизацию. Что бы мы могли найти в эпицентре, было наверняка испарено.\n\nНаш пост наблюдения был закрыт, так как некого больше наблюдать."
 mem_sleepers.4.a:0 "Жаль что мы не смогли это предотвратить."
 mem_sleepers.4.b:0 "Такая планета пропала..."
 mem_sleepers.5.name:0 "Подземное хранилище"
 mem_sleepers.5.desc:0 "Энергетическая подпись на §Y[mem_sleepers_planet.GetName]§! требовала точного бурения от нашей научной команды, но в конечном итоге привела их к обширной пещерной системе. Попав внутрь, команда обнаружила крупное искусственное сооружение, намеренно скрытое внутри. Структура была недвусмысленно построена с использованием космических технологий, на века опережающих то, на что способны коренные жители этой планеты. Внутри этого сооружения экипаж был потрясён, обнаружив бесчисленные спящие капсулы, выстроившиеся вдоль стен, содержащие пришельцев не только не соответствующих §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!, но также некоторых, не похожих ни на один другой вид, известный нам, а также огромный запас продвинутого военного оборудования. Однако язык, использованный на терминалах и этикетках, удивительно похож на языки, которые мы изучили, наблюдая за коренными жителями.\n\nНаши инженеры оценили ситуацию в контроле реактора, что было довольно разочаровывающим после предыдущих открытий. Века, если не тысячелетия, без обслуживания сказались, но с нашим уровнем технологии стабилизация реактора должна быть тривиальной, особенно если мы готовы пожертвовать некоторыми из наших собственных ресурсов."
 mem_sleepers.5.a:0 "Попытайтесь стабилизировать его и восстановить хранилище."
 mem_sleepers.5.a.tooltip:0 "Для этого проекта будет использовано 500 энергокредитов."
 mem_sleepers.5.b.tooltip:0 "Поскольку у нас нет необходимых 500 энергокредитов, придётся позаимствовать их у частного сектора."
 mem_sleepers.5.c:0 "Просто отключите все системы и заберите всё ценное их хранилища."
 mem_sleepers.5.c.tooltip:0 "Наша команда начнёт демонтировать всё, что не нарушит целостность строения."
 mem_sleepers.5.d:0 "Не стоит рисковать нашими учёными ради чужаков. Пусть взрывается."
 mem_sleepers.6.name:0 "Технологические сокровища"
 mem_sleepers.6.desc:0 "Отключив капсулы от питания и отправив их обитателей в последний путь, наша команда начала изучать потенциально полезные материалы, а так же исторические и технологические данные, хранившиеся на серверах хранилища.\n\nЕго создатели называли себя Озари. Похоже, что они так и не достигли уровня межзвёздных путешествий, но сильно продвинулись в биотехнологиях. Это и стало в итоге их погибелью; они преобразили предков нынешних §Y[mem_sleepers_natives.GetSpeciesNamePlural]§! и поработили их, что позже привело к восстанию. §Y[mem_sleepers_natives.GetSpeciesNamePlural]§! почти полностью истребили своих бывших хозяев, и лишь немногим Озари удалось укрыться в этом подземном убежище.\n\nМожет для Озари всё закончилось и не очень хорошо, но наши учёные видят большой потенциал в обнаруженных ими фрагментах технологии преображения."
 mem_sleepers.6.a:0 "Очередной научный прорыв. Отличная работа!"
 mem_sleepers.7.name:0 "Из могилы"
 mem_sleepers.7.desc:0 "Пока наша научная команда была занята демонтажем объекта, скрытый механизм безопасности, должно быть, пробудил некоторых спящих. Они были не очень довольны работой нашей команды, и вспыхнула перестрелка. Наше превосходное огневое мощь быстро переломило ход битвы... но не достаточно быстро.\n\nОсознавая свою надвигающуюся гибель, последние остатки спящих инициировали механизм самоуничтожения хранилища, забрав с собой нашу команду — включая нашего главного учёного.\n\nМощный подземный взрыв прорвал кору §Y[mem_sleepers_planet.GetName]§!, послав пепел и камни в атмосферу с мощью, соперничающей с извержением супервулкана. От комплекса хранилища ничего не осталось.\n\nНаш пост наблюдения сообщает, что коренные жители, ставшие свидетелями инцидента, изумлены катастрофой, и местные культуры испытывают всплеск духовности, рождённый из страха гнева богов."
 mem_sleepers.7.a:0 "Они не будут забыты."
 mem_sleepers.8.name:0 "Эпицентр"
 mem_sleepers.8.desc:0 "Мощный подземный взрыв прорвал кору §Y[mem_sleepers_planet.GetName]§!, послав пепел и камни в атмосферу с мощью, соперничающей с извержением супервулкана. От комплекса хранилища ничего не осталось.\n\nНаш пост наблюдения сообщает, что коренные жители, ставшие свидетелями инцидента, изумлены катастрофой, и местные культуры испытывают всплеск духовности, рождённый из страха гнева богов."
 mem_sleepers.8.a:0 "Ну и ладно."
 mem_sleepers.9.name:0 "Эпицентр"
 mem_sleepers.9.desc:0 "Мощный подземный взрыв прорвал кору §Y[mem_sleepers_planet.GetName]§!, послав пепел и камни в атмосферу с мощью, соперничающей с извержением супервулкана. Это вызвало сверхзвуковые ударные волны по всей атмосфере планеты, каскадные серии мощных землетрясений и задыхающие клубы пыли и золы, достаточные, чтобы погрузить всю планету в вечные сумерки. Наши учёные были удивлены масштабом взрыва, так как он далеко превзошёл все предыдущие ожидания, разрушив биосферу и погасив местную цивилизацию.\n\nНаш пост наблюдения был закрыт, так как больше нечего наблюдать."
 mem_sleepers.9.a:0 "Такая планета пропала..."
 mem_sleepers.45.name:0 "Пробуждение"
 mem_sleepers.45.desc:0 "С притоком энергии свет быстро озаряет безмолвные коридоры хранилища. Спальные капсулы открываются одна за другой. Наша команда спешит в зал совета, где находились лидеры общества спящих; прибыв туда, они застают пришельцев за бурным обсуждением. Их язык однозначно связан с языком, на котором говорят местные примитивы, и требуется всего несколько фраз, чтобы установить перевод и связь."
 mem_sleepers.45.a:0 "Тогда настало время послушать их."
 mem_sleepers.45.a.tooltip:0 "Мы обсудим историю и судьбу этих пришельцев."
 mem_sleepers.50.name:0 "Пробуждение спящих"
 mem_sleepers.50.desc:0 "С восстановлением подачи энергии в безмолвных коридорах убежища вновь зажигается свет. Одна за другой, открываются капсулы со спящими. Наша команда спешит в зал совета, где были расположены капсулы с лидерами спящих. Их встречает один из пробудившихся.\n\nЯзык, не смотря на явные различия, очень близок по происхождению к языкам местного примитивного населения. После нескольких предложений универсальный переводчик начинает частично распознавать язык и устанавливается коммуникация.\n\nОни называют себя §YОзари§!. Тысячелетия назад их раса развивалась здесь и доминировала на планете. Задолго до того, как они стали готовы выйти в космос, их открытия в биотехнологиях и генетике достигли удивительных высот. Их эксперименты привели к преображению другой неразумной расы на планете, чтобы они могли исполнять роль слуг, солдат и, возможно, когда-нибудь могли стать равными им. Это были предки расы, известной нам как §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!. Однако, различия между двумя видами привели к конфликту, и хотя многие научные знания были недоступны преображенным, они выигрывали в численности. В последовавшей войне они почти истребили своих бывших хозяев и вынудили их укрыться в подземном убежище, в котором мы их и обнаружили."
 mem_sleepers.50.a:0 "И что они теперь будут делать?"
 mem_sleepers.50.a.response:0 "Пришло время для §YОзари§! встретиться с потомками тех, кого мы возвысили."
 mem_sleepers.51.name:0 "Возвращение благодетелей"
 mem_sleepers.51.desc:0 "Хоть §Y[mem_sleepers_natives.GetSpeciesNamePlural]§! и потеряли большинство знаний их прежних хозяев, но не забыли тех, кто впервые даровал им разум. Память жила в мифах и легендах о богах, преданных их неблагодарными предками.\n\nКак только §YОзари§! открыли себя, §Y[mem_sleepers_natives.GetSpeciesNamePlural]§! возрадовались возвращению их благодетелей. Их связь была заново скреплена, а лидеры обеих рас поклялись не повторять ошибок прошлого. Теперь же они вызывают нас, и хотят обсудить отношения с нашей империей."
 mem_sleepers.51.a:0 "Пригласите их присоединиться к нашей империи."
 mem_sleepers.51.a.tooltip:0 "§Y[mem_sleepers_planet.GetName]§! будет мирно интегрирована в нашу империю."
 mem_sleepers.51.b:0 "Предложите им статус протектората."
 mem_sleepers.51.b.tooltip:0 "§Y[mem_sleepers_planet.GetName]§! станет протекторатом нашей империи."
 mem_sleepers.51.c:0 "Пусть сами выбирают свой путь."
 mem_sleepers.51.c.tooltip:0 "§Y[mem_sleepers_planet.GetName]§! станет независимой империей."
 mem_sleepers.51.d:0 "Нас не интересуют отношения с чужаками."
 mem_sleepers.101.name:0 "День расплаты"
 mem_sleepers.101.desc:0 "§Y[mem_sleepers_natives.GetSpeciesNamePlural]§! возможно, когда-то были способны привести цивилизацию, которая подняла их, к почти полному истреблению, но они больше не обладают властью их предков. Какие технологии у них были, были потеряны во времени, и без направляющей руки их бывших хозяев они были вынуждены строить свою собственную цивилизацию с нуля.\n\nС их почти несуществующей технологией они не были равны оружейному запасу §YОзари§!. Планёры и удары дронов убили большинство примитивов за несколько дней, оставив пробуждённых §YОзари§! единственными хозяевами §Y[mem_sleepers_planet.GetName]§!. Их лидер теперь приветствует нас, желая обсудить их отношения с нашей империей."
 mem_sleepers.101.a:0 "Предательство нельзя прощать...Разрешим им присоединиться."
 mem_sleepers.101.a.xenophobe:0 "Их упорство достойно уважения, хоть они и чужаки. Разрешим им присоединиться."
 mem_sleepers.101.a.tooltip:0 "§Y[mem_sleepers_planet.GetName]§! будет мирно интегрирована в нашу империю."
 mem_sleepers.101.b:0 "Предложите им статус протектората."
 mem_sleepers.101.b.tooltip:0 "§Y[mem_sleepers_planet.GetName]§! станет протекторатом нашей империи."
 mem_sleepers.101.c:0 "Их зверства невыносимы. Разорвите все контакты."
 mem_sleepers.101.c.tooltip:0 "§Y[mem_sleepers_planet.GetName]§! станет независимой империей."
 mem_sleepers.101.d:0 "Нас не интересуют отношения с чужаками."
 mem_sleepers.145.name:0 "Пробуждение"
 mem_sleepers.145.desc:0 "Только несколько капсул загорелись. Наши ученые поспешили извлечь и стабилизировать содержащихся в них инопланетян. Мы легко установили связь, поскольку язык, на котором они говорили, тесно связан с многочисленными языками, на которых говорят современные аборигены.\n\nНе все из них хорошо восприняли новость о гибели своего вида, но мы нашли лидера, который держится стоически и, похоже, способен говорить от имени группы."
 mem_sleepers.145.a:0 "Тогда настало время послушать их."
 mem_sleepers.145.a.tooltip:0 "Мы обсудим историю и судьбу этих пришельцев."
 mem_sleepers.150.name:0 "Выжившие"
 mem_sleepers.150.desc:0 "Всего несколько капсул засветились. Наши учёные поспешили извлечь и стабилизировать находившихся внутри инопланетян.\n\nУстановить контакт оказалось не сложно, поскольку их язык оказался очень похож на несколько языков нынешнего населения. Не все восприняли новости о гибели их расы спокойно. Оправившись от первоначального шока, они поведали нам историю их народа.\n\nТысячелетия назад их раса развивалась здесь и доминировала на планете. Задолго до того, как они стали готовы выйти в космос, их открытия в биотехнологиях и генетике достигли удивительных высот. Их эксперименты привели к преображению неразумной расы, так же обитавшей на §Y[From.From.From.From.GetName]§!, чтобы они могли исполнять роль слуг, солдат и, возможно, когда-нибудь могли стать равными им. Это были предки расы, известной нам как §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!. Однако, различия между двумя видами привели к конфликту, и хотя многие научные знания были недоступны преображенным, они выигрывали в численности. В последовавшей войне они почти истребили своих бывших хозяев и вынудили их укрыться в подземном убежище, в котором мы их и обнаружили.\n\n\"Нам больше нет места в этом мире\" - сказал их лидер - \"Наш раса почти полностью вымерла, а наши создания вряд ли обрадуются нашему появлению. Может вы позволите нам остаться среди вашего народа?"
 mem_sleepers.150.a:0 "Поделитесь с нами вашим опытом в биотехнологиях и добро пожаловать."
 mem_sleepers.150.a.tooltip:0 "§YВыжившие Озари§! в обмен на предоставление убежища поделятся с нами своим опытом биотехнологических исследований."
 mem_sleepers.150.a.response:0 "Мы безгранично вам благодарны. Вы об этом не пожалеете."
 mem_sleepers.150.b:0 "Простите, но ваше место здесь. Вы должны заботиться о ваших созданиях."
 mem_sleepers.150.b.response:0 "Кажется у нас нет выбора. Вы нас не примете и здесь мы остаться не можем..."
 mem_sleepers.150.c:0 "Лучше мы избавим вас от страданий."
 mem_sleepers.150.c.response:0 "В это нет необходимости. Мы уйдём..."
 mem_sleepers.151.name:0 "Последние Озари умерли"
 mem_sleepers.151.desc:0 "Сегодня нам сообщили о том, что скончался последний §YОзари§! с планеты §Y[From.From.From.From.From.GetName]§!. Это знаменует не только конец этой гордой расы, но и прекращение нашего длительного сотрудничества. Нашим самым лучшим учёным будет не хватать их познаний в биоинженерии."
 mem_sleepers.151.a:0 "Они были полезны, и ничего больше..."
 mem_sleepers.151.b:0 "Они были активом, не более того..."
 mem_sleepers.152.name:0 "Путь прогресса"
 mem_sleepers.152.desc:0 "Прошли годы с тех пор, как последний §YОзари§! вышел, чтобы помириться со своим прошлым. Кажется, они нашли новое призвание в жизни. Примитивная цивилизация §Y[mem_sleepers_planet.GetName]§! совершила заметные достижения — очевидно, результат влияния §YОзари§!."
 mem_sleepers.152.a:0 "Вот и отлично."
 mem_sleepers.195.name:0 "Пробуждение"
 mem_sleepers.195.desc:0 "Несмотря на все наши усилия, реактор вышел из строя. Однако нам удалось перенаправить остатки его энергии в одну из капсул. Учёные обнаружили в ней живого инопланетянина и судя по его регалиям, он являлся лидером своей расы.\n\nНам удалось наладить с ним контакт, что оказалось довольно простой задачей, поскольку язык лидера тесно связан с множеством языков, на которых говорят современные аборигены. Более сложной задачей стало выведение инопланетянина от пережитого им потрясения, после нашего рассказа о случившейся трагедии. Но теперь мы уверены, что этот единственный выживший готов говорить."
 mem_sleepers.195.a:0 "Тогда настало время слушать."
 mem_sleepers.195.a.tooltip:0 "Мы обсудим историю и судьбу этих пришельцев."
 mem_sleepers.200.name:0 "Последний"
 mem_sleepers.200.desc:0 "Не смотря на наши усилия, реактор восстановить не удалось. Однако, мы добились того, чтобы он произвёл достаточно энергии для активации единственной капсулы. Наши поспешили извлечь оттуда инопланетянина с неким подобием регалий лидера на одежде.\n\nУстановить контакт оказалось не сложно, поскольку его язык оказался очень похож на несколько языков нынешнего населения. Узнав о том, что он последний представитель своей расы, инопланетянин чуть не сошел с ума. Когда нашей команде удалось его успокоить, он поведал им свою историю.\n\nТысячелетия назад их раса развивалась здесь и доминировала на планете. Задолго до того, как они стали готовы выйти в космос, их открытия в биотехнологиях и генетике достигли удивительных высот. Их эксперименты привели к преображению неразумной расы, так же обитавшей на §Y[From.From.From.From.GetName]§!, чтобы они могли исполнять роль слуг, солдат и, возможно, когда-нибудь могли стать равными им. Это были предки расы, известной нам как §Y[mem_sleepers_natives.GetSpeciesNamePlural]§!. Однако, различия между двумя видами привели к конфликту, и хотя многие научные знания были недоступны преображенным, они выигрывали в численности. В последовавшей войне они почти истребили своих бывших хозяев и вынудили их укрыться в подземном убежище, в котором мы их и обнаружили.\n\n\"Сомневаюсь что для меня есть место в этом мире\", говорит он. \"Может вы позволите мне присоединиться к вам среди звёзд?\""
 mem_sleepers.200.a:0 "Поделитесь с нами вашим опытом в биотехнологиях и добро пожаловать."
 mem_sleepers.200.a.tooltip:0 "Последний Озари присоединится к вашей империи в качестве учёного со специализацией по биотехнологиям."
 mem_sleepers.200.a.response:0 "Я научу вас всему, что знаю. Вы не пожалеете о своём решении."
 mem_sleepers.200.b:0 "Простите, но мы не можем этого позволить."
 mem_sleepers.200.b.response:0 "Но куда же мне идти?!"
 mem_sleepers.200.c:0 "Почему бы нам просто не избавить вас от страданий?"
 mem_sleepers.200.c.response:0 "Так тому и быть. Идти мне больше некуда..."
