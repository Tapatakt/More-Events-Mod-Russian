 mem_vazuran_raiding_stage1:0 "ы"
 mem_vazuran_fallen_empires_situation:0 "Вазуранские секреты"
 mem_vazuran_fallen_empires_situation_type:0 "ы"
 mem_vazuran_fallen_empires_situation_monthly_change_tooltip:0 "ы"
 mem_vazuran_fallen_empires_situation_desc:0 "ы"
 MEM_VAZUR_HOSTILE_GREETING_1:0 "Если это ещё одна мольба или угроза, перейдите к концу — мы уже знаем, как это закончится."
 MEM_VAZUR_HOSTILE_GREETING_2:0 "Говорите быстро. Наше терпение для малых сил микроскопическое."
 MEM_VAZUR_NEUTRAL_GREETING_1:0 "Если вы пришли говорить, так говорите. У нас нет всего цикла."
 MEM_VAZUR_FRIENDLY_GREETING_1:0 "Мы готовы выслушать ваши предложения. Впечатлите нас, и вы можете найти благосклонность."
 MEM_VAZUR_FRIENDLY_GREETING_2:0 "Мы слушаем. Не волнуйтесь, мы позаботимся о важных частях."
 MEM_VAZUR_WAR_GREETING_1:0 "Приготовьтесь. Мы намерены насладиться этим."
 MEM_VAZUR_WAR_GREETING_2:0 "Надеемся, вы принесли всё, что у вас есть. Нам нужно разминаться."
 MEM_VAZUR_OVERLORD_GREETING_1:0 "Постарайтесь упростить это. Мы не ожидаем многого, но удивите нас."
 MEM_VAZUR_PEACE_ACCEPT:0 "Мы примем ваше предложение. Считайте это редким проявлением милосердия."
 MEM_VAZUR_PEACE_REFUSE:0 "Мы отказываемся. Вы ещё недостаточно низко ползали."
 MEM_VAZUR_INSULT_PROPOSE_1:0 "Ваша вся империя — это учебник по недостижению успеха."
 MEM_VAZUR_INSULT_PROPOSE_2:0 "Если бы невежество было властью, вы могли бы иметь значение."
 MEM_VAZUR_INSULT_ACCEPT_FE:0 "Вы даже не конкуренция. Вы — отвлечение."
 council_agenda_agenda_mem_vazurans_march_of_progress_name:0 "Марш прогресса"
 council_agenda_agenda_mem_vazurans_march_of_progress_desc:0 "Исследование ксентрония — это флотский материал следующего поколения. Требуются быстрые действия."
 tradition_mem_vazurans:0 "Стойкость"
 tradition_mem_vazurans_desc:0 "Для идеального оружия нам сначала нужны самые прочные сплавы и стойкие умы."
 tr_mem_vazurans_adopt:0 "Эра ксентрония"
 tr_mem_vazurans_1:0 "Плотные конструкции"
 tr_mem_vazurans_2:0 "Рабочие квоты"
 tr_mem_vazurans_3:0 "Ксентрониевые боеприпасы"
 tr_mem_vazurans_4:0 "Нехватка рабочей силы"
 tr_mem_vazurans_4_swap:0 "Право на работу"
 tr_mem_vazurans_5:0 "Прочные исследования"
 tr_mem_vazurans_1_desc:0 "Фокус на стабильности и целостности материалов — высший приоритет."
 tr_mem_vazurans_2_desc:0 "Мотивированные рабочие — ключ к любой успешной индустрии."
 tr_mem_vazurans_3_desc:0 "Сверхплотные снаряды из ксентрониевых боеприпасов увеличивают пробиваемость наших пушек."
 tr_mem_vazurans_4_desc:0 "Не только кузни нуждаются в постоянном пополнении топлива, даже наша рабочая сила нуждается в большем. Намного большем."
 tr_mem_vazurans_4_swap_desc:0 "У каждого есть право и обязанность работать."
 tr_mem_vazurans_5_desc:0 "Умы и мышцы."
