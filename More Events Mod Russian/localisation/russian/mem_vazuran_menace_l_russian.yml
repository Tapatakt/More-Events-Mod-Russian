 REQUIRES_MEM_VAZURAN_DECISION_DISTRICT_SET:0 "§RТребуется Экуменополис или эквивалентная инфраструктура!§!"
 decision_mem_forge_world:0 "Создать мир кузниц"
 decision_mem_forge_world_abolish:0 "Упразднить мир кузниц"
 decision_mem_forge_world_desc:0 "Создать специализированный мир, где тысяча массивных печей горит внутри, выплавляя металлы, которые будут жизненной силой планеты, освещённый внутренними огнями и приводимый в движение машинами огромного размера и мощности."
 decision_mem_forge_world_abolish_desc:0 "Удалить любую инфраструктуру, связанную с ксентронием."
 tech_mem_vazuran_xentronium_armor:0 "Ксетрониевая броня"
 tech_mem_vazuran_xentronium_armor_desc:0 "Этот сверхплотный материал когда-то был установлен на корабли Вазуран и обладал непревзойденной долговечностью. Он значительно превосходит любые другие известные нам типы брони."
 tech_mem_vazuran_xentronium_armor_bio:0 "Ксентрониевый панцирь"
 tech_mem_vazuran_xentronium_armor_bio_desc:0 "$tech_mem_vazuran_xentronium_armor_desc$"
 tech_mem_vazuran_xentronium_aura:0 "Манипуляция пространством ксентрониевого потока"
 tech_mem_vazuran_xentronium_aura_desc:0 "Продолженное исследование сверхплотного сплава, известного как ксентроний, привело к ошеломляющим экспериментам с генераторами потокового поля. Результаты показывают потенциальное применение в обороне наших кораблей против проникающих снарядов."
 tech_mem_vazuran_xentronium_hangar:0 "Ксентрониевые дизайны дронов"
 tech_mem_vazuran_xentronium_hangar_desc:0 "Дроны, полученные из вазуранских обломков, показывают уникальную возможность внедрить современную технологию дронов и кинетическое вооружение."
 REQUIRES_MEM_OBTAINED_VAZURAN_TECH:0 "Побеждены рейдовые §YВазуранские флоты или армии§!"
 tech_mem_vazuran_xentronium_rounds:0 "Ксетрониевые патроны"
 tech_mem_vazuran_xentronium_rounds_desc:0 "Этот сверхплотный материал когда-то был установлен на корабли Вазуран и обладал непревзойденной долговечностью. Но его характеристики также делают его предпочтительным материалом для наших кинетических боеприпасов."
 tech_mem_vazuran_damper_field_bypass:0 "Обход демпферовых полей"
 tech_mem_vazuran_damper_field_bypass_desc:0 "Более глубокое понимание основных физических законов, на которых основана технология демпферного поля позволит нам обойти ее воздействие на наши корабли - по крайней мере, хоть в какой-то степени..."
 tech_mem_vazuran_rift_stabilization:0 "Стабилизация разлома"
 tech_mem_vazuran_rift_stabilization_desc:0 "Нашим учёным выпала возможность восстановить разлом, который привёл флот Вазуран к нашей столичной системе."
 feature_mem_vazuran_rift_stabilization:0 "§HОткроется возможность:§! Стабилизация разлома"
 feature_mem_vazuran_rift_stabilization_desc:0 "Позволит нам §HСтабилизировать разлом§!, который Вазуран использовали для нападения на наш родной мир."
 tech_mem_vazuran_rift_travel:0 "Путешествие по разлому"
 tech_mem_vazuran_rift_travel_desc:0 "Несмотря на поверхностное сходство с естественными червоточинами, принцип работы разломов и их полностью искусственное происхождение всё ещё озадачивают наших учёных. Однако способ безопасного перемещения через эти дыры в реальности, возможно, находится в пределах нашей досягаемости."
 feature_mem_vazuran_rift_travel:0 "§HОткроется возможность:§! Путешествие по разлому"
 feature_mem_vazuran_rift_travel_desc:0 "§HПутешествие по Разлому§!\nПозволит нашим кораблям проходить через разломы."
 mem_vazuran_wreckage_object:0 "Обломки Вазуран"
 MEM_VAZURANS_ENERGY_DAMPENER:0 "Энергетическое демпфер поле"
