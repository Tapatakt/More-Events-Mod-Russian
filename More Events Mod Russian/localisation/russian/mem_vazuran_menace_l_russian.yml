 mem_VAZURAN_ARMOR:0 "Ксетрониевая броня"
 mem_VAZURAN_ARMOR_DESC:0 "Этот сверхплотный материал когда-то был установлен на корабли Вазуран и обладал непревзойденной долговечностью. Он значительно превосходит любые другие известные нам типы брони."
