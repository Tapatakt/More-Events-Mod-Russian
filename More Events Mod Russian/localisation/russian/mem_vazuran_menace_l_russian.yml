 precursor_mem_vazurans:0 "Вазуранская угроза"
 precursor_mem_vazurans_desc:0 "§YВключает функции, связанные с $mem_vazuran_menace_chain_title$§!\n(Не считается к Предтечам)\n\nНастройки:\n- £trigger_no£ Происхождение Предков & £trigger_no£ Предтеча Вазуран: §YНеактивно§!\n- £trigger_no£ Происхождение Предков & £trigger_yes£ Предтеча Вазуран: §YСлучайно§!\n- £trigger_yes£ Происхождение Предков & £trigger_no£ Предтеча Вазуран: §Y['concept_advanced_empires']§!\n- £trigger_yes£ Происхождение Предков & £trigger_yes£ Предтеча Вазуран: §YАктивно§!\n\nВ текущую эпоху улучшения в технологии разломов позволили Вазуранам ограниченное путешествие через них, таким образом начав эпоху рейдов. Вазуранская родная система, предназначенная быть их тюрьмой, к этому моменту стала их неукротимой крепостью, из которой они проецировали свою власть над галактикой."
 personality_mem_vazuran_personality:0 "Древняя угроза"
 personality_mem_vazuran_personality_desc:0 "Эта цивилизация основана только на грабеже и войне. Они верят только в собственное превосходство и принцип правого сильнейшего."
