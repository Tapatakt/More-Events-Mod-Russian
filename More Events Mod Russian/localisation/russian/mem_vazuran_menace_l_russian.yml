 concept_mem_vazuran_zones_forge_world:0 "Вторичная специализация районов"
 concept_mem_vazuran_zones_forge_world_desc:0 "- $zone_mem_vazuran_alloys$\n- $zone_mem_vazuran_research_engineering$\n- $zone_mem_vazuran_trains_secondary$\n- $zone_mem_vazuran_spare_parts_secondary$"
 zone_mem_vazuran_alloys:0 "Ксентрониевые сварочные массивы"
 zone_mem_vazuran_alloys_desc:0 "Тысяча массивных печей горит внутри обширности этих массивов, выплавляя металлы, которые являются жизненной силой планеты. Секция — это огромная живая мастерская, полная дыма и шума, освещённая внутренними огнями и приводимая в движение машинами огромного размера и мощности."
 zone_mem_vazuran_research_engineering:0 "Исследовательские лаборатории ксентрония"
 zone_mem_vazuran_research_engineering_desc:0 "Централизованная исследовательская зона, напрямую связанная со сварщиками этой планеты. Рука об руку они совершенствуют каждый метод во время создания ксентрония."
 zone_mem_vazuran_trains_secondary:0 "Узел быстрой логистики"
 zone_mem_vazuran_trains_secondary_desc:0 "Взаимосвязанные железные дороги с критически важной скоростью доставляют материалы туда, где это нужно."
 zone_mem_vazuran_spare_parts_secondary:0 "Военные сборочные участки запчастей"
 zone_mem_vazuran_spare_parts_secondary_desc:0 "Малые сборочные линии для конструирования запчастей, используемых в нашем флоте. Предсобранные устройства могут быть легко заменены во время войны."
 zone_mem_vazuran_alloys_ancestors:0 "Ксентрониевые мастерские"
 zone_mem_vazuran_alloys_ancestors_desc:0 "$zone_mem_vazuran_alloys_desc$"
