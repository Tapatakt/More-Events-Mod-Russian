 mem_vazurans_damper_field_exploit:0 "Адаптация к демпфер полю"
 mem_vazurans_damper_field_exploit_desc:0 "Благодаря нашим представлениям о возможностях демпфер поля, мы смогли адаптировать наше оружие к воздействиям демпфер поля."
 mem_vazurans_defender_of_galaxy:0 "Защитник насыщенной галактики"
 mem_vazurans_raided:0 "Цель рейда Вазуран"
 mem_vazurans_raided_desc:0 "Эта планета была опустошена во время жестокого рейда Вазуран. Потребуется много времени, чтобы оправиться от этого безжалостного удара."
 mem_vazurans_stance_bunker_down:0 "Защита родины"
 mem_vazurans_stance_provoke:0 "Спровоцированные вазуране"
 mem_vazurans_stance_provoke_tt:0 "§RУвеличенные шансы рейдов§!"
 mem_vazurans_stance_tribute:0 "Выплата репараций"
 mem_vazurans_stance_tribute_tt:0 "§GРейды не происходят§!"
 mem_vazurans_forge_planet:0 "Планета кузниц"
 mem_vazurans_forge_planet_tt:0 "Открывает ['concept_mem_vazuran_zones_forge_world']"
 mem_vazurans_forge_planet_desc:0 "Основа для специализированной планеты. Эта планета содержит массивные кузницы, производящие военные сплавы. Дополнительная вспомогательная инфраструктура поддерживает печи в рабочем состоянии."
 mem_vazurans_raided_system:0 "Система, подвергшаяся рейду"
 mem_vazurans_raided_planet:0 "Планета, подвергшаяся рейду"
 d_mem_vazuran_bomb_crater:0 "$d_bomb_crater$"
 d_mem_vazuran_bomb_crater_desc:0 "$d_bomb_crater_desc$"
 d_mem_vazuran_ruined_section:0 "Разрушенная Секция"
 d_mem_vazuran_ruined_section_desc:0 "Этот участок среды обитания был разрушен в результате многократных попаданий снарядов. Для того, чтобы он снова стал пригодным для жизни, необходимо провести капитальный ремонт и очистку."
 mem_ended_vazuran_menace:0 "Истребитель вазуран"
 mem_vazuran_opinion_immitators:0 "Воры технологий"
 mem_vazuran_gateway:0 "Стабилизированный разлом"
 mem_vazuran_gateway_DESC:0 "Восстановленный разлом, соединяющий эту систему с цепью разломов."
 mem_vazuran_gateway_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_gateway_nexus:0 "Цепь разломов"
 mem_vazuran_gateway_nexus_DESC:0 "Цепь разломов, формирующая автономные разломы в ткани пространства, которые позволяют перемещаться между другими разломами."
 mem_vazuran_gateway_nexus_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_nexus_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_gateway_endpoint:0 "Станция разломов"
 mem_vazuran_gateway_endpoint_DESC:0 "Установка, используемая для стабилизации пространственных разломов, позволяющая постоянно использовать их в качестве средства для мгновенного путешествия в систему, к которой подключен разлом."
 mem_vazuran_gateway_endpoint_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_endpoint_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_gateway_endpoint_ruined:0 "Разрушенная станция разломов"
 mem_vazuran_gateway_endpoint_ruined_DESC:0 "Эта разрушенная установка может быть использована для стабилизации пространственных разломов, что позволяет постоянно использовать ее в качестве средства для мгновенного путешествия в систему, к которой подключен разлом."
 mem_vazuran_gateway_endpoint_ruined_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_gateway_endpoint_ruined_CONSTRUCTION_INFO_DELAYED:0 ""
 mem_vazuran_habitat_ruined:0 "Разрушенная орбитальная станция Предтеч"
 mem_vazuran_habitat_ruined_DESC:0 "Разрушенная орбитальная станция Предтеч. Хотя ее внутренности были вычищены мародёрами много веков назад, главный корпус мегасооружения всё ещё в цел. При наличии нужной технологии и большого количества ресурсов ее можно восстановить."
 mem_vazuran_habitat_ruined_MEGASTRUCTURE_DETAILS:0 ""
 mem_vazuran_habitat:0 "Орбитальная станция Предтеч"
 mem_vazuran_habitat_DESC:0 "Аркология предтеч предоставляет планетарно-городские условия жизни. Гидропоника и передовые технологии фильтрации делают станцию самодостаточной, а станционные сооружения могут добывать сырье на планете, на орбите которой расположена станция."
 GATEWAY_VAZURAN:0 "Межпространственный разлом"
 GATEWAY_VAZURAN_DESC:0 "Искусственно созданный разлом, образующий проход между несколькими пространствами."
 mem_vazurans.4.name:0 "Формируется подпространственный разлом"
 mem_vazurans.4a.desc:0 "О гигантском всплеске энергии сообщили местные сенсорные станции в системе [from.GetName]. Первые отчёты описывают его источник как разлом в пространстве — дыру в самой реальности.\n\nСистемная оборона в состоянии повышенной готовности, и местные власти запрашивают немедленную помощь от наших военно-морских сил."
 mem_vazurans.4a.desc.gestalt:0 "Наши местные сенсорные станции в системе [from.GetName] обнаружили огромный всплеск энергии. Мы отправили дронов для расследования того, что оказывается разломом в пространстве — дырой в самой реальности.\n\nСистемная оборона в состоянии повышенной готовности. Мы должны предпринять меры предосторожности, отправив наш флот для усиления наших подпрограмм, отвечающих за систему."
 mem_vazurans.4b.desc:0 "О гигантском всплеске энергии сообщили местные сенсорные станции в системе [from.GetName]. Первые отчёты описывают его источник как разлом в пространстве — дыру в самой реальности.\n\nНаши мудрейшие рунные кузнецы подняли тревогу. Они распространяют весть, что великий враг вернулся. Наши военно-морские силы должны поспешить. Если старейшины правы, есть древняя обида, которую нужно уладить..."
 mem_vazurans.4b.desc.gestalt:0 "Наши местные сенсорные станции в системе [from.GetName] обнаружили огромный всплеск энергии. Мы отправили дронов для расследования того, что оказывается разломом в пространстве — дырой в самой реальности.\n\nМы помним эти сигнатуры из древних времён. Одна мысль наполняет нас: месть. Наши военно-морские силы должны поспешить. Если нашим фрагментам памяти можно доверять, мы должны встретиться с разрушителями прошлого."
 mem_vazurans.4d.desc:0 "Сенсорные станции в системе [from.GetName] сообщают, что формируется новый субпространственный разлом. Наш флот уже приведён в состояние повышенной готовности. Мы должны готовиться к худшему."
 mem_vazurans.4c.desc:0 "Сенсорные станции в системе [from.GetName] сообщают, что формируется гигантский субпространственный разлом. Судя по его размеру, надвигается мощный шторм. Мы должны готовиться к худшему."
 mem_vazurans.4.a:0 "Проведите расследование этой аномалии."
 mem_vazurans.4.b:0 "Тревога! Приготовить флоты!"
 mem_vazurans.4.d:0 "При всей бороде, они вернулись!"
 mem_vazurans.4.c:0 "Сделайте это кратким."
 mem_vazurans.4.c.tt:0 "§LДальнейшие рейды будут уведомлениями вместо событий§!"
 MEM_VAZURANS_RIFT_INVESTIGATION:0 "Исследование подпространственного разлома"
 MEM_VAZURANS_RIFT_INVESTIGATION_DESC:0 "Наши ученые до сих пор озадачены тем, как образовался этот разрыв в пространстве-времени. Мы должны найти ответы."
 mem_vazurans.5.name:0 "Мы атакованы"
 mem_vazurans.5a.desc:0 "В разломе образовался своего рода портал. Из него начали выходить корабли неизвестной конструкции. Они пытаются связаться с нами."
 mem_vazurans.5b.desc:0 "Портал сформировался, и было подтверждено, что враждебно настроенные силы движутся к нашей колонии. Похоже, это один из их рейдерских флотов."
 mem_vazurans.5c.desc:0 "Образовался гигантский портал, через который прорвался огромный флот. Он направляется прямо на нашу родную планету."
 mem_vazurans.5.a:0 "На экран."
 mem_vazurans.5.b:0 "Защитить колонию."
 mem_vazurans.5.c:0 "Защищать [root.Capital.GetName] любой ценой!"
 mem_vazurans.6.name:0 "Входящее сообщение"
 mem_vazurans.6a.desc:0 "Мы Вазуране. Мы сделали эту галактику своей задолго до того, как ваши предки покинули свои жалкие пещеры...\n\nТы будешь служить нам или разделять судьбу тех, кто был до тебя.\n\nЗнайте, что вы существуете только потому, что мы позволяем это...\n\nВ случае неповиновения вы все будете уничтожены..."
 mem_vazurans.6b.desc:0 "Ваш вид более живуч, чем мы ожидали...\n\nМы Вазуране. Мы сделали эту галактику своей задолго до того, как ваши предки покинули свои жалкие пещер...\n\nТы будешь служить нам или разделять судьбу тех, кто был до тебя. Мы сожгли твой мир однажды, и мы сможем сделать это снова.\n\nЗнай, что ты существуешь только потому, что мы позволяем...\n\nВ случае неповиновения вы все будете уничтожены."
 mem_vazurans.6.a:0 "Кто вы?"
 mem_vazurans.6.a.response:0 "Твои Хозяева... Тебе не нужно знать большего..."
 mem_vazurans.6.b:0 "Но должен же быть способ мирно сосуществовать!?"
 mem_vazurans.6.b.response:0 "Несомненно... Мы правим, ты служишь..."
 mem_vazurans.6.c:0 "Мы не боимся тебя, Ксеномразь..."
 mem_vazurans.6.c.response:0 "Ты будешь... со временем."
 mem_vazurans.6.d:0 "Ты уродлив, как мы помним, жуколицый."
 mem_vazurans.6.d.response:0 "Вы будете бояться нас...."
 mem_vazurans.6.e:0 "Мы помним ваш вид..."
 mem_vazurans.6.e.response:0 "Вы будете бояться нас снова...."
 mem_vazurans.7.name:0 "Входящее сообщение"
 mem_vazurans.7a.desc:0 "Ваше продолжающееся сопротивление слишком долго было помехой. Мы послали наш флот, чтобы показать вам последствия ваших действий."
 mem_vazurans.7b.desc:0 "Вы думали, что манипуляции с нашими технологиями останутся незамеченным? Теперь вы ответите за свое святотатство..."
 mem_vazurans.7.a:0 "Прекратите передачу."
 mem_vazurans.8.name:0 "Колония потеряна"
 mem_vazurans.8.desc:0 "На этот раз вазуранцам не понравились наши ресурсы. Была уничтожена целая колония, а мы по-прежнему не в состоянии отреагировать на эти зверства."
 mem_vazurans.8.a:0 "Должен быть способ остановить их!"
 mem_vazurans.8.b:0 "Мы должны защитить наш народ... хоть как-то!"
 mem_vazurans.9.name:0 "Колония подверглась рейду"
 mem_vazurans.9.desc.a:0 "Наша колония [mem_vazurans_raid_planet_name.GetName] была разграблена Вазуранским флотом. Бесчисленное множество граждан погибло в результате этого безрассудного нападения, и инфраструктура планеты была разрушена.\n\nНесмотря на этот ужасный исход, потери и ущерб были бы еще больше, если бы не наша планетарная оборона."
 mem_vazurans.9.desc.b:0 "Наша колония [mem_vazurans_raid_planet_name.GetName] был атакован рейдерским флотом Вазуран. Бесчисленное множество граждан погибло в результате этого безрассудного нападения, и инфраструктура планеты была разрушена."
 mem_vazurans.9.a:0 "Мы выдержим несмотря ни на что!"
 mem_vazurans.9.b:0 "Мы должны укрепить нашу защиту!"
 mem_vazurans.9.c:0 "Мы должны защитить наш народ... Но как?!"
 MEM_VAZURANS_DEFENSE_PLAN:0 "Укрепление обороны"
 MEM_VAZURANS_DEFENSE_PLAN_DESC:0 "После разрушительного нападения на одну из наших колоний, была выдвинута инициатива по поиску путей более эффективной защиты нашего народа от угрозы Вазуран."
 mem_vazurans.21.name:0 "Галактический хаос"
 mem_vazurans.21a.desc:0 "Торговцы сообщают о продолжающихся нападениях на различные империи, с которыми мы еще не установили контакт неизвестной силой. Согласно сообщениям, нападавшие были хорошо оснащены."
 mem_vazurans.21b.desc:0 "Открытые подпространственные каналы связи снова переполнены сообщениями о рейдах Вазурана."
 mem_vazurans.30.name:0 "Родной флот Вазуран побеждён!"
 mem_vazurans.30a.desc:0 "До нас дошли сообщения о том, что вазураны терпят решительное поражение против флота [mem_vazuran_victor.GetAdj]. С уничтожением флота Вазуран, галактика, наконец, может вздохнуть с облегчением и более не бояться Вазуранского террора."
 mem_vazurans.31.name:0 "Захвачен родной мир Вазуран"
 mem_vazurans.31a.desc:0 "Без их флота, это был лишь вопрос времени, когда родной мир Вазуран падёт. Когда военные [mem_vazuran_invader.GetAdj] празднуют свое успешное падение на планету, Галактика вступает в новую эпоху, свободную от угрозы Вазурана, которая угрожала ей на протяжении тысячелетий."
 mem_vazurans_31.a:0 "Наконец-то!"
 mem_vazurans.40.name:0 "Пространственный портал"
 mem_vazurans.40.desc:0 "Как предположила телеметрия наших зондов, отправленных в Разлом незадолго до нашей первой встречи с Вазуран, это был портал, не совсем похожий на естественные червоточины. Однако, в отличие от червоточин, этот разрыв был создан искусственно. Наш [root.GetScientistResearchSubroutinePlural] не смогла дать никаких объяснений тому, как это произошло.\n\nУ нас мало информации, но мы предполагаем, что эти порталы могут открыться где угодно. Мы должны быть начеку."
 mem_vazurans.40.a:0 "Это сбивает с толку."
 mem_vazurans.50.name:0 "Атака была отбита"
 mem_vazurans.50a.desc:0 "Наш флот одержал победу в ожесточённой битве над [root.capital_scope.GetName]. Оставшиеся вазуранские силы полностью отступают. Потери среди нашего флота все еще оцениваются, и многие корабли получили серьезные повреждения или даже были брошены. Но цена, которую мы должны были заплатить, стоила того.  Они дважды подумают, прежде чем предпринять еще одну такую попытку.\n\nРазлом, который они использовали, чтобы войти в нашу систему, уже начал закрываться. Однако на этот раз это происходит гораздо медленнее, чем во время предыдущих вторжений. Теория наших [root.GetScientistResearchSubroutinePlural] о том, что этот громоздкий портал никогда не перестанет существовать - факт, который вызывает беспокойство, но в то же время открывает новые возможности. Если бы мы смогли стабилизировать его, контратака на базу Вазуран стала бы для нас возможной."
 mem_vazurans.50b.desc:0 "Наш флот не смог сдержать силы Вазуран. Они начали бомбить и опустошать наш столичный мир. Потери исчисляются миллиардами, поскольку бомбардировки были направлены конкретно на городские населенные пункты. Потребуются годы, чтобы восстановить то, что было разрушено.\n\nРазлом, который они использовали, чтобы войти в нашу систему, уже начал закрываться. Однако на этот раз это происходит гораздо медленнее, чем во время предыдущих вторжений. Наши ученые предполагают то, что этот громоздкий портал действительно не может исчезнуть - факт, который вызывает беспокойство, но в то же время открывает возможность, которой у нас не было ранее. Если бы мы смогли стабилизировать его, контратака на базу Вазуран стала бы для нас возможной, и смогли бы отомстить за погибших."
 mem_vazurans.50b.desc.gestalt:0 "Наш флот не смог сдержать силы Вазуран. Они начали бомбить и опустошать наш столичный мир. Основным элементам планетарной инфраструктуры был причинен значительный ущерб, и миллиарды дронов были уничтожены, поскольку они наносили удары по объектам, имеющим ключевое стратегическое значение. Потребуются годы, чтобы восстановить то, что было разрушено.\n\nРазлом, который они использовали, чтобы войти в нашу систему, уже начал закрываться. Однако на этот раз это происходит гораздо медленнее, чем во время предыдущих вторжений. Теория наших [root.GetScientistResearchSubroutine] о том, что этот громоздкий портал действительно не может исчезнуть - факт, который вызывает беспокойство, но в то же время открывает возможность, которой у нас не было ранее. Если бы мы смогли стабилизировать его, контратака на базу Вазуран стала бы для нас возможной, и смогли бы отомстить за погибших."
 mem_vazurans.50.a:0 "Будем надеяться."
 mem_vazurans.51.name:0 "Привратник"
 mem_vazurans.51.desc:0 "Благодаря проведенным фундаментальным исследованиям и глубокому пониманию процесса образования разломов, наша [root.GetScientistResearchSubroutinePlural] представила предложение о создании станции, рядом с координатами бывшего портала. Согласно их планам, она будет использоваться для передачи энергии, при помощи которой портал будет открыт и поддерживаться в будущем."
 mem_vazurans.51.a:0 "Делайте."
 MEM_VAZURANS_RIFT_STABILIZATION:0 "Стабилизация разлома"
 MEM_VAZURANS_RIFT_STABILIZATION_DESC:0 "Мы должны подготовить необходимое оборудование для восстановления и поддержания стабильной связи с оперативной базой Вазуран."
 mem_vazurans.53.name:0 "Портал"
 mem_vazurans.53.desc:0 "Наши инженеры завершили свою работу над станцией разлома. Процедура стабилизации была инициирована, и после того, что казалось вечностью, новый разлом медленно открылся, образуя новый портал. Зонды, которые мы отправили сквозь него, подтвердили, что мы достигли сильной связи с другой стороной. Теперь мы достаточно уверены, чтобы отправить экспедиционные силы с экипажем."
 mem_vazurans.53.desc.gestalt:0 "Наши инженерные дроны завершили свою работу над станцией разлома. Процедура стабилизации была инициирована, и после того, что казалось вечностью, новый разлом медленно открылся, образуя новый портал. Зонды, которые мы отправили, подтвердив, что мы достигли сильной связи с другой стороной, теперь мы достаточно уверены, чтобы отправить экспедиционные силы с экипажем."
 mem_vazurans.53.a:0 "Давайте покончим с этим."
 mem_vazurans.60.name:0 "Древняя установка"
 mem_vazurans.60.a.desc:0 "На краю системы [mem_vazuran_gateway_endpoint_system.GetName] была обнаружена древняя установка. Здесь образовался разлом в самой ткани пространства-времени, создав \"§Hчервоточину§!\", которая, по предположению [Root.Owner.GetScientistPlural], может служить каналом через подпространство к другой червоточине, расположенной где-то еще в нашей галактике. Структуры, окружающие ее, похоже, функционируют как стабилизаторы этого искусственного разлома.\n\nЗонды, отправленные туда, обнаружили несовместимость между нашей технологией и окружающей средой. Ни один из них не прошел через этот разлом, так как субсветовые двигатели и реакторы вышли из строя, что привело к их уничтожению. Перед тем, как попытаться совершить путешествие через эти разломы, мы должны будем модифицировать системы нашего корабля, чтобы противостоять этим неблагоприятным эффектам."
 mem_vazurans.60.b.desc:0 "Ещё одна древняя установка была обнаружена на краю системы [mem_vazuran_gateway_endpoint_system.GetName]. На этот раз мы нашли неповрежденную версию. Как мы и предполагали, основываясь на наших наблюдениях в предыдущем месте, здесь образовался разлом в самой ткани пространства-времени, создав \"§Hчервоточину§!\", которая, по предположению [Root.Owner.GetScientistPlural], может служить проводником через подпространство к другой червоточине, расположенной где-то еще в нашей галактике. Структуры, окружающие ее, похоже, функционируют как стабилизаторы этого искусственного разлома.\n\nЗонды, отправленные туда, обнаружили несовместимость между нашей технологией и окружающей средой. Ни один из них не прошел через этот разлом, так как субсветовые двигатели и реакторы вышли из строя, что привело к их уничтожению. Перед тем, как попытаться совершить путешествие через эти разломы, мы должны будем модифицировать системы нашего корабля, чтобы противостоять этим неблагоприятным эффектам."
 mem_vazurans.60.a:0 "Сначала нам придется адаптироваться."
 mem_vazurans.61.name:0 "Разрушенная установка"
 mem_vazurans.61.a.desc:0 "На краю системы [mem_vazuran_gateway_endpoint_system.GetName] была обнаружена древняя установка какого-то типа. Ее разрушенное состояние не скрывает того факта, что тот, кто ее создал, был намного более развит, чем мы. Предварительное сканирование выявило аномалию в центре установки. Если теория верна наших ученых верна, то цель структуры — стабилизировать аномалию и сформировать некий портал. Пока мы можем только гадать, куда он может привести.\n\nХотя наши надежды на воссоздание этой технологии своими силами довольно слабы, при наличии достаточного времени мы сможем восстановить эту установку до рабочего состояния."
 mem_vazurans.61.b.desc:0 "На краю системы [mem_vazuran_gateway_endpoint_system.GetName] была обнаружена еще одна древняя установка. На этот раз мы нашли ее в заброшенном состоянии. Разлом, в котором находится это сооружение, почти обрушился сам по себе. Несмотря на значительные повреждения, которые она получила, нет никаких сомнений в том, что тот, кто ее создал, был гораздо более продвинутым, чем мы. Эта установка также доказывает правильность предположения наших [Root.Owner.GetScientistPlural]. Цель структуры действительно состоит в стабилизации и поддержании разлома.\n\nХотя наши надежды на воссоздание этой технологии своими силами довольно слабы, при наличии достаточного времени мы сможем восстановить эту установку до рабочего состояния."
 mem_vazurans.61.a:0 "Если бы её можно было как-то восстановить..."
 mem_vazurans.62.name:0 "Тотальное уничтожение"
 mem_vazurans.62.desc:0 "Эта система лежит в руинах. Поля обломков окружают разбитую оболочку, которая когда-то была могущественной станцией. Разрушенная гигантская структура возле останков второй планеты доминирует над пейзажем как памятник былому величию её строителей. Обломки, найденные здесь, соответствуют стилю и составу материалов сооружений разломов, что позволяет предположить, что их строителем был один и тот же вид.\n\nОб их цивилизации удалось выяснить не так много. Заброшенные станции и корабли, дрейфующие в пустоте, похоже, уже давно разграблены и очищены от любых ценных технологий, а оставшиеся ядра данных специально стерты. Похоже, что кто-то очень сильно не хотел, чтобы информация о тех, кто жил здесь распространилась, но кто именно?.\n\nОказалось, что устройство разломов в этой системе значительно отличается от тех, которые присутствуют в основной галактике. Вокруг разлома имеются дополнительные структуры - или, если так можно сказать, несколько разломов одновременно содержащихся в нем и функционирующих в качестве узла, соединенного с несколькими конечными точками. Невозможно переоценить стратегических возможностей, которые открывающиеся при захвате этой системы. Будь то для поддержки наших собственных планов или для того, чтобы помешать нашим врагам, обеспечение безопасности этого места для [owner.GetName] должно иметь высокий приоритет."
 mem_vazurans.62.a:0 "Мы должны заполучить эту систему себе."
 mem_vazurans.63.name:0 "Станция разломов восстановлена"
 mem_vazurans.63.a.desc:0 "Станция разломов в системе [mem_vazuran_rift_system.GetName] была восстановлена. Было довольно сложно собрать эту головоломку обратно, имея лишь самое базовое представление о ее технологии. Однако более сложной задачей, с которой мы столкнулись, была процедура активации и стабилизации разлома. В конечном итоге все прошло хорошо, и разлом теперь стабилен, но сообщения о том, как произошло его открытие, — вызывают беспокойство.\n\nВидимо, после многочисленных бессонных ночей один из наших [Root.GetScientistPlural] расстроился из-за отсутствия прогресса и в порыве ярости начал беспорядочно переключать управляющие кристаллы в главном каркасе установки, что привело к восстановлению разлома. Теперь некоторые называют [Root.GetScientist] гением, а другие просто радуются, что он не взорвал всю систему..."
 mem_vazurans.63.a.name:0 "В будущем, назначьте ему больше времени для отдыха."
 mem_vazurans.63.b.desc:0 "Станция разломов в системе [mem_vazuran_rift_system.GetName] была восстановлена. Использовав ту же процедуру, что и в предыдущем случае, разлом стабилизировался без проблем."
 mem_vazurans.63.c.desc:0 "Станция разломов в системе [mem_vazuran_rift_system.GetName] была восстановлена. Восстановление самих структур было эффективно выполнено нашими дронами, но их активация оказалась для наших [Root.GetScientistPlural] огромной проблемой. После нескольких недель отсутствия прогресса один из них вдруг начал произвольно перетасовывать управляющие кристаллы в главном каркасе установке, что привело к стабилизации разлома."
 mem_vazurans.63.c.name:0 "Нет ничего недостижимого для нашего разума."
 mem_vazurans.63.d.desc:0 "Станция разломов в системе [mem_vazuran_rift_system.GetName] была восстановлена. Восстановление самих структур было эффективно выполнено нашими дронами. Однако процесс реактивации оказался несколько проблематичным. Пришлось отбросить несколько десятков дефектных [Root.GetScientistPlural], пока не удалось воссоздать наш предыдущий успех. Тем не менее, разлом был стабилизирован."
 mem_vazurans.63.d.name:0 "Удалите дефекты, они недостойны нашего совершенства."
 mem_vazurans.63.e.desc:0 "Станция разломов в системе [mem_vazuran_rift_system.GetName] была восстановлена. Восстановление самих структур было эффективно выполнено нашими юнитами, но их активация оказалась для наших [Root.GetScientistPlural] огромной проблемой. После нескольких недель безрезультатной работы один из них применил стандартную подпрограмму рандомизации, чтобы определить новую схему расположения управляющих кристаллов в главном каркасе установки. Эта операция прошла успешно, и разлом был стабилизирован."
 mem_vazurans.63.e.name:0 "Подпрограмма рандомизации достойна похвалы."
 mem_vazurans.63.f.desc:0 "Станция разломов в системе [mem_vazuran_rift_system.GetName] была восстановлена. Восстановление структур было эффективно выполнено нашими юнитами. Повторение нашей предыдущей операции прошло успешно. Разлом теперь стабилен."
 mem_vazurans.63.f.name:0 "Как и ожидалось."
 requires_technology_mem_vazuran_rift_stabilization:0 "$TRIGGER_FAIL$Требуется технология £physics£ §Y$tech_gateway_activation$§!."
 BYPASS_DESC_INACTIVE_MEM_VAZURAN_INTERDIM_GATEWAY:0 "Необходима активация путем восстановления §YСтанции разломов§!."
 GATEWAY_VAZURAN_DESC_UNEXPLORED:0 "В этой системе находится §Rне изученный§! §YРазлом§!"
 ENTRY_BYPASS_MEM_VAZURAN_INTERDIM_GATEWAY:0 "Обход."
 EXIT_BYPASS_MEM_VAZURAN_INTERDIM_GATEWAY:0 "Выход."
 mem_vazurans.64.name:0 "Орбитальная станция Предтеч восстановлена"
 mem_vazurans.64.desc:0 "Разрушенная орбитальная станция предтеч полностью восстановлена. Окружающие поля обломков были расчищены, а их материал использован в ходе восстановительных работ. Наши строительные бригады стали называть орбитальную станцию «Звёздный Трон». Неясно, кто и почему придумал это название, но на данный момент оно прижилось, и кто-то может обидеться, если мы изменим его сейчас..."
 mem_vazurans.70.name:0 "Нападавшие Вазуране разбиты"
 mem_vazurans.70.desc.a:0 "Нашему флоту удалось нанести поражение атакующим войскам Вазуран. Спасательные работы уже начаты, кроме того были отмечены многочисленные объекты для научного изучения."
 mem_vazurans.70.desc.b:0 "Нашему флоту удалось нанести поражение атакующим войскам Вазуран. Спасательные работы уже начаты, из-за сильных повреждений не удалось обнаружить что-либо интересного для науки."
 mem_vazurans.200.name:0 "Разруха"
 mem_vazurans.200a.desc:0 "По достижении системы [From.GetName] наши сенсоры обнаружили, что одна из её планет была разбита на части в какой-то моменте прошлого. Неясно, что вызвало это. Рекомендуется провести дополнительное расследование."
 mem_vazurans.200b.desc:0 "Мы наткнулись на другой расколотый мир. При сканировании его окрестностей, мы обнаружили следы тех же тяжелых сплавов, которые мы видели раньше. Эта планета, должно быть, стала жертвой тех же сил."
 mem_vazurans.200c.desc:0 "Мы наткнулись на другой расколотый мир. Краткое сканирование его окрестностей показывает следы тех же самых тяжелых сплавов, которые используют Вазуране. Еще один мир стал жертвой их террора."
 MEM_VAZURANS_BROKEN_PLANET_INVESTIGATION:0 "Разрушенный мир"
 MEM_VAZURANS_BROKEN_PLANET_INVESTIGATION_DESC:0 "Углубленное исследование этого места должно дать нам больше информации о том, что могло произойти с этой планетой."
 mem_vazurans.201.name:0 "Апокалипсис"
 mem_vazurans.201a.desc:0 "После изучения того, что осталось от этого мира, главный ученый [root.Leader.GetName] и [root.Leader.GetHerHis] коллеги пришли к тревожному выводу. Учитывая всю имеющуюся информацию, нынешнее состояние [From.From.GetName] является результатом катастрофической орбитальной бомбардировки.\n\nВ окрестностях этого места можно обнаружить следы сверхтяжелых элементов, которые не встречаются в природе. Кто это сделал и почему - остается загадкой."
 mem_vazurans.201b.desc:0 "После изучения того, что осталось от этого мира, главный ученый [root.Leader.GetName] и [root.Leader.GetHerHis] коллеги пришли к тревожному выводу. Учитывая всю имеющуюся информацию, нынешнее состояние [From.From.GetName]является результатом катастрофической орбитальной бомбардировки.\n\nВ непосредственной близости от этого места можно найти следы сверхтяжелых элементов, которые присущи технологиям Вазуран. Похоже, что они преподали урок тем, кто здесь ранее жил. Никаких следов цивилизации, которая предположительно жила в этом мире, не обнаружено."
 mem_vazurans.201.a:0 "Это беспокоит."
 mem_vazurans_category_1:0 "Покрытые кратерами"
 mem_vazurans_category_1_desc:0 "Нет ничего странного в том, что на бесплодных планетах возникает много кратеров в результате космических столкновений, но не в данном случае. Кратеры на планете кажутся слишком однообразными и повторяющимися, что вызывает подозрения к природе их возникновения."
 mem_vazurans.202.name:0 "Конец света"
 mem_vazurans.202.desc:0 "Проводя серию низковысотных облётов для изучения кратеров с использованием шаттла, наши учёные получили слабую самоповторяющуюся передачу, исходящую из глубины под обломками. [root.Leader.GetName], хотя и смог определить её источник, быстро отверг идею попытаться достичь его как слишком опасную.\n\nВернувшись на борт [root.GetName], [root.Leader.GetSheHe] смог расшифровать записанную передачу.\n\nОна состояла из нескольких минут видеотрансляции, начинающейся посреди того, что, по-видимому, была прямой новостной репортажей о публичном праздновании.\n\n§SБольшие парады несут обломки по улицам в сопровождении ликующих масс, пока внезапно атмосфера полностью не меняется и не распространяется паника. Затем вид резко перемещается к темнеющему небу. Горящий обломок чертит огненную линию, падая к земле. Прежде чем он достигает поверхности, вокруг происходят гигантские взрывы, и видео резко обрывается.§!\n\nНедостаточно материала для перевода того, что было сказано, но [root.Leader.GetName] принимает это как доказательство того, что [From.GetName] стал жертвой баллистической бомбардировки инопланетным флотом. Следы сверхплотного соединения, распространённые по поверхности планеты, поддерживают эту теорию."
 mem_vazurans.203.name:0 "Жестокая шутка"
 mem_vazurans.203.desc:0 "Исследование поверхности [From.GetName] не дало каких-либо внятных показаний. Но ко всему прочему добавилась еще одна тайна: следы сверхплотного соединения. о котором мы почти ничего не знаем, каким-то образом распространились по всей поверхности планеты.\n\nОднако настоящий прорыв в исследовании планеты был сделан, когда [root.GetName] обнаружил скрытую базу внутри пустого астероида на орбите [From.GetName]. Этот объект, который по нашим меркам довольно примитивен, был заполнен стазисными камерами, в которых находятся тысячи мертвых существ.\n\nПросматривая фрагменты данных, хранящихся в компьютерной системе объекта, наша научная команда может собрать воедино отчаянную ситуацию, с которой столкнулись жители [From.GetName]. В прошлом их цивилизация неоднократно достигала технического превосходства. Их растущее сопротивление было встречено все более жестокими ответными ударами, и они опасались того, что их родной мир также подвергнется этим нападениям. В качестве средства возрождения их цивилизации, если случится худшее, эта скрытая база была установлена, чтобы действовать как ковчег для сохранения их самых ярких умов и достаточного генетического разнообразия для возрождения их цивилизации.\n\nОднако они не ожидали, что враги превратят их родной мир в опустошенный и полностью непригодный для жизни камень. «Скрытая база», похоже, была намеренно сохранена - учитывая то, что мы смогли её найти, их противники, сделали тоже самое. Как указано в журналах, система стазиса была отключена по графику спустя десять лет после потери контакта с планетой. [root.Leader.GetName] даже представить себе не может, какой ужас и отчаяние испытали эти люди, осознав свою ситуацию. Оснащенные всего двумя кораблями-шаттлами без сверхсветовых технологий, лишенные возможности вернуться на свой родной мир, они оказались в очень затруднительном положении. Вскоре после этого, система стазиса была вновь активирована на неопределенный срок."
 mem_vazurans.203.desc.gestalt:0 "Исследование поверхности [From.GetName] не дало каких-либо внятных показаний. Но ко всему прочему добавилась еще одна тайна: следы сверхплотного соединения. о котором мы почти ничего не знаем, каким-то образом распространились по всей поверхности планеты.\n\nОднако настоящий прорыв в исследовании планеты был сделан, когда [root.GetName] обнаружил скрытую базу внутри пустого астероида на орбите [From.GetName]. Этот объект, который по нашим меркам довольно примитивен, был заполнен стазисными камерами, в которых находятся тысячи мертвых существ.\n\nПросматривая фрагменты данных, хранящихся в компьютерной системе объекта, наша научная команда может собрать воедино отчаянную ситуацию, с которой столкнулись жители [From.GetName]. В прошлом их цивилизация неоднократно достигала технического превосходства. Их растущее сопротивление было встречено все более жестокими ответными ударами, и они опасались того, что их родной мир также подвергнется этим нападениям. В качестве средства возрождения их цивилизации, если случится худшее, эта скрытая база была установлена, чтобы действовать как ковчег для сохранения их самых ярких умов и достаточного генетического разнообразия для возрождения их цивилизации.\n\nОднако они не ожидали, что враги превратят их родной мир в опустошенный и полностью непригодный для жизни камень. «Скрытая база», похоже, была намеренно сохранена - учитывая то, что мы смогли её найти, их противники, сделали тоже самое. Как указано в журналах, система стазиса была отключена по графику спустя десять лет после потери контакта с планетой. Трудно представить представить, какой ужас и отчаяние испытали эти люди, осознав свою ситуацию. Оснащенные всего двумя кораблями-шаттлами без сверхсветовых технологий, лишенные возможности вернуться на свой родной мир, они оказались в очень затруднительном положении. Вскоре после этого, система стазиса была вновь активирована на неопределенный срок."
 mem_vazurans.204.name:0 "Призраки прошлого"
 mem_vazurans.204.desc:0 "Во время более тщательного обследования поверхности [From.GetName] один из помощников [root.Leader.GetName] заметил, что на планете были искусственные сооружения, команда также подтвердила наличие этих структур.\n\nИсследование руин не могло продолжиться из-за частого прерывания связи между [root.GetName] и учеными во главе с [root.Leader.GetName]. В эти моменты некоторые сотрудники испытали испытывали странные видения, как они их назвали, - психотические эпизоды. Также пострадавший от этого явления, главный ученый решил вернуться на шаттл, опасаясь, что долгое воздействие этого явления может поставить команду в опасное положение. Однако, прежде чем они смогли взлететь, помутнения сознания стали длиться намного дольше, а их эффект был значительно сильнее, чем прежде. Когда связь восстановилась, один очень потрясенный ученый сообщил, что они собираются убираться от туда немедленно. Половина команды была без сознания, когда они прибыли на место встречи с [root.GetName].\n\nПосле выздоровления, ученый [root.Leader.GetName] сообщает, что пережил видение коллективной гибели целого мира от рук безжалостного противника. Согласно [root.Leader.GetHisHer] теории, жители [From.GetName] должны были обладать обширными псионическими способностями, что привело к тому, что самые ужасающие мгновения их последних дней жизни на этом мире запечатлелись в самом корне этой планеты. Хоть ученый и не пострадал физически, ведения еще долго преследовали [root.Leader.GetHisHer].\n\nДальнейшее сканирование показало следы сверхплотного соединения, распространенного по всей поверхности планеты, которое, вероятно, возникло из-за оружия, использованного при её уничтожении, что подтверждает теорию [root.Leader.GetName]."
 mem_vazurans_category_2:0 "Покрытые кратерами"
 mem_vazurans_category_2_desc:0 "Сканирование [From.GetName] докладывает нам об подозрительных кратерных образованиях и следах одного и того же сверхплотного соединения, которое, как известно, не встречается нигде в природе, но оно точно связано с коллапсом нескольких цивилизаций, планеты которых мы исследовали ранее."
 mem_vazurans.205.name:0 "Подозрительные спутники"
 mem_vazurans.205.desc:0 "Дальнейшее исследование [From.GetName] показало, что планета действительно была когда-то обитаемой, но стала непригодной для жизни из-за сверхплотного материала, который был разбросан по всей поверхности планеты в результате орбитальной бомбардировки. Эти события, должно быть, произошли много тысяч лет назад, и остатки на поверхности уже прилично разложились и размылись, что не дает нам сделать каких-либо заключительных выводов.\n\nКак только ученый [root.Leader.GetName] собирался завершить [root.Leader.GetHisHer] исследования, сканеры [root.GetName] обнаружили набор крошечных, подозрительно идентичных объектов, вращающихся вокруг спутника [From.GetName]. Это оказались искусственные спутники, содержащие ядра данных. Главный ученый предполагает, что они должны были быть найдены и действовать как своего рода капсулы времени. \n\nОднако для получения доступа к хранящимся в них данным и их расшифровки потребуются значительные усилия."
 mem_vazurans.205.a:0 "Что в них содержится?"
 MEM_VAZURANS_ANOMALY_PLANET_INVESTIGATION:0 "Расшифровка ядер данных"
 MEM_VAZURANS_ANOMALY_PLANET_INVESTIGATION_DESC:0 "У нас есть восстановленные ядра данных, которые находились на орбите, когда [From.From.GetName] была уничтожена. Кто знает, какой секрет или сообщение они содержат?"
 mem_vazurans.206.name:0 "Капсулы времени"
 mem_vazurans.206.desc:0 "Нашим ученым удалось расшифровать части ядра данных. Расшифровку усложняет то, что копия одной и той же записи может быть восстановлена в части блоков данных, сделано это было, вероятно, для увеличения шансов сохранения данных. Содержащиеся в блоках данные чрезвычайно обширны, и нашим ученым потребуются месяцы, если не годы, чтобы полностью расшифровать их.\nПервая запись, которая является заглавной страницей, уже переведена:\n\n'Мы думали, что мы непобедимы. Мы думали, что сможем остановить 'Разрушителей'. Мы не были молодой расой, как другие, которых они уничтожили - мы путешествовали по галактике на протяжении тысячелетий. Но они победили нас. К тому времени, как это сообщение будет найдено, больше ничего не останется от нашей некогда гордой расы. Мы оставляем эту запись в надежде, что наше самое ценное сокровище, слова наших величайших философов -- наше культурное наследие -- сможет пережить исчезновение нашей расы.'"
 mem_vazurans.206.a:0 "Отлично."
 mem_vazurans.240.name:0 "Завершена реализация Инициативы по планетарной защите"
 mem_vazurans.240.desc:0 "С самого начала этого амбициозного начинания многие подходы были представлены и вновь отвергнуты. И все же одно нам кажется очень многообещающим. \n\nМы давно используем щиты для защиты наших космических кораблей и станций, но применение этой технологии в планетарном масштабе всегда считалось экономически неосуществимым. Однако, учитывая угрозу Вазуран, нависшую над [root.GetName], давние сторонники этой технологии наконец преуспели в получении необходимого финансирования для достижения своей цели."
 mem_vazurans.240.a:0 "Начните исследования."
 mem_vazurans.251.name:0 "Найдены инопланетные обломки"
 mem_vazurans.251.desc:0 "Во время рутинной разведки полезных ископаемых на [root.GetName] искатели сделали неожиданное открытие: наполовину покрытые космическим мусором древние обломки. Правительственные чиновники были быстро проинформированы об этой необычной находке."
 mem_vazurans.251.desc.gestalt:0 "Во время обычной поисковой операции на [root.GetName] дроны-искатели сделали неожиданное открытие: наполовину покрытые космическим мусором древние обломки. Разум был оперативно проинформирован об этом."
 mem_vazurans.251.a:0 "Начните исследование."
 mem_vazurans_category_3:0 "Инопланетные обломки"
 mem_vazurans_category_3_desc:0 "На [From.GetName] обнаружен древний инопланетный обломок. Требуется дальнейшее исследование."
 mem_vazurans.252.name:0 "Клондайк технологий"
 mem_vazurans.252.desc:0 "Сначала наша научная команда не узнала происхождение обломков из-за их повреждения и износа, но сканирование их материального состава показало, что это однозначно технологии Вазуран.\n\nКак они оказались в этом месте остается для нас загадкой, учитывая, что Вазуран скорее самоуничтожит свои корабли, чем отдаст их технологии врагам. Обстоятельства еще более благоприятны, поскольку, хотя большинство систем корабля не распознаны, ключевой компонент их технологии остается в значительной степени нетронутым. По словам главного учёного [root.Leader.GetName], в настоящее время мы располагаем генератором демпферного поля - основным источником чрезвычайной долговечности их кораблей.\n\nЕсли бы у нас было достаточно времени для изучения его возможностей, мы могли бы найти способ обойти его воздействие на наше оружие."
 mem_vazurans.252.desc.gestalt:0 "Сначала мы не смогли определить происхождение обломков из-за сильных повреждений и износа, но сканирование их материального состава показало, что это однозначно технологии Вазуран.\n\nКак они оказались в этом месте остается для нас загадкой, учитывая, что Вазуран скорее самоуничтожит свои корабли, чем отдаст их технологии врагам. Обстоятельства еще более благоприятны, поскольку, хотя большинство систем корабля не распознаны, ключевой компонент их технологии остается в значительной степени нетронутым. По словам лидера [root.owner.GetScientistResearchSubroutine] [root.Leader.GetName], в настоящее время мы располагаем генератором демпферного поля — основным источником чрезвычайной долговечности их кораблей.\n\nЕсли бы у нас было достаточно времени для изучения его возможностей, мы могли бы найти способ обойти его воздействие на наше оружие."
 mem_vazurans.252.a:0 "Любопытно"
 mem_vazurans.253.name:0 "Инопланетные Обломки Найдены"
 mem_vazurans.253.desc:0 "Выполняя зондирование на [root.GetName], одна из наших горнодобывающих команд обнаружила древние обломки. Несмотря на то, что они наполовину углубились в астероид, прежде чем застрять, они выглядит очень даже целыми. Правительственные чиновники были быстро проинформированы об этой необычной находке."
 mem_vazurans.253.desc.gestalt:0 "Выполняя зондирование на [root.GetName], одна из наших горнодобывающих команд обнаружила древние обломки. Несмотря на то, что они наполовину углубились в астероид, прежде чем застрять, они выглядит очень даже целыми. Разум был оперативно проинформирован об этой находке."
 mem_vazurans.253.a:0 "Начните исследование."
 mem_vazurans_category_4:0 "Инопланетные обломки"
 mem_vazurans_category_4_desc:0 "Древние инопланетные обломки были обнаружены в [From.GetName]. Требуется дальнейшее изучение."
 mem_vazurans.254.name:0 "Клондайк технологий"
 mem_vazurans.254.desc:0 "Сначала наша научная команда не могла понять происхождение обломков из-за их сильного повреждения от столкновения с астероидом и износа, но сканирование их материального состава показало, что это однозначно технологии Вазуран.\n\nКак они оказались в этом месте остается для нас загадкой, учитывая, что Вазуран скорее самоуничтожит свои корабли, чем отдаст их технологии врагам. Обстоятельства еще более благоприятны, поскольку, хотя большинство систем корабля не распознаны, ключевой компонент их технологии остается в значительной степени нетронутым. По словам главного учёного [root.Leader.GetName], в настоящее время мы располагаем генератором демпферного поля - основным источником чрезвычайной долговечности их кораблей.\n\nЕсли бы у нас было достаточно времени для изучения его возможностей, мы могли бы найти способ обойти его воздействие на наше оружие."
 mem_vazurans.254.desc.gestalt:0 "Сначала мы не смогли определить происхождение обломков из-за их сильного повреждения от столкновения с астероидом и износа, но сканирование их материального состава показало, что это однозначно технологии Вазуран.\n\nКак они оказались в этом месте остается для нас загадкой, учитывая, что Вазуран скорее самоуничтожит свои корабли, чем отдаст их технологии врагам. Обстоятельства еще более благоприятны, поскольку, хотя большинство систем корабля не распознаны, ключевой компонент их технологии остается в значительной степени нетронутым. По словам лидера [root.owner.GetScientistResearchSubroutine] [root.Leader.GetName], в настоящее время мы располагаем генератором демпферного поля — основным источником чрезвычайной долговечности их кораблей.\n\nЕсли бы у нас было достаточно времени для изучения его возможностей, мы могли бы найти способ обойти его воздействие на наше оружие."
 mem_vazurans.254.a:0 "Любопытно."
 mem_vazurans.255.name:0 "Найдены инопланетные обломки"
 mem_vazurans.255.desc:0 "Сенсоры дальнего действия засекли объект, дрейфующий через систему [mem_vazurans_wreckage_system.GetName]. Похоже, что его забросили, так как нет никаких заметных энергетических признаков."
 mem_vazurans.255.a:0 "Начните исследование."
 MEM_VAZURANS_WRECKAGE_INVESTIGATION:0 "Дрейфующий в пустоте"
 MEM_VAZURANS_WRECKAGE_INVESTIGATION_DESC:0 "Мы должны воспользоваться этим открытием и исследовать обломки, найденные в системе [mem_vazurans_wreckage_system.GetName]."
 mem_vazurans.256.name:0 "Клондайк технологий"
 mem_vazurans.256.desc:0 "Сначала наша научная команда не могла понять происхождение обломков из-за их сильного повреждения, но сканирование их материального состава показало, что это однозначно технологии Вазуран.\n\nКак они оказались в этом месте остается для нас загадкой, учитывая, что Вазуран скорее самоуничтожит свои корабли, чем отдаст их технологии врагам. Обстоятельства еще более благоприятны, поскольку, хотя большинство систем корабля не распознаны, ключевой компонент их технологии остается в значительной степени нетронутым. По словам главного учёного [root.Leader.GetName], в настоящее время мы располагаем генератором демпферного поля - основным источником чрезвычайной долговечности их кораблей.\n\nЕсли бы у нас было достаточно времени для изучения его возможностей, мы могли бы найти способ обойти его воздействие на наше оружие."
 mem_vazurans.256.desc.gestalt:0 "Сначала мы не смогли определить происхождение обломков из-за их сильного повреждения, но сканирование их материального состава показало, что это однозначно технологии Вазуран.\n\nКак они оказались в этом месте остается для нас загадкой, учитывая, что Вазуран скорее самоуничтожит свои корабли, чем отдаст их технологии врагам. Обстоятельства еще более благоприятны, поскольку, хотя большинство систем корабля не распознаны, ключевой компонент их технологии остается в значительной степени нетронутым. По словам лидера [root.owner.GetScientistResearchSubroutine] [root.Leader.GetName], в настоящее время мы располагаем генератором демпферного поля — основным источником чрезвычайной долговечности их кораблей.\n\nЕсли бы у нас было достаточно времени для изучения его возможностей, мы могли бы найти способ обойти его воздействие на наше оружие."
 mem_vazurans.256.a:0 "Интригующе."
 MEM_VAZURANS_DAMPER_FIELD_GENERATOR_INVESTIGATION:0 "Провокации"
 MEM_VAZURANS_DAMPER_FIELD_GENERATOR_INVESTIGATION_DESC:0 "Наши учёные заметили измеримые флуктуации в последнем Вазуранском разломе. Они считают, что мы можем использовать это для дестабилизации их технологии. Успех или нет, этот эксперимент наверняка привлечёт их внимание. Мы должны готовиться к бою."
 mem_vazurans.260.name:0 "Подавление передачи энергии"
 mem_vazurans.260.desc:0 "После проведения нескольких экспериментов над восстановленным генератором демпфер поля, наша команда ученых, смогла получить твердое представление о его возможностях. В отличие от наших щитов, которые поглощают энергию входящих атак до своего полного уничтожения, поле, которое создает этот генератор, постоянно подавляет любые энергетические передачи, полностью либо частично поглощая весь урон орудий.\n\nИспытания показали, что поле поглощает все виды атак, но наиболее оно эффективно против энергетических. Применение подобной технологии на наших кораблях может показаться очень заманчивой идеей, но наши эксперименты выявили кое-какие неудобства и побочные эффекты при использовании технологии в текущем виде. Само поле, работает не только на вражеские корабли, но и на наши собственные, и мы до сих пор не нашли решения данной проблемы.\n\nНаши ученые смогли только изучить основные принципы работы технологии. Тем не менее, это очень важный шаг к преодолению технологического разрыва между нами и Вазуран, что несомненно увеличит наши шансы в битве против их кораблей."
 mem_vazurans.260.a:0 "Интересно."
 mem_vazurans.280.name:0 "Родная система Вазуран"
 mem_vazurans.280.desc:0 "Наш корабль-разведчик достиг другой стороны разлома. Как и ожидалось, его сенсоры засекли нагромождение защитных сооружений. Помимо круга грозных крепостей вокруг границ системы и флота такой же силы, как тот, с которым мы столкнулись во время атаки на наш родной мир, есть еще одно судно, намного больше по размеру, чем любое другое, что видели раньше. Оно вращается вокруг разрушенного мира рядом с гигантской структурой, которая, похоже, является оперативной базой Вазуран.\n\nПока наш корабль обрабатывал данные, его сенсоры засекли всплеск энергии внутри крепостей. Он не может более оставаться там без риска быть уничтоженным."
 mem_vazurans.280.a:0 "Убирайтесь оттуда!"
 mem_vazurans.281.name:0 "Флот Вазуран побежден"
 mem_vazurans.281.desc:0 "Вазуранского флота больше нет, их Колосс был уничтожен, и мы победили.\n\nПуть к их главной базе теперь открыт для наших войск."
 mem_vazurans.281:0 "К победе."
 mem_vazurans.282.name:0 "Это конец"
 mem_vazurans.282.desc:0 "Сегодня мы отмечаем начало новой эпохи. Угроза Вазуран была побеждена. Наш народ больше не будет жить в страхе перед угрозой флотилий врага.\n\nНашим силам пришлось заплатить высокую цену за эту победу, так как оставшиеся защитники Вазуран окопались, отчаянно обороняя оставшиеся оборонительные рубежи. Столкнувшись с неизбежностью поражения, они активировали систему самоуничтожения, уничтожив большую часть обитаемой территории. \n\nОднако наши войска не ушли с пустыми руками. Одна из наших спецкоманд, которая занимается поиском технологической информации, захватила ядро данных, в котором содержались детали производственного процесса 'Ксетрониум' - материал из которого была сделана броня Вазуран. Учитывая его характеристики, особенно его высокую плотность, он может быть не только полезен для брони нашего корабля, но и позволит значительно увеличить урон нашего кинетического оружия."
 mem_vazurans.282.desc.gestalt:0 "Сегодня мы отмечаем начало новой эпохи. Угроза Вазуран была побеждена. [root.GetName] больше не будет жить в страхе перед угрозой флотилий врага.\n\nНашим силам пришлось заплатить высокую цену за эту победу, так как оставшиеся защитники Вазуран окопались, отчаянно обороняя оставшиеся оборонительные рубежи. Столкнувшись с неизбежностью поражения, они активировали систему самоуничтожения, уничтожив большую часть обитаемой территории. \n\nОднако наши боевые дроны не ушли с пустыми руками. Спецгруппа дронов, которая занимается поиском технологической информации, захватила ядро данных, в котором содержались детали производственного процесса 'Ксетрониум' - материал из которого была сделана броня Вазуран. Учитывая его характеристики, особенно его высокую плотность, он может быть не только полезен для брони нашего корабля, но и позволит значительно увеличить урон нашего кинетического оружия."
 mem_vazurans.282.a:0 "Отличная работа!"
 mem_vazurans.282.b:0 "Ушли навсегда!"
 mem_vazurans.282.c:0 "Время пировать!"
 resolution_category_mem_vazurans:0 "Угроза Вазуран"
 resolution_mem_galactic_focus_crisis_vazurans_1:0 "Угроза Вазуран: Колониальная оборона"
 resolution_mem_galactic_focus_crisis_vazurans_1_desc:0 "Из-за Вазуранских рейдов, которые происходят по всей Галактике, ни одна колония не считает себя в безопасности. С принятием этой резолюции, члены Галактического сообщества соглашаются делиться информацией о тактике и характере нападений Вазуран и возможных контрмерах против захватчиков."
 resolution_mem_galactic_focus_crisis_vazurans_1_effect_success:0 "Колонии будут получать меньше опустошения и терять меньше поселений от рейдов Вазуран."
 resolution_mem_galactic_focus_crisis_vazurans_2:0 "Угроза Вазуран: Переломный момент"
 resolution_mem_galactic_focus_crisis_vazurans_2_desc:0 "Галактическое сообщество трепетало перед атаками Вазуран слишком долго. Настало время активного сотрудничества, чтобы противостоять захватчикам."
 resolution_mem_galactic_focus_crisis_vazurans_2_effect_success:0 "Обмен данными о кораблях Вазуран, а также совместные усилия по улучшению субсветовых двигателей, позволят быстрее оказывать помощь колониям, которые подвергаются атаке Вазуран и эффективно противостоять захватчикам."
 resolution_mem_galactic_focus_crisis_vazurans_1_weight_tooltip_1: "Ах, Вазуран, древний вид, атакующий из другого измерения. Нам это не интересно..."
 resolution_mem_galactic_focus_crisis_vazurans_1_weight_tooltip_2: "Мы пострадали от одной из их атак."
 mem_vazurans.1101.name:0 "Неоплаченные десятины"
 mem_vazurans.1101.desc:0 "Эта небольшая демонстрация нашей силы должна быть достаточной, чтобы показать вашу неспособность сопротивляться нам... Мы предлагаем вам выбор: Служить... или умереть.\n\nКак законные правители этой галактики мы требуем десятину за эксплуатацию миров."
 mem_vazurans.1101.a:0 "Вы и какой флот?"
 mem_vazurans.1101.b:0 "Закрыть связь и приготовить оборонительные позиции!"
 mem_vazurans.1101.c:0 "Ни при каких обстоятельствах мы не заплатим!"
 mem_vazurans.1101.d:0 "Вы получите свою десятину, а мы наш покой."
 mem_vazurans.1101.e:0 "Вы, ножконогие уроды, ничего не получите!"
 mem_vazurans.1205.name:0 "Падение из благодати"
 mem_vazurans.1205.desc:0 "Отчёты по всей галактике указывают на конец вазуранских рейдов и явное возвращение к нормальности. Хотя ни одна из вовлечённых империй не сообщила о какой-либо соответствующей информации, тайные агенты, размещённые на их территории, сообщают, что Вазуранская гегемония потеряла значительное количество людских ресурсов и материала. Союзные силы, по-видимому, триангулировали источник разломов и наших бед. Теперь мы должны быть способны прыгнуть в их родную систему и покончить с ними."
 mem_vazurans.1205.a:0 "Всё кончено."
 mem_vazurans.1205.b:0 "Теперь давайте покончим с этими ублюдками!"
 mem_vazurans.1210.name:0 "Утраченное рвение"
 mem_vazurans.1210.desc:0 "Отчёты по всей галактике указывают на конец вазуранских рейдов и явное возвращение к нормальности. Вазуранская гегемония заявила о небольшом куске пространства и установила постоянную связь со своей ранее скрытой родной планетой. Хотя они, по-видимому, больше не способны или не желают продолжать рейды, их технология всё ещё далеко опережает нашу собственную. Если бы мы смогли подавить защитников их форпоста и продолжить завоевание их родной планеты, мы могли бы получить ценные знания."
 mem_vazurans.1210.a:0 "По крайней мере, рейды прекратились."
 mem_vazurans.1210.b:0 "Начало их падения."
 mem_vazurans.1215.name:0 "Бывшее величие"
 mem_vazurans.1215.desc:0 "Отчёты по всей галактике указывают на конец вазуранских рейдов и явное возвращение к нормальности. Однако Вазуранская гегемония заявила о большом куске пространства и установила постоянную связь со своей ранее скрытой родной планетой. Похоже, теперь с их плацдармом, у них в виду большие планы галактического завоевания."
 mem_vazurans.1215.a:0 "Хлопотно."
 mem_vazurans.1215.b:0 "Пусть приходят!"
 mem_vazurans.1220.name:0 "Тихие сканирования"
 mem_vazurans.1220.desc:0 "Вазуранские сборщики десятин приходили и уходили в течение последних лет. Теперь, когда кризис закончился, некоторые из наших учёных раскрыли скрытые планы. Они проанализировали характеристики вазуранских корпусов и оружия и получили взгляд в технологию ксентрония. Некоторые из вовлечённых отметили, что это было легче, чем ожидалось, говоря, что Вазуране, должно быть, были так горды собой и своими технологическими достижениями, что даже не рассматривали возможность того, что мы поймём и воспроизведём их."
 mem_vazurans.1310.name:0 "Растущие требования"
 mem_vazurans.1310.desc:0 "Подданные, наши кузни остыли, и нам требуются дополнительные рабочие, готовые справиться с нагрузкой. Поскольку вы все занимаете то, что по праву принадлежит нам, мы требуем десятину в рабочих для наших шахт. Не тратьте наше время и не думайте об отказе."
 mem_vazurans.1310.a:0 "Заберите их."
 mem_vazurans.1310.c:0 "Рабы сойдут."
 mem_vazurans.1310.b:0 "Мы никого не продадим."
 mem_vazurans.1310.d:0 "Вот здесь ваша история заканчивается."
 mem_vazurans.1310.e:0 "Приходите и заберите их!"
 mem_vazuran_wormhole_big_object:0 "Межпространственный разлом"
