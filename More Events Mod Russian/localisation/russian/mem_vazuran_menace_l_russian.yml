 mem_VAZURAN_CARAPACE_DESC:0 "Этот сверхплотный материал когда-то обеспечивал вазуранские суда экстремальной прочностью. Внедрение его в панцири наших биокораблей сделает их превосходными любому другому типу брони, известному нам."
