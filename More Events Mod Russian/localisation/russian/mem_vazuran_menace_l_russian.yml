 pc_mem_vazuran_habitat_desc:0 "Аркология предтеч предоставляет планетарно-городские условия жизни. Гидропоника и передовые технологии фильтрации делают станцию самодостаточной, а станционные сооружения могут добывать сырье на планете, на орбите которой расположена станция."
