 building_mem_vazuran_core_forge:0 "Исследовательский центр ксентрония"
 building_mem_vazuran_core_forge_desc:0 "Ведущий исследовательский комплекс в области ксентрония. Сотни исследователей, посвятивших себя документированию каждой информации, которую они получают от местных сплавных кузниц, чтобы постоянно улучшать наши дизайны кораблей."
 building_mem_vazuran_worker_exploiter:0 "Экстракционные ямы"
 building_mem_vazuran_worker_exploiter_desc:0 "В этих залах рабочие доводятся до пиковой производительности их постоянно требовательными 'менеджерами'"
 building_mem_vazuran_worker_exploiter_tt:0 "Будет убивать в среднем §Y1%§! рабов в год."
