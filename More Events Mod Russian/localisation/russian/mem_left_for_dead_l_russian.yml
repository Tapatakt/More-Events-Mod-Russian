l_russian:

 mem_left_for_dead_category:0 "Среди Пепла"
 mem_left_for_dead_category_desc:0 "[From.GetName] замусорена обломками разрушенных кораблей, шрамы от гигантского космического боя, что давно прошел. Первичное сканирование обломков обернулось чем-то специфическим: Обнаружен сбитый корвет неизвестного происхождения, окруженный автоматизированной защитой. В зоне крушения, похоже, есть след одиночной формы жизни."
 mem_left_for_dead.1.name:0 "Дипломатическая Вылазка"
 mem_left_for_dead.1.desc:0 "Все попытки связаться с инопланетной сигнатурой жизни удалённо встречаются тишиной, поэтому [Root.leader.GetName] организует наземную экспедицию для исследования заброшенного корабля. Осторожно команда входит в импровизированный периметр безопасности. Как только экспедиция пересекает границу, турели наводят свои стволы на [Root.leader.GetName] и прожекторы заливают их светом. Инопланетный голос гремит по коммуникационной системе.\n\n'УРГЛ'ГР ВАР НОМ ГАРБЛ'ГААР'. Инопланетные турели начинают вращать свои стволы, пока [Root.leader.GetName] поспешно пытается перевести инопланетный язык. 'ХААГ'ОМ РАГ НАА!' Импланты перевода экипажа ухватывают язык и начинают переводить. 'Представьтесь! Вы солдаты легиона Марракеш или агенты Конкорда Минервеи? У вас есть десять секунд, чтобы ответить!' Инопланетянин явно остаток давно забытой войны, войны, которую он, кажется, считает всё ещё ведущейся, и он требует декларации верности!"
 mem_left_for_dead.1.hive.desc:0 "Все попытки связаться с инопланетной сигнатурой жизни удалённо встречаются тишиной, поэтому мы организуем наземную экспедицию под руководством [Root.leader.GetName] для исследования заброшенного корабля. Осторожно дроны-исследователи входят в импровизированный периметр безопасности. Как только экспедиция пересекает границу, турели наводят свои стволы на наши дроны и прожекторы заливают их светом. Инопланетный голос гремит по коммуникационной системе.\n\n'УРГЛ'ГР ВАР НОМ ГАРБЛ'ГААР'. Инопланетные турели начинают вращать свои стволы, пока наши сущности поспешно пытаются перевести инопланетный язык. 'ХААГ'ОМ РАГ НАА!' Наше сознание наконец ухватывает язык и начинает переводить. 'Представьтесь! Вы солдаты легиона Марракеш или агенты Конкорда Минервеи? У вас есть десять секунд, чтобы ответить!' Инопланетянин явно остаток сущности из давно забытой войны, войны, которую он, кажется, считает всё ещё ведущейся, и он требует декларации верности!"
 mem_left_for_dead.1.a:0 "Мы агенты Конкордата Минервы!"
 mem_left_for_dead.1.b:0 "Мы солдаты Марракешского Легиона!"
 mem_left_for_dead.1.mil:0 "Умри, пришелец!"
 mem_left_for_dead.1.hive_devouring:0 "Мы [Root.Owner.GetName]. Ты наша еда."
 mem_left_for_dead.1.c:0 "Мы [Root.Owner.GetSpeciesNamePlural]. Мы пришли с миром."
 mem_left_for_dead.1.hive:0 "Мы [Root.Owner.GetName]. Улей пришел с миром."
 mem_left_for_dead.1.phobemil:0 "Мы, хм, пришли с «миром». (Ложь)"
 mem_left_for_dead.10.name:0 "Мирный Контакт"
 mem_left_for_dead.10.desc:0 "Периметр безопасности деактивируется, когда экспедиционная команда объясняет их мирную миссию. Турели останавливаются и прожекторы опускаются, когда отдалённая фигура спускается с командного мостика на поверхность.\n\n'Десять тысяч шестьсот сорок два года я защищал свой народ и охранял нашу священнейшую реликвию. Наконец приходит моё облегчение. Я не узнаю вас, пришельцы, но ваша мирная миссия — именно то, ради чего мой народ так долго боролся. Галактика моей эпохи находилась в постоянном состоянии войны. Не было ни одного разумного существа, которое не страдало. Но некоторые из нас тосковали по более осмысленному существованию, поэтому мы осмелились быть мирными, направить наши усилия на улучшение себя вместо уничтожения наших врагов. Цена, которую мы заплатили, вы видите перед собой — я единственный выживший моего почтенного народа. Если вы продолжите свою миссию по добыче знаний для улучшения своего народа, то наше наследие не будет забыто. Я вверяю вам величайшее достижение моей цивилизации — почти полное уничтожение биологического старения'.\n\nС этим поразительным утверждением инопланетный солдат, кажется, мерцает, его тело медленно распадается, и его сносит ветром. [Root.leader.GetName] исследует внутри разрушенного мостика корабля и возвращается со странным светящимся шаром."
 mem_left_for_dead.10.hive.desc:0 "Защитный периметр деактивируется, когда экспедиционная команда объяснила свою мирную миссию.  Турели отключаются и прожекторы угасают, пока фигура спускается с командного мостика на поверхность.\n\n«Десять тысяч, шесть сотен, и сорок два года я защищал своих людей, и защищал наши самую священную реликвию. Наконец, мое освобождение настало. Я не узнаю вас, пришельцы, но ваша мирная миссия это именно то, за что мои люди так долго боролись. Галактика в мои годы была в состоянии постоянной войны. Не было ни одной разумной формы жизни, которая не страдала. Но некоторые из нас жаждали более значимого существования, поэтому мы дерзнули стать мирными, расходовать усилия на улучшение себя, а не на уничтожение наших врагов. Цена, которые мы заплатили, вы видите перед собой - я единственный выживший моего почтенного народа. Если вы продолжите свою миссию по приобретению знаний для улучшения жизни ваших людей, тогда наше наследие не будет забыто. Я доверяю величайшее достижение моей цивилизации, практически искоренение биологического старения, вам.»\n\nПосле этого поразительного утверждения, инопланетный солдат начинает мерцать, в то время как его тело медленно распадается и он сдувается ветром. Наши трутни обследуют разрушенный мостик корабля и возвращаются со странной светящейся сферой."
 mem_left_for_dead.10.a: "Раскройте секреты этого артефакта!"
 mem_left_for_dead.10.spi: "Новая святая реликвия!"
 mem_left_for_dead.10.b: "Продайте ее!"
 mem_unnatural_lifespan:0 "Неестественное Продление Жизни"
 mem_new_holy_relic:0 "Новая Святая Реликвия"
 mem_left_for_dead.50.name:0 "Провал Дипломатии"
 mem_left_for_dead.50.desc:0 "Неверный ответ. Турели быстро выпускают потоки раскаленной добела плазмы, испепелив экспедиционную команду. Выживших нет. База быстро переходит в режим гибернации, в то время как турели скрываются под поверхностью и пришелец исчезает с наших сканеров."
 mem_left_for_dead.50.a: "Сбейте его с орбиты и извлеките обломки."
 mem_left_for_dead.50.b: "Расследуйте дистанционно место крушения ради любой доступной технологии."
 mem_left_for_dead.20.name:0 "Обман"
 mem_left_for_dead.20.desc:0 "Турели отключаются и прожекторы угасают, пока фигура спускается с командного мостика на поверхность. Фигура, говорящая на инопланетном языке, приближается к экспедиции, однако замедляется, когда замечает большое количество оружия у «учёных». Ситуация переросла в напряженное ожидание и экспедиция ожидает дальнейших указаний."
 mem_left_for_dead.20.a:0 "Закончим этот спектакль. В атаку!"
 mem_left_for_dead.20.b:0 "Дождитесь своего часа."
 mem_left_for_dead.30.name:0 "Пиррова Победа"
 mem_left_for_dead.30.desc:0 "Экспедиционный корпус открывает огонь по одинокому инопланетянину. [Root.leader.GetName] удаётся нанести удар в торс инопланетянина, но не раньше, чем инопланетянин успевает реактивировать периметр безопасности. Турели выскакивают из своих укрытий под почвой и начинают извергать раскалённые белым жаром потоки плазмы. [Root.leader.GetName] падает, но остальная часть силы успевает отключить турели и обезопасить периметр.\n\nТело [Root.leader.GetName] переносится обратно на корабль, а район обыскивается на предмет полезных материалов. Один из солдат возвращается с заброшенного корабля со странным светящимся объектом."
 mem_left_for_dead.30.hive.desc:0 "Экспедиционный корпус открывает огонь по одинокому инопланетянину. [Root.leader.GetName] удаётся нанести удар в торс инопланетянина, но не раньше, чем инопланетянин успевает реактивировать периметр безопасности. Турели выскакивают из своих укрытий под почвой и начинают извергать раскалённые белым жаром потоки плазмы. Наша сила успевает отключить турели и обезопасить периметр, но несколько дронов, среди них [Root.leader.GetName], срезаны.\n\nТела павших дронов утилизируются, а район обыскивается на предмет полезных материалов. Один из наших дронов возвращается с заброшенного корабля со странным светящимся объектом."
 mem_left_for_dead.30.a:0 "Черт бы побрал всю экспедицию! Разберите объект на части!"
 mem_left_for_dead.30.mat:0 "Этот объект может быть ценнее, чем кажется."
 mem_left_for_dead.40.name:0 "Артефакт Украден"
 mem_left_for_dead.40.desc:0 "С элементом неожиданности, экспедиционные силы быстро разобрались с пришельцем-отшельником и его скудной защитой. Во время обыска корабля, один из наших солдат добыл странную, светящуюся сферу."
 mem_left_for_dead.40.hive.desc:0 "С элементом неожиданности, экспедиционные силы быстро разобрались с пришельцем-отшельником и его скудной защитой. Во время обыска корабля, один из наших трутней добыл странную, светящуюся сферу."
 mem_left_for_dead.40.a:0 "Разберите его на части!"
 mem_left_for_dead.40.mat:0 "Этот объект может быть ценнее, чем кажется."
 mem_left_for_dead.60.name:0 "Холодная Война"
 mem_left_for_dead.60.desc:0 "Импланты перевода экспедиции наконец-то сумели понять инопланетный язык. Он болтает о какой-то древней войне и о реликвии своего народа. Звучит прибыльно!"
 mem_left_for_dead.60.a:0 "Достаточно этого! В атаку!"
 mem_left_for_dead.100.name:0 "Провал"
 mem_left_for_dead.100.desc:0 "Как только [Root.leader.GetName] начинает зондировать признаки жизни внутри заброшенного корабля, база переходит в режим отключения. Турели сворачиваются в скрытые позиции под землёй, прожекторы гаснут, и единственная сигнатура жизни быстро исчезает. Кажется, этот инопланетянин не хочет быть найденным."
 mem_left_for_dead.100.a:0 "Возможно это и к лучшему."
