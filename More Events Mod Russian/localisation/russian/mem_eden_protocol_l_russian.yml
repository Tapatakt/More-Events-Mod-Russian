 r_mem_eden_protocol_devolve_relic:0 "Last Message"
 r_mem_eden_protocol_devolve_relic_desc:0 "Этот датапад — единственная оставшаяся письменная история вымерших обитателей $NAME_Toxic_Veil$. Он содержит впечатляющие исследования относительно жизни на токсичных мирах и деволюции продвинутых обществ. История этих обитателей не должна быть забыта, но может быть повторена."
