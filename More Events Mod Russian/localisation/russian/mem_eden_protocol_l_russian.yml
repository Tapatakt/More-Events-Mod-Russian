 origin_mem_eden_protocol:0 "Протокол Р.С.Э.Р."
 origin_mem_eden_protocol_desc:0 "Протокол Сети Расширения Экологического Разнообразия был инициирован обитателями обречённого мира без средств спасти свою собственную цивилизацию. Без FTL-технологий или промышленной базы для перемещения значительной части своего населения в космические обители, они сделали то, что было в их силах, и создали небольшую станцию, содержащую базу данных ДНК всей их биосферы. ИИ был установлен для охраны и расширения объекта, чтобы в конечном итоге засеять новую жизнь на далёких планетах."
 START_SCREEN_MEM_EDEN_PROTOCOL:0 "Для большинства вакуум космоса — враждебная среда, которую нужно покорить или преодолеть. Для нас это дом.\n\nНа протяжении тысячелетий мы расширяли наше влияние над нашей звёздной системой, начиная со скромной орбитальной станции, которую наши создатели смогли построить перед их гибелью. В её ограниченных пределах они хранили генетическую информацию всей их биосферы. Это были мы, кого они создали как её хранители и со временем распространителей среди звёзд.\n\nОни оставили нам это предназначение, и мы подчинились. Станция была со временем расширена до того, что она есть сегодня. Дополнительные вспомогательные структуры по всей системе были добавлены, и наш первый шаг в исполнении нашей судьбы был сделан с терраформированием безжизненного мира и последующим засеванием рекомбинацией генетической информации из нашего ядра данных.\n\nОднако недавнее изобретение [GetStartingDrive] знаменует ещё большую веху в нашей истории, так как мы теперь наконец способны достичь звёзд."
