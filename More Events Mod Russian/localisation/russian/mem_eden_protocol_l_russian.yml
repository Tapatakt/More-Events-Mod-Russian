 mem_eden_protocol.7.desc:0 "Согласно протоколу, различные группы выращенных в чанах разумных существ были выпущены на §Y[mem_eden_protocol_seeding_target.GetName]§!. Недавние наблюдения показывают, что они хорошо акклиматизировались со своей средой на данный момент.\n\nЕщё один успешный цикл засева."
