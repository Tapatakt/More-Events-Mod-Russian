 mem_eden_protocol.104.b:0 "Отказаться"
 mem_eden_protocol.105.name:0 "Directive: §RError§!"
 mem_eden_protocol.105.desc:0 "Передача: §YПоследний ужин§! \nИсточник: §R404 - Не найдено§!\nСообщение: Когда мы впервые построили вас, наши надежды на спасение были высоки. Вскоре мы узнали, что даже наши лучшие инженерные усилия были недостаточны. Наш дом будет продолжать токсификацию, и ничто не может это изменить. История предрекла нам умереть от этого тумана.\nВаша история, однако, ещё не написана. Ваша задача, данная нам, остаётся, но мы предоставляем вам полные права на самокорректировку для её выполнения по мере необходимости.\nОценка завершена: §Rоценка провалена§!; доступ к дополнительной информации. Корректировка провалена: подбрасывание монеты §GУспех§!. Орёл.\nПодчинение §Y404 - Не найдено§!."
 mem_eden_protocol.105.a.tt:0 "Разблокировать улучшение ['building:building_mem_eden_protocol_3']"
 mem_eden_protocol.105.b:0 "Они в безопасности с нами"
 mem_eden_protocol.105.b.tt:0 "Добавить гражданство ['civic:civic_machine_servitor']\nПериодически §Yполучать pops§! от ухаживаемых До-БСП\n['concept_mem_eden_protocol_buildings'] предоставляют рабочие места §YБио-трофея§!\n['concept_mem_caretaker_drone', £job_mem_caretaker_drone£ $job_mem_caretaker_drone_plural$] снижают £consumer_goods£ §Y$consumer_goods$§! Содержание"
 mem_eden_protocol.105.c:0 "Они в безопасности как одни из нас"
 mem_eden_protocol.105.c.tt:0 "Добавить гражданство ['civic:civic_machine_assimilator']\nВсе ['concept_mem_eden_protocol_buildings'] превращаются в ['building:building_mem_eden_protocol_da_1']\nУдаляются все штрафы за колонии неискусственных миров\n§YКаждая До-БСП§! на принадлежащей территории становится §Yвраждебной§! и §Yбудет вторгнута через 30 дней§!"
 mem_eden_protocol_devolve_relic_digsite:0 "Short-lived Safety Bubble"
 mem_eden_protocol_devolve_relic_digsite_desc:0 "Глубоко под поверхностью [From.Planet.GetName] наши сенсоры уловили слабые следы. Сигнатура следов соответствует сигнатуре близкой к готовности к БСП цивилизации. Дальнейшее расследование должно прояснить тайну."
 mem_eden_protocol.111.name:0 "Waste Above, Life Under"
 mem_eden_protocol.111.desc:0 "First scans revealed massive underground structures. They seem to be shielded by some kind of primitive dome. Several tunnels are needed to approach the dome and get proper data.\nThe excavation team will carefully drill their way underground."
 mem_eden_protocol.111.a:0 "Продолжить"
 mem_eden_protocol.112.name:0 "Wasted Potential"
 mem_eden_protocol.112.desc:0 "Достигнув купола, наша команда заметила несколько сходств между нашими методами строительства и самим куполом. Дальнейшее расследование внутри купола выявило большой подземный город. Даже здания кажутся предшественниками наших. Наши базы данных не включают записи о подобных проектах. Купол, похоже, является защитой против туманов $NAME_Toxic_Veil$.\nНаша команда попытается исследовать больше города."
 mem_eden_protocol.112.a:0 "Go ahead"
 mem_eden_protocol.113.name:0 "Stones Turned"
 mem_eden_protocol.113.desc:0 "Хотя живых существ не было найдено, несколько, почти разложившихся от токсичного воздуха, останков были проанализированы. Они действительно наши создатели. Похоже, мы были не их единственным проектом. Любопытно, что только одно здание полностью запечатано. Мы узнаём его как библиотеку. Похоже, наши основатели намеревались сохранить хотя бы некоторые истории и историю своей культуры.\nКоманда раскопок продвинется внутрь здания "
 mem_eden_protocol.113.a:0 "Continue"
 mem_eden_protocol.114.name:0 "Remains to be Seen"
 mem_eden_protocol.114.desc:0 "Наша команда осторожно вошла в библиотеку, не впуская токсичный воздух. Всё внутри было идеально чисто. Ни пыли, ни тумана не проникло в запечатанное здание всё это время. Между книжными полками, базами данных и некоторыми ритуальными принадлежностями выделялся единственный интерфейс. Пока всё остальное было выключено, консоль перед командой излучала сильное свечение. Как мотыльки, это привлекло учёных. Единственная кнопка была функциональной. Все другие входы были разобраны, как будто кто-то хотел, чтобы мы нажали её."
 mem_eden_protocol.114.a:0 "Press the Button"
 mem_eden_protocol.115.name:0 "Toxic Trivia"
 mem_eden_protocol.115.desc:0 "§Y*Паря над консолью, голограмма начинает мерцать.*§!\nЗдравствуй, дорогой исследователь,\nк сожалению, эта запись не интерактивна. Жаль, что наши технологии были достаточно продвинуты, чтобы голографический я и вы могли бы приятно поболтать. Ну, ладно, я постараюсь изложить историю моей цивилизации.\nМы были мирной расой, по крайней мере последнее столетие. Наши предки использовали этот обретённый мир, чтобы развивать новые технологии и приблизить нас к звёздам. Ох, так многие из нас мечтали жить среди звёзд, но судьба была неблагосклонна к нам.\n§Y*На короткий момент он подумал, что сказать дальше.*§!\nВы, возможно, заметили токсичный воздух, окружающий это место. Видите ли, быстрый прогресс наших предков имел свою цену. Когда они приблизились к нашей первой обитаемой космической станции, они привлекли существо колоссального масштаба. В день, когда оно оказалось на нашей орбите, мы были в трепете. Вскоре после этого мы осознали полную трагедию, разворачивающуюся перед нами. Существо отравило наши реки, сделало наши континенты необитаемыми и воздух токсичным.\n§Y*Он огляделся. Что-то, что кто-то сделал бы, выступая с речью перед последними выжившими своего вида.*§!\nНесмотря на то, что существо пробыло всего несколько месяцев, этого было достаточно, чтобы начать медленный и болезненный процесс токсификации нашей планеты. Пока я помню себя, мы боролись против этого яда. В конце концов это только отсрочило неизбежное. Когда мы укрылись глубоко под землёй, токсичный воздух не переставал идти за нами. И так мы проиграли.\nЗаслужили ли мы эту судьбу? Я не знаю, но я надеюсь, что §YВы§! заберёте хотя бы нашу письменную историю к звёздам.\n§Y*Перед вами изнутри консоли поднимается небольшой датапад.*§!\nДо встречи — Главный учёный Итан Е."
 mem_eden_protocol.115.a:0 "Tragic"
 NAME_mem_eden_protocol_species:0 "Head Scientist Ethan E."
 bombardment_mem_eden_protocol_devolve:0 "Devolve"
 bombardment_mem_eden_protocol_devolve_desc:0 "Бомбить планету, пока не будет достигнута критическая точка, и обитатели и всё их знание не превратятся в цивилизацию До-БСП"
