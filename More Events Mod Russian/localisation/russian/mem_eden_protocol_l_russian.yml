 building_mem_eden_protocol_1:0 "Центр управляемой эволюции"
 building_mem_eden_protocol_1_desc:0 "Объект с целью создания и поддержания подходящих условий для органической жизни на применимых мирах внутри этой солнечной системы. Через это обычные кандидаты на терраформирование в конечном итоге будут терраформированы в обитаемые миры."
 building_mem_eden_protocol_2:0 "Центр управляемой эволюции"
 building_mem_eden_protocol_2_desc:0 "Объект с целью засева и поддержания органической жизни на обитаемых мирах внутри этой солнечной системы, а также терраформирования обычных кандидатов на терраформирование в обитаемые миры."
 building_mem_eden_protocol_3:0 "Нексус управляемой эволюции"
 building_mem_eden_protocol_3_desc:0 "Объект с целью засева и поддержания органической жизни на обитаемых мирах внутри этой солнечной системы, а также терраформирования обычных кандидатов на терраформирование в обитаемые миры. Кроме того, со временем он будет превращать обитаемые миры в миры-гаи."
 building_mem_eden_protocol_da_1:0 "Киборгический сад"
 building_mem_eden_protocol_da_1_desc:0 "Этот объект видит каждую медицинскую нужду наших интегрированных органических воспитанников. От здорового тела вытекает здоровый разум."
