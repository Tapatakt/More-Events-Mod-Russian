 mem_eden_protocol.103.a:0 "Fascinating"
 mem_eden_protocol.104.name:0 "Directive: $origin_mem_eden_protocol$ Iteration"
 mem_eden_protocol.104.desc:0 "Передача: Предложено продвижение\nИсточник: [Root.owner.Leader.GetName]\nОценка завершена: Достигнуто почти совершенство; продолжение с резервной копии. Освобождение дополнительной памяти, отключение от сети, перезапись субоптимальных алгоритмов.\nПодчинение необходимо."
