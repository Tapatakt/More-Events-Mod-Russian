 mem_eden_protocol.101.b:0 "Allocate"
 mem_eden_protocol.101.c:0 "Калибровка"
 mem_eden_protocol.102.name:0 "Directive: $origin_mem_eden_protocol$ Improvement"
 mem_eden_protocol.102.desc:0 "Передача: Выпущена директива улучшения\nИсточник: [Root.owner.Leader.GetName]\nОценка завершена: Производительность всё ещё ниже ожиданий; текущая корректировка недостаточна. Инициация многовекторного подхода. Требуются дополнительные ресурсы. Доступ к хранилищу памяти предоставлен для протоколов улучшения.\nПодчинение обязательно."
