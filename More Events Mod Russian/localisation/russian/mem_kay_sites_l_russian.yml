l_russian:

 mem_kay_site_a:0 "Пустая святыня"
 mem_kay_site_a_desc:0 "В не слишком отдалённом прошлом цивилизация называла этот мир домом, но от них мало что осталось теперь на поверхности. Сканирование выявило массивную серию туннелей, сплавленных с органическим материалом, протянувшихся глубоко в кору [planet.GetName].\n\nМы обнаружили ритмичные импульсы радиации, исходящие от дна туннелей — напоминающие сердцебиение."
 r_mem_kay_site_a_thalamor_corpse:0 "Труп Таламора"
 r_mem_kay_site_a_thalamor_corpse_desc:0 "Массивный серый орган мёртвого биокорабля возвышается над нами. По причинам, которые мы не понимаем, когда возле Таламора, наши граждане чувствуют необычное умиротворение и возбуждение."
 r_mem_kay_site_a_thalamor_corpse_active_tt:0 "Разблокирует одно £decision£ §Yпланетарное решение§!: ['concept_decision_mem_kay_site_a']"
 concept_decision_mem_kay_site_a: "$decision_mem_kay_site_a$"
 concept_decision_mem_kay_site_a_desc: "$decision_mem_kay_site_a_desc$\n§Y['modifier:mem_kay_site_a_planet_buff']§! модификатор добавлен."
 MEM_KAY_SITE_A_PROJECT_1:0 "Прорыв янтарной мембраны"
 MEM_KAY_SITE_A_PROJECT_1_DESC:0 "Мембрана, поддерживающая Таламора в живых, очень прочна и сопротивлялась всем предварительным попыткам прорвать её. Похоже, сдержать наше обещание — непростая задача."
 decision_mem_kay_site_a:0 "Закопать кусочек трупа"
 decision_mem_kay_site_a_desc:0 "Мы поместим маленький кусочек Таламора на этот мир, чтобы позволить его эффекту приносить пользу нашей колонии."
 mem_kay_site_a_desecrated_sanctum:0 "Осквернённая святыня"
 mem_kay_site_a_desecrated_sanctum_desc:0 "Древнее существо было разгневано и в ответ выпустило высокое количество радиации в атмосферу."
 mem_kay_site_a_planet_buff:0 "Умиротворяющее присутствие"
 mem_kay_site_a_planet_buff_desc:0 "Умиротворяющее присутствие влияет на всех биологических обитателей этого мира."
 mem_kay_site_a_thalamor_buff:0 "Умиротворяющее присутствие Таламора"
 leader_trait_mem_kay_thalamor_ward:0 "Опекун Таламора"
 leader_trait_mem_kay_thalamor_ward_desc:0 "Остатки знаний и личности Таламора не исчезают из разума этого лидера."
 mem_kay_elkivai_catchphrase:0 "Не могу дождаться, когда покину это место!"
 mem_kay_elkivai_backstory:0 "Он единственный выживший из группы исследователей, которые путешествовали между звёздами на борту древнего биокорабля. По неизвестным нам причинам они потерпели крушение на примитивном мире, где он один выжил и остался в заточении среди местных жителей, которые поработили его."
 mem_kay_site_a_ward_leader_catchphrase:0 "Я ждал этого дня всю свою жизнь..."
 mem_kay_site_a_ward_leader_backstory:0 "Под влиянием с раннего возраста Таламора [root.GetSheHe] [root.GetHasHave] был благословен успехом во всех [root.GetHerHis] начинаниях. [root.GetSheHeCap] стремится к приключениям и чудесам за пределами обыденной жизни внутри границ нашей империи."
 mem_kay_site_a.1.name:0 "Кожа мира"
 mem_kay_site_a.1.desc:0 "Стены туннелей состоят из живого сплава, чего-то среднего между плотью и металлом, который выделяет биохимический осадок при разрезании. Они тёплые на ощупь, и в некоторых местах можно почувствовать слабый пульс. В некоторых областях поверхности стен покрыты жуткими шрамами. Руководитель экспедиции отмечает, что когда кто-либо приближается к стенам слишком близко, они испытывают слуховые галлюцинации; шепчущие голоса, но слишком неразборчиво, чтобы разобрать слова.\n\nНаша археологическая команда пришла к выводу, что шрамы на стенах — результат какой-то примитивной и, вероятно, неудавшейся хирургической процедуры. Органический материал, очевидно чужеродный для оригинальной структуры стен, был добавлен небольшими заплатами. Причина этих процедур остаётся неясной."
 mem_kay_site_a.1.a:0 "Собрать образцы ткани для изучения."
 mem_kay_site_a.1.b:0 "Попытаться расшифровать шёпот."
 mem_kay_site_a.2.name:0 "Мозговая часовня"
 mem_kay_site_a.2.desc:0 "Первая внутренняя камера, которую достигла наша команда, заполнена до краёв знаками поклонения. Скамьи и алтари, построенные из костей и сухожилий, а сбоку находятся несколько повреждённых медицинских стазис-капсул с гуманоидами внутри. Более близкий осмотр алтарей показывает инопланетные письмена, в то время как осмотр стазис-капсул выявляет, что обитатели были убиты, вероятно, во сне. Стазис-капсулы были взорваны, а у гуманоидов внутри все перерезаны глотки.\n\nОбразцы тканей из повреждённых капсул, а также останков гуманоидов указывают на то, что виновник, вероятно, литоидного происхождения, однако кроме этого случая мы не видели никаких признаков литоидных форм жизни в этих туннелях или на этом мире в целом до сих пор. Достаточно странно, также кажется, что большие куски плоти гуманоидов были хирургически удалены задолго до их смерти. Перекрёстная проверка с образцами, взятыми ранее, выявляет их как источник странных заплаток на стенах."
 mem_kay_site_a.2.a:0 "Изучить инопланетные письмена."
 mem_kay_site_a.2.b:0 "Вскрыть гуманоидный образец."
 mem_kay_site_a.3.name:0 "Разрушенные архитекторы"
 mem_kay_site_a.3.desc:0 "Дальше внутри сети туннелей наша команда достигла другой камеры, содержащей больше останков гуманоидов. Или, по крайней мере, то, что от них осталось. Можно сказать, что они когда-то были биологическими существами, но их жизненно важные органы были все хирургически удалены и заменены механизмами. Этих кибернетических гуманоидов разорвали на куски с большой силой, судя по их состоянию.\n\nНесмотря на то, что эта резня произошла довольно давно, наша команда сообщает о более высоких концентрациях редких газов в окружающей атмосфере, которые они связывают с предполагаемым литоидным нападавшим. Они приближаются, очевидно.\n\nКроме того, шрамы, покрывающие стены, значительно чаще встречаются в этой камере, хотя руководитель экспедиции отмечает, что некоторая плоть была удалена со стены вместо того, чтобы быть трансплантированной на неё."
 mem_kay_site_a.3.a:0 "Отступить и обследовать периметр."
 mem_kay_site_a.3.b:0 "Продвигаться дальше."
 mem_kay_site_a.4.name:0 "Пещера сердца"
 mem_kay_site_a.4.desc:0 "Туннель заканчивается у пещеры пульсирующего багрового света. В центре пещеры лежит колоссальное сердце, подвешенное в янтарной мембране. Пустые жгуты змеятся во всех направлениях от мембраны, прокладывая более мелкие туннели к поверхности.\n\nКогда наша команда приблизилась к сердцу, внезапно ощутился сдвиг в атмосфере, и массивный электромагнитный импульс пронзил пещеру. Видеосигналы от наших учёных погасли, и вся связь была потеряна."
 mem_kay_site_a.5.name:0 "Таламор говорит"
 mem_kay_site_a.5.desc:0 "Мы восстановили связь с нашей археологической командой, хотя они выглядят и звучат необъяснимо иначе. Они утверждают, что общались с тем, что они называют \"Таламором\" — колоссальным разумным органом, который является и сердцем, и мозгом.\n\nСогласно нашим учёным, Таламор когда-то был частью космической левиафанской твари, функционировавшей как биокорабль для исследователя и поклонявшейся народом [event_target:mem_kay_site_a_planet.GetName]. Когда биокорабль потерпел крушение на их мире после повреждения космическим мусором, они срезали основной орган левиафана и погребли его глубоко под землёй внутри странной мембраны.\n\nОни мало знали, что орган, или Таламор, был всё ещё жив, даже после отсоединения от своего основного тела, но бил лишь раз в несколько лет. Таламор чувствовал себя беспомощным, в ловушке и напуганным, поэтому он постепенно вырастил полые конечности, прорываясь через кору [event_target:mem_kay_site_a_planet.GetName] в отчаянной попытке достичь поверхности. К сожалению, местные жители приняли это как знак поклоняться Таламору, и они начали жертвовать собственными частями тел для строительства массивных камер внутри туннелей, называя это подземным мегасооружением \"Пустая святыня\".\n\nТаламор медленно выпускает радиацию с каждым пульсом. На протяжении веков он приближался всё ближе и ближе к поверхности планеты, в то время как народ [event_target:mem_kay_site_a_planet.GetName] всё сильнее и сильнее болел от радиационного отравления. Они пытались бороться с этим развитием с помощью кибернетических имплантов, но потерпели неудачу, и в конечном итоге сократились всего до горстки существ, всё ещё ухаживающих за своей святыней. Те были в конечном итоге убиты литоидом, которого мы встретили ранее, примерно за три тысячи лет до нашего прибытия.\n\nКак наша археологическая команда ранее заключила, шрамы, покрывающие стены Пустой святыни, происходят от этих гуманоидов, поклонявшихся Таламору. Согласно ему они начали..."
 mem_kay_site_a.5.a:0 "Попытаться установить связь с Таламором."
 mem_kay_site_a.5.b:0 "Что-то не сходится. Это не наши учёные. Ввести военных!"
 mem_kay_site_a.6.name:0 "Начало безумия"
 mem_kay_site_a.6.desc:0 "[leader.GetName] сообщает о мучительных, жестоких кошмарах, где [leader.GetSheHe] [leader.GetIsAre] атакованы невидимой силой. Из-за этих сообщений, других симптомов и странного поведения, о котором сообщает команда, похоже, что [leader.GetName] начинает скользить в глубины безумия. Наша археологическая команда сообщает, что в течение последнего часа [leader.GetSheHe] [leader.GetWasWere] свернулся калачиком на полу, у стены, бормоча фразу \"Таламор\" снова и снова. Когда [leader.getSheHe] оттащили, [leader.getSheHe] продолжал настаивать, что [leader.getSheHe] должен слушать стены."
 mem_kay_site_a.6.a:0 "[leader.getSheHeCap] восстановится, со временем."
 mem_kay_site_a.6.b:0 "Лекарства помогут [leader.GetHerHim] справиться."
 mem_kay_site_a.6.c:0 "Назначить [leader.GetName] обязательную терапию, но оставить [leader.GetHerHim] на объекте."
 mem_kay_site_a.7.name:0 "Возвращение к норме"
 mem_kay_site_a.7.desc:0 "[root.GetName] сообщает, что [root.GetSheHe] [root.GetIsAre] больше не испытывает кошмаров и не слышит шёпота, и [root.GetSheHe] [root.GetHasHave] был допущен к возвращению к службе своим терапевтом."
 mem_kay_site_a.7.a:0 "Добро пожаловать, облегчение."
 mem_kay_site_a.8.name:0 "Дикий учёный"
 mem_kay_site_a.8.desc:0 "Худшее сбылось. [root.GetName] полностью утратил всякое подобие рассудка, и наша археологическая команда быстро последовала его примеру. Мы не до конца понимаем, почему Пустая святыня сводит наших учёных с ума, но ясно, что это должна быть корневая причина."
 mem_kay_site_a.8.a:0 "Что бы ни случилось здесь, это не может и не произойдёт снова."
 mem_kay_site_a.8.b:0 "Трагедия, но мы должны упорствовать."
 mem_kay_site_a.9.name:0 "Шёпот из стен"
 mem_kay_site_a.9.desc:0 "Во время раскопок археологического объекта Пустая святыня на [event_target:mem_kay_site_a_planet.GetName] наш учёный [leader.GetName] внезапно начал левитировать.\n\n§W\"У-убей… меня…\"§! — [leader.GetSheHe] напрягается. §W\"ПОЖАЛУЙСТА!\"§!\n\n[leader.GetSheHeCap] мягко опускается обратно на пол святыни, не имея никакого воспоминания о событии."
 mem_kay_site_a.9.a:0 "Это было... тревожно."
 mem_kay_site_a.10.name:0 "Литоидный зверь"
 mem_kay_site_a.10.desc:0 "Пока обследовали периметр, наша разведывательная команда нашла литоидного зверя! Он ещё не заметил нас. Он довольно большой и, очевидно, сильный, с бритвенно-острыми когтями. Судя по нашим наблюдениям, зверь, возможно, разумен."
 mem_kay_site_a.10.a:0 "Попытаться установить связь."
 mem_kay_site_a.10.b:0 "Может, мы сможем понять его, подружиться с ним?"
 mem_kay_site_a.10.c:0 "Уничтожить зверя."
 mem_kay_site_a.11.name:0 "Зверь атакует!"
 mem_kay_site_a.11.desc:0 "Наша команда никогда не видела этого нападения.\n\nИз тени литоидный зверь напрыгнул на [leader.GetName], мгновенно убив [leader.GetHerHim]. Однако, следуя внезапной атаке, наш персонал безопасности быстро отреагировал и сумел захватить зверя. Теперь нам решать, что с ним случится."
 mem_kay_site_a.11.a:0 "Уничтожить зверя."
 mem_kay_site_a.11.b:0 "Этот зверь постигнет судьба хуже смерти."
 mem_kay_site_a.11.c:0 "Инициировать коммуникацию."
 mem_kay_site_a.11.d:0 "Убить отступника!"
 mem_kay_site_a.11.e:0 "Как было предсказано в начале нашей экспедиции..."
 mem_kay_site_a.11.f:0 "Он выглядит довольно сильным, может быть, он мог бы быть полезен…"
 mem_kay_site_a.11.g:0 "Просто несчастный случай... Теперь к зверю..."
 NAME_Elkivai:0 "Элкиваи"
 NAME_Kelvar:0 "Келвар"
 mem_kay_site_a.12.desc:0 "§HКогда мы приближаемся к коренастому литоидному зверю, он рычит на наше присутствие. Теперь, глядя на него вблизи, можно сказать, что он очень боится.§!\n\nДержитесь подальше! Я кусаюсь!"
 mem_kay_site_a.12.a:0 "Ты убил нашего учёного!"
 mem_kay_site_a.12.a.response:0 "Ох… Прости… Я думал, это один из тех злых металлическо-мясных существ. Они причиняли мне боль. Я не хотел, чтобы мне снова причинили боль."
 mem_kay_site_a.12.b:0 "Откуда ты прибыл?"
 mem_kay_site_a.12.b.response:0 "Мои родители были исследователями великой миссии; я был ещё ребёнком в то время, и всё, что я помню, — что они искали фрагменты какого-то божества. Мы путешествовали на борту великого биокорабля, Таламора. Он был псионически связан с нами. Он разговаривал с нами, связывался с нами; он был практически моим учителем, няней и опекуном; но однажды мы внезапно потерпели крушение на этом несчастном мире. Никто не выжил, кроме меня, и я выжил только потому, что наш корабль защитил меня своими псионическими способностями. Всё после этого — туман. Примитивные появились. Они обобрали обломки и взяли меня в рабство."
 mem_kay_site_a.12.c:0 "Как ты выжил так долго?"
 mem_kay_site_a.12.c.response:0 "Я сбежал из оков и убил своих похитителей, но это было тысячелетия назад. Большая часть — туман. Я делал постыдные вещи, чтобы выжить… Я даже ел стены. Но большую часть времени я спал в спячке..."
 mem_kay_site_a.12.d:0 "Тебе больше четырёх тысяч лет?"
 mem_kay_site_a.12.d.response:0 "Да. Мой вид развивается довольно медленно, но живёт примерно пять тысячелетий. Мы проводим почти пятьсот лет младенцами."
 mem_kay_site_a.12.e:0 "Что ты можешь сделать для нас?"
 mem_kay_site_a.12.e.response:0 "Я могучий воин! §H...он гордо ревёт.§!\n\nЯ всегда мечтал вести войска в бой. Если позволишь мне, я буду сражаться за тебя с честью. Я уничтожу твоих врагов!"
 mem_kay_site_a.12.f:0 "Хотел бы ты присоединиться к нам?"
 mem_kay_site_a.12.f.response:0 "Я… §Hон начинает слезиться,§! мне так одиноко. Прошли тысячелетия с тех пор, как я видел другое живое существо. Быть среди друзей снова, друзей, которые не хотят причинить мне боль… это всё, чего я желаю..."
 mem_kay_site_a.12.g:0 "Что ты можешь рассказать нам об этом месте?"
 mem_kay_site_a.12.g.response:0 "§HЭлкиваи наклоняет голову,§! Я не могу точно объяснить, но… эти туннели умиротворяют. Они разговаривают со мной раз в несколько десятилетий; они говорят мне, что всё будет хорошо, и что я любим. Возможно, биокорабль, который принёс меня сюда, каким-то образом является частью этой святыни."
 mem_kay_site_a.13.desc:0 "§HТаламор говорит через нашего учёного, их глаза светятся багровым, пока они левитируют над землёй святыни.\n\nТихим и побеждённым тоном он обращается к нам.§!\n\nПожалуйста. Покончите с моими страданиями."
 mem_kay_site_a.13.a:0 "Почему ты хочешь, чтобы мы покончили с твоей жизнью?"
 mem_kay_site_a.13.a.response:0 "§HСлеза стекает по щеке нашего учёного, пока Таламор говорит через [event_target:mem_kay_site_a_leader.GetHerHim].§!\n\nЗнаете ли вы, каково это — жить тысячелетия, но не быть в состоянии двигаться, едва быть способным действовать, и быть поклоняемым буйными безумцами, над которыми у тебя нет контроля? А затем тишина и изоляция... Я не прошу вас понять мою просьбу, только чтобы вы исполнили её."
 mem_kay_site_a.13.b:0 "Как ты жив, и как мы общаемся?"
 mem_kay_site_a.13.b.response:0 "Я был последним из умирающего вида ещё до того, как упал на этот мир, выведен цивилизацией такой древней, что даже я забыл её имя. Я блуждал по звёздам вечности, сосуществуя со многими разными путешественниками на пути. Мой вид обладал многими уникальными чертами. Мы могли проникать в разумы и говорить через них как через сосуд. Вы бы назвали это какой-то псионической связью, я полагаю. Так мой вид связывался со своими спутниками-путешественниками..."
 mem_kay_site_a.13.c:0 "Есть ли у тебя мудрость, которой ты можешь поделиться с нами?"
 mem_kay_site_a.13.c.response:0 "Я мирно блуждал по небесам вечности, перевозя исследователей с планеты на планету, и я видел множество цивилизаций, которые поднимались и падали, но в конце концов… ни одно оружие или сила никогда не были так сильны, как надежда или любовь."
 mem_kay_site_a.13.d:0 "Мы не будем."
 mem_kay_site_a.13.d.response:0 "§HНаш учёный издаёт жуткий вопль...§!"
 mem_kay_site_a.13.e:0 "Мы не будем. Ты бесценен как объект исследования."
 mem_kay_site_a.13.e.response:0 "§HНаш учёный рычит от гнева.§!\n\nБудь по-твоему."
 mem_kay_site_a.13.f:0 "Хорошо. Мы исполним твою просьбу. Но как?"
 mem_kay_site_a.13.f.response:0 "Я… благодарю тебя.\n\n§HЧерез нашего учёного Таламор плачет, преодолённый перспективой избавления от своих мук...§!\n\nЯнтарная мембрана, окружающая меня, поддерживает меня в живых. Прорвите её, и я погибну."
 mem_kay_site_a.14.name:0 "Сделано"
 mem_kay_site_a.14.desc:0 "Мы наконец прорвали янтарную мембрану! Наши инженеры были довольно удивлены, насколько она была прочна, но, к сожалению, длительный контакт с веществом, из которого сделана мембрана, вызывает сыпь по всему телу у [Root.Owner.GetSpeciesNamePlural]. Так что у него мало ценности для использования в будущих проектах.\n\nКогда мембрана была прорвана, ошеломляющее чувство спокойствия овладело нашей археологической командой. [Root.Leader.GetName] начал левитировать и петь то, что звучало как строчка из колыбельной, но на языке, который мы не понимаем.\n\n§W\"Ком кангон, то мик нешпа хиш нгаош.\"§!\n\nНаш учёник медленно опустился обратно на землю, пока Таламор начал приобретать болезненный оттенок серого."
 mem_kay_site_a.14.a:0 "Да обретёт он покой."
 mem_kay_site_a.15.name:0 "Разгневанный Таламор"
 mem_kay_site_a.15.desc:0 "В нашей опрометчивой спешке мы разгневали Таламора. Внезапно туннели и внутренние камеры Таламора начали жёстко сжиматься, убивая всех [Root.GetSpeciesNamePlural] внутри. Радиация, выпущенная Таламором, умножилась вдесятеро, быстро превращая [event_target:mem_kay_site_a_planet.GetName] в мир-могильник.\n\nМы можем никогда не узнать, что случилось с Таламором. Выбрали ли мы неправильно? Предотвратили ли мы худшее? Вопросы без ответов..."
 mem_kay_site_a.15.a:0 "Но постой! Мы только хотели быть друзьями!"
 mem_kay_site_a.15.b:0 "Ксеномразь."
 mem_kay_site_a.15.c:0 "Какая трата."
 mem_kay_site_a.15.d:0 "Последний смех будет наш!"
 mem_kay_site_a.15.e:0 "Он заплатит за свои грехи."
 mem_kay_site_a.16.name:0 "Страж снов"
 mem_kay_site_a.16.desc:0 "[Root.GetName], который страдал от частых кошмаров, сообщает, что умиротворяющее присутствие появилось в [Root.GetHerHis] снах. [Root.GetSheHeCap] делится [Root.GetHerHis] верой, что каким-то образом фрагмент сознания Таламора продолжает жить внутри [Root.GetHerHim], и что он охраняет [Root.GetHerHim] в [Root.GetHerHis] снах."
 mem_kay_site_a.16.a:0 "Как любезно с его стороны."
 mem_kay_site_a.16.b:0 "Мы не потерпим ксеносов в наших разумах!"
 mem_kay_site_a.16.c:0 "Это будет отличный случай для изучения!"
 mem_kay_site_a.16.e:0 "Ясно, что Таламор был послан нам божеством."
 mem_kay_site_a.16.f:0 "Это повышает продуктивность [Root.GetName] для государства."
 mem_kay_site_a.17.name:0 "Нешпа хиш нгаош"
 mem_kay_site_a.17.desc:0 "[Root.GetName] сообщает о любопытном феномене, происходящем с [Root.GetHerHis] четырёхлетним ребёнком. Время от времени, во сне, он шепчет фразу \"Ком кангон, то мик нешпа хиш нгаош\" — последние слова Таламора. Когда его спрашивают об этом, ребёнок утверждает, что Таламор сказал ему, что это значит; что он будет охранять сны ребёнка и защищать его от вреда.\n\nОчевидно, Таламор не только закрепился в разуме [Root.GetName], но и передался [Root.GetHerHis] ребёнку."
 mem_kay_site_a.17.a:0 "Таламор — действительно сострадательная душа."
 mem_kay_site_a.17.b:0 "Этот ребёнок когда-нибудь станет прекрасным дополнением к нашей империи."
 mem_kay_site_a.17.c:0 "Это завораживает!"
 mem_kay_site_a.17.d:0 "Дальнейшее доказательство работы божественного."
 mem_kay_site_a.18.name:0 "Опекун докладывает о прибытии на службу"
 mem_kay_site_a.18.desc:0 "Ребёнок [event_target:event_target:mem_kay_site_a_ward_leader.GetName], [event_target:mem_kay_site_a_ward_leader.GetName], который теперь вырос, получил степень по археологии в возрасте едва восемнадцати лет. [event_target:mem_kay_site_a_ward_leader.GetSheHe] [event_target:mem_kay_site_a_ward_leader.GetIsAre] вундеркинд и выразил [event_target:mem_kay_site_a_ward_leader.GetHerHis] желание следовать по стопам [event_target:mem_kay_site_a_ward_leader.GetHerHis] родителя как учёный для нашего великого государства."
 mem_kay_site_a.18.a.tt:0 "[event_target:mem_kay_site_a_ward_leader.GetName] вступит на нашу службу."
