l_russian:

 mem_living_asteroid_anomaly_category:0 "Необычные Энергетические Показания"
 mem_living_asteroid_anomaly_category_desc:0 "Предварительное сканирование §Y[From.GetName]§! выдало странные результаты. Этот астероид и те, что его окружают, демонстрируют необычные энергетические показания, нехарактерные для таких объектов. Более того, §Y[From.GetName]§! покрыт участками материала странного цвета и фактуры."
 mem_living_asteroid.1.name:0 "Живые Астероиды"
 mem_living_asteroid.1.desc:0 "Хотя главный учёный §Y[Root.leader.GetName]§! настаивает, что термин неточный, экипаж §Y[Root.GetName]§! уже начал называть §Y[From.GetName]§! 'живым астероидом'. Массивные части астероидов являются домом для колоний гипер-устойчивого лишайника, непохожего ни на одну форму грибов, найденных на планетах земного типа. \n\nКак и все лишайники, эти 'живые астероиды' образованы из сочетания грибка и цианобактерий, причём этот конкретный вид цианобактерий встречается только с соответствующим грибком — оба являются совершенно новыми видами для [Root.Owner.GetName]. В то время как предложенный научный термин для них — 'небесная аскомикота', большинство медиа-отчётов и даже научных работ начали называть их 'космическими грибами'. Рекомендуется дальнейшее изучение."
 mem_living_asteroid.2.name:0 "Просто куча камней"
 mem_living_asteroid.2.desc:0 "Главный учёный §Y[Root.leader.GetName]§! сообщил, что необычные энергетические показания с §Y[From.GetName]§! — не более чем неисправность сканера. Кроме того, текстурированный материал на поверхности планеты — просто жила металла, которая не была бы полезна даже для добычи."
