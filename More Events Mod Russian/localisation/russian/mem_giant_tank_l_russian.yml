l_russian:

 mem_giant_tank_category:0 "Странные Махины"
 mem_giant_tank_category_desc:0 "Наша команда исследователей обнаружила гигантские строения, которые в прошлом, возможно, могли передвигаться. Они расположены в центре огромного поля боя. Уровень радиации достаточно низкий, чтобы мы могли спуститься и изучить их поближе."
 mem_giant_tank.1.name:0 "Старые Обломки"
 mem_giant_tank.1.desc:0 "То, что поначалу обещало быть значимым открытием, в итоге обернулось разочарованием наших учёных. Они не нашли ничего кроме старых обломков и руин и были вынуждены изменить их предыдущее заявление."
 mem_giant_tank.1.a:0 "Продолжайте дальше."
 mem_giant_tank.2.name:0 "Гиганты из Прошлого"
 mem_giant_tank.2.desc:0 "Эти массивные громады стали, возвышающиеся над этим древним полем боя, значительно более продвинуты, чем мы ранее предполагали по технологии этой цивилизации, судя по их, казалось бы, несуществующим космическим возможностям. Наша команда пришла к выводу, что эта цивилизация была слишком занята ведением войны против своих собственных, чтобы достичь звёзд.\n\nПриводимые в действие ядерными реакторами деления, эти гиганты, которые [Root.leader.GetName] оценивает весом между 250 000 и 300 000 тонн, должны были катиться по полю боя как движущиеся горы. Сначала [Root.GetSheHe] думал, что они были большими и уязвимыми целями, пока наша научная команда не обнаружила два мощных генератора щита глубоко внутри стального корпуса гиганта. Если предположения [Root.leader.GetName] верны, они могли защищать не только Наземный Корабль, как его называет наша команда, но и целые полки, движущиеся рядом с ними.\n\nЕсть несколько интересных конструкций, которых наши военные не могут дождаться, чтобы заполучить."
 mem_giant_tank.2.a:0 "Отлично. Давайте начнём!"
 MEM_GIANT_TANK_INVESTIGATION:0 "Машины Войны"
 MEM_GIANT_TANK_INVESTIGATION_DESC:0 "Учёные готовы восстановить эти древние боевые машины. Все материалы и временное поселение на месте и можно начинать работу."
 mem_giant_tank.11.name:0 "Машины Войны"
 mem_giant_tank.11.desc:0 "Восстановление этих древних мобильных крепостей потребовало немало усилий. Они гораздо сложнее, чем мы прежде ожидали, и мы пока понимаем лишь часть их технологий. Поэтому создавать новые мы не можем и придётся ограничиться существующими двумя. Для вывоза каждой из них с планеты потребуется отдельный транспортный корабль, но не считая этого всё готово к отправке."
 mem_giant_tank.11.a:0 "Отлично."
 mem_giant_tank.11.a.tooltip:0 "Вы получаете две армии Мобильная Крепость."
 mem_giant_tank.12.name:0 "Древние Машины"
 mem_giant_tank.12.desc:0 "Нашей команде не удалось восстановить мобильные крепости. Их технология оказалась гораздо сложнее, чем мы предполагали и все наши попытки оказались тщетны.\n\nЗная, что в итоге навлекла на себя эта цивилизация, используя эти машины, может быть это и к лучшему. Но не всё потеряно. Мы сделали несколько интересных открытий пока изучали строение этих крепостей, что увеличило наши знания в области инженерии."
 mem_giant_tank.12.a:0 "Жаль. Они бы нам пригодились."
 mem_giant_tank.13.name:0 "С того света"
 mem_giant_tank.13.desc:0 "Один из наших учёных допустил трагическую ошибку при реактивации одной из компьютерных систем крепостей. Их предыдущий владелец, видимо, опасался возможного захвата одной из машин больше всего остального и, поэтому, установил серьёзные меры безопасности. После того как учёный не сумел вовремя деактивировать их, крепость и вместе с ней вся исследовательская команда исчезли во вспышке ядерного взрыва. Они стали последними жертвами неоконченной войны."
 mem_giant_tank.13.a:0 "Какой ужас!"
 mem_giant_tank_army:0 "Мобильная Крепость"
 mem_giant_tank_army_plural:0 "Мобильные Крепости"
 mem_giant_tank_army_desc:0 "Огромная наземная боевая машина с огневой мощью линкора."
