l_russian:

 mem_life_barren_category:0 "$life_barren_category$"
 mem_lost_zoo.8.name:0 "Загадочные Купола"
 mem_lost_zoo.8.desc:0 "Дальнейшие наблюдения обнаружили на поверхности большой комплекс, состоящий из более чем дюжины обрушившихся куполов, который в определённый момент был изолирован от остальной планеты. Раскопки на месте самого большого купола выявили шахту лифта, уходящую на глубину более двухсот метров."
 mem_lost_zoo.8.a:0 "Что там может быть?"
 MEM_LOST_ZOO_PROJECT:0 "Изучение Комплекса Куполов"
 MEM_LOST_ZOO_PROJECT_DESC:0 "Глубокая шахта лифта находится в разрушенных куполах на планете §Y[From.GetName]§!. Нужно снарядить исследовательскую экспедицию, если мы хотим узнать, куда же она ведёт."
 mem_lost_zoo.1.name:0 "Древний Зоопарк"
 mem_lost_zoo.1.desc:0 "Экспедиция вниз по этой шахте выявила целый самодостаточный биом внутри гигантского пещерного зала. Существа, представляющие по крайней мере три отдельных тропических планеты, были каталогизированы до сих пор. Система сильно автоматизирована, с множеством специализированных дронов, наблюдающих, поддерживающих, а иногда и сокращающих популяцию, искусственно поддерживая пищевой цикл, а также сам объект. Тридцатисемичасовой цикл дня/ночи симулируется с помощью медленно движущейся искусственной световой панели на крыше пещеры, питаемой геотермальными источниками, зарытыми ещё глубже в поверхность.\n\nЭта искусственная экосистема оценивается в возрасте более 40 000 лет и начинает разрушаться способами, которые автоматизированные системы не могут отремонтировать. §Y[Root.leader.GetName]§! оценивает, что этот объект достигнет критической точки отказа в течение следующего тысячелетия или около того."
 mem_lost_zoo.1.a:0 "Разберите механизмы и изучите технологию."
 mem_lost_zoo.1.b:0 "Препарируйте и изучите животных."
 mem_lost_zoo.1.c:0 "Сделаем из этого Заповедник."
